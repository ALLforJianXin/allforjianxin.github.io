            昨夜西风
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">鱼头</span> <span title="创建时间" class="iconfont icon-riqi">2019-05-26</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E9%B1%BC%E5%A4%B4">鱼头</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E6%9C%89%E6%83%85%E4%BA%BA">有情人</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="昨夜西风"><a class="header-anchor" href="#昨夜西风">#</a> 昨夜西风</h1>
<h2 id="上"><a class="header-anchor" href="#上">#</a> 上</h2>
<h3 id="【一·司法天神】"><a class="header-anchor" href="#【一·司法天神】">#</a> 【一·司法天神】</h3>
<p>司法天神埋首案牍已有些时日，本道天宪既出诸事便可落定，奈何在其位谋其政他仍是日日连轴转，刻下觉着喉头胸腔似有风过好些肉痒，他耐不住咳了几声。</p>
<p>“兄长且歇片刻，待用了药再瞧罢”华山圣母手持托盘亭亭立在案旁温声道。</p>
<p>神官见了摆手言道“不妨事，待我将手上这点西海章子看完，海属的事儿便算了了。”</p>
</div> <a href="/pages/b54dfb/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box iconfont icon-zhiding"><div class="title-wrapper"><h2><a href="/pages/74fa18/">
            我执
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">蓬蓬裙</span> <span title="创建时间" class="iconfont icon-riqi">2019-04-27</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E8%93%AC%E8%93%AC%E8%A3%99">蓬蓬裙</a><a href="/categories/?category=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a><a href="/tags/?tag=%E7%A7%8B%E5%90%8D%E5%B1%B1">秋名山</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="我执"><a class="header-anchor" href="#我执">#</a> 我执</h1>
<h2 id="_1"><a class="header-anchor" href="#_1">#</a> 1</h2>
<p>司法天神，他从一个卑鄙无耻、罔顾亲情的小人峰回路转到今日劳苦功高受众仙家连连称赞爱戴的仁德显圣，其间使了多少手段，恐怕只有他自己知道。</p>
<p>说是为天下众生，其实不过幌子，有时候入戏太深，连自己都快分不清到底是是为了私情还是公义，直到那天又在瑶池遇见她。</p>
</div> <a href="/pages/74fa18/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/94dea9/">
            新婚之夜
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">晨晨</span> <span title="创建时间" class="iconfont icon-riqi">2024-12-25</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E6%99%A8%E6%99%A8">晨晨</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>妆台上长染红烛，公主将胭脂抹在唇间，轻抿染匀，对着铜镜自赏片刻，满意地抚动满额坠饰。满室镶嵌的明珠之外罩着一层红绸，致使透出的光也是酡红色的，映在公主华丽的饰品上，亮晶晶的折射珠光。</p>
</div> <a href="/pages/94dea9/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/04ed5e/">
            还愿
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">斑斑</span> <span title="创建时间" class="iconfont icon-riqi">2024-10-01</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E6%96%91%E6%96%91">斑斑</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a></span></div></div> <!----></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/495f6d/">
            神仙眷侣
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2024-09-19</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99">龙年接龙</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>时间是杨戬接旨到上天之间的空档，见缝插针写点小故事😊</p>
</div> <a href="/pages/495f6d/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/8a000f/">
            从此醉
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2024-09-17</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <!----></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/d13f18/">
            鲛绡透·中秋特别篇
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">斑斑</span> <span title="创建时间" class="iconfont icon-riqi">2024-09-17</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E6%96%91%E6%96%91">斑斑</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>这天朝中无事，杨戬在神殿看完案卷，方才未时初。他不急不忙与梅山兄弟闲聊几句，照旧安排狗儿在殿中看守卷宗，回到墙后暗藏的卧室，换了件龙女新做的衣裳，又摸出一把西海产的折扇，慢悠悠晃出南天门。</p>
</div> <a href="/pages/d13f18/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/2a07ca/">
            清辉远
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2024-09-14</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>寸心自生日后就失去了杨戬的消息，连寄出的书信也失了回应。若不是司法府还在照常运转，日日有批文下发，几乎会以为他从这世上销声匿迹了。<br>
直到有一天，他突然出现了，出现在她面前，笑盈盈问她：“寸心可愿助我双修？”</p>

<h2 id="上篇-小龙女相思苦无计"><a class="header-anchor" href="#上篇-小龙女相思苦无计">#</a> 上篇：小龙女相思苦无计</h2>
<p>从山顶神庙出来，寸心就被显圣真君带回了灌江口他杨家老宅。<br>
起先在这里他们是真真做了几百年神仙眷侣。真君护佑凡间受人爱戴敬仰，此处作为二郎神祖庭，香火更盛。龙女到来后他特地给皇帝老儿托梦，在自己庙里添了章淑二郎夫人神位，还加了龙王的位子共享香火。此外出双入对也从不避人，几十年间不仅川蜀皆知，就连周边几省的山神土地们也多有耳闻。</p>
