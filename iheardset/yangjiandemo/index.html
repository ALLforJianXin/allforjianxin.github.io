战神，得王母举荐登上天界司法天神之位。<br>
冷酷绝情、骄矜自负，神通广大、变化无穷，为达目的不择手段。<br>
华山三圣母之兄。<br>
反对妹妹三圣母与刘彦昌相爱，并出手阻挠外甥沉香救母。</p> <h4 id="个人资料-1"><a href="#个人资料-1" class="header-anchor">#</a> 个人资料 1</h4> <p>身高／体重：185cm·73kg<br>
出典：神话传说、『封神演义』、『西游记』、『宝莲灯』等<br>
地域：中国<br>
属性：混沌·善　　性别：男性<br>
明明是权势熏天的大官，眉头却总是微微皱着，有些莫名的伤感。</p> <h4 id="个人资料-2"><a href="#个人资料-2" class="header-anchor">#</a> 个人资料 2</h4> <p>玉鼎真人的弟子，元始天尊的徒孙。道士。<br>
在“封神”中作为周的武将活跃，跟随师叔姜子牙为推翻殷王朝贡献了巨大力量。<br>
“封神”结束时为肉身成圣七人之一，据说以“昭惠显圣二郎真君”神位归居灌江口。</p> <p>『西游记』有记载其：<br>
心高不认天家眷，性傲归神住灌江。</p> <h4 id="个人资料-3"><a href="#个人资料-3" class="header-anchor">#</a> 个人资料 3</h4> <blockquote><p>羁绊达到Lv.3后开放</p></blockquote> <h4 id="个人资料-4"><a href="#个人资料-4" class="header-anchor">#</a> 个人资料 4</h4> <blockquote><p>羁绊达到Lv.4后开放</p></blockquote> <h4 id="个人资料-5"><a href="#个人资料-5" class="header-anchor">#</a> 个人资料 5</h4> <blockquote><p>羁绊达到Lv.5后开放</p></blockquote> <h4 id="个人资料-6"><a href="#个人资料-6" class="header-anchor">#</a> 个人资料 6</h4> <blockquote><p>羁绊达到Lv.10后开放</p></blockquote> <h2 id="语音"><a href="#语音" class="header-anchor">#</a> 语音</h2> <h2 id="召唤和强化"><a href="#召唤和强化" class="header-anchor">#</a> 召唤和强化</h2> <h4 id="召唤"><a href="#召唤" class="header-anchor">#</a> 召唤</h4> <p>我是天上的司法天神二郎神。<br>
这里是……哪里？</p> <h4 id="升级-1"><a href="#升级-1" class="header-anchor">#</a> 升级 1</h4> <p>做人，一定要做人上人！</p> <h4 id="升级-2"><a href="#升级-2" class="header-anchor">#</a> 升级 2</h4> <p>我低估你了。</p> <h4 id="升级-3"><a href="#升级-3" class="header-anchor">#</a> 升级 3</h4> <blockquote><p>根据强化进度开放</p></blockquote> <h4 id="灵基再临-1"><a href="#灵基再临-1" class="header-anchor">#</a> 灵基再临 1</h4> <p>不管是什么位子，只要你坐上那个位子，你肩上就扛上了责任。<br>
责任尽到了，你的位子才能坐牢。</p> <h4 id="灵基再临-2"><a href="#灵基再临-2" class="header-anchor">#</a> 灵基再临 2</h4> <blockquote><p>根据灵基再临进度开放</p></blockquote> <h4 id="灵基再临-3"><a href="#灵基再临-3" class="header-anchor">#</a> 灵基再临 3</h4> <blockquote><p>根据灵基再临进度开放</p></blockquote> <h4 id="灵基再临-4"><a href="#灵基再临-4" class="header-anchor">#</a> 灵基再临 4</h4> <blockquote><p>根据灵基再临进度开放</p></blockquote> <h2 id="个人空间"><a href="#个人空间" class="header-anchor">#</a> 个人空间</h2> <h4 id="羁绊-lv-1"><a href="#羁绊-lv-1" class="header-anchor">#</a> 羁绊 Lv.1</h4> <p>跟着我，能够出人头地，光宗耀祖。</p> <h4 id="羁绊-lv-2"><a href="#羁绊-lv-2" class="header-anchor">#</a> 羁绊 Lv.2</h4> <p>我最大的弱点就是心太软。</p> <h4 id="羁绊-lv-3"><a href="#羁绊-lv-3" class="header-anchor">#</a> 羁绊 Lv.3</h4> <p>你怎么又来了。</p> <h4 id="羁绊-lv-4"><a href="#羁绊-lv-4" class="header-anchor">#</a> 羁绊 Lv.4</h4> <blockquote><p>根据羁绊等级开放</p></blockquote> <h4 id="羁绊-lv-5"><a href="#羁绊-lv-5" class="header-anchor">#</a> 羁绊 Lv.5</h4> <blockquote><p>根据羁绊等级开放</p></blockquote> <h4 id="羁绊-lv-10"><a href="#羁绊-lv-10" class="header-anchor">#</a> 羁绊 Lv.10</h4> <blockquote><p>根据羁绊等级开放</p></blockquote> <h4 id="对话-1"><a href="#对话-1" class="header-anchor">#</a> 对话 1</h4> <p>身为司法天神，我不能徇私枉法。</p> <h4 id="对话-2"><a href="#对话-2" class="header-anchor">#</a> 对话 2</h4> <p>乾坤交感、阴阳相合，乃万物繁衍之根本。男欢女爱也是人之本性，即便是神仙也无法摆脱七情六欲。</p> <h4 id="对话-3"><a href="#对话-3" class="header-anchor">#</a> 对话 3</h4> <p>……好狗血的故事，怎么听起来……倒是我辜负了她？</p> <h4 id="对话-4"><a href="#对话-4" class="header-anchor">#</a> 对话 4</h4> <p>让她多睡一会儿吧。</p> <h4 id="对话-5"><a href="#对话-5" class="header-anchor">#</a> 对话 5</h4> <blockquote><p>通过在个人空间中的对话而开放</p></blockquote> <h4 id="对话-6"><a href="#对话-6" class="header-anchor">#</a> 对话 6</h4> <blockquote><p>通过在个人空间中的对话而开放</p></blockquote> <h4 id="对话-7"><a href="#对话-7" class="header-anchor">#</a> 对话 7</h4> <blockquote><p>通过在个人空间中的对话而开放</p></blockquote> <h4 id="对话-8"><a href="#对话-8" class="header-anchor">#</a> 对话 8</h4> <blockquote><p>通过在个人空间中的对话而开放</p></blockquote> <h4 id="对话-9"><a href="#对话-9" class="header-anchor">#</a>
