莫名地她就拖着快散的灵基回来这里，她想再见最后一面。</p> <p>在他们最初相遇的地方——西海海岸，像约会那样，小杨抱着小寸，已经很虚弱的两个人看着海浪，他们俩迷迷糊糊地开始聊天，开始回忆，说着自己第一次在西海边见你，杨戬在白色鲛纱下看见小寸的样子；说着在西海边看见美丽少妇怦然心动的感觉；小寸没好气地说自己当时游着呢，就这样被杨戬砸到；说着当时看见司法天神杨戬带着赦免令过来的样子……</p> <p>其实两人都在胡言乱语了，多个世界的记忆层层叠叠。</p> <p>最后，说着说着，意识快消散时杨戬说：<strong>“那时想和你去黄山游玩你掀了桌子我好生气啊，”“说好要朝游苍海暮桑梧的，做不到了。”</strong></p> <p>寸：<strong>“你说什么？”</strong><br>
杨戬摸摸她的脸，寸心也歪头贴上杨戬的手，哭了起来。</p> <blockquote><p>【晨晨：然后两个人一起没】</p></blockquote> <p><strong>【西海海岸没了两人的身影，繁星点点地……】</strong></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《我闻》设定集/90.ENDING.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <!----> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/iheardset/branch_1_2/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">分支1&amp;2</div></a> <a href="/iheardset/servants/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">境界记录带（Servants）</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
