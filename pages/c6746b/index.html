K/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">相见<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>袁洪等妖助纣王征讨西岐，几个妖精在山野间修炼得法，将周营中将士搞得焦头烂额。姜子牙正在帐中与诸将议事，疑营中有袁洪奸细，几番排查却找不出端倪，已自纳罕。正值杨戬催粮回来，听闻阵前军务，忙至中军帐内请令：“师叔，不如我变作一只蝴蝶，到袁洪帐中探听虚实。”</p> <p>子牙一听，登时大喜：“好，你且去刺探，务必小心。”</p> <p>杨戬得令，既出中军帐，使纵地金光术往商营而去，到营门处，藏身于暗处，化作一只五彩斑斓的蝴蝶，正要入内，忽而一念，暗道：“这袁洪诡计多端，情报完备，我要小心才好。”说完华光一闪，又变出一模一样的五只蝴蝶，一齐向中军帐中飞去。</p> <p>想不到刚刚到帐前，只见一个白面大汉纵出帐来，手指止一弹，一股黑色的浓雾自他指尖而出，包裹住杨戬变作的那一群蝴蝶，蝴蝶挣扎了几下，落在地上，立即晕了过去。</p> <p>那白面大汉正是袁洪，见此大笑曰：“早识破你杨戬诡计！你倒是聪明，我不知哪一个是你，但只需将之全部烧死，你杨戬可还逃脱得掉！”又命兄弟常昊：“快将之烧死！”</p> <p>常昊听命，使出神通，不一时已将那几只蝴蝶烧成飞灰。</p> <p>杨戬躲在一名卫兵的鞋上，逃过一劫。他晃悠悠飞回周营，到营门处，捂住胸口呕出一口鲜血，眼线似有迷雾缠绕，胸中一窒，晕了过去。</p> <p>待清醒时，睁开眼睛，却是一片黑暗。哪吒在一旁照顾他，用巾帕沾湿热水，擦拭他的眼睛，见他醒来，忙问道：“杨师兄，你感觉怎么样？”</p> <p>杨戬正要回话，此时姜子牙得了消息赶过来，见杨戬双目无神，靠坐在木榻上，急问：“这是怎么搞的？”</p> <p>杨戬摆了摆手，声音有些虚弱：“师叔不必担心，我只是被妖精的毒烟伤了眼睛，还好我变换出替身，这才逃过一劫。只需运功调养，总会好的。”姜子牙闻言，只得应允。</p> <p>如此过了几日，袁洪愈发嚣张，姜子牙正焦头烂额，杨戬托人扶自己进帐请命。子牙见是杨戬，连忙上前搀扶，问道：“你不好好疗伤，怎么来此？”</p> <p>杨戬道：“师叔，我这眼睛，恐怕好不了了。”</p> <p>子牙一惊，忙问他：“怎么这样说？”</p> <p>杨戬道：“这些天来我运功疗伤，眼中的毒雾却丝毫不减。弟子想往玉泉山金霞洞走一遭，面见我的师父玉鼎真人，他自然有医我之法，我也能向师父讨教克敌之策。”</p> <p>子牙应允，杨戬当日便将哮天犬收入乾坤袋中，眼睛看不见了，便化身为一只黑犬，寻味而来，径往玉泉山去。想不到袁洪帐中有精怪通识千里眼顺风耳之法门，想要效仿张奎杀土行孙，只在玉泉山下静待杨戬。杨戬且一到山门，二怪立即跃出，向杨戬攻来：“杨戬，你的死期到了！”</p> <p>亏得杨戬武功高强，玄功精深，运起浑身的力气侧身躲开，否则险些葬身在畜生刀下。他祭起三尖两刃枪，听声辨位，与二怪战在一处，直战得天昏地暗，日月无光，想不到他体内的妖毒因遇见原身宿主而猖獗蔓延起来，杨戬催不开天眼，只觉得双目一阵刺痛，分了心神，被那长蛇精一尾扫至，咚地一声砸在他腰腹上，栽在地上，呕出一口鲜血。</p> <p>杨戬痛得冷汗直流，暗道今日恐怕就要折在此处，暗自掐诀要祭刀再打，想不到兜头一股咸涩的海水自山上冲下，杨戬只觉得周身一轻，二怪哇哇乱叫，被冲得七零八落。</p> <p>洪水冲击间一道脆生生的声音格外悦耳：“兀那妖怪！敢在我家山门伤我夫君！不要走，看剑！”</p> <p>——</p> <p>一个身着金麟粉衫的少女俏生生地站在山门口，手持一柄青纹古铜宝剑，二怪被她御水之术一时冲晕，待回过神来，正看来人，纵然敌对，却皆忍不住在心头一叹：好一个如花似玉的小美人啊。</p> <p>此人正是杨戬的夫人——西海三公主敖寸心，她与杨戬分别之后，一日在家中，忽然心神不宁，待与杨婵卜卦，测算出是杨戬有难，却不敢贸然到战场误事，于是先行来玉泉山请教杨戬的师父玉鼎真人，而杨婵代兄嫂镇守灌口。</p> <p>杨戬听是寸心，心头一震，忙叫她：“寸心！你不是敌手，快走！”</p> <p>话音未落，只听见铮铮铮地三声，三公主已劈剑砍来，脆声道：“杨戬别怕，我在这里！”说完攻上前去，与二怪战在一处。她本身功法平平，但天生神龙，御水之术得天独厚，手中的那一把古剑，乃是玉鼎真人手中法宝——斩仙剑。此剑是上古法器，周身仙气缭绕，能破三界内一切妖魔，龙女纵使间，二怪近不了她的身，又被四面八方涌来的洪水冲得歪七扭八，气得怒骂：“杨戬小贼！自己敌不过！竟找你姘头帮忙，呜哇哇！小女娃子再用海水偷袭一个试试！”</p> <p>敖寸心听他出言不逊，当即五指一收，数道海水从四面八方打来将二怪的眼睛鼻子糊住，痛得他们哇哇大叫。</p> <p>龙女见状得意道：“死妖道！没一个好东西！”</p> <p>杨戬：“……”骂人可以，仔细分清了敌我。</p> <p>两个妖怪打不过敖寸心，狼狈而逃，龙女见状忙收了神通，奔过来将杨戬扶起，看他双眼以黑布覆之，嘴角一抹新鲜血痕极其刺眼，不由得心中一痛，连将方才的得意忘了，眼角霎时沁出泪光：“杨戬，你怎么样？疼吗？”</p> <p>杨戬其实很痛，但是老婆在跟前，只好推说不痛，咬咬牙就着她的搀扶站起身来，拍了拍她的手，宽慰道：“不妨事的，只因我眼中有妖毒，看不见物，也使不出神通，这才被妖怪所伤。但我有九转玄功，他们要杀我，恐怕还颇费一番功夫呢！”</p> <p>敖寸心却连忙捂住他的嘴，嗔道：“你胡说什么！你离家以来，我……我和三妹日夜挂念，就算不为了我，你也该多为三妹着想，怎么能这么不把自己的性命放在心上！”</p> <p>杨戬一怔，随即将她的手窝在掌心，温言道：“好。”他从军日久，与妻子分别时，二人还吵了一架。军中皆是莽撞汉子，何况行军辛苦，饥一顿饱一顿地，抑或受了什么伤，大多自己忍受打理着，旁人最多问候一两句，又有谁会这么将自己放在心上。可今日见了寸心，得她搭救，她柔弱的身影就这么挡在自己身前，纵然看不见，可杨戬能从她气哼哼的声音中听出她对自己的着紧，想象她护在自己跟前的飒爽英姿，能从现下软乎乎的娇嗔中感受到她对自己的挂念。杨戬心头温软，面上泛出笑意，牵着寸心的手，二人来至金霞洞寻玉鼎真人。</p> <p>玉鼎真人早有所料，寸心将斩仙剑还给了真人，到一旁与二人护法。真人将杨戬的黑布除去，以香草鲜花置放在堂前，使神水清洗了双手，向杨戬天眼一指，一道金光闪过，黑雾已经洗去，灵台恢复清明。</p> <p>玉鼎真人道：“你运功一试，可有滞涩？”</p> <p>杨戬当即使法力推过经脉，只觉得脉络畅通，黑气消散，即拜真人道：“弟子多谢师父救命之恩。”</p> <p>真人道：“你眼伤未愈，先到一旁歇息，待过七七四十九个时辰，自然痊愈。”杨戬得了师父教诲，由寸心搀扶，二人到山洞中间的蒲团上歇息。</p> <p>“感觉怎么样？”敖寸心将他扶坐在地，凑近去看他的眼睛，见只是神色混沌，没有外伤，稍稍放下心来。她轻柔的手指一点杨戬的眼，冰冰凉凉地，触之生香，宛如一块温润的暖玉。杨戬不禁意动，轻轻地摇了摇头：“没事了，别担心”</p> <p>他的眼睛现在还只能模糊地看见轮廓，寸心坐在他的身边，洞口的光打在她的发丝上，金灿灿地，杨戬胸中温软，伸手抚上了她的脸。他已经离家许久，此番重逢，还没有好好看过她呢。</p> <p>他们虽然是夫妻，可这样的亲密却是头一遭。杨戬是正人君子，未成婚不敢僭越，寸心又是闺阁娇女，更羞与亲近他，两人新婚之夜又大吵一架，如今才得相会，久别重逢，俱感两心依依，情意绵绵。</p> <p>寸心一张嫩白的小脸被他宽厚的手掌裹在其中，不禁双颊显出红晕，心中欣喜。且听杨戬低低地一笑，温言道：“我还看不清你的样子呢。”</p> <p>龙女脸愈发红了，见他如此温柔小意，也难得地柔软起来，伸出小手，却只敢扯一扯他的衣袖，说道：“你要小心，在外面，要好好地照顾自己。我……我在家里，等你回来。”</p> <p>杨戬只觉得她又香又软，又难得地如此乖顺，脑海中不禁浮现出与她大婚那日她头戴华冠身披红衫的娇美模样，一时间意动，不由得伸手将她抱在怀中，轻声道：“好……我一定会小心，早日回家，和你们团聚，你乖乖地等着我。”</p> <p>寸心依言糯糯地应了声好，习惯性在他怀中蹭了蹭撒了一小会儿娇，又回想起他方才被长蛇怪扫到腰腹，于是伸手在他腹上轻轻摸了摸，问道：“你的伤还疼不疼？要紧吗？”话未说完，脸又是一烫。杨戬身着水合服道袍，天气炎热，衣衫单薄，寸心只觉手掌下一块块的肌肉结实无比，不由得面红心跳。</p> <p>杨戬看不清事物，倒是不觉得奇怪，只是安抚她道：“不要担心，只是皮肉之伤。我有八九玄功，此时已经无碍了。”</p> <p>寸心这才放下心来，方才的燥意还未忘记，抬头一看，只见得杨戬剑眉星目，发丝整整齐齐地束上，戴一顶玉质扇云冠，唇红齿白，水合服着身更显得清秀，心头一叹，真好个仪容清俊的好郎君。又想到这是自己的丈夫，登时心生绵绵爱意，扶住他的肩膀，直起腰来，搂住他的项子，在他紧闭的天眼上印下一吻。</p> <p>杨戬的天眼是浑身上下最敏感的地方，闲杂人等如若触及，立即射出护体金光，其人非死即伤。但他和寸心相处，全无防备，只觉得眉心一痒，她柔软的唇瓣贴在他的额头上，令他心神荡漾。待她一吻毕了，又将她轻轻护在怀里，眼中依稀可以分辨那柔软的红唇，低下头轻轻地贴了一下。</p> <p>两个人的脸颊都腾地红了起来，心头只回响着一个声音：“他的唇原来这样软……”</p> <p>龙女陪杨戬在金霞洞中休养了七七四十九个时辰，待他眼睛伤好，玉鼎真人又传他入内，至瀑布边授其破敌之策。及要下山，与龙女依依不舍地分别，这才向周营赶去。</p> <p>——</p> <p>玉鼎真人：“……马上滚出贫道的洞府。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/090518.相见.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><
