重的白雾寒霜，耷拉着脑袋瑟瑟发抖。住在半山腰的几位老人见多识广，多唤此做白头霜。</p> <p>此地是柜山，乃南次二山之首，向西处有一个小国，名叫流黄国，再往西去，便是西海。柜山之上多白玉，流黄国依此玉矿而建国，国中多信奉道教，有朝拜显圣二郎真君的习俗，是以在柜山山顶上修建了一座二郎神庙，以白玉雕刻了一座二郎金身，供奉在神庙之中，世代参拜。</p> <p>日头西斜之时，山林之中暮色沉沉，微弱的光自幢幢树影之中射入林中，山涧泛出点点金色的光。一位妙龄少女背着一只小小的布包袱，在空旷无人的山林之中赶路，脚步踏在稍显古旧的青石板上，发出轻快的哒哒声。</p> <p>这一路青石板直通山顶的二郎神庙，因此庙之大为方圆五百里之最，是以每日都有信众来此上香，上山之时，虔诚者就会主动扫洒。传说二郎神君不喜凡人守庙，虽不敢有人常驻于此，道路庙宇倒也崭新干净。</p> <p>那少女向上爬了一段路，经过一条小小的溪涧时，耳闻激越的水声，忽然感到口渴，于是走下青石阶，来到小溪流畔，一探身，水中映出的倒影居然化出了一对赤色龙角。原来这女子，居然是一位龙女。</p> <p>此女名唤敖寸心，乃是西海龙王敖闰家中的小女儿。前日与母亲拌了几句嘴，又贪爱人间热闹繁华，于是收拾了细软，偷跑出来。因自幼一心崇拜昭惠显圣二郎真君，听西海边小渔村里的村民说，这里有座极灵验的二郎神庙，真君得闲之时，常常降世于此，造福一方百姓，故而莽着一股力气，怕追兵找到她，不敢架云，一路上风餐露宿，几近辗转，终于来到了此地。</p> <p>敖寸心饮了水，只觉清凉甘甜。看了看天色，见暮色四合，月自东升，日向西斜，林中也已经沉寂下来，间或发出几声不知何物的嚎叫，令人感到阴森森的。</p> <p>三公主是条实打实的神龙，龙为万兽所敬惧，虽生得粉嫩可欺，却胆子不小，望着长长的青石阶深入丛林之中，想到尽头处就是此行的目的地，自己已经憧憬了这处二郎神庙许多天，当即攘了攘包裹，蹦蹦跳跳地沿着石阶行去。</p> <p>那庙门处矗立着几根古朴陈旧的石碑，寸心拨开缠绕在上面的野藤蔓，上面刻着的字符她并不认得，只好按了按因为激动而雀跃的小心脏，穿过几道藏经置典的红漆院墙，往正庙处走去。</p> <p>愈走愈近，庙顶挂的两只惊鸟铃在夜风的吹拂下发出清脆的声响，庙中的人听了，只觉得仿佛要透进心底一般，来来往往的人群走到此处，即生出一颗虔诚的朝拜之心，即使心潮澎湃如三公主，也不免在心中升起几分敬畏神明之意。</p> <p>那庙梁上挂着长长的襜帷，护着真君老爷的金身塑像不受日晒，此时是旱季，夜里纵使无人，倒也不必关门。寸心快步走上石阶，埋首钻进厚重的布匹之中，还未抱怨句飞灰呛人，一抬头，却当场呆立在原地。</p> <p>这位二郎神君真不愧是一等一的美郎君，以此白玉雕琢而成的塑像通体净润，或许是真君神泽到此处，在暗室之中居然莹莹地散发着华光，再观其面貌，真是说也说不出的丰神俊朗，顾盼神彩，额间雕着一只立目，不见狰狞，反倒熠熠生辉，如一道精致流华的银白花钿；身量高大，体态俊硕，剑眉星目，手持一柄三尖两刃枪，威风凛凛，神威赫赫。</p> <p>三公主心中生出的几分尊敬之意登时荡然无存，樱唇张合，喃喃自语道：“真真是郎艳独绝，名不虚传。”</p> <p>那时清风吹过庙宇里忽明忽暗的烛火，微光洒在二郎神白玉铸就的脸上，恍惚间好似他是活生生的，寸心跪坐在香案前的蒲团上，定定地瞧着他，久久不能回神。夜半中天，终于熬不住浓浓困意，蜷缩在地昏昏睡去。</p> <p>柜山之上尽是翠竹，夏夜的蝈蝈在廊外吵吵闹闹地，倒也不至于安静到吓人。寸心虽然胆大，但自小娇养惯了，独自一人到此未免不是滋味，然而耳畔有小蛐蛐的叫声，身前那尊高大的神像威严肃穆，房檐上的惊鸟铃声音格外清脆悠长，身处在这庙宇正中，便令人感到安全舒适，并不觉得孤单寂寥。</p> <p>又几个时辰，夜正是深时，睡梦之中，龙女忽然发起热来，纵使躺在冰凉的蒲团上，也抵不住身体之中散发而出的浓浓热意。寸心禁不住这心火焚人，揉了揉眼睛清醒过来，只觉得难受不已，晓得又是那个病症发作了。</p> <p>龙族之内十之八九天生自带了此私疾，乃是返祖的思春之症，三公主便是其一。她自小吃着丸药压制，这等羞事只如吃饭饮水一般，每年一月，自不停歇，有龙宫之中的御医配置秘药，此病发时，吃下一粒，就不会那么难耐了。</p> <p>公主私跑出时，药带得不多，为了走更远的路，总是节省着吃，昨日已经服下一粒，今夜便只能任它烧去了。</p> <p>寸心难受得蜷缩起身体，靠在二郎神金身之前宽大的香案旁，显得瘦小可怜。小殿下是从小娇生惯养的，碰破了一点皮也要掉几滴眼泪，何况此病实在来势汹汹，往日有药可吃，也得躺在床上抱着自己软软的小被子直哭，今天晚上她孤身到此，反而坚强起来，憋得小脸通红，眼睛水汪汪的，抬头看向那座白玉神像，小声说道：“真君老爷，寸心好难受，你可以保佑寸心不那么难受吗？”</p> <p>越看那神像，竟越觉得栩栩如生，寸心只觉得他越看越觉英俊，实在是天上地下绝色无双的英雄才俊，心中不由得生出缠缠绵绵的思慕之情，忍不住摇晃着支起身子，走到二郎神高大的神像之前，踮起脚摸了摸他的脸。呵出的气息喷洒在神像的脖颈间，软语期许道：“真君老爷，您真好看，如果寸心能看到你，那该多好？我若能见你，一定马上就不烧啦。”</p> <p>——</p> <p>再说九重天上，司法天神正坐于瑶池之中饮酒。今日天宫有宴，几位高官不住地与杨戬敬酒，一来二去，不由喝得醉了，玉帝笑道：“二郎真君法力无边，可这酒量，倒弗如朕甚啊，说什么也要再来一杯。”遥遥举起金樽，就要与真君劝酒。</p> <p>杨戬支着脑袋，捏起仙侍早已斟满的酒杯，眯着眼摇摇头，笑道：“陛下，我不成啦！”话虽如此，到底仰头干了这杯玉液琼浆。</p> <p>一股辛辣劲下口，真君只觉得醉得愈发狠，扶着桌站起身来，拒绝了婢女的搀扶，一人踉踉跄跄地走到瑶池畔，想要吹一吹凉，刚刚来到栏杆旁，却忽然感到一阵异样。</p> <p>“……嗯？”真君心念一动，阖上双眸，神识顿开。不及半刻，已探得端倪之所在，扫了一眼不远处乱哄哄的酒宴，晃了晃脑袋，皱眉哼道：“哪里来的毛贼，敢冒犯你二郎爷爷的金身？”说罢轻轻打了个响指，身后一阵黑影闪过，化出一个黑袍怪客。</p> <p>“哮天犬，替我与娘娘告个假，就说我不胜酒力，先行告退了。”说罢，即一摆大麾，转身离去。</p> <p>真君出了南天门，纵向柜山而去，流光一闪，已到了玉阶前，他眯着眼打量了圣殿一眼，掸了掸衣袍，走上前去，一把掀开了遮住神像的重重襜帷，定睛一看，登时呆立原地。</p> <p>这圣殿大厅满是馨甜的香气，香案之上供奉了瓜果，高立的真君神像旁，站着一位少女，衣衫凌乱、香肩半露，一截嫩白的藕臂暴露在氤氲的空气中，竟放肆地搂住了那白玉雕就的二郎神像，软语低吟着思慕情长。</p> <p>杨戬喉珠滚动，向前一步，定定瞧着那龙女，眼神稍些迷离，只因此神庙之中的玉石塑像中，存留着他降下的一口仙气，庇佑着一方水土，百里几近，妖魔鬼怪不敢来范。这神像通了二郎真君的灵犀，如若有人胆敢染指，远在天廷的二郎神便能够察觉。</p> <p>此刻这香软少女浑身体热，脸颊烧得通红，丝毫没有察觉到他的到来，期期艾艾地依偎在那神像怀中。杨戬虽站在几步以外，却能感到温香软玉盈满了怀。再细看这龙女，真不愧是龙族美人，小小年纪，却天生尤物，粉面桃腮，应是到了思春之期，一见他神像，泛起了绵绵相思，行止不由己念。如此，倒也不能怪她亵渎神灵。</p> <p>二郎神嘴角一弯，旋身一变，消失在原处。再看那神像，竟满身金光，化作了活生生的神明。</p> <p>三公主此时已经神志不清，檀口微开，吐出几口氤氲的热气，只教二郎真君闻去，一时身酥骨麻，陶醉不已。一把将这香香软软的小美人搂在怀中，抬手捻住她小巧的下巴，轻佻地调戏道：“小龙女，哪里难受？真君老爷特意临凡，这就来帮你。”</p> <p>敖寸心只闻一阵酒香，落入一个温热宽厚的怀抱，一双柔荑不自觉搭上他坚硬的胸膛，抬起头看他一眼，一时间双颊绯红，心如擂鼓。头一回和这般英雄气概的男子如此亲近，待看他眉眼，实在丰神俊朗，贵气十足，羞得蜷缩起脚趾，迷蒙道：“真君老爷，是你来啦……”</p> <p>杨戬大马金刀地坐在须弥座上，怀中的少女身形娇小，艳丽娇憨，坐在他的腿上，低头一看，真是说也说不尽的动人，真君一时身随意动，猛地香了一口她粉嫩的小脸蛋。</p> <p>二人也该是有此一番艳事，真君饮酒辄醉，意乱情迷，而公主殿下正值思春之期，就算服下药物，遇见如此英俊的儿郎，也是把持不住，何况此时，真也药石无医。夜色正浓，月黑风高，两个欲海翻腾的人抱坐在大殿的蒲团之上，拥吻着滚到了一起。这正是：</p> <p>“蜀锦地衣丝布障。屈曲回廊，静夜闲寻访。
玉砌雕阑新月上。朱扉半掩人相望。
旋暖熏炉温斗帐。玉树琼枝，迤逦相偎傍。
酒力渐浓春思荡。鸳鸯绣被翻红浪。”</p> <p>杨戬撕开龙女的衣领，入眼只是一片胜雪的肌肤，晃得他三目一花，那两双藕臂是如何纤细绵软，正下意识护着胸前。她穿着一件赤色瑞云肚兜，只堪堪遮住了胸前的风情，两根纤细的带子穿过吹弹可破的雪肤系在背后，让人觉得只是一扯便必定要掉下。</p> <p>她看似年纪不大，却已经生得齐整标志，胸前两团软肉翘挺挺地立着，杨戬吞了一口唾液，暗暗思忖这似乎一手也是把不住的。因是情期，两点红荔硬得顶起了柔软轻薄的布料，真君一时眼热，一把扯开了她胸前的小衣，寸心惊呼一声，双乳乱跳，早被杨戬压在身下，粗鲁地吃吮起那白软的奶子来。</p> <p>“啊……真……君……”三公主年方二八，哪里受过如此的亲昵，何况杨戬身上盛年男子的威仪贵气于这寥寥几刻间散露无遗，更令她折醉心间，一时间面颊通红，又觉得舒爽异常，仰直了雪颈，小手插入杨戬的发间，竟是将他往胸前按了一按。</p> <p>杨戬见状，更是兽性大发，一双大手抚摸着这具娇软雪白的身躯，触之只觉饱满弹滑，如玉生香，一把扯开腰间玉带，露出结实鼓胀的肌肉，将这小美人抱在怀中，又亲又摸，好不快活。</p> <p>寸心已是眼神迷离，神思恍惚，本能地抱住了他坚实的臂膀，将一身裸露在外的皮肉贴上郎君小麦色的肌肤，轻叹道：“真君，我真……真爱你……”</p> <p>“哦？”杨戬深邃的眼底满是欲望翻涌，微闪过一丝怜惜，柔声道：“爱我？我——有什么好爱的？”</p> <p>“嗯……”寸心羞得说不出话来，被杨戬擒住樱唇，吮吸那甘甜的津液。他尚且还有几缕衣物在身，怀中白嫩娇小的姑娘却是一丝不挂的裸身欲女，不多时，只觉腿上一温，竟是她身下的水已经淌湿了杨戬的裤子。</p> <p>“呵，”杨戬吞了屯口水，眼神仿佛在看一只待宰的小羊羔，戏谑道，“小龙女，叫什么名字？水儿真多，真君老爷可要替你解痒了。”话音未落，大手贴住她的小腰，将她一把搂到近处，胯下那涨大坚硬的棒子正正好抵在她的臀间，向上顶了一顶。</p> <p>“叫……嗯……”三公主惊呼一声，低头俯视着胸前的杨戬，只见他细看间真是愈发地丰神俊朗，眉目如画，不由得心中爱慕大盛，又羞又怕，支支吾吾地回道：“我，我叫寸心。”</p> <p>“寸心？”真君的心思已被眼前一双又大又软的玉乳勾去，埋首嚅住一只又舔又吸，含糊道：“真好名字，跟了本君，定叫你欲仙欲死。”一手已经探到她腿心，粗鲁地一揩，便是一手琼浆，激得龙女一声娇呼，抖了一抖。</p> <p>只说：</p> <p>“粉香汗湿瑶琴轸，春逗酥融绵雨膏。
浴罢檀郎扪弄处，灵华凉沁紫葡萄。”</p> <p>雌龙的甬道格外逼仄狭小，因着情期汁水丰沛，真君此物甚是勇猛，抵在花穴之上，一个挺腰，便跻身而入，那劲道狠狠地冲击着穴肉，教寸心双目一花，险些招架不住，娇啼一声，软倒在真君肩头。</p> <p>他却插着不动，硬要等着这娇滴滴的小娘子来求他，闭着眼埋入她胸前的波涛汹涌之中，直喘粗气，环过她细嫩的手臂，抵在深处慢慢地研磨了一会儿，细细品味，只觉得这软烂穴肉夹得他热汗涔涔，舒爽不已。</p> <p>寸心坐在他身上，穴中含着他粗大的阳具，浑身皮肉被他亵玩殆尽，只觉得情期肆虐身上的热毒被尽数散去，占有着她的男子，浑身都是腱子肉，散发着强势的雄性气息，任何人见他一眼，都会无可救药地爱上他，他身上独属于盛年男子上位者的气质，以及多年浸淫官场的贵气，惹得她不由自主地迷恋他。</p> <p>龙女忍不住收缩着穴肉去吮吸他，可爱纤细的小指头期期艾艾地轻挠他肩膀上鼓起来的肌肉，嗓音娇软惹怜：“真君，嗯……好粗，我吃不下了……”</p> <p>杨戬闻言抬起头，映入眼帘的是她娇美幼嫩的面孔，说出的话却如此风流不羁，相较之下，更是令人食指大动，一时笑道：“吃不下？可吃得欢畅？”话音未落，捏住她纤细的小腰，一下下向上顶去。</p> <p>寸心被他顶得神魂飘荡，呻吟破碎，舒服得浑身颤抖起来，抱着杨戬的脖颈啊了一声，哼哼唧唧地叫唤起来，被撞得直往上窜，不由愈发抱紧了杨戬。</p> <p>杨戬本于女色上一向淡淡的，谁成想今日饮醉了酒，一时脑热沾了她的身子，顺理成章做到如此地步，只如中蛊一般，毫无节制可言，此时得了她的青睐，更是性欲勃发，身下那棒子粗硬得如热铁一般，要将交合之处也融化了，禁不住麻痒难耐，二人搂抱着操弄顶撞起来。一时间，四野无人的二郎神庙之中，红烛葳蕤腾雾上，泥人无语不抬头。</p> <p>这厢粗喘声与哭吟声交织在一处，二人靡战正酣，龙女忽然绷紧了脊背，死命地绞弄身子里滚烫的肉棒，一股馥郁蜜露喷薄而出，浇得真君粗棍狰狞，青筋暴起，一转身将她按在蒲团之上，一手一只滚圆肥乳，死命地向那幽幽蜜穴插操了几百下，将她身子都干得向后滑去，险些撞在洒满了香灰的案几上。</p> <p>寸心腰间还挂着杨戬身上脱下的一角里衣，身后铺着他嫣红的内衬，更显得肌肤胜雪，纤腰细细，奶子饱满圆滚，随着磨人的顶弄上下翻飞，波涛汹涌。</p> <p>杨戬瞧得愈发眼热，附身埋入她的乳肉之中，含住那嫣红一点重重地舔吸，只觉得鼻尖满是她身上香甜的味道，口中居然有了点点奶味，真好个妙曼女郎。</p> <p>一时杨戬又压着她干了半日，寸心只是挨不住，却又迷恋这销魂快感不已，一面抽咽着泻身讨饶，一面惹起天神怜惜之意后又软了身子挨蹭撩拨他，只将真君勾得魂不守舍，愈发往死里操她。</p> <p>也不知过了多久，天边擦出几丝亮光，屋外野鸡报晓，屋子里战况焦灼的神明才加快了跶伐，气喘如牛，面色潮红，难耐地仰起头，长啸一声。可怜数滴菩提水，倾入红莲两瓣中。</p> <p>那厢龙女被射得满满当当，杨戬拿衣服将瘫软在地的小美人粗鲁地一裹，一把抱住，闪身出了庙宇。寸心趴在他肩头，迷迷糊糊地向庙中看去，只见须弥座上已重新变出了一座白玉筑成的神明，庄严肃穆，不怒自威，只待来人参拜。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/030312.狎龙.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 6
