“瞧你这个样子，”瑶池之主笑吟吟地挑了挑精致的眉毛，“我当然——还不够满意。<br>
“要你明天真正接了印，陛下发了话，这才算尘埃落定。况且，”王母走下几步，踱到杨戬面前，“你当真会为我——为天廷，尽心尽力履行职责么？<br>
杨戬抬眼，凌厉的目光毫不畏惧对上瑶池的主人：“只要娘娘不再盯着西海，杨戬自然说到做到。”<br>
王母并不介意他的忤视，她微笑道：“你不是已经找了观音菩萨去救你那小舅子？看西天面子，便是陛下也不会多说什么。”<br>
“杨戬，”她温和地说，“我天廷与四海一向关系稳定，无事自然不会去为难哪片海域。我不是让寸心回去继续做她的西海公主么？也是为你解除后顾之忧。”<br>
她拍了拍杨戬的肩膀：“只要好好为天廷做事，相信不会再有什么不愉快。明白吗？”<br>
王母越过杨戬，不过几息便消失在云端，留杨戬一人，阴暗的瑶池中，无声无息伫立良久。</p> <p>下界回府也不过九月末。<br>
杨戬推开大门，迎接他的只有哮天犬——这与前几年倒也无甚相异。但他心里清楚，向内走去，再不会有人摔摔砸砸，不会有人斥他怨他。<br>
梅山兄弟多番探视，或寻他打猎，或拉他饮酒，杨戬心中感激却也不愿强颜欢笑，拒了数次，梅山渐渐也就不来，只待次年杨戬接印后再招呼。<br>
杨婵亦忧心兄长，时常请杨戬去华山小住。只是杨戬多沉溺在自己思绪中，总听不进言语，或走神不语，或接不上话，杨婵也是无法。有一日试探着说到东海四公主或能打听消息，杨戬却又拦她不许探问，只说不必，追问急了一时恍惚脱口而出：“寸心回西海必然极好，若非如此我何苦拦她那些年！”直教杨婵惊得半晌说不出话来。<br>
这等心思说给亲妹，杨戬也自觉羞赧，转头回了灌江口，个把月都没开过大门。<br>
独居的日子也不算太难熬，左不过是念念过去想想未来，思量一下天规应如何执掌，考虑几分接印后怎样生活。<br>
有时忆起当年，擒了孙猴子上天，他仍满腔仇恨，玉帝却对他的视线有几分回避，大概有点亲情遇事更好转圜；王母只要个听话的帮手，能帮她握稳权力，没甚亲情只谈利害也能方便解决事端。<br>
杨戬自问不是什么光风霁月胸襟开阔之人，也还是让这番算计呕得几日不动饮食。刻骨仇恨永不能忘，可事已至此，只能向前再向前。一千七百年前师父的教训犹在耳边，走正途，行大道，方可解脱。他倒要看看那天规究竟何物，要如何的爱如何样的心才能改它一改。</p> <p>如此熬着日子竟也到了年底，在凡间的最后一个年无论如何总得好好过了。华山梅山昆仑山，杨戬一一上门，吃吃喝喝稀里糊涂又是一月。转眼将进二月，忽一日，杨戬辞别梅山兄弟，嘱咐哮天犬守着家门，独自纵起金光向西而去。</p> <p>龙宫修成不知远古何年，但从天地分了四海，就有划海而治的神龙。如今龙宫与一千七百年前相比也无甚变化，杨戬只来过一次却也记得路径。只是这回不像当年气势汹汹大张旗鼓，他不愿惊动旁人，静悄悄化作一尾普通海鱼，又隐了身形收敛气息，贴着宫墙缓缓游到公主殿中。<br>
殿中并无公主。<br>
杨戬这才想起，草头神曾有消息，说公主预定了年后搬到封地，想来这时已经换了地方。</p> <p>敖寸心方才送走忧心不止的龙后，立即落下笑到僵硬的脸，挥手把侍女通通遣出去。虽则想起杨戬就咬牙切齿，但她既回了家也自然会好好过日子，偏生这话说出去根本无人相信。她有时哭上一哭，但哭完了也要吃饭；有时不思饮食，但过后自然重新找补；遇到高兴的也笑，碰上好玩的也瞧；哪里就需要小心翼翼似捧琉璃，生怕她听到“川”字就冒火，见到“蜀”字就发疯，再听到“杨”字还要落泪不止郁结在心。<br>
真是受不了！<br>
三公主照着镜子揉过脸，脾气上来，忽地掀了桌子。茶壶落地滚出老远，咕噜咕噜一直跑到墙角，一顿，撞出一尾鱼来。<br>
公主没留意她造成的狼藉，也不去管倒地的桌子，扯下外套随手甩开，转身绕过画着龙角珊瑚的屏风，转进内室，摔进浴池沉入池底，让热汤裹上全身，才舒服地叹出一口气。<br>
躺在池底，睡意慢慢上浮，她正犹豫睡这儿还是睡床，忽然一道微不可查的波动闪过——若是别人或当是错觉就忽视过去，可这感觉对她而言真是再熟悉不过。她弹起来几步冲出去，果然这正扶起桌子捡起茶壶的，不是杨戬还能是谁？<br>
“杨戬你有毛病？”敖寸心也不管满身滴答沾湿地毯，快步上前，“设禁制都设到我殿里来？”<br>
才几个月，龙女说话已变了口音，更多了些西海味道——从前初遇，她也是这样讲话的。<br>
“不是，我，我不是那个意思……”分别数月骤然一见，杨戬有些挪不开眼，舌头和牙齿磕磕绊绊，也不太清楚自己在说什么，“我只是……免得有人突然进来。”<br>
“不得我准许，自然无人敢进，”敖寸心双手抱胸睨过去，“撤了。”<br>
“好，好，”杨戬抬手施法，“你、寸心，小心着凉……”<br>
她穿着內衫泡汤池，此时两层薄料吸饱了水，贴紧躯体勾勒身形，看得出来比离家时丰腴，湿漉漉的发缕顺着脸颊垂至胸口，满脸都是热气蒸出来的红晕。杨戬一时呆住，龙女如此松弛随性的模样，他多少年没有看到了？明明才几个月不见，回了西海她果然会过得更好吗？<br>
他胸口闷堵，一口气憋着吐不出来。他明明盼她好，此刻却发现自己见不得她当真过得太好。转念又想，她在他面前并不设防，自然得就像两人还是夫妻的时候……是不是在她心底深处，依旧把杨戬当做最亲密的人？<br>
见杨戬呆在原地，敖寸心冷哼一声，转到屏风后，须臾换了件睡袍出来，手中用布巾绞着头发，伸脚勾出桌下的凳子，坐下问道：“你来做什么？”<br>
杨戬站着不动，“要二月了，我该来的。”<br>
“要你好心。”她又哼了一声，抬眼上下打量她的前夫。瞧着有些憔悴，面色不佳。不奇怪，他这几年脸色就没好过。<br>
到达龙宫之前，杨戬曾设想数种场景。如果寸心怒气未消赶他出去，他就死赖着不走；若是寸心伤心未止，他就想尽办法哄她开心；要是她漠然地无视他，那他……还是死赖着不走，哪怕耍尽百宝说尽好话也要让她重新开颜。可这种种，眼下无一能够应对，寸心倒仿佛日日相见不曾分离一般，如此自然与他应对。<br>
这才可怕。她已经不在意他了么？那些赔不是的打算、哄劝人的计划，全都不做数了，又该如何？<br>
杨戬心中纷乱，机械般走到龙女身后，像过去无数次那样，给巾帕加上持温法决，给她细细擦干头发，又用手指将发缕通顺。<br>
敖寸心本能要往身后倚靠，又捏着桌角忍下。她也不明白，为什么仅仅不到半年，那些惨淡苍白的记忆都纷纷消退，她在西海，每每想到杨戬，心里汩汩冒出的，都是一千七百年里的甜蜜与浓情。直到此时此刻，杨戬当真出现在眼前，却仿佛骤然打开了什么机关，放出无数妖魔，呼啸着驱散甜美的回忆，又将无数酸苦、委屈与心碎捅向她的胸膛。<br>
她克制着呼吸的频率，不想让他觉察异样。他怎么还在那里擦头发，他怎么能像什么都没发生过一样？难道不是他接了旨，难道不是他终于放弃了他们两人的婚姻？<br>
说已经答应王母去做官的，是他杨戬；扣住她不许离开的，也是他杨戬；最终转身接旨连看她一眼都不肯的，还是他杨戬！<br>
她不知道，如果不是她打破僵死的局面，圣旨和懿旨是否还会如期而至；也不知道，如果不是她决然行动，杨戬到什么时候才能真正放手。但她很清楚，她永远不想离开他；她真真切切恨过，可她从来没有不爱。她只是……太想回家。<br>
是杨戬一直举棋不定，始终犹豫不决。杨戬接旨的时候究竟在想什么？不管他有什么打算，现在他们都已经不再是夫妻，再不是了！<br>
一千七百年何其漫长。与杨戬在一起的生活，占据了她生命中几乎所有的时光，而这一切，已经彻底终结。<br>
泪团在敖寸心的眼眶中堆积起来。她蹭地站起，扯下巾帕大力甩在地上，“你到底来做什么！”大颗泪珠顺着脸颊滚落，“你走，我不要你管，”她在他胸口推搡，反让他抓住手腕，“松手啊你！你回灌江口去，你上天去，谁准你来——”<br>
杨戬收紧臂膀，把龙女紧紧捂在胸口，畅快地吐出一腔浊气。这样才对，敖寸心这样才对。她怎么可能舍得下他，怎么可能不怨他，怎么可能见到他还平静以待？<br>
他小心翼翼给她抹掉眼泪，见她不曾挣扎，又试探着亲在她的眼角。龙女撑着他的胸膛轻轻推拒，抽噎着扭头避开，他又追上去，将新凝出的泪珠吮入口中。<br>
“那是有条龙，剜了我的心就走。”杨戬贴着她的唇瓣说，“实在疼痛难忍，”他落下轻吻，“再不来我就要死了。”<br>
敖寸心的眼泪又一汪汪地冒出来：“说得好听，”她仰头躲开他的亲吻，狠命捶打，“那你怎么才来，怎么才来！”<br>
见不着杨戬的时候，她一直认为他上天前定要谨言慎行，她从不指望他能来；可杨戬当真出现了，她的难过和委屈不知忽然从何处翻出，瞬间胀满心怀。她呜呜哭着又挣又打，都让杨戬圈在怀中尽数受了，不知发泄多久，才松松圈着他的颈子，靠在依旧宽阔的胸膛前，一边抽噎一边拧他衣襟，听他嘴里酿蜜说下无数情话，再哼上一声表示不爱听。<br>
龙女越是哭泣责打，杨戬便越是熨帖。他心中生出花开似的喜悦，用力把她箍在臂弯中，给她擦去眼泪，理好鬓角挣乱的发丝，拉着她坐好，倒水给她润喉。</p> <p>“那你到底来干嘛啦。”敖寸心第三次发问。<br>
杨戬亦认真答复：“这不是到日子了？我担心你。”<br>
寸心湿漉漉的眼眸还泛着水雾，灵动的眼风扫过来潋滟生辉：“什么都要管，瞎操心。”<br>
睡袍襟口松散，可龙女似乎并没想到这个问题，在杨戬面前并不必特意衣着齐整。杨戬自认不是客，也不是旁人，二人如此相处一千七百年，是习惯成自然，也是天经地义，仿佛他们并未分开。<br>
“本就是该我做的事。”就是在分房后也是如此。即使是在争吵最激烈的最后十几年，每年春季二月初，他们也总要在一处的。<br>
“你倒是好心，”她以为自己要独自熬过春季这段时光，她以为杨戬会准备上天接印，以为杨戬不会特地跑来西海，偷偷溜进一千七百年前持刀闯入的地方。可杨戬说这是他该做的，她也觉得理所当然——嘴上却不饶，“如今我们可已经解除婚姻了，懿旨说得明明白白呢。”<br>
“这有什么，”眼见龙女态度和缓，杨戬便生出些理直气壮，他拿出上个月预备好的说辞，“没成亲时不是二月也没少——”龙女一个眼神飞过去，这人也毫无愧色，只临时改口，“现下不过你回西海我去天廷，不妨碍。”<br>
寸心张了张口，才提醒道：“神仙不许思凡的。”还未正式接印，她实在怕他出意外。他们已经付出那么大的代价……<br>
杨戬却又狡辩：“我又不是第一天做神仙。况且，你也不是凡人，”见龙女要开口他忙截住，“我现在也不算成了亲。”<br>
寸心听得直翻白眼：“这话你也想得出来。”<br>
杨戬拉过龙女的手揉在掌心，她看着比去岁仲秋更精神些，脸颊长了点肉，气色也好。可春季这事儿，没了他，寸心该怎么过，该有多难熬？<br>
寸心自然想他得很。东海四姐的到来是意外，也给了她破局的机会。她走得仓促，不曾与杨戬商议今后的打算。她曾想过，若是杨戬顺利接印，他们必然会有许久不能互通消息，何况天地时差颇大，她早已做好数年不能见面的准备。可他偏偏在这个时候来了……<br>
每年都要有这么一遭，难道让他以后在天上每日都下界一趟不成？她总得让他知道，就算独自一人，她也有办法熬过去，不能让他初涉官场时还要为她操心。<br>
手还让他捏着。寸心努力把手抽回，“你回去吧，我真的没事儿。”<br>
“净胡说。”杨戬声音很温柔，“从前难受得直哭的也是你。”<br>
有一两次他出门办事，赶着日子回家，一进卧室就闻到满屋浓郁馨香，见龙女角尾皆露，在榻上蜷成一团，正搂着被子呜呜掉泪。见他回家，龙女总会急切地缠上来，用尾巴轻轻抽他，一边哭一边胡乱剥他衣裳，整个身子都贴上来，迫切地渴求他。<br>
一千七百年来，龙女春季情期从未落空，都是杨戬殷勤服侍，回回将她喂得饱胀。在分房而居之后，他又无比庆幸她这返祖的病症，若非如此，他恐怕再无机会踏入卧房。这一件事总能证明，她还是把他当作夫婿，当作最最亲密的人。<br>
以至于最后十几年，他总怀着卑劣的渴望，期待二月的到来。<br>
往日回忆如潮涌来。寸心深深吸了一口气，掐着手心说道：“我们已经不是夫妻，我现在也不是非你不可的。”<br>
杨戬蹭地站起来，跨出一个大步抓起她的手：“好好说话，掐自己做什么？”真是胡言乱语！不要他，还能要谁？！<br>
寸心还欲强撑，可胸口突然又是酸涩一片，泪珠子在眼里打起转，大声道：“我就是用不着你，不要你好心！”<br>
一千七百年来，自杨戬从西岐打仗回家，他们第一次分离这么久。算起来还不到半年，可这半年怎么过得那么慢！从前就是争吵再激烈，他们好歹的也是同处一间屋檐之下；就算不说话，每天也总能见上几回。寸心一直以为自己足够坚强，可以在西海亲人的关爱中将杨戬藏在心房角落；然而真见到杨戬，她努力许久树立的心墙已然崩塌，再不能假装万事无恙。<br>
又一次，龙女的眼泪让杨戬打从心底生出愉悦欢畅。她就是离不了他，他知道的。<br>
“犟脾气，”杨戬把龙女按在怀里，不让她看到自己忍不住翘起的唇角，“尽说傻话。”寸心把一团泪珠都埋进杨戬胸口，捶打道：“你不许笑，你松手！”<br>
夫妻多年，彼此了解极为透彻。杨戬知晓龙女又爱撒娇又爱逞强的脾性，寸心又如何不知杨戬做人丈夫的骄傲与自得？不用看，他肯定在偷笑！<br>
杨戬胸腔震动，努力把笑意憋在喉咙深处。他拍着龙女：“好啦，不笑，我不笑。”<br>
寸心用力推他：“那你走呀，我都说了用不着你。”<br>
不要他，还能生熬着不成？<br>
杨戬一边懊悔来得太晚，一边搂着龙女哄劝：“自己熬着多难受，还得我来不是？”<br>
“那我问你话，你为什么不回答？”寸心死死攥着眼前的衣裳，想起她离开灌江口时的情形。时过境迁，她如今想来只余气恼，噘起嘴抬起手就要打人。<br>
杨戬眼明手快放下臂膀挺直身板以供前妻拍打，电光火石间已明白她说的是什么情况。“好姑奶奶，叫我怎么答？”他苦笑道，“我若敢说一句‘爱过’，你怕是能把我活吞了。”他端起龙女下巴，见她不曾反抗，便低头吧唧一口亲上去，又道，“是我来晚了，都是我不对。”<br>
倒也是。她当时情绪激荡，本就是刻意为难于他，也亏得他反应得过来。寸心消了气，“算你聪明。”她从杨戬怀中挣出来，“那你今天留下来，明天再走。”<br>
“……”杨戬无奈叹气，“明天才是二月二，做什么非要我走？你不知道你发作起来多难受？”<br>
怎么会不知道。“可眼下形势不明，你总不能天天下来……”寸心瘪着嘴，“我回家来自然有药吃。”只是她也不知那药用下去究竟效果如何。<br>
杨戬内心暗松一口气，原来是用药，而非他担心的其他打算。口中笃定道：“哪有丑时叫人做工的，不会有事。”<br>
此时此刻的敖寸心已经打定主意明天必要试试那药，眼下杨戬又赖着不走……她真的很想他，想他的一切。她深吸一口气，拉开腰上摩挲不停的手，站起身来牵着他的袖子：“我要睡了，你来不来？”<br>
上次欢好便是去年二月，距今已有一年时光。这一年里，除非杨戬带来敖烈消息，否则她是绝不肯让他进门一步的。如今他们已经不是夫妻，可她却觉得，离开杨府之后，时光仿佛又重新开始流动。他会上天做官，她会在家中等待三哥修成正果重新化龙，横亘在他们之间的天条依旧存在，他们二人之间却像融去坚冰，又开始了一段新的漫长征程。未来不可知，但眼下，他们仍可相依而眠。<br>
龙女如此一问全在意料之外。杨戬脑子尚未反应过来，身子已经主动站起跟着公主向内室行去。待到他被人一掌推入池中，才发现自己正咧着嘴巴傻笑。</p> <p>撩开重重珠帘，穿过层层纱幔，杨戬循着缭绕香氛踏入三公主的闺房。厚实的地毯吸去所有脚步声响，但端坐帐下的公主已经知晓他的到来。公主抬头嫣然一笑，杏眸皎皎顾盼生辉，陈设室内的明珠饰物水晶灯盏都随之黯然失色。杨戬眼中再无其他只余龙女，她实在娇艳欲滴，生生摄去他所有魂魄。<br>
寸心眼看着杨戬向他走来，突然“噗嗤”一声捶床大笑，“你怎么这么着急？”她指着杨戬笑个不停，这人随便裹着浴袍，走着走着便多出一顶帐篷来，还越走越高，摇摇晃晃，帐内之物简直快要顶开对襟破衣而出。<br>
杨戬并无丝毫羞赧，他一边按着公主往下倒一边振振有词：“过去几年少尽了丈夫的义务，难得公主允许，我总得补回来，免得公主吃亏。”手上一刻不停，剥出玉肌水骨，两人赤条条搂在一处肆意揉捏吮吻，三公主的玉体很快落满吻痕，二郎神的身躯也遍布齿印，却没有一个人着急进入正题。<br>
在龙女腿间按出一汪浓香春水抹上她丰盈饱满的胸乳，又被她按着脑袋送入口中，杨戬把脸埋在波涛中含吃不停，任龙女抬一条腿跨上腰侧，晃动腰肢在他腹上又碾又蹭。<br>
杨戬身上还带着新出浴的水汽。寸心埋首在他发顶贪婪嗅闻，这是属于他也属于她的独特体息，是他饱含情欲的味道。下次相见，也许是一年后，也许还要两年三年，谁能说得准？且享尽今日之欢，在这深海深宫中，就连天地也一无所知。<br>
在杨戬又一次摸入肉道深处弹指按压时，寸心小腹抽了半晌，才喘着气着问他：“我们，这算什么？”<br>
正埋首她腰间亲吻的男人头也不抬，含着皮肉语声模糊：“夫妻。”<br>
“谁家夫妻隔……那么远？整年也难一见，”她扭腰夹腿在他手上用力，不时爽得一阵哆嗦，断续道，“你自不认懿旨，可在旁人眼里我们……终究……。”<br>
杨戬这才抬头，却始终垂着眼。他扶着阳具在春水泛滥的穴口上下磨蹭，“三公主想听什么？闺中的宠臣？入幕的侍卫？”他把茎首挤进些许又退出，“公主想要面首也行。”<br>
“没个正形，”龙女嫩生生的脚丫蹬在他肩上，脚心轻轻碾在肩头，“你想得倒齐全，平日里都琢磨什么呢。”<br>
杨戬扭头在公主的脚背上啃出牙印，又狠狠咬了后槽牙，才挤出笑意看向龙女：“问了又不许人答，公主也忒不讲理。”<br>
瞧他，眼底都是红的。敖寸心忍着鼻酸，先笑他傻，再把另一只脚也踩上去，“身份有什么要紧？”粉润的脚趾点在杨戬心口：“我只知道，你是杨戬，这就够了。”<br>
脚尖之下的胸膛颤栗起来。她的脚腕被人拿在手里，又落上唇舌，亲吻沿着小腿一路落到膝盖上，才听他低低应了一声：“好。”<br>
久别之后的重逢，还是多些喜悦和欢愉才好。寸心知道杨戬一向爱把难言的情绪藏在心底，便抬腰催他：“既然好，就快点进来，别磨我了。”<br>
杨戬亦配合，他翘起唇角微笑道：“这就忍不住了？”他把着肉茎前送，待穴口吞没龟首，又慢慢拉出来，顶在唇瓣间就着一片湿滑黏腻轻摇片刻，磨蹭着入了些许，然后再次撤出。<br>
每每刚有一息快意又被空虚吞噬，如此反复，花唇又胀又酸，穴口抽搐着拼命啜吸，想把那根磨人的肉棒吞吃入腹，又屡屡不能如意，淫水更是哗哗流淌，臀下湿了一片。寸心急得直蹬腿，连连高声催促，这坏人却始终不紧不慢，按着龙女小腹不许她扭，还在她身上细细密密地摩挲，意图给龙女的欲火添柴浇油，让它烧得更旺些。<br>
寸心已经抓着自己乳房狠狠揉了几遍，想伸手下去又被他捉着不能触摸，抬腰抬不起，骂人不顶用，想要踢他都被他臂膀夹紧双腿动弹不得。小腹空空，痒意蹿至心口，崩一声烧坏了脑中最后一丝理智，她已经顾不上去想杨戬到底图什么，爬起来扑上去把人按倒在身下，捉住那根诱龙至极的粗硬，跪坐上去一入到底。<br>
这才爽快。她发出愉悦的长吟，仰头闭目前后滑动磨蹭，肉道紧缩感受充分饱胀的快意，待欲望稍解，才睁眼瞪那半晌没出声的混蛋：“还想做面首？本公主都快让你给气死了。”却见他笑吟吟盯着她，不紧不慢道：“这就忍不住了，公主明日不要杨戬，怕不是要气哭。”<br>
好哇，原来是在这儿等着她呢。可不等她张口反驳，忽一阵天旋地转她又被掀翻在下，强劲有力的臂膀端起她的腰臀，坚实宽厚的身躯重重压下，壮硕硬热的阳具狂热地捣弄起来。<br>
杨戬早就快要忍到极限，背上滑汗淋淋，额头青筋暴突，在他朝思暮想一整年的湿热销魂地里一阵狂插猛捣。龙女这番畅快的呻吟他也许久未闻了，一时间周身血液沸腾，一边挺腰深入一边在她胸口颈侧啃噬不休，等她高声尖啼浑身颤抖，才停下来享受紧窒到极点的绞索。接着翻身侧躺，抬她一条腿搭在腰上，把龙女死死捂在胸口，又狂风骤雨般挺起硬杵攻城略地，到她不断收缩再收缩，全身剧烈震颤，便含住龙女唇口，舌尖冲破齿关，在她口中四处扫荡，把她所有低喘高吟俱都吞下。<br>
良夜漫漫，春宵苦短。久疏情事的三公主和二郎神，在深海的宫殿中翻腾交缠，直到床榻湿尽，公主力竭，才堪堪休战。公主沉沉睡去，二郎真君收拾了残局，躺在公主身边把她看了又看。</p> <p>“就说我出去散心了，”敖寸心叮嘱贴身侍女，“我不在的时候寝殿不许人进。”年年定时发作，这事早晚瞒不住身边人。且明年再说吧，万一明年杨戬来不了呢？<br>
公主寝殿不如封地正殿那般规整肃穆，内里装饰富丽繁华，锦绣绫罗之上堆金积玉，淡雅绢纱中间陈宝滚珠，但更奇特的是一间空旷开阔的敞亮大屋，杨戬立在屋内庞大的沙窝前忍不住笑：“不愧是三公主，嗯？”<br>
细沙中还留着许多珍玩，仔细看去都没有棱角，像是叫水流与细沙冲刷打磨千年万年，样样无比圆润光滑，有各色水晶亦有种种宝石珠玉，还有少量已经看不出原貌的金银器物，在沙中深深浅浅零散分布。<br>
“我小时候喜欢玩这个，”寸心说，“窝在里面随便打滚，用鼻孔吹气，吹出什么宝贝，就盘着什么宝贝睡。”她蹲下去随意拨开沙子，捡出几块蛋似的水晶拿在手里抛着玩，“我也想不到他们还给我修了这么一间屋子。要是让其他海域的姐妹知道，定要笑话我的。”<br>
杨戬从她手中拿来水晶蛋，看了几眼又扔回去，搂着公主肩膀问她：“那你到底玩了没有？”<br>
三公主小脸微红：“玩了。”<br>
她离家太早。<br>
这是他的幸运——杨戬为自己的私心庆幸了一会儿，捏着下巴想了想，认真道：“那我应该现在就把自己埋进去，公主记得等会儿刨我出来，晚上好盘着睡。”<br>
俩人笑闹半晌，公主领着人走过供原身龙形盘踞安睡的大厅，又一一看了茶室书房等处，一路闲聊，从三公主幼时的生活说到蜀地西海不同的饮食，最终话题还是不可避免落在西海一家龙的身上。<br>
“其实我家里都知道关键不在你，”公主如此说，“在三哥出事前，他们只在意你对我好不好。”<br>
杨戬忽然有些不自信：“那公主如何回答呢？”<br>
“我说总是欺负你，他们还不信。”寸心笑嘻嘻地捏了捏他的胳膊。<br>
接着腰上一紧，忽然对上他的视线，听杨戬低声问：“三太子出事之后，又如何？”<br>
两人鼻尖相抵，呼吸相闻，气息纠缠，她有片刻失神，稍作停顿才回道：“从前我只与你在一处，自然只有拿你撒气……”<br>
她回避了问题，但杨戬自然明白，西海总是怨他的。“是该拿我出气，公主做得都对。”他搂着人往卧房走，“以后再不会有这种事。”只要王母娘娘守诺，他给她做明面上的走狗又如何？这只是应付的代价罢了。<br>
寸心拉着杨戬窝在雕花大窗下的软塌上，看了一会儿窗外一人多高的珊瑚林，才拉上纱帘，靠在他的胸口，细细说起上月的事。<br>
“我父王一听说是犀牛，就知道是辟寒、辟暑、辟尘，他早就把三哥他们的路线打听得清清楚楚呢。父王让大哥带兵去应对，倒是轻松捉了犀牛。就是那井宿也太不讲究，按着就开始吃活的。”<br>
此事杨戬已听草头神报过，但详情不甚明了，一时听进去了。<br>
“孙悟空还说，若是早知道那三个妖怪要往西海逃，他定会拉我三哥同来。可惜金蝉子那里有伽蓝揭谛等暗中守护，不便回去唤他。”她说起此事心情颇好，“既已到青龙山，离灵山还能有多远？这么多年都过了，再多一年半载我还等得。”<br>
杨戬插不上话，揉着公主头发安抚她。<br>
公主忽然笑了一声，“都是玉鼎真人教出来的，孙悟空可比你细心。”她戳戳杨戬，“他才说可惜没带上三哥，就自作主张把犀牛锯角剥皮，身子留给我们吃，倒像在赔礼似的。”<br>
杨戬……愣了半晌，实在哑口无言。他小时候做个普通凡人，生活习惯已经定型，就是成了神，住在凡人地界，也从没想过吃什么凡人入不了口的东西。对犀牛精这般修行得道已有人形的妖怪，他只想得到“杀”，哪里能想到还可以“吃”？他将此事暗暗记下，对将来要送往西海的礼物要做几番不同打算才好。<br>
此时将将过午，龙女身子开始微微发热。杨戬探了探她的额头，招来茶盏送到公主嘴边。“他细心有什么用？眼下伺候公主的是杨戬。”看龙女喝了水，便抱她到塌上，转身脱去外袍。<br>
“是，我知道杨戬最好了。”寸心坐在床沿，拦住就要靠过来的男人，“你别过来，我吃药试试。”<br>
孙悟空也好犀牛精也好，立时都被抛在脑后。杨戬摸摸龙女颈侧，脉流涌动生热开始发散，劝道：“有杨戬在，你非要吃什么药呢。”<br>
公主摇摇他的胳膊：“我好奇不行么，我想知道药效到底怎么样嘛。”<br>
杨戬低头看看他的龙女，白皙精致的脸蛋上已经开始浮起红霞，说话间自然呈现娇态，脚趾蜷缩起来在地毯上碾来碾去。她向来想要就要，几时忍过？<br>
他嗤笑一声，“好，我就在这儿看着。”<br>
发作又急又猛，不过几句话的功夫，寸心已经满身酸软。她扯来薄毯盖在身上，缩到床里，不让他看见她两条腿搓来拧去的模样。可杨戬哪能看不出来？他坐下靠着床柱，以手支头，又撑起一条腿，故意摆出作壁上观的模样，笑道：“公主可要坚持久些。”<br>
寸心气得抬脚踹他：“你出去你出去！我现在不想看见你。”软绵绵的蹬踹落在杨戬身上跟挠痒似的，也确实挠在了他的心口。看她强撑清明不肯认输的样子总是那么可爱，等会儿定要给她充分满足才好。<br>
“什么好药能比杨戬强的，我好奇不行么？”<br>
三公主让他用自己的话堵了嘴，气哼哼地背过身去不搭理他。胸口逐渐酸胀，她自己用力揉搓几番，又觉得比起杨戬的抚慰实在乏味得很；腿心反复抽动，却什么也触碰不到，只有越发可怕的空虚与酸痒在腹心炸开，喉中忍不住挤出小声呻吟，腰肢摆动，两条腿交叠磨蹭不停。<br>
虽然公主非要藏在毯子里，可她动情的身形依旧一览无遗，浓郁的香气发散出来勾人心魄，何况杨戬对她了解极为透彻，只是听一听便知晓龙女已然快到极限。<br>
“寸心，可还好？”杨戬朝内挪了挪。<br>
寸心满面潮红，根本不敢回头看。她哆嗦着伸出手去摸索床头暗格，摸出个小瓶，倒出一颗药就往嘴里塞。药入口即化，生效极快，不过数息，燥热便稍退几分。这才攥着薄毯转身，“有效果的，我没事……”她提不上气，声音也甜甜软软的。<br>
杨戬无奈道：“这也能算效果？”他看得出来，龙女比方才轻松些许，但到底——在他看来，全无必要。<br>
酸胀麻痒确实有所减轻，腿心抽得没那么厉害了，可体内越发空荡荡的，又虚又冷。她还要嘴硬：“我好了，我好得很，只要你别在这儿勾我，我就什么事儿也没有。”<br>
“勾你？”杨戬喷笑，索性抬腿上榻，在龙女面前扯开衣带，慢条斯理脱下上衣，露出精壮的胸膛，蜜色的肌肉绷紧，随克制的呼吸深深起伏，“我现在才是在勾你。”就算不在情期，矜傲的可爱的娇柔的龙女只消一个眼风，就能让他勃然胀硬，何况此时。他看着寸心在那里和自己较劲，一柄肉杵早已硬如铁石。<br>
寸心看得两眼发直，费了半天劲儿也没能把视线挪开一丝一毫。脑子里还有些许理智，似乎张口斥了几句，说罢就忘，也不知道自己到底说了什么。杨戬的身体有她喜欢的气息，她喜欢把手按在他坚实的胸膛上，喜欢摩挲他背部硬朗的肌肉，喜欢亲吻他块垒分明的腹部，还有……<br>
杨戬轻笑一声，在龙女饥饿至极的目光中，慢悠悠地在她身边坐下，向后倚着床头软垫，任他腿间支起的帐篷竖在龙女面前。<br>
他自岿然不动，欲火焚身的龙女已经气出两包眼泪。她原本想着，试试药效，将来杨戬赶不及时也好有所准备，谁知这个混蛋根本不给她慢慢舒缓的机会，尽在那可劲儿散发诱人的气息，方才稍稍降温的情欲又咕嘟嘟升腾起来。寸心气得要死，掀起毯子扔到杨戬头上，“不许看我！”<br>
“那就请公主多看看我。”杨戬在毯子下闷笑，把毯子从下撩至腰间，开始解腰带。<br>
公主殿下眼冒金星，眼睁睁看着那根青筋虬结的紫红肉棒从裤边弹出，立在空中，不时绷紧一缩一抖，她喉咙一痒，腿间瞬时倾泻如注。<br>
她为着什么？要是还在灌江口，她几时需要考虑杨戬在不在的问题？寸心喉咙哽住了，她拧着身子挪过去，捏住炽热硬挺的肉棒贴在鼻端深吸一口气，嗷呜一口吞至深喉，果然听到毯下一声重喘。她又撑着人爬起来，拽住毯子在他颈间打结：“你明明比我还急！”话音未落就呜呜地哭起来：“都怪你，都怪你！”手上没力气，拽了几下系不好，就在他身上乱打一气，边打边哭。<br>
这下杨戬再顾不上逗弄，忙揭开毯子扔到一旁，瞧龙女通红的小脸满是泪花，顿时心疼得无以复加，手忙脚乱给公主擦去泪水，拨开公主湿漉漉的大腿，把肉杵深深顶进去，听她的抽泣变成长吟，把人搂在胸口哄了半晌，“不哭了不哭了，都怪我太想伺候公主，”一边挺腰一边用力揉她鼓胀的乳房，“是我看见公主就走不动路。”<br>
“那你抱着我，”寸心呜呜咽咽哼哼唧唧，抬一条腿搭在他腰上，伸手挠他，“再用点劲儿。”杨戬言听计从，翻个身让龙女趴在他身上，抬腰向上往尽头顶。交接处滑腻一片，粗长肉杵在湿淋淋的肉道尽头旋转碾磨，没几下就磨得她小腹哆嗦，抖着腿泄了身子。<br>
颤抖渐缓，寸心咬着杨戬皮肉又哭起来，“你要是来不了怎么办？”她死死抓着他的臂膀，“你要是有危险怎么办？”眼泪大颗大颗落下，她狠狠在他肩头咬了一口，“我们怎么就分开了，我们将来到底怎么办？”<br>
杨戬心如针刺，抬起龙女小脸冲她微笑：“我一定按时来，一定不让自己陷入险境，一定——”剩下的话被龙女堵在口中，她在他唇上咬出血来，又舔舐下肚，“你不许……啊、不许、”是杨戬又挺腰动臀撞在深处，她颠簸起伏，坚持说完，“……你、不许发誓！”<br>
“我只要你、只要你好好的，”她边哭边颤，“你要平平安安的。”<br>
“寸心平安，我就平安。”杨戬稳住哽咽的喉咙，给龙女抹去泪水，“我们都会好好的。”他把人按在胸口，“三公主现在只管吃饱就好，别的都交给我，什么都不要操心。”说罢揉在她挺翘的圆臀上就是一阵狂风骤雨的猛凿，叫龙女除了放声吟叫再也说不出成句的话。<br>
一边顶她还要一边逗她，“三公主怎么越哭越紧了？夹得厉害。”果然话音刚落，肉穴内一阵紧缩，热腾腾滑腻腻的肉褶从四面八方挤压过来，一股温热春水从穴口涌出，流满精囊又沾湿了床榻。<br>
到底还在情期，寸心很快就被欲火焚去神志，迷迷糊糊间，她懊悔地想，为什么要说出来令杨戬跟着难受呢？可哄她本来就是他该做的事，不依赖他还能依赖谁呢？脑子很快迷成一团浆糊，在漫无边际的快感中沉沦欲海深处，事已至此，还想什么明天？享受今日的欢乐不好吗？<br>
杨戬忽然坐起来，搂住龙女低头深吻，舌头在她口中搅动，就着龙女分腿跪坐的姿势，端着她的身子一下一下往阳具上按。等龙女腰腹臀腿一阵哆嗦，又泄一回，才揉揉她的小脸：“你先缓缓，”招来备好的湿帕子，用法力温热了，仔仔细细给龙女擦去脸上汗水和泪痕，又伸手端来事先预备在床头小桌的蜜露，送到龙女嘴边，“上上下下都流那么多，公主可还好么？”<br>
寸心白他一眼，端过杯子小口喝完。<br>
下一波情欲来得慢且缓，寸心暗想这药还是有点用，神志也比往常清明。但，希望如杨戬所说，她永远用不着吃它第二次。<br>
有这种返祖“病症”的龙虽不算多，但海域江湖加起来也总数也不在少。千万年来，龙族自有一套应对之法，虽说服药可保神志清明，但欲望本身并没有完全克制的必要。满足情欲正如面对美食佳酿，可以吃喝不停但不可暴饮暴食，一味胡吃海喝虽可一时畅爽，但连续饕餮般狂吞谁也受不住，细水长流才是养生之道。<br>
小夫妻从前不懂，寸心随性而为一时痛快，过后却疲累至极，大半个月都神色恹恹提不起劲儿。有了几回经验才知道如何保持节奏，只苦了杨戬，时时留意龙女状况，自己倒反复不得畅快。<br>
寸心贴在杨戬胸口和他腻着撒娇，小腹上还贴着硬邦邦的肉杵。她伸手下去：“我帮你吧。”<br>
“不用，”杨戬按住她的手，“再等等。”这回等的时间比往常更久，眼看龙女又发起热，他捏捏公主的腰肉，“你若不吃那药，我还能少难受一会儿。”说罢慢慢顶入，手指熟稔地拨弄乳上红樱，随着龙女口中嘤咛摇晃腰臀，在热乎乎的潮穴中深深浅浅地翻搅。寸心舒服得快要化掉，一丝力气也不想出，随他摆弄，合上眼睛沉浸在缓慢发散的情欲中。<br>
如玉的身躯染上粉色，正如漫天锦云，绵软柔嫩。杨戬克制着力度和频率，把一团乳房握在手中，丰硕的乳儿柔软无度细滑称手，像一团有形状的水，无论他如何收拢五指，都有嫩滑乳肉从指缝中溢出。<br>
忽而红霞蒸腾，一阵急火蹿来，身体爆出火花，轰一声将她由内向外寸寸点燃，全身滚烫，一股激流汩汩冒出，寸心克制不住一口含住眼前喉珠，手脚并用缠住杨戬急切地挺身，拧起腰肢又夹又吸。<br>
“不要急，”杨戬等这一刻也等了许久，“别费力气，小心累着。”他抬起她的腿根向前顶撞，在汁液横流的蜜穴大力进出，直撞得她娇躯乱摇，四体虚浮，仿佛飘在空中一般，吟叫连连淌水无数。<br>
下一刻，他俯身将她压倒，大口含住丰满的雪乳，在吻痕上叠加齿印，留下一片晶莹唾津，又抬起她虚软的双腿，结结实实地抽出来捣进去，憋到发胀的硬杵在她腹上顶出高高低低的痕迹。寸心高潮连连反复抽搐，她夹得紧他便刺得更狠，半透明的蜜液都被拍成团团碎雪。等龙女软得抬不起腿，他估摸着差不多了，才松开精关畅快地喷射出来。<br>
寸心累极了，一股倦意漫上来令她头脑发晕，她还撑着清明去搂杨戬，咕哝出许多甜言蜜语。往常她大多倒头就睡，可现在她有许多许多话，想让杨戬记在心里。杨戬如何不知龙女情意？她这般模样，让他胸口涨起一片带着苦涩的酸甜。他轻拍龙女：“不用多说，赶紧睡一会儿才是。”<br>
寸心暗暗嘀咕了一句装模作样，他明明听得很高兴嘛，接着便两眼迷蒙，脑中混沌，很快沉沉睡去。<br>
杨戬这才起身，到耳房橱柜中拿来替换的床褥，去浴室端来温水给龙女擦洗，再备好她爱喝的甜茶。<br>
到半夜，龙女果然在睡梦中哼出声来。他钻进新换的薄被，从背后搂住她情欲又起的身躯，温柔地抚弄柔软的乳房，在她颈侧流连亲吻，给她光裸脊背上又添几处红梅。肉杵从臀缝顺畅地滑进去，捣开皱缩的甬道，碾平层层肉褶，将两人的身体扣合成同样的弧度。<br>
从前，有时半夜回家，他也曾做贼般悄悄褪去妻子的衣衫，轻揉慢碾勾出欲水，小心挺进，等她迷糊着醒来，再予她一阵狂风骤雨。<br>
她说身份没什么要紧。可他还是想要一份名正言顺，想让三界都知道，西海三公主是他唯一珍爱的发妻。<br>
王母娘娘那份懿旨彻底否掉他长久的坚持，但她至少为寸心保留了几分体面。眼下还不知道上天接印的时候，玉帝是否会为难于他；也不知道接印之后又要如何在天廷二圣的天条中寻出些微生路。前几个月的无数思量都只是推演，真正如何，恐怕还有许多硬仗要打。<br>
思绪逐渐飘远又被怀中温香软玉拉回。金蝉子的漫漫西行渐至尾声，待西海三太子功成圆满重新化龙，或许他也能往西海这边再努努力？上天之后再去欲界看看，母亲性子爽利，她若还在必然也会喜欢寸心这般的儿媳……<br>
杨戬漫无边际想了许多，所有内容都指向一个渴望：他还要做龙女的夫婿，寸心一定得是他名正言顺的妻子。他就这么一颗心，怎能不安放在他的胸膛里？</p> <p>这一回断断续续的情欲绵延三日，一时和缓一时激烈，都由杨戬把控着节奏一一给她各种不同的满足。<br>
“好三公主，下回可别吃药了。”龙女比往常多几分清明，但捉摸不定的周期和长短不一的等待让杨戬十分难熬。眼看情热逐渐消退，他再无顾忌，抬着龙女双腿扛在肩头，掐着她红痕遍布的细腰，把雄赳赳气昂昂的紫红长枪抵在肿胀黏腻的穴口，一鼓作气直捣尽头，在她嫩白与殷红交错的小腹上顶出他的形状。<br>
寸心“啊”地叫出来，随即哼哼唧唧地应下，扭腰抬臀想要配合。<br>
他提起公主臀肉拍了两下，“你还有劲儿？又跟不上我，别动了。”他把她塞得满满当当，肆无忌惮地长进长出，终于有空欣赏龙女红嫩穴口被他撑到极限的模样，眼瞧着嫩肉被他推进扯出，一阵阵沸血直涌天灵盖去。龙女小腹上那根形状上上下下，起起伏伏，直捣得她热汗涔涔，双乳上下晃动不停。<br>
一直这样多好，情期永不结束多好。寸心仰头发出无限快乐的呼喊，带着无限眷恋的眼眸不停描摹他狂热挺动的身躯。<br>
西海深处，幛幔重重，二郎真君与西海三公主捧出自己炽热的心，向爱人索取肉体的无限欢愉。<br>
