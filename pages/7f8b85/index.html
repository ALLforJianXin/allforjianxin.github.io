s7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">了无痕·钗龙裳<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>夜晚里，三界除了地府还有那月光照不到的地方：真君神殿。</p> <p>杨戬端坐桌前批阅西海龙王敖闰的奏章，他望着老龙王海蓝色却有些小心翼翼的笔锋，边在其左用墨色批注，却是铁画银钩透着些许狷狂。</p> <p>他如今看敖闰在奏上所呈，皆是海内奇珍异宝与往年并无差别，便就也按着往年批注。</p> <p>相较于四海龙王维序万万年之久的中庸之道，杨戬在字体方面从未掩盖他所想，世人只道他一手遮天太久，野心太大。</p> <br> <p>月前朝堂之上，张百忍自从下令让他亲自捉拿沉香后，说什么劳心劳力想要放权歇息，众神脸色各异却因着老君压前未有一个主动站出来毛遂自荐，一时凌霄宝殿上寂静的可怕。</p> <p>谁都不知道玉帝是否在玩姜尚钓鱼。</p> <p>过了一炷香时间，就在李靖刚巧迈出一步后，王母却突然开了口，三言两语便将这实权交予他。</p> <p>托塔李天王面上下不来台，在太白金星未说散朝前，怒气满满拂袖走了。</p> <p>他站在原地，只看着哪吒讽刺冲他一笑，踏着风火轮走了，应是下界跟沉香发牢骚去了。</p> <p>这权要是落在他父亲手里，必是更恼火。</p> <p>如今却连对杨戬发火都是件稀罕事。</p> <br> <p>杨戬看着堆积案牍如小山一般的奏折，眉心微皱。</p> <p>他自上任司法天神便习惯了与公文为伴，因着有两分备案工作更是往双倍上涨，早些年还有梅山六兄弟帮衬，现在与他离心离德 自然让杨戬谨慎了些，不敢再在他们面前松懈半分。</p> <p>他今日早时为凝聚四公主敖听心的龙魂耗费太多，当时情况紧迫若杨戬稍迟一步，敖听心可就救不回来了，他现在甚至不敢想若是四公主真的消散该如何弥补。</p> <p>龙得天地造化，却有今生无来世。</p> <p>棋局有颓势，可他费心布置多年，又怎能轻言舍弃？</p> <br> <p>杨戬心里暗道恍了心神，提笔继续批阅大小事宜。</p> <p>现在哮天犬应该还在天河陪弱水说话。</p> <p>为官多年战战兢兢的司法天神在自己意识昏迷的最后一刻，才对香炉起了疑心。</p> <p>不是龙涎，而是丁香花花香。</p> <br> <p>雕刻精美的灯盏将自身的光亮悉数洒下。</p> <p>杨戬俊朗如玉的面庞在沉睡时依旧不太安稳，只有他眼睑的那抹金色在比月宫还要清冷的真君神殿内显得清闲、妖冶。</p> <br> <p>——</p> <br> <p>“杨戬，杨戬？你怎么了？”</p> <p>等司法天神杨戬再次意识回笼，却发现自己根本不在神殿之中。</p> <p>他望着面前眼眸里充满担忧的美娇娘，有种今夕是何年之感。</p> <p>她身着金描大红色嫁衣，好像春日明媚、辉映。</p> <p>“杨戬无事。”他熟稔回答着从未见过的龙女的问题。</p> <p>八九玄功运转，天眼吊坠如旧，记忆突如潮水般汹涌而至。</p> <p>距离他不远处的铜镜，映着龙女背后的齐腰青丝，以及……</p> <p>他自己！</p> <br> <p>敖寸心太明白杨戬向来强撑，“你会不会是在西海海边等了半个月太过疲劳？去西厢房歇息一下吧，那里也差不多被我和三妹收拾好了。”她一边说着还拽着他的袖口，打算让他回房休息。</p> <p>左不过打点婚礼，她有三妹、玉鼎师父、狐妹、哮天犬、哪吒、梅山六兄弟、灌江口百姓帮衬着，也忙得过来。</p> <p>「是梦？」杨戬感受着【自己】对于眼前名为“敖寸心”龙女的无奈、宠溺、怜惜……</p> <p>情丝万千却不自知。</p> <p>心如磐石般坚定的司法天神现在暗暗羡慕着另一个自己，他的世界里没有敖寸心的存在。</p> <p>杨戬用自己因为习武多年而充满薄茧的双手轻轻搭在她双肩，这是他的妻。</p> <p>满腔信任，爱到只为他而存在。</p> <br> <p>他光这样想着，唇边就绽开了柔情的笑，立时迷得敖寸心是七晕八素。</p> <p>等龙女反应过来时，杨戬已将她再次正面向着铜镜。</p> <p>不待她疑问，背后杨戬左手轻缓抚上她的面颊，在龙女耳边呢喃：</p> <p>“寸心，记得当初你在西海岸边问杨戬，是母亲漂亮还是你漂亮。”</p> <p>镜中，龙女双颊绯红，耳垂更因为丈夫的欲碰未碰而羞赧，“当日是我没有分寸，竟问让你为难的问题...”现在敖寸心比任何人都更加清楚身为母亲的瑶姬长公主，在杨戬心中的分量是无可替代的。</p> <p>“嘘。”夫妻同心是司法天神求而不得的，这瞬间甚至比月光更加令他着迷，“我现在有答案了。”眉目间爱恋只增不减。</p> <p>敖寸心惊喜异常，她圆溜溜的可爱杏眼无意识瞪大，要知道杨戬少有对她如此直白。</p> <p>“父亲在家中对我们兄妹三人重视颇多，但处处以母亲为先。现在杨戬明白了，父亲眼中只有母亲一人。”他说到儿时 声音里的追思怀念，让敖寸心像是被抓住七寸之处，她在心里暗暗承诺一定要给杨戬重建一个家！</p> <p>“今后，杨戬心里也只有你一人，永远保护你、爱重你！”</p> <p>誓言若惊雷在敖寸心耳边响起，她惶惶然只觉一切似梦。</p> <br> <p>杨戬将放置在旁边的凤冠双手捧起，却剑眉紧蹙。</p> <p>“其实这样式挺好看的。”敖寸心其实为着凤冠与杨戬有几次说大不大、说小不小的争执。</p> <p>她不愿将天敌戴在头顶，可每次还不等她说缘由，杨戬就略有不耐认为她辜负杨婵心意。</p> <p>司法天神抬手流光一瞬，眨眼间就将翱翔九天的金凤变成飞腾九霄的金龙缠绕着妃色的珊瑚。</p> <p>龙戏红宝石珊瑚钿花，华贵无比，衬敖寸心却是刚刚好。</p> <p>“西海三公主，就算嫁为人妻也还是公主。”富有安全感的双臂，自身后紧紧拥著她。</p> <p>敖寸心身随心动，转过来扑进他怀里。</p> <p>认识杨戬这么久，她从不知道竟连他的只言片语，都能将她带入情动摇曳之境。</p> <p>这叫她如何是好？</p> <p>身体永远比言语更加诚实，泪珠落下瞬间凝结成粉红珍珠。</p> <br> <p>泪成珍珠，对于龙族并非无稽之谈。</p> <p>却也只有极为动情爱极之时，才会有极小几率化为与龙身相近的珍珠。</p> <p>杨戬伸手接住，望着圆润的珠子。</p> <p>再想想被自己视若珍宝的那枚耳坠，如鲠在喉。</p> <p>或许，是时候该还给嫦娥仙子了。</p> <p>他已寻到心中所爱，那月光清辉披与不披都无关重要。</p> <br> <p>司法天神因着神魂不稳之嫌，预感梦醒，</p> <p>他最后用法力幻化出金钗，一分为二。</p> <p>其一戴在敖寸心头上，其二自留。</p> <br> <p>“宝钗分，桃叶渡，烟柳暗南浦。”</p> <br> <p>——</p> <br> <p>杨戬拥着即将过门的妻子，却不明白心中火热从何而来？</p> <p>他低头便看着了那华丽精美的龙冠，法力波动是属于自己的没错。</p> <p>究竟怎么回事？</p> <p>为何自己毫无记忆？</p> <br> <p>——</p> <br> <p>“主人醒醒，我让嫦娥仙子来看你啦！不过嫦娥仙子说什么都不肯进来...”是哮天犬。</p> <p>司法天神纤长的睫羽动了动，眼尾上扬的金色更加鲜妍。</p> <p>杨戬醒了。</p> <p>“知道了。”俊美郎君低气压的回应了哮天犬，他并未问它为何从天河去到广寒宫。</p> <p>不过，这样也好。</p> <p>蟠龙大氅在他的身后愈加生动威仪。</p> <br> <p>“听哮天犬说，真君找我？”绛紫华服，与月宫仙子相得益彰。</p> <p>杨戬将珍藏多日的耳坠拿了出来，递与给她。</p> <p>“真君何意？”美目盈盈中不解意味颇多。</p> <p>“物归原主。”多年上位，话语间不容置疑。</p> <p>嫦娥当下就连往常质疑都做不到了。</p> <p>她被杨戬下了面子，美人含怒远走。</p> <br> <p>——</p> <br> <p>就算连一滴泪都不曾拥有。</p> <p>金钗为伴，足矣。</p> <p>他亦渴望与她再相见。</p> <p><br><br></p> <p>-end-</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/110700.了无痕·钗龙裳.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=1874" title="标签">#1874</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/678e85/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">故里逢春</div></a> <a href="/pages/93bfdf/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">病态</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
