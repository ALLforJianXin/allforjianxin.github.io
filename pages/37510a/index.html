这已经是自新天条出世，三公主被赦以来第五十七个来西海说亲的人了。<br>
他们可以正大光明地从龙宫的大门出入，更有甚者能在龙王的默许下和三公主独自相处上一会。<br>
而他想见三公主一面却要做贼似的变成海鱼溜进三公主的寝殿。<br>
如果有人来找三公主，他还要被紧张兮兮的三公主藏起来。</p> <p>——藏起来！</p> <p>就仿佛他是三公主金屋藏娇不可见人的外室一般。<br>
真君大人压下心底的一丝委屈，悄悄跟上青年。<br>
在确保离龙宫有一段距离且四周无人后，真君大人用法术变出了一只水狗，水流凝聚起的透明犬呲着牙找寻着自己的目标。<br>
在锁定了目标后水狗前腿微屈，喉间发出呼噜呼噜的威胁声，蓄力后猛的冲向青年，咬住了青年的……臀部。<br>
青年发出了一声响亮的惨叫，手忙脚乱地边向前冲边扭动身体试图将水狗甩下去——当然没有如愿，水狗的尖牙深深地嵌入他的皮肉里。<br>
青年运起法术想要攻击，法术却穿过了水狗的身体打到了自己的身上。<br>
于是一声更响亮的嚎叫声惊起了周围的鱼群，四散着找寻躲藏的地点。</p> <p>很好，短时间内他应该不会再想踏足西海了。<br>
真君大人嘴角微弯的弧度带着几不可见的愉悦。<br>
解决了不速之客——或许真君大人才是那个不速之客。<br>
真君大人摇身变为一尾鱼，熟门熟路地向三公主寝殿游去。<br>
今日是人间的上元节，凡间四处张灯结彩，热闹非凡。许多人在这一天出门观灯，凡人们将愿望写在天灯上，一盏盏灯火乘着风飞往天阙，或有几盏会落到某个仙人脚边，这一日仙人们往往不吝于为人们赐下一些福缘。<br>
三公主许久没有看过人间的灯火了。<br>
她被禁闭时杨戬也曾去看她，只是彼时他尚有筹谋，既怕他筹划失败牵连三公主，更怕有朝一日身死，惹她伤心。故而一直只在暗中关照，不敢露面人前。<br>
他喜欢在三公主熟睡时坐在她床侧，轻声说起他近日的经历。他说三妹和凡人在一起了，还生了一个叫沉香的孩子；他说他亲手镇压了三妹，杀了她的夫君和儿子；他说沉香还活着，杨家有后了；他说他给沉香准备了长命锁作为十六岁的生日礼物；他说沉香想救出他娘；他说沉香小孩子心性还需要磨练；他说……<br>
他或惊怒，或沉重，或欣慰。<br>
他把他的心事，在这深夜里，在熟睡的三公主身边，一一的剖白，以近乎自言自语的方式。<br>
她也许听不到。<br>
哪怕她听不到。<br>
他喊她的名字：“寸心”，他问她“你能理解我，对吗？”<br>
但或许他并不需要她的回答。或许这个问题的答案从来都是肯定的。<br>
他总能在西海，讨得片刻的平静，然后一往无前地奔赴属于他的命运。</p> <p>在被开天神斧劈中时，杨戬几乎以为自己真的要死了。<br>
他想起死于旧天条的母亲，他想到终于可以得到自由的三妹。然后他想到西海，想到永禁西海的敖寸心。<br>
他的眼里仿佛看到那日在海边救起他的龙三公主，看到和离那日她盈满的泪水，看到西海诀别时她放开的手。<br>
他说“杨戬此生最大的梦想，就是披上那道美丽的月光。”<br>
他闭上了眼睛。</p> <p>但他没有死。<br>
新天条出世，从前因为旧天条获罪的人也得以赦免。三圣母，几位公主，以及敖寸心。<br>
敖寸心和其她几人不同，她获罪不是因为慕凡，本来不在赦免之列。但……没有人会在新天条出世之机，去触忍辱负重的大功臣的霉头。三公主的赦免，是所有人的心照不宣。<br>
起初杨戬忙于新天条落实事宜，没能顾得上西海。<br>
等他总算腾得出手去思考复婚事宜时，西海传出了喜讯——三公主在相亲！<br>
相亲对象是南海的某位龙太子。<br>
听闻消息时真君大人眼神骤然加深，手上毛笔的墨水滴到纸上泅开了一团。<br>
他的语气甚至显得有些刻薄“噢？是哪位龙太子？”<br>
是哪位龙太子重要吗？不，因为你只需要知道这位龙太子在传出消息不久就出面辟谣了。<br>
据说是顶着一个猪头出现的。</p> <p>在私下解决了复婚路上的一块拦路石以后真君大人……<br>
很快又遇到了第二块，第三块。<br>
适龄且待嫁的龙公主不多，哪怕和龙三公主相亲的人一个接一个遇上倒霉事，依然阻止不了前仆后继的追求者。<br>
真君大人在鼓起勇气踏进龙宫之后——被礼貌地请了出来。<br>
“龙王？不在啊”<br>
“龙后？不在啊”<br>
“三公主？不在啊”<br>
正面进攻不行，真君大人决定曲线救国。<br>
他开始变成鱼溜进三公主寝殿——这事他做熟了。<br>
起先他不敢露面，只是捎来一些人间的有趣玩意或者吃食。<br>
经过一千年多前的血泪教训，龙王和龙后并不敢让寸心出海，每次寸心说想去人间玩玩就会看到龙王龙后满脸惊恐，生怕女儿又一猛子扎到哪个美男身上。<br>
寸心仿佛回到了未成年时，只能在海底四处游荡。<br>
时不时出现在寝殿的美食和小玩意大大地丰富了三公主的日常生活。<br>
某一天，真君大人觉得时机成熟时现身了。<br>
意料之外的是，敖寸心并没有很意外。<br>
毕竟有个人经常在你睡觉的时候絮絮叨叨真的很难不被吵醒。<br>
（何况西海没有淡水鱼）<br>
寸心总在暗暗地想他什么时候才肯现身，没想到他定力这么好，送了半年的东西也只敢在她睡着后露面。<br>
在杨戬说着白天是怎么把第30块拦路石吓得慌不择路的时候，寸心没忍住笑出了声。<br>
真君大人仿佛卡壳了一般突然僵住，不敢低头看她。<br>
寸心睁开眼睛，眼角还带着笑意“你这样折腾人家，不怕堕了司法天神的名头？”<br>
“寸……寸心，我……”<br>
在她睡着时能侃侃而谈的真君大人现在却仿佛一个不善言辞的呆子。<br>
他们很久都没有面对面地说话了。<br>
二十多年来都是他单方面的倾述。<br>
然而看着龙女含笑的眉眼，他莫名地放松下来。<br>
“……我没有现身”他仿佛捡回了自己的声音“没有人知道是我做的”<br>
他的话说得越来越顺口“他们不适合你”<br>
“他们太弱了，而且一点都不坚定”<br>
他试图一点点地诱哄寸心别再见那些奇形怪状的拦路石。<br>
“你父亲不愿见我”<br>
“也不让你见我”<br>
诚然几百年的为官生涯让杨戬变化不少，比起以前那个不擅表达的杨二郎，现在的司法天神学会了用示弱来达到自己的目的。<br>
他的眼睛微微阖下，眼睫轻微地颤动。<br>
“寸心，你还喜欢我吗”<br>
敖寸心忍不住心软，她从来都对杨戬的美色没有抵抗力。<br>
“喜欢呀”<br>
如果不喜欢的话，在她第一次深夜被他吵醒时，她就会让他不要再来。<br>
敖寸心喜欢杨戬这件事，似乎成了一个无解的结。<br>
她本以为和离后自己就死心了，可听到他有危险时仍然义无反顾地向前。她以为永禁西海后自己已经放下了，可杨戬在她面前卸下防备时她仍然无法推开他。<br>
和离后的几百年里，寸心思考了很多。<br>
这场婚姻里，他们都太过固执，一个不肯低头，一个不肯后退。<br>
但如今争论对错已没有意义，因为他们都还爱着彼此。</p> <p>于是真君大人开始频繁出现在三公主寝殿，但考虑到龙王和龙后未必能接受，所以这件事只有真君大人和他的前妻三公主知道。<br>
当真君大人和三公主在房间里画画时，龙王来了，于是真君大人被藏了起来。<br>
当真君大人和三公主在房间下棋时，龙后来了，于是真君大人被藏了起来。<br>
当真君大人和三公主在花园散步时，四公主来了，于是真君大人被藏了起来。<br>
真君大人很委屈，真君大人想要名分。<br>
但每次提到复婚，三公主都顾左右而言他。<br>
真君大人看着一个个长相俊逸的拦路石，感到了危机。<br>
他试探着在三公主面前“不经意”地展现着自己好看的角度。<br>
从三公主的眼神里真君大人确认了自己魅力不减当年。<br>
这多少在一而再再而三的挫败中给真君大人带来了一丝安慰。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/39.39.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/5803ce/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">灯如昼</div></a> <a href="/pages/f039b4/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">真君大人想复婚（下）</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
