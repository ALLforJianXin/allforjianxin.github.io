AdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">沁月<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="沁月"><a href="#沁月" class="header-anchor">#</a> 沁月</h1> <h2 id="沁月-上"><a href="#沁月-上" class="header-anchor">#</a> 沁月（上）</h2> <p>一个关于月亮的故事。</p> <h3 id="_00"><a href="#_00" class="header-anchor">#</a> 00</h3> <p>海里是没有光的，全靠小金乌东升西落的照耀，为浓如墨染的海水带去一丝生机。</p> <h3 id="_01"><a href="#_01" class="header-anchor">#</a> 01</h3> <p>新天条出世，敖听心忙完了手头上的事，突然想起来还要去西海走一趟。<br>
临入海前，她站在岸边忽然有些犹豫，数着年头她们也有一两百年未见了，不知会否有些生疏。<br>
还好，龙族寿命长，一两百年似乎也不算很久。<br>
海波粼粼，滔滔浪涌，荡漾着星光的融水宫还是她记忆中的那个样子，听心在殿前站了一多刻，咬咬牙才走得进去。</p> <h3 id="_02"><a href="#_02" class="header-anchor">#</a> 02</h3> <p>宫里没有人。</p> <h3 id="_03"><a href="#_03" class="header-anchor">#</a> 03</h3> <p>沁月正擦着案几上的帛书，听见脚步声抬头一看：“四公主你来了呀！”<br>
“怎么还是如此冒失？”，听心看她跑得身上环佩叮铃作响，心里悬着的石头放下了一半。<br>
“咳，这不是随三公主嘛，都习惯了”，沁月不好意思地吐了吐舌头。<br>

“悔教夫婿觅封侯。”</p> <p>杨戬的眼前突然模糊起来，融水宫的灯火下好像映照着一个影子，明明暗暗虚虚实实落在他的身上。</p> <p>“你是谁？”</p> <p>“我叫沁月，母妃说，沁月凝霜，聊润枯肠。”</p> <p>少女的模样明媚活泼，说出来的话却像是遭了千年的霜打。</p> <p><br><br></p> <p>咚——咚咚——，远处传来了初严鼓声。</p> <p>“真君该走了”，沁月知道，这是大祭典开始的信号。</p> <p>杨戬下意识地侧了侧脸，迈出去的脚又收了回来：“你呢？”</p> <p>沁月鼻子抽动一下，酸得发苦：“好不容易来一次，我陪陪三公主。”</p> <p>“等等！”，她见他要转身离开，忍着泪问：“我听说你喜欢月亮？”</p> <p>杨戬的眼里闪过了一瞬不可思议，刚想开口，门外却传来了草头神的声音：“真君，礼赞乐献各官均已就位，龙王请您前去开祭。”</p> <p>他的嘴唇微微掀动，话卡在嗓子眼，终究是咽了下去，点点头，随草头神去了。</p> <p><br><br></p> <p>他听见沁月在杨戬的身后吹起了海笛，戚戚怆然，唱的不知是谁的丧歌。</p> <p>走出几步，草头神突然说道：“真君前日派人送去广寒宫的金佛方竹笋，嫦娥仙子收下了，说谢过您的善意。不过……”</p> <p>“有话直说便是。”</p> <p>“不过玉兔仙偷偷子告诉小人，仙子实不便吃笋，易发癣。”</p> <p>草头神发现他杵在后头：“真君？”</p> <p>跟着他的目光看去，门前的石阶上刻着字，一笔一画，深深浅浅。</p> <p>大大小小，每一个字都是“戬”。</p> <p>“二爷，你怎知我最喜欢吃笋？”<br>
“要说起笋，当属南川金佛山的方竹笋最好了。”<br>
“形呈四方，有棱有角，其笋不发于春而茂于秋……”</p> <p>东边又传来再严鼓声。</p> <p>“想什么呢？”，杨戬回过神来，心里暗道，“这世上同名之人多了去。”</p> <p>许是自己记错了。</p> <p>“走吧。”</p> <p>草头神又在前头引起了路。</p> <p>走过一叠一叠馔品，眼里却生出涟漪，秋千扬起高高的弧线，是两个人的身影，耳畔似乎还有一个女子咯咯笑声。</p> <p>“杨戬，你看，我们荡得好高。”</p> <p>他握着扇柄的手指突然冷了起来，从指尖到指骨，一节一节泛着白。</p> <p>当是荒唐一梦，原知一见误终身，无知再见不相识。</p> <p>——END——</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/89.短篇-2019/091500.沁月.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/23ac6a/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">碧波万顷</div></a> <a href="/pages/2de6ab/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">面首</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
