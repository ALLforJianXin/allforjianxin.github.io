巴，看看杨戬，又往下看看那只描金素三彩的碗里，黑褐的药汁刚喝到一半。<br>
“三公主……”杨戬突然停了左手的勺子，抬头对上寸心。<br>
起先寸心还听着新鲜，毕竟“三公主”抑或“西海三公主”这样的称呼，杨戬多是在二人心意相许之前才用来唤她。<br>
眼下又非过往闹别扭的时候，杨戬断不会猛然冒出一句“三公主”来徒增生分。何况这些年来，他口含天宪，少有轮到他看人脸色的时候，故而这恭恭敬敬、又绝无夹枪带棒嫌疑的“三公主”，初时听来倒真叫寸心受用。<br>
但总这样，寸心到底哪里不舒服。<br>
“你别叫我三公主了，都说了多少遍了？”寸心皱皱眉毛，正色道。<br>
“那杨戬应该称呼三公主为什么？”<br>
“那当然……是寸心啊……”杨戬不知眼前的公主为何话到一半却少了三分理所应当，明明方才还是一副理直气壮的样子。<br>
“这样……”杨戬顿了顿，依然看着寸心，“不妥吧？”<br>
寸心见他这样，就知他大概真是思忖过，眼前人神色认真，与记忆里的他几乎重叠……<br>
“杨戬毕竟受三公主照拂，借西海宝地疗伤至今，在外是客，宾主有别，怎能不对三公主尊重呢？”<br>
好吧，这般拘谨，还不如少年时候呢！<br>
抿着嘴的公主收回下巴，心里绕过几个弯，还是没忍住捡了相似的话回他，“你还真会想……”<br>
又大概是见人右臂还静静搁在腿上，思及这人连一双利索吃药的手都没有，怼人的气势不自觉又收了许多。<br>
“三公主过奖了，这是杨戬应当的。”<br>
“我、”不用喝药的人倒是噎了一下，撤了支着脸的手，偏过脑袋去，“没在夸你！”<br>
“呵……”他见她这样，却是欢喜得低眉一笑。<br>
“算了！”<br>
今时不同往日，往后有你还的，任他笑去吧！<br>
三公主又自觉大人大量，回头问他：“你还没说叫我干什么。”<br>
“噢，这个啊……”<br>
“是不是药不好喝？”寸心又看看碗里的颜色，心道肯定是苦汁，要换了自己也是不乐意的，“你要恢复得快，就得喝这些，这也是三妹……三圣母的意思。”<br>
听到自己说了什么，她又飞快改口，再不看杨戬的眼神，只似是对着碗继续说话。<br>
“我也想过肯定不好喝，不然不会盯着你。”<br>
“听三公主的意思，杨戬好像会倒掉这碗药？”<br>
“你敢！？”</p> <p>旁的人便算了，寸心怎么会不知道。</p> <p>眼前这尊神虽少有败绩，旁人总是近不得身，却也不是没有自行操练跌打损伤的时候。<br>
从前自己见了心疼，忍住难闻气味给他煎药端来，杨戬接过得倒是利索，却不如一早想象中那般痛快服下。<br>
他先是拉过自己的手捧起来看，又把广袖捋开来细察了小臂皮肉，这还没完，又绕着自己上下打量了一圈。<br>
被这关切的夫君翻来覆去地摆弄，西海三公主都快忘了自己所为何事，见他皱着眉，就知道再继续下去二郎真君便要催动天眼来照自己了，哪消这样呀？便忙推开他手——<br>
“我身上一点事没有！药还吃不吃啦？”<br>
“真没有事？”<br>
“有事的是你，又不是我！”<br>
“我也无事，有玄功护体。”<br>
“那你别喝了！”寸心端起药作势要走。<br>
“诶，去哪里？”<br>
他的手臂不动声色，虚虚环住妻子腰身。<br>
“我去倒了呀，这药这么苦，又没人肯喝。”<br>
“哪里有人不肯喝了？”<br>
“你不是说你没事吗？”<br>
“妻子为我煎药，”他又接过碗来，“岂有不喝之理？”<br>
一饮而尽后，他将他的妻抱过在腿上，“确实好苦，苦过寸心为我的苦心……”<br>
他那张俊脸越来越近，寸心倒是不惊他动作，只替他面上的凛然正色羞赧：这二郎真君哪里是受不得苦，无非是讨要些别的好处罢了。</p> <p>哎呀，想这些干什么，他现在可是“客人”。</p> <p>“杨戬不敢……”他又动起勺子准备喝药。<br>
“唉等等！”寸心顺着他动作又看到桌上的碗，终于想到什么，“这碗拿错了！”<br>
“怎么了？这是三公主的碗吗？”语出又思及西海上下都算三公主的也不为过，不知寸心是何意。<br>
“就是不是我的碗！”杨戬更加不解，寸心继续解释道，“我有只特制的玉雕碗，那是母后赐我的，哥哥们都没有。用这碗所盛的食物会增味，就是吃药也不苦的！”<br>
寸心站起身来，提裙要走，“这个素三彩想是他们随便给你拿的，我说呢，你先别喝了！”<br>
“三公主！”她回头见杨戬也站起来。<br>
这一身自己给他备下的衣饰，若是隐去凡人血缘，说他本就是龙族也未必会有人置疑。<br>
他虽伤势未痊愈，但在这里将养得好，许久不曾战甲披身、舞刀弄枪，倒把西海的藏书读了不少，较之从前竟是另一番清俊无匹。<br>
但寸心再了解他不过，不必反应便知他温柔从容之下，实有难色。<br>
“哪里不舒服吗？”<br>
“三公主刚刚问杨戬……”<br>
“啊对，怎么了，你既不是因为药苦喝不下，还能是什么？”<br>
“药苦是自然的，杨戬冒昧，只是觉得三公主看着杨戬服药，这药就更苦了。”<br>
“我身上又没有药味，这药还不是我煎的呢，你觉得不好喝，我再叫膳房给你配些蜜饯总好了吧，怎么这么小孩子脾气？”<br>
“非也，杨戬叨扰西海已久，怎好连服药都让三公主……”他分明是拣了措辞，“挂欠。”<br>
他说着端起碗将那苦汁一饮而尽，“三公主不来，杨戬也会好好服药，尽快恢复的。”<br>
“那你说这些干什么……”<br>
寸心听着杨戬语气里不乏对西海的客气，同多年以前冲撞父王也要把自己“抢”去成婚的态度相去甚远，这些倒都可暂且按下不表，只是心中已然泛起酸楚——<br>
难不成又是一番“过敏之症”？哮天犬也不在这里呀……<br>
“我知三公主心善，我亦觉与公主亲厚，但总与杨戬共处一室，恐怕不好。”<br>
“这、这有什么不好的？”寸心乍一听先是脸红，又马上要气得小脸都白了。<br>
这厮委实气人，仗着如今情况特殊，就要这般那般地拘着，先是平常说话左一个“三公主”右一个“三公主”从不带落下的，再是期盼早日康复以结束叨扰，眼下又是说什么亲厚却待在一块不好……<br>
怎么他如今记不得事，反比以往更加惹不得了？<br>
“杨戬怕与三公主走得近，坏了规矩。”<br>
“规矩？什么规矩？还有人比你更讲规矩吗？”<br>
寸心忍不住腹诽，“司法天神”都没眼前这个杨戬讲规矩！<br>
“三公主莫要生杨戬的气……”<br>
“你看你不是整日都‘三公主’长‘三公主’短的吗，我都说了可以叫我寸心！”<br>
“杨戬未明三公主心意，不敢直呼公主闺名。”<br>
“我能有什么心意，我就希望你快点好起来啊，这有什么关系？”<br>
“杨戬明白三公主一片好心，是杨戬对不住三公主。”<br>
“这都哪跟哪儿啊？我看你是没吃药，脑子糊涂了，我还没说你对不住我呢，你就觉得亏欠了，我要真同你算起账来，你这辈子都别想还清了……”<br>
杨戬听寸心这般说法，眸中一动。<br>
寸心见他似有不解，又叹口气，感慨这人还是老样子。<br>
“你坐下吧，我吩咐人往后拿我将才说的碗给你盛药，以后不会再苦了，你也别跟我发疯……”<br>
“如此美意，杨戬受不起……”<br>
他话没说完，已被寸心截断：“杨戬！你使我一个碗怎么了？”<br>
杨戬本为尊重，但此番却过犹不及，叫西海的娇娇三公主终于忍不住红了眼眶。<br>
“如此百般推却，倒像是我待你不好，你不想再见我了！这些日子我待你如何，你分明最清楚，难道用我一个碗就真折煞了你？还是你怕我暗害你？我敖寸心不过是望你早日康复，对你哪有什么歹心，只有问心无愧！”<br>
她发起难来“寸心”、“歹心”、“问心”，言语中满心委屈一泄如洪，眼中却蒙了泪的壳，望着对面人不敢眨眼，怕它破。<br>
早知有今时，便告诉他往事好了。<br>
倒宁肯二人之间，因了他不记得自己而无法如初，也好过只有自己前事不忘，又无法捶他胸口撒气了。<br>
她想问杨戬怎舍得这样对她，却听得他声音发颤：<br>
“寸心，若我问心有愧呢？”</p> <p>她闻言错愕，忆起他说他见她第一眼便没来由的亲厚。<br>
那时他重伤醒转，没挣开她握着他的手。<br>
她面颊一道泪下，继而骤雨倾盆。<br>
有愧的人到底不忍——<br>
