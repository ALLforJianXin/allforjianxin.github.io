Tc0UvH8tcX29KzAgIGcEkINyW5BF9x891hw6VYqgJHEk0huccS7vh3C6gTiODL+26huuBtbct8eZnqLML8PkxGYpuPZBqtqwkSjgc4mB5gbgig5i+y0UDK35LMxXisn9xQtK+nd26gTIHsHe/oblK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">Chapter 7 冲冠一怒为红颜（雾）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p><a href="/vid/kajia/chap_7.mp4">此处有视频</a></p> <p>起先呢在我还没看原剧的时候，我印象里的杨戬温润如玉，自从我抽空补完了全集这个形象在我心里就崩塌了，杨戬这个角色称不上暴戾但绝对不是脾气好的主儿，谦虚有礼也不代表没脾气，尤其是真君大人有一句经典台词“杨戬向谁低过头，受过谁的要挟？”这话的确有道理哈，因为他都是直接硬刚。</p> <p>bb半天来正式开始分析。</p> <p>第一条就是这个不太讨喜的虾元帅因为执意要捉寸心然后惹怒了杨戬，当然我们寸寸跑上前去求情老杨也只能给个面子。这里想提一句杨戬和西海这个紧张的关系，其实很好理解因为杨戬本人是非常护短的，当他看到西海这么不讲情面连自己女儿都要抓的时候当然很不爽，尤其这个时间点杨戬已经把寸心带回家住并且开始称呼闺名，可见是动心了的。那么看到自己喜欢的人和家里是这样一种状况，他的第一反应当然是会对西海不满，至于这里是不是也为抢亲做了铺垫，不好说，因为抢亲戏份没有拍我们也不知道二哥和岳家到底是怎么打交道的。</p> <p>不过很明显杨戬对这位虾元帅印象肯定很不好，毕竟回西海通知婚事的时候拦在岸上的也是这位😂</p> <p>第二条是寸寸因海鲜过敏的乌龙事件离开杨府之后杨戬质问哮天犬。很多观众以为杨戬心里哮天犬排在第一，在我看来却不然。这里哮天犬想要蒙混过关但很明显二哥不吃这套，反而很凶地让他老实点乖乖说出来，狗子的反应也很有意思，骨头都吓掉了。我不禁联想到新婚夜狗子在门口说了这么一句“要是有了小二郎，他就更不稀罕我了。”更这个字说明什么？原来已经很不稀罕了吗？看来狗子心眼还挺多的，想必这次追问也给他留下了阴影。</p> <p>第三条是杨戬误以为寸心被弱水害死然后去找弱水发脾气。这就是很简单也很直接地表明寸心在杨戬心中的位置。</p> <p>第四条同样发生在寸心假死期间，我们都知道杨戬对师父是非常尊重的，甚至说没落下过师父的面子，这里大概是全剧中屈指可数的他没理师父，原因是什么呢？他在想寸心的事。</p> <p>第五条是南天门议和。这里本来双方僵持不下，杨戬本意不想接受招安，但是突然寸心被押送到南天门了。我们看他的第一反应就是提刀上前（当然被三妹拦住了）这里在我看来是刀指玉帝的雏形，他看到寸心有危险时候的反应可以说近两千年都没变。</p> <p>第六条是婚后五百年王母下凡提出做司法天神。娘娘自始至终都是想拆CP的，所以这里甚至将“休了寸心”作为一个好处来与杨戬交涉，但很明显算盘打错了。二哥不仅不想离婚甚至在王母说出这句话之后眼神突然变得凌厉，这里我又想多bb两句，杨戬这个人的性格是不许别人说寸心坏话的，同样他也听不得什么劝离的话，由此可知要是把某些毒唯或者披皮毒唯扔进剧里，挨一顿揍可能都算轻的🌚</p> <p>第七条就是名场面亮刀子。保护寸心是他的本能反应，所以即使是在这样一个特殊的时间点他也毫不犹豫不计后果地把刀指向威胁到寸心的人。</p> <p>后面我放了一个对照组，就是玉帝下旨要拿杨婵的鲜血祭旗时杨戬的反应。我们都知道这个妹妹是他唯一的亲人对他来说也非常重要。</p> <p>对照组的意义在于同样是受到危险，杨戬面对妹妹的情况就还保持了理智，甚至说“想用三妹来威胁我，是打错算盘了”完美对照了上面提到的杨戬不受任何人威胁。</p> <p>但是转过头再看顶罪戏，玉帝的旨意很明显不是威胁而是来真的，却能让杨戬瞬间忘了自己刚刚说过的话“我司法天神这个位子还没做够呢”。寸心在他心中地位可见一斑。</p> <p>在此也奉劝各位平时批评人家老婆的时候先想一想二哥这个暴脾气和胖蛟的威力。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/97.嗑学/20.糖渣合集/06.chap_7.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%A7%86%E9%A2%91" title="标签">#视频</a><a href="/tags/?tag=%E7%B3%96%E6%B8%A3%E5%90%88%E9%9B%86" title="标签">#糖渣合集</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/02e408/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Chapter 6 没拿自己当外人篇</div></a> <a href="/pages/bdeb66/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">Chapter 8 狂饮一缸醋篇</div></a></div> <div class="page
