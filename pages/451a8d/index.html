K/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">被丁香打了之后<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>西海之中水波粼粼，靠近南山山脉的那一片海域是三公主的封地，自从她被降下责罚剥夺了封号，便被老龙王安置在这里。</p> <p>今日内阁中的宫人行动不似以往随意，过往的小婢皆低着头匆匆而过，不敢向内张望一眼。外殿上，几个草头神衣甲森然，手持长长的银色钢枪严守殿宇。</p> <p>三公主坐在杨戬的腿上，手持一盒栀子花膏，正细细地将小盒子中的药膏轻轻点涂在他发青的眼眶上。前些天杨戬因为追捕沉香一事而被孙悟空牛魔王等人围攻，想不到一时不查，被吃了太上老君一粒仙丹的丁香一拳打在眼角，是以留了淤青，回到三公主府上时，小殿下正忧心他，一见那人面上伤痕，又是一阵酸涩涩的心痛。</p> <p>龙女将前夫按坐在榻前，吩咐婢女取了栀子花膏来与他涂抹。这厮有天大的本事，以往即使打架降妖时磕了碰了，多在不打紧的地方，他也多不教寸心知晓。而今次竟然一拳打在面上，这位郎君又是如此剑眉星目面若美玉，多少让人爱怜恼怒，暗骂那群忘恩负义的混账识不清善恶。</p> <p>寸心替他抹完药，还不放心，又凑近他的脸细细端详了番，皱着眉，纤纤玉指轻轻点在伤口近处，又是一阵心疼：“到底是怎么搞成这样的？”</p> <p>“不妨事。”杨戬将她揽到怀里，捉住她的手放在心口，“个把小伤，又有什么好担心的。”</p> <p>敖寸心仍愤愤不平：“怎么就不担心了？你在外面，整日不知是死是活。是谁打你？我总有一天要揍回来！”</p> <p>杨戬喷地一笑：“就你这小泥鳅还想翻出花浪来呢。”</p> <p>敖寸心闻言大怒：“你说谁是小泥鳅！”作势就要拧他的腰，但见他面上的淤青，不由心软，终究没有拧下去。</p> <p>“不必担心，”杨戬见此，心中一动，将她圈在怀里，轻轻摇晃，“就他们的本事，多少伤我不得。况且我还有宝莲灯。”</p> <p>“多少伤你不得！”龙女皱起眉大声重复这句话，“你这目中无人的混人，被打得面上挂彩，还要在我面前逞强吗？”她越说越说伤心，连带着几日的担忧涌上心头，一时间忍不住落下泪来，“你若是还顾及我，顾及我腹中的孩儿，就别再逞强，万事都着紧着自己多些，好叫我在这暗无天日的海底，不必再为你日日忧心。”</p> <p>杨戬连忙哄道：“好，好，我一定多顾着自己的。诺，你乖乖地，不许哭了，好让我也放心你，好不好？”自从她身怀有孕，杨戬几乎要分作两半，一半儿更加挂念海底的妻子，一半儿筹谋大局，分身乏术。见她仍旧不好，只好又解释：“打这淤青的不是别人，乃是凡间一个小小的女子，名唤丁香。这小女娃吃了一粒太上老君的仙丹，又承了我三成的法力襄助沉香，所以力大无穷。我本不会教她暗算，你当我为什么不躲？”</p> <p>敖寸心听到此处，也顾不得哭，趴在杨戬怀中，好奇地问道：“为什么？”</p> <p>杨戬温柔地一笑，伸手捏了捏她糯软的小脸：“你没见她，自然想不到，这小姑娘，居然同你有七分相似。”他回忆起初见丁香的华山，摇头笑道：“当时我在华山脚下击碎她的面具，一眼过去，几乎吓得魂飞魄散。以为你偷跑出海，一个人到这危险的境地，嗯……”杨戬想了想，故意逗她：“如若被别人看见，少不得在御前参我一本。”</p> <p>敖寸心闻言，笑道：“好哇，你这大大的奸臣，只晓得自己官途亨达，全然想不到我这结发妻子的死活，没良心！”轻轻地捶了一下他的臂膀，依偎在他肩头，问道：“你见她像我，就让人家打你？”</p> <p>“那倒不是，”杨戬摇摇头，“只不过我正和群仙酣战，她乍然出现在我眼前，我愣了一会儿，不想伤她，就斥了她一声。谁想到她恼羞成怒，一拳击在我面上，来得匆忙，我没有防备。”他回想了一下当时场景，又是一笑：“她一拳之后，我又是一愣，可看她和你如此相似的脸，想到你，又不由得心软，不愿还手。不料她反手又是一拳，击在我丹田左近，将我直接击飞到远处，倒是帮我脱出一困了。”</p> <p>“丹田……”敖寸心一惊，背后吓出几滴冷汗，“你的罩门……”</p> <p>“放心，”杨戬揉了揉她的肩膀，宽慰道：“这么重要的地方，我不会教人轻易碰到。”</p> <p>“你最好是。”寸心一撇嘴，从他怀中坐起身，又凑近他眼角的淤青，细细看了片刻，又嘟起嘴，超他轻轻吹了几口凉丝丝的小气，担忧道：“还疼不疼？”</p> <p>“好啦，”杨戬凑上前亲了一口她红润的小脸，“早就没事了。”他见寸心如此挂念自己，不由得心头熨帖，连日来的疲惫皆烟消云散。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/082022.被丁香打了之后.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/c92660/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">金丝红浪</div></a> <a href="/pages/c6746b/" class="page-nav
