JyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">春潮带雨晚来急<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>杨戬这厮，着甚衣服都能玉树临风，正气凛然。正如他一身水合道袍，高束鬓发，金丝方带。虽则不再年轻懵懂，打扮下来端地还似个青葱少年郎。</p> <p>三公主却不做此想，只道世上男子皆是衣冠禽兽，便坦荡如杨戬也不能幸免。远乏人欲烟火几百年，这人妙道玄功，阳气总不能竭，昔年同娇妻相伴自是日日有渠相泄，可阔别已久，一夕相会，芙蓉帐暖，春宵苦短，海棠也惧梨花重繁。</p> <p>如玉郎君止不住真气乱窜，将滚烫肌肤一气去探胜雪妙处。道袍繁琐，发髻高耸，本是昔日修道讲经入定去念的道场，刻下却教他紧闭窗门携了女子做这至欲之事，她婉转承欢，妙曼已极，檀口微开，吐气如兰。只叫他念及日夜相伴的一千余年，鸳鸯如何抵死缠绵。</p> <p>早已高耸入云，坚比他山。几年分离，几年相思。若非政事繁琐，无瑕它念，又兼玄功傍身，固本守精，他早已为欲疯魔——谁道神仙无欲无求？</p> <p>“你……轻些……”龙女只惧自个儿这幅身板承受不住，必竟分离这样多年。</p> <p>“嗯……”不欲叫她难受，只得强忍埋头将前戏做到底。郎君埋首在凝脂白玉，温热腻滑直传入脑，熟悉香气长催人欲，不时流连长睫吻她眉眼，不时辗转晶莹红诱似要拆吃入腹。身下人哼叫连连，柔弱已极，藤蔓附树，坎坷浮沉，寻根不得。</p> <p>双掌不歇，寸寸相逼。只怕佳人久无人疏，冒进有失。将妙处拿捏，亵玩熟稔。龙女娇弱，如何受得？何况长无耕耘，敏感更甚。须臾江河泛滥，沾湿郎君掌心。那人一心开拓阵地，一指探入，灵动深浅。只似玩弄，实则心急，顾念于她。</p> <p>听耳边呼声愈高，手下纠缠更甚，郎君快意，多入一指，捣弄许久，却将己身逼得大汗淋漓。转瞬直似长久，度日如年。娇峰雪乳翻腾，恍花他眼，空余逼上，揉捏快意，感官舒畅，长叹一声，爽快已极。</p> <p>只将龙女浑身侵犯，亵玩掌间。过分勾魂摄魄，郎君把持不住，道袍尽褪，寻到泉眼，徐徐挤进。</p> <p>太过刺激，久疏女色，敏感非常。寸心亦是旷得长久，逼仄的空间将他挤得辛苦，快意层层叠叠，堆积在脑中，视线也模糊。人欲之事极乐之境，教美人屈指一勾，媚眼稍带，登时不着四六，神智尽失。按捺不住，喉间底喘溢出，只觉身下一紧，被争先恐后死死绞紧，怎耐得住这般诱惑！杨戬喘着粗气，劲腰一抖，不顾佳人仰起臻首抓破了他脊背，兀地撞入了温柔乡中。</p> <p>娇弱公主哪里受得住？咿呀呻吟不成语调，细弱胳膊攀附上坚实臂膀，如瓢泼大雨之下细嫩娇花，思及他往日勇猛，又羞又怕。睁眼瞧见上首男子性感非常的喉结上下滚动，不知何处精魅迷了心窍，居然张开檀口，和舌吮下。</p> <p>杨戬不防，脑中登时仿佛烟花炸开 ，本来身下过分逼仄，他多年无此俗事，教她撩拨紧夹精关不稳，刻下哪里忍得？种种细微触觉放大几倍不止，一时居然守不住，只低吼一声：“哈！啊——”竟颤抖抽搐，一时多年禁欲玄功大破，埋首在龙女颈间，浑身肌肉紧绷，闭紧双眼，将自己尽数交待给了她。</p> <p>龙女只觉那话儿一阵抖动，稍微往外退了几许。身上那人浑身都僵直了，满面欲色，呼吸陡然急促，只停得一瞬，整个人都俯身压下来，靠在自己的肩窝处，粗喘不止。</p> <p>这……
可就……了事？
他往日不是……
莫不是分离这些年，他……伤了根本……</p> <p>龙女怔愣在原处，昔年郎君精粹交付之后最是娇软，埋头佳人怀中极尽脆弱之相。三公主爱念于他，自然怜惜不止，只若飞鸟寻泉，落叶归根，杨戬教温柔妻子搂住头颈，细抚发丝，心中柔软不已，只觉格外安心属意。</p> <p>可刻下寸心却怔住没去抱他，双手只扶在郎君肩膀，进也不是，退也不是，兀自没了主意。郎君刺激感过，察觉自己方才竟去了一遭，俯在龙女身上，一时大赧。</p> <p>须臾龙女回过神来，忽然念及什么，顺手便将郎君支着胸膛扶起来了。杨戬仍喘息不止，两人相隔甚进，鼻息打在她脸上，教她断念又起，何况下身仍未分离，藕断丝连……龙女一顿，连忙止住了绮思，附上那人汗湿的脸庞，尽己所能将神色填满温柔关心，张口问他：“你是不是公务太忙？累了便早些休息，就别……”</p> <p>实则是她顾念郎君，当真担心。早非懵懂幼女，她自然知道男子于此事多么上心，龙女用了自个儿十成的好颜色，却抵不过郎君尴尬之下发狠的情绪。</p> <p>“啧……”郎君整张脸都红透，懊恼夹杂羞恼，对上姑娘体贴的眼神，教他整个人都不好了。</p> <p>“再……再来……”说什么都是错，索性不说。战神尴尬着抓起抚在面上的柔荑，轻压下去，再衔那透亮红润，只怕她再讲出什么惊诧之语。</p> <p>初时顾念姑娘柔弱，极尽温和，此番动作携了那人羞恼情绪，宛若暴风骤雨，缠绵不休，直将她折腾得樱唇微肿，气息不稳，才堪堪罢休。龙女性烈，兀一纠缠，只觉无辜微恼：“明明你这混人不行，倒折腾起我来了？”</p> <p>念罢一推埋首苦干的郎君，自发一紧。那话儿还未苏醒，居然教她逼得往外一滑。杨戬低声一吼，把住她纤细腰肢咬牙切齿：“做什么！”</p> <p>“真君和我分开这么些年怎地就……早知如此合该劳燕分飞何苦我巴巴来守这活……”龙女一恼嘴边向来没个轻重，杨戬虽明白她秉性如此，但此事实在太过，如何他也是个男人怎生受得？不愿在给她说下去，他俯身又堵娇嫩，直将她吻得咿咿呀呀，溃不成军，这才稍离。捏捏她红润脸颊，凑近细白耳垂呢喃低语：“是小神的错，这就找回场子来。”羞怯是真，却不肯坦然，还要嘴硬。</p> <p>早又回还元阳，不敢大意，守稳精关，一意赴云雨山巅。世途坎坷，胯下颠簸。语句破碎，闻于耳中，宛若雨打芭蕉，清脆婉转。只极尽纠缠，金丝红浪翻捡魂魄，烫骨焚身，桃花灼爱火。战神本色，能耐到底非常，来去几遭，公主泛滥成灾，天神兀自酣战。身下缠绵，心心相印，雪峰颤抖，只近唇相欺，侵占掠夺，不剩分毫。忽尔尖叫高吟，攀紧依附，若洪流下绢布之于巨石，可笑龙女本是海中娇客，竟似溺水于此。</p> <p>恁个佳客揉身化修罗，她绞紧，直哭泣告饶，得人温柔抚慰，颠簸不绝，快意怎生休？</p> <p>战数回合，再承受不住，终于云收雨歇，杨戬贴在佳人身边，气喘渐平。郎君还要在意，收紧龙女柔软纤细的腰肢，低声问：“可还满意？”</p> <p>三公主昏沉哭喊：“歇了罢，够了我再不愿疑你。”</p> <p>神君一笑，将阔别已久的妻子紧紧揽入怀中，谓叹一声，相携入梦。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/89.短篇-2019/100700.春潮带雨晚来急.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only"
