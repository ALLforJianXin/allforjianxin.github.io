locBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">宝莲灯歪传（5）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p><a href="https://jianxinonly.lofter.com/" target="_blank" rel="noopener noreferrer">前后文见<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <hr> <p>cp：神话戬×宝前寸</p> <p>文中游戏框架设定部分参考手游《倩女幽魂》。</p> <br> <ol start="5"><li></li></ol> <br> <p>在敖烈的预想里，披着敖寸心皮的杨戬，应该在孙悟空被颁发史无前例的【预言家今晚刀你】头衔之后，被全服玩家追杀，并且最后，敖寸心本尊顶着粉红色的圣光从天而降，解救杨戬于水火之中。</p> <p>这样一来，他三妹对杨戬有恩，那不就正正好方便敖烈算计这个杨戬？</p> <br> <p>不得不说，敖烈的预想在一开始，其实还是很美好而缜密的。</p> <p>首先，杨戬必须得被追杀。其次，杨戬必须在被追杀的同时不被真的杀死。不然的话，这就违背了自己要他活到见到敖寸心本尊时候的目的了。</p> <p>所以，在这个横空出世的追杀关卡，敖烈煞费苦心地为杨戬设置了好多活命技能。</p> <p>最初级的技能，咳，砸家具。</p> <br> <p>杨戬眼睁睁见着，世界频道对他这个全服唯一敖寸心喊打喊杀，得亏他在帮会里，除了敌对帮会的人做任务时会被npc送进来，旁人轻易进不得的。但是这个敌对帮会的任务，也是有时间限制的，譬如现在就不在做任务的时间点。如果敌对帮会的人非得要强行进入这个【相亲相爱一家人】帮会，首先得花钱买入场券，然后还需要切换战斗状态，导致其挨揍风险大大提高，之后还得在打一个不是很难但十分复杂的副本任务，才能进入这个帮会。</p> <p>这么费劲，一般人是闲的，才会特特来【相亲相爱一家人】的帮会堵他。</p> <p>这正好也给了杨戬一个机会，让他能试试敖寸心的技能。</p> <p>说来也奇怪，自从孙悟空激发了【预言家今晚刀你】这个头衔之后，杨戬的技能面板突然就换成了七个全新的技能。杨戬起先还有点不解，杨婵就站在他身边捂嘴笑道：“二哥，这是这个游戏体贴，知道你等下要被全服玩家追杀了，所以特地来给你装备一下全新技能的吧。”</p> <br> <p>体贴？</p> <p>杨戬嘴角默默抽搐。</p> <p>如果当真是体贴，那这个游戏就不该让自己沦落到现在这个被全网追杀的境地！</p> <p>但是腹诽归腹诽，左右事情都已经到了这个地步了，杨戬除了练一练这新出的七个技能，也没别的办法了。</p> <p>是以很显然，当杨戬要练身手的时候，自然是要有人陪他切磋这些技能的功效的。谁能切磋？</p> <p>那必然是【预言家今晚刀你】的孙悟空。</p> <br> <p>是故，站在帮派正中央，正威风凛凛得意洋洋的孙悟空，正在扛着金箍棒仰天长笑时，忽然便被稀里哗啦的家具给砸了个头昏眼花，眼冒金星。</p> <p>帮派里的人见状，都傻了眼。</p> <p>不是傻眼于孙悟空被砸，毕竟傻子都能看得出来，这个新来的“敖寸心”，对孙悟空的敌意大得很。之所以傻眼，是敖寸心的家具砸得实在太狠一些了，杀伤力也忒大了。</p> <br> <p>站在帮派正中央的孙悟空还在眼花缭乱，血条直掉，帮会频道里，孙悟空本尊已经开始不服气地嚷嚷起来了。</p> <p>〖帮会〗【摘蟠桃去也】这个你二大爷！你是谁大爷！贸然冲撞我作甚！</p> <p>〖帮会〗【回收旧钉耙】俺老猪可算是见世面嘞（默默咽口水）</p> <p>〖帮会〗【我是大力士】师父，你到底是站哪一边的呀？</p> <p>〖帮会〗【回收旧钉耙】三公主生得这么好看，俺老猪自然是站……</p> <p>〖帮会〗【摘蟠桃去也】啐！呆子！你可别忘了，嫦娥仙子，也在这个帮派！</p> <p>〖帮会〗【树下有座茅草屋】大家静一静，兴许是误会了。方才这位二大爷，同大圣交手之后，大圣就有了全新出炉的头衔，所以，二大爷一直在对大圣进行技能演练，说不定是想试一试，能不能激发出新的奇遇。</p> <p>〖帮会〗【债蟠桃去也】呔！还是三圣母考虑得周全。这样罢，这位——敖春的三姐夫，您就在这儿，慢慢试吧啊，俺老孙去吃蟠桃去！</p> <br> <p>果不其然，杨婵这话说完之后，大家纷纷表示认同，连杨戬也不得不佩服自家三妹这个胡说八道，不是，信口拈来的本事。原想吹捧一番三妹，却在瞧见那死猴子的一声“敖春的三姐夫”之后，杨戬的笑容僵在了脸上。</p> <p>死猴子，这摆明是来恶心自己的。</p> <p>死猴子，明明他都暂且不知晓自己的身份，怎的还是一直在跟自己作对？</p> <p>但是杨戬转念一想，若不是方才自己逞一时意气，也没法给死猴子落下“敖春他三姐夫”的把柄。说到底，这其实是他自己自作自受了。</p> <p>杨戬未免便有些悻悻。</p> <p>这时候，杨婵一看杨戬这神情，便知道杨戬在想什么，不由得掩嘴偷笑，觉得自家二哥玩了这个宝莲灯歪传之后，性子倒都活泼不少。</p> <p>但她也不想揭穿，反倒是温温柔柔地推了推杨戬，说：“二哥，既然如此，你还愣着做什么？我们先开始吧。”</p> <br> <p>不得不说，敖寸心这新出的七个神秘隐藏技能，是有些奇葩在里面的。</p> <p>比如这个砸家具。完完全全就是高举起家具，乱甩一气，杀伤力极大，但是持久度不高。基本上转眼的功夫，便有特效，能将这片狼藉给涂抹干净。</p> <p>帮会里的所有角色都一一捱过“敖寸心”砸家具的苦了，突然有人开口，惊异道：“不过，你们有没有发现，这个砸家具的技能，在清除技能的时候，特效有点奇怪啊？”</p> <p>不说倒好，一开口，众人便纷纷留意起来了。可巧，这时候只差嫦娥未被砸过。杨戬看着嫦娥这个三不五时被自己推出来做倒霉蛋的模样，其实有点不忍心。</p> <p>手才稍微停顿了那么一会，看了帮会频道聊天记录故而好奇心高涨的杨婵却是忍不住，眼疾手快地伸出手，替他重重点击了一下。</p> <p>果不其然，特效比起其他人的对打特效而言，消失的方式确实是有点奇异。</p> <br> <p>发现特效奇异的是小玉。正当帮会频道里七嘴八舌地夸赞小玉，说她心细时，小玉却又开口，笃定地说：“不对。西海三公主攻击嫦娥仙子的时候，和她攻击其他人时，是不同的。”</p> <p>小玉是心细的，大家自然都听她。这时候是需要再让敖寸心攻击多一个人，好进行特效的比对。</p> <p>帮会里的人都被攻击完了，而且这个技能的爆发力还很强，大家被攻击掉了四分之三的血条，至今都还没恢复过来。若是为了比对，而重复攻击他们其中的某一个人的话，恐怕就会直接血条跳0，当场死亡了。</p> <p>这就陷入死局了。</p> <br> <p>一派沉默中，沉香突然恍然大悟，兴奋地跳出来，说：“不对，还有方法。我当时为了能够更好地采样调查用户的体验，我还申请了小号来体验的。”</p> <p>敖春便好奇问：“你的小号是什么觉得？”</p> <p>猪八戒附和：“对啊对啊，小号的角色很重要。要是又来了一个嫦娥妹妹，那这个特效比对的事，可不好搞啊。”</p> <p>沉香忙摇头，正想开口，却又突然意识到了什么，马上变得支吾</p> <br> <p>〖帮会〗【小玉说得对】呃，这个，那个……我申请的小号，是舅舅的角色。</p> <br> <p>……好家伙！</p> <p>杨戬额头的青筋，十分欢快地跳了跳。</p> <p>但比起沉默恼怒的杨戬，帮会其他人却不同。当他们得知沉香还额外申请了一个杨戬的小号在帮会的时候，立刻变得兴高采烈，炸开了锅。</p> <p>谁说不是呢！西海三公主这个角色的任务，一直都和杨戬死死捆绑住，偏偏他们帮会因为组成特殊，至今都没有一个杨戬出来捱敖寸心的打。这下可好，沉香的小号，岂不是久旱逢甘霖？</p> <br> <p>杨戬看着热闹的帮会频道，沉默得更厉害了。</p> <p>不知道为什么，他的直觉告诉他，如果他真的用这个“敖寸心”，去朝着那个“杨戬”砸了家具，画面兴许……会很热闹。</p></div></div> <!----> <div class="page-
