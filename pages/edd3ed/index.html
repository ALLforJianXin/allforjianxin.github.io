----></h1> <!----> <div class="theme-vdoing-content content__default"><p>新宪既成普天同庆真君神殿却成了这九重天上最最忙碌的所在，寸心赦免起复的折子是杨戬最最早批的早遣人送下去了，之后他一路奋笔疾书夜以继日，满心期待着此间事了无事身轻好去做西海女婿。<br>
大殿的门开了走进一人，杨戬没抬头，听脚步便知定是老六，想他定带着寸心的消息不由得唇角起了笑意，却还要拿些架子，只说：“怎么样？西海的人没有为难你吧？”话音未落只听他那结拜兄弟急吼吼吼他：“二爷，别批折子了！”<br>
真君大人满脸狐疑抬起头投去询问的目光，直健往日就不是个会说的，这时几番张张口再闭上，半晌咬牙挤出一句：“华盖星君的聘礼已经进了西海啦！”</p> <p>华盖星敖丙——杨大天神化作流光直扑西海的路上将其人其事略作盘点——东海龙王敖广第三子，敖听心亲哥敖寸心堂兄，在封神之战开幕前便被哪吒扒皮抽筋一命呜呼，当初两个龙女还找上金光洞要替兄寻仇呢是他杨戬将人挡了回去。也是他杨戬，在师叔姜子牙编纂封神榜时状似无意跟哪吒在旁边聊天：“哪吒兄弟，当初被你打死的龙子是叫什么啊？他也算是助你脱胎换骨的机缘，天意了。”<br>
——若是早知今日，他当初就不必多嘴了！</p> <p>化作流光的杨二郎没有在岸边停留，但到底是没做出直闯水晶宫的行径，停在牌楼前幻回人身，拾阶而上，让看门的虾兵蟹将“快去通报，就说杨戬来了！”一个虾兵领命去了跑得跌跌撞撞，另一个被剩下的握着兵器倚着殿门八只脚止不住打颤，杨戬不欲先造杀孽便行开几步，忽听得有壳片敲击的声响，循声望去龙宫门前竟栽植着一棵红豆树，红豆树上挂满了风铃，虽不像杨府的风铃多为木简竹片，但一样是红绸穿就，难道是……<br>
不等他难道完八部天龙广力菩萨就从内迎了出来。<br>
见得是敖烈来迎杨戬忙敛了思绪敛了杀气——一来佛门中人多少给些面子，二来三太子毕竟是三公主的亲哥哥——拱手一礼：“菩萨慈悲。杨戬叨扰了。”<br>
敖烈倒也不拘虚礼，一句“真君这边请”就带着杨二郎进去，路上才说“今日家宴，不妨真君驾到有失远迎。既然来了就一起吃呗？”杨戬刚刚点头应是帘子一掀就看得满厅礼箱红得扎眼，再往前正中一个团圆桌，上首坐着龙王龙后，寸心挨着龙后坐，龙王下手处是个面生的龙子，虽亦算得仪表堂堂但较之西海大太子摩昂少了气度，较二太子敖荣不够涵养，更无三太子菩萨低眉的心肠，定是敖丙了——只他何德何能坐此高位？难道议亲之事已得了高堂首肯？！<br>
杨戬心下惊疑着不由得将恳切目光向寸心递去，撞进眼来的是龙女焦急表情还有几欲上前来却被龙后扯住了，突然就定心不少。</p> <p>“司法天神大驾光临让西海蓬荜生辉，”龙王爷还是老一套说辞，“承蒙真君赏光，就请入席共乐吧。”说着直接让出了主位——这杨戬是万万不能去坐的。<br>
“杨戬今日拜访不为公事，当不得龙王爷让席。”深鞠躬鞠到底，摆足晚辈姿态，堂上众人都停了一会儿还是大太子拿主意，挪开了广力菩萨的碗筷：“真君就坐这里吧。”——那位置紧挨着龙女。</p> <p>杨戬在寸心身边坐下，正对面就是华盖星君敖丙了。<br>
龙宫宴席尽是山珍海味，可在座诸位除了二太子敖荣其他人这饭都吃得味同嚼蜡，尤其是敖丙，杨戬来之前叔叔婶婶明明同他言笑晏晏，还跟堂兄弟们一起回忆小时候和寸心玩闹的糗事，怎么这三只眼的来了之后好像满龙宫他才是那个外人？！<br>
嚼完嘴里的凤翅华盖星君心一横——虽然这厮位高权重仅仅二圣在其上，但自己礼都带来了话都说出口了这时候怂了叔叔婶婶如何看他堂兄弟们如何看他更重要的是寸心妹妹该如何看他？绝丢不起这龙！——便紧接着杨戬来之前的话头继续说：“我跟寸心也算是青梅竹马两小无猜，”<br>
喜滋滋坐到了寸心身旁的杨二郎只顾着打量龙女——她好似瘦了？不过气色还好。在家过得应该还不错吧。我真该早点来看她的。<br>
“早前我们也议过亲，”<br>
什么？！<br>
不等杨天神反应敖丙已顺着将词背完了，“若不是我当年身死困于封神台，后又受制于天宪，我和寸心早该儿孙绕膝了。”<br>
这短短几句话接连踩炸几个大雷，又是婚约又是儿女的，杨二郎本想张口直斥话到嘴边心念一动忽忆起些陈年往事——“我也是你的救命恩人，不让我们报仇，我就死在你面前！”——她是拿自杀胁迫过自己要为敖丙报仇的，该不会他们真的……肉身成圣的杨二郎这霎时也体会了一把五内俱焚的感觉，耳鸣眼花冷汗直流，直到台面下伸来一只温热的小手。<br>
先低头看去是龙女柔若无骨的小手覆在他手上，白皙的皮肤在他的深色映衬下愈发鲜明，削葱般的指尖在他手背上摩挲似是安抚，再抬头看看，龙女满眼紧张望着他还微微摇了摇头——这便是那小龙子胡说了！一时间二郎神底气又足了：“华盖星君莫要信口开河，寸心从不知有此事。”<br>
毕竟是几百年司法神积威深重，这话一出压得敖丙嚅嚅难言，好半天才鼓起勇气辩解道：“当初我父王母后和叔叔婶婶还在计议当中我便出了事……”说着似觉得揭自己气短又改口说起，“四妹妹都跟我说了，寸心和她同上金光洞为我报仇，寸心他为了我，她为了我……”说到这里眼光闪烁竟是感动得几欲流泪。<br>
“敖丙太子慎言！”寸心怕这堂兄误解正要开口，却被杨戬抢了先。那人喝止了东海三太子的同时台下的手也翻覆起来握住她的手，掌心的温度烫得她走了下神，再听到的就是，“……从您罹难到我和寸心成婚不过三五年间，三哥这是要污蔑寸心朝三暮四吗？”寸心心底暗暗吐槽这人讲话也是春秋笔法，人又说，“是三哥您一厢情愿了吧。”哼，你光说我们成婚怎不提我们早已和离了，你这也是一厢情愿吧。<br>
虽对杨戬这几千年不改的大包大揽有些小小不满，但到底还是澄清误会事大，寸心清清嗓也开口了：“敖丙哥哥，我知道你对我很好，小时候你陪我去捡贝壳一捡就是一天，还吹海螺给我听，”桌下握住她的手好像僵了僵，“但那都是小孩子的玩笑，我是真的只当你是哥哥，寸心从未想过哥哥之外的事情。”又放松了。<br>
但不知这话听在敖丙耳中如何会错了意，这龙子竟感动流泪道：“寸心妹妹，你还记得！”抬手拭去泪痕，“你上次成婚时我还是孤魂野鬼，出不得封神台，可现在不一样了。现在不一样了，我现在囫囵囵好好的，现在我带着……”<br>
“聘礼”二字尚未出口杨二郎再坐不住了，霍然起立摆足天廷首辅的派头：“敖丙太子如何成了华盖星君也不多说了，只您现在能来西海还没被压上斩仙台，您就该先谢谢我杨某人吧！”——他站得急没顾上放开握着的龙女的手，私下的暗通款曲就这样猝不及防摆上台面——龙王龙后相视不言，二太子继续吃得津津有味，广力菩萨转起佛珠，大太子摩昂暗暗挺起脊背左右扫视忖度着哪个会先动手。</p> <p>水晶宫中一时间剑拔弩张，华盖星君一只手指指点点着那二人相牵的手，二郎神见状还更握紧了些，更拉着龙女向自己身边靠了靠。<br>
敖丙快被这人哦不这神的不要脸气昏了，尤其是寸心妹妹竟不反抗，竟没有丝毫不悦。他来之前也是左思右想深思熟虑了，人都道二郎神和他这妹子千年婚姻痛苦纠缠，后来和离了妹子还替他顶罪吃了挂落，如今天宪新开自己带着聘礼带着满腔热情来——西海龙宫门前那棵红豆树已亭亭如盖，他的寸心妹妹不是该等着他来带她脱离苦海吗？怎么会这样？为什么会这样呢？真的是官大一级压死人吗恩威并施叫他如何抗衡……想到此节恰闻菩萨开口。<br>
广力菩萨停了转珠，笑吟吟道：“敖丙太子当年为哪吒所杀，哪吒是真君的好兄弟，二郎真君只当是替兄弟还了华盖星君一命，这便两不相欠了。”<br>
几句话点醒梦中人，另一个三太子也似找回思路：“正是此理。至于斩仙台之说——司法天神确是迎出新宪的最大功臣，但小子的聘礼现下就摆在这厅中，只待叔叔婶婶首肯——待我和寸心成婚之时定特特向您敬酒，以谢成全！”说着就要绕过来拉开龙女。</p> <p>杨戬手里已经捏紧折扇，摩昂太子也背起手，只怕敖丙还没挨到龙女这堂上就要刀兵相见了却听得——“梅山兄弟送司法府礼到”——殿门开处梅山老大打头，紧接着梅山六兄弟并许多草头神鱼贯而入，两两一对担着半人多高红漆大箱箱上还绑满结作喜庆红花的丝绸赤带，梅山老大康安裕卸完担子直趋向杨戬身后站定，先拱手朝龙王龙后并几个西海太子问了好，再用在场众人都听得到的声量向杨戬笑着“抱怨”：“二爷您腿脚太快了兄弟们都跟不上。没来晚吧？没耽误您大事儿吧？”最后转向寸心问一声，“三公主，好久不见，别来无恙啊。”一套操作下来浑不将华盖星放在眼中。</p> <p>敖丙看着厅堂内左右排开泾渭分明的礼箱，司法府财大气粗礼箱不止更大也更多，看起来好似他大势已去了。可到底几千年的情愫哪能轻易放下？是封神未久时看到杨府灶神奏章抄本又重燃起的希冀啊，也是不久前灵霄殿上亲耳听到那厮诉述“若得仙子真心”时恨不得食其肉饮其血的嫉恨——他这般三心二意，他如何配得上寸心！<br>
“二郎神，你便去披你的月光！何必又来招惹我寸心妹妹？”华盖星君说着挥起画戟便攻杨戬下盘，杨二郎手中折扇也早化作三尖两刃格开这一下，敖丙收势再战回身向其面门刺去走势未老却硬生生收住累得自己连退几步——是龙女挡在了他们中间。<br>
“敖丙哥哥，快住手吧。”龙女知道杨戬手段，自然也清楚敖丙绝不是他的对手，这一时冲进来隔开后就急急劝道。<br>
“寸心，你别再被他骗了！”东海三太子见小妹袒护那人简直睚眦欲裂。<br>
那头杨二郎也不罢休，“敖丙！你不要血口喷人！”直要越过龙女来。<br>
却是被龙女就着他扣上她肩头的手转了半圈拦住了，两条柔嫩的臂膀就搭在他腰侧：“你伤好透了么？这就与人动手，别动到伤口了。”</p> <p>此言一出，尘埃落定。<br>
华盖星君撂了兵器颓然坐下，背景里龙后笑眯眯向龙王摊开手，龙王爷苦笑着摇摇头，掏出钱袋欲打开，龙后不耐烦整个抢了过去。</p> <p>杨戬闻言如听天籁，再看看龙女一脸紧张关切的小模样，还有什么不满意的？刚刚种种都抛去脑后随风消散了。<br>
“我没事。”忙牵起小手。<br>
“没事就好。”龙女挣了挣没挣开，也便由他握着。<br>
“寸心我可以解释的，你不要听别人乱说……”杨戬这时眼里早没了旁人只想着赶快把心剖给龙女看，生怕再弄丢她了。<br>
倒是寸心还记得这是在大殿上周围还有她一家龙口并许多人等，阻住他的口无遮拦：“好啦好啦，你人都来了，我还有什么不明白的呢？”</p> <hr> <p>华盖星君被充当挑夫的草头神裹挟着一路行出龙宫，回过神来时发现自己正停在红豆树下。正当敖丙深情抚摸树干欲再纪念一下自己与小堂妹青梅竹马的过往时，竟听得有人向这边来：“……风铃啊，是我做的。”——是寸心！<br>
敖丙忙往侧边闪避开，借着珊瑚假山的掩护隐在暗处，看清楚是寸心和那三只眼的一道行来的，“这树种还是敖丙哥哥送我的呢，”听到此处他冰冷的心刚刚有一丝回温，“我离开杨府回家后无聊才给种了，没想到红豆树居然在海里也能种活，还能长这么大。”又更凉了。<br>
“你若有意可以移栽到家里。”<br>
“不必了，我们以后再种便是。”<br>
斩钉截铁不带丝毫留恋，他两个后面又说了什么敖丙没再听下去，听不听又有什么分别呢？总归你们是千年神仙眷侣又将合回一处，他只是鼻头有些酸，心里也酸，有句话堵在心口可能没有机会再跟她说了：“傻丫头，普通的红豆树怎么可能在海里种得活呢？”</p> <hr> <p>“寸心，我也要跟你一起吹小海螺。”<br>
“唔，好呀……”</p> <hr> <p>司法府后来裁换了，听说真君神殿又搬回了灌江口。<br>
华盖星君又一次缺席他西海堂妹的婚礼，他是在之后一次上朝时听哪吒说的，礼成后新郎新娘特地在亲朋好友的见证下合种了一棵合欢树。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/05.05.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/fec6dc/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">偷香</div></a> <a href="/pages/1f5c2a/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">很刺激</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
