人定然是人官场上的情人，作案来的！</p> <p>再说屋内，许久不见自个儿这“情人”，龙女委实有些挂念他，蹦下榻来只往他身上扑。郎君熟练接住龙女，顺手关上了身后的房门。</p> <p>龙女贵气，不用烟熏火燎的火烛，房中一应大大小小的夜明珠。柔和的光线撒到郎君高挑的鼻梁上，挡住了一侧脸颊半数的光线，隐隐约约勾勒他面部的线条，俊俏得超凡脱俗。</p> <p>郎君见她痴痴望着自个儿，噗嗤一声笑开，伸手去捏捏她的脸，道：“小殿下可瞧呆了。”</p> <p>龙女叫人拉回魂儿来，倒也不恼，素手抚上他的脸，似是挑逗，感慨不已：“谁让你这般好看。”</p> <p>郎君心中一动，手抚到她的臀上一托，将她整个人掂到了身上，抱着往榻边走。边走边轻轻用力，拍了一下她的屁股：“鞋也不知道穿。”往下一瞧，晃晃悠悠地不正是洁白的脚丫子。</p> <p>是了，此间这位郎君，可不就是九重天上权倾天下的二郎真君，批下这块地皮真正是轻而易举。</p> <p>不过这郎君心中正气，天宪都由他一手迎出，这等监守自盗的行为，一向是他主要打击的对象。</p> <p>这处灵力丰沛的地方虽然偏远，但其实归于巴蜀。</p> <p>刚好杨戬是巴蜀川主。</p> <p>三公主同杨戬还是夫妻的时候，因这小殿下怕热，真君大手一挥，开山动土，在这仙气飘飘的地方给妻子修建了一座奢华的行宫。（行宫梗来源于鱼头的避暑）后来两人和离、顶罪、诀别……丝丝缕缕牵缠，直至今日，依旧藕断丝连。</p> <p>杨戬褪下中衣，将敖寸心一双泛红的玉足抱在手中捂着。三公主瞧他这幅体贴模样，心下柔软，坐直身子将他的脸勾过来吻了一下。</p> <p>吻罢顺势靠上他的肩膀，杨戬嘴角上扬，偏头去嗅了嗅她的头发。</p> <p>杨戬的手心很暖，须臾就将她的脚给捂热了。敖寸心靠在他身上，困得有些迷糊，只扒拉着他宽厚的肩膀，将脑袋搭在他的肩窝处不时蹭蹭。</p> <p>他低头瞧了瞧这缩作一团的龙，心中安逸，只觉自己一身的疲惫都尽数消失了。这些日子政务繁忙，即使处境不再那样艰难，可是每日大大小小的事情仍然烦心，有时候夜里端起清茶浅抿一口，凉透心扉，不觉思念温柔乡里，心心念念全是自己的妻子来。</p> <p>想她，想来见她。于是雷厉风行，废寝忘食，倘若敖寸心在身边她会是什么样子？她心疼他又是什么样子？将他从案牍劳形之中拉出来训斥，又是什么样子？</p> <p>真君有些莫名的委屈，抱紧了妻子闻这让他日思夜想无比心安的味道，闭上眼睛低声开口：“寸心，你真好。”</p> <p>三公主睁开快要闭上的眼睛，脑子已经是一团浆糊。开口问他：“累了罢？”</p> <p>“嗯。”他颔首，定定瞧着她点头，说话沙哑还带一点鼻音。三公主轻轻揉了揉他的头发，亲了亲他的嘴角，笑道：“这么乖啊？”</p> <p>“本来就乖。”杨戬将她又往怀中拢。敖寸心趴了一会儿他肩膀，再软糯开口：“累了被歇下罢。”</p> <p>“嗯。”郎君点头，就着相拥的姿势倒在了塌上，拉过一旁的锦被仔细盖上。</p> <p>怀抱温香软玉，满身的疲惫涌上，杨戬很快便甜甜睡去，一夜无梦。</p> <p>再说这头沉香，本想留些证据只待上报抓人，怕打草惊蛇不敢至人寝殿，只得旁敲侧击希望从那仆从处找到线索。</p> <p>一晃眼瞧那贪官背影的时候，把仆从给看丢了，只得跳下地来匆匆寻找。待拐过一个弯，迎面过来一个人。沉香还待要躲，错眼看清了那人的脸。</p> <p>竟是哮天犬么！既然如此屋里那个人有点有鬼，舅舅派人来查他来了！</p> <p>沉香兴奋得很，一撩衣角跳将下去。“碰”一声落地只差将哮天犬吓翻过去。</p> <p>哮天犬：“汪——！”</p> <p>沉香：“哎，嘘——叔叔是我。”</p> <p>“……沉香？”哮天犬刚刚举起骨头要打，好歹看清了人，诧异道。</p> <p>“你怎么在这儿？”刚刚放好主人的衣服出来，哮天犬十分懵逼。谁能想到下雨天冲淡了沉香的气息，它一时没有留意，居然没能发现。他正好来寻个地仙，办一件税务事宜，正要先行上天去复命来着。</p> <p>“你是来查人吧？正好，不必查了，我已然摸清了！这就上天找舅舅去罢！”</p> <p>“是啊，官场上的事儿，我正要回天廷来着。可是主人在……”</p> <p>沉香听说不错，兴奋非常，也不听人解释一气拉了就跑。</p> <p>哮天犬只急的支支吾吾，被打脸般的狂风吹着半晌才吐出一句清晰话来：“我主人……他他他不在，不在神殿！”</p> <p>沉香：“没事儿我等等他！”
哮天犬：“&amp;#￥＄＊……”
风太大了沉香没听见。</p> <p>所谓天上一天，地下一年。当杨戬美滋滋睡了一觉回到真君神殿的时候，迎面就跑过来了自家外甥，并一条气喘吁吁的狗狗。</p> <p>“舅舅，我给你提供线索！”沉香高兴道。</p> <p>“唔？什么线索？”真君对这孩子一向慈爱，听他说起正事，瞧他积极向上，欣慰非常。</p> <p>“蜀地一处地方，唤九龙居，其中中有人竟和官员勾结，做那权色交易！我亲眼见了那家伙，背影有些气派却做这腌臜事情的，舅舅，可以派去查人了！”</p> <p>刘小郎君雀跃说完，久久没听到二舅回答，不禁疑惑去瞧，却发现对面的神君看着不大好，脸都青了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/092315.堪做情人.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/08/19, 23:19:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/4d4ce5/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">情字最难</div></a> <a href="/pages/aeb832/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">小相思</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
