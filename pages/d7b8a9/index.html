oamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">小白龙：二位什么时候离？<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>杨戬和敖寸心一旦开战，那便是天翻地覆，声势浩大，谁也不肯让着谁，那一筐筐名贵的紫砂茶具，不要钱似的，摔在地上乒铃乓啷。敖寸心将杨戬这些年来送给她的东西一件一件往他身上砸，杨戬和她吵架，吵到最后谁都不讲道理，比的已是声音大小了。</p> <p>杨戬也砸东西，砸的是随手稍到的摆件，同敖寸心那个不知柴米贵的公主殿下不一样。且他拿起时，还要瞧一眼此物是否是糟心夫人的心爱之物，倘若他一着不慎将她的爱物毁了，这便演变成了他理亏，声音再怎么大他都站不住脚，自然也干不赢这场仗了。</p> <p>一般来说，事情的结尾总是杨戬出门避祸。杨二郎被夫人赶出家门后，十分地愤愤不平，但苦于无处发泄，有时到三妹山里诉苦，有时与梅山兄弟打杀些妖怪出气，有时四处游荡，碰见什么不平之事，便出手匡扶一番道义。</p> <p>可惜梅山兄弟们俱是五大三粗之辈，杨戬胸中的烦闷多为儿女情长，几位连个屁的故事都无，想要开解也万万不得其法，甚至火上浇油。何况寸心是杨戬的结发夫人，杨戬是知礼的翩翩君子，断然不会在兄弟面前言语她的不是，往往只是绷着一张脸，喝酒吃肉也不尽兴，慢慢地杨戬也不到梅山去打搅诸位兄弟的兴致了。</p> <p>有一回，杨戬在道上遇见替师傅化缘的小白龙。他乡遇故知，二人到山下小镇点了一桌酒席，把酒言欢。席间，谈及寸心，对面是其兄长，杨戬也就不再忌讳，只将出门而来的经过一一讲来。</p> <p>杨戬和他碰了个杯，一口闷下，叹道：“寸心不教我回府，也是一桩烦心事。须知她如不消气，回去不过又吵一架。但我不知她是否平心静气了，待回去晚了，又是一场责难。”</p> <p>小白龙在一旁听得直乐呵，笑得十分放肆，不嫌热闹添乱道：“妹夫，寸心么，从小就是这个性儿，不讲道理。你大人有大量啊，多多担待，我这做兄长的给你赔不是啦！”</p> <p>杨戬一听，不知怎地忽然有些不乐意，转着酒杯说道：“那倒不是。也是我先惹的她，她倒不会无缘无故地苛责我。”</p> <p>敖烈倒也不是真的帮着杨戬偏责妹妹，只不过晓得真君人品端直，借故调侃罢了。顺手替他添了一杯酒，添油加醋道：“我三妹呢，从小就盛气凌人，也没嬷嬷教她嫁人的规矩。要我说啊，你就当重振夫纲，把敖寸心那个张牙舞爪的小丫头好好教训一番哈哈哈哈哈！”想到妹妹听见自己这番话不知要如何七窍生烟，敖烈好笑不已。</p> <p>杨戬饮了半壶酒，已有了醉意，闻言皱起眉头，反驳道：“三哥怎么这样说？寸心并不那样的……她是小孩心性，待人真诚，率直天真而已。难道要她老持沉重城府深沉才好？那我们这些做丈夫哥哥的是干什么吃的？”</p> <p>敖烈见他如此护短，又是欣慰又是好笑，于杨戬底线边上徘徊跳跃：“哦？率真到把你赶出来？”</p> <p>杨戬又干了一杯，惆怅道：“唉……倒也是我惹她生气在先……”</p> <p>敖烈鄙夷道：“哟，我看她天不怕地不怕，嚣张得很，丈夫都敢撵出门，有伤风化。”</p> <p>杨戬已醉了，闻言有些愠怒，说道：“这是哪里的话？她是我的妻子，是公主，怎要去纡尊降贵依凡间迂腐的礼节了？”</p> <p>敖烈使坏道：“呐呐呐，嫁给你了就该依三从四德地来，似这般作为与泼妇何异？休了也罢啦！”</p> <p>杨戬怒道：“我乐意受着，干你何事？！”砰地一掌将桌面劈得木屑飞扬。</p> <p>小白龙见他急了，又有醉意，只怕妹夫错手一击自己小命难保，连忙往回找补：“是是是，你是天下第一能忍之人，同敖寸心简直绝配，万万不能分离……”</p> <p>杨戬这才抿着嘴重新坐下，心道：这还差不多。又饮一杯，嘀嘀咕咕：“你这人太不靠谱，怎就会胡说？”</p> <p>敖烈委屈：“不是你先同我诉苦的？那你本意是想要我说什么？”</p> <p>“那你也至少不能诋毁我夫人吧？”</p> <p>“可是那是我妹子哎！”</p> <p>“那也不行！何况寸心哪里有你说得那样不堪！”</p> <p>“好吧。那你自己说，我不插嘴总可以了吧？”</p> <p>“说什么？我老婆就是最完美的，谁都不能言语她的不是！”除了我。</p> <p>敖烈：“……”</p> <hr> <p>原剧三妹的闹心小剧场：<br>

杨戬对敖寸心：“成婚这么多年了你还是不懂我！”(???)</p> <p>P2:<br>
