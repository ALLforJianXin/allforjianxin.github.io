Zdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">同人女，过年好！<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>其实这事儿闹腾好久了，今儿放假才有空好好掰扯掰扯，顺便给大家拜个早年哈！</p> <p>然后，听说标准流程要先摆资历（？笑），那我就先自我介绍下吧，19年中下到现在入坑不到三年，很短，跟那些动辄十来年的老资格不能比，让大家见笑了。入坑日短的我叫前辈们一声老姐姐可以的吧？那老姐姐们听我一句劝，别演了。</p> <p>一月中旬以来，想必有不少姐妹都围观了清圭（即云笙歌/笙歌）小姐在tag内的小作文，指点各位写车就是要挨打，不许我们打男主tag（当即就有不少小姐妹冲上去跟她理论），看形势对己不利她便随即删帖，更摸到微博开始进行了大规模举报活动，众多写手画手炸号的炸号，扣分的扣分，绵延至今。</p> <p>我呢，从11日晚注意到某人的小作文不久，就在tag里发言“谁爱跪谁跪，我来就是想站着把CP嗑咯”，这是我一贯态度，去年面对不许我们打“自家tag”的某些唯粉我是这个态度，今年面对对内重拳的“同担”（引号表示存疑，我真的不想承认引出这连串风波的人是同担）我还是这个态度，后续回顾这可能便是我成为继小金子后第二批受攻击的人的原因了？<br>
截止16号戬心同人超话损失惨重的情况下苦主小金子在戬心相关的粉丝群里寻求帮助，主动跳出来帮忙的小吧当天上午刚刚矢口否认认识青圭，几个小时内还不到下午一点转眼就来把她卖个干净，更在与小金子私聊时直说了“戬心超话没说不给开车”（想暗示啥？我不知道噢~）。若说这时候可能是真心诚意的邀请，后来你们凭借贴吧管理的身份轻松拿下大主持人后拒掉我的小主持申请才让我认清楚你们的邀请仅仅是邀请人去受你们管理吧（笑😄），不好意思，这跟我站着把CP嗑咯的原则有背，只好删帖走人咯。</p> <p>到那时候我其实还不想把话说绝了毕竟是戬心圈的屙脏事儿，之前就有亲友不理解我“怎么嗑起了老剧CP”，这戳破了她们又要笑我了（不过笑归笑亲友们都很可爱还接我约稿呢！）</p> <p>一场闹剧闭幕你们找回了主持人的位置，还想反泼脏水暗示啥？<br>
奉劝一句，青难财不好发，自己屁股擦干净再来，不要以为互联网没有记忆，不要小看赛博洛阳铲的威力，青圭这次是不是受你们指使我不想妄议但张口就是不认识也太看不起别人的记忆力了吧，我来得晚，可不是在座诸位都来得晚。<br>
话说某位在此次绵延半个月还不消停的事件中冲锋陷阵的小吧墨墨亲您当初跟戬娥粉那边的律师函事件怎么收场的？用来自导自演给自己喊刹车的小号这次还敢<strong>回收再利用到戬心超话再混个小主持？</strong>（说实话这操作蠢透了本来还没这么多证据呢）<br>
醒醒吧！<br>
从狙人扩大到狙超话，再到狙外圈产出，损人不利己，已经有太太宣布退圈了还不罢休，继续举报其他太太的圈外产出，是炸了小金子一个号不过瘾吗？<br>
我不知道从我入坑前就开始的捆绑鱼头太太和一个实锤抄袭者的把戏这次还有没有人想做，我先声明好了：小金子去年九月入坑十月开始写文是我勾搭了之后留下的，兢兢业业产粮清清白白搞CP。少想些有的没的。</p> <p>正告参与事件的各方，跳再多也没用，产粮才是CP生存的基础，才是CP延续的第一生产力。<br>
作者和读者们都会用脚投票的，作者们一个个都跑到lofter开更（青圭也来了呢虽然搬老文没诚意读者不买账就恼羞成怒但毕竟来过），读者们凭借红心蓝手表示她们的喜爱，到底哪里繁荣哪里荒芜一目了然，老姐姐们总要划自己的一亩三分地然后守着土坷垃也不施肥冷到颗粒无收的，还觉得自己攥着多大权柄管着多大地界儿，醒醒，卡佳说得对，<strong>CP没人搞就是死物！</strong><br>
这次事件从戬心圈红眼病起因（青圭小作文、第一波举报），然后我们在新开的小群里吐槽、骂举报狗，讨论风向竟然能跟外部行动节奏吻合我是百思不得其解的，到底是谁在其中传话时候还添油加醋，我们不清楚（但有人清楚），我这里喊句话，但凡您对这个CP还有一点儿好感和眷恋，该收手了！<br>
为了自己那点权力欲那点小九九一次次逼太太们出走甚至退圈，小小一个戬心圈子分裂出来多少贴吧多少超话新入坑的粉丝多少找迷了路找错直接劝退的，您们是真真足不出户毫无知觉吗？前几天有同担姐妹质问青圭是不是“你想做戬心tag的主子！想做戬心人的皇帝！想决定戬心文的存在与否！”，现在看来，到底谁想做戬心人的皇帝还未可知呢！<br>
多少年了不思进取不为同担创造更好更自由的创作条件，动辄借“人物风骨”、“搞黄被禁”打压别人的创作积极性，再重复一遍，CP没人搞就是死物！先要写得够多，才可能产生更多更好的作品，如今2022年了提起来还是五六年甚至更早的“大神”、“神作”，是要戬心人抱残守缺活在过去吗？你们认不认有个P用，读者会有自己的选择。</p> <p>再重复一遍，我来，就是想站着把CP嗑咯。<br>
我从入坑伊始看着戬心同人超话建起来慢慢热闹起来，到微博环境也日益恶化后为了大家能好好吃粮安心吃粮我们的国际友人 @明茴 张罗了戬心同人站，大家各展所长为CP发展努力，走出去才有活路！谁稀罕那死水池一样的贴吧，真真以小人之心度君子之腹了。我从前坑淡圈时贴吧就快不行了，当初一个锁老帖全审查搞了几个月还是一年多，那之前本就在走下坡路的贴吧自此之后更是元气大伤再不复往日辉煌，你们想走出来急于走出来的心情我能理解，但换了地方“所有的都是慢慢积累”这个道理你们自己也知道的，既然知道就老老实实从头做起不好吗？搞这些小动作是想怎样？红眼病要不得，为了点儿眼红嫉妒不顾CP死活更要不得！</p> <p>同人女，站起来。</p> <hr> <h2 id="一些墨墨亲的过往"><a href="#一些墨墨亲的过往" class="header-anchor">#</a> 一些墨墨亲的过往</h2> <p><img src="/img/20220131/1.png" alt="图1"> <img src="/img/20220131/2.png" alt="图2"> <img src="/img/20220131/3.png" alt="图3"> <img src="/img/20220131/4.png" alt="图4"> <img src="/img/20220131/5.png" alt="图5"></p> <h2 id="来自九月份的新增小彩蛋"><a href="#来自九月份的新增小彩蛋" class="header-anchor">#</a> 来自九月份的新增小彩蛋</h2> <p>您会不知道站子是什么吗？<br> <img src="/img/20220131/20220925.png" alt="20220925"></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/98.推荐/90.编辑推荐/01.青圭事件2.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%8E%A8%E6%96%87" title="标签">#推文</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a8e173/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">青圭和你的小团体！收手吧！</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
