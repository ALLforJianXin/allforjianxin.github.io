neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">在上面<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>入坑第一篇，纪念。</p> <hr> <p>杨戬不想管别的人，也不想管自己的狗和兵器，他只想见敖寸心。<br>
他看到她在家门口迎接他。<br>
他听到她唤他的名字。<br>
她扑进他怀里，他轻轻揽住她。<br>
他们牵起手，把除了他俩之外的一切都关到门外。<br>
他们的新房早已撤去红妆，这才终于要翻起红浪。<br>
他已经用他的唇吻上她的，一边着急忙慌宽衣解带，一边追着她辗转面庞。<br>
他将他们都剥了精光，她伸手攀上他臂膀。<br>
他开始探究她发烫的娇躯，他想压在她身上。</p> <p>然而。</p> <p>杨戬意识到自己双脚离开地面的同时，察觉到腰里被缠住了。他睁开眼，近在咫尺的还是那个人，只是她额角怎么突然多些枝桠，颊上更添华光。<br>
他没来得及思索她怎么成了这半人半龙模样，她尾巴一甩将他抛到床榻上。<br>
“杨戬。”<br>
她双腿夹在他身侧，虚坐于他腰上，两手在他胸前游荡。他早被撩得火起，奈何龙尾那么长，不仅够压住腿脚，还能拐个弯缠绕他腕上。<br>
他当然不是真的挣脱不了，但现在，顾不上。<br>
他那玩意儿挺在她臀下，每每她动一点，它就跟着颤，若是哪下它碰到了她，他大半的力气都要花在咬紧牙关不让声音漏了行藏。</p> <p>伐纣多年，行军打仗的间隙里，他也曾放任思路徜徉，全不是这样。<br>
那时他对她的身体尚无法想象，但，都是他在上。<br>
现在他倒是也想，只是媳妇儿这样，该怎么躺？</p> <p>想的多了，一走神儿疏了忍耐。她唇齿一寸寸啃过他颈项，带到喉结时，他终是漏了点音儿出来。她便顿了下，然后他听到她的轻笑声，她呼出的气拂过他下巴，他浑身一僵。<br>
“寸心，”他哑着嗓。<br>
“嗯？”她看向他眼睛听他讲，似又不想停了亲近，柔柔的唇瓣贴在他的上。<br>
“寸心，我……我想……”<br>
“怎样？”<br>
“我……要……”<br>
“这样？”</p> <p>这样！<br>
就是这样。<br>
这样温暖，这样柔软，就这样抱紧心爱的姑娘，足以让他癫狂，让他疯魔在春帐。</p> <p>他等不及她慢慢坐下来，已挺胯迎上。出入间万般妙法，直叫人忘记今夕何夕，身在何方。她被他肏得狠了，婉转娇啼没个停歇，更助长了他气焰，一下猛过一下。<br>
绕在他腕上的龙尾不知道是什么时候松开的，他的手滑下去扶住她纤腰，好让她不至于在颠动间离了他，好在她到得低处时再加点力，更深入些。<br>
“杨戬……”<br>
“嗯？”这次换他问她要怎样。<br>
“轻，轻点！”<br>
他停了下来，他这才想起她是初经人事，他怎么可以如此孟浪。<br>
他轻拍她脊背，是安抚她，也是告诫自己别轻狂。<br>
“唔……”她头蹭到他胸口，额上精致的龙角在他眼前晃。他拿脚趾去磨她尾巴上的鳞片，可能是挠得她痒，她颤着身，连里面都绞紧了，可他不好意思重复她的话，只得默默忍受，默默绷起脊梁。<br>
“唔……我没叫你停下啊。”</p> <p>“你！”他吞下了半句“究竟想我怎样”，到底是缓缓再动作起来，一边动，一边看她，一别十多年，还好，他们都未染风霜。<br>
她被他盯得羞了，耳根红透，连着龙角都泛起粉色，她想扭头躲了，又被他扳住肩膀。<br>
他腰上用力坐起身，捧起她的小脸，像捧着珍宝，细细再细细端详。<br>
“寸心，我一直想跟你说的，你真好看。”<br>
“哼，好色之徒……”<br>
“和你一样。”<br>
她轻捶他胸口，还想再说什么，被他舌尖堵住，和着津液又吞了回去。</p> <p>口中迎来送往，胯下辗转厮磨。<br>
轻浅的肏弄解不了心火，他循着本能照头脸胡乱亲，突然听到她一声短促惊呼，同时下面猛吸紧了，迫得他有点微疼，却又舒爽。<br>
是碰到哪里了？<br>
杨戬目光在敖寸心还迷蒙着的脸上梭巡一圈，是那里吗？<br>
他咽了咽口水，伸手拢住她后颈，敖寸心只躲了一下，不知是不是咂摸出那无意间得的好处了，转而微微迎上。<br>
“杨戬……”她左边的角最高处尖尖上贴上了那人微凉菱唇，她唤他的声音都打了颤。这还不算完，那人竟拿舌头舔她，舔得她酥酥麻麻。<br>
杨戬吻遍左边又吻了右边，见敖寸心只攀紧他缠紧他没丝毫不悦，更大了胆子，含住轻吮。<br>
“别……”这次她“拒绝”了。可虽然口中说着不要手臂一点儿不放松，搭在他肩头的手指甚至多用力几分，指甲都戳到他肉里了。<br>
是所谓欲迎还拒？还是欲言又止？<br>
他当没听见，毕竟不止上边被他吮着的地方触感很好，下面他被吮着的地方更是欲罢不能。</p> <p>龙女似乎已经忘记自己前面还央郎君轻着些，现下自顾自扭动，上下，摩擦着他，撩拨着他，他的身体被动起着变化，又激得她反应愈烈，不知哪里来的力气，突然一掌拍在他肩头，推他向后倒去。<br>
“寸心！”<br>
她许是听不见他声音了吧，他看龙女眼显竖瞳，长发飞扬，龙尾飘荡，他想他是愿意同她一道的，不管是同往极乐，还是共堕魔障。</p> <p>她到了他身下。<br>
他还在她体内没退出来，刚刚差点儿就把持不住，他咬了自己舌尖才勉强停在悬崖边儿上。作为一个男人，或者说男神，杨戬对“在上面”这件事到底总是有些在意的，至少不能第一次就让人骑在身上便缴了械，这要传出去他以后如何振夫纲。<br>
敖寸心还在喘着，胸脯起起伏伏尚未从高潮中回复。她那里不算丰满，杨戬指节修长的大手覆上去，更显得小巧了。但触感却极好，细腻滑嫩，嗅之还带馨香。他亵玩起她挺翘的乳首，她没了力气推拒，只在他指尖拨过时下意识地挺一挺身，紧一紧腿，惹他轻笑，惹他更不舍得放。</p> <p>得了上方的位置，杨戬掌控起节奏，深深浅浅，浅浅深深捣弄，两人交接处一片泥泞，分不清是他污了她，还是她污了他。<br>
“杨戬，杨戬！”敖寸心连声唤他，内里的律动又变了节奏，一浪接着一浪，温度渐渐升高，他就着这淫靡冲刺，忽地一阵热潮兜头浇来，龙女一叠声叫着“坏了坏了”，挣扎着要逃。杨戬听声儿刚想缓缓，这下又发狠按下，一股脑儿更往里冲，直顶得她差点儿背过气去。</p> <p>“混账……”那阵劲儿还没全泄了，里头还有余韵勾连，龙女却抽抽噎噎眼泛泪花，小臂撑在他胸膛上要推他走。<br>
“不好吗？”杨戬不太明白，下处的汹涌求索，与嘴上的推拒，到底哪个才是本意，才是她心中所想？<br>
敖寸心到底皮不够厚，吱唔半天也没说出个好还是不好来。杨戬等不得了，拂开她手臂，胸膛贴上，又寻着那妙处去，在软肉里钻动，没几下又得了手。</p> <p>如此不知几番来回，龙女浑浑噩噩上一刻刚受了灌溉，下一刻闭眼就昏睡过去，留她的郎君一边回味一边打扫战场。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/89.短篇-2019/080300.在上面.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/1823aa/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">暑热</div></a> <a href="/pages/faf36d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">郎艳独绝</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
