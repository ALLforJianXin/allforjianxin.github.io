xn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">利用<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>一点剧情脑补</p> <p>杨戬站在海风中、岩石上，看着寸心面向西海跪下大哭了起来。他一再地气走她，为的就是不让她被自己连累，没想到兜兜转转还是累她至此。她哭得那般伤心，一字一句都哭到他心里去了。</p> <p>他几步跨到她面前，单膝跪到地上，说:“三公主，都是因为我，才让你落得如此的境地。”寸心似是找到了一个可以倾诉的人，“我不是那样的人，我不是那种给家里惹祸的人，我也没有胆子触犯天条，可是我……”杨戬听她一字一句都没有怪自己的意思，心中愧疚，又见她哭得双颊泛红，更是心疼不已，说道:“若不是三公主，杨戬或许早就葬身于海底，或许已淹死在弱水之中了，杨戬就算是粉身碎骨，也要报答三公主这一份恩情。”寸心似乎并不在意他是否报恩，眼泪仍如断线的珍珠般滚落，哽咽道:“你粉身碎骨，我也见不了我的爹娘，做不了公主了。”杨戬郑重说道:“等治理弱水之后，你若想回西海杨戬陪你回西海，想见爹娘杨戬陪你见爹娘，三界之内任你驰骋，只要有杨戬在，没有任何人可以拦得住你。”这话磅礴张扬又大有意味，寸心抬眸看着他，仿佛领会到了什么，却又还不能完全确定。</p> <p>其实杨戬原也知道自己这种身份注定要独来独往，根本不敢想自己能和西海龙宫的公主有什么特殊的交往，也实在不愿意连累她，因此动心过后，每每都说些无情的话气走她。待她走之后，他的身体又不听使唤地转过去看她离去的背影。但现在她的父王要将她抓去天廷，她也成了天廷要通缉的人，他如何还能远离她?如何还能违背自己的心愿?杨戬头轻轻一点，肯定了她目光中的询问。寸心大为感动，微微点了一下头，扑进他的怀里。</p> <p>这样寸心便是答应让他终生陪伴她护佑她了。不能靠近的人竟然和他许下了终身，他像是得到了什么日思夜想的珍宝，嘴角不觉地微微扬起了一个弧度，但立刻又想到她终是为自己所累，实在不该太过开心，微微低下了头，嘴唇不经意间碰到了她莹白如玉的额头。</p> <p>似乎是感觉到了他的触碰，寸心在他怀中微颤了一下，他心中也跟着一紧，不知道寸心会不会被他吓到。寸心却突然在蜻蜓点水般在他颊上落下一吻。他顿时浑身麻酥酥的，忍不住伸手扶住她的后脑，缓缓低下头去亲她。他全身的感觉都集中到了嘴唇上，感到那里仿佛陷进了一片柔软甜蜜的棉花糖。</p> <p>亲了半晌，杨戬放开寸心，见她鬓发被揉得有些乱，便伸手去替她拨一拨。</p> <p>寸心突然打掉他的手，问:“你以前和别人这样过吗？”杨戬说:“没有。”寸心道:“你骗人。”杨戬又说:“我真的没有。”寸心说:“你就是有，狐妹都告诉我了。”杨戬一脸茫然:“她胡说什么啊。”寸心小嘴一噘，把他推了个仰倒，说:“你和你那个未过门的媳妇儿是怎么回事?我要你给我从实招来，不许欺瞒我！”杨戬说:“我们家在当地算得上是富裕的，所以来我们家提亲的人很多，那份亲事就是我在里面挑的。”顿了一下，又道:“现今我遇到了你，只想娶你一个。”寸心眼尾一吊，气鼓鼓地瞪了他一眼:“那你还总送她镯子?”杨戬解释道:“ 定亲后我一直没有见过她，送镯子是想借此看看她长什么样。”寸心不满道:“你就是急着要娶她！”杨戬幽幽叹了口气，心道:若我早知道会遇到你，我一定不会和别人定亲，可现在我就是打死自己也改变不了过去啊。寸心也不等他回答，轻哼了一声，说道:“以前的事就算啦，从今以后，你心里只能有我一个，不然我就一口一口咬死你！”</p> <p>两人又坐在一块大石上说了一会儿话，然后去东海找四公主。姐妹俩说了几句话，寸心拉着四公主跑到几丈之外。</p> <p>杨戬知道寸心是有意避开他，因而没有跟上去，但却忍不住去听她们说了什么，距离不近，海风又大，他听不真切，只大约听到她说当初为什么不早点劝她，靠功劳才能得到赦免云云。</p> <p>很快，四公主便带来了玉帝命四海各出十万水军，在天蓬元帅的带领下挖掘沟渠的消息。</p> <p>杨戬坐在亭中的石凳上，寸心和四公主的话让他明白了些什么，但他又不想想。他给自己倒了一杯茶水，仰头一饮而尽，觉得胸口还是堵得慌，仿佛卡着一块鸡骨头。</p> <p>不想想，就越想。</p> <p>他想起了他们在海边的亲密，唇上仿佛还能感觉到她小嘴的绵软触感，指尖似乎还能感到耳后脉管的微微跳动，好像一颗小小的心脏。又想到她和四公主在海边说话时传到他耳里的只言片语“你当初为什么不早点劝我”“才能得到天廷的赦免”“他可不想得到天廷的赦免，可我不那么想啊”，内心不由得生出了三分怀疑:她是想利用我来庇护她，待四公主帮她赎罪之后她就弃我而去?想着想着，杨戬心里又有了两分怨气:你对我恩重如山，就算是不愿嫁给我，我也绝不会不管你，为何偏要来欺骗我的感情?难道在你心中，我就是那种需要你委身才肯护你周全的无耻之徒吗?</p> <p>正自彷徨煎熬，忽见那抹粉色的身影提了一篮吃食分给在府中避难的灾民。杨戬想找寸心问清楚，却又不敢问，在亭子里一杯又一杯地给自己灌茶，心中的塞涩之感却丝毫没有缓解。杨戬一咬牙，直奔到寸心身旁，抓住她的手:“你跟我来一下，我有话要跟你说。”</p> <p>寸心满脸喜色，说:“等我分完剩下的馒头。”杨戬看着她分完剩下的三四个馒头，拉着她的手走到亭中。</p> <p>“你有什么话要跟我说呀?”杨戬听她声音甜美温柔，又见她一双澄澈的眼睛凝视着自己，实难看着她问话。</p> <p>但在杨戬心中，寸心既然接受了他的喜欢，那她也应该真心喜欢他，半点不能掺假，他必须问清楚，便背过身不去看她，问道:“你是想利用四公主替你赎罪是吗?”</p> <p>寸心约莫是猜到了他的心思，也不生气，耐心解释道:“不是为我自己，如果你能在治理弱水中，立下有目共睹的功勋得到三界的敬重，玉帝就算不赦免你，至少也不会再对你发难啦，否则他就会失去民心。”</p> <br> <p>在许多年以后，当寸心跟他谈论人际关系时提到了利用一词，他又像是一只被踩了尾巴的猫，立刻诘问:“那我跟你之间呢?”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/102912.利用.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/da6033/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">金臂钏</div></a> <a href="/pages/4e2533/" cla
