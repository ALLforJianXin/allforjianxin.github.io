nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">宝莲灯前传里让人细思恐极的细节——花与仙鹤<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="宝莲灯前传里让人细思恐极的细节-花与仙鹤"><a href="#宝莲灯前传里让人细思恐极的细节-花与仙鹤" class="header-anchor">#</a> 宝莲灯前传里让人细思恐极的细节——花与仙鹤</h1> <h2 id="花与仙鹤"><a href="#花与仙鹤" class="header-anchor">#</a> 花与仙鹤</h2> <p>俗话说，“开坑一时爽，一直开坑一直爽”，虽然前面的考据系列一年多没继续了，我今年又重新打开这部剧之后还是想开一个新系列，聊聊宝莲灯前传剧中的一些鲜少被人提起的细节之处（不要管标题里的细思恐极那只是为了把你们骗进来的借口XD）。</p> <p>首先大图警告⚠️<br>
动图比较大一开始可能动不起来，全加载好就会动了。以及大家注意流量。</p> <p>首日双更先来个大放送一次性讲两个事情——花与仙鹤。</p> <p>可能很多小伙伴看到这里已经满脑袋问号了——花？什么花？鹤？什么鹤？<br>
请随我进入正题，随我一起来看看宝前里的花与仙鹤——</p> <p>宝莲灯前传开篇镜头是跟随一只仙鹤将我们带入故事里的世界的，仙鹤飞过云海飞入瑶池，衔了一枝花出来，然后这鹤离开瑶池越过灵霄宝殿，继续飞过了天河水闸，落在了弱水上——这鹤原来是天蓬元帅变的。<br> <img src="/img/cho/1.gif" alt="图1"><br> <img src="/img/cho/2.gif" alt="图2"><br>
于是我们所说之花便是这生于瑶池的无名之花，而这鹤就是天蓬元帅啦！</p> <p>继续往下看，鹤变回了天蓬元帅，而花，他是摘来送给弱水的。随后花变成了天蓬的武器九齿钉钯，九齿钉钯又化身冲浪板，天蓬踩着冲浪板开开心心御水而行，回过神来时候才发现已经闯入了欲界四重天。<br> <img src="/img/cho/3.gif" alt="图3"><br> <img src="/img/cho/4.gif" alt="图4"><br>
欲界四重天由玉帝亲妹长公主瑶姬镇守，接下来的剧情开始有对白，应该小伙伴们都有印象吧我就不带图了，稍微简述一下就是瑶姬说天蓬“动了欲念”，要拉他“去玉帝面前说个清楚”，又愧又急的天蓬满头大汗，他拿手一抹，汗水沿着垂下的指尖滴下去，透过灵霄宝殿的屋顶，滴在了镇殿龙珠上，正正好好引动三首蛟吞下，瞬间灵霄宝殿岌岌可危……然后在瑶池内众人忙乱的剧情之后，转头瑶姬就突然拦在了三首蛟面前，再接下来追上来帮忙的天蓬元帅手里拿着钉钯——所以，花呢？</p> <p>有的小伙伴可能会说，也许，花就是天蓬元帅的钉钯呗？但我翻开西游见里面写着——“此是锻炼神镔铁，磨琢成工光皎洁。老君自己动钤锤，荧惑亲身添炭屑……”这段对八戒的兵器极尽吹捧，看官们可以自去翻翻书——总之就是说此宝贝是神兵利器，太上老君亲手打造，那么，自然不会就是一朵花化的了，即使是瑶池的花也不行，不够格呀。窃以为花与钉钯，许是个障眼法，博美人儿一笑罢了。<br>
所以，花呢？<br>
带着这个疑问我继续往下看，嘿，还真给我找到了！</p> <p>电视剧进入第二集，瑶姬和杨天佑相遇又分离，瑶姬回天的三个月后，思念着她的杨天佑回到他们曾经避雨的华山小庙，回到这里思念瑶姬。在瑶姬感受到这份思念之前，嘿，你猜我发现了什么？<br>
花，又出现了。<br> <img src="/img/cho/5.gif" alt="图5"><br>
——看来当初天蓬是把花落在了四重天，又或者，干脆是作为赃物被没收了？<br>
总之这朵花现在在瑶姬手里，而且看起来她这次下凡还带了去。花花不仅帮她换装，注意到她向杨天佑表明心意后的镜头的我简直愣在当场——所以这花，是用掉了吗？<br> <img src="/img/cho/6.gif" alt="图6"><br> <img src="/img/cho/7.gif" alt="图7"><br> <img src="/img/cho/8.gif" alt="图8"><br>
总之自此以后，这朵花再难觅踪迹。</p> <p>说完了花，我们再来说说仙鹤。<br>
又有心急的小伙伴可能要说，我已经知道了呀，仙鹤就是天蓬变的嘛！这还有什么好说的！<br>
嘿嘿，就跟着我往下看吧。<br>
话说时移事易转眼间故事来到十二集——瑶姬的孩子都长大了，因为玉帝命十大金乌晒化了他的母亲，正手提金刚石斧追杀他的表兄弟！<br>
他一连砍了八个太阳了！剩下的大金乌决定保护弟弟小金乌，推开小金乌一个人迎上前。这大金乌不愧是大金乌，武力不凡，一剑把杨戬砍掉下天去，若这时杨戬就这么坠落下去，可能小金乌还能有个人换班不用全年无休007，可偏有人哦不有鹤来托了一下……<br> <img src="/img/cho/9-10.gif" alt="图9-10"></p> <p>结束前来个免责声明：这两只鹤长得都挺标准的，是不是一只我可没证据！</p> <p>最后点个题，花与仙鹤，第一话我们就讲到这里。</p> <hr> <p>写在后面：</p> <ol><li>我不知道有没有人扒过这些细节或者在哪里扒过这些细节，目力所及没见着有朋友写，我自己看剧总是重点偏离喜欢关注这些细枝末节，甚而脑补一出出大戏，为了我自己以后不忘记，我自己整理。</li> <li>很多细节是寻不到头尾的，有些我会带上自己的揣测，大家有兴趣的一起聊聊一起挖掘。我不会给什么结论也没法给结论。</li> <li>我觉得这些似是而非的细节很有趣，我就是个沉迷挖掘故事各方面深意的同人女，挖掘的本意也只是为了自己和同好们看一乐，能再编出点故事才是我所希冀的，希望小伙伴们好好玩耍多多产粮哟~~~</li></ol> <h2 id="花与仙鹤增补"><a href="#花与仙鹤增补" class="header-anchor">#</a> 花与仙鹤增补</h2> <p>上次我们说到《宝莲灯前传里让人细思恐极的细节——花与仙鹤》，后续也有些姐妹来跟我探讨，我也确实有一些在细究剧情时候产生的疑问未能厘清惦在心底，就比如说评论区有人觉得救小杨的仙鹤不见得是天蓬，那确实很多神仙都养仙鹤的。<br>
但到这里我还是懒占上风，后来是五老师 <a href="https://yiersansiwu98052.lofter.com/" target="_blank" rel="noopener noreferrer">@一二三四五<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 给了我一张截图，我才觉得有必要做些增补，但仍懒癌作祟，拖到如今才来整理，今天就跟大家再分享一些宝剧里关于花和仙鹤的细节。</p> <p>今天先来说说花，首先上次我说自从瑶姬用掉一朵后那花再难觅踪迹，这里我错了，要纠正一下。事实是这花在布景中还出现过，五老师给我的便是第17集的一张截图——
<img src="/img/cho/%E5%A2%9E%E8%A1%A51.jpg" alt="增补1"></p> <blockquote><p>在17集去除片头后的27分多，在众人合力想送弱水上天未果后师父问“要能找到我那徒儿就好了”，紧接着转场到广寒宫就是这个镜头了</p></blockquote> <p>——这确实是我之前对场景关注不够未能注意到，广寒宫中此花盛在碗里枝繁叶茂，看起来似乎比之天蓬所摘那朵开得更加好呢。（我知道道具组可能用的根本同一朵，我就随口这么一说XD）
然后我们就开始想这瑶池之花是怎么到得了广寒宫中呢？回过头去找，我们发现在第二集嫦娥首次出场的场景中，它仍是在线的——
<img src="/img/cho/%E5%A2%9E%E8%A1%A52.jpg" alt="增补2"></p> <blockquote><p>这在第二集去除片头后的4:37秒后，前序剧情是瑶姬看过杨天佑的心后二人分离</p></blockquote> <p>至此基本上可以确认从剧情上来说，广寒宫这朵不是天蓬摘的那朵了：在这一刻天蓬摘的那朵要么遗失在欲界四重天，要么，那是摘给弱水的，再送去给弱水也比出现在这里合理。<br> <strong>于是问题来了，广寒宫这花来自哪里呢？</strong><br>
要研究这个问题，首先要明确的前提是这花是种在瑶池的（见上次内容，第一集天蓬变的仙鹤是从瑶池摘了花），另一点与仙鹤有关，我们先跑个题说一下仙鹤来历。</p> <p>上次评论区有人提到白鹤童子，白鹤童子出自《封神演义》，是阐教仙人南极仙翁的弟子，玉虚宫三代了，确实虽然宝剧没他戏份也没他师父戏份甚至他师祖也只出现在对白里，他也确实是个备选项。<br>
如此扩展开去不局限宝前剧中的话，其实宝正还有一只仙鹤，它是王母的坐骑。见下图，宝莲灯第一集带片头22分后一点——
<img src="/img/cho/%E5%A2%9E%E8%A1%A53.png" alt="增补3"><br> <strong>——所以嫌疑人啊不嫌疑鹤又增加了呢！</strong></p> <p>在看剧时候其实关于仙鹤还有几个零散镜头我上次未提，就比如在杨戬初次学会驾云飞上重天遇到嫦娥后，他因只学会了起飞没学怎么落地差点儿跌下云头，嫦娥使白绫拉住救了他，在这里有插一个仙鹤飞过月亮的镜头——
<img src="/img/cho/%E5%A2%9E%E8%A1%A54.png" alt="增补4"><br>
——这里这只鹤要说也是天蓬变的似乎就太牵强了，说是其他仙人的宠物或者结合宝正的话是王母坐骑都比天蓬围观要合理靠谱得多。<br>
另外我这次做增补特地去看了仙鹤救杨的前后剧情，天蓬是被跟十大金乌一起派出去要处决瑶姬的，虽然杨戬打上天开始玉帝王母从南天门移驾时他又回到了玉帝身边但似乎并没有跟去瑶池，因为后面十大金乌死了九个他跑回瑶池报信儿有个明显是从外面跑进来的镜头（这些在十二集末尾到十三集开头的位置)。也就是说天蓬还是缺少可靠的不在场证明，暂时不能排除嫌疑。</p> <p><strong>插播结束我们话归上题——广寒宫这花的来历。</strong><br>
本文开篇我曾说在细究剧情时候产生的疑问未能厘清一直惦在心底，其中有一个就是，<strong>天蓬摘花为什么要化身仙鹤呢？</strong><br>
我们前述了这种花开在瑶池，而王母娘娘又称瑶池金母，这瑶池本就是她私产，那开在瑶池的花是她所有也很顺理成章。</p> <blockquote><p>岔开一句《西游记》书中有云王母娘娘仙草九叶灵芝，不过是说长在灵霄殿前，同宝剧中这花是不是一回事儿我觉得都可以圆上设定，就不展开详述了。</p></blockquote> <p>这花既然是王母私产拿来赏赐功臣或者送人也是很正常的，娘娘金尊自然不该亲自去摘然后娘娘又有（至少一只）鹤，到这里便有个猜想逐渐成型。</p> <p>于是梳理一下完整的猜想，花与仙鹤的细节串联后也许是：</p> <ul><li>王母娘娘有随侍的仙鹤也有那花，她要奖赏或送人自可让仙鹤代劳；</li> <li>广寒宫所摆也许是娘娘给嫦娥的也或许是给月宫中其他人的（虽然宝剧中广寒宫似乎没别人，但至少还有个兔兔，也可能是送给兔兔呢XD）；</li> <li>所以天蓬想偷摘那花时为求掩人耳目化身仙鹤这就合理了。</li></ul> <p>——这次好像是真有点细思恐极了就此打住吧。</p> <p>一家之言博客官们一笑，开脑洞大家乐一乐，不要太当真呀，有我没注意到的相关细节欢迎大家评论里跟我唠嗑~</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/97.嗑学/90.扩展考据/03.花与仙鹤.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E5%AE%9D%E8%8E%B2%E7%81%AF%E5%89%8D%E4%BC%A0" title="标签">#宝莲灯前传</a><a href="/tags/?tag=%E5%97%91%E5%AD%A6" title="标签">#嗑学</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/467e1e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">宝前、封神、西游对照年表</div></a> <a href="/pages/978cc8/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">“嫦娥是我的死对头”</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
