劲道却还搂着她嘴里忙道“殿下手巧，小神何等受用天宫织女也不若你称心……”他正说着忽的龙女纤软的手掌摸上了他的脸颊，温温柔柔嘴里却仍不饶“你有这闲力气口甜舌滑，不若好好照顾自个这须发也不拾掇闹得可怜……”</p> <p>敖寸心哪里知道杨戬这些时日旰食宵衣忙的脚不沾地，为的便是仲秋时节这两日可得团圆，又兼他俩虽有重圆之势可这礼数迟迟不到，他更是忧心忡忡这才手头一闲自马不停蹄寻她来，本以为这女郎一点也不记挂，刻下听她这话杨戬不由心头一松，垂头就往龙女颈窝埋去。</p> <p>“寸心”杨戬低低唤了声脸颊触到她细软的皮肤，鼻尖是她甜糯的味道，如此心里涌来怜爱自发就去蹭她，这可苦了龙女杨戬呼吸温热下颌上又冒了胡渣子，她本就好娇这郎君一下黏上来可是又痒又有些疼，她急呼一声咯咯笑起又带了点哭腔“杨、杨戬……好、好痒……”</p> <p>龙女挥动小小的拳头在杨戬肩头急急推打“诶呀，你、你别……闹我！”却哪知道这坏心的主，见她娇嗔更是起劲，将她紧紧搂着在她颈窝里深埋就是不抬头，嘴中喋喋道“寸心，好殿下你可不能撂下小神，可心疼我些罢。”</p> <p>如此龙女只得告饶“嗯……晓、晓得了，好、好痒……爷、别……嗯，予你！可都予你！”得了允诺杨戬终是退开些，就眼见龙女羊脂样的脸颊侧颈泛着嫣红，她那俏丽朱口微张显出些小巧软舌，连连喘气水光潋滟的杏眼嗔怒着瞪他一眼，手上又捶“你这浑人！”杨戬心下一颤只觉愈发离不开，再要亲近却临门叫人杀一脚，这宫外传来声响“主子，刘公子来请真君。”</p> <p>刘沉香奉母命来请他这娘舅，却在司法神殿碰了灰道是：主子不在，早出门去。且许是杨戬嘱了意，仆役值官皆是一问三不知，他无法逮着好脾气的康叔叔软磨硬泡，末了才得一点音讯说是往广顺王府上。沉香不知这龙王甚么来路，得了杨戬垂青只得又架上筋斗追去西海。</p> <p>到了这海沿沉香谨记着康安裕的话，老老实实投了拜帖说了事，西海倒也宽厚将他迎了去又看座上茶，却没见着杨戬只说叫他等这就去请，沉香瞧着往内庭去的宫人心中愈发狐疑：舅爷何时竟与西海这等交好了？！</p> <p>沉香想破头直到这舅爷来也没弄明白，却见杨戬款步而来自如往日朗风明月之姿，可那劲腰上却新缠了丝绦，双银龙嵌足价儿贝珠，这下沉香心中犹疑愈盛，心下暗忖：怎的他这舅爷不再是清风两袖的正经人了？在这龙宫又歇又拿？刘公子陷入深深沉思。</p> <p>世上奇事繁今朝更是多，刘沉香见了杨戬正说事请他家去，这爷倒半点不急由侍从引座看茶，缓缓道了句“有主与你引荐。”沉香开山成名而今已有时日，名头响亮却因着年轻于朝也没个实职儿，这会供读普化天尊门下，素日则多随这舅爷教导，常见当朝百仙识各方人物，以求来日位列仙班人情练达。</p> <p>沉香也算心思机敏听了这话，暗忖这来人也该是个角色是以才叫舅爷劳心费力引荐于他，可世上奇事繁今朝更是多，沉香见着人时眼都瞪直，且不说来个女子又不论她容貌与丁香肖似，可他委实瞧不出这年轻女郎一手什么神通，竟叫他舅爷如此高看一眼！</p> <p>杨戬不顾这些脸上显出些笑意，站起身来抬扇虚指下沉香——小子拱手一礼，神君道“我那外甥”他说罢，龙女细瞧沉香片刻笑语晏晏道“也是人才，只生的与你不太像。”她说着竟往前凑了些，沉香瞧着这面孔早有些慌了手脚正要往后撤，却见杨戬轻飘一眼刻下立住脚，有些僵直的笑了笑。</p> <p>龙女见了双掌一击好似见着什么新奇事儿，扭回头去笑的愈发欢欣“我说呢，该是和婵儿像，笑起来更是了！”沉香听着话心中一转，觉出些味道想这女郎该和四公主、嫦娥这些姨母一般是个与母亲相熟的长辈，他向杨戬望去求个告解，却只见这不假辞色的舅爷正乐，笑得眉眼也弯对这龙女柔声道“生的女气，叫人不太放心。”</p> <p>沉香头回见杨戬说落他这些琐碎事，一时连忙支起耳朵却叫人说不牢靠，心正有些不服却听这女郎笑道“儿肖母多福，何况漂亮旺桃花，少些你们愁事儿呀。”龙女这话一完，舅爷打扇的手立时一顿，扬起眉头复了句“漂亮？”</p> <p>沉香在这爷手下多年讨活，于他一举一止都熟稔，虽不知缘由却明白杨戬不喜欢这话，眼见龙女嘴角一勾还要再讲，连忙牵过话头“小子已有家室该是立业时，多那些事儿倒是麻烦。”这话立竿见影，龙女闻言一惊张口就道“诶呀，这才是正经，我险些忘了——”她说着话捏了捏袖子扭头就要吩咐，沉香见了正要拦——毕竟刻下管得紧甚么‘礼数’都该少些才好。</p> <p>却叫杨戬快了一步，沉香眼见他顺手搭上这女郎臂膀，开口就直唤小字“寸心，那时你不方便，如今也不急忙，不如这般正巧的中秋佳节，你且随我去趟华山，人去了可不就比什么都强？”沉香看到这，心中有些恍然只觉自个像极了敖春家的小娃娃，拿来哄人分外趁手！</p> <p>沉香领着舅爷与这龙女往家去时，心里可是没点底，毕竟人殿下并非十成愿意，近乎是叫他舅甥俩连哄带骗的往华山带，又加之中秋午宴来的大多亲朋佳友，更是唯恐这女郎‘见外’，可不想他母亲见着这龙公主那叫一个体己，敖八更是人真亲戚膝下幺子一口一个‘堂姑姑’好不亲热，就连梅山几位叔叔这些个粗人也与她甚是熟稔，翻来覆去倒好似他这个‘刘公子’是个外人！</p> <p>杨戬邀龙女赴宴本就存了个知会的意思，龙女点了头又与大伙处的愉快，一时喜不自胜便多用了几杯不想竟醉了过去，没能留龙女一程不说，竟还将太微玉清宫的拜谒给误了，杨戬觉醒一知此事立时好似宿醉未清头疼的紧！</p> <p>他穿戴齐整往库房挑拣些正要往宫里去，值官却来报陛下宣他瑶池相见，这地不比凌霄殿也不似玉清宫，说前朝公事不够威正，谈内里私事儿又显小题大做，杨戬垂眸细想却又无甚头绪直到入殿后见着了尉灵官，这直肠子的谏议大夫！</p> <p>如此还有什么不明白，这灵官定是参了他一本，张百忍倚重他也念着情分不想做大，可这谏议大夫又委实难缠这才提了他‘对簿公堂’，杨戬弄得清楚心里有底，行上一礼口道“见过陛下”说罢也对尉灵官颔首。</p> <p>张百忍点点头搁了茶盏要叙说一二，却叫尉峥拦了嘴“天神，尉某不兴拐外抹角，只因有密折上报，道大人贪腐谋私”他一捋长髯严正的面孔也瞧不出喜怒“口说无凭，恳请对答一二。”</p> <p>他话罢朝服广袖一摆，展出一卷画纸那图上正是杨戬酒酣，倚着哮天犬与杨婵一家作别，杨戬听这罪名本就莫名，再见这画证更是云山雾罩不由瞥一眼张百忍欲以求答，可这主只管低头饮茶装什么憨人！</p> <p>尉峥许是瞧出他所疑，抬手点点他画中腰腹道“此珠知情人言乃海中千载臻品只在龙族内府流传，近年新出更是屈指可数，又不见天神受赏是以……”杨戬闻言一时哭笑不得，这因由又与他私情相干一时竟也不知如何言说才是妥当。</p> <p>这谏议大夫见他吞吐不言却以为他却有贪墨之嫌，竟痛心疾首疾言厉色起来“真君糊涂！这天宪虽承皇恩那也是您一番心血，天神如此知法犯错可叫一腔奋力东流……”杨戬知他絮言不完唠叨起来委实厉害，只得直言截了话头“尉大人误会，这本是西海三公主所赠，她锦衣玉食不计较旁些这才送……”</p> <p>这话一出尉峥没回过劲，只觉杨戬由头都寻得不妥，倒是张百忍好似回了神，好些兴味道“怎的那女娃这回倒上道，晓得讨点好？”杨戬闻言瞧着尉峥脸色愈发难看，直觉这便宜舅舅添堵的很越说越黑，果不其然这谏议大夫即可便道“不论贵贱您凭白也是收受不得，这龙女求得甚么，天神如何为个珠子便允了她？”</p> <p>尉灵官还要再讲，杨戬着实叫他念得无法又见张百忍一派好瞧之态，只得咬牙吐口“大人！以公谋私才贪墨！我这”杨戬顿了顿抿抿嘴“我俩相亲，适逢佳节不过聊表心意。”不想话到此处尉峥还是拧眉不松搭口就问“甚么心意？”话声一落，尉峥才觉出味来愣了半晌扭头去瞧张百忍，但见这天尊咂咂嘴笑道“孩子的私事，说是有着落了再找敖闰，朕这着急也不顶事不是！”</p> <p>尉峥闻言又在这舅甥俩中间瞧了几个来回，忽的吹胡子瞪眼“便是早晚一家人，您身兼表率也该敛着些，这等扎眼物件哪有往身上穿的！您回去可好好与那位说说，往后多少人瞧着总不能——”尉峥心下几转摸出个说法“叫人说落堂堂司法首辅吃得软饭，管教女儿家养活罢！”</p> <p>杨戬闻得这话愣了半晌，恼也不是不恼也不对，候侍宫人也都给憋得脸上显出色，满堂也就张百忍拍拍膝头仰头笑个不歇，如此司法天神吃一手软饭之事，不多时便传得处处都是了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/091300.暗度陈仓.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45
