没有。”</p> <p>转了一圈总算将那小祖宗支走，黄天化搂着杨戬肩膀坐下来，亲亲热热道：“师兄啊，谢谢您。”</p> <p>杨戬一把拍掉他的手，再撇撇嘴：“不用了。”</p> <p>本来以为杨戬端庄稳重，于这些乱七八糟的事情是看不上眼不甚了解的。如今这样了然于胸，黄天化看破了，杨师兄这就是死鸭子嘴硬，装的。鉴于作为男人相同的劣根性，他不怕死地问了一句：“下次一起吧？”</p> <p>杨戬：“……滚。”</p> <p>果然如此，人碍着面子不松口，倒也不妨事。黄天化眉目一转，不在乎地打个哈哈，继而又凑近了问：“师兄，我隐约记得，你是个有家室的，是罢？”</p> <p>“嗯，如何？”杨戬有种不好的预感。</p> <p>黄天化嘴里能吐出什么花儿来？杨戬自诩少年时孟浪得紧，懂的也算甚多，哪知道天化少爷花样百出，末了还来一句：“师兄是个有夫人的自然不屑，唉，难为咱孤苦一人又是些个血气爷们儿，有些事情只好想法子自己解决……”</p> <p>“你……”杨戬努力将舌头捋直了，不加思索竟然问道：“那……你怎么知道这么……”</p> <p>黄天化挑眉似嘲笑他：“师兄啊，理论知识丰富以后夫人才会乖顺啊。”</p> <p>杨戬白眼一翻，心下大囧，伸腿就是一脚：“想这些有的没的，给我练功去！”待黄天化捂着屁股跑远了还不忘叮嘱他一句：“告诉那帮小子们，给我合适着点儿！”</p> <p>打仗毕竟费力，泻火归泻火，精气还是得养足了。</p> <p>白天事务繁忙，夜里又几人同住，杨戬倒也无瑕胡思乱想。几日后队伍到了目的地，破了对方关隘，杨戬还做运粮官去。此一路上便只有他一人行进，兵士自不敢相扰。每至夜深，他闲来无事，梦也频繁。一天夜里四下静寂无事可做，忽然想到佳梦关破魔家四将时，他化作花狐貂潜入敌营。师兄弟们皆以为他死了，悲愤之下不过报仇了事。可倘若是他的妹子知晓，又倘若……是他的新婚妻子知晓，又当如何？</p> <p>寸心……她若是晓得了，肯定会为他大哭一场罢？又会不会为他寻死觅活？</p> <p>是了，寸心那么爱他，若夫君出事定会生死相随的。</p> <p>可是他们刚刚成亲，甚至还未洞房。那日娇美的新娘不过同他耍些小脾气，他却甩手离去。</p> <p>怎么就不能顺一顺她呢？她那么爱自己。
真是……混账……
他还是，挺想她的。
好罢，是很想很想。
倘若……倘若没有吵架，那么……
那么……</p> <p>白日里黄天化的言论不知为何一股脑钻进杨戬的耳朵里面，一遍遍响起，刺激着他的神经，让他不可扼制地回忆起敖寸心的容颜。那天他们在西海的海岸上互述衷肠，龙女依偎进郎君的怀里，梨花带雨，小脸上的泪痕令人心疼得想要温柔地亲吻。</p> <p>他还记得……还记得她从背后搂住他的腰，紧紧贴上他的背，两团软绵绵的物件隔着衣料刮擦他的肌肉，惹得他每一根血管都痒得发狂，而那小龙却还趴在他的肩头叽叽喳喳，惹了火还不自知。</p> <p>杨戬受了催龄掌，身形宛若大人，但实打实还是个血气方刚的小伙子，正是火气极旺的时候，对着心尖儿上的漂亮姑娘，总是有一股一股的冲动涌上脑。他忍了又忍，总以为洞房花烛夜可以疏解一二，到头来居然功败垂成。现下想来，他真想给自己一巴掌。</p> <p>真是的，吵什么架。</p> <p>如果……如果……
郎君不知想到了什么东西，一股热流下涌。黄天化说的那些乱七八糟的东西叫他想起来了，不可遏制地愈想愈深，想到敖寸心，她的脸，她那么娇嫩的唇，她好精致的锁骨……倘若拨开层层叠叠的婚服，红影葳蕤之下，该是怎样的……妙不可言啊？</p> <p>“哈……啊……”</p> <p>他的手，下移抓住了渐渐坚硬的物什，眼前是那姑娘娇美的容颜，仿佛发了狂性，郎君顺着原始的冲动，折腾起来。</p> <p>好肿，好涨，憋得他要崩溃了。杨戬翻身爬起跪在床上，脸贴在床头，闭起眼睛回想龙女的模样。她玲珑的身段真是好看，要是将那碍事的衣服扒开……</p> <p>“哈……啊……嗯……”郎君不停地上下撸动，脑海里尽数是不堪入目的场景。狠狠按压着紫红的肉茎，他又隐忍不住，复躺下来，两手并用。</p> <p>待回了家，定要如此，将她摁在榻上，无论哭喊哀求，也要试试……白日听到的那些招数……他想得血脉喷张，激动不已。腰胯竟开始上下来回顶弄，仿佛他思念不已的姑娘正乘于他身上受他肏弄。</p> <p>“嗯……寸……寸心……啊……”</p> <p>他气息粗重，撸得越来越快，终于低吼一声，轻喊龙女的闺名，射了出去。</p> <p>良久，杨戬回过神来，喘着粗气瘫软在床上，小腹上沾满了粘稠的白液。他转头将脸埋进枕头里，想寻一件东西嗅一嗅敖寸心身上甜腻的香气，又哪里有这样的东西可寻？</p> <p>小时候听说书先生讲男女之间互赠信物，他家变之后被未婚妻子拒绝，只觉荒唐无用。可现下看来，哪里无用？真想把玩一样她的物件，也好一解相思，不是嘛？</p> <p>那回去之后，定要索要一物，还要……</p> <p>杨戬许久没起身，躺在床上，弯了嘴角。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/071300.相思.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E8%87%AA%E5%A8%B1%E8%87%AA%E4%B9%90" title="标签">#自娱自乐</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/1b8732/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">三生浮屠，黄粱一梦</div></a> <a href="/pages/812dd5/" class="page-nav-centre page-nav-centre-next"><div class="tooltip
