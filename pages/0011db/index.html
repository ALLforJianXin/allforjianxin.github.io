YMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">纠葛<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>太上玉皇寿诞宴请群臣，敖寸心乘上东风得了大赦，这会低眉顺耳的跟着广顺王，前来谢恩。</p> <p>黄天化瞧着眼前歌舞咂咂嘴“敖兄，你说这美人美曲陛下年年瞧天天听，就不腻吗？”黄天华说着胳膊肘往外一攘，扑了空，转头去瞧，就见敖寸心抿抿嘴，瞪着溜圆的杏眼使手一指“兄长与我父王一处呢？”</p> <p>龙女说罢见黄天化还是瞧着她发愣，便僵笑一下不再言语，低头又挑了个莲雾继续装聋作哑，没一会身旁又有阴影投来，龙女不由心下暗自腹诽：原以为此处少熟人能躲个清净，可没成想炳灵公瞧着机灵却是个没眼力价的！</p> <p>她想归想却到底乖觉起来随口应道“大人要是觉得歌舞无趣，不若吃些灵果儿，这莲雾倒也爽口”旁边身形一顿，片刻与她打商量道“我本无意这些——刺角瓜食得嘛？”</p> <p>敖寸心闻言浑身一激灵，转脸去便见杨戬兜着笑，讨巧的推来一盘切好的‘火天桃’，她心里芥蒂难解笑也不是，瘪嘴有些气鼓“这壳儿死硬，麻烦……”</p> <p>杨戬见她拧着衣袖使性子，头次恨起自己嘴拙“醋栗呢？这没壳。”龙女见他这样好脾气，好似什么也不曾发生，更是有气撒不出，心里恼他扭回身来便一下拍打上他的臂膀“酸人口牙！你膈应我呢！”</p> <p>不远处给杨戬腾位子的黄天化见大家都有些瞧直了眼，慌忙打起哈哈“来来来再喝点——咱说到哪了？”</p> <p>敖寸心听得声响到底顾念他脸面，收敛起气性起身便要走，却叫杨戬抓住手想发作，就听到他着急慌忙道“不要走！别生气！”</p> <p>杨戬见她不再动作稳坐着不由便贴上些“寸心想要什么？都依你，所以别躲着我好不好。”敖寸心手腕掩在他袖中叫杨戬紧紧抓着，他讲话的声气就在耳畔拂过，直叫龙女心口发颤。</p> <p>敖寸心不敢正眼瞧他，嘴上却强硬“小仙清清白白，哪个躲你？”杨戬闻言嘴上称是又偏头看她温声细语“你身子好些了吗？可还有什么不爽利吗？”</p> <p>龙女闻言上手便掐他掌心，嗔道“咒我？本公主可好着呢！”杨戬将她一双柔荑缠在手里忙解释道“哪里的话，我那日去寻你龙王说你气血有亏……”他正说着忽地住了嘴，心里觉出味来。</p> <p>敖寸心有些尴尬的咬了咬下唇小声道“那时是有些不通畅，父王——关心则乱罢了。”杨戬闻言话中有些涩意“龙王想的周到。”</p> <p>席间喧闹些，龙女远远只见素色袖花打开又落下，原是嫦娥仙子压轴上了场，再偏首果见杨戬也长着脖子在瞧，她立时心气不顺甩手便走。</p> <p>杨戬这厢便连个子丑寅卯也没看清，就见敖寸心脚下生风往外跑，他忙去追终在这花廊深处截住了她，伸手拉她却叫一下拍开“敖寸心！”他喝了一声，龙女历来吃软不吃硬，梗着脖子就一句“如何！”</p> <p>杨戬疾言厉色道“人心肉长，我捧给你不是叫你拿去摔的！”他喝完这声，敖寸心还来急委屈，就见他兀自颓唐着“人到了西海你不见，物件送了也不收，今个儿说几句话也难……”</p> <p>“咳咳！”他说着话忽然咳得厉害，整个人都咳的晃了晃，敖寸心本叫他唬得措手不及，这会忙慌手慌脚的去扶他，给他顺气走到近前这会瞧得仔细，只见他脸色潮红底子却白，整个人萦着病气。</p> <p>龙女哪里忍得了心上人这般难受，嘴上没头没尾的安慰着“你说的我都不知道，我不是故意气你，我只是……”她见杨戬恹恹的喘气，凤眼里咳得泛水光，心疼的不得了什么也顾不得，凑上去轻轻含上杨戬的菱唇，渡他龙气。</p> <p>半晌龙女才松开，软糯的问他“你好点了嘛？身上痛不痛？”见杨戬不答又忙去拽他“我带你去找三妹。”龙女的声音淹没在杨戬唇间。</p> <p>他紧紧抱着她，撰取这软甜的味道，松开时见着她殷红的双颊，晨间朝露般的杏眼，他不由去蹭蹭她的发顶，将她按在怀里“不痛,只要寸心不讨厌杨戬，这里”他说着将敖寸心的手按在自己心口“就一点也不痛。”</p> <p>敖寸心在他怀里挣了挣，有些煞风景的质问着“你还没和我解释……”她瓮声瓮气的闹着别扭。</p> <p>“我喜欢你”他低声道。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/020200.纠葛.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/76bbf3/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">原则危机</div></a> <a href="/pages/32f0e5/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">提灯</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
