vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">推文By阿九<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>最近文荒，所以想要总结一下下自己喜欢的戬心文，推文带有主观性和缘分性（因为实际上看过的不多，揣着文包瑟瑟发抖不知从何下手），仅是个人意见，口味或许比较奇怪。</p> <p>推荐的主要参考因素：文笔文风、布局架构、人物形象、逻辑线索等（ps：以下都是已完结的、自己看过的文）</p> <h3 id="【时差】by-一领淡鹅黄"><a href="#【时差】by-一领淡鹅黄" class="header-anchor">#</a> 【时差】by：一领淡鹅黄</h3> <p>戬心现代文，也是目前最喜欢的戬心现代文（没有之一），文笔流畅，文章一开始就是小寸回国要和小杨离婚的戏码，行文过程中有插叙过去的故事，也加入了很多作者对于戬心婚姻生活的思考，前半程的感情线基本延续着原剧走向，作为现代文而言很真实很贴合。</p> <h3 id="【朝元路】by-一领淡鹅黄"><a href="#【朝元路】by-一领淡鹅黄" class="header-anchor">#</a> 【朝元路】by：一领淡鹅黄</h3> <p>和原剧情节不同，写的是大二x小寸的故事，大二依旧是司法天神，小寸却成了天廷女官，二人携手步步为营，构思很特别，文笔也是鹅黄大大一如既往的美妙。</p> <h3 id="【浮生若梦】by-慕容伽蓝"><a href="#【浮生若梦】by-慕容伽蓝" class="header-anchor">#</a> 【浮生若梦】by：慕容伽蓝</h3> <p>构思非常巧妙的戬心架空文，背景唐朝李治武后时，小杨是朝臣，小寸是吐蕃公主，从相识到相知，从成婚到和离，从知意到知心，作者文笔很好，对每一个人物的描写也很深刻，特别是看到结局时，引人又哭又笑，出乎意料又在情理之中。</p> <h3 id="【缓缓归】by-吃螃蟹的虾米"><a href="#【缓缓归】by-吃螃蟹的虾米" class="header-anchor">#</a> 【缓缓归】by：吃螃蟹的虾米</h3> <p>这篇文章乍看好像没有什么特别的，但是细细想来，实际上戬心文中此类风格的不多。描写的不是轰轰烈烈的爱情，也没有惊天动地的阴谋，是很纯粹的戬心文。描写了二人在凡间生活的故事，细水流长，治愈温馨向的文。</p> <h3 id="【重生恍若彼岸花】by-六如寒梅笑雪"><a href="#【重生恍若彼岸花】by-六如寒梅笑雪" class="header-anchor">#</a> 【重生恍若彼岸花】by：六如寒梅笑雪</h3> <p>其实严格来说，这篇文章不能算cp文，因为小寸出场不多，主要讲述的是小杨下凡重修元神的故事，算是宝莲灯和小李飞刀的同人，文风尊重原著，如果同时喜欢两部剧的话阅读起来是很不错的体验。</p> <p><br><br></p> <p>除此之外，《妖灵事务所》《父女》《惜茶》《丹青》《今生今世》《江月楼》《与尔同销万古愁》《情深一寸》《忽而百年（现代）》……也都是蛮不错的完结文。</p> <p>还有，《无花果》，现代文，虽然没有完结，但是作者给了剩余部分的大纲，某种程度上也算是一个完整的故事。</p> <p>以及一些可爱的小短篇，由于篇幅有限+记忆力不好，所以就……</p> <p>最后是ಥ_ಥ真的文荒，如果大家有好推荐也希望不吝评价推荐</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/98.推荐/60.个人推荐/00.推文By阿九.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h
