s7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">今夜无眠<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>镇日天气凉爽，杨戬心气正不顺意，却不妨角木蛟提了三只犀牛精前来销案，且跪在案前陈述罪状，一句“西海”将上位昏昏欲睡的天神点得一个激灵。</p> <p>这三只犀牛精阻挠唐僧西去，残害一方百姓，本因判予秦广王手下的牛头鬼差做万世苦力，不曾想三位在逃窜期间仍贼心不死，冲撞了西海三公主，好歹被孙悟空拦下，不至酿成泼天祸事。</p> <p>司法天神闻言且气得面色青白，处置了三妖，匆匆销案，隐匿身形，犹豫再三，径直下西海去。</p> <p>他掐了一个避水诀，潜入龙宫之中，偷进公主寝殿里。她这处所在，杨戬是头一遭来，但觉金玉满堂，珠帘卷卷，不止海中水植，更有暖香暗玉，温养岸上花草，妙趣横生，实在是桃源仙境。</p> <p>真君分花拂柳，走到内室中，隔了一个屏风，心中有些忐忑，又近了一步，隐在门扉之后，打眼望去，只见得屋中一张巨大的贝壳软床，四周吊满了帘帐，一个身形窈窕的女郎坐在中间，身边有两个婢女替她梳发整衣，擦拭手臂。她身形隐隐约约透在帘中，满室夜明珠照得她肌肤白嫩生香，杨戬许久不曾见她，这一眼却瞧得他呼吸一窒，往日这温香软玉滑腻的触感浮现在心头。</p> <p>敖寸心正欲歇息，同两个婢女有一搭没一搭地说话。只听一个婢女赞道：“公主殿的手真是好看，我听凡人说，甚么指如削葱根地，大抵就是如此了。”</p> <p>这话将那女郎逗笑，嗔道：“你这小蹄子，就会说好话。”</p> <p>身后那婢女也附和道：“哪里是好话呢？分明是实话。公主殿下浑身上下哪一处不美？只教女人看了，都想动凡心呢！”</p> <p>敖寸心伸手去搔她的痒，笑骂道：“好哇，敢揶揄我，该打得很！”一时间那婢子笑着求饶，三个女孩儿在内殿中闹做一团。</p> <p>杨戬略有些尴尬，他本是担忧寸心受了欺辱，特特来探看的。不想天上一日，地上一年，绕是他脚程在快，此事也已经过去月余，便是当时如何气恼，现下再来提及，便是不识时务了。撞破了她们闺中叙话，真君何曾如此失礼过。</p> <p>不过既然已来了，便没有匆匆而回的道理。杨戬自从与敖寸心和离，便再没有来见过她，虽心中时常挂念，更多也是睹物思人，向四公主偶尔询问两句，答案也多是一别两宽云云。只道她在家中定然过得快活，何曾想到居然险些被三只犀牛精欺负了去。</p> <p>真君只想着待她安睡下，到她床边看她一眼，再行离去。这时其中一个婢女出门去安置巾帕，带过门扉时，一缕穿堂风从小院中吹来，教三公主嗅到一股久违的冷冽竹香。</p> <p>她本与余下的婢子说笑，忽然怔住。那婢女不明所以，连唤了两声：“公主？”</p> <p>杨戬心中一顿，不知出了何事，正要暗中一窥，不想敖寸心以脚拨开了纱帘，一节藕臂探出，伸出一半身子来。那婢女见状连忙将帘帐拉起，搭上金钩，问道：“公主，您要下床么？”</p> <p>寸心沉吟了一会儿，与她道：“你去小厨热一碗暖杏茶来，我忽然有些馋了。”</p> <p>那婢女不明所以，却不敢违背，只颔首作礼，出门去了。</p> <p>杨戬恍然明白她是在支开旁人，却一时拿不准她的用意，迟疑了片刻，待那婢子的脚步声渐渐消失，却听得龙女轻叹一声，说道：“杨戬，你还不现身？”</p> <p>真君心中一沉，有些微忐忑，深吸一口气，显出身形，迈步绕过那处屏风，拨开细碎珠帘，来到龙女面前，沉声道：“寸心。”</p> <p>龙女一见果真是他，心头一紧，即伸出脚，探到地板上厚厚的长绒毛毯，站了起来，走到杨戬旁边，轻声道：“就知是你……你怎么来了？”</p> <p>杨戬乍见她容色娇美，身形纤细，露出的肌肤珠圆玉润，一身薄薄的雪白襦裙衬得面色红润艳丽，柳眉弯弯，青丝披散，一时间不禁心头怦然而动，面色一红，轻咳一声，笑道：“没什么，只是想来看看你，想不到却被你发现了。”</p> <p>龙女已与他多年不见，不期然相逢，不禁心潮澎湃，见他清风朗月更胜往日俊俏，怔怔地看得呆了，忽然红了眼眶：“你……你却真有闲心。”</p> <p>杨戬一顿，暗骂自己不会讲话，他和敖寸心之间相互纠缠了几千年，再说这些客套话，他便真真是无耻至极的混账了。轻轻抚上龙女单薄圆润的肩头，杨戬凑近她，语气略有些匆忙，：“我在司法府中，那三头犀牛精来请罪，我才知道，你竟叫人欺负了。我已将他们撕碎吃了，立即来看你，却晚了这么久，对不起。”说完，他一咬牙，将她揉入怀中。</p> <p>敖寸心闻言，却伸手去推他：“你现下来，又有什么用呢？这么多年……你从来不闻不问，何以现在又要来了？我晓得我是你的劫难，你不想见我，我不怪你，可我，可我……”她有些克制不住这突如其来的情绪，语气有些哽咽了，“……是不是，定要我出事了，你才能纡尊降贵来瞧我一眼？是不是定要我死了，你才……才肯再见我一面呢？”她几下攘不开杨戬，便也不再动作，任他将自己拥在怀中，泪水不知为什么，忽然滴滴答答掉下来，砸在杨戬的肩膀上，洇透了他的衣料。</p> <p>她心中本是古井无波的一潭水，忽然杨戬来了，刹那将她搅得魂不守舍。她以仅存的理智与他说了第一句话，已经难能可贵。再教她和杨戬兜几个圈子，那斯心思深沉，她却纯白如纸，半点憋屈也不肯受的。要爱要恨，要哭要笑，从来直来直往，若呕这一口气，不等他说话，自己就要被憋死。</p> <p>杨戬只将这久违的温香软玉揉在怀中，听她嗔痴间如何动人，嗓音绵绵地，说出的话却那么刺心裂肝，直教人心都碎了，连忙道：“不准胡说！”</p> <p>寸心被他一呵，心中委屈更加汹涌，又推又打，啜泣道：“我不要你管！我早就和你分道扬镳，你不管我，我也不稀罕你了！你走开！”</p> <p>杨戬紧紧抱着她，任她踢打，心中如被火烧一般，“是我不好，我不好，我不该不来见你，那龙宫中的草头神是才进宫中的，回护不至，让你受惊了，今后再不会了，你信我！”</p> <p>“草头神再如何牢靠，却如何呐？”龙女失神地呢喃，“我情愿你不再管我，也不愿意要你的愧疚做报答了。我的父王，我的哥哥，我的家人，他们自然回护着我，和你再没有干系了。”</p> <p>“你父王兄长就这么护你？”杨戬闻言愠怒，“那些虾兵蟹将，做什么吃的？要你一个公主亲去对敌？若是我，却绝不肯将你陷入如此境地！”</p> <p>“可有哪一次我遇见危险，你在我身边嘛？”龙女紧紧抱住了杨戬的项子，止不住地哽咽，“你从来都是不在的，从来不是我的，我早该明白……我今日……也不该这样缠着你的……”她这样说着，手臂却圈着杨戬的肩膀，越圈越紧，唯恐下一刻，他就不翼而飞，“你能来看我，我已经很开心，杨戬，谢谢你。”</p> <p>郎君闻言，心中大痛，抱紧她颤声道：“你……你不肯要我了吗？对不起，对不起，我从今往后，一定不这样了，一定不这样了……”</p> <p>龙女闻言落下泪，趴在他怀里蹭了蹭，糯糯的嗓音带着惹人怜惜的哭腔：“我讨厌你，讨厌你！”</p> <p>杨戬柔声道：“好，好……我再不敢了，再不教你难过……好不好？”</p> <p>寸心又小小地呜咽了一声，仍紧紧抱着杨戬不肯放手，声音闷闷地，几不可闻：“……二郎……”</p> <p>——</p> <p>杨戬将她放到床上，紧紧握着她的手，守在她床边。</p> <p>两个人方才情绪都因为久别重逢有些激动，现在平静下来，都有些羞怯。</p> <p>敖寸心红着脸半埋在被子里，手上却拽他拽得紧紧地，仿佛一松开他的手，他就会跑掉。</p> <p>杨戬温柔地哄她睡觉，寸心却挣扎着不肯入眠，小声向他撒娇：“二郎，你不要走……”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/081000.今夜无眠.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a><a href="/tags/?tag=%E8%A5%BF%E6%B8%B8%E7%BB%AD" title="标签">#西游续</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/780a95/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">霁夜</div></a> <a href="/pages/028d65/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">心口难一</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
