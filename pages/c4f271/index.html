可她有什么能说的？左不过是回不了西海，又或者是他当初求了婚又执意求死。<br>
实在是日子过得太舒坦，龙女每每搜肠刮肚，也找不出几件杨戬的不是，翻来覆去也只能拿那两件来说。偏这两件当真杨戬之过，他心中有愧，说到这里便偃旗息鼓，不与龙女争口舌。<br>
龙女气急了，也只能再追加几句“笨蛋混人”，骂人词不会几个偏又爱说，再不然就是“你专会气我”“你对我不好”“不懂体贴”。可说到此处，杨戬又往往梗起脖子硬气起来：“我哪里对你不好？我如何不体贴？”<br>
再吵下去，什么鸡毛蒜皮也翻捡出来，“我说不要了你还来！”“热得满身汗你还要挤！”<br>
这真没法，和夫人同处一室，哪能不挤。杨戬晓得说出来又要挨上几掌，索性抿抿嘴不出声。待寸心说到“你家床也忒小”“我若在家哪里受得这番苦热”，杨戬再不能听下去，只得恶狠狠放一句“什么我家你家，你家不就在此地？”说罢扭头落荒而逃，疾行几步就听得“啪嚓”一声茶盏碎在脚边。<br>
敖寸心随手砸了杯子，又见那黑狗儿让主人阻了脚步，暗暗撇嘴，刷一声合上门，心烦气躁捏起旁的茶盏倒水喝。<br>

爱偷懒的公主殿下夸下海口，到最后还是让身下人顶得话也说不出来。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/081100.此夏.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/0aaf20/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">再闻</div></a> <a href="/pages/24b934/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">还要贴贴</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
