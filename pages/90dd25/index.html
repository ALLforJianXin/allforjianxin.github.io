的仙品山参，听说兄长还在歇息，不愿打搅，留下药品便离开了。三公主到殿门口送别她，顺便吩咐哮天犬将山参送至药王府上，待回转时，便看见他坐在床沿，头发稍有些凌乱地耷拉在额头，见她进来，对她露出一个清浅的笑。</p> <p>寸心忙将茶盏放在案几上，走到他身畔探他的额头，“二爷醒了？还发热嘛？”手中探得不准，又弯腰以面颊贴了贴他的脸，“还是有点低烧……”</p> <p>杨戬闭上眼摇了摇头，展开双臂抱住她，将脸埋在她的腰上蹭了蹭，声音还有些方醒的软糯低哑，“不要紧的，才睡醒是会比平时热一点。”</p> <p>龙女轻柔地抱住他，手指温温吞吞揉着他的头发，低头看他头顶的发旋，心中十分受用他无形的撒娇，安抚道：“好吧，还想睡吗？”</p> <p>“不想了，想起来活动活动。”他揉了揉眼睛，打个哈欠恹恹地说。</p> <p>寸心将茶倒入杯中递给他，又去将门窗稍稍打开一些，透些新鲜的空气进来，“不成，大夫说你身上的伤还没恢复，昨日又淋了雨，受不得风的。”她又跑到桌边拿起一个金黄色的枇杷，三两下剥好了，喂到杨戬嘴边去，“二爷乖乖的待在屋子里好不好？明日烧退了，我陪你出去逛逛。”</p> <p>杨戬从善如流地张嘴吃了那枇杷，舌尖不小心舔到她的指尖，将她烫得一缩。他眼中含着笑看她，待咽下清甜的果肉，享受了公主殿下体贴入微地拭过嘴角，终于忍不住笑道：“寸心……是打算践行昨天的誓愿，要对我更好一些吗？”</p> <p>三公主听她提到昨日，一时羞于被他戳破此心，一时又念起自己的一番悔过与自责，不忍囫囵揭过，只好扭扭捏捏地坐到他身边，抱住他的一只胳膊，将脑袋靠在他的肩上，小声地说道：“你当我……是说着玩的嘛……”</p> <p>杨戬心中又感温馨，又觉得好笑，将她的手反扣在掌下，温言道：“好罢，不是说着玩的，是真心的。可是寸心，我是你的丈夫，护着你不是我该做的嘛？倘若要你来照顾我、迁就我，那我这丈夫是做什么吃的？嗯？”</p> <p>“你别安慰我了，我知道自己从前很不讲道理，”寸心皱起小脸，窝到他怀中靠稳，“我以后都会改的……呐，二爷，往后我要是还乱发脾气，你就打我两下，骂我几句，罚我做你的小丫鬟伺候你，就像这样，”她自杨戬怀里爬出，瞪着杨戬颐指气使，“寸心，二爷的衣衫洗干净没有？没有！看二爷我不打你！”说罢拉起杨戬的手，往他掌心啪啪拍了两下。</p> <p>杨戬喷地一声笑开，目光绵绵地看着她，语气故作迟疑，“这样不好吧？”</p> <p>“哈，你还真敢想啊？”龙女立即柳眉倒竖，似娇还嗔，“我顶多便是少欺负你一些啦！喂，杨戬！你是不是不愿意被我欺负呀！”</p> <p>“愿意愿意——”杨戬揉了揉她的脑袋，面上满是纵容，伸手将她揽入自己怀中，“我愿意被寸心，欺负一辈子。”</p> <p>寸心本也是为着听他两句温软情话，此时得了，不由得喜笑颜开，攀住他的项子，只觉得满腔爱意无处置存，在他面上轻轻地吻了好几下。</p> <p>杨戬揽住她的身子，从善如流地贴着她耳鬓厮磨。二人亲密惯了，举动间没什么分寸，床帐当中的气氛逐渐暧昧起来，真君捉住龙女的后颈，亲吻逐渐用力，深入她的口舌间舔弄吸吮，津液交织，寸心被他吻得身子发软，用不上半分力气，感到他喷洒在面上的气息逐渐粗重，脑海之中一片混沌。</p> <p>正是意乱情迷之间，他滚烫的大掌悄然滑进寸心的里衣，熟练地捉住一团绵软，寸心嗯了一声，察觉些微不对劲，抵着他的肩略分开些，见到他面泛潮红，色欲逼人，一时间又是眷恋，又是嗔怪，方要劝他将养身体要紧，只说了一个“你”字，余光瞥到他跨间的布料被顶得高高鼓起，支成一个小帐篷，雄赳赳气昂昂地隔着布料与她叫嚣。</p> <p>寸心喷地一笑，轻砸他，“你，你怎么……你就是净想那些事。”</p> <p>杨戬已许久不曾与她亲热，一时沾得了好处，只觉得熨贴非常，怎肯干休？连忙捉着她的手不放，眼神炽热地看着她，软语哀求道：“怎么便是净想那些事？寸心，我都多久没碰你了？”</p> <p>龙女有些羞，低头抿了抿唇，凑到他耳边轻声道：“寸心也……想二郎的，可是你的伤还没好，”她安抚地吻了吻他的嘴角，“等二郎好了……便随你弄……成不成？”</p> <p>杨戬心中一动，愈拥紧她，目光灼灼盯着她微敞的胸口，只觉得她以此来劝哄他，实在正中下怀，乖软得甜进人心坎里去，“到那时，自然要的。只是现在怎么办？寸心，你看我……”说着，便牵她柔荑往跨间去，“便这阳气滞涩不出，对伤也不好的。你也晓得它一时半会儿消停不了……”他将那小手敷在其上，轻轻揉动，“寸心帮帮我嘛，好不好？”</p> <p>寸心有些为难，迟疑了半晌，见他实在可怜，再三确认了于身体无碍，又想到自己昨日立誓要对他百依百顺，倘使现下便违背誓言，那也太不坚定了。终于在他连哄带骗之中勉强答应下来，被他揽到怀中，跨坐在他的腿上，如此稍向前贴，便能感受到那肉刀在轻薄布料下的狰狞硕大。</p> <p>杨戬满意地抚摸她的腿股，凑上前去拨开她的衣领，轻轻舔吻半只溢出的酥胸。那乳肉真是又软又香，将脸埋入其中，尽兴吮咂，实在为人间乐事之极。杨戬一手抚着一只乳房把玩，另一方则含在口中，轻咂顶上的小梅花，鼻尖也埋入乳中蹭来蹭去。寸心不由得轻喘，小腹不由自主地一酸，穴中痒热难耐，涓涓流出蜜液。她抱住杨戬的脑袋，任他亲吻抚摸，低头时恰巧见他叼着一侧娇乳与她四目相对，一时觉得此景实在太过淫乱，羞得不能自已，方要别过脸去，却被他黏了上来，追着要亲嘴。</p> <p>龙女拗不过他，一时二人亲滚在一处。杨戬本就只着寝衣，搓揉间已不能蔽体，只轻轻一拉，那话儿即弹出，啪地一声打在龙女饱满的花户上，打得她淫液飞溅，连声娇颤。杨戬只觉得浑身热血沸腾，阳具涨得紫黑，狰狞地缠着青筋，突突直跳。他昨日淋雨受凉，烧还未退，此时气血翻涌，竟有些头晕眼花，一时靠在床头恹恹地舔吮寸心的耳垂，呼吸粗重，大掌轻拍她的臀肉，哄她道：“寸心……你来……”</p> <p>龙女靠在他身上，只感遍体热烫，柔荑搭在他健壮的胸肌之上，掌下的心脏咚咚直跳，震得她身酥体软，不能自已，余光瞥见他脖颈上已是青筋暴起，血沸肤红，连忙伸手探下，握住那物，抵在臀上，慢慢坐了下去。</p> <p>“啊……哈……”杨戬一时教她夹得神飞天外，不由轻哼出声，颤着手上下抚摸她光滑细腻的肌肤。龙女怜惜地予他一枚香吻，晃着身子努力适应这根硕大的阳具，只觉得四肢教他插得如水一般无力，只愿软了身子如往日一般被他狠狠操干，一时间樱唇溢出句句娇啼，柔软的腰肢紧紧贴在他块垒分明的腹肌上，两团酥乳挤在他胸前蹭动。</p> <p>杨戬呼吸愈加粗重，待她有气力抬起头来索吻，安抚地捏了捏那滚圆臀肉，吻将过去，渐渐顶动起来。寸心与他交欢久了，虽一时吃得艰辛，好在身子敏感熟悉。不多时，二人已干得热火朝天，下身入得啪啪作响，水声不绝。龙女穴中不住地流水，将二人下身尽数淌湿了，击打间间或流出白浊的体液，做得一片狼藉。杨戬红着眼，坐直身子抱住她不住地顶插，间或低头埋入两房柔软的乳肉之中，只觉得浑身热血沸腾，喘息得十分厉害。寸心低头抱住他，轻揉他的头发，只看得到他暴起虬结的青筋和红彤彤的肌肤，又感到杨戬趴在她怀中不能自抑地闷哼粗喘，一时只觉久违，又想到第一次与他亲近之时，二人青涩又血气方刚的激烈、他又浓又多的精液爆射在体内的滋味，愈加身心动容，扶着他宽厚的肩膀张大了双腿，扭动腰肢迎合他的顶弄。</p> <p>心上人如此魅惑放浪，真君一度把持不住，纵使因伤提不上劲，仍红着眼，死死抱着她的身子颠弄耸动，痴迷地吻着她白嫩的脖颈，只觉得她的肌肤异香扑鼻，绵软非常，恨不得将她吞入腹中，再也不能分离。
　
　　“寸心……寸心……”杨戬一面顶，一面抬起头痴痴地欣赏她的娇艳，“杨戬好喜欢你……嗯……”</p> <p>纵使这个姿势他无法大开大合地肏干，却仍顶得龙女有些受不住，“哈……啊……二爷轻一些……好涨……啊！”她忽然惊叫一声，只觉那大棒狠狠地撞上了一处极紧致敏感之地，“不要……嗯哼……啊——”龙女教他狠狠顶撞至宫口，入得深极，一时间发出极甜腻娇媚的一声长吟，颤着腿泻了身，花穴狠狠地绞缩，淫水直喷，她瘫软在杨戬身上，久久不能平复。</p> <p>杨戬在这阵极致的绞吮当中绷直了脊背，死死埋入她胸前，攥紧了寸心腰间尚未扯下的衣料，直到小穴的抽搐逐渐平息，他才放松地呼出一口气，放软身体窝在龙女温暖的怀抱之中，面色潮红，细细舔咂她的锁骨。</p> <p>寸心低下头只看得到他头顶的发旋，只觉得他像是一只渴奶的小兽在她怀中乱拱，将那乱蓬蓬卷发拨开一些，触到他身上烫人的温度，她有些担忧，“二郎……还好嘛？有没有哪里难受？”</p> <p>杨戬蹙起眉，说话间带着浓浓的鼻音，没骨头似的靠在她身上，眼中水汪汪地，半阖着眸子，看得出是强弩之末，已不愿硬撑着挺直脊背。</p> <p>“这里难受，寸心。”说着，拉住她的手到二人交合之处。他虽身上无力，可那话儿却还硬邦邦地叫嚣着，血脉贲张地跳动着，丝毫不见疲软。龙女双颊飞上红霞，啐了他一口，“你真是……就是这幅样子，到什么时候都忘不了这一档子事！”</p> <p>杨戬再也无力动作，懒洋洋地撒娇道：“好寸心，我没力气，你来做……”说罢，讨好地亲了亲她的嘴角，缓缓躺到枕上，拇指缓缓地摩挲着她的臀肉，以示挑逗。寸心拿他没办法，伏到他身上又探其体温，轻轻抚摸他的卷发，柔声问道：“二爷好烫，困了嘛？不要做了罢？等你好了怎么样都予你，好不好？二郎，听话嘛。”</p> <p>他又哼哼唧唧地发出不成句的声音，在龙女轻柔的安抚下极尽委屈，“可是现在好难受……嗯……难受……寸心……要寸心动一动……才能好……”</p> <p>龙女实在拿他无法，只得撑着他的胸膛扭动腰肢套弄那硬挺的话儿。只啐他伤病未愈，这棒子却仍旧龙精虎猛，纵使不主动进攻，一时间也撞得她穴中酸痒不已，穴肉自发地绞紧他欲根，不绝流水。寸心每向前摆一回腰，粗大的阳具便咕啾一声埋入穴中，直顶得深处那小口酸软不已，一时这交合处爱液融融，又湿又滑，因龙女泻过一次，已不复初时滞涩，轻轻一抵便能入得极深。</p> <p>寸心有些受不住，方欲软下腰肢告饶，忽然被他一把捏住腰，迅速地向上顶弄起来。龙女惊叫一声，教他顶得连声吟哦，软倒在他身上，只听得到耳畔急促的喘息声、闷闷的哼声。那话儿大开大合地入了几百个回合，最后深深地抵入宫口，二人齐齐高潮，浓浓的精水阵阵射入苞宫之中，久久不停。</p> <p>因已久时不曾亲近，他存货实多，射得龙女身酥骨软，娇喘连连，白浆从交合处溢出，已是收将不下，将她腿心都流淌了白茫茫的一层，这才方休。寸心缓了好一会儿，艰难地自他身上爬起，却见丈夫已经微侧着脑袋深深睡去，面上泛着一层病态的潮红，神色安然。</p> <p>她叹了口气，轻轻拍了拍他的面颊，小声说道：“难得你这流氓也有虚弱的一日。”又见到一床的狼藉，纵使双腿阵阵地发软，还是强撑着支起身，使了御水神通沾湿巾帕，微红着脸清理二人身上斑驳的白浊。又将他的衣衫理好，将被褥从床角拽回来，照料他安睡。</p> <p>窗边的琉璃瓶中插着一束栀子花，是她今晨采回来的。从今天开始，龙女打算每天都送他一束花。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/120700.就要贴贴.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="c
