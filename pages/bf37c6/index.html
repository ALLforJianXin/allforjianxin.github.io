lK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">如约<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>因着杂事耽搁已过了约期，杨戬传完懿旨便急匆匆离开华山下西海，急匆匆潜入龙宫，避开众人耳目，潜入敖寸心宫里。<br>
宫殿里烛火葳蕤不见龙女，急寻过后殿前院，清俊天神直如热锅上的蚂蚁，再次踏入寝殿，再次撩开床帐，再次失望还没来得及，有香风挟着水汽。急转身她已扑入怀里。<br> 
展笑颜搂上她腰肢，才发现触手滑腻她不着一缕。<br>
“你怎么才来啊。”龙女瘪着小嘴，“我热得受不了，只能把自己泡在冷泉里。我等了好久啊，刚刚听见响动来看，果然是你。”<br>
杨二郎歉然笑笑，赔一句：“我来晚了。”突觉指尖所触腾地热起，便忘了更多的解释话语，焦急问一声：“寸心你怎么了？”已被她推倒在床榻里。</p> <p>龙女不看他眼睛，埋头在他颈边细吻深嗅，小手下探揉上他胯下命门，娴熟的手法抚弄揉捏，没两下那边就鼓胀起来，她轻轻笑两声，气息喷在他耳边痒痒的，痒过后下面不知怎的已经被剥开了，凶器被她握在手里。<br>
她吻上他唇角前说：“二郎，我好想你。”</p> <p>她的唇柔软甜蜜，她的小舌搅弄在他嘴里搅动起心底涟漪，怎么心痒难耐间竟涌出一丝忧伤情绪？<br>
“寸心，想我？”<br>
“嗯，想你。想得难受极了，想二爷来，想二爷帮寸心填满空虚。”<br>
心动变了频率。</p> <p>龙女早被情欲熏晕了理智，顾不得别的，见那熟悉物件挺立起来长长发粗到顶级，也热热的赶超她自己，于是连吞几口口水，抬腿迈过人身跨坐上去，自己扒开阴户将那物纳进来，吃到一半有些阻碍，又弓身往他胸口靠靠，这下总算是连根全吃了下去。<br>
自然是喜欢的，喜欢跟她连成一体。杨戬能感觉到自己的分身在龙女桃乡蜜穴里愈发蓬勃，能感受到她小穴里细微的凸起，缠缠绵绵包裹着他紧握着他，她开始了动作后又摩擦着他吮吸着他，他抑不住自己随她操作勃动，干脆折起双腿挺腰摆胯，应和着她迎合着她，看她唇边绽开笑意。</p> <p>龙女拉起他手，拿他微带薄茧的手覆上自己柔软的乳房，拿他五指如弦刮蹭过红樱蜜蕊，突紧了腰腹，挺挺胸定格了一瞬，再深出一口气。<br>
那一瞬间杨戬只觉得自己被缠紧了紧得甚至有些发痛，痛里带着快意。松开后又有滚烫女精兜头浇下，淋在他身上，沁入他心里。<br>
再顾不得怜惜，就着她的痴缠将她心口揉捏在掌心里，急了颠动频率。龙女终于开始他熟悉的吟唱，咿咿呀呀悦耳动听，咿呀呀软倒在他身上，他将她搂紧在怀里。<br>
他双手环住龙女将人固定，好让身下直入直出酣畅淋漓。她小手折在他肩头耐不得时就将指尖抓紧指甲嵌入他皮肉里，嫣红俏脸靠在他胸口正听着他心跳，突又被引诱了，探出丁香小舌采攫了茱萸。</p> <p>一场毕歇了雨，龙女饱餐一顿后懒懒地蜷在他身侧，闭着眼也带着笑，天神抻开被淫水精液污得一塌糊涂的袍服下摆，叹口气，全脱了吧，扬手扔下地去。<br>
全脱光赤条条贴住她，拥抱着更甜蜜。<br>
“寸心想我吗？”<br>
“想你。”<br>
想的是我呢？还是想我跟你在一起？<br>
“还要吗？”<br>
“嗯？……好啊。”<br>
真是不知餍足的小东西。</p> <p>将那话在她大腿上擦蹭几下，很快便又神采奕奕。揽过她一条腿搭在自己腰侧，找准入口将柱头摁在花瓣间再腰腹稍稍加力，就着刚刚的润滑很顺利就插了进去。<br>
这姿势进的不是很深，但正好能戳到龙女敏感之处，兼之紧紧摩擦压迫花蒂，很快龙女就也搂紧他乱了呼吸。乱了呼吸乱了方寸，没头没脑胡乱扭动，想要更多又不知如何要，扭错了几下没要到反而空虚起来，急得直哭：“杨戬，杨戬，我要你。”杨二郎薄唇轻贴贴她额角，嘴上安慰着：“小殿下别急。”不耽误他将下处耻骨中央抵上她的，紧紧抵住再缓缓研磨几下，她便哭喊着泄了身子泄了气。<br>
淫水顺着他们交合处横淌直流，夹在皮肉间，再动作的时候便会发出咕啾咕啾的声音，听起来淫靡至极。</p> <p>天官神勇招式迭出，干得昏天黑地。敖寸心已经数不清自己高潮了多少次，只知道身体里填满了他给的东西，满到她因着余韵小腹微有挛动都会有一股股浓精溢出花穴。</p> <p>“寸心，转过去。”<br>
她早被干得色令智昏，听到他指令不加思索乖乖执行，转身趴伏在床榻上。他又摄来个软枕给她垫在胸口，她满足地塌下腰肢，将蜜桃样的翘臀呈给心上人。<br>
先进来的却不是熟悉的他的分身。<br>
杨戬只送了一根指头进去，但不消一瞬龙女的小穴亦迎上来紧紧拥住这根手指，他试着进出转动，穴肉都将他包裹得紧紧的，不再有白浊被吐出来，他更坏心眼地用另一只手按上龙女小腹，也要稍稍用力才能感受到内里的满溢。他满意地抽出手来，将指上粘腻抹在龙女臀尖上，重要的分身也已就绪，打声招呼“会比较深”不给她拒绝的机会已直插到底。<br>
猛然的深入猛然的快感激得龙女急了喘息，将脸埋进枕头里也止不住双腿战栗，激得她弓起背他还俯下身来从头将脊椎亲吻起。星星点点的吻落在龙女白皙光洁的背上，落完一处她就开始期待下一处是哪里。他双手也不闲着，绕到她身下揉捏完软绵绵沉甸甸的乳房，把两颗樱桃把玩到饱满晶亮，再顺着两边腰侧下来，在她腹心再汇集。<br>
杨戬那活儿天赋异禀，粗长更兼久力，这时全没入龙女穴中，让人不知道龙女微凸的小腹到底是被他填塞满了，还是干脆被他顶起。</p> <p>龙女突然从枕头下抽出一只手来，覆在他贴住她小腹的大手上：“二爷，把寸心填满了。满满的，寸心该跟二爷要个孩子了。”闻言杨戬身躯一震忙把她捞起来，探到她额头滚烫，迷蒙了视线，是了，她这时候总是神思不太明朗，她这是在说胡话吧。许是梦到了曾经他们在杨府里抵死缠绵整整一年都没出去。<br>
他贴近她耳边暗哑了声音：“寸心乖，就快好了啊。以后……总会有孩子的。”<br>
龙女合着他抽插频率嗯嗯啊啊也不知是不是回答，总之最后他释放自己，她满足睡去。睡着时小手还搭在小肚子上，看得他酸涩又甜蜜。</p> <p>施法术净了衣袍再穿回去，坐床边又捏捏她耳垂：“我明年再来看你。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/122515.如约.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%80%9D%E6%98%A5%E6%9C%9F" title="标签">#思春期</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/5a0239/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">只取一瓢饮</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
