x/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">夜袭<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>（好久没开车了做一下复健。想起来前面有一篇叫堪做情人，当初本来想开起来的临门一脚踩了刹车。害，没有关西，这就来辽，同一个背景叭，食用之前可以先翻回去复习一下）</p> <p>夜已深了，九龙居内星火点点，在这深山老林之中透出一股暖融融的光晕，使人看了顿觉温馨。</p> <p>杨戬着一袭青衣白袍，腰上的两片龙纹玉佩叮咚作响，映了朗朗的星光，清风皓月地落到门口。外间的侍卫不是他手下草头神，便是三公主的护卫亲兵，知内情已久，只躬身行礼便将他迎入行宫之中。</p> <p>却有三公主从西海新提的一个婢女当值夜班，未曾见过杨戬，尽职尽责地将他拦在了殿外。九龙居内分内殿外殿，侍卫只守在外殿，余下全为女官。虽不知何以有外男在此，那婢女仍礼貌道：“公主已经歇息，公子若要探访不若改日再来。”</p> <p>杨戬不防在自家的地盘上还有人敢拦，少见地愣了愣神。这尴尬并没有持续很久，同值的女官路过瞅了一眼，只差吓得魂飞魄散，连忙上前拉开那婢子，道：“真君恕罪。”言罢不顾婢女的惊愕，临了躬身再行礼：“回禀真君，公主正在内间沐浴。”</p> <p>杨戬点了点头，折扇一翻正要抬脚向内殿去，忽然念头一转，侧头吩咐：“我知道了，叫她们退下罢。”</p> <p>女官不敢多问，手腕翻转将传信发出。三公主沐浴之时有个习惯，要在温热的香汤中泡上一泡才肯罢休，服侍她沐浴的婢女此时皆在门外，堪堪接到传信，便各自退开。</p> <p>人既清完，真君抬手推开了内里的殿门。待走到浴室门廊，湿润的香气钻入鼻息，仿佛蒸腾的热气将公主殿下身上的幽幽甜香扩散开来，令杨戬本来清明的眸子染上了一层不一样的颜色。</p> <p>他反手将折扇插在了身后腰带上，推门而入。屋内置了一架轻薄的屏风，薄得遮不住后面满院的春景。那美人伸手拨弄肩头的水珠，抬起下巴露出颈项完美的曲线。</p> <p>杨戬只觉呼吸加重了许多，抬步缓缓靠近。至屏风前，忽一抬头，取下了美人鲜艳的红肚兜。</p> <p>真君粗粝的拇指细细感受着鲛绢细腻的质地，将柔软的布料移至鼻尖轻嗅，那上面散发出的味道令他忍不住勾勒昔日脑海里的风花雪月。</p> <p>眼已红了，听不得耳边教人血脉贲张的沥沥水声，杨戬攥紧手里的肚兜，疾行几步绕过屏风，抬手将公主光裸的后背搂在了怀中。</p> <p>敖寸心登时一惊，下意识地挣扎，待杨戬将下巴贴至她的肩窝，这才叫公主侧头瞧见。龙女呆了一呆，这才放心，却又嗔又怒，只拿拳砸他：“你这浑人！”</p> <p>杨戬受了这一下窝心的拳头，更是意动不止。敖寸心娇嫩的皮肤此刻尽数光裸，更枉论点缀在其上的点点水珠。她美妙的雪乳一星半点都没有被水遮住，反而越现柔软。若是还没有反应，他便不是个男人了。</p> <p>真君管不住自己的一双手，渐往四周游移，张嘴舔吻龙女如玉的颈脖，含糊地开口：“寸心，我真想你……”</p> <p>“嗯……”敖寸心受不住他突如其来的攻势，软了身子轻哼出声，反手揉上他的头，轻喘着呢喃不止：“我……也想你……嗯……”</p> <p>杨戬听闻此言，欲望更浓。伸手探下，握住她丰满的乳肉，贪恋地揉捏亵玩，直搅得浴桶之中水花四溅。他的动作逐渐粗鲁，揉得寸心有些不适，本来搭在他腕上的柔荑使了些许力气去掰他大手。</p> <p>真君那只手顺从地挪开，轻掰她的脸，凑过去含住了她红润的娇唇，灵舌长驱直入，攻略城池，只把龙女吻得天昏地暗，再顾不得胸前作乱的手如何放肆，软了全身任君亵玩。</p> <p>杨戬忙将衣带扯开，三两下脱完衣物，将结实的肌肉暴露在湿润温暖的空气里，长腿一跨，进了浴桶之中。</p> <p>寸心稍缓过神来，羞得满脸通红。杨戬脱得一丝不挂，胯下昂扬的巨物在明亮的灯光之中瞧得甚是清晰，令她不禁忆及以往种种，亦是情动，只得别过脸去。待杨戬朝她坐着的地方蹲下于她齐平，这才糯糯地哼哼几声，顺从地搭上他的肩膀，凑过去亲了亲他的嘴角。</p> <p>杨戬笑了笑，亦啄回去。两人抱着甜蜜地亲吻了一会儿，手脚之间渐渐带上更加浓重的欲望，不多时，真君跪在桶中分开寸心的双腿，扶着阳物缓缓顶进。</p> <p>憋闷许久的欲望得到疏解，杨戬酣畅地叹了口气。揉捏着龙女的娇臀半托半抱，抽插起来。温热的水在他抽身的时候有些许涌入，进入时又被挤出，灌得寸心满满当当，醉仙欲死，娇哼不止，轻轻地抓挠杨戬的肩膀后背，激起他更浓的兴致。</p> <p>然这个姿势实在有些不够舒服，真君又不愿放弃在水中非同寻常的快感，入了几十个来回之后，抱着寸心转了个身，将她放在浴桶边缘，把住她纤细柔软的腰肢，自后而入。</p> <p>“啊……”这一下入得极深，插得龙女喊出声来。杨戬再忍不住，挺动腰身大开大合地入了几十个来回，只将寸心肏得稳不住扶在桶沿的手，告饶不止。</p> <p>稍稳心神，真君沿她柔软的线条重抚上她乳肉，弯腰贴住了龙女的脊背。两人的身影重叠起来，每一丝的触感都堆叠着欲望，下体相连的地方紧密无比，律动着汲取惊涛骇浪的快乐。</p> <p>杨戬挨近她的耳垂张口含住，含糊地哄她：“寸心乖，就好了……”渐寻回控制的能力，九浅一深地肏弄。</p> <p>那物大得堪堪能够挤进寸心狭小的缝隙，此刻教开垦了数千年的郎君掌握着技巧挑逗，立刻溃不成军。寸心只觉自己轻飘飘地浮在云端，体内的他拿捏着全身的快感，不禁越发夹紧他，在他退出的时候拼命地吮吸和挽留。</p> <p>杨戬被她夹得舒爽异常，往前一顶，只听耳边的娇吟越发软糯，寻到那个点，忽地插进，狠狠辗磨。</p> <p>“啊！嗯——”寸心哪里还受得住，下体教他肏得抽搐，淅淅沥沥的水喷薄而出，混着点点白浊溶在浴汤里。两腿竟站不住，颤抖着瘫软下去，小穴狠狠收缩，绞得杨戬青筋暴起，端住她的身体，狠命抽插。</p> <p>“哦……”直教她夹得精关失守，真君最后一下猛地齐根捅入，浴桶再承不住两个人一边倒的重量，咣当一声翻倒在地。杨戬眼明手快地撑住寸心，眼眸暗了暗，将浑身瘫软的她抱在怀中，起身放在一旁的小榻上。</p> <p>龙女的下身仍受不住地抽搐，娇喘了好一会儿才略恢复几分。瞧榻边站着的杨戬，抬脚踹过去。</p> <p>真君伸手拨开，近身将她拉入怀里。</p> <p>寸心又捶他：“你快给我收拾了！”</p> <p>杨戬笑道：“不急……再……来一次……”</p> <p>后来，真君吸取经验教训，在房里挖了个浴池。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/011300.夜袭.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0
