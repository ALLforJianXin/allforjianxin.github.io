VLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">岁朝<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>敖寸心端着伤药拉开厢房的镂空雕花木门，先闻到一屋酒香。<br>
杨戬坐在他日常疗伤的软榻上，随意披了件家常黑袍，没有系上，隐隐约约露出从右肩到腰腹缠着的绷带。左手握着卷书，右手拿着一个酒壶，正欲往盏里倒酒。听到动静抬头，看见寸心不悦的脸色，先讨饶地笑道：“好寸心，你别恼，这是前些天老杜送来的药酒，不碍事的。”<br>
“那也不能喝那么多嘛。”寸心坐到他身前，将手中托盘放在案几上，先剥开松垮的外衫，看了一圈发现没有新的血渗出来，终于松了一口气。这么多年来除了离魂那一次杨戬还是第一次重伤到被抬回来。想到他当时紧闭的双眼和惨淡的脸色，寸心心中不免又是一阵心惊胆战，手下微微颤了颤，而后越发轻柔。<br>
杨戬偏过头在妻子额头亲了亲。</p> <p>换过药之后寸心准备起身，却被杨戬笼在怀里不放，动作间裙摆不小心带倒了案几上的铜盏，被药香覆盖的酒香又弥漫开来。把铜盏扶起来，寸心闻了闻盏底的残酒，“酒神这次送的酒怎么没有以前香了？”<br>
“寸心要不要尝一尝？”杨戬拿着酒壶斟了一盏。龙女浅浅喝了一口，眉头还没完全皱起来就被捏住了下巴，杨戬低下头用他的口包裹住她的，在她口腔中吸吮，把那一口酒的大部分都引渡了过去。</p> <p>被杨戬松开后寸心劈手将酒盏夺走，连带着酒壶一起放在托盘中。“不许喝了！你确定这是药酒？”<br>
杨戬好笑着将寸心笼在怀里，“老杜座下那小仙送酒来的时候你不是也在嘛？这才多久就忘了？”<br>
寸心依偎在杨戬身体没有被包扎的那一侧，闻言拧了拧他揽着她的手臂，“好你个没良心的杨戬！我这几天担惊受怕觉都睡不安稳，还能记得你那酒友几时送礼来？”<br>
臂上轻轻一拧怎抵得过刹那的揪心之痛。杨戬俯首亲亲怀里娇娇龙女的鬓角，低声道“是杨戬不好，让寸心担心了。”<br>
寸心感受着杨戬沉稳有力的心跳，忆起从杨戬身亡的噩梦中哭着醒来的这些个昏昏沉沉的日夜，眼眶不由一红，难得软声：“我知道二爷的本领高强，可是二爷出门在外也千万要记得顾好自身，不然我，可叫我如何是好？”说话间眼泪已是像断线珠子一样一颗一颗掉落。</p> <p>公主殿下何时如此直白，杨戬只觉得一颗心被反复揉搓，不禁抱紧点，更紧点，恨不能把怀里的娇娘揉进骨血里。他亲吻着寸心面上滚落的泪珠，连声道歉不停认错，可龙女娘娘的眼泪就像开闸的洪水，杨戬越是温柔哄越是收不住。<br>
“寸心别哭了好不好，眼睛要哭坏的。杨戬知错了，再也不敢了。”杨戬轻轻晃了晃寸心，嘴唇从脸蛋一路向下印上寸心的唇，将龙女的啜泣含在嘴里，化在心里。几个辗转来回轻咬慢吮，原是安慰的亲吻渐渐缠绵起来。</p> <p>寸心攀着杨戬的右肩，不敢用力。却也没有离开，两人也是有些日子没有亲热，寸心也很有些想念。杨戬含着龙女的下唇，轻吮了几口后攻略城池，勾着香香软软的舌头好一阵品尝。寸心被杨戬的气息包裹的晕晕乎乎，身子渐渐软下来，手上顺着肩膀摸到胸膛，摸到包裹严实的绷带，猛得一惊：“你的伤！”<br>
“不碍事的。好寸心，杨戬想你了。寸心呢，想不想我？”杨戬含住龙女圆润的耳珠，轻轻扯了一扯。大手没入纱裙里在大腿根一下一下摸着，又坏心眼地在花心处捻了一下。寸心本就被亲得眼尾潮红，现在又被杨戬两三下撩拨得火起，空虚了几日的身子敏感得不行，蜜液一股一股漾出来。杨戬半是得意半是怜爱，忍不住笑出声来。<br>
“想～”寸心咬着嘴唇攀附着他，却蹙着眉苦恼道，“不行，师父说不可同房。”<br>
“我的身体我清楚。没事的，嗯？寸心照料得那么好，我的伤早已好得差不多了。”杨戬勾了又勾龙女充血饱满的花蒂，亲了又亲龙女殷红丰润的嘴唇。<br>
“不行的。”寸心艰难地坚持。<br>
“那我不进去，好不好？”杨戬说着话将龙女放倒在软榻上，矮身向下。右手手指已经一根两根三根熟门熟路地探入潮湿的甬道，“用别的好不好？寸心也很想的是不是？”<br>
“嗯......”寸心被杨戬进出不停的手指和吸吮花蒂的热唇刺激得迅速情动迷茫，他说了什么实际上如坠云烟的龙女并没有反应过来。迷茫的灵台只听到他说不进去，那就可以放心受用了。喉咙中细细地嘤咛着，腹部在剧烈的快意中释放痉挛，花穴一下一下地吐出蜜液，被杨戬近乎贪婪地全部吞下。</p> <p>杨戬重重舔了口还在轻颤的花蒂，激得恍惚中的龙女又是一抖，抽出手指将龙女抱起跨坐在腰上，按揉着她的腹股沟，扶着身下早已硬得发疼的物事一眼也不多看精准地一气顶到最里。<br>
刚一进去收缩的内壁就紧紧包裹上来，不停挤压吐纳着。杨戬拔出一小半又重重怼进去，如此反复了几个来回，终于忍不住深吸一口气慢慢吐出来，而后托着龙女娇嫩的屁股蛋急急地往自己这边撞。<br>
“杨戬！你这个坏蛋！”下身明显的顶弄和异样的胀热感让情切的寸心回过神来，她又急又气又爽，恨恨地捶着杨戬没受伤的左肩，不解气地又咬了一口。<br>
“寸心，我的寸心......”杨戬一时之间也说不出别的话来回应她，只能不断亲着她嫣红的朱果细腻的雪肤，絮絮地喊着她的名字，直觉自己不知要怎么爱她疼她才好。<br>
龙女呜咽着缠紧了杨戬不断挺送的劲腰，手臂堪堪挂住他在她身上不断烙印的脖子。杨戬大手扣着寸心的腰，动作用力，直往她内里最敏感的地方捣弄。因这伤杨戬已是好些日子没有和寸心亲近，连晚上睡觉寸心也以怕压到伤口拒绝同床——当然也是有点怕两人在闲情絮语中擦枪走火。<br>
稍一走神就被龙女娘娘发现，寸心勾起杨戬的头咬着嘴唇哼唧着“二爷～二爷亲亲我呀。”声音嫩的能掐出来水。杨戬的心也化成一汪春水，他将龙女放倒，双臂撑在她两侧，做最后的俯冲。龙女情癫一发，等闲不能满足，但也只有杨戬能给得起她。</p> <br> <p>一场情事终了，已过了四更天。寸心伏在杨戬怀里沉沉睡去。杨戬把玩妻子柔顺长发，看着寸心脸上泛起的一丝笑意，只觉得这笑意掺着蜜直荡漾到心里。他亲了亲龙女的额头，伴着屋外新一年的爆竹声，沉入黑甜的梦乡。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/021045.岁朝.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99" title="标签">#龙年接龙</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%C2%B7%E7%94%B2%E8%BE%B0%E9%BE%99%E5%B9%B4%C2%B7%E5%B9%B4%E5%A4%9C%E9%A5%AD" title="标签">#戬心·甲辰龙年·年夜饭</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/05/10, 22:33:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/b8b385/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">如醉</div></a> <a href="/pages/1ffa3d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">墙内</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
