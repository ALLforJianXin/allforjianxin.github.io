的资格。</p> <p>你忘了我罢。</p> <p>你是不是真的这么高尚，做戏得这样天真？她要是听见这句大逆不道的言语，就是当场冲过来给他一巴掌，他倒还能实现这个死前的梦想……不会，她心疼他，她是全天下最心疼他的人了。</p> <p>神君的思绪已经混乱糊涂，他理不清自己的逻辑，他不知道自己在想些什么。</p> <p>“就是披上那道，美丽的月光。”他几乎做出膜拜而卑微的表情，对着自己“求而不得的女神”。可是谁又知道，他的心里究竟想了些什么呢？他满心满意地想要见她，也自嘲自卑地想她还同以往一样爱他。她一定还惦记着自己罢？那么就别再那样懂他了，全世界独一份的理解，对于他来说太奢侈，对于她来说却太痛苦。倘若连他也消失不见，她该怎么样才好啊？</p> <p>杨戬自嘲地微微扬起嘴角，满天神佛无一人窥得他低垂眼睑之下深藏的泪水。他真是伟大，真是周到，就连死了，也不忘为分离了几百年的前妻着想，不是嘛？</p> <p>真的好久了，真的已经分开很久了。</p> <p>他想她呀……到了死前，他还在想她。可是他不配，他没有给她想要的，一辈子都没能给她。</p> <p>可是他明明……</p> <p>杨戬支撑不住席卷而来的疲惫，远处仿佛有月光撒下来，照在他的身上。他不知道发生了什么，他再也不愿意关心这里发生了什么。他的思绪已经飘回了百年前的那些日子。</p> <p>他的眼角终于沁出了一滴泪水，他知道的，他委屈极了。</p> <p>他明明已经很努力了啊……可是怎么也抓不住那个跳脱百样的女子，她明明那么爱他，可是为什么见不到自己眼里的爱意呢？</p> <p>他忽然感觉全身湿透，一阵风吹过来，冷得凄神寒骨。他睁开眼睛，发现自己站在瓢泼大雨之中。忽然福至心灵地转身过去，身后撑伞的女子，她是谁——是她，敖寸心！</p> <p>她撑着油纸伞，一步一步地向远处走了，她背影单薄，令人读出她的伤心欲绝，凄凉无比。</p> <p>他想要去追，却怎么也追不上，他徒劳地想要控制自己的身体，可是无论怎样努力，都再捕捉不到她的身影。</p> <p>他崩溃地跪倒在地上，水溅起来，溅到他的脸上。</p> <p>“敖寸心——”他绝望地吼叫，崩溃地哭泣，“你凭什么说我不爱你啊！！”</p> <p>战神抱紧了自己的身体，哭得撕心裂肺。</p> <p>“你凭什么啊——！！”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/100322.诛心.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="pag
