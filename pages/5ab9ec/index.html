tBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">过火<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>前文<a href="/pages/ac0801/">《换新颜》</a></p> <p>杨戬在龙女巧手下换了新颜不久就发现沉香父子尚在人世。他本欲让沉香安稳地做一世凡人，可沉香一心救母，嫦娥又道貌岸然地联合众仙在朝会上为杨婵“求情”，是以他不得已开始追杀沉香。</p> <p>此次回来之前，他在净坛庙被众人用宝莲灯所伤。他有玄功在身，这点伤不出半个时辰便能痊愈，是以他也未放心上，不过这倒给了他一个暂停追捕的理由。</p> <p>“寸心，你猜沉香这小子做什么了？”</p> <p>“哎?这小孩子能做的事那么多，我怎么能猜到啊?”</p> <p>“我和哮天犬追去的时候他竟剃了半侧头，也不知这小子怎么想的，竟然还相信‘正月剃头死舅舅’这无稽之谈。”</p> <p>“什么?”寸心原本正枕在杨戬腿上看书，陡然间听到“正月剃头死舅舅”惊觉起来。</p> <p>“寸心你看他头发是不是很好笑?”杨戬广袖一挥，在殿中幻出一面云镜。</p> <p>寸心却不如他所料的那般开怀，两稍柳眉微澜，神色忿忿，“一点也不好笑，想出这种办法来咒你可见他心肠坏得很。”</p> <p>“阿嚏！”远在净坛庙的倒霉沉香打了个喷嚏，嘀咕一句道是那心狠手辣的二郎神在骂自己，却不知自己早被未曾谋面的舅妈讨厌了。</p> <p>看着云镜中约莫舞象之年的少年身前七彩光华四照，又念起方才孩儿撞进他胸膛时他微蹙的眉头，她还有什么不明白呢？一时之间她又是心疼又是恼怒，怜他案牍劳形责任重大今日又被神灯所伤，恼他目中无人不爱惜自己……待来日那狠毒小儿学得本领他恐怕是要丧命在那无往不利的神灯之下！倏忽间，她似乎看到他孤立无援群狼环伺的光景，一时又惊又悲，泪珠扑簌簌自泛红眼眶抛下，“你只为了你妹妹你外甥，连自己性命也不顾，既然如此，当初你又何必来找我？”</p> <p>其实沉香剃头只为自保并无诅咒娘舅之意，但半侧黑发披散半侧光头锃亮的样子着实让他忍俊不禁。杨戬跟龙女说起也不过是想逗她开心，说起来越觉好笑嘴边又添了句“正月剃头死舅舅”，却不料自己这一番“添油加醋”的逗笑之举弄巧成拙，原本那点自以为是的窃喜荡然无存。</p> <p>该死，自己怎么能这样另她难过?</p> <p>“都是我的错，寸心别哭了好嘛?”杨戬有些无措地用拇指拭去龙女脸上的泪珠。</p> <p>寸心捏起小拳就要捶他，临到他身上又止住了动作，“你只管你妹妹你外甥去，管我哭不哭作甚?”</p> <p>杨戬将人拢进怀中，“胡说什么，我不管你管谁去?”</p> <p>寸心打了个哭膈，抽抽噎噎，“我才不信你，从前你……你也说要管我一辈子，转眼就去寻死，怎么求你都不肯留下。我……我就知道我们……娘俩比不上你妹妹，我就不该……”</p> <p>和好前装得那么可怜，说甚么“能不能再给我一次机会”、“不要喜欢别人好不好”，仿佛再不喜欢他就会伤心得死掉，可现在天上才过了几天，他又为了别人轻易就要搭上自己的性命，难道她和孩子都不能让他足够留恋吗？杨婵又无性命之忧，多等几年不行嘛？</p> <p>越想越伤心，寸心拿开他搭在她腰间的双手就要离去。杨戬忙拉住龙女，绕到她前面，一撩衣摆，单膝跪在床前的脚踏上，两掌握住龙女纤纤玉手，郑重地仰头注视着她，“寸心，在杨戬心中，再不会有任何人能越过你。”</p> <p>寸心听他说得极为诚恳，亦觉有些欣喜，可她与他妹妹外甥争个高低并非她的本意，她只是盼他珍重自身，“那你答应我，再不许指望他了，我们再想想别的方法。”</p> <p>杨戬深深地望着寸心，他能听到龙女爱他忧他的一片真心。若是可以，他又何尝不想和心上人安宁相守?但他亦曾亲身被困在这灭人欲的天条中一千七百多年，亲身经历玉帝为了天廷尊严要害寸心性命，亲眼见过芸芸众生为恶法所害……</p> <p>十几年前妹妹突然结婚生子、天奴逼他在血亲和北郡间抉择、如今嫦娥冠冕堂皇在灵霄告密……命运一步一步将他推到了这样特殊的时刻，杨戬劳心周旋之余预感到这就是他一直追寻的机会:一个能解救他和寸心，解救妹妹一家，解救三界众生的机会，他又怎能怯弱?</p> <p>“寸心，你知道每次我来看到启儿欢欣雀跃地要抱抱时是什么感受吗？原本我只道是孩子依恋父亲，后来我突然意识到因着这天地间的时差，于我而言我们是日日相见，于孩子而言却是久别重逢，是以才每次都会这样欣喜。寸心，我能明白思念的滋味，又如何忍心让你们在下界念我一年又一年呢？我不是单为了三妹，我想让我们一家三口能在一个更加美好的世界相守。”</p> <p>寸心望着杨戬坚定的双眸，她明白他想造就新秩序的决心。虽然方才因忧心而试图用自己和孩子困住他，但她亦曾因这天条在情爱和亲情中挣扎近两千年，亲眼见过玉帝王母为天廷威严在人间建立地狱，亲自见过在他庇护下免于灾祸得以安宁的无数生灵……怎会理解不了他呢?已有之事, 后必再有; 已行之事, 后必再行，若不改了这天条，多少良善的生命还要无端罹祸，他们一家的团圆又如何可期?</p> <p>“我都明白，我不该这样说的。”寸心起身扶着杨戬小臂拉他坐回床上，小手轻抚上他胸膛，担忧道，“胸口还疼吗？”</p> <p>杨戬覆上她搭在他胸膛的小手，抓起来包在手心，本想说不疼，临到嘴边的话又吞了下去，“寸心亲亲我就不疼了。”</p> <p>寸心睨他一眼，“啵唧啵唧”在他颊上唇上印上几吻，又扎进他怀里，“我知道你现在做的都是对的，但你也不许逞强，要好好保护自己，明白吗?对我和启儿来说，没什么能比你的安危更重要，若是你有个三长两短，我也不会独活，知道没有?”</p> <p>杨戬一听，登时急了，“那不行，无论如何，你都要好好的。”</p> <p>“那不行，没有无论如何，没有万一，你必须给我好好的。”</p> <p>“好，我答应你，为了你和孩子，我一定会好好保护自己。”</p> <p>话都已说明，两人情意更是缠绵，很快又腻腻歪歪起来，不觉已到了傍晚。杨戬走至窗前欲关上隔扇，瞥见花园里的百米古树，回头问寸心:“我们去招摇山散散心好吗？这会那漫山的迷榖树都开花了。”</p> <p>“好啊”寸心看着睡在摇篮里的小龙抬起小胖手揉揉眼睛，似乎就要醒来，问道:“那宝宝怎么办?”</p> <p>杨戬给小龙施了个粉色的凝神诀，执起寸心的手，淡淡一笑，“放心吧，他一时半会还醒不了。”</p> <br> <p>杨戬粉色的法力来源：见 @兮倩 的 <a href="https://zhangxiqian279.lofter.com/post/1f14ceb9_2b6d1e4b5" target="_blank" rel="noopener noreferrer">妇唱夫随<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/022712.过火.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="
