EIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">关山度若飞<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h3 id="_1"><a href="#_1" class="header-anchor">#</a> （1）</h3> <p>塞北的风很喧嚣，不像南方那样水汽氤氲，格外养人。敖寸心在江南待久了，头一回到这样严苛的地头，虽然有仆从忙前忙后照顾左右，一路颠簸下来，小脸都消瘦了一圈。</p> <p>她掀开车帘一角，只看见满天的衰草，风很喧嚣，吹得尘土飞扬。她悻悻地缩回车内，嘀咕了一句：“好艰难的地方，该遭很多罪罢？”</p> <p>杜意正与她倒水，闻言偷偷地一笑，揶揄道：“小姐别再惦念了，咱们很快入了城，兴许过两天就能遇见将军了。”</p> <p>敖寸心的脸腾地一红，嘴硬道：“我是……是陪着四姐过来省亲的，好端端的，提起他干什么。”</p> <p>杜意将茶沫轻轻地揩去了，递给她，笑道：“是极是极，小姐前日求的平安符也是为着省亲，昨夜缝的剑穗子也是为着省亲，小姐为着省亲可操碎心啦——”</p> <p>敖寸心的心意叫她几句说破，一时间不由面红过耳，羞恼不已，捉着杜意便要呵痒。主仆二人嬉笑了好一阵子，正打闹间，忽然听到车夫扣了三下门框，听他禀道：“三小姐，前方树林中有一营卫兵暂驻，虽然是我汉朝旗帜，但是否绕过树林走？”</p> <p>寸心历事不多，并不能抉择，因而禀了走在后面的敖听心。队伍之中有一位常年行走在北方的老人，听心请他询问之后，确定北境兵马管理严苛，礼待百姓，又见到沿路三三两两到樊城去的商人脚夫都并未绕路，因此大着胆子，命人继续向前，穿过树林，不必绕路。</p> <p>北境本是连年兵祸，战火连天之地。北狄连年进犯，数十年前朝中两王相争，燕云十六州连番沦陷。后来明君继位，血洗朝堂，推行新政，任用贤才，如此堪堪稳住朝局。这些年偶尔夺回几个城池，但因将才青黄不接，坐镇边关的大将秦老将军年老体衰，无人可用，与北狄始终僵持不下，素来离乱。</p> <p>四年前，秦将军病故，北境群龙无首。眼看大敌当前，皇帝一旨诏书，册封金吾卫上将军杨戬为骠骑大将军，北上坐镇边关，全权接管北境事务，甚至官员任命罢免，皆无须请旨。</p> <p>朝野上下一片震动，本以为这位杨小将军年纪尚轻，经事无多，当不得此等大任，结果他不过接管北境五年，已经接连拿下燕云十六州数座城池，打得北狄王廷落花流水，百姓口口相传，皆道“将星出世”。此时北境已经渐渐安定，昔年敖听心的外祖故宅在此，一年前迁居回来，这一回敖寸心陪同堂姊北上，便是去敖听心的外祖家省亲。</p> <p>且说姊妹二人车架驶入林中，四周分有两方兵队，是暂驻在此歇息的，三两围一个炉灶，生火做饭，并不严阵整齐。路口有几个卫兵值守盘查，以防城中混入北狄的奸细。</p> <p>兵家抽查不比城防，总是更加严些。寸心因下了马车，与听心正在一旁歇息等候。一个校尉领兵探他们的行李车马，忽然打眼望了过来，走进几步欲要细看敖寸心的容貌。</p> <p>敖听心连忙将她护在身后，满脸警惕地问道：“军爷，不知有何事？我们是京城过来探亲的……”</p> <p>那校尉一愣，连忙解释道：“失礼了，我是看这位小姐好似一位故人……”</p> <p>敖寸心听这声音有些耳熟，钻出头来一看，立即惊讶地叹道：“郭申，是你！”</p> <p>“啊，夫人！”郭申喜道，“将军正在城中呢！若见了夫人，定然欢喜！在下立即带夫人进城罢！”</p> <p>北境一行，寸心虽不免带着些说不清道不明的隐晦心思，但也从未想过这么快见到那人，连忙回绝了郭申，只是盛情难却，还是由他一路护送到了城中，寻到敖听心外祖家，一行人这才安顿下来，辞别了郭申。</p> <p>寸心陪同听心拜见了家中众人，暂且不提。待用完了晚饭，敖寸心到客居的小院之中安顿下来，洗去风尘，舒意地躺在软榻上时，这才觉得数日奔波劳碌的疲倦阵阵袭来，天色将暮，未及掌灯，便缩在帐中沉沉睡去了。</p> <p>梦中似乎忆起白日在树林当中见到的士兵们。北地寒风凌冽，众兵丁仍只穿了不薄不厚的甲胄，一个个晒得黝黑，显见得在此受了许多的磋磨。这使她不得不惦念起那人，也不知离京四载，是否也过得像他们一般艰苦？吃得好不好？是不是像传闻一般宵衣旰食？</p> <p>寸心挣扎着自梦中醒来，轻轻揉了揉眼睛，发觉夜正深，四下里十分寂静，因是隆冬将至，连蟋蟀蚊虫也没个动静，只听见小院里种的椿树被风吹着，发出令人舒适的沙沙声。</p> <p>她无声地叹了口气，没有惊动杜意等人，披着一张薄毯走到窗边，望着夜空中希朗的繁星想心事。敖听心外祖家姓苏，迁居回故乡后，翻修了旧宅，只是个两进两出的小院，与姐妹二人京城当中的家宅可谓天差地别。苏老爷怕她们在家里住得不舒坦，特意着人盘下邻居家空置的宅子来与二人住，盛情难却，寸心推脱不下，又确实不爱与人应付客气，便与敖听心一齐到这间小院居住了。</p> <p>寸心自四年前送了杨戬离京，此后去过江南诸地，且走且游，两年后架不住父母催促，只得回到京城。她在外行走得久了，在闺中难免无聊，待了一年，听说堂姊要出远门，不知是为着散心，还是为着压在心底的挂念，她说服父母与兄长，踏上了去往北境的路。</p> <p>愈近北方，心境愈发纷乱。她起初还能骗骗自己是为了领略北境风物，直到此时夜半无法安眠，宁静的夜色教人不自觉地放下厚重心防，她忧虑地支着脑袋，望着摇曳的椿树妥协，她是为着惦念那人，才巴巴地赶来的。</p> <p>本来没想着能这么快在偌大的北境遇见他，可白日里郭申提起，道将军才结束了一场糜战，北狄王廷内乱不止，已经回天乏术，这一回到后方的宁城来，整肃内务，或许要待上五六日。寸心想到此处，心中不由得活泛起来，一时思念他极深，不肯再错过；一时又念及他走的时候，二人已经闹到和离的地步，这样上赶着相见，是否一厢情愿？他这些年，究竟是会念着她的好，还是会如释重负，自嘲龃龉，或许早已将昔年的恩爱抛诸脑后？</p> <p>她不着边际地想着，灵台逐渐混沌，起身欲回帐中安睡，恍惚之间听到几缕马蹄哒哒的声音、马儿连打几个响鼻的声音。再要细听，已不可闻。寸心也不以为意，钻回被褥中睡下了，辗转反侧，终于入眠，直到天明方醒。</p> <p>第二日清晨，众人皆还因长途跋涉人困马乏起不来身，只有几个苏家调借过来的小厮在院前的青石板上洒扫。晨光微曦时敖寸心便起身，洗漱梳妆后也不打搅旁人，只带了杜意与两个身上有功夫的侍卫，打算到街上去逛一逛。</p> <p>才出了府门，打眼见着一匹通体雪白的骏马，见到寸心后嘚嘚啾了一声，亲昵地凑过来。敖寸心一惊，认得这是杨戬的战马，转头一看，只见一个身量高大的少年在巷尾，逆着光走过来，一把牵住马，对她绽开一个大大的笑脸：“寸心，银合吓到你了吗？”</p> <p>她讶然地看着他，心中只先浮出一个念头：“他怎么变得这么黑？”</p> <h3 id="_2"><a href="#_2" class="header-anchor">#</a> （2）</h3> <p>当年新帝上位后人才凋敝，不但重开文举，亦开武举。杨戬当时长到十七岁，正是齿少心锐，意气风发的年纪，自小舞刀弄枪，力大无穷，能扛千斤巨鼎，在武试之中一举夺魁，蟾宫折桂，亦曾打马游街赴过琼林宴，风流倜傥，生得比探花郎还要俊美，惹得京华女子无不倾心爱慕。</p> <p>杨戬为长公主瑶姬的第二子，昔年长公主违抗圣命与杨郎私奔，未婚先诞下长子，为皇帝所不喜，受贬而谪至黄州。黄州艰苦，长公主怕刚刚诞下的二子身体孱弱，受不得颠沛流离之苦，只得暗中托付给了皇嫂。杨戬因此自小在皇后身边长大，生得聪明伶俐，粉雕玉琢，相处日久，也备受帝后疼爱。虽然陛下始终不予杨天佑好脸色，但却给他的二儿子封官进爵，延请名师教导，除诗书外，尚亲自将曾做皇子时镇守边关习来的兵法倾囊相授，可谓疼爱备至。</p> <p>敖寸心乃是户部尚书敖闰的女儿，昔年高祖起兵时，敖家曾襄助一臂之力，是朝中颇为根深叶茂的勋贵世家，以财力而闻名，富甲天下。当初皇帝夺嫡时，也鼎力扶持，因此盛宠不衰，与皇家十分亲近。寸心与杨戬自幼就相识，青梅竹马，两小无猜，情深义重。那年杨戬蟾宫折桂，在金銮殿前受彰，皇帝大喜，许他一个心愿。他神采飞扬，满目都是醉人的星光，当着文武百官的面，跪在金阶前谢恩，出言求娶寸心。</p> <p>一时满长安的姑娘都折碎了芳心，这样一位标致的玉面小郎君，年纪轻轻便已拜倒在她人的石榴裙下，实在可叹可羡。寸心想到此处，一时间讶然无言。谁能想到当年细皮嫩肉，白生生俊美风流的贵族美少年，在北境待了不过四载，竟晒得面如古铜，小麦色的肌肤衬得他胸前的银坠子都亮了许多。</p> <p>见他正笑吟吟地看着她，目光灼灼，寸心默然半晌，被他的突然出现打了个措手不及，一时不知说什么才好，只得呐呐道：“你……你怎么在这儿？”</p> <p>杨戬捏了捏汗湿的掌心，不好意思地笑了笑，含糊道：“我听郭申说，你在这里……”</p> <p>寸心听他说得局促，语气当中带着隐隐的期盼，心中也不由得生起亲近之意，于是偷偷打眼望着他，发现他额前的碎发尚沾染了浓重的露华，银合的鞍鞯上也染了一层晶莹的露水，显然是在此等候多时，并不是刚刚才到的。想到这里，寸心轻轻叹了口气，走了两步靠近他，将银合的缰绳从他手中拯救出来，“它的脖子快被你勒歪了——你什么时候来的？”</p> <p>他果然撒谎：“刚来不久，就看到你出来……”他见寸心轻飘飘地撇了他一眼，转身就要走，一时情急，连忙拉住她的袖子，“嗳，寸心……你去哪儿？”</p> <p>她忍着笑，指了指小巷，“本打算去城中逛一逛。你来找我的么？要不要一起？”</p> <p>杨戬被她邀请，大受鼓舞，长纾了一口气，雀跃地笑道：“这儿比不上京城，虽然已经安稳了几年，难免鱼龙混杂的。你要出门，一定带上我。”说着快步跟上她，单手接过银合马的缰绳。</p> <p>寸心嘁了一声，嘀嘀咕咕：“你往日在家里，也是这么说的。”偷偷去看他时，却正好撞着他热切的眼神，连忙别过脸去佯装看路，心中琢磨了大半夜的忐忑在这一来一回间已落到了实处，不禁暗暗地发腻：他没变，他原来也和我一样，一直想着我的。</p> <p>杨戬带着她穿过小巷，来到一条较为繁华的街道，虽然远不如京城，但总算有小贩沿路叫卖，或卖些糕点，或卖些衣物，都是吃穿用行者居多。寸心在京城长大，也久居过江南，都是富庶之地，不曾见过这般萧条的街道，未免感到乏味，只买了一些糕果特产打算回家尝尝鲜。</p> <p>二人逛到街尾，因衣着富庶，容貌不俗，又牵着一匹雪白高大的马，格外引人注目。这时一个婆子跻身过来，满脸堆笑，对杨戬叫卖道：“这位军爷，可要小厮丫鬟不要？给您和夫人暖暖脚跑跑腿，极好使的！”</p> <p>寸心闻言，扭头一看，只见那婆子身后的一个摊位上，三三两两跪着几个瘦弱的人，衣衫十分褴褛，几乎不能蔽体，头上插着货卖的草标，形容极为狼狈。她不由得皱了皱眉，被他们饿狼一样的眼神盯得有些发怵，挨杨戬进了一些。</p> <p>杨戬侧身挡住她的视线，轻声道：“没事。”几句话打发了那婆子，护着寸心往前走，轻声道，“别怕，只是个人牙子。这儿动乱得很，人命贱如草，没那些遮遮掩掩的虚礼。在大街上明码卖了，总比冻死饿死强。”他说到此处，便顺口叮嘱她，“不是唬你的，下次若要出门，纵不叫我，也要喊上你四姐，多带几个侍卫。”</p> <p>“嗯，”寸心点点头，仍想着刚才的事，“可是他们……”</p> <p>杨戬无奈地一笑，伸手揉了揉她的脑袋，“我把他们都买了，带回去做个烧火的，专门煮茶，成不成？”</p> <p>寸心登时高兴了，嘻嘻一笑，牵住杨戬的衣袖晃了晃，说道：“那给你煮茶的人会不会太多了呀？”</p> <p>杨戬见她开心，也压不下上扬的嘴角，牵住她的手笑道：“不多，且还缺一个喝茶的姑娘。待他们学会煮茶了，我叫那个该喝这茶的姑娘来品一品，你说好不好？”</p> <p>寸心心头一动，瞪着眼一瞥他，面上似笑非笑，并不回应他什么，抬脚便往前走去。杨戬只见得到一个飒然的背影，比着胡服束起来的发左右摆着，连忙抿着唇跟上去，仍旧护在她身边，唤道：“寸心？”</p> <p>敖寸心傲娇地哼了一声，扭过头去。</p> <p>杨戬一面牵着马，一面追着她，赔笑道：“寸心，寸心？哎，寸心……”</p> <p>她被缠得烦了，停下脚步照他胸膛上擂了一拳，娇叱道：“干嘛！干嘛干嘛干嘛！”</p> <p>“你别不理我嘛，”此时二人已走到城南的锡伯河畔，行人渐少，太阳还未爬到头顶，阳光尚可忍耐，他脸上已有些汗珠，手上的护腕镶嵌了几颗宝石，亮晶晶地恍人眼。杨戬满脸都是讨好的笑，就像从小到大的无数个日日夜夜——他是哄惯了她，且哄得极为拿手的，“回苏府还有一段路，来的时候走了那么久，已经很累了。你骑上马吧，我牵着它走回去。”</p> <p>诚然寸心也很吃这一套，装模作样地哼了一声，然后立即笑开，扶着他坚实的臂膀，被他抱到银合上坐稳。二人一个骑着马，一个牵着马，说说笑笑地，慢慢往苏府而去。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/10.连载中/221108.关山度若飞.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/dba3a0/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">将明</div></a> <a href="/pages/c77c64/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">信</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
