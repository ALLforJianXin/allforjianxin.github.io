杨戬眉眼带笑，从乾坤宝袋中掏出一柄长剑，凑到窗前。“杨戬近日总算寻得一柄灵剑，世上再没有比三公主还合适作它主人的了。着急给三公主送来，若因此惊扰了三公主……杨戬愿当面赔罪！”</p> <p>敖寸心挪了挪位置，从被剑意破开的裂缝中往外探看，见杨戬手中那柄与自己龙身颜色极为相似的粉色长剑，心里头欢喜，又想起杨戬那日的默不作声，颇有些酸涩。</p> <p>“你……谁要你当面赔罪！”敖寸心攥紧手中剑柄，“你我现已和离！如今……如今没有一分关系了！你是天廷的司法天神，我是西海的龙三公主，怎会适合这般来往频繁……”</p> <p>窗外没了声响。</p> <p>敖寸心等了几息，将小窗推开一道小缝，正欲查看外头的人走了没走，一只修长有力骨节分明的大手突然挡住窗沿。</p> <p>敖寸心心中一惊，手忙脚乱的丢下长剑，两只手伸过去掰那只紧紧捏着窗沿的右手，要重新关上窗子。</p> <p>手的主人任她搬动一会儿，才反守为攻，夺过敖寸心的一只手，牢牢扣在掌心，大拇指轻轻摩挲她的手背。</p> <p>“三公主……寸心……”杨戬手中抓着爱人的柔荑，见寸心没再极力挣扎，才轻轻松开力道。“寸心，杨戬会早日来接你。你再给杨戬一次机会，等等杨戬……好吗？”</p> <p>“好你个杨戬！”敖寸心手上使力，甩开杨戬的手。“你说要好便好？你说要等便等？你拿我敖寸心当甚么？只会在家等你的人吗？”</p> <p>杨戬急忙摇头，想到隔着窗户，寸心看不到，又急忙回道:“杨戬绝无此意！寸心你最了解杨戬……你知道的……”</p> <p>两人隔着窗子又相对默立许久，龙宫的海兵海卫开始换岗，细碎的嘈杂声从殿门处传来。</p> <p>“你先回去吧。”敖寸心率先出声，抬手推开窗户，收下那柄粉色灵剑，却不抬头去看杨戬。</p> <p>杨戬近乎贪婪的看着眼前倚在窗边的寸心，只想把寸心装进眼睛里一块儿带走。</p> <p>换岗后的海兵开始巡查，杨戬不舍的用目光去描绘寸心。</p> <p>掐在最后一刻，才哑声道别，转身离去。</p> <p>敖寸心慢慢抬头，视线去追杨戬的背影。</p> <p>粉色灵剑静静地躺在主人怀中，顺着剑柄滑下一抹水痕。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/042700.据说真君又跑去西海了.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pag
