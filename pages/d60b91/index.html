门，进了书房，点起灯，索性将剩余的文书工作一并了结。</p> <p>深夜很安静，时间的流逝也悄无声息，他不知道过了多久，静夜里忽然响起节律的叩门声，接着是恐怕有诸多语法错误的几声喵叫。</p> <p>“Trick or treat？”</p> <p>打开门，魔女提着一盏昏黄的南瓜灯，披散长发，赤裸双足，站在走廊半明半暗的阴昧中，抬起头，笑容甜蜜又懵懂，男人的呼吸停滞一瞬，目光从发顶到足尖，如有实质地慢慢滑落，“啊！”少女短促惊叫，房门在身后用力摔上。</p> <p>炙热的口唇亲吻上来，托起姑娘架在身上，书桌上的杂物被粗暴挥落，哗啦啦撒了一地，光裸的后背触到桌面，有点冷，魅魔小声轻呼，搂紧了身前的人，杨戬停顿一下，扯开黑色的法袍铺在桌上，再将她轻轻放下去。</p> <p>浓黑的布料衬着娇嫩玉体雪白横陈，她是塞壬还是海伦，或者干脆就是罪孽本身，宽厚手掌摸到肩头，勾起黑色系带，“啪”，回弹过去，轻轻抽在身上，娇气的公主轻哼一声，不满地扭了扭身子，被他轻斥一句“别动”，俯身往锁骨上亲吻，低低道，“怎么穿成这样？”</p> <p>毛茸茸的猫耳微微抖动，项圈坠着金色的铃铛，上身只有几条粗带连成胸脯的轮廓，两根细绳连接聊胜于无的布料，在髋部打成蝴蝶结，再往下，是黑色的蕾丝吊带袜。</p> <p>手掌滑下大腿，迷恋地来回抚摸，口齿叼开衣带，敏感的朱果被温热包裹，魅魔嘤咛一声，抚上男人埋在胸前的脑袋，不由自主向上拱身，欲拒还迎，“嗯……还不是…你使的坏……”</p> <p>“嗯，”他却也不否认，吮着樱红乳尖啧啧作声，口齿含混，“…这么乖？冷不冷？”</p> <p>“啊……家里…嗯…不冷……”另一侧却备受冷落，魔女不依，抓起他的手塞入绵软乳肉，那手掌便使力揉搓，指尖撮起红珠，没几下就弄得涨硬挺翘，另一只手更往下滑落，“呲啦”撕碎长袜，从布料缝隙探入进去。</p> <p>“唔…！”上下夹击，过量的快感难以承受，姑娘惊喘一声，湿液喷了他满手，不够，还得要更多，两腿并起夹住他磨蹭，口中娇声求道，“杨戬…我饿了嘛……”</p> <p>呼吸陡然粗重，只听道“这就喂饱你”，火热坚硬的粗物便抵上软烂花心，那人又道“乖猫咪自己来玩逗猫棒”，寸心暗自撇嘴道坏人，却是情焰如炽难耐至极，勉力支起身子往前一送，两人俱是呻吟，头部满满当当纳了进去。</p> <p>哪里还有心思逗她情趣，猛然抬起两腿架上双肩，那腿心花户直入眼帘，粉嫩软肉自发蠕动，奋力含吃着充血发紫的肉棒，透明黏腻的水液从缝隙吞吐而出，沿着股沟细细往下流淌，臀部几乎整个悬空，蜜液便滴滴答答砸在桌面，这糜艳光景看得人一腔热血如沸，再不能忍，用力向前挺腰，尽根没入，戳得魔女又大泄一回，便顶着滚烫喷洒的水液，把住腰际急速抽动起来。</p> <p>“啊……嗯……慢点…啊…！”</p> <p>这魅魔一贯是言语上的巨人，当真行动起来，全然不是对手，进出几下便颤着身子去了一遭，染上哭腔连声告饶，杨戬只口中哄劝，仍将人按在桌上大力插弄，搅得穴口艳红捣出白沫飞溅，他双手掐着两只嫩乳挤压搓揉，也架不住胯下使力，顶得姑娘阵阵摇晃，那颈间的皮革项圈一顶，铃铛便响一声，男人还得了趣，时缓时急，深深浅浅，乐音清脆响成一片，夹着女声高低流泻娇吟，令恶劣的神父心生戏弄，重重一挺，只觉花心一张小口自发收缩，嚼紧龟头，直往荏弱宫胞中突破，噗一声轻响，便是潮热淫水当头淋下，舒爽异常，他也忍不住沉声喟叹，压着垂挂黑丝的两条玉腿俯下身去，将人几乎摆成对折，吞下魔女惊喘温存含吮，又辗转吻向面颊脖颈，按捺射精的冲动，缓了缓，亲亲她通红的尖尖耳廓，低笑道，“寸心好厉害…嗯？刚才叫得真好听……”</p> <p>高潮头晕目眩的余韵尚未过去，给他柔软潮湿的舌尖舐过敏感耳廓，竟是小腹痉挛一下，又吐出大股黏腻湿液，寸心口中全然说不出话，启唇便发一声甜腻娇喘，拿眼瞪他也是妩媚风情，那埋入体内的阳物方越过高峰，本就憋胀难忍，淫液一浇更大几分，将紧锁的宫口撑满缝隙也无，连穴肉皱襞都被铁棍寸寸熨平，“唔…！”再料不到还有这出，女人眼角泌出泪珠，咬紧牙关玉足往他脸上踏去，自然不中，叫他偏头一躲，捉住脚踝亲了亲，道了声“乖些，就好了”，叉开她两腿往腰间环绕，将人抱起坐在桌上，又是一阵狂风骤雨的颠动。</p> <p>“呜……”上翘的菇头一点点深入戏弄宫壁，两臂搂腰带着她下浮收紧，耐受不住，魔女亮出犬牙，寻着嘴边宽厚脊背狠狠下口，她咬得毫不留情，神父也闷哼一声，鲜血淋漓迸溅而出，汩汩流入喉中，“嗯……”这血液于魅魔不仅能充作食粮，又因来自她早已标的的猎物，多少有些催情功效，吞咽几口，身下泌出更多潮润，软肉微微蠕动，将硕大的头部全然纳入宫腔。</p> <p>“呃……”男人也被刺激得将她搂紧，额角暴起青筋，极致地紧密贴合，忽而面色一变，低喘道，“别……啊……寸心……”原来是她伸出小手往身下结合处探去，连忙拿手去拦，却是不及，只抚上小腹顶起的鼓突，便激得他闭了闭眼，伸出手颤抖在半空中失了方向，那绵软小手又轻轻按了按，叫人低头叼一只乳肉塞住脱口呻吟，却被生理反应背叛，巨物应和般兴奋跳动，已是忍不住渗出前精，“寸心…寸心……”含混呼唤爱人的姓名，魔女轻轻应声，再向下，摸到两颗湿漉漉的囊袋挤在穴口，压得软肉发白，握入掌中把玩揉捏，神父只来得及握住她手腕，却不知是推拒还是鼓励，“哈……啊——”忽而用力收紧，肉筋猛然一颤，大股浓稠浊液喷入苞宫，烫得宫壁一阵缩张，抽搐吐出爱液。</p> <p>高潮中的蜜穴极为敏感，这阵子疏于欢爱，攒了许多食粮，一股接一股喷射出来，只激得潮头一浪浪绵连不断，越攀越高，寸心头脑一片空白，身下是止也止不住如泄洪一般，待他清了粮仓，仍习惯性往外流水，几乎泻得脱力，喘吁细细，瘫软在他怀里。</p> <p>“呼……”将那作乱小手包入掌中，轻轻捏弄以示惩罚，“坏姑娘……”又后知后觉肩上咬得生疼，仍未止血，嘶了声道，“下口真重。”魔女无力申辩，只翘起身后幻出的猫尾，讨好往他腰上环，两只软软猫耳轻蹭下颏，杨戬自然受用，往她潮红脸蛋吻了吻，低声道，“再来。”满意见调皮小猫惊恐地瞪大眼睛，含住双唇缠绵啃吮一番，逗引得她又有些动情，揽住腰际，贴身将人抱起来，朝卧房走去。</p> <p>“嗯……”那半软的阳物还深埋在体内，走出几步，穴壁嫩肉反射性地吸吮绞缩，便叫它重新硬挺起来，姑娘欲哭无泪，愤愤寻了一块好肉再咬，鲜血入口，反而愈发情热，被人放在床上，自个儿也耐不住，勾着他不愿松手，男人道声“别急”，抽出肉棒将她翻了个面，握住茸茸猫尾饶有兴趣地把玩，坏心眼待她回过头来，泣声求道“杨戬！”，还要明知故问，迫她说出些“想要”“快进来”之类淫词浪语，逗她道给棒棒糖吃，不许再捣蛋，见人羞愤欲死，极不情愿地应了，才翻身压上，抬起腰臀自背后入了进去，深深插得魔女“嗯啊”长吟，骑着雪白漂亮的小猫，复用力抽送，挺弄起来。</p> <p>入冬之际，帝国北境的夜晚极为漫长，壁炉烧得暖烘烘的小屋里，云雨又施三两回，不知何时才告止歇，魔力化出的猫耳猫尾早已维持不住，只有粘人的小猫还蹭弄着爱人颈脖，口中喃喃着“不要了、不行了”，主教爱怜低笑，轻吻落在额上，安慰道，“不弄了，快睡吧。”垂首望向她微微鼓起的小腹，猩红的淫纹淡淡浮现，间或明灭，预示着魔女的身躯仍在吸收粮食，他将温热掌心贴上去，问道，“吃饱了吗？”已经睡去的少女自然不会给出答案，只迷迷糊糊感觉到亲近，喉中发出一串意味不明的咕噜声，真像小猫饱餐一顿，敞开柔软肚皮向人撒娇，怎么这样可爱天真，又这样轻信人类呢？杨戬喟叹一声，轻唤她的名字，收紧两臂，深深扣入怀中。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《西幻pa》/221105.Candy Cat.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%
