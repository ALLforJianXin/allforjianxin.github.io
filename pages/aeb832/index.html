</p> <p>她还不满足，柔荑抓住他手，拉起自己的寝衣放了进去，直接贴在自己柔嫩的肌肤上。暖融融的，很是舒服。可察觉到那手的主人居然有想要逃开的意图，小殿下委屈地扭动起身体，似是撒娇耍蛮，不肯他走。</p> <p>她只着单薄亵衣的娇躯整个被杨戬抱在身上，丰满的胸臀揉擦过他的肌肉。</p> <p>杨戬绷紧了身体，攥紧了另一只手的拳头。</p> <p>他被她……蹭硬了……</p> <p>敖寸心心大得紧，自己的月事从来不记得日子。龙族好凉，尽吃些生冷刺激。</p> <p>她嫁给杨戬后第一次月事便将殿下给整怕了，之后他牢牢记住这不省心的龙每月的日子，到了那几天坚决禁止她碰任何一点凉。绕是如此，敖寸心还是会很难受，他每每将她抱在怀里，揉着她肚子输送法力。</p> <p>就这么几天不看着她，又出这事！</p> <p>杨戬无奈，忍下冲动老实抱着妻子不敢乱来。这期间不可行事，虽然让敖寸心给他解决的方法依然很多，可瞧她难受，他一点儿也不舍得。</p> <p>可怀里的小家伙怎样安静！她只因身上不爽利，睡梦中就想要折腾。衣物松散又轻薄，这郎君几日的火还未泻，本来下海之前便已经兀自存了心思，刻下怎生忍得！他大掌被迫轻揉寸心娇嫩的小腹，实在扼制不住冲动，流着满头的汗颤颤巍巍解开了自己的腰带，半褪亵裤。那物弹将出来，给郎君握在手中，瞧着怀里美人，动情地微微撸动。</p> <p>他另一只手还贴在三公主肚皮上，触感腻滑细嫩，令人好不动情！不愿意拘束一处，他抑制不住诱惑，轻轻摸上龙女的酥胸，小心地揉捏起来。</p> <p>神君将美人抱在身上，一手把玩妻子乳肉，一手紧握自己巨根，喉结滚动，呼吸急促。</p> <p>“啊……寸心，寸心……”杨戬胸膛起伏，嘴里呢喃妻子闺名。他这动作委实大了，即使敖寸心睡得沉，现下也是模糊醒来。</p> <p>“嗯……杨戬……”她刚醒来的声音软糯，无意识娇哼出了声。飘进杨戬的耳朵里，简直就是致命毒药。</p> <p>他一只手撸动得愈快，低下头去含住敖寸心的耳垂，惹得佳人呻吟一声，只道“不要”，另一只手不住在她上上下下流连游移，端的是欲壑难填。</p> <p>敖寸心意识逐渐回笼，知是杨戬寻她，可这浑人，只会做这……荒唐事情！</p> <p>她心中虽怜杨戬几日素食，可月事未了心情不爽，嘟起嘴巴委屈极，眨巴着眼睛一言不发，忽然掉了金豆子。</p> <p>杨戬只觉手臂上“哒”地一湿，大惊凑过去瞧敖寸心的小脸。天生神目将她眼泪看得清清楚楚，心下一急，哪里还顾得上自己！只停下动作来，忙不迭去擦敖寸心的眼泪，嘴中语无伦次道：“寸心哭甚？是我不好，都是我的错，我不碰你了，可别哭了，这个时候哭了有许多不好的……”</p> <p>敖寸心听他急切地安慰，那股莫名的委屈愈发强烈，哭得更加伤心，可是急坏了杨戬。将她小心地抱在怀里轻轻擦拭眼泪，不敢再有半分的造次，只柔声安慰：“我错了……我错了小殿下，我真是个混蛋，惹哭了小殿下……别哭了好不好？我都依你，都听你的……你是不是喜欢那副蓬莱仙岛的紫玉耳坠？我给你找来啦，明日就送给你……不要哭啦，你若是生气，可劲儿打我几下也使得，若没有力气，只说个地方我替你打……”</p> <p>听他讲到“别哭啦，都哭丑了……”敖寸心吸吸鼻子一拳捶在杨戬的肩膀上：“哪有你这么说的！”</p> <p>杨戬拢住她的小手，道：“都是我的错。”轻轻将她压回了胸前。敖寸心靠着他的胸膛，只觉一片心安，渐渐止住哭泣回抱他的劲腰软糯道：“我好想你啊。”</p> <p>声音里带了细微的哭腔，可爱至极，听得杨戬又是身下一紧，可他不敢造次，压抑性子抱紧了敖寸心道：“我也想你想得紧。”</p> <p>两人贴得甚近，敖寸心自然察觉到腰臀处抵着的硬热。她刚才不过月事来了心情不好，发发小脾气，并不是真的因为杨戬的行为生气。心疼他禁欲几天，肯定十分难受，刻下抱着自己，却还隐忍不发，可憋坏了他罢？</p> <p>这样想着，三公主将脸深深埋进杨戬怀里，柔荑顺他腹肌往下，轻轻抓住了他坚硬如铁的下体。</p> <p>“哦……”杨戬忍不住惊呼出声。只被她碰一下，他只觉那快感层层叠叠，惊涛骇浪。</p> <p>觉察那柔嫩小手握紧他的物什，开始上下撸动，他喉咙里溢出畅快的呻吟，却把住了敖寸心的胳膊。见她疑惑地将羞恼的小脸抬起，狠狠瞪他一眼，他又爱又怜，道：“你身子不爽利，切莫……啊……”</p> <p>敖寸心将羞红的脸重新埋回他怀里，手下微微用力，继续撸动，杨戬叫她弄得浑身紧绷。那只没有抱着她的大掌悬在半空，想要去拉起她在自己身下“作案”的手，却又虚晃着不愿停下。</p> <p>许久，敖寸心只觉手上酸痛，抬头去瞧杨戬，却忽然被他低吼一声，紧紧抱在了怀里。</p> <p>手上的巨物颤抖几下，头部喷射出一股白浊的精液，尽数洒在她的床单上。</p> <p>“呼……呼……”杨戬喘着粗气，低头亲吻她的发顶，怜爱地抱着妻子。须臾呼吸平稳下来，他将敖寸心轻轻放回榻上，抚开了她额间的碎发，低头亲了亲她潮红的小脸。</p> <p>敖寸心以为他就要顺势躺下，急忙拉住他胳膊道：“那个……那个东西，我还要清理一下……”若是明日侍女进来更换，她可不用见人了。</p> <p>“好了，”杨戬失笑，又亲亲她，“你乖乖睡罢，我来搞。”又安抚她几许，起身去清理榻上的白浊。</p> <p>敖寸心瞧着杨戬上下忙活，弯了嘴角。困意袭来，满心满眼都是眼前的郎君，携带装着他的好梦赴会周公去了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/092500.小相思.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E4%BA%92%E5%A8%B1%E4%BA%92%E4%B9%90" title="标签">#互娱互乐</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a402f8/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">堪做情人</div></a> <a href="/pages/6e42b9/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">为时不晚</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
