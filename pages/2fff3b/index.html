h5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">寸心去哪儿了？<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h2 id="上"><a href="#上" class="header-anchor">#</a> （上）</h2> <p>院子里一树又一树的粉丁香累累缀在绿叶之间，几只花蝴蝶在花丛中飞来飞去，静谧而又灵动地点缀着一园秀色。</p> <p>但杨戬实在无暇欣赏。他从刘家村回来，欢欢喜喜地捧着一盒新摘的樱桃，眉眼中含着志在必得的笑意，他正打算把这一盒绛珠般的果子送给寸心。然而他寻遍了前殿后殿都没看到寸心的身影。</p> <p>这已经是神殿的最后一处了，杨戬仍是没有找到寸心，他脸色阴沉起来，心中突然升起一个不好的念头，正想唤哮天犬来寻人，便觉得周围忽然响起了哗啦啦的声音。他循声去看，就见到自家那个臭崽子从池子里蹿了出来，瞬间盘到他的头上。</p> <p>杨戬心中焦躁，实在无暇和龙崽子玩闹。他无奈地把小龙揪下来，问:“你娘亲呢？”</p> <p>小龙正和父亲玩闹，不防父亲直接将自己拎了下来，于是张牙舞爪地咬了杨戬一口。</p> <p>杨戬疼得“咝”了一声，捏诀将小龙变成糯糯的小团子，哄了一下又问起了寸心的踪迹。</p> <p>“娘亲回海里了呀。”小龙奶声奶气地回答。</p> <p>杨戬得了话，便抱着小龙直往西海而去。他就不信，她舍得冷落孩子。</p> <p>龙王和龙后看到杨戬和小龙突然出现在殿中，吓了一跳，疑惑地问道:“寸心怎么没一起回来?”</p> <p>杨戬立即明白寸心根本没有回西海，跟龙王龙后解释了几句，又往其他三海而去。</p> <p>三海的龙王都表示寸心没有来过，杨戬是真的急了，眉头一直紧紧拧着。</p> <p>“徽儿，你娘还说过什么吗？”</p> <p>小龙歪着脑袋想了一会儿，说道:“娘亲还让我要好好听爹爹的话。”</p> <p>闻言，杨戬不由得扬起了声调:“你说什么?”</p> <p>不怪杨戬多想，实在是寸心有过前科。她不声不响地单方面和他分手悔婚也不是第一次了，现在又把孩子留在家，自己一个人消失得无影无踪。</p> <p>说起来，寸心一直推三阻四不肯和他去参加沉香婚礼，原来是早就想好了要趁他不在的时候逃跑。</p> <p>难道她真的不要他们了?难道到现在还不肯原谅他吗?难道他和孩子加起来都比不过她姐姐和哥哥吗？</p> <p>敖寸心，你好狠的心！</p> <p>到底是父女连心，小龙也感受到了父亲的情绪，耷拉着脑袋小声问道:“爹爹，娘亲是不是不要我们了?”</p> <p>杨戬咬了咬牙:“她想都别想！”</p> <br> <p>“天地无极，万里追踪。”</p> <p>这已经是哮天犬在这个水域第六次施展追踪术了。</p> <p>旁边的杨戬看见哮天犬拼命吸鼻子的模样便知这次又是徒劳无功，但仍忍不住问道:“找到寸心了吗?”</p> <p>“主人，”哮天犬缩着脖子，磕磕绊绊回答:“属……属下还是……没有闻……闻到。”</p> <p>杨戬白了他一眼:“哼，你最好不要给我耍什么心眼。</p> <p>“属下……没没……没有”</p> <p>“最好这样。”</p> <p>杨戬正是心烦气躁，抖开折扇胡乱地晃几下，就听见身后传来了两个声音。</p> <p>“二哥，哮天犬。”</p> <p>“舅舅。”</p> <p>杨戬转身去看，便见一蓝一白两道身影从天而降，正是杨婵和沉香。</p> <p>“二哥，哮天犬，你们在干什么呢?”</p> <p>“三妹，你们怎么来了?”</p> <p>“我们去东海喝八太子和赵小姐的喜酒了，刚才在天上看到你和哮天犬。”</p> <p>杨戬也听说了今天敖春要成亲，不过敖春和他本就没什么交情，大约也怕丁香想起不好的事，所以东海并没有请他。杨戬点了点头，没有说话。</p> <p>“二哥，新天条都已经出世了，你怎么好像不开心啊。”杨婵有些担忧地问。</p> <p>杨戬别过头，轻叹了口气，说道:“自沉香成亲后，寸心就一直躲着我。”</p> <p>哮天犬抬头看向杨婵，向她解释道:“我还去学了可以水下追踪的法术，都快一个月了，找了一百多个水域都没发现三公主。”</p> <p>杨婵面露忧色:“会不会出了什么事?”</p> <p>杨戬摇了摇头:“不会，她有天眼法器和山河社稷图在身，应该没人能伤得了她。就算她有危险，我也能感应到。她应该是没原谅我伤害了四公主和三太子。”</p> <p>六年前，杨戬杀了四公主后又把她救活了。他知道这事做得不好，可是他没有别的办法。早在沉香的存在被揭露之前他就已经决定要把沉香造就成推出新天条的人，可沉香本就反复无常心志不坚，又有宝莲灯和四公主的庇护，沉香更是无心学艺，甚至连母亲被囚都无法激发他的恨意和斗志。</p> <p>于是他杀了四公主，然后又救活了她。</p> <p>“如果听心姐姐有什么不好，我永远都不会原谅你。”这是东海龙王在灵霄宝殿状告他杀害四公主后，他去西海向寸心解释时她先斥他的第一句话。</p> <p>可是他被乾坤钵反噬之后，寸心明明还来神殿看他了呀，怎么他去刘家村喝个喜酒的功夫，她就突然离开了?</p> <p>“四公主现在好好的，”杨婵微蹙秀眉，“早些年寸心也跟我说过三太子这事不应该怪到二哥头上啊。”</p> <p>杨戬早就知道哪吒去寸心面前骂过他，也知道老六曾去西海看过寸心，倒是不知道连妹妹都和寸心有过往来。他别过头去哼了一声，这些人一个两个都能见到寸心，而他，只能日复一日地望着茫茫西海，真是不公平，他僵着脸问:“什么时候的事？”</p> <p>“八太子满月时，四公主请我去喝喜酒，我在东海和寸心说了几句。”</p> <p>“她还说了些什么？”</p> <p>“她问我你现在过得怎么样啊，是不是很辛苦啊?”杨婵撇了眼杨戬，叹了口气。</p> <p>杨戬忽然想起那次寸心突然上天，眼睛一亮，随即又想到天上一天，地下一年，于下界而言，寸心上天时敖春满月宴已经过了一年有余。看来那次寸心上天并不是为了他，杨戬有些失落。</p> <p>沉香听得云里雾里，终于等到了询问的机会:“舅舅，寸心是谁啊？”</p> <p>杨戬正要回答，躲在他袖子里睡觉的小龙就奶声奶气地说道:“寸心就是心肝宝贝呀。”</p> <p>“徽儿，不许胡说。”杨戬尴尬地阻止道。</p> <p>小龙飞出衣袖，坐到杨戬小臂上，化作一个三岁的小姑娘，噘着嘴反驳道:“可爹爹就是那样叫的嘛。”</p> <p>为免自家小崽子再语出惊人，杨戬对杨婵和沉香道了声还要去寻寸心便匆匆离开，身后还传来了沉香轻渺渺的声音。</p> <p>“娘，舅舅这是被抛夫弃女了?”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/061012.寸心去哪儿了？.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9
