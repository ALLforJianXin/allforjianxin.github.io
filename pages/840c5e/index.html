是以后来她想找借口削减下伺候人手都没人搭理，她那大哥更说了：“西海之内你还是公主。”惹得他们母后默默垂泪，她便再也不好提——不好提她并不是要自苦，只是想避人耳目罢了。<br>
是以再后来侍女们都当是这主儿图清静喜欢撵人，相互传说着伺候完无事要尽速离去。</p> <p>这日晚饭毕又只剩下龙女一人独坐，自嘲过如今日子也同杨府四方院儿内相差无几她却甘之如饴，不知为何眼皮突然跳得厉害。她起身欲理残妆，殿门响处那人携清风朗星袭来，一把将她抱在了怀里。<br>
“你……你怎么突然来了？”这话问得委实没道理，他哪次不是突然而来，刀锋起舞的日子便是这样由不得他自己。<br>
龙女小手攀上他脊背，冷硬的铠甲抱在怀里有些硌得慌她却不想推拒。片刻后他直起身望住她，今儿个竟前所未有的郑重，回答她：“我想看看你。”</p> <p>原是杨二郎试过宝灯便急急赶来看龙女。<br>
他身上沾染的山涧泉水还未干，混在海水里。千里奔袭微有喘息，等不及再多说一句，今天的吻有些急。</p> <p>莲灯至宝妙法多，催动间浮光掠影，扰乱他心绪。<br>
那是未来吗？华山腹心光芒大盛，他身死道消相祭。<br>
可又怎么会，怎么会又见十里红妆，她再次嫁给自己？<br>
心头大恸停了呼吸，回过神来为掩停顿将她抱到桌上，从下面接近再亲上去。<br>
龙女万分关注于他怎可能将这异样漏看了去，捧起他脸庞眼眸带上忧虑：“杨戬，你怎么了？”<br>
“我……”喉头滚动眼神躲闪，“……我很快就能救你们出来了！救你，救三妹……”说到这儿甚至低下头去，“我仍能催动宝莲灯，我……”
龙女轻叹口气。</p> <p>龙女抑下心中不安，手上稍稍加力，把那人面庞重抬起：“我一直相信你。”待看清他眼中小小的自己再俯身，将柔软的唇瓣送上去。<br>
柔软温暖的触感奇迹般地安抚住了天神，他渐渐抛开那些不安情绪，回应，与她唇舌纠缠一起。<br>
直吻到两个人都气喘吁吁，他蹭开她衣领往下，她轻轻说：“到床上去。”他这时才发现自己还穿着笨重铠甲，不由得笑了笑自己。</p> <p>杨戬抱起敖寸心，行动间散了盔甲换一身红衬黑衣——是龙女亲与。敖寸心被杨戬抱在身前，只得双臂拢住他头颈双腿缠紧劲腰免得颠动中仰下去，他粗重气息沿敞开的领口吹到她心口，痒痒的，让人难自抑。<br>
她被杨戬慢慢放到床上，刚放下他就覆了上来，她腿心儿实已泥泞，但并不想催促他，只迎合着他的浅吻轻啄，浅吻轻啄间是道不完渡不尽的柔情蜜意。</p> <p>当他进入她身体时蜜穴桃源早已做足了准备，进入的那一刻他紧闭上眼睛——这是他的习惯——龙女勾着他后颈抬头在他额上印下轻轻一个吻。紧致的甬道绞得杨戬腰眼发疼，循着本能往深处去。<br>
他俩少年夫妻千年为伴，早对彼此身体熟捻，他那凶器尺寸可观，龙女又体娇，总是他体贴她的时候更多一些，但今日偏生有些不甘，总想跟她更近些更紧些，想紧紧抱住她，想把她融入骨血里。<br>
敖寸心小穴被他撑满腰腹酸胀，但也不言语，反而轻轻晃着腰臀让他挺进得更加容易。<br>
吃到后面那硕大龟头顶上她宫口，终耐不住嘤咛出声，杨戬立马顿住撑起身来看她，龙女笑笑拿手轻拍他脸颊，叫他“继续。”<br>
将脸埋进她颈窝里，杨戬双手捧起龙女娇臀，抱得她腰背都离了床褥，她也伸双臂搂紧他。修长十指捏得她蜜臀都变了形状，狠命往那处按去，突破的同时在她肩头轻吻，疼痛和苦涩仿佛也随着化成了蜜。龙女咬紧下唇不声不响，指甲抠进他肉里，默默绷紧身子胸乳抵在他胸膛上压得扁扁的，偌大宫殿安静得只剩下他两个喘息和心跳的声音，和成一个频率。</p> <p>桌上宝莲神灯微微闪烁着，床帐里天神龙女抵死缠绵渐腾起淫靡。<br>
杨戬粗壮狰狞的分身在敖寸心花道内纵横驰骋，一时连根没入，一时又退得只剩龟头被她含吮不放，带得嫩肉翻红盛开，带出汩汩蜜液流过山谷沾湿鲛绡溅到他身上去。<br>
龙女牙关渐开咿咿呀呀不成语，天神也粗重了气息。他忽地长哼一声，埋头在她肩窝处急急挺动，紧接着肉筋一颤，灼人浓精直入腹心弥散在她胞宫中。<br>
交代完两个人还兀自紧拥。他软在她怀里，被她揉着头发，两个人呼吸相缠久久不息。</p> <p>好像过了很久，又好像没过多久，他一向不能待很久的。<br>
龙女心里自然舍不得他，后悔过百千次送他到那污沼中去，可悔之晚矣。在他看不见处轻轻抹掉眼角泪痕，故作松快语气：“我去看看水，一起沐浴吧。”<br>
他还埋头她怀中所以回答的声音闷闷的。本来答应得好好的当他睁开眼是龙女下榻远去的背影他突然控制不住自己，伸出手去。<br>
龙女还未趿好鞋子又被拉回了床上拉回他怀里。他靠在床头她坐在他腰间她问：“你不是该回去了吗？”他不回答她问题。<br>
她被他炙热目光盯得羞赧起来，更不消提她双腿间泥泞处他顶动着就快要滑进去。被他灼灼目光盯得心里毛躁起来，伸手欲遮竟被他扣住手腕双手反剪到背后，敖寸心整个人整条龙摊在他面前未着寸缕无遮无挡生起小脾气，高喊一声“杨戬”。</p> <p>听得那声熟悉的“杨戬”他恍然回神忙松开手去。</p> <p>龙女见那人眉头蹙起隐隐竟有哀婉之意，他语气也似哀求：“让我看看你……让我再好好看看你。”她还想再问可只出口一个“你”后话全被堵了回去。<br>
他舌尖往她口腔深处探寻，搅弄起软甜小舌，她几乎以为他想把她吞下肚去。下处也是不争气，他才刚进来她就一股股春水丢了自己。龙女扬起秀美下颌一头乌发披散开从肩头滑落垂到他胸口来，她舒爽地扭起腰，磨着他的铁棒磨着他的意志磨得他脚趾都蜷起。</p> <p>皮肉撞击啪啪作响，直弄到月落西山，再不走就要来不及。</p> <p>重又换回朝服重铠的天神依依不舍拉龙女小手轻吻吻：“你等我，我很快就能救你们出来了。”不知是说给她听还是说给自己。<br>
龙女笑吟吟点头答他一个“嗯。”<br>
天神顿住片刻突然凑到她耳边。<br>
“嗯？”不知道是什么话让龙女惊讶慌了神，“怎么突然说这个……”却被他又抱住，她也看不到他的表情，他也不让她再追问。<br>
他放开她便急急转身头也不回地离去。<br>
留她在原地。<br>
伺候她的宫人进来时只看到她满脸泪痕喃喃着“我自然……”不知道什么是下一句。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《我闻》/22021523.向来痴.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B" title="标签">#《我闻》</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a2fb93/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">微澜——美艳少妇</div></a> <a href="/pages/b42f5d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">红杏招</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
