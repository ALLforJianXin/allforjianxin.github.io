NKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">面首<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>话说惊天动地的救母一战后，敖三公主顺着昆仑山下的水道摸上山，将被砍翻进水潭里半死不活的二郎真君提溜回了西海。</p> <p>昔日这龙女为那郎君吃了挂落，禁于西海。然她前夫是个重情重义兼之位高权重的，只要她不扰出大案，私出禁地这种小事真君大人还是一压一个准。</p> <p>寸心公主自幼就是四海的小宝贝，只要她高兴，西海那一家子个个儿都恨不能割下逆鳞给她抛着玩儿。虽说昔年为个男人叛逃出家门，可她回来的那可怜劲儿终是让广顺王一众软了心肝。</p> <p>就比如她大哥敖摩昂，前些日子正寻思着给她寻个小白脸做面首，好解一解自家小妹闺中寂寞。</p> <p>嫁人是再嫁不得了，可四海最尊贵的小公主怎么能被委屈了去？摩昂太子如是想。</p> <p>这厢却给了三公主一个好契机，将三界第一美人收入了房中。</p> <p>——</p> <p>二郎真君侧躺在贵妃榻上，揽过桌角的清茶往嘴里送。他半敞的衣领勾勒出完美的胸肌线条，微微鬈曲的淡金黑发湿漉漉的耷拉在额前枕上。</p> <p>杨戬用几日时间恢复了精气神，连带这一身的伤也修复得七七八八。这些时日他沐浴在公主的香汤榭池，就寝在公主精致绝伦的深闺艳阁，吃食由公主殿下亲手喂上唇畔。</p> <p>再想想八百年来自己通宵达旦宵衣旰食，每每夜里疲惫抚按眉心，或是辗转反侧孤枕难眠之际，皆感殿内萧索凄清。</p> <p>两厢对比之下真君大人谓叹一声，现下这才是神仙该过的日子啊。</p> <p>三公主甫一进门入眼的便是这幅美人卧榻图，她转过珠帘走至榻前，将手中的紫玉葡萄放在桌上，顺手摘下一个剥了送进那郎君嘴中。</p> <p>拢了拢郎君衣领，三公主抱怨道：</p> <p>“还伤着呢，也不知道多穿点儿。”</p> <p>公主殿下樱唇翘起，大眼睛端的是水光粼粼。额发舒软的轻贴在白皙小巧的脸颊上，颈边的白玉耳铛摇晃发出清清脆响，玉色衬得她肤如凝脂。微微偏头嗔人的样子真真叫做娇俏可人。</p> <p>公主身上幽幽香气肆无忌惮的钻入郎君鼻息，更惹得他心神荡漾，二郎真君忙捉住轻贴在身前的纤纤柔荑，温言与她：</p> <p>“不妨事，亏你照顾。”</p> <p>“还跟我客气呐？”</p> <p>寸心噗嗤一笑，揶揄到：“你是本公主闺中面首，我自要照顾周当的。”</p> <p>神君眼神暗了一暗，心下躁动更是难当。这个丫头，因着二人从前夫妻之亲，相处起来与他真是全无避讳。他二人芥蒂一天自一天消除，她更是全无意识的凭着本能与他亲近。</p> <p>虽说本该如此，但挨了八百年没沾一丝荤的二郎真君有些受不住。</p> <p>之前仗着九转玄功护体，清心寡欲的几百年过去也就过去了。然现下真君大人重伤初愈，他思考了一下，觉着强自忍耐委实伤身。</p> <p>于是他动手了。</p> <p>伸爪子过去摸了一把公主殿下的纤腰，杨戬捧起敖寸心的小脸，凑过去重重啄了一下她的红唇，旋即游移到她粉嫩耳垂边喝气：</p> <p>“既是如此，让小神尽一尽做面首的职责吧？”</p> <p>敖寸心白皙的颈脖立时红了个通透，她伸手推他：</p> <p>“你个死不正经的大萝卜，”念及郎君身上伤势，三公主没有抬手去锤，只轻轻捏过杨戬的腰，“给我起开，到床上躺着去。”</p> <p>敖公主瞥了一眼乖乖就范的二郎真君，心下邪火冒得突然。收拾好桌上茶具，三公主走到床边，见杨戬自个儿脱了上衣仅着一条亵裤，坐在床边抬眼去看她。</p> <p>往日这郎君身量高大，于娇小玲珑的龙女总是低头俯视。现下一站一坐，郎君端的是楚楚可怜。</p> <p>视觉冲击让敖三公主的小火苗烧得旺了一些，她顺势欺身而上，往郎君肩窝初轻轻一推，那人端的是乖乖就范。敖寸心就着推倒他的姿势跨坐上他腰身，两只手像模像样的撑在杨戬耳畔，一低头在郎君脸上偷了个香。</p> <p>“唔，面首你的味道不错的，本公主十分喜爱。”敖寸心笑的得意，调侃片刻就要翻身下床。哪里知道还有个比她更加得意的家伙面上不显，大手把住她的娇臀一把把她托回自己身上，坏笑溢出。</p> <p>“公主殿下这可就没意思了，优秀的面首，服侍定要叫你醉仙欲死的。”</p> <p>说罢一翻身将作怪的龙压在身下，两只手自下而上袭上她的酥胸，隔着单薄的衣料摩擦。</p> <p>轻拢慢捻抹复挑。</p> <p>不消片刻龙女就给摸得酥软了身子，她哎了一声，小手抵着他胸膛推他：</p> <p>“身上的伤……别闹！嗯……”被埋头在她胸前的杨戬啃了一口，敖寸心忍不住娇吟出声，玉臂克制不住的环抱住他的头，似要把他按近波涛汹涌的娇软乳肉之中。</p> <p>香软滑腻的肌肤紧紧贴住杨戬的脸，精细绵柔的触感让神君立时一柱擎天。口中不停的纳入白皙雪峰慢慢濡啮着，口中唾液沾满了她胸前，水渍濡湿的娇乳更是腻滑可欺。拨开她手臂，杨戬起身调整了一下姿势让她躺得更加舒适，伸手解开她腰带。又俯下身轻舔龙女耳垂，一出声嗓音端的是低哑暗沉：
“小殿下悠着点，小神要叫你给闷死了，端的是划不来。”手下不停拿捏龙女骨肉，三两下叫他剥得七七八八。</p> <p>“哈啊……”龙女叫他弄的情动不已，却仁不肯缴械投降，双腿夹紧了弯膝去顶他：
“嗯……还有……伤……”</p> <p>“不碍事……”又是一轮埋头苦干，神君唇舌不住在龙女全身游移，探得她腿间一阵濡湿，神君身下又是一紧。</p> <p>忍不住贴近她几分，那物抵在龙女腿上，烫得她一缩，顿时羞怯难当。感受到他的躁动，她终是藕臂缠上他颈脖：
“你这面首……当得嗯……真正好……”</p> <p>娇声娇气的话撩拨着杨戬的神经，他再忍不住，一条腿插入龙女腿间将之掰开，双手拿捏住她小腿高高举起抗在肩上，扶起那物提枪上马便长驱直入。</p> <p>“……啊！……轻点啊……爷……”</p> <p>杨戬哪里还听得进去？只当她这媚气的求饶当真是噬骨情药。在她体内又涨大几分，神君心神荡漾，巨物进进出出，在龙女推进狠狠肏弄。</p> <p>“啊，轻点儿……嗯你轻点……”</p> <p>龙女承此盛情不住，一边紧紧握住郎君与她十指相扣的手，另一边拉住郎君小臂不放。下处叫人弄得水液横流，因他抽插的动作顺着那物被带出来，浸湿了半数床单。</p> <p>干得兴起，神君早将自个儿伟光正的形象抛之脑后，污言秽语信手拈来。</p> <p>“小殿下觉着可还行？……我这面首……大不大？爽不爽？”</p> <p>“嗯……”狭小的甬道被折腾得抽搐不止，八百年无此事令她身骨更是敏感，哪里禁得住郎君的尺寸这般作弄？龙女脑中空白一片，只知道扬起臻首嗯嗯啊啊呻吟不止，把自个儿从上到下一股脑献给他。</p> <p>郎君见她不回，又将那物抽出至口随即狠狠顶弄至尾，顶得他自己也不禁闷哼一声，埋入龙女发间亲亲她头，嘴上仍是不饶：</p> <p>“怎么不回……嗯？……小殿下……爷的东西大不大？肏得你爽不爽？”</p> <p>“哈啊……你别……嗯……大……啊……爽……”</p> <p>淫词艳语钻进郎君的耳朵，让他亢奋不已。龙女被他搞得水液溅起，忽然在一个猛烈撞击之下缩起身骨，肉穴层层叠叠绞上那物，颤抖着吸吮允纳。</p> <p>“啊……”杨戬忍不住低吼出声，她绞得那样紧，仿佛有成千上万张嘴吸吞着他，让他欲罢不能，直要溺死在她身上。</p> <p>这厢龙女叫他戳着了敏感的一到去处，直抽搐着去了。高潮里下身阵阵收紧，夹得神君柱头都沁出点点精物。</p> <p>神君亦是耐不住呻吟起来，两只手抬起她臀肉把着狠命冲刺，一下一下都重重戳击到刚刚那一点上，水声混着皮肉相击之声回荡在龙女寝宫中。</p> <p>两人交合之处汁水四溢，神君干得神魂颠倒不知所以，龙女叫他肏得浑身没有一处不快意，高高低低在云端沉浮，不知又去了几遭。</p> <p>“啊啊啊啊……爷轻点啊啊啊啊……”她放声尖叫，身下作乱的物件就要把她整个劈开，快意又难受得要命。直觉再不停下命都要交待于此。玉臂无力的乱挥，只想摁住罪魁祸首叫它别再折磨于她。</p> <p>龙女脑子里混乱不堪，只望停下这一遭酷刑，竟一手伸向交合处把那物狠狠捏住，妄图推它离去。</p> <p>郎君这厢快意抽插本来水乳交融就要顺势而发，临登顶时竟叫人狠狠捏住了命门，欲射不能憋闷得他觉得自己就要炸开。</p> <p>“啊……寸心……”
杨戬声音颤抖，哆哆嗦嗦去捉她手，
“放开……啊……乖，嗯……放开……”</p> <p>奈何龙女捏得紧，一时半会掰扯不开，欲望一层一层往上涌，杨戬忍不住重复着肏屄的动作，试图阻止她的动作，忍不住呻吟着求她。</p> <p>“啊……寸心……放开……快放开……嗯嗯……”</p> <p>“嗯——”一手强硬的掰开了她，下一刻冲刺着释放了出来。滚烫的精液喷射到深处，龙女给他烫得仰头尖叫。</p> <p>高潮的余韵过后，杨戬趴在她身边搂着她一动不想动。以往器大活好夜七回的郎君叫公主殿下这一捏泄尽了力气。就是下身有意，上身也无力了。</p> <p>公主殿下昔日教这郎君给折腾惯了，气力恢复起来端的是得心应手，想到他的禽兽做派，越看这小白脸越来气。</p> <p>伸手一推离开他怀抱，对准他腰窝，一jio把他踹下了床。</p> <p>“你见过能跟公主一起睡的面首么？伺候完睡地板去！”</p> <p>二郎真君一翻滚到长绒毛毯上，扶着腰支起身子，被她给气笑了。</p> <p>扯开帘帐重新压回三公主身上，</p> <p>“小丫头片子，敢捏爷，爷今天就让你好好记住它！”</p> <p>唔，毕竟是三界第一战神嘛。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/89.短篇-2019/050516.面首.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/9c354b/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">失宠</div></a> <a href="/pages/053c4e/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">春药</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
