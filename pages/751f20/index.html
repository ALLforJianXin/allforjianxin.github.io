实处，大大小小皆畅快起来。</p> <p>东海内沿有一处海域，名字十分之沧桑，唤作沧海（今称渤海）。东海四公主敖听心殿下的府邸便建在此处。听心殿下自小好武，乃是四海中一等一出挑的人物，所辖域内海晏河清，欣欣向荣。</p> <p>近日四公主碰见了一桩不大不小，却甚为棘手的案子。第一十三重阎罗殿往生大帝的幺幺玄孙不期然间游历至此，不期然瞧上一位美女，又十分不期然地截下了人家。那位美女不曾见过神仙精怪，而这一位见色起意者的相貌又实在长得有些难以形容，一时间背过气去，不小心教人吓死了。</p> <p>这件事被当地城隍层层报上来，递到四公主手上时，犯事者已经被敖听心手下的虾兵蟹将押解到了水牢中。这样的案例，从前并不是没有，一般按律惩处也就是了。然而一十三重阎罗殿往生大帝的面子委实有些大，据闻这个小玄孙向来是大帝的心头肉，含在嘴里怕化了，捧在手中怕碎了。倘若由四公主出面来敲打上几下子，往后东海龙宫同一十三阎罗殿的梁子恐怕也就此结下了。</p> <p>司法天神到时，四公主并不在府里。阖府上下，只有一位强行赶鸭子上架来替四公主主掌中馈的三公主殿下。说来，敖听心的人脉十分不错，同司法天神杨戬的妹妹乃是至交好友，且曾于真君改天换地忍辱负重时帮过一把子忙。而真君乃是位知礼还恩的君子，这些年来政务不甚繁忙时，常常亲身下界查案。往往查着查着晃至四公主的府上，倘若四公主恰好有一件什么事情需要偏劳于他，他也十分乐意帮一帮忙。</p> <p>而三界之下总共分四海、八荒。四海之内，龙族同气连枝，龙王四兄弟分掌四海。这一位三公主，名唤敖寸心，乃是西海广顺王膝下的幺女，早年间曾同杨戬有过一段姻缘，是以同真君论起亲疏远近，可以说尤长四公主三分。</p> <p>三公主并不曾料到自己会如此赶巧地正遇上杨真君，晃了晃神后，忙接下拜帖，梳洗打扮了一番仪容，命人赶到门口毕恭毕敬地将真君迎了进来。那厢杨戬正自疑惑四公主今日莫不是抽了风，走至前厅时，一打眼望去，只见阶前站着一位女公子，身着白衣，袖间嵌着龙纹赤金盘珠带，鬓发高束，英姿飒爽，不是敖寸心是誰？</p> <p>杨戬难得地愣住了。</p> <p>近百年来，已经很少有甚么人、甚么事可以牵动他的情绪了。可倘若真要说出来一件事，真要说出来一个人，真君自忖九天十地间，他最最不敢面对的，恐怕就是眼前这一位三公主殿下。</p> <p>她比从前要消瘦些，脸颊上软软的婴儿肥似乎被海岸边近三百年的风霜打磨下去，多了几分干净利落，少了几分真君所熟悉的可爱娇憨。手中所执的青霜剑依旧是千年前惯用的那一把，曾经也被杨戬握在手中过。曾几何时，栀子花开放的时节，他握住敖寸心执剑的小手，站在落英缤纷的阶前，教她舞动起不知是哪一套剑法的一招一式，她当日无论学多少遍都尚显生涩的剑招，如今看来，已然运用熟稔了。</p> <p>真君不知为何心中一酸，张口想要唤旧称，忽然觉得不妥。待要状若无事地唤一声“三公主”，未免又有些做作，纠结了几番，终于还是上前扶起她，清了清嗓，道：“……寸心，无需多礼。”</p> <p>他既然这样说，龙女撇了撇嘴，依着他的动作站起身来。料想二人身份处境确实有些尴尬，杨戬这厮同她掰扯了千余年的感情，早就分不清谁欠谁更多一点，谁又欠谁更少那样一分，正应了那一句“剪不断，理还乱。”但若要释然相忘，只将对方视作一位平常的老友，却也始终无法将过去的恩恩怨怨尽数忘掉，如今只好使自己陷进这样一个尴尬的境地里，备受煎熬。</p> <p>想来杨戬的心思定然也同她一般，既然如此，便算他还念着几分旧情，总不好意思与她这位故人摆出官场上的威仪来。</p> <p>真君大人既然不介意，三公主也觉得没有必要与他客气，于是大大方方地问道：“杨戬，你怎么来了？”</p> <p>“本来是路过此处，进来讨杯茶喝罢了。不过听说四公主府上近日有些麻烦？怎么她自己不在，却将你拖来掌事？”二人说着，缓步走进前厅中，按主客宾次坐下，着人看茶。</p> <h2 id="谁悲失路之人"><a href="#谁悲失路之人" class="header-anchor">#</a> 谁悲失路之人</h2> <p>既然杨戬亲自问起，敖寸心便将此事的前因后果同他说了一遍。四公主忖度兹事体大，不敢擅做决断，所以要星夜赶回东海龙宫与父王商议。临别之际不放心封地内的一应事务，正巧倒霉的三公主来找她，于是敖寸心便就如此被迫于堂姐的淫威在渤海待上了几日，每天清晨便起，日落方歇，看着案头纷乱的文书简直一个头两个大。</p> <p>此刻她说起此事，讲清前因后果之余，不免便将这几日的烦恼捎了些出来。三公主从小性子活泼，这两日身旁不是耳提面命的海嬷嬷便是板正迟钝的龟丞相，整天在她耳边念叨甚么“策论”、“点数”之类的东西，烦也烦死了。今日得遇杨戬，简直如同旱土遇甘霖，什么尴尬什么龌龊都抛诸脑后，只想要一吐为快。</p> <p>杨戬见她娇嗔的面容，正于他展臂可及的距离，活灵活现地抱怨着这一切令她不畅快的东西。她皱眉的样子，气鼓鼓的样子还是那么可爱，不同于神殿禁地中数十年如一日的画卷，杨戬忽然觉得自己笔下的丹青小相呆板起来，又或许再怎样描绘，真到了相遇的那一刻，所有自以为硬起来的心肠还是会冰雪消融。</p> <p>敖寸心堪堪说完此事，口干舌燥地猛饮一口茶，饮罢才忽然发觉起不妥来。抬头一看，正见杨戬怔怔看着她，眼里还有隐隐约约地一丝笑意，龙女登时喉头一痒，丢脸地被一口茶水给呛到了。</p> <p>“咳咳咳……咳……”三公主扶着桌角咳得上气不接下气，杨戬连忙赶过来轻拍她的脊背，待见她终于缓过来些许，忍不住打趣道：“小殿下身为海龙，怎地喝口茶还能呛？”</p> <p>敖寸心瞪他：“龙难道还比你多个肺？”</p> <p>说完，两个人都愣住了。</p> <p>这番拌嘴委实太自然了些，自然得实在只适合日夜相伴的夫妻二人，却全不适合如今连见上一面都显得不尴不尬的他们。或许曾经灌江口的杨府上演过无数次这样的场景，可那终究已经是曾经了。</p> <p>还是杨戬先反应过来，笑着摇了摇头，没有再计较她言语上的小小挑衅。二人整理了一番，再坐下时，气氛已没有了方才的轻松与愉悦。真君叹了口气，捻起一旁的茶叶浸入滚烫的沸水中，任茶香缓缓飘散在空气里，使木夹倒去洗茶汤水，再过一次沸水。待稍凉时，三指并起端过茶盏，轻抿了一口，这才开口道：“此间事我已尽知了，不必担忧，我来办便罢。”</p> <p>寸心闻言，皱眉道：“我知你是十殿阎罗的顶头上司，可是以权势压人，终归不妥罢？”</p> <p>杨戬缓缓品着那盏茶，神色难得地有些慵懒，说道：“不必担忧。往生那厮虽然疼爱孙儿，却着实是个不折不扣的狗腿子。只要我放出一点儿态度风声，凭他那番谄媚耍滑的劲头，别说是孙儿，阖家老小皆能舍却。”他说起这些官场龌龊，神色中自然而然便显出与从前的杨戬并不相符的阴狠不屑来。这样高高在上的态度，从来都是他做好一个司法天神的前提，仁慈的上位者成不了大事，只有恩威并重才能震慑他手底下的那群神仙。这样的道理，他自己明白，却没办法清晰地分辨出自己陷入权利这潭深水中后细微的变化。敖寸心或许也明白，却仍然抑制不住心头涌上的酸涩。</p> <p>这一场相遇以来，二人心头皆已数次感慨“沧海桑田、楼起楼落”，一时间相顾无言，半晌敖寸心才点了点头，低头也为自己洗换茶汤，几不可闻地答应了一声：“哦。”</p> <p>“……”杨戬似乎也发觉了不妥，见龙女神色厌厌地，心知自己已不知何处惹得她不快。茶汤已经饮过第三道，他望了望天边的日头，遂置杯颔首道：“我看你似乎倦了，文书宗卷确实繁杂，你不必再为此劳神，早些休息为好。”</p> <p>三公主确实已经纷纷乱乱地忙了一整天，晌午时又教杨戬这厮耽搁了大半日，案头积压的公文始终压在她心头。有心要偷懒，却又担忧明日复明日，再也批复不完，此刻听杨戬都这样说，心底的依赖已先替她做了决定。</p> <p>杨戬见她听闻此言好似听到学塾先生准假一般，不由摇头一笑。其实于他而言，敖寸心从来都是杨府中叽叽喳喳的小公主，是个永远不需要长大的小姑娘。她只需要开开心心地撒娇便好，从来都不应该接触这些劳心劳力的东西。有甚么风风雨雨，自然有他来挡着，纵然他俩已经和离许久了，可护着敖寸心这件事，他不想交给其他人，也包括她自己。</p> <p>他不由得神色温软下来，强忍住想要揉一揉她头顶的欲望，拾起放在一旁的折扇站起身，道：“你且休息，我这便去安排。”</p> <p>龙女心上又是一颤，暗道一言不合罢了，你又要就此而去，今日一别，也不是何时才能再见，却又并无什么理由好留下他，只好装作若无其事的样子，依礼将他送出了府门。见他依旧朗月清风的模样，想来心头从无与她一般的挂怀，径自离去了。一时间胸中涌上万般惆怅，回至廊下寝殿中，含糊睡去。</p> <h2 id="萍水相逢"><a href="#萍水相逢" class="header-anchor">#</a> 萍水相逢</h2> <p>敖寸心已经许久没有睡过这么安稳的觉了，杨戬来了这样一遭，她没有意想当中的辗转反侧，反倒将一直悬着的一颗心放了下来。待第二日的阳光照进寝殿里，隔着层层叠叠的帐幔将沉睡中的龙女唤醒，她惊得鱼跃而起，慌慌张张拨开窗帘一看，只见日上中天，她睡过头了。</p> <p>昨天大半的公文还未处理，今天又耽搁下半日，三公主只想要抱头痛哭：她悔不当听杨戬那厮的鬼话！</p> <p>气急败坏地穿上衣服，马马虎虎打理好容妆，敖寸心拎着蓬松外袍走在廊上时，十分纳罕今日的海嬷嬷为甚如此仁慈地不派人来催她起床。</p> <p>不过她马上就知道原因了。</p> <p>窗明几净的书房里，本应离去许久的玉面郎君正执朱笔，批示她积攒了许久的公文。里头有昨日并今日全数的，也有几天前她觉得并不紧急搁置下来的，本是厚厚一座小山，现在已被处理得只剩下寥寥几本。</p> <p>帮她批文书的田螺姑娘是谁？显然便是眼前悠悠然的真君大人。</p> <p>敖寸心一时间不知道该怎样描述心中的情绪。她呆在厅门外，愣愣地问：“他什么时候来的？”</p> <p>“驸马爷是昨夜来的，”龙女一惊，转头一看，原来是路过此地的海嬷嬷，只见她满脸的皱纹里都是欣慰笑意，乐呵呵道：“他将将过来，便捡起公主丢下的烂摊子拾掇起来了。府内外的事儿，皆教驸马处理得井井有条，积压的文书都已批了，我今晨正要去叫公主起身，公主猜驸马怎说？”嬷嬷的神色多了些揶揄，“驸马道，公主惯爱赖床，既无要事，还请我不要去打搅你。至于府上的政事，他来做就好。三公主，老身当年倒还纳罕过您如何舍得为一个男人背井离乡，爵位也不要了、富贵也不顾了，如今看来，驸马爷不仅面如冠玉，更是一等一的温柔体贴，不怪乎殿下如此了。”</p> <p>寸心听她一口一个“驸马”，早羞得满面通红，打断她道：“嬷嬷别乱说，我和他早就和离了。”</p> <p>“哎哟，那又有甚么要紧？瞧那位爷的体贴劲儿，这一声驸马还分早迟嘛？”正说着，那厢杨戬已听见门口的响动，持着文书望过来，见是寸心，朗声笑道：“寸心，怎么不进来？”</p> <p>“快去罢！”嬷嬷乐呵呵地，轻轻推了她一把，将龙女推进门槛里，碰地一声关上了门。</p> <p>敖寸心只好拎着那件蓬松的袍子走过去，坐在杨戬身旁，双手支着脑袋打量他执笔在窄窄的公文上杀伐果决，懒懒地问道：“怎么这么快就回来了？”</p> <p>“不过是吩咐一句的事，不会太费功夫。”杨戬的精神头看起来很好，手边的文书本来便只剩下寥寥几本，在寸心进来的这段时间，他马上批复好了，一一整齐地叠放在案几边，转过头来同龙女讲话，“今日午时，司法府的人会亲自下来提人，你们就不用再管这件事了。我怕你交接时应付不过来，司法府的那帮小子一贯是畏上欺下的主，所以顺便过来督促一下。”</p> <p>“再顺便帮我把文书批掉？”寸心眨了眨眼睛看着他。</p> <p>“……”杨戬一时间答不上来，见她一双圆圆的杏目水光潋滟，里面藏着绵绵的深情，也暗含几分揶揄与调侃，不禁一刹那心驰神摇。转头一看那件蓬松的外套被她扔在座上，龙女单薄的衣裳裹不住圆圆的肩头，便长臂一展取过衣袍，转眼便将她裹在里面。</p> <p>外袍上松软的兔毛围在她颊边，衬得龙女一张小脸尤其娇嫩。她虽生得瘦小，杨戬堪堪一掌便能拿捏住她的腰肢，可裙摆下的肌肤珠圆玉润，触之如细绢丝绸，嗅之如暖玉生香。此刻她无辜地看着他，眼神躲躲闪闪，轻声道：“干什么？”</p> <p>“再再顺便替你披件衣服。”杨戬看着她的脸，终于忍不住伸手想要去捏上一捏，却被寸心一扭头躲开。</p> <p>杨戬的手僵在半空中，哀伤地看着她，喏喏道：“寸心……我……”</p> <p>三公主也不言语，沉默了许久，错开他的目光：“你原没必要替我做这些的，太麻烦你了。”</p> <p>“哪里话，不麻烦的……”杨戬叹了口气，“你知道，我总是想替你做些什么。”</p> <p>龙女放在膝头的手忽然一紧，低下头掩住自己泛红的眼角，“你也没必要这么想，你又不欠我什么。”</p> <p>“怎么不欠？”杨戬的声音也颤抖起来，“我……欠你许多……却不晓得要怎么还……”他道敖寸心这一句“不欠”，乃是要尽释前嫌，再无瓜葛之意，不由得心头一紧。</p> <p>三公主在心底叫嚣：“我不要你欠我！敖寸心这一辈子最恨你杨戬亏欠了我，你知道不知道！”抬头见他难得慌乱的目光，回想这两千年来的纠缠不休，不由得心碎神伤。</p> <p>敖寸心只瞧着他，长睫掩不住眼底闪动的泪光，她观杨戬半晌，忽然问道：“你从前对我说过的许多话，如今可还做数么？”声音绵柔，悲怆至极。</p> <p>杨戬只觉半生的情字都叫她折在手中。此刻阳光穿过层层海浪丝丝缕缕打在她脸上，浮光跃金，娇柔之尽，将他一颗心揪在一起，生生涩涩地只余无尽的缠绵苦痛。他抬起手，情难自抑，想要去触她的面颊，可是转念想到如今二人的身份处境，早已不同以往，不禁愈发悲从中来，生生忍住。待开口时，声音竟有哽咽：“我记得……我记得……一字一句，莫敢相忘。”</p> <p>龙女叹道：“你曾说过，但凡我有所求，定不相负，是也不是？”</p> <p>他二人夫妻情浓时，如此这般的言论不知说过多少，此时她一及提前，二人心神皆又是一荡，目光相接时，再分不开。杨戬点头道：“是。无论何时
，你纵有所求，无论刀山火海，我也绝不推辞。”</p> <p>“其实我从不愿强求你什么……唉，纵然，纵然从前我也有诸般的不是，但望你安好的心却还是有的。唔，我这样说，并不是对你还有什么苛求，只不过，即使是作为朋友，你晓得我……一向还算不大坏，我仍然盼你平平安安的。”龙女垂眸，心头酸酸地，只怕自己忍不住落下泪来，搅乱这来之不易的洒脱，“旧日的许多事，我不再追思，也盼你不要再为此为难。今后的路还那样长久，你若在哪一天遇见甚么险要时，想得起来世上仍有我这样一位算不得知心的朋友在盼着你安好，那也算是对得起你我二人近两千年的交情了。”</p> <p>杨戬呼吸一窒，电光火石间念及往昔种种旧事：“我真的甘心如此么？当真再不相犯么？我与她分别三百余年，难道不是时时刻刻都在想念她么？我明知她与敖听心交好，沧海府邸如此偏僻，倘若不是暗存与她囫囵一见的心思，诸多小案我何须一一来办？杨戬、杨戬，你自忖明心正志，何苦这样多年来，却不肯下西海去亲自见她一面？你怕什么？你怕什么？”他自问千遍，如遭雷击，见眼前龙女娇艳明媚更胜往昔，其中悲戚伤感之态，如何不惹人怜惜？登时垂下头来，道：“不，不。我再也……再也无法安好。”</p> <h2 id="尽是他乡之客"><a href="#尽是他乡之客" class="header-anchor">#</a> 尽是他乡之客</h2> <p>“……杨戬，”寸心等了许久，却并没有等到神君的下文。窗外的海水清澈透亮，一如姑娘明媚的眼眸。她乖巧地坐在杨戬身旁，侧头看着窗外漂亮的小丑鱼们从珊瑚间列队缓缓地游过，心里头竟没有哀伤，反而是一片宁静与安详。她不去瞧那人灼灼的眼睛，轻轻叹了口气，然后柔柔地劝他，“没什么不能安好的。这世上的生灵有千千万万，我曾经不也以为自己离不开你吗？”</p> <p>她终于舍得把目光转向他，带着一丝哄人的意味：“可是你看，我现在不也过得好好儿的嘛？”</p> <p>“……”</p> <p>杨戬良久不语，只是沉默地看着她，看得敖寸心不自在地皱起眉来。半晌，他蹦出几句话：“……你看起来确实不错，比起同我在一起的那些年来，好得不止是一星半点。”</p> <p>这话听起来很有些奇怪，三公主的思绪有些乱，一时间竟并没有听懂他的言下之意。只是杨戬并没有给她反应的机会，面色不辨喜怒，一句一顿：“其实我曾苦苦思索过，你到底有没有如我所想的那般爱我。”</p> <p>三公主愣在原地。</p> <p>“……我有时候会想，寸心，你到底有多喜欢我呢？你要是，和我喜欢你一样地喜欢我，为什么又老是要逼我去做那些我不喜欢做的事情？为什么老是要我一次又一次地妥协，你为什么，就不能偶尔也……也让我一次吗？”</p> <p>“王母娘娘第一次寻我，希望我上天去做司法天神，你便与我吵架。其实我明白，倘若你知晓了上天的条件是要你和我分开，你一定不会再那么坚持的。可是我没有马上就告诉你，我就是想明白——”他透过一千年，用迷茫而受伤的眼神看着她，“你或许，可不可以，也能自己主动地偏爱我一点呢？”</p> <p>“我……”</p> <p>“你常常问我，为了你，我做出一些让步都不可以吗？”他打断她的话，却低下头，用几不可闻的声音沉沉地说出下面这句话：“我便想……那你能不能……也偶尔为我让步一下呢……”
敖寸心简直要被他气笑了，她伸手捧起杨戬低垂着的头，尝试着想要和他讲道理：“我从来没有想过你会这么觉得，”她纠结不已，艰难地措着辞：“我……你知道，我从前幼稚得很，向来以为你有多爱我，便能为我做多少事，”她见杨戬可怜地盯着自己，不免有些忐忑，唯恐说错一字，便不小心伤到他的心，“我喜欢你，便自然希望你也可以喜欢我。可你那时候不肯将这些东西付诸于言语，我便只能从行动上找回来，”想到了少时的耿直，龙女不禁失笑，抚摸着他脸颊的双手也不禁柔和起来，“所以我就想啊，我就问啊，杨戬，你既然爱我，为我做这点儿小事都不行吗？”
敖寸心学着自己从前的语气，故作夸张地凑近他，怪怪地问出来，说完，两个人都不禁破涕为笑。
杨戬不由得伸出手揽住她的肩膀，搂她轻轻靠进自己的怀里，释然一叹。他试探着触摸敖寸心的手，见她没有挣扎，便牢牢地牵住了她，缓缓晃了晃，说道：“对不起，是我以前不善于表达，我有时候十分想要将刚刚的话说给你听，可是转念一想，我一个男人，却问自己的妻子这样的话，未免太过矫情，后来辗转了那么多年，竟最终也没能说出口。”</p> <p>三公主喷地一笑，也主动地勾勾他的手指，笑道：“你知道这些年来，我每每想到你，总骂你是一个什么吗？”</p> <p>“……”杨戬挑眉，并不是很想猜测自己被她骂做了什么东西，“……负心汉？”</p> <p>“呸，”敖寸心打了他一下，“我骂你是只蚌，死都撬不开你的嘴！”</p> <h2 id="落霞与孤鹜齐飞"><a href="#落霞与孤鹜齐飞" class="header-anchor">#</a> 落霞与孤鹜齐飞</h2> <p>杨戬愣了半晌，随即回过神来，笑道：“小姑娘倒是真敢骂！我看你还敢不敢？”他顺势握住敖寸心将将敲打过他的小手，大掌拿捏住龙女腰背，去呵她痒。敖寸心不防，叫他闹得笑个不止，气喘吁吁去阻他：“二爷可住手罢……寸心……寸心错了……啊哟！杨戬！你怎么那么幼稚！”</p> <p>二人打闹着只是不歇，窗边有几个侍女经过，见此不禁纷纷捂嘴轻笑。倒是年长一些的海嬷嬷能记着驱散内院的小侍，听屋内传来阵阵欢笑之声，摆头揶揄道：“将将还顾着避嫌，此刻却又玩儿开了，终究年岁小，一样地孩子气。”</p> <p>不多时，天色渐晚，龙宫四处的夜明珠被侍从们各持一支华光篦点亮，顿时照映着整一座水晶宫熠熠生辉。殿前传了晚膳，因着有客，菜品格外丰盛。</p> <p>杨戬本不欲多做打搅，但日间与敖寸心互通了心意，此刻正是蜜里调油之时，如何离将得开？但求日夜常伴在身侧才好。二人穿过珊瑚叠生的后花园，宴席之处是一屹立在海底小丘之上的八角凉亭。此间主人四公主自幼喜好红色珊瑚，是以后花园的各色珊瑚争奇斗艳，引得五颜六色的小丑鱼群居于此，雅而不俗。龙宫富甲天下，于此地便可见一斑。</p> <p>三公主头上戴了一枚明晃晃的金环，绾起一头柔顺的长发，在清澈透亮的海水中飘摇不已。她的头发既长，杨戬离得又近，便不可避免有几缕飘摇地拂过真君的面颊。龙女身上甜腻喜人的香气钻入他的鼻尖，杨戬不禁意动，抬手松动了一下儿她发上的金环。</p> <p>敖寸心惊觉，忙退开一步，涨红了脸嗔道：“你……你干什么！”</p> <p>引路的六个侍女见了，皆面露笑意。只因时下风气，女子清晨时绾发，晚间安置，唯有丈夫可为其散发。杨戬久在天廷，自然不知，龙族却生长于下界，多少会受此影响。</p> <p>杨戬见几人面色有异，暗道性急，唐突佳人，只好轻咳一声，说道：“没什么。”</p> <p>三公主有些羞恼，加快了脚步。二人至凉亭中，用过晚膳不提。</p> <p>鼎声又过三次，小厮撤下餐食，端上甜茶。敖寸心这才有些受不住诡异的气氛，轻敲桌面谢过斟茶的杨戬，转头对侍从道：“你们都下去。”别将眼给看斜了才好。</p> <p>真君放下茶壶，将清茶小盏捏在指尖把玩，见从人纷纷下了小丘，这才放到嘴边轻抿一口。</p> <p>清茶教人撒了些蜜糖，是寸心惯爱喝的口味。起初相处时杨戬还尝不惯，久而久之，便也一同喜欢上了这股清甜的味道，以至于后来上了天宫，为他煮茶的人不懂得这些闺阁女儿的做法，杨戬被迫喝了许多年的苦茶，苦得舌苔都有些发麻。</p> <p>三公主见他不说话，还道杨戬就此恼了，只好解释道：“我并非故意，只是她们看着有些不好……倘若只你我二人，那是不妨事的……”</p> <p>显圣真君有些许诧异，问道：“甚么不妨事？”</p> <p>“……”三公主看了他半晌，终于晓得他是决然不会晓得这些曲曲折折的原委的，只好叹息了一声，主动拉开他的手，坐到了他的腿上。</p> <p>杨戬有些惊喜地揽住她，却见龙女圈住他的项子，轻点了一下他的眉宇，嗔道：“是我想多了，还道你有什么长进。这么多年过去，还不是木头一个。”</p> <p>“我……”真君要说话，却又被她一根手指点住了唇峰。寸心凑近他的耳垂悄声道：“二爷。”然后在他的薄唇上极快地吻了一下。</p> <p>杨戬浑身巨震，本能地凑近她，却被龙女轻轻巧巧地抵住胸膛，一使力气，将他推离寸许。然后使了一个灵巧的身法，自他怀中噌地一下窜出，眨眼已在三步之外。</p> <p>“真君大人，你该回家啦。”龙女因一击得逞了，笑得十分得意，双手背在背后，朝他哼了一声，然后蹦跳着跑出凉亭，下了小丘。</p> <h2 id="秋水共长天一色"><a href="#秋水共长天一色" class="header-anchor">#</a> 秋水共长天一色</h2> <p>三公主了了四公主拜托的事，终于得以回到自己的府邸，她的行宫建在海边一处山峰上，风景秀丽，十分养人，因为上有两个兄长帮衬，封地之中的事务也不需要她来处理，所以回了行宫，只觉飞鸟入林，格外自在。</p> <p>如此过了十几日，被姐姐压榨而去的精气神终于养了回来。这些年敖摩昂与敖玉怜惜她命途多舛，虽然总说着要她尽快接手封地之中的事情，但每每月中四下上报了折子，都各派人来分去一半。寸心本来担忧无论如何自己早晚都要接手这些比她还高的报折，没想到杨戬自己送上门来，令三公主一思及此，便十分开怀。</p> <p>而之后她又如何心疼真君日日操劳，又是如何死皮赖脸将折子再送回二位兄长的行宫中，便暂且不表。</p> <p>这日寸心将将起身，坐在梳妆台前由婢女簪花抹粉，殿中点着还未燃尽的安神香。初春的天气，已近雨季，内殿中虽然干燥舒适，但不免微微泛凉。</p> <p>忽然一个殿前值守的小厮进殿来，在阁门中对殿中的婢女耳语了几句。那婢女得了消息，点点头，又呈报于寸心身边的大丫鬟杜意。</p> <p>杜意是自小伴随寸心长大的，不比殿门之中那些外头随意可以安插进来的婢子们，很是悉知些三公主的心事。挥退了众人，进了寝殿中，又示意替殿下梳妆的侍从退下，亲上前去与龙女禀道：“公主，驸马在侧门处求见您呢。”</p> <p>敖寸心本以为她有什么要事通禀，闻言却不由得红了脸，嗔骂道：“杜意，你也学坏了，好端端地又叫甚么驸马了！”</p> <p>杜意吐了吐舌头，调笑道：“本是我来接公主之时，海嬷嬷叮嘱我的，”说着上前替她簪上朱红色的宝钗，端详了几下，一击掌心，连连点头，“殿下真美，一会儿驸马看了，肯定移不开眼呢！”</p> <p>寸心被她说得含羞带臊，又嗔她一眼，说道：“你这小蹄子再胡说，仔细我撕烂了你的嘴！”说完将头上的发饰摘下，又将挽起一半的头发放了下来，撅起嘴说道：“我又不是打扮给他看的，来就来了，你叫他进来说话。”说完，走回床边撩起床帘，钻了回去。</p> <p>杜意见她口是心非，很是好笑，忙令命退了出去，又令周遭侍候的婢女小厮通通退下，这才至前殿侧门处迎了杨戬进来，一路分花拂柳，来至寸心的寝殿。</p> <p>杜意敢在公主跟前不时调笑，却不敢在杨戬这气势极盛的天朝权臣前放肆，领他到阁门初，便行礼退下。杨戬推开门，绕过绣有鹤汀凫渚的屏风，到帐前，见龙女懒懒地躺在榻上，云鬓松散，一身宝红色的襦裙，镶嵌着闪闪发光的宝石。</p> <p>真君见她，唇角露出一丝浅笑，伸手拨开绸帐，温言道：“寸心，我自尧光山办事回来，顺便来看你。”说罢，自袖中掏出一只木盒，打开一看，只见两只晶莹剔透的冰玉跳脱，盈盈流转着温润的光泽。</p> <p>寸心一见如此，脑海中登时蹦出两句诗词：“何以致契阔？绕环双跳脱。”面色不由得红润起来，接过那两只玉镯，道了声谢，叫他近前来。</p> <p>杨戬闻言，拉起纱帘，俯首近身来，因为还未脱靴袜，只得跪坐在床侧，一双桃花眼端的流光溢彩，笑盈盈地看着她。</p> <p>他身着曜黑暗银的官服，发丝整整齐齐束于头顶银冠之上，两条长长的丝绦紧紧地贴着他的侧脸，于下颚处系结，充耳悬瑱，垂落在喉结之上，宝相庄严，威武肃穆，矜贵不已。如今身陷于这颜色娇嫩的红绡软帐之中，脸上竟是分外温软的专注，寸心纵与他相处多年，此刻也不由看痴了，好半晌，方莞尔一笑，说道：“官老爷日理万机，劳烦你挂念啦。”</p> <p>“官老爷？”杨戬闻言，无奈地一笑，伸手将她一双白嫩微凉的脚捂在掌心，微微叹了口气，带着几缕故意的愁绪问道：“你觉得我很老了吗？”</p> <p>寸心被他逗得噗嗤一笑，忍不住伸出一双藕臂勾上他的项子，钻进他的怀里去。他的身形高大壮硕，平日只身着薄衫时，将手掌按在他的肩膀上，便能感受到布料之下的肌理是如何的结实贲张，如今身着厚重的官服，更显得龙女在他怀中瘦小娇弱，细嫩柔软。杨戬不由将她紧紧地圈住，心头怜惜愈甚，柔声劝道：“你的手脚怎么那样冰？把狐绒褥子放哪里了？我给你拿来。”</p> <p>寸心笑道：“你这人可真有意思，我是龙，我们龙天生浸在海水里，从未听说有怕冷的龙。”话虽如此，却还是拿脚丫子蹬一蹬他，支使道：“在左侧大柜的上方格中……喏，没错，就在那里。”</p> <p>杨戬取了那条花色毛褥，摊开来将龙女裹得严严实实，寸心示意他坐在床沿，将细软的绒毛褥子盖在两个人身上，然后伸出依然凉汲汲的双手去冰杨戬热烘烘的脖子，见他被冰得眉头紧蹙，不由得咯咯直笑。</p> <p>杨戬无奈地弹了一下她的额头，任由她拨开自己的前襟去探索更加温热的肌肤来捂热手脚，一手抱着她，一手解开喉珠前的宝结，卸下了乌墨色的官冠。</p> <p>本来他神思凝练，又被她冰得灵台清明，渐渐地，怀中香软的身子慢慢被他捂得温暖起来，杨戬也不由得生出困意，二人团在榻上，悠然小憩。</p> <h2 id="扶摇可接"><a href="#扶摇可接" class="header-anchor">#</a> 扶摇可接</h2> <p>杨戬、寸心二人因前时做了近两千年的夫妻，浑然不觉令二郎神随意出入龙女闺阁内帷之所有何不妥之处。三公主的封地山高路远，她的亲眷公务又忙，除每十年一期西海水晶宫中的家宴，多不走动。而阁中又无长者管束、老仆谏纳，竟也无人以此异议。</p> <p>自新宪颁布，杨戬的公务愈发繁忙，虽然和寸心已互通心意，但总是聚少离多。这些年龙族之中的小辈皆已长成，四海龙王多领虚衔，政务多交由膝下龙子龙孙。寸心早年间虽然与父亲多有违逆，但总归是龙王亲生女儿，敖闰嘴上不肯服输，心中却一直挂念于她，暗中对她封地之事多有照抚，将她封地的行宫修建得富丽堂皇，雕梁画栋，不一而足。</p> <p>寸心自感亏欠于父母，自从解禁之后，一直过得安分守己，如若不是当日恰巧遇见杨戬，二人和好也不知何年何月。她眼见杨戬日夜操劳，与灌江口放浪形骸之时大不相同，于是便歇下教他帮忙的心思，渐渐打理起手中的文书，或有不解，也多至兄长府中询问。然而她实在不是打理政务的这块料子，常忙得焦头烂额，而杨戬偶尔得空，也会到她府上坐一坐，喝一杯清茶，与她温情脉脉、重温旧好，她却也决计不教杨戬知晓个中艰辛。</p> <p>天已入秋，暑热渐消。行宫盘踞于半山腰上，四处都是金黄色的叶片。寸心在露台小榭中点了一盏安神香，用金兽隔盖虚虚地拢住，香流沿着隔盖的缝隙缓缓流出，消散在空气中，满室都是催人入眠的幽香。</p> <p>小榭四方无门，榭边有一条飞瀑挂于山间，在榭下积了一池清澈见底的潭水。因三公主喜爱此地风物，便令人在六角亭沿挂上帐幔，在榭中安放了一条长塌，上面铺满了松软的被褥。寸心在此又铺上一层毛茸茸的地毯，放置了茶几、爵器等物，于此初秋的天气而言，实在闲适得宜，待上一整天，饮上一杯清茶，静听流水激越之音，倒也算一件乐事。</p> <p>四下无风，寸心拿起茶几上墨色蟠龙纹的折扇，自怀中摸出一只翠绿通透的扇坠，换下了原本的那只。然后她拿着扇子踱步到床边，掀起层层随着微风飘拂的纱帐，里面的小榻上，正是杨戬静静安眠。</p> <p>秋老虎的暑气惹人烦躁，她小心地拨开他盖住额头的碎发，见他面颊微红，怕他生出燥热，寸心矮身坐于床头，轻摇折扇为他纳凉。</p> <p>杨戬睡得极好，整个人陷入寸心软绵绵的被褥中，长长的眼睫随着平稳而柔缓的呼吸轻轻颤抖着，面容宁静而无害。寸心支着脑袋看着他，见他英俊的面庞被帐外透入的阳光撒上一层朦胧的光辉，心中对他爱慕不已，低头在他微厚的唇上浅浅地印上一吻。</p> <p>杨戬沉沉睡着，似有所感，寸心忽觉腕上一暖，低头看去，却是他迷蒙间轻轻握住了她的手腕。</p> <p>自他二人重归旧好，每每得空，杨戬总要来她这里相聚。因新天条出世不过百年，于天廷而言不过百日，各司新令施行仍有错漏不通之处，都需司法之神一一调度安排，是以杨戬总是忙碌不已，及至来时，多满身倦怠。三公主见他疲惫，便赶他去歇息，在这风景宜人的露台小榭中睡上一觉，甚么疲乏惫倦，也消解去了。</p> <p>三公主不愿它物打搅杨戬休息，自年初与他相遇，便命人停下了晨钟暮鼓，那罄此时已在钟楼里落了灰。寸心在他身旁静静地待了好半晌，见天色将晚，殿内大抵已布晚膳，便拿起新制的扇坠，用垂挂而下的流苏穗子轻轻搔挠他的鼻尖，闹他起床。</p> <p>顶天立地的二郎真君此时困于三公主温柔的被褥里，难耐地皱了皱鼻子，自喉间溢出一声慵懒的气音，微微偏头躲了过去。寸心见此，愈发坏心地追凑过去，锲而不舍地捣乱。</p> <p>杨戬被她闹得无法，艰难地睁开朦胧的眼睛，瞥见寸心坐在床边，便软绵绵地凑过去，枕在她的腿上，抱住她的腰，在她怀里打了一个小小的哈欠。</p> <p>龙女放下折扇，手指伸进他的发丝间揉了揉，笑道：“这么困呀？”</p> <p>郎君的声音有些哑，几不可闻地嗯了一声，像一只晒太阳晒得弥足的白色毛毛小猫咪，在龙女怀里蹭了蹭。</p> <p>敖寸心叫他起床已经叫得十分熟练，并不吃这一套。鼻尖似乎已经闻到饭菜的香味，见他在自己怀中又要昏昏欲睡，连忙拍拍他的肩膀：“快起来啦，睡了这么久，该用晚膳了。二郎……你听话。”话未说完，又拿起那扇坠去呵他痒。</p> <p>杨戬无奈地抓住那只捣蛋的小手，睁开眼，见那扇坠不是旧的，呢喃着嗓子道：“嗯？你送给我的？”</p> <p>寸心道：“是我亲手编的穗子呢，还不快起来谢我？”</p> <p>真君艰难地支起沉重的身躯，满脸都写着“不情不愿”四个大字。将扇坠捏在手中，仍睡眼惺忪，侧身去亲了亲寸心的脸颊，见她肩膀近在咫尺，又很没出息地笑着靠了上去，贴在龙女的肩窝处蹭啊蹭，哼声沾染了浓厚的鼻音，就是不肯起来。</p> <p>龙女心中好笑，见他如此可怜，一时心软，抱着他温存了好一会儿。到二人起时，走下露台，殿中已经摆好了晚膳。</p> <p>二人已私交甚久，却其实一直没有越雷池一步。但两个人前番结缡已近两千年，实打实是做过一回夫妻的人了，要说什么事都没有，又有谁会相信？好在殿中的仆婢无大事是不得出封地的，而杨戬因挂念敖寸心的安危，早于和离后数年间陆陆续续向三公主行宫中的侍卫内安插眼线，到如今，殿外守卫皆已是二郎真君座下的草头神，更无人敢对杨戬异议。如此一来，四海、抑或三界内，想要知道二郎神同西海三公主厮混于一处，便万万不可能了。</p> <p>杨戬在此处用了膳，因为公事所碍，又要匆匆而去。临别时寸心为他披上一件石青刻丝竹纹披风，缩在杨戬怀中抱住他，委屈道：“又要走嘛？”</p> <p>杨戬心中也万分不舍，附身紧紧拥住她，贴了贴她的脸，柔声道：“对不起，等这个冬天过去，天廷就要休沐两日。我今晚回去将政务处理干净，待开春时，我便能来陪你两年了。”</p> <p>寸心闻言，惊喜地钻出来：“真的？”</p> <p>“真的。”杨戬笑着俯下身，浅浅地亲吻了她。山叶一片金黄，杨戬出了宫门，化作一道蓝色的流光，消失在阶前。</p> <h2 id="东隅已逝"><a href="#东隅已逝" class="header-anchor">#</a> 东隅已逝</h2> <p>真君已许诺了归期，且一诺便是两年相伴，寸心这些日子心中都溢满了甜蜜，对那远在九重天上的神君日思夜想，只盼着冬天早早过去，对俗务纷杂更是沉不下心。一待年末，便遣人将这堆麻烦打包了，运到摩昂太子府上去。</p> <p>不想小厮去了大半日，回来时慌里慌张地，对三公主磕了头，禀道：“公主殿下，不好了！咱们家小殿下给人拐子拐去了！”</p> <p>“你说什么！”寸心惊得跃起，揪住那小厮的衣领急道：“哪里来这么大胆的拐子，龙宫的郡主也敢拐去？！”说罢，也不及那小厮求饶，忙披外衫，带人往西海龙宫赶去。</p> <p>那小厮口中的小殿下乃是摩昂太子膝下幼女，于西海龙宫之中，乃是唯一一个第三辈的孩子，受尽宠爱，与三公主这位唯一的小姑姑最亲。当年寸心和离归家，无所事事间，正逢小殿下出世，敖寸心体恤嫂嫂管理偌大一个龙宫内务十分辛苦，便主动揽下了照料小龙女的任务，到寸心销罪后分到封地，小殿下足有八九成的时光是和姑姑一处玩耍长大的。</p> <p>宝贝侄女出了事，寸心着急不已，又不知其中曲折，不过两个时辰便已火急火燎地赶到西海龙宫之中，一头撞进大殿，一抬头，却被殿中诡异的局面唬得愣在原地。</p> <p>只见龙宫之中其乐融融，大太子、大太子妃、二太子、龙王龙后及龟丞相等人皆围站在四周，面色欣慰，相谈甚欢。消息中走失的小侄女，安安稳稳地被一高大俊朗的黑袍神君抱在怀中哄着，再一看那人，不是杨戬是谁？</p> <p>杨戬也没想到会在这里见到敖寸心，二人对视一眼，碍于众人在场，不好寒暄，寸心愣了半晌，方出言道：“呃……杨戬，你怎么在这里？”</p> <p>龙后等人这才察觉寸心进来，忙迎她进殿，见她与杨戬间神色似乎是尴尬，便向她解释道：“这一回可多亏了二郎真君，小柔柔才能安安稳稳地送回来呢！”</p> <p>原来小郡主与侍从至人间玩耍之时，遇见一群山根野草修炼而成的妖精。小妖不识得龙族之威，仗着妖毒厉害，将小姑娘掳走，妄图吸食她身上浑厚的龙气以涨修为。也是凑巧，当地城隍早早盯上了这伙无恶不作的精怪，拟了折子上报司法府，上头派下两个天兵，将一伙妖怪端上了天。</p> <p>那时小郡主未及遇害，司法府的天兵见她身上萦绕着神龙之气，便将她带到了公府的后花园中先行安置，待去查探她的身份时，小姑娘仗着身形矮小，善于御水，从小院的水渠中溜了出去。</p> <p>那天兵上报了司法府的一员校尉，校尉待去查验，便遇见走失了小殿下的西海从卫。众卫见大错铸成，都不敢回海，盼图独自寻回郡主，一查间，即明了了小龙女的身份。待要回去寻人，哪里还寻得着？那校尉怕再出差错，又报至真君神殿的草头神处。</p> <p>正逢真君在神殿中，草头神略一思量，便斗胆将此事报予了杨戬。杨戬听是西海，忙搁置了公务前去寻人，等来人报时，才晓得小丫头溜到了王母娘娘的蟠桃园中，偷吃了一只蟠桃，被娘娘的女官捉个正着。</p> <p>那蟠桃园是何等禁地？乃是只由娘娘座下看护蟠桃的女官照管园中事物，连天廷的军卫都是不能染指的，虽则小郡主年纪尚小，情有可原，但损毁了一枚娘娘的蟠桃，其罪实重，女官料想也断不能就此罢休。</p> <p>草头神回报予杨戬后，得了真君指令，又回蟠桃园与女官说：“我家二爷叫我与姐姐你说，大家都是给娘娘办事的，姐姐就看在我家二爷的面上，将小孩儿给放了罢。待明日，二爷去求娘娘开个恩典，此事也就这样过去了。姐姐你说，咱们二爷在娘娘手底下这么多年，娘娘总不至为个蟠桃与二爷为难，迟早也是罢休，姐姐就卖咱们二爷一个人情，松松手缝罢。”</p> <p>那女官闻言，即笑道：“我却不敢与真君大人腆称共事，真君是娘娘跟前的红人，料想一个桃子罢了，娘娘断不会与真君计较。但我只是个婢女，若私自放人，在娘娘跟前可没有真君那么大的面子，娘娘责怪起来，求真君可要保我才是。”</p> <p>草头神闻言，赔笑道：“姐姐说得哪里话，且不说娘娘断不会恼，就是责怪下来，尚有我家二爷横在上头哩，断没有教姐姐担事的道理。”</p> <p>杨戬自上天伊始，名是三界司法天神，实则为娘娘麾下的臣子，与娘娘座下这些仙位卓然，不受天兵管巡的女官也算熟悉。况且杨戬不仅是朝中忠臣，骨子里和玉帝王母到底算是一家人，女官于名头上再如何体面，终究比不得杨戬这位亲外甥更受倚重。平日没有交集也就罢了，如今送上门一个真君大人的人情，如何敢不要？只客套了两句，干净利落放了人。</p> <p>草头神将小姑娘领回了神殿，殿中梅山兄弟正好做完差回来，见了软糯糯的小白团子，心中俱生喜欢，皆蹲下身来逗她玩儿。</p> <p>小丫头却被先前的经历唬住，又见梅山兄弟长得奇形怪状，相貌丑陋，抿着嘴缩在座椅上，不敢出声。老六见状拍了拍老四的肩膀，说道：“哎，别逗小姑娘了，我看她怕生得很。我这么面善，她还不理我，定是教你们给拖累的。”</p> <p>老四素来爱与老六斗嘴，笑骂了他几句，一群人闹将起来，嗓门又大，行止粗鲁，更闹得小郡主不敢出声。康老大瞥见，啧了一声，说得：“看你们给小娃娃吓得，都出去出去！”几人你拉扯我，我推搡你，溜到门外去了。</p> <p>不多时，杨戬自瑶池赶回，身着一袭嵌银龙纹黑衣，纵进殿来，看到梅山兄弟聚成一团，坨在门柱后偷看小娃娃的反应。</p> <p>杨戬：“……”</p> <p>老四余光瞥见了杨戬，忙钻过来说道：“二爷可回来了！小丫头好像不大喜欢我们，兄弟也没哄过这等小囡囡，你看……”</p> <p>真君扶额，心道我也没接触过这么丁点的小朋友，但还是放轻了脚步悄声走入殿内，来到小郡主身边，挪开了高大到遮挡她视线的案几。</p> <p>杨戬看她小脸吓得煞白，不由得蹲下身平视她，摸摸她的小龙角，柔声道：“别怕，有叔叔保护你。待哮天犬拿回了状纸，我送你回家。”</p> <p>小丫头见他长得那样好看，动作又那样轻柔，和这冷冰冰的神殿中奇形怪状的众人全然不一样，一时止住了哭，却就此单黏着杨戬一个人，他走到哪里，小龙便跟到哪里，一双眼睛水汪汪地看着他。杨戬被她盯得无法，只好俯下身，将她抱了起来，轻拍孩子小小的脊背哄着她：“小姑娘不害怕，有叔叔在呢……你看那是什么？好不好看？叔叔拿给你玩好不好？”</p> <p>小龙女扒着他的脖子，好奇地瞧着他手中晃动的镇纸，听话地伸手去接，杨戬却忽然想到她细软的胳膊恐怕拿不住这只玄铁镇纸，只好挨着她更加水汪汪的眼神将镇纸放下，忙取下腰间的玉佩拿给她，哄道：“镇纸不好，我们拿不动，玩这个好不好？你看这个是不是更好玩？”</p> <p>摩昂太子的女儿很听话，虽然依旧不肯开口讲话，但既然与杨戬投了缘，自然也听他的话，拿了那只玉佩在手中，不哭不闹，安静地趴在杨戬怀里眨巴着圆滚滚的眼睛，不多时渐渐打起了小哈欠，抱着他的脖子睡着了。</p> <p>杨戬抱着怀里的小姑娘，看着她短短的小角，秀气精致的脸庞，只觉得温暖非常，心中忽然泛起阵阵感慨，不由得细细思量：假如他和寸心也有一个女儿，是不是也像这个小姑娘一样，长着一对小龙角，生得玉雪可爱，聪明漂亮？思及此，他忍不住呆呆地打量了一会儿怀中小小的孩子，心中只觉一片柔软，半晌才摇摇头，哑然失笑。</p> <p>梅山兄弟守在门口，怕惹小姑娘害怕，不敢进殿，待见杨戬竟肯纡尊降贵来哄一个小丫头，都惊得面面相觑，默然不语。这些年来，杨戬为人愈发阴鸷狠辣，即使是他们这些昔日的结拜兄弟，也常不敢与他多说什么话。然而他们俱感曾经亏欠于兄弟，都有心相报，但杨戬自从华山一战后身受重伤，清心寡欲地修了几百年的道，越来越无心于俗世纷扰，执掌新天条后更是铁面无情，典刑明正，众人有时看他，心中只觉得他实在不似活生生的人。</p> <p>这时哮天犬急匆匆地回来，手中拿着那一纸杨戬要的诉状，边跑边嚎：“主人！主人！我回来了！”未及二门上，便被内殿的杨戬遥遥瞪了一眼。</p> <p>哮天犬当即闭嘴，悄悄快步跑近杨戬，将手中的诉状递给他，然后转身化作一只黑色细犬，悄悄儿地跑去窝在案几脚边。</p> <p>真君单手抱着小丫头，来至法案后坐定，将那纸诉状以镇纸压了，拿起狼毫沾了沾朱红的墨汁，细细看了字文，然后熟稔地写下批语。不多时，他悄声示意康安裕进来取那回状。</p> <p>康老大接过一看，颔了颔首，偷偷瞥了一眼杨戬的脸色，低声问道：“二爷，可要通知西海的人来接这小龙？”</p> <p>真君闻言看了怀中的小姑娘一眼，点了点头，忽然又叫回康安裕，摆了摆手道：“罢了，我还是亲自送一趟。”</p> <h2 id="桑榆未晚"><a href="#桑榆未晚" class="header-anchor">#</a> 桑榆未晚</h2> <p>碧水波光粼粼，触手微凉，放眼望去，只觉如幻境一般迷离易碎。西海的水，受西海龙王近万年的治理，已不复太古时的险恶浑浊，反而澄澈净透，生灵满野。五彩斑斓的小丑鱼喜欢游曳其间，在这海中最为繁华鼎盛之地更添了几分灵动。</p> <p>今日的水晶宫中热闹非凡，各处封地的龙子龙孙们都赶了回来。龙后命人点亮了殿中所有的夜明珠，使这座古老而精致的宫殿显得熠熠生辉，壮阔绚丽。杨戬见此，不禁抚掌而叹：“早闻四海龙宫富甲天下，今日见此盛景，实在大饱眼福。”</p> <p>龙王在一旁赔笑道：“天神说的哪里话，龙宫只不过仗着祖宗基业而已。天神年轻有为，又掌三界大权，但凡天神有令，西海莫敢不从。”</p> <p>杨戬虽习惯了这等曲迎奉承，却不愿在龙王面前托大，只摇头笑道：“杨戬是晚辈，今日与龙王爷不论官高，只论私交而已。”</p> <p>西海龙王连连点头，心中却私语道：“如若当真只论私交，就算你抱回我的孙女，终究强抢过我的女儿，看我不打得你满地找牙，何必还在此处做小伏低？”打得过打不过，权且另算。</p> <p>今日杨戬一力免去小郡主的罪责，又将小姑娘自蟠桃园中救出，为此还于王母娘娘面前欠下了人情，对西海实有大恩。如无杨戬，不知还要费尽多少曲折，遥想当年玉龙太子只因烧毁御赐之物竟受锯角褪麟之苦，已可见一斑。</p> <p>更不论杨戬如今身担重职，一手遮天。龙王就是心中再有成见，也免不了摆出亲切和顺的模样，入情入理，邀请杨戬在水晶宫中同用晚宴。小郡主与杨戬相处了半日，心中对他极富好感，见他要在家里逗留，只觉开心不已，缠着他要抱抱，吓得众人连连阻止。好在杨戬本就有意与西海示好，又见小龙生得玉雪可爱，与她姑姑倒有五分相似，心中不由喜欢，如此即顺水推舟，只说与小龙女投缘，态度甚是亲切和善。小姑娘折腾半日，终于累了，将将才被母亲哄了睡去。</p> <p>众人入了座，传人鱼舞姬奏乐歌舞。西海众人不知杨戬与敖寸心之间的交情，还道是二人和离，如此见面俱显尴尬，将他们隔得老开。杨戬和敖寸心对视一眼，微咳一声，只得装作尴尬的模样，不敢过多攀谈。</p> <p>龙王请杨戬上座，杨戬辞而不就，于是与大太子摩昂太子及二太子敖荣相邻而席。二位太子向来因陈年旧事对杨戬心中忿忿，却不得不敬佩杨戬的为人，恰逢此时他又施恩于西海，既然一齐宴饮，少不得要多灌这位便宜前妹夫几杯。</p> <p>寸心见这不省心的家伙来者不拒，饮了一杯又一杯，心中直冒火花儿，坐在大嫂身旁敢怒不敢言，直拿一双金黄色的竖瞳去瞪他。哪晓得杨戬连看都不敢看她一眼，只埋头喝酒，力求在曾经的岳父舅哥、兴许也是之后的岳父舅哥面前留下一个相对较好的印象。</p> <p>大太子妃坐在寸心身旁，见状笑道：“寸心，你老是看他做什么？”</p> <p>“我……”被抓包的敖小寸很慌张，“我……我难得见他，我我趁机瞪他两眼……”</p> <p>“噗嗤，”大太子妃被自家妹妹逗得一笑，“寸心，看不出来你这么讨厌他？当年他被所有人鄙夷的时候，你不是憋着一股气咬定了他是个好人么？可是把父王气的不轻。”</p> <p>敖寸心俏脸一红，嘴硬道：“才没有，才没有！”</p> <p>龙后坐在二人上首，听到姑嫂二人打打闹闹，不由得笑道：“三儿，这茬儿我可也记得呢，你别想耍赖。”</p> <p>三公主被娘亲和嫂子怼得哑口无言，鼓着小脸翻搅案上一碗小米粥。又听方才揭短的娘亲悄声说道：“三儿，可不能管你的小性子了，如今这位是我们得罪不起的人物，况且这一回又给我家施了一个大恩。我不管你心里怎么想，可不许给我胡闹啊。”</p> <p>寸心闻言，暗暗嘀咕道：“什么嘛，这都是他应该做的。”话虽如此，心中却悄悄泛起了甜蜜。</p> <p>酒过三巡，菜过五味，杨戬孤身一人，哪里来的资本与天生御水，量如江海的几条真龙斗酒，没吃下一口热菜，已被灌得趴在案上人事不知。</p> <p>摩昂见此，挥手唤来一旁的婢女，令其送真君至殿后休息。不想那婢子才挽上杨戬的胳膊，就被猛然察觉到不对劲真君大人抽手躲开。杨戬皱着眉，强撑着身子离想要靠近他的雌性生物足有八尺远。</p> <p>杨戬见那婢女愣了一愣，居然还有想要上前的趋势，忙皱紧了眉头，摆手道：“你别碰我，我夫人要生气的。”</p> <p>敖摩昂：“……”</p> <p>敖寸心：“……！”</p> <p>三公主生怕杨戬再说出什么惊天地泣鬼神的虎狼之词，忙不迭一溜小跑蹿到杨戬身边，一把架住他给大哥打了个招呼道：“不麻烦了，我和他熟，还是我来送，我来送。”</p> <p>摩昂太子一双锐利的眼神扫在二人身上，磕摸出几分味道来，半晌意味不明地笑了笑，对妹妹说道：“照顾好二郎真君。”</p> <p>敖寸心哪里还敢逗留，搀着重新人事不省的真君大人，悄悄往后殿而去。西海的一群龙早就修成了人事练达之精，余光皆向这方瞥去，面上仍不动声色地宴饮交谈。三公主只觉背后都教人看出几个窟漏，溜得飞快。</p> <p>出了宫殿，夜明珠便没有那么多了。光线陡然暗淡下来，暮色沉沉，给四周镀上一层暧昧的氛围。寸心并不怎么吃力，微扶着杨戬向后殿走去。</p> <p>杨戬喝醉的时候一向很听话，从来不会闹，只要是三公主在身边，叫他做什么他就乖乖地做什么。敖寸心将他安置在一处客房中，挥退了侍从，亲自褪下他的外袍，拧干热腾腾的毛巾替他擦拭面颊。</p> <p>见他安然趴在自己怀中任她摆布，寸心只觉心头绵软，伸出手指按了按他的鼻子，想起他方才一副生人勿近的模样，不由喷地一笑，说道：“真不错，这么乖呀？”</p> <p>杨戬迷迷糊糊地，抓住了寸心的手，在她掌心吻了吻，声音也软糯糯地：“嗯，我很听你话的。”</p> <p>三公主将他完整地塞进被褥里，坐在床头哄他道：“二爷，那你听话睡觉，我得马上回去。你，你不许闹，哎呀……”</p> <p>杨戬躺在床上，抓着她的手不放，笑着求道：“不，我不要，寸心，你亲亲我，你快，你快和我亲亲。”只差撒泼打滚，全然没有一点司法天神的威势。</p> <p>寸心被他气笑了，忙捂着他的嘴哄道：“好二爷，我求你了，小声点儿！”</p> <p>杨戬睁大眼睛和她对视，眸中满是笑意，喉间发出类似撒娇的声音，蹭了蹭她的手掌，极不安分。</p> <p>被他闹得无法，龙女只得俯下身抱着他亲了又亲。但喝醉了酒的杨戬一点儿也不讲道理，二人在昏暗的客房中笑闹了好一阵子，唇齿相依，亲吻了不知多少次，龙女才将这不省心的郎君哄睡着。</p> <p>——</p> <p>三公主回到宴席上时，太子妃坐到了大太子身边。见小妹回来，敖摩昂的面色稍霁，低声向太子妃询问：“你怎么知道定不会出事？”</p> <p>太子妃道：“如若小妹不回来，我还派去一个侍女趴在门口偷听，一有响动，立即来报予你我。咳，你就放心罢。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/10.连载中/201220.关山难越.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/461da0/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">返祖</div></a> <a href="/pages/e95e1e/" class="page-nav-centre page-nav-centre-next"><div class="to
