jgAAAABJRU5ErkJggg==">风月有愧（2）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>这太荒唐了！</p> <p>如他所见，这妖孽憍淫放浪到了极点，别说自己无欲无求，便是真有那心思，面对如这般下贱不要脸的，他嫌脏，根本碰都不想碰。</p> <p>杨戬感觉自己在被人挑衅，冷笑一声俯首用鄙夷的目光审夺脚下衣衫不整的龙女。“你是什么东西，也敢用污合之术坏我根基？”</p> <p>“你都没尝过那滋味……但凡道士哥哥与我巫山云雨一回，颠鸾倒凤，不知天地为何物。到那时，我不相信你还能是这一副清心寡欲的正派样子。”</p> <p>龙女跪坐在地，依偎在杨戬膝盖上，眼看杨戬即将功德圆满，她很着急。她知道若再不抓紧时机，等他真的修炼成仙，自己就再也没有机会了。于是她毫不避讳地抬头与他冷利视线交锋，细细揣度他微不可闻的面部表情，一心想把那一点微表情去凿开，加重、扩大，并不介意他对自己的印象有多不堪，嘴里只顾得说着叫人委实难堪的骚话。</p> <p>从前曲意婉转，对他推心置腹，试图唤醒他的记忆都无济于事。恨只恨，他是木石之人……</p> <p>而他只要尚有知觉，对她是爱是憎，又有什么要紧呢？</p> <p>她不能再等了。</p> <p>龙女眼中有悲戚，如星辰汪洋，皆是杨戬看不懂的情绪。她顾盼生姿，娇喘连连，不顾一切地去拉扯杨戬腰间的束带，拽着他已凌乱的大氅下摆借助作用力从地上爬起来，努力攀附到他怀里，脸凑过去，冒死索吻。</p> <p>道长生前肉身成圣，所向披靡，小小妖龙可打不过他。</p> <p>唇上触感冷硬冰凉，龙女由衷怵他铁石心肠不怒而威，杀她五十七次从不惭愧。她不敢睁眼，不敢想象自己正疯狂拥吻着的人，此时此刻手里会捏着怎样残酷狠毒的杀招，要将她挫骨扬灰，神形俱灭。</p> <p>杨戬怔住，怀中是美玉无瑕，肤若白瓷皓雪，一手搂过那对蝶骨，尤觉这副娇躯瘦弱轻盈得叫人心疼。他嗅见她的发香，感受到她慌乱蠕动的唇齿，明明媚态知风尘，却表现得跟处子似的。</p> <p>前世记忆又组片段倒置，熟悉又陌生的人和事。那是多么长的一生啊，从洪荒逐流，到盛世长安，他曾身着喜服，与人堂前三叩首，结下终身之盟；他曾伫立于海边，抱手静候，遥看日升日落，翘盼与人私奔；他也曾品尝过女人口舌清甜，相拥着宽衣解带，掩好门窗放下床帘。帐暖良宵，鱼水奔赴，哪还管得了门外宾客喧嚷，锣鼓声张……</p> <p>想不起来了……无非是些男欢女爱，嗔恨痴念，庸人自扰。他对这些不感兴趣，也没有非得记起不可的必要。他只想潜心修炼，只想活着就好。</p> <p>杨戬冷冷看着龙女近在咫尺而紧闭的双眼，由着那纤长曲卷的眼睫刮拂过脸庞，彼此吐息相交而丝毫不为所动。良久，放平期许，垂下眼睑，他心中叹息，叹这妖女可怜可笑，不以为然地将她一把推开。</p> <p>他抬手用力拧住龙女的下颚，一字一顿说，“我最后再告诉你一次，我不记得你，也懒得知道你的事。至于这么多年不对你动手，是因为你不够格，明白么？”</p> <p>“不对，你就是舍不得我！”龙女尖声反驳，“你修道是为了什么！难道是为了行尸走肉般的活着？还是去做别人手里一把没有感情的刀？你不是差一只妖就功德圆满了么，你倒是杀了我啊！把我炼成脓水，去你那位圣贤跟前邀功！”</p> <p>好重的妖气。</p> <p>龙女色诱不成，情绪逐渐愤怒不可控，魔性从自身虚鼎中疯长出来，是足以毁天灭地的痴和执，赐她以永生。</p> <p>她便是靠这种力量多年依附在杨戬身旁，为虎作伥一般挥之不去。与其说她永生，不如说是死不瞑目，所以留给他，留给人间最后一缕残愿。</p> <p><br><br></p> <p>开天斧劈开华山时，杨戬已被乾坤钵重伤，独自一人坐在树林里，看远方山顶上宇光大作，云卷生莲，他知，是他的好外甥得手了。</p> <p>可是盘古斧威力何其大，不仅劈开了华山，也劈开了天。</p> <p>原始天尊的化相御风而来，指着天之痕，苍穹那一道撕开的口子，问他，“你该当何罪！”</p> <p>他只觉欣慰，还未从改写天规的喜悦之情中缓过神过来。“师爷说笑了，这天要塌人要死的，关我什么事？怎么都成了我杨戬一人的包袱，弟子有几个身子赔罪的？”</p> <p>圣人圣量，竟不气恼后辈出言不逊，而是大笑三声道，“可要不是你执意改天条，人间就不会有眼下的浩劫。”</p> <p>“……那会怎么样？”</p> <p>“天若有痕，九重天下坠，九幽之地上移，云层与土壤混合，三界为之覆灭。”</p> <p>“那他们呢，我妹妹、沉香……还有寸心。”</p> <p>原始天尊又是一笑，拂一拂腮边白花花的胡须。“便是你师爷我，也要回归混沌里去啦……不过也没什么，我们这些老家伙活得够久了。”</p> <p>……</p> <p>“不可以！”</p> <p>……</p> <p>原始天尊正与玉帝下棋在昆仑山下棋，瞥了眼刚解禁足就四海八荒乱跑的西海三公主。“什么不可以？”</p> <p>“你怎么能让他祭天呢！”</p> <p>“他自己愿意的。”</p> <p>这徒孙媳妇还是那脾气，话没说两句就要跳脚骂娘，跟她夫君一样不懂得尊敬长辈，也不知玉鼎那小老儿怎么给人当师父的。</p> <p>“那你现在告诉我怎么救活他！”</p> <p>原始天尊笑了笑，意味深长地看了一眼与他同局对弈的玉帝。</p> <p>“他要是能活，你就得死，知道吗小丫头？”</p> <p>“我不管！”</p> <p>……</p> <p>龙女走后，玉帝趁天尊不注意吃掉他一颗棋子，另有所指地说，“又一个送死的。”</p> <p>原始天尊眉头一蹙，捻着茶杯沉吟半晌，纵观棋中局势，忽而又将眉头舒展开。</p> <p>“不，她是变数。”</p> <p><br><br></p> <p>杨戬感到掌心虎口处猛的一痛，是孽龙牙痒地发起兽性，开始嘶嗌抓挠着胡乱咬人，他只得松手，又被反客为主扑了怀。龙女手脚并用地挂在他身上，两腿变幻成龙尾，一圈一圈往他身上缠，紧到密不可分，甚至打落了杨戬头顶上用以遮阳的帷帽。</p> <p>她真的试过所有方法，阻挠、勾引、装可怜、软磨硬泡，他都无动于衷。她只好死缠烂打生扑上去，即便粉身碎骨也要他回头。</p> <p>她朝杨戬的脖子亲下去，撵起领上最敏感薄弱的肌肤。一圈吸吮，留下红痕一连串，红到耳根，再往喉结处重重咬下去。</p> <p>杨戬立刻疼得汗毛倒竖，吃痛一声抓了一把龙女那飘逸长发向后扯，试图与她拉开距离。</p> <p>只是她疯了，八头牛拉不回。</p> <p>不知哪来的怒火如山倒，比他以往任何一次情绪都来的更浓更烈。虽然那不是爱与怜惜，虽然那是他在想法子思考，思考怎么弄死这个女人。</p> <p>“你真的是不怕死。”</p> <p>杨戬目露凶光，嘴边挂着残忍的笑，紧紧回拥龙女，抱着她脚下后撤几步，两人一同齐齐往身后的湖水里栽去。</p> <hr> <p><a href="https://suzhouxue366.lofter.com/" target="_blank" rel="noopener noreferrer">——未完待续……<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/46.46.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4
