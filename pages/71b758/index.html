煮上几锅的骨头汤都不肯露面。好在敖寸心学会了条条道路通罗马的道理，一条路走不通便换了一条，硬是从梅山老六那套来了当年的故事。</p> <p><br><br></p> <p>“二爷～”敖寸心端着茶挪到了手持书卷的杨戬面前甜甜叫了一声。</p> <p>“寸心，明日早朝要上报近日案卷处理的情况，我还有些积压的案子没批，你先去休息吧”杨戬笑了笑，带着春风的暖意，复又埋首看了下去。</p> <p>敖寸心仍是立着不动，探头望着杨戬。好一会儿，杨戬感受到敖寸心灼热的目光，抬了头疑惑道“怎么了寸心？”</p> <p>“那个，杨戬，上回说欠我份生辰礼物你还记得么？”敖三公主终于逮着了机会，热乎贴了上去。“我有想要的东西了。”</p> <p>“哦？你说说。”杨戬放下了书，饶有趣味地看着她。</p> <p>“当年智擒土行孙，你，你是不是，是不是化了，化了女装？”敖寸心感觉自己堆上了龙生的最灿烂的笑脸，“我还没有见过呢，你，能不能，再扮一次呀～”</p> <p>…… …… ……杨戬的脸就像是雷公电母的闪现，阴晴不定。</p> <p>“二爷～真君～真君大人？清源妙道真君？昭惠显圣仁佑王殿下？“敖寸心趁着胆子大又向前挤了一步。</p> <p>良久，杨戬的唇边露出了摄魂的笑意，“不行”，又顿了顿，“快睡觉去吧”。</p> <p>撒娇无效，敖寸心，败。</p> <p>卖萌哄骗，敖寸心，再败。</p> <p>威逼利诱，敖寸心，三败。</p> <p><br><br></p> <p>这也不行，那也不行，敖寸心坐在杨府的台阶上发呆，看着一旁的小童蹲在地上绘兵图，突然有了灵感。</p> <p>“策儿，过来～给娘看看～”龙三公主看着自家的崽子甚是称心，杨策身着银蓝水合服，面目清俊，发束微卷，不愧是像杨戬一个模子里刻出来的。</p> <p>“娘，您找孩儿有什么事吗？”杨策虽小，奶音不全，却齐备有礼。</p> <p>“策儿，娘带你上街好不好？有可多好玩的呢！”</p> <p>“好呀，上次哮天叔叔带我吃了凡间的糖葫芦，策儿喜欢。”</p> <p>“策儿喜欢就好，真乖～不过，这次我们出去得换个造型，来，娘给你打扮打扮。”说着，敖寸心便化了衣装，帮他易服。</p> <p>不几时就换好了装束，敖寸心满意地多打量了几眼，止不住笑就要拉着策儿上街溜达去，“真好看呀”。</p> <p>杨策觉得哪里有些怪怪的却又说不上来，刚想问问，便一同撞上了下朝的杨戬。</p> <p>“父亲！”</p> <p>杨戬看着面前这个小玉团子，敖寸心看着杨戬，两人的眼神均从惊恐中出来。</p> <p><br><br></p> <p>杨策自然是不知道发生了什么，旁人只见得他身穿一领淡鹅黄，腰束丝绦，外罩轻纱，卷发散披，上打了个八宝蝴蝶结。</p> <p>“敖寸心！”</p> <p>“二爷，这，你听我说呀，小策说他想上街逛逛，我见娘娘前几年送来的孩子衣服放了太久，怕长灰尘，这不是…物尽其用嘛……”敖三公主吐了吐舌头，声音越来越小。</p> <p>杨戬铁青了脸，肯定是气极了，周遭的空气结了冰样的寒凉。</p> <p>好一阵后，大神转了脸色，似笑非笑地拽起了龙怂成虫的小手，哦？是吗？不要浪费？好吧，那只能委屈小寸再添个女儿了……</p> <p>杨策仍旧一脸懵定在原地，回过神来又在房前挠了半天的门，娘，说好了带我上街的呢！</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/040800.作.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,2
