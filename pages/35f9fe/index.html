CP是戬心没有错 &amp; 我觉得是甜的 &amp; 内有仙子出没实在介意的自己避雷吧</p> <hr> <p>九重天上从前热闹过，后来渐渐冷清，很久了。现下真君神殿的烛火也熄了，唯广寒宫凭借先天造化，一如既往清辉盈透。</p> <p>有玄衣男子行在广寒宫前长长的阶梯上，太安静的天界，他的脚步声便显得特别清晰。<br>
于是不等他行到门前，白衣仙子已经来迎客了。</p> <p>“只剩我们了？”等人走完最后一阶，白衣的仙子开口，依旧柔和又清冷。<br>
“还有我们。”男子答着话，右手在空中虚抚两下，再放下垂到身侧。他手里没了从前几乎不离身的那把墨扇，是确实没有别人。<br>
“有劳真君。”白衣仙子侧身让了让，“进来喝杯茶吧。”</p> <p>碧绿的茶汤最后撒上些桂花才被摆到男子面前。<br>
“最后一季月桂了。”<br>
男子指节轻扣桌面谢茶，他座位侧旁一肘距离原曾有株生机勃勃的桂树，现在只剩了蓬枯木。</p> <p>“你可以走的。”<br>
“嗯？”去屋里拿了东西又出来的白衣仙子一时有些愣怔，看男子视线落在自己苍白到快要透明的指尖，也盯着看了会儿，然后轻笑着摇摇头，转回神递出锦盒，“这个给你。”<br>
男子接过，打开看了，又合上想推回去。<br>
“三公主用得到。”挡了他没出口的拒绝，白衣仙子摘下一边耳环捧在手心，“他的事情我还没谢过真君呢，这宝珠权做谢礼吧。”<br>
累丝耳环上空影影绰绰显出个人影，虽紧闭双眼，对外界的一切都不做反应，却任谁都看得出他当年也必是位不凡的英雄。<br>
“这是他生的世界也是他死的世界，这是他从开始到结束所存在的世界。他不离开，我又能去哪里呢？”从人影显现开始白衣仙子的目光便只在那处，跨越漫长岁月的依恋和深情仍旧清晰。</p> <p>很快白衣仙子的手就什么都捧不住了。<br>
灵炁有尽，神不远遁，便只终途。</p> <p>“真君呢？”依附于耳环的残魂到底是早一步，白衣仙子仍望着那魂魄消散的方向，以至于另一个人想了好一会儿也不知她问的究竟是什么。<br>
于是随便猜了个，“监督善后关系重大，没有人比司法天神更合适，”主动留下的都并不全如这月宫仙子般好相于，更不消言九头怪鸟那样被动留下的，“也没有人比杨戬更有能力……”<br>
“真君后悔过吗？”应是觉得他答非所问，白衣仙子明确了问题。<br>
“后悔……吗？”玄衣男子陷入思索。一时间他想直接回答不后悔，又一时间他觉得自己应该是后悔过。若是早点知道无论如何那个姑娘都不会抛下他，他就不说那么多言不由衷的话了，那样他们的日子便可以早一些换种法子过。但仔细考虑后他还是答了“不后悔”，答话同时他又抬手在虚空中轻抚，终于改换了踏入这院子后就没变过的表情，英俊的脸上现出可叫日月无光的温柔笑意，“现在再说后悔，寸心该恼我了。”<br>
许是因为听到有人叫自己名字，盘在玄衣男子身上的粉龙显了身形。男子侧脸蹭了蹭她搁在他肩头的脑袋，又去抚摸她带花的龙角，轻声细语唤她，“是谁吵着要来跟仙子告别的？”连唤好几声粉龙都没有醒，还不耐地摇摇头，男子眼中闪过一丝慌乱，随即好像想到了什么，便镇定了。他瞧了会儿她懵懂的睡颜，忍不住轻吻了吻她嘴角，心情虽苦，却掩不住底色是幸福。</p> <p>“杨戬谢过仙子。”<br>
“嫦娥祝真君和三公主恩爱，美满。”</p> <hr> <p>敖寸心醒来的时候，靠在杨戬怀里。<br>
“这里是……西海？”<br>
“是西海。”他将她又抱紧了些，下巴靠上她额头，“是我们相遇的地方。”</p> <p>又靠了会儿，终于醒过神儿来的姑娘跳起来离了那人怀抱，“我们不是去跟嫦娥仙子告别的吗？”<br>
“我看你睡得香就没有……”话没说完眼见如花的小脸就要皱起，忙改口，“我错了，都是我的错，夫人就原谅杨戬这一次吧。”又把人再搂回怀里。<br>
两只小粉拳还是不依不饶捶了几下他胸口，无甚力道。</p> <p>又吹了会儿海风，敖寸心转开念头，惆怅起来，埋首在他胸前闷闷问：“还有多久？”<br>
杨戬老实回答：“不知道。”他是肉身成圣，待法力散完还能凭凡胎活上几十年乃至百年，不好估量，龙女借宝珠之力能撑多久就更未有定数了。“反正不管多久我们都会一直在一起，再也不分开了。若杨戬先走，夫人就找地方埋了我，然后在旁边起个茅屋陪着。若是寸心你先走了，我呀，”杨戬卖了个关子。<br>
“你怎样？”龙女心思极浅，立刻接口问下去。<br>
杨戬两手放在敖寸心肩头扶她起身，一双桃花眼直直望进她眼中，直到看得她羞红了脸，直到看到她眼中全被他的身影填满，才满足地喟叹一声，“我怕你不等我，我得马上去追你。”</p> <p>“你赖皮！”<br>
“我只赖你。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/89.短篇-2019/082100.终途.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/fc8e75/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">家人</div></a> <a href="/pages/9a4b94/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">后果</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
