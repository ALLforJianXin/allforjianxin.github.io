8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">Chapter 3 对比分析抱抱合集特别篇（啰嗦）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p><a href="/vid/kajia/chap_3.mp4">此处有视频</a></p> <p>灵感来源于今天第10086次在B站刷杨戬cut，然后本着列文虎克转世的精神又让我发现了一个小细节由于我们寸寸小公主是个扑怀撒娇精，剧里两人实打实的三次抱抱都有异曲同工之妙，所以准备以小见大来康康我们女儿女婿平常的生活习惯（怎么好像很猥琐的样子）</p> <p>第一次扑怀巨巨巨甜哦，想必大家也都很喜欢这一场戏，噔噔噔扑到怀里然后还小拳拳锤老公胸口但是注意看哦杨戬的嘴角是带笑的，对他这种大男人来说，老婆撒娇什么的应该是相当受用。所以哮天犬这个没眼力见的炮灰了，老杨不仅一脸不耐烦地把他挡到一边还顺手把三首蛟塞给他。所以腾出手的老杨做了什么呢？他搭上老婆的胳膊。</p> <p>这里我要说一下，老杨非常喜欢摸摸胳膊揉揉肩膀，不仅是每次抱抱的时候哦（之后会出新的视频总结一下）</p> <p>虽然说两个人新婚之夜闹得不愉快第二天也是没道别就走了，但毕竟封神之战十四年，给了他们足够的时间去反省去思念，所以即使是一大家子都还站在门口呢，小夫妻也要打情骂俏一下。</p> <p>以及为什么我又说寸寸是个撒娇精呢。注意看老杨挡哮天犬的时候胳膊伸出去一下下，寸寸就要抓着他胳膊不给他分心，所以随后老杨也伸手搂着寸寸，这个动作是非常亲密自然的，然后就更亲密自然地撇下了所有人回房，走的时候还撞到了三妹肩膀……</p> <p>第二次扑怀是老杨“恐吓”老婆成功，把我闺女吓得坐在家里哭哭啼啼。这场戏同样很有意思不过这次着重分析动作。首先寸寸扑到怀里老杨很自然地接住，当然这时候已经做了几百年夫妻啦，这种互动习惯成自然。寸寸抓着他袖子，老杨呢也也是把手放在了她肩膀上，并且不是放着不动而是来回摩挲带有安慰之意（不过我在B站上看这一段的时候，有弹幕说这个揉肩膀的小动作很老司机请大家自己体会）</p> <p>前一场戏碍于杨戬的盔甲实在是厚实，所以两个人只有脖子以下的地方的互动（听起来感觉怪怪的）但事实的确是，连猴子变成的杨戬和寸心抱抱的时候，想凑近一点那脖子都得伸得老长。这里就不一样了，两个人靠得很近，寸寸的额头贴在杨戬脸侧。这里我要做出一个假设，那就是两个人平时在抱抱的时候应该也是靠得很近并且脸贴脸很亲密的，具体看下一场戏的分析。</p> <p>然后我们寸又开始了，撒娇。很有趣的一点是，如果真的像那些“杨戬不爱寸心”党所说，这里寸心“得寸进尺”的话应该是会引起杨戬反感的，事实上呢，他很宠溺地笑了一下并没有介意，这里不得不重提第一part的内容，也就是结婚前一天寸寸所说的“我还要做公主”。老杨并没有食言哦，他还是很让着寸心的，但我们也要理解他其实脾气并不是很好，再加上他和寸心待在一起的时候是很放松的，所以偶尔会有点不受控制地发火。</p> <p>第三场戏是很多人的入坑画面啦，西海诀别。这里同时也是剧里出现过的第一次也是唯一一次杨戬主动搂住了寸心。动作很熟练这件事暂且不提，有一个非常微小的细节不知道大家发现没有：寸寸的脸磕在了盔甲领子上，这时候两个人的脸是没有贴在一起的，然后杨戬做了什么呢？</p> <p>他往前低了低头把脸贴上去。</p> <p>这里就论证了我上面所说的，两个人私底下蜜里调油的时候应该是很腻歪的啦，什么抱在一起脸贴脸之类的肯定是基本操作，所以杨戬才会有这么一个习惯性动作。</p> <p>同时又印证了老杨这家伙真的很爱摸老婆胳膊，仔细看这里是怎么搂过来的：左手抓着胳膊，右手按在背上，然后滑呀滑就滑倒了后颈。</p> <p>要么我说杨戬是个大男人呢，这个手部动作其实是带有一定强制性的，就算寸寸这时候不想让他抱，也不太好挣脱。</p> <p>然后镜头拉到了远景，由于这一场打光是在太太太黑了我已经尽力调得亮一点。远景我们可以看到，老杨是一手抓着寸寸的胳膊，一手按在她后颈，那么寸寸呢？她的手搭在老杨腰上。</p> <p>这可就是非常经典的，爱人之间会有的动作了。毕竟大家都知道，腰部是一个很隐私和敏感的部位🤫</p> <p>想必大家都很羡慕寸心能摸上老杨这一尺八纤腰吧不过羡慕也没用哦，这可是她专属的福利。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/97.嗑学/20.糖渣合集/02.chap_3.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%A7%86%E9%A2%91" title="标签">#视频</a><a href="/tags/?tag=%E7%B3%96%E6%B8%A3%E5%90%88%E9%9B%86" title="标签">#糖渣合集</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/e06753/
