颤，昨夜本以为他在外自寻了一个住处，不是华山梅山，就是客栈也尽可使得，却难道他在门口坐了一个晚上吗？</p> <p>龙女连忙凑近他唤了几声：“杨戬，杨戬？”一摸他衣服，已经全然湿透了，冷风吹在他身上，手脚发凉，想是严寒刺骨。敖寸心皱着眉抚上他额头，察觉他正发热，脸颊烧得滚烫不已。</p> <p>他竟生了病！敖寸心虽气他，但心中十分爱他，一见如此，登时将连日的怒火化作怜惜，死命掰着他的肩膀，将人艰难地扶回了房间，又脱下他湿透的衣衫，用温水浸透帕巾，替他将身体擦拭干爽，又使御水神通催凉了汗巾，敷在他滚烫的额头上。</p> <p>三公主瞧着病中的杨戬十分虚弱，眉头皱得紧紧的，面色时而苍白，时而病态的红。想来他昨日本已经服了软，她若放他进来，也就是了，怎害得他回不了家，在门口吹了一夜的凉风。想来当时情境该十分凄凉，杨戬该十分可怜，自己该十分过分。</p> <p>这样一想，敖寸心愈发心疼他。亲手点燃药草熏香，关了门窗，温好暖炉，将屋子里拾掇得干爽舒适，又守在杨戬床头，命人煎了驱寒散热的汤药，一勺勺照顾他饮下。</p> <p>杨戬病中睡得很不踏实，只觉得浑身燥热，头痛欲裂，梦中仿佛回到了十日同天的那个惨淡之时，炎炎的烈火仿佛将他炙烤而亡，最爱的母亲在他眼前被晒死。</p> <p>他的眼角落下泪来，不自觉伸手攥住床边寸心的衣角，轻声道：“娘……娘……”</p> <p>敖寸心连忙凑近他，回握他的大掌，轻揉他卷曲凌乱的头发，俯身吻了吻他的脸颊：“二爷，二爷？”</p> <p>似乎感觉到了回应，杨戬伸手抱住寸心的腰，将脸埋在她怀中，哽咽泣道：“……娘，你别走……”</p> <p>三公主一颗心仿佛都揪在一起，她几乎落下泪，却紧紧咬住牙关忍下，将杨戬抱在怀中，抚摸他的脸，柔声道：“二郎别怕，我不走，我不走。”</p> <p>杨戬梦中又轻唤了几声，敖寸心凑在他耳边柔柔回应，轻揉他的头发，不多时，他仿佛受到了极大的安抚，安静下来，沉沉地睡过去。</p> <p>敖寸心坐在他床边侍奉汤药，到第二日，他已不再发热。清醒时已经是下午，浑身都舒适，但却软绵绵地使不出力气。他懒懒地撑起身靠在床头，正见着敖寸心推门进来。</p> <p>她端了一碗热腾腾的小米粥，见他醒了，嫣然一笑，将之放在小几上，坐在他身边，伸手探他额头的温度。</p> <p>“已好了，二郎要不要吃点东西，我给你熬了一碗粥。”</p> <p>杨戬受宠若惊：“寸心，你不气我了么？”</p> <p>龙女长长地叹了口气，将一勺粥舀到她的嘴边，示意他张嘴吃下去：“不气啦。”又嗔他一眼，笑道：“要是同你这个木桩子生那么多气，我还要不要活着了？”</p> <p>杨戬也是一笑，张嘴吃下那口粥。明明她没有放糖，他却觉得比蜂蜜还要甜。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/080210.霁夜.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%8
