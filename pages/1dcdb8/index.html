x/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">欢喜<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>自打把她从西海龙宫里抢出来，这丫头的眼泪就没停过，回到杨府也是转身跑进房里扶在床头哭个不停。当初因着自己的一点小心思，安排了寸心与他同处在西面一侧厢房，只不过那时候毕竟还是待字闺中的姑娘家，平日里为了避嫌他也不曾进过这间公主闺房。索性明日就要成婚，再说去西海要人的时候便是连那水晶宫里的公主阁也进了，眼下未婚妻子伤心得厉害，杨家二郎哪里顾得了那么多？急急跟在寸心身后进了这间厢房。</p> <p>常言道龙族喜奢靡，这龙公主自从被通缉后跟他住在灌江口，身边自然也没什么值钱物件儿，不过皇族教养出来的女儿也不含糊，将这简朴的屋子拾掇得像模像样，缺少金银器件就拿花花草草摆在各处也颇有番雅致。</p> <p>抓着床边扶手，杨戬犹豫再三还是坐在了寸心身边，轻轻拍着她单薄的脊背温声哄道，“莫哭了，哭肿了眼睛明日可就不漂亮了。”那姑娘猛地转身回头扑进他怀里，将眼泪鼻涕一股脑地蹭在他衣服上，一手抓着他的衣襟一手捏成粉拳捶他，“都怨你！你怎么能和我大哥动手呢！”</p> <p>杨戬环住她微微颤抖的身子，一下一下抚着她脑后的长发，“是，都怨我。”怀中人听他这么轻易就妥协也被唬住了，一时间不知道还要说些什么，拳头松开虚搭在他胸前，赌气似的又往他怀里靠紧了些。</p> <p>“寸心，明日要穿的喜服已经送到家里了，可要去试试？”</p> <p>这话不说还好，一说反倒惹得公主殿下闹起了脾气，“你同我兄长打架还落了我父王的面子，我才不要嫁你！”说罢推开他作势就往门外跑。</p> <p>这还了得？二郎真君一时间也失了分寸心慌意乱上前两步从后面死死禁锢住龙女，“寸心别胡闹！”粉衫少女在他宽厚的怀抱里不安分地扭动两下发现挣脱不开，正要出声却又听得此人埋头在她耳边呢喃，“你若走了，杨戬还能同谁成亲呢？”</p> <p>“你是怕面子挂不住？以你二郎真君的本事就算是去月宫抢那广寒仙子下来成亲也是使得。”话音刚落她便觉得身后人又将自己拥紧了些，坚硬的臂膀箍得她发疼，“杨戬只愿意与心爱之人结为夫妻。”</p> <p>低沉的嗓音一字一句敲在龙女心尖儿上，满腔喜悦快要抑制不住偏偏还要装模作样冷哼一声，“那不是正好去找你的嫦……唔！”寸心瞪大了眼睛看突然出现在面前的杨戬，他此刻微微拧着眉头将她还未说完的话吞进腹中，吸吮唇瓣搅弄舌尖害得公主殿下气息不稳，带她晃了心神才堪堪睁眼退开，临了还在她下唇咬了一口以示惩罚，“还敢乱说嘛？”寸心脸颊微红抿紧了嘴唇摇摇头，顺势又扎进这人怀里，声音闷闷的，“就会欺负我。”</p> <p>杨戬伸手将人揽紧些，下巴抵在姑娘发顶，“往后的日子都叫你欺负回来，好不好？</p></di
