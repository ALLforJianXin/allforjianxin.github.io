0vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">推文By啾酱<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>匆匆草就，浑身疏漏，随时增补，有话评论</p> <hr> <h4 id="推文主题"><a href="#推文主题" class="header-anchor">#</a> 推文主题：</h4> <p>推文为主，也有些太太同时产画和视频；<br>
推文更推人，都是好太太们！戬心CP为主，少量考据分析。<br>
只推戬心CP双箭头（还要大写加粗那种），拒绝怨妇风、改嫁文，拒绝婚内无爱，拒绝追妻火葬场，CP应该相互成就共同成长。</p> <h4 id="推文范围"><a href="#推文范围" class="header-anchor">#</a> 推文范围：</h4> <p>Lofter为主，基本推的太太们都是Lofter和微博双更，其他平台我没去确认。<br>
时间跨度上选取两年内有更新的太太们，但不包含近半年的新姐妹。要说原因的话，戬心CP历史悠久我入坑时间也不长古早文有挺多不合我口味，就集中推两年内还有更新的太太们吧，另外今年似乎因为某些原因有不少新入坑的姐妹，时日尚短了解不深，此次也不作为推荐范围内。</p> <hr> <p>下面正式开始推荐，每组内不分排名先后：</p> <h3 id="第一梯队"><a href="#第一梯队" class="header-anchor">#</a> 第一梯队</h3> <p>——强烈推荐</p> <h4 id="lofter-id-上辈子杀猪"><a href="#lofter-id-上辈子杀猪" class="header-anchor">#</a> Lofter ID： <a href="https://gaara322.lofter.com/" target="_blank" rel="noopener noreferrer">@上辈子杀猪<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></h4> <p>鱼头！鱼老师永远的神！鱼头太太镇圈之宝！<br>
长篇连载<a href="/pages/17c160/">《不老梦》</a>（已完结）、<a href="/pages/cf4250/">《游魂》</a>（暂停中），情节跌宕起伏，一波三折，扣人心弦；<br>
短篇<a href="/pages/b54dfb/">《昨夜西风》</a>（强推但是BE预警）、《洄游记事》、《一心二意》、……还有很多其他短篇不一一列举了；<br>
鱼头太太笔下的小寸可可爱爱老杨郎艳独绝……总之看了绝对不亏！</p> <h4 id="lofter-id-井禾一也"><a href="#lofter-id-井禾一也" class="header-anchor">#</a> Lofter ID：<a href="https://moshangge.lofter.com/" target="_blank" rel="noopener noreferrer"> @井禾一也.<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></h4> <p>文画双修的神仙太太！<br>
太太你要是看得到的话，我就想问一句，啥时候我能买到《九万里》？</p> <h4 id="lofter-id-还是晨晨吧"><a href="#lofter-id-还是晨晨吧" class="header-anchor">#</a> Lofter ID： <a href="https://sanshanfeifengguan.lofter.com/" target="_blank" rel="noopener noreferrer">@还是晨晨吧_<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></h4> <p>我的神仙姐妹，写得好还高产！年轻人身体就是好啊（咳咳）<br>
