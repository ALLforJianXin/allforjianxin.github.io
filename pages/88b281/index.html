eNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">初见<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>杨戬本以为自己醒来之时当要头痛欲裂，狼狈不堪。丁香那一拳本于他而言无关痛痒，奈何他为不露破绽马脚将护身玄功尽数撤回。这下他虽肉身成圣，生受仙丹神力一击大抵也会落得个半死不活。</p> <p>可他稍一动唇角，并没有想象中的干涸枯裂。微凉的水纹抚过他的肌肤，浑身没有一处不爽利。他挣扎了一番，微微睁开眼眸。</p> <p>“你醒啦！”他听见一个清脆婉转的声音在耳边响起，单只闻其声，便能想象出这个小姑娘该是多么地干干净净、甜糯娇憨。</p> <p>眼前一阵迷蒙，他自梦魇中脱身，满心疲惫，入眼的光芒逐渐适应后，他定睛一看，原来身处微凉澄澈的海水之中。</p> <p>身畔一个玲珑美艳的小姑娘，生得冰肌玉骨，粉面桃腮，巧笑嫣然。浑身粉鳞华服，头上簪着一支金步摇，随着她咯咯的笑声摇曳不停，一时间，竟将些许光芒洒进了他的心底。</p> <p>二郎神，他是在晦暗和阴影之中摸爬滚打的人，众叛亲离，一朝皇门之前讨活，如入无底深渊，陪伴他的只不过接二连三的诡计阴谋。他躲在昏暗的烛光下蜷缩在黑暗的影子里，大抵已八百年了。</p> <p>“你……”他喉头居然不干涩，好歹声线还算好听。</p> <p>“你落在我的海滩上，我就把你救回来了。”她笑眯眯地替他垫高身后的软枕，端起小几上温热的药，舀了一勺，徐徐吹凉了，递到杨戬的唇边：“快将药喝了罢。”</p> <p>杨戬已经很久没有品尝过如此受人无微不至照拂的滋味，一时间居然有些无所适从。他平日纵横捭阖的功夫，于这素未谋面的小姑娘跟前，忽然圆滑不起来，便教基本的致谢也尽数忘得个干净。</p> <p>“你是在想和你一起的那个人吗？别担心，我已经遣人照顾他了，他没有什么大碍的。”这厢姑娘一颦一蹙满是揣测他心意的神色，话语间不由有些安抚讨好。杨戬恍然觉出些味儿来，茫然片刻，只喏喏道：“多谢姑娘。”</p> <p>“喂，你为什么不问问我是谁？”红衣红裙的姑娘嗔笑怒骂仿佛皆有一股意气风发在，杨戬心里有些好笑，她叽叽喳喳仿佛一只小雀儿，不甚聒噪只多些可爱在里头。</p> <p>真君将桃花一样的眼角微微弯起，笑道：“好，不知姑娘是何人？”</p> <p>“喏，”小姑娘一指外院。真君这时才觉察出身处一方水晶宫中，各处镶嵌明晃晃的夜明珠，皎洁光滑。帘帐鲛绢，远望亭台楼阁，珊瑚海珍，无一处不文雅，无一处不精致。那姑娘粲然道：“我乃是西海龙宫三公主！”</p> <p>原来她是龙族的公主殿下，杨戬见她眉宇间娇憨自豪神色，不由得暗暗失笑，勉力拱手，轻声道：“原来是公主殿下相救，在下感激不尽。还未请教小殿下芳名？”</p> <p>三公主听他如此问话，直教她想起那些杂文话本中的话语来，不由有些脸红。她忽然扭捏些许，将手里的药碗轻轻放到身边的桌子上，道：“我……我叫敖……寸心……”说罢悄悄去瞄他神色。</p> <p>二郎神是个惯会察言观色的主，如此神色自了然于心，笑道：“唔，小殿下的名字真好听。”</p> <p>有些孟浪了，只言片语逗得龙女面红耳赤，指尖捏紧他的被角，余光瞥见那碗已凉透的药，忙端过来，递到杨戬的手中：“呐，你先喝药吧。”</p> <p>喝药，他身负八九玄功，哪里用得着喝药。</p> <p>杨戬接过药碗一饮而尽。</p> <p>转眼在西海之底已住了三五天。杨戬旁敲侧击晓得，这位龙三公主乃是广顺王敖闰的掌中之宝。昔年西海三太子毁坏御赐宝珠，受了圣裁，困于鹰愁涧中，这个小女儿正是那时所得。敖烈入空门之后，龙王进乎有失子之痛，是以尤为宠爱膝下幺女。</p> <p>三公主年纪幼小，却早得封地。此处非龙王水晶正宫，而是她封地海域所建行宫。是以他落于此处这么多天，只要公主殿下有意隐瞒，自无人敢报予他人知晓。</p> <p>小殿下娇憨可爱，然热情似火。</p> <p>她喜欢他。</p> <p>杨戬瞧得出，每日清淡乏味的药食之中酸酸甜甜的海浆果，正是三公主亲手自外间采回来的。她本盛气凌人，却偏爱对他察言观色，嘘寒问暖，便是只微蹙眼眸，也要感怀很久。</p> <p>可他不是个值得喜欢的人。</p> <p>某日敖寸心亲手切了些颜色殊艳的鲜果予他品评。彼时真君捻起一片浆果，鲜红的汁水染上他的指尖。</p> <p>他看她容色精致的面孔，想要说些尖酸刻薄的话。</p> <p>可他不愿意。</p> <p>他问她：“你知不知道我是谁？”</p> <p>小殿下约莫有些惊讶他主动提及此事，微偏开头，朱唇轻启，笑道：“你不是不大愿意告诉我么？”</p> <p>“二爷，”自从于杨戬嘴里撬出来他家中行二的话，敖寸心便这样叫他，“你便是逃犯也罢，是精怪也罢。只要住在寸心的水晶宫中，没有哪个敢擅动你。”</p> <p>她自信得神采奕奕，他本应冷嘲热讽的。</p> <p>区区西海龙宫。</p> <p>可是他说不出话来。</p> <p>哮天犬倒是很喜欢这位龙女，虽然她身上专属于海族的气息狗狗闻不甚惯，但鲜少有如此体贴入微关心杨戬的人了，狗狗向来以他主人为准。</p> <p>某日公主殿下红着脸送了几件内衫过来，匆匆忙忙离开时，杨戬一手扶在门槛边上目送她走远。</p> <p>哮天犬远远望见三公主羞红脸走开，待走到他主人身畔，念及近日主子温和不少的性子，忍不住摸了摸鼻子问：“主人，你是不是喜欢她？”</p> <p>真君眼底的笑意僵住，张了张嘴，清咳一声。<br>
“胡说，明明是她在喜欢我。”</p> <p>“这谁看不出，”狗子毕竟是在真君神殿当差数百年的狗子，比谁人都晓得看人脸色，“我是说，您也喜欢她啊。”</p> <p>也喜欢她？</p> <p>杨戬茫然了一刻。</p> <p>随手一记折扇已敲落在狗狗头顶：“胡说八道！”</p> <p>杨戬的态度逐渐轻慢起来，他处处倨傲着不肯放下身段，龙女温言软语一句话，他也能自各个清奇的角度反驳回去。她说一句，他能反驳十句。</p> <p>敖寸心可不是一个好相与的主。或许杨戬常年身居高位，敢于直言不讳的人愈来愈少，是以公主殿下直来直去的性子在他眼前发泄之时，真君一时之间不知如何辩驳。</p> <p>三公主摔了给他递过去的碗，气红了眼角。</p> <p>“你凭什么这样说我？杨二郎，你混蛋！”</p> <p>杨戬瞧她嫣红的脸颊，如何看，都是神采奕奕，活泼可爱。便是摔东西，也摔得这样有美感。</p> <p>敖寸心，你怎么这样磨人呢？</p> <p>他猛地起身拉过她的手，将她一把搂在怀里。</p> <p>他真喜欢她，他真的很喜欢，很喜欢她。</p> <p>杨戬走了，是带着他的狗一起走的。</p> <p>狗狗很舍不得三公主，然他并没有机会同她好好儿地道别，因为真君是偷着同他溜走的。</p> <p>真君走前悄悄跑到三公主的窗前去看了她一眼。小殿下粉嫩的肌肤稍微露出被角，娇憨的容颜令他忍不住想要伸手去捏一捏。</p> <p>哮天犬瞧着杨戬悲戚得忍不住流露出来的神色，不由得小声道：“主人，您就这样走了，三公主会恨死您吧？”</p> <p>“就是要她恨我啊，”杨戬苦笑着难得显出无可奈何的神情，“我有什么办法啊？”</p> <p>他没再回去找她，没再打听她的消息。只不过夜深人静的时候，总要翻出自小殿下房间中顺出来的耳环——他向来晓得偷藏耳环是一件十足旖旎的事情，只不过真真对那一个人做时，想不到居然这样旖旎。</p> <p>他将白玉珍珠耳铛贴在心间。</p> <p>“自古英雄难过美人关，我早打定主意要去死了，缘何还要如此折磨我。”</p> <p>情自向来十分磨人，常常于年轻力壮时体验了，倒还有得气力对待。而真君不过年过三千，却觉得自己早已折腾不起了。</p> <p>“尽怪敖寸心生得好看，”杨戬气急了便私下背着她讲坏话，“不然我怎么一颗心全碎在她那儿了。”</p> <p>后来沉香劈山时不幸得知了舅舅忍辱负重的真相，十分之愧疚。</p> <p>杨戬气喘吁吁弥留之际，沉香泪流满面问他还有什么心愿。</p> <p>杨戬道：“倘若舅舅侥幸没死成，你且替我跑一趟西海，告诉西海海底水晶宫里头的三公主，我喜欢她。”</p> <p>沉香道：“可您刚刚才说喜欢我嫦娥姨母。”</p> <p>杨戬还有一点力气敲他的头：“那不是我死了以后的情况嘛！”</p> <p>死了就喜欢嫦娥姨母，没死就喜欢西海三公主？</p> <p>沉香端觉嫦娥姨母好像给他舅舅耍了。</p> <p>再后来，沉香他舅舅果然没死。</p> <p>至西海的拜帖已堆成一座小山包，杨戬没得法子，只好变做一条小红鱼悄悄游进三公主的寝宫中。</p> <p>他当日受伤，小殿下便是将他直接安置在此，守着重伤的杨戬，日夜不眠。</p> <p>“小殿下，可饶我这次罢。”他摩挲着寸心娇憨的睡颜，轻轻捏了一下。</p> <p>他早就想这么做了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/071623.初见.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.
