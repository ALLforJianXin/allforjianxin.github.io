总是看寸回到西海以后如何如何伤心，但是我想寸后期心结一直就在亲人身上，这一回家和家人久别重逢哥哥也快要成佛恢复龙身，她的伤心可能一时间会被治愈一下冲淡一下，反而是杨戬吧，家里那么多人也没个能聊聊自己感情的，而且他看到寸转身离开直接哭成伤心小猫），不忍心看他太可怜安排烈烈来陪陪他，私设三哥去取经是杨戬给安排的为了让他脱困的办法，一路上戬也经常去给他帮忙，而且两个人有一个共同的特点就是都觉得闰子不是个好爹，所以嘛他们俩就成了能聊感情的知心好兄弟(´◊ω◊｀)可以配合《二位什么时候离》食用。</p> <p>“我说，杨戬，”敖烈拧眉陪在旁边手忙脚乱，“你可别再喝了。”</p> <p>杨戬耷拉着脑袋坐在大门口的石阶上，大口大口灌着辛辣的酒液，身边堆满了女儿红。平日里任谁来了也舍不得拿出来喝的佳酿，自一千年前开始攒起，如今拿出不是为品味，只为着牛饮解愁。</p> <p>他又紧皱着眉喝下一大口烈酒，喉咙里烧得难忍，不住咳嗽起来，直咳得呛出眼泪来。咬牙挺过这一阵劲头，川主醉眼朦胧地搭住三太子的肩膀，说话也囫囵不成语调，“三哥，你是好兄弟，只有你是我好兄弟。”忍着火烧火燎的喉咙又闷一口，又是一阵惊天动地的咳嗽，“陪，陪兄弟喝一口，往后，往后虽不是亲戚，也不能……不能生疏了情分……”</p> <p>“你再这样下去，我妹妹也不放心你啊。”敖烈看着泥一样挂在自己身上的杨戬，心中也唏嘘不已，遥想当年他受落鹰愁涧时，受小妖欺辱，杨戬提着长枪从天而降，当初是何等英姿，如今就有多叫人感念，天规害人不浅。</p> <p>“她还会不放心我么？”提到三公主，杨戬立刻低落下来，“她……她怎么样了？还哭么？她还难过么？”</p> <p>敖烈终于找到机会宽慰他，连忙拍一拍他的肩膀，“妹妹一切都好，回到家里去有我母后、大嫂和大哥二哥照顾她呢，我那个爹虽是个没担当的，但到底不会做出苛责女儿之事，你放心吧。”</p> <p>杨戬听了这话，愣愣地呆了半晌，忽然拎起酒壶，咕咚咕咚将剩下的大半壶尽数喝了。他平日里不惯饮烈酒，这酒辣得他喉管发烫，他咬牙忍下了，难受得捂住双眼。敖烈哎了半晌，到底拦不住，只得任他灌，叹了一声：“好也不是，不好也不是，你怎生学得了敖寸心的几分刁蛮。”</p> <p>杨戬已有些掌不住情绪，默了半晌，声音嘶哑得几乎听不真切，“敖烈，你即将功成，做了菩萨，还回家不回？”</p> <p>“回吧，当初还劳你转圜才得以脱困，只是为着自由身做和尚，到底不是因看破红尘，我老爹是讨厌，但我母后和我哥我妹我还是舍不下的。”</p> <p>杨戬深深地泄了一口气，神色灰败地望着前路。家门口的桅杆上绑着一只马灯，昏黄色的灯光照亮了一方小天地，以往他狩猎而归时，敖寸心偶或在这里等他，替他牵了银合马，打去一身的雨露，挽着他的胳膊一齐回家。</p> <p>“敖烈……没了我，她该高兴是不是？她一直想回家的，一直挂念你们。可是，可是以后你替我照顾她，她不高兴了你要给我说，她要是高兴的话，就别告诉我了……”堂堂九尺男儿嗑着三太子的肩膀哽咽说出此番肺腑之言，纵然是龙女的亲哥哥，此时也不禁要偏旁一回兄弟，怎生妹子就给人伤成这样？</p> <p>杨戬还絮絮叨叨的说着胡话，很多已经不能听，酒坛子滚在脚边，偏生让他瞧见了，歪着身子要去扶，喃喃说着什么：“坏了，让寸心闻见……可要生气……”</p> <p>敖烈心里头还是一酸，忙攥了他的手，将人抗扶在肩上，“别折腾了，别折腾。我扶你进去，哎……杨戬……”</p> <p>他挣扎着不依，偏去捡散落一地的酒罐子，胡说着“寸心”，“生气”，“不理我”，断断续续，不成语句，只是敖烈听懂了，心里头更不是滋味，手上一松劲，大力推了一把他捡起来的酒罐子，“我妹妹走了，回家去了！她不会和你生气的！”</p> <p>酒坛咣当一声摔在地上，清脆的四分五裂。杨戬砰的一声靠在门柱上，呆呆地愣了好一会，忽然抱着敖烈嚎啕大哭。</p> <p>夜深了，敖烈和他大战三百回合之后，总算将醉鬼扛回了卧室，刚刚安分下来一点，没成想给他瞧见了龙女遗留在床头的绸衣，又是抱着绸衣好一顿哭。敖烈在一旁劝也不是，骂也不是，好兄弟失恋，失恋对象还是自家妹妹，手心手背都是肉，天杀的天规你真的应该赔偿精神损失费给我。</p> <hr> <p>西海</p> <p>摩昂： “……难以想象”</p> <p>龙后： “要么……给孩子招来做驸马吧？”</p> <p>二哥：“哈哈哈哈哈哈哈哈——”</p> <p>敖寸心：“ (*꒦ິ⌓꒦ີ)”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/ma
