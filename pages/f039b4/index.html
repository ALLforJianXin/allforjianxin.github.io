XY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">真君大人想复婚（下）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>真君大人两千多年的生命里情史干净得可怜，几乎是一眼望去就能看到头。<br>
漫长的神生让他看遍了许多的悲欢离合，但没有一项教会他如何让和离的前妻答应复婚。<br>
当他委婉地和三妹开口道“我有个朋友……”时，杨婵微微亮起的眼神让他一度说不出口。<br>
但鉴于杨婵曾经提议的送花很有效，他还是硬着头皮说了下去。<br>
“我有个朋友……他有个心爱的女子，但是因为一些事情，他们分开了。那个朋友托我问问，他该怎么做才能让那女子同他复……咳咳，复合”<br>
“过几日就是凡间的上元节了，这一日凡间燃灯舞龙，热闹非凡，二哥你……的朋友可以带那女子去逛灯会，也许气氛烘托下，复合的事就成了。”<br>
“我先代我那个朋友谢谢三妹了。”<br>
“不客气，希望二哥的朋友能带来好消息。”<br>
在杨婵揶揄的目光下，真君大人几乎是落荒而逃。</p> <p>这就是真君大人今日来龙宫的始末了。<br>
“咳咳，听说今日是凡间的元宵节”<br>
许久没有出过西海的三公主眼前一亮。<br>
“这几年人间繁荣，元宵灯会中不乏精美绝伦的彩灯，有形如美人面，有形如龙虎各式灯笼，做工精湛栩栩如生。”<br>
三公主眼中出现了憧憬。<br>
“可惜你不能出海”<br>
三公主希望破灭。<br>
热闹的人间、漂亮的花灯……<br>
“其实……要是我出去一下很快回来的话，应该……没关系吧？”三公主吞吞吐吐道。<br>
“若只是出去一个晚上，想必不会有人发现的”真君大人放柔了嗓音，多少带着蛊惑的意味。<br>
“一个晚上就回来？”<br>
“一个晚上就回来。”<br>
“那我们快走吧，晚了就赶不上了！”<br>
三公主喜笑颜开，拉着杨戬就往外跑。</p> <p>人间的上元节灯火将天空照得如同白昼。新年的余温还没过去，门前崭新的对联和红灯笼、窗户上贴的剪纸都烘托着过节的气氛。街道上来来往往的人群如同无数条河流，在某处分散，而后在另一个地方汇合。<br>
人们扛着竹子扎成的龙灯游街串巷，天空中飘荡着星星点点的孔明灯，如同闪烁的繁星，又如同飘飞的萤火。<br>
此起彼伏的鞭炮声和欢笑声响彻街头巷尾，人们笑着，闹着，那声浪飞过了墙，飞到另一家，仍是一派欢乐。<br>
一团耀眼的光团扶摇直上，到了几十米的高空后倏然炸裂开来，碎成千万点星火。<br>
接二连三的光团从地面升起，将夜幕汇成了光的海洋，在一瞬的绽放后洒向人间。</p> <p>多美的人间啊。</p> <p>杨戬和寸心就随着这烟花的爆炸声走进这满载烟火的尘世，融入了绵延不断的人流，成为这河流里的一滴水。</p> <p>“寸心，你看，那里有龙灯。”杨戬用折扇指向前头游行的队伍。<br>
密集的人墙挡住了寸心的视线，她试图踮起脚“哪呢？我看不到，人太多啦！”<br>
“杨戬杨戬！我看不着！”<br>
杨戬被她踮着脚左右探看的动作逗乐了，弯下身子搂住腰将三公主举起。<br>
“现在看着了吗”<br>
“看到啦！那条龙没有我好看！”<br>
杨戬失笑“是，小殿下是龙族里最好看的，没有龙比得过你。”<br>
“诶！那里有卖糖画的！”<br>
“去看看”杨戬将她放下，护着她走向糖画摊。<br>
糖画摊前已经聚集了一群小孩，都在翘首以盼地等待着轮到自己。<br>
排了半天，总算排到寸心了，糖画摊旁有一个转盘，上面画着十二生肖，转到哪一个就做对应的动物。<br>
寸心嘴里念着“父王保佑”，往手里重重地哈了两口气，然后猛的一转，便目不转睛地盯着转盘。<br>
杨戬看的好笑，袖中的手聚起一点法术，转盘便缓缓地停在了龙的位置。<br>
“我转到了！！是龙！”三公主高兴得快要蹦起来，一头撞进杨戬怀里。<br>
“呀！你没事吧，疼不疼？”<br>
杨戬本想说自己还没有那么脆弱，看到她关心的眼神顿了一顿，微皱着眉咳了两声“疼”<br>
在得到了三公主的吹吹以后，哪怕觉得自己太过幼稚，也忍不住笑了。<br>
拿到了糖画之后，两人又沿着人流逛着，沿途的叫卖声不绝于耳，遇到有趣的摊子就停下看看，在套圈摊套了三个泥偶，和一堆各色各样的小玩意，在投壶摊赢了一个花灯，因为东西太多拿不下就都分给了路过的小孩子，看着他们欢呼着接过，两人相视一笑。<br>
街市上还有汤圆摊、阳春面和各式糕点，寸心每一样都买了些，多亏两人不是真正的凡人，才能将各式食物一一品尝，不怕因食量小而错过美食。<br>
“杨戬，你吃不吃……杨戬？”寸心一回头，却找不到杨戬的身影，川行不息的人流遮挡了她的视线，一时站在原地竟不知该往哪个方向走。<br>
怔愣间，一束花挡住了视线。<br>
寸心下意识后退一步，视线上移，是杨戬带着笑的脸。<br>
她不由得心一软，眼里便带上笑意“你啊……这么多年了还是只会送花”<br>
“那你喜欢什么”杨戬心下发虚，于哄人这道，他确实无甚经验。<br>
“自己想去”寸心嘴上虽然嫌弃，却一把揽过花束，抱在怀里，拨弄着花瓣，是一眼就能看到的欢喜。<br>
见她这样，杨戬多少安心几分，看她低头的笑颜，恍然顿悟：这岂不就是天时地利人和的时机？<br>
“寸心”他低着声音唤。<br>
“嗯？”敖寸心抬头，便撞进杨戬的眼波里。</p> <p>“从前我们年少气盛，不懂夫妻相处之道，以至于竟错过了这许多年岁。”<br>
“自和离之后，我上天去当司法天神，有时想起在一起的时日，我不明白，怎么我们之间，会落得这样一个结果。”<br>
“和离以后，所有人都说我们当初在一起是错的。”<br>
“可我不明白，我们明明喜欢彼此，怎么会是错的呢？我们之间是爱，还是欲？”<br>
“我要谢谢你，寸心。”<br>
“直到你上天顶罪那一天，我方才醒悟，爱和欲是本就是共生的。”<br>
“由爱故生忧，由爱故生怖。我爱你，所以能为了你刀指玉帝，却也期望有些话我不必说出口，你就能理解我，无条件地支持我。你也爱我，所以愿为我顶罪受罚，同时也希望我的心里只有你一个。”<br>
“爱是付出，也是索取。”<br>
“如今我看过了三妹的爱，看过了八公主的爱，也看过了沉香和小玉的爱。”<br>
“我知道该怎么去爱了。寸心，你还愿意相信我吗？”<br>
“这一次，我不会再放开你的手了。”<br>
寸心眼睫轻颤，眼里弥漫着水雾。<br>
眼前的杨戬低着头望她，朝她伸出的手就在她面前。<br>
只要向前一步，就可以抓住。</p> <p>她退后半步。<br>
然后往前冲进了他的怀里。<br>

“我父王肯定气死了”<br>
“这次我会礼数周全地去西海提亲的”<br>
“要不你来提亲的时候多带几个人，我父王考虑到武力差距可能就答应你了……”</p> <p>（西海龙王：？）</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/40.40.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/37510a/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">真君大人想复婚（上）</div></a> <a href="/pages/fa82d6/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">余生之年，人人皆知我爱你</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
