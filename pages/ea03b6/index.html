XY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">风月有愧（1）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>死后第一年，都是放不下亲人的，虽不记得生前事，但还是出于本能地徘徊在坟前。</p> <p>一只鬼静悄悄地看着行人来去熙攘，等一季春，又一季秋，等那张熟悉又陌生的脸为他端来几盘供品，往土里插上一炷香，照例冲墓碑喊一句，喊他的魂。</p> <p>……</p> <p>碑上朗朗刻道：杨公二子杨戬。</p> <p>……</p> <p>“二哥，住在山上还习惯吗，三妹来看你了……”</p> <p>这话杨戬听的都快起茧子了，他可不承认自己有这样笨的妹妹，来这里除了哭就是自说自话，偷偷把香火吹灭了她也不察觉，蠢得像只猪。</p> <p>山上实在太无聊了，虽说旁边还有三个坟包立着，可到底是空的，里面的鬼是去投胎了还是灰飞烟灭了，谁知道呢。</p> <p>唯一的乐趣就是捉弄眼前这个傻妹妹，吹灭她的香，打翻她的果盘子，有时她回去的晚，就突然鬼叫几声吓唬她。</p> <p>有次她儿子跟来，很生气地对着坟包大骂，说他为老不尊，扬言要找西海那谁谁，入梦去收拾这个老舅舅。</p> <p>……</p> <p>那以后，大外甥很少让傻妹妹来看他，坟山日子寒苦，他连个能说话的人都没有。</p> <p>世间之大，天长日久，经过几番栉风沐雨，他凡尘碧落，洗尽前身，魂魄变得愈来愈轻，已然忘记从前常常来看他的那些人的面孔，也忘记碑上所刻是谁名，最后落得无情无义，无悲无喜，无心无我，三魂七魄逐个消散。</p> <p>听闻人死为鬼，妖死为魅，神仙若死了，就该应六道轮回，化作劫灰。他心态很好，很想的开，便从土里爬出来横仰八叉地躺在地上晒太阳，等着将自个晒成水蒸气。</p> <p>只是偏偏有人要他死后不安生，于某年某月某一天，刨了他的棺材。</p> <p>……</p> <p>那是个红裙龙冠的姑娘，她发了疯地把坟挖开，掀了烂成片的棺材板。当她看到那只天眼，由此物联想其主人生前，才敢置信，那尊曾守护三界，心怀九万里山河，待她如这芸芸众生的神祇，真的就此陨落。</p> <p>如果三妹哭起来是梨花带雨天见可怜，那这位就得是山崩海啸石破惊天，杨戬对比推测着，暂且称呼她为疯婆子。</p> <p>而他只看了疯婆子一眼，见她抱起天眼双手剧颤，撕破喉头通红着双眼，洒下几滴血泪……是她在哭。</p> <p>一瞬间他心中有大雪崩落，万家灯火辩不出颜色，且失且忘生前事，却震撼于她那一刻的九转断肠。</p> <p>杨戬觉得，自己应该认识她，记住她，永远深藏于心底才对。可是他是鬼，从来不懂人的情感，从来只是两眼空空，心底空无一物。他体会不出她当时是多么伤心，对她说的话也一点不感兴趣，正如他七魄尽销三魂飘零浑不在意。他甚至已没必要再留在坟山，索性一路漫无目的地四处飘荡，成了孤魂野鬼。</p> <p><br><br><br></p> <p>听圣人说，他生前彪炳千秋，普渡苍生造福三界，最后却落得个被斧子劈死的下场。</p> <p>圣人怜他晚景凄凉，教他转机之法。收服一百零一只罪大恶极的妖精凶兽造福百姓修炼正义玄心，于满月极阴时以自身浩然正气调和天地之灵，阴阳两仪借助媒介相会相融，其力量无穷，或可摒弃肉身，魂魄升仙。</p> <p>只是他魂魄不全，即便能当回神仙，也必定是个五感尽废，清心寡欲的神仙了。</p> <p><br><br><br></p> <p>百年后，江湖出了一位有名的羽流方士。传闻他头戴斗笠，一袭素衫，似是丛林夜魂，烟尘魅影来去无踪……因为，压根就没有活人见过他。</p> <p>而疯婆子是个例外。</p> <p>翻开大禹本纪洪荒列传，他照着古籍话本里有名有姓的妖怪杀了个遍，快够数的时候，又遇见她。</p> <p>鬼自然有些怕太阳，杨戬紧扶住帽檐，远远见一红衣倩影坐于湖畔戏水。日头倒映着水面波光粼粼，女子衣不蔽体，笑声如银铃，赤足在水里搅涌出浪花，轻纱里若隐若现透出纤细曼妙的脚踝，在这般荒无人烟景色凄凄之下，只是背影都风情万种，与湖水绸缠着暧昧不清。此种放浪妩媚，一看便知非仙即妖，实算不上良家女。</p> <p>深山雾浓，看的并不太真切，以百年道行捉妖师的经验之谈，也该是现抓活的，再来问罪其它。</p> <p>杨戬一个流云微步不费脚力，转眼之功便迂回到倩女身侧，抬手欲锁她后颈妄图一招致胜，岂料她身如无骨柔韧若水蛇，一扭腰躲过袭击，朝他回眸巧笑，美目烟波流转，额上一对龙角在阳光下闪动星芒。</p> <p>杨戬一爪扑了空，指尖勾落了她的披肩，还没来得及互相打个照面，倒先捱住她冰肌玉骨，触感细嫩柔荑。轻衫剥落，裸出衣下背上好一对蝴蝶骨，香肩单薄自是美人生来瘦。她一回首，一侧身，领下锁骨凸痕尤显，更衬半遮酥胸轮廓浑圆，场面香艳。</p> <p>果然是她，百年里与他纠缠不休，不是阻挠他除妖，就是破坏他修行。本算不上什么有害的妖精，却惯会装腔作势，自诩杀生无数无恶不作，面首三千，号称西海雨师妾。</p> <p>其他不能断定，好男色这点或许是真。毕竟她次次出场都极有排面，上回来捣乱，便是左右各携一翩翩风度的檀奴为其鼓瑟吹笙撑场子，其情其景便如眼下这般不堪入目。</p> <p>龙女故作惊吓，杏眼一瞪怪他颇有冒犯，娇声嗔呵间夺回衣裳。</p> <p>“臭道士，毛手毛脚的。”</p> <p>杨戬六根尽断，捉妖是为修行不得已为之，必然对她搔首弄姿无感，甚至一看见这张脸就不胜其烦，懒得与她说道。他习惯性再次扶了扶斗笠，转身就走，龙女怎肯放他，例如从前她熟悉的那样，紧跟在身后，嘴碎子絮絮叨叨地在他耳边念经似的。</p> <p>“冤家，你真不记得我了？”</p> <p>“你怎么死的？谁害的你？我找他拼命去！”</p> <p>“喂！小冤家，你倒是理我一理呀……你在忙什么？抓妖怪？咦，我看你乾坤袋里装的都是些什么臭烘烘的丑八怪，脏死了！不如你将我带回家啊……”</p> <p>她追过来。一路笑呵呵的，言辞轻浮不正经，除了墓前第一次的那般撕心裂肺，他再也没见过她哭。</p> <p>本来灵魂是不能被看见的，却不知为何能与她命运纠葛百年，眼看龙王之女如今沦落到志怪录上一只小妖，在他眼皮子底下兴风作浪。就像现在这样，婀娜身段钻入怀，一对雪峰如白兔，贴着他胸膛乱颤一气。</p> <p>杨戬烦得太阳穴突突直跳，好不容易将环在腰上的龙尾扯了下来。他拔出腰间长剑，白刃刎住龙女的脖子，冷漠地警告。“离我远点，”</p> <p>不是第一次。</p> <p>不是第一次倒戈相向，不是第一次体验兵器穿过心口的冰凉……</p> <p>龙女很喜欢直勾勾盯住杨戬冷若冰霜的眼睛，她管他眼里的不耐烦和憎恶，叫动嗔。</p> <p>有时她纠缠太过，杨戬会真的杀了她。她竟然很期待这件事，情不自禁往他的兵器上靠，期待剑锋割破她的喉咙，血流如注，疼痛之余面露几分凄楚，语气里皆是痴绝之怨。</p> <p>“你为什么这样对我……”</p> <p>……</p> <p>她不做公主很久了，也许堕仙成妖，也许是心魔从主体里分离出来有了自己的意志，不知道是什么。总之她是杀不死的，梦魇一样时时围绕在杨戬的周围，他走到哪里她便跟到哪里，其实就是在等着能一次次死在他手上。</p> <p>诸多荒唐事，无非是在试图让一个散了七情的人，为她动情。</p> <p>这是第五十七次，第五十七次看着她从自己面前倒下，像是提线木偶断了悬丝，软绵绵地躺在地上，一点点化成青烟，再重新组合。</p> <p>……似乎有什么不对。</p> <p>听圣人说，他从前寄生的身体死状委实不算好看，胸口处被抠出一个拳头大的窟窿，深的可以透光。他没了心，丢了前世的记忆，也记不住所在乎之人的脸。无根无觉天残地缺，即使活过来，也是一具没有感情的行尸走肉。</p> <p>可是眼睁睁看那个女人在自己手里变得面目全非，如枯木一样了断生机，他竟然会觉得难过，是一种腹膛空空，看不到希望的失却之痛。</p> <p>龙女再次恢复原形，日光轻柔，微风抚慰过她光洁无暇的肩。她这回很较真，没有因为杨戬稍微有些情绪波动就媚笑着潇潇离去，而是坐在湖水边，更加楚楚可怜地仰望着杨戬堪堪指过来的剑，眼里似汪了秋水，一片氤氲迷醉，款款深情。</p> <p>她突然跪下来，身体渐渐朝锋芒凑近，然后张嘴，不知廉耻地用舌尖舔舐刃上还未干涸的星点血光。</p> <p>杨戬瞳孔幽颤，震惊于她的胆大妄为，毕竟在过去他捉的一百只妖精里，或丑或美，或凶悍狰狞，或擅蛊惑人心，却从没有哪个像她这么找死的，使出浑身解数，顶着被打回原形的风险，赤裸裸向他求欢。</p> <p>……</p> <p>剑器坚韧，一头被她叼在嘴里，龙涎润湿，腥红小舌过分敏锐，自锋利处一寸寸灵巧躲过。剑身被舔得发亮，妖女不知有过多少情场阅历，与多少情郎仙君梦中拜会，给予她以好生技艺，侧吹笛子复弄萧，这般的游刃有余。</p> <p>那红唇一闭，含着尖嘬了嘬，舌头曲卷着在剑背抹圈打转，一路吸吮到剑柄上方，咬住，然后冲握剑的手煽了口热气，抬起脸颊，睁了睁她那一双摄人心魄的眸子，冲杨戬妖冶一笑。</p> <p>一切都似曾相识。</p> <p>便是她唇边热风，刮得人手痒难耐。杨戬脑海里闪过几许奇怪的画面，仿佛是生前的记忆。那时他还不算太冷血，会哭会笑，时而也会欲火焚身，有一个女子会为他做像这样亲密的事。卧室……屏风……同鸳帐……床榻上慵懒横卧，晨起时，她甚至会答应他一些过分的要求，帮忙含下去。</p> <p>可她是谁？</p> <p>自己又是谁？</p> <p>……</p> <p>杨戬有些恍惚，心防一破，手中兵刃也拿不稳，剑器掉在水边卵石上哐当一声响。</p> <p>他乱了。</p> <p>“妖女，你到底想怎么样？！”</p> <p>“我只想……和道士哥哥，共享一夜春情。”</p> <hr> <p><a href="https://suzhouxue366.lofter.com/" target="_blank" rel="noopener noreferrer">——未完待续……<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/22.22.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/07/04, 00:41:28</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/709988/" class="page-nav-centre page
