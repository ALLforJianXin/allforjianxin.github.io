中投出一道虚影，俨然是神祇救世的动态景象。</p> <p>“好了，有什么问题吗？”神父伸手掠去空中的影像，顺带将欠身起来看热闹的魔女按回床上。</p> <p>嘁，小气，敖寸心撇了撇嘴，侧身面向他，一只手在被褥底下悄悄摸近他的大腿，口中掩护道，“这个故事，好像跟我听过的版本不太一样。”</p> <p>隔着鹅绒被按住她靠近的手，主教漫不经心地反问，“哦？你听过什么版本？”</p> <p>“我听过……”抽了抽，挣不开，魔女咬牙切齿，“我听说，光明神就是个刚从大陆上去的末等从神，因为受不了鸡头凤尾的落差在神域大搞阴谋，可惜实力不济差点坑了自己，靠着吸食信徒的血肉和灵魂才能苟活，就这还想发展传销下线。”</p> <p>咳，杨戬呛了声，镇定道，“那是邪恶异教徒曲解谕典的阴谋。”</p> <p>“噢，”好吧，邪恶异教徒趁他分神抽出手来，两只小手扒上被衾，眨动她晶亮的大眼睛，“这是我父王说的啦，不过，我当然更相信二郎啦。”</p> <p>又在随便说这种话！杨戬对上了她真诚的目光，在三面床幔厚重的遮围下，昏暗的空间里，魅魔眼中浮动的十字闪烁着妖异的猩红，可她的眼眸又是如此纯粹，就像银色的熔岩，让他想起切斯顿河下游的森林，他在那里见过水泽精灵的村庄，每年月桂节后的第一个星期日，他们会聚集在河中沐浴嬉游，举行自古以来的求偶仪式——后来，后来祭司溯游而上，他用圣廷叛徒的鲜血，浸透了精灵的母亲河。</p> <p>所以说，她什么也不明白，杨戬抿起双唇，忽然道，“不要对别人说起这个。”</p> <p>“那当然，”教廷声威煊赫，她虽然直率，也并非不谙世事至此，魔女略感不解，却还是乖巧应声，“我只告诉你一个。”</p> <p>这是属于他们两人的秘密，这个甜蜜的认知让她自顾偷笑起来，全然没有对上频道的主教有些气闷，沉声道，“还有吗？”</p> <p>“嗯……那圣餐真的是神明的血肉吗？”</p> <p>“当然不是，”魔女尖尖的耳朵立刻失望地耷拉下来，神父慢条斯理补充道，“不过，司祭在祝祷中通常会赋予祝福和疗愈，这在平常可是教廷明码标价的服务，据说还有增强光属性亲和力，甚至发掘天赋的功效。”所以，艾德里安举行的圣餐礼虽说对外开放，真正能够进入主教神殿的，往往也是附近城邦的豪族，这是教会与世俗间心照不宣的利益交换。</p> <p>“哇，”那还挺厉害的嘛，“如果我吃了会怎么样？”</p> <p>神父短暂地沉默了，“也许……会消化不良？”</p> <p>“好吧，我能去参加吗？”</p> <p>那当然是，“不行，”主教立刻露出凶恶的神情，斩钉截铁地拒绝，“想都别想！”</p> <p>“你…不去就不去，凶什么嘛？”魔女撅起嘴，伸手飞快拧了他一下，缩回来，卷着被褥向里蠕动，拍拍空出的床垫，吩咐道，“坐过来，靠近点！”</p> <p>神父的目光落在那处床单上，没有动作，魔女不耐烦龇出尖牙，催促道，“快点，上来！”</p> <p>也不知是否被她的气势所慑，杨戬将书本放回床头柜，依言默默坐上床，寸心遂满意了，抖开被子分给他盖上，挪蹭过去，搂住男人劲瘦的腰肢，埋首深吸一口，又捏了捏手下饱满的肌肉，触感很好，她还没来得及发表评价，作乱的小手就被大掌紧紧钳住，只听见头顶压抑的话音，“别乱摸。”接着露出被面的后脑勺被他另一手包入掌心，粗糙揉搓几下，弄乱了头发，“好了，快睡觉。”</p> <p>“唔唔……”脑袋给他往下摁了摁，魔女挣扎躲开，仰起脸来钻出被窝，小巧下颌尖支在他腰侧，另一只手也不顾警告，沿着腰线抚摸上来，停在中途，指尖绕着肚脐眼轻轻打圈。</p> <p>嘶，男人呼吸一滞，空余的那只手停在半空，顿了一会儿，才缓缓搭上她裸露的肩头，似乎还没有决心推拒或靠近，只静静听她埋怨，“才不要，我一睡着你就走了，还骗我说是早上才走的，之前…睡你房间的时候，也没见你天天这么勤快，骗子，就会欺负我！”说着重重戳了一记肚脐以示愤怒。</p> <p>原来她都知道，杨戬有些无奈，原本将自己对面的卧室安排给她，为免她遇到危险，还费了好大的劲在里里外外刻满法阵，结果说什么也不肯住去，每晚照旧往他床上钻，起初分开被衾各睡一边，他也就忍了，近来好几个早晨，一醒来就发觉夜间不知为何同她搂到了一起去，实在不能坐视不理，又没法采取强硬手段，只好哄着人睡了，自个儿再悄悄出去，他自认已将身段放得极低，这也不行！——捉开她的手，主教欠身起来取过谕典，翻到目录，“不想睡？那就再读一段。”</p> <p>“不要嘛，”不满他无视的态度，魔女“啪”拍上书页，挡住他的视线，“这个好无聊的……”她歪了歪脑袋，忽然露出甜蜜的笑容，攀着他的胳膊往上挪了挪，“二郎讲讲自己的故事吧。”说着把脸靠到胸前，作出洗耳恭听的样子。</p> <p>“讲什么？”杨戬扯动嘴唇，拉出嘲讽的假笑，“想知道我从辰星塔毕业的时候，通过了哪项考核吗？”</p> <p>姑娘毫无所觉危险临近，愣愣听他曼声道，“到深渊外围的迷瘴森林，任意消灭一个低阶恶魔的部落，这太容易了，他们给了三个月的时间，所以我干脆屠了三个。”</p> <p>好可怕！魔女果然颤抖一下，却没有如他所料急忙逃走，反倒突然将他抱紧，扑进男人健硕的胸膛寻求庇护。</p> <p>这家伙是傻子吗？杨戬怔忡好一会儿，才慢慢伸手环住她颤动的肩背，笨拙抚摸，轻声安慰道，“…别怕，我…是我不好，刚刚、刚是骗你的，他们又不付佣金，凭什么让杨戬白白干活？”</p> <p>王女从鼻腔软软哼哼一声，抬起一张通红小脸，卷翘浓密的长睫犹挂泪珠，满眼控诉，恨声道，“骗子！”双腿蹬床猛窜，扯开睡袍领口，抓住手臂对着肩膀用力一咬。</p> <p>好狠，神父没能忍住闷哼出声，魔女吮吸的力道便放轻了，伸出软嫩舌尖沾湿伤口，勾动外溢血珠吞食入腹，连周围细细的血丝都舔舐干净，口腔中清甜的热气喷洒在伤处，比起疼痛，倒是细微的痒意更使人折磨，手掌就从肩背移至脑后，却仍迟疑着，不知打算阻止还是鼓励。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《西幻pa》/221111.Bedtime Story.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%96" title="标签">#人外</a><a href="/tags/?tag=paro" title="标签">#paro</a><a href="/tags/?tag=AU" title="标签">#AU</a><a href="/tags/?tag=%E8%A5%BF%E5%B9%BB" title="标签">#西幻</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/d60b91/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">Candy Cat</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
