下他又干了甚？</p> <p>杨戬低下头来。天色已晚，池水波光粼粼印照在他脸上，朦胧着看不清喜悲。</p> <p>须臾郎君长长叹了口气，转身进了厨房。他施展拳脚，做了清淡的小食，码至餐盘，放上碗筷，端着去了后院。</p> <p>还未及门扉处，耳聪目明的郎君便听闻屋里一阵女子啜泣，配着那人软糯的鼻音，在这宁静夜里格外惹人心疼。</p> <p>杨戬心中悔意更甚，急急行了两步，来到门前抬起手要去敲，又沉吟片刻。许久才稍稍鼓气，带着自己满腔的柔情，轻扣那门扉：“寸心，可饿了罢？我给你做了些饭食。”</p> <p>郎君全神贯注听着里头的动静。那人哭声停了一刻，却不想理他，吸了吸鼻子继续哭。</p> <p>“我进来啦？”他推开房门，拨开重重的帘帐。那个娇弱的姑娘身着鎏纹朱红长裙端坐在榻边，珠钗卸下，如墨的长发泼在她纤细削弱的脊背上，更显她楚楚可怜。</p> <p>郎君一颗心，便是如何坚硬如铁，此刻也尽数化作一腔春水。他前行几步将餐盘放在桌上，端起清粥，舀了一勺递到女子面前，温柔开口：“吃一些罢。”</p> <p>龙女不答，带着鼻音重重地“哼”了一声，使劲扭过头去。</p> <p>郎君叹口气，放下手里的粥食，又挨近她坐下，胳膊环过去，不顾姑娘的挣扎将她轻轻搂在怀里，大手捉住了她一双柔荑，温柔却霸道地放在手心握着。</p> <p>“你不饿么？好歹喝些水呀。”她低着头还在推拒，郎君开口。搁在她肩膀的那只手轻轻拍着，合着她委屈的啜泣，温柔地安抚。</p> <p>敖寸心叫这狠心人气着，本来兀自已经哭过，可他现下这番示弱安慰，不知怎的却委屈更甚。本来干涸的眼泪不要钱地刷刷落下，拼命挣扎着不要他抱。</p> <p>“好了，好了。”原意是要哄好她，可是怎么越哭越凶了呢？敖寸心在他怀里哭得颤颤巍巍，叫这铁血郎君心都碎了。他手忙脚乱，不知又是哪里惹了她，也不知要怎样才能安慰她。</p> <p>也不知心慌了多久，待杨戬察觉她渐渐平静下来，龙女已有半数身子靠在他胸前。他小心翼翼，唯恐坏了这来之不易的不抗拒，握着她微凉的小手轻轻抚摸，道：“吃点东西吧？”</p> <p>龙女也不答话。杨戬以为她不肯理睬自己，心中叹了口气，还要再劝，却感到她微乎其微地摇了摇头。</p> <p>“气饱了，不饿。”她以为自己语气生硬，哪里知道带上浓浓鼻音，听在杨戬耳中软糯至极。他心中一动，忙道：“不吃便不吃，没事，没事。”</p> <p>敖寸心半靠在他胸膛，这人讲话的时候胸腔微微震动，传到她耳中，只叫她暗笑：“这傻子忒不会说话。”心中委屈生气也散了大半。</p> <p>两个人相拥抱了一会儿，待感觉怀里姑娘哭泣声止，杨戬小心地抬起她的小脸去擦拭她满脸的泪水。寸心的眼睛那般红，脸颊那般润，只叫他又爱又怜。</p> <p>三公主也不抗拒，待他擦尽，忽觉他要起身，连忙拽住他的衣角，别扭着开口问道：“去哪儿？”</p> <p>杨戬诚惶诚恐地忐忑心思小心回答：“去收拾一下饭桌。”省得你明天瞧见了生气。</p> <p>三公主低着头将他轻轻拽回来，打开他的手又靠回去，抱住了他的腰，在那人有序的心跳声里小声开口：“留着明日我收罢。”</p> <p>杨戬慢慢弯起嘴角回抱住她：“嗯。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/092519.为时不晚.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22
