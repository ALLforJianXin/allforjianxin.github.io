这天寸心刚由侍女侍候着梳妆完毕，镜前的妆奁还没合上，就听得连声使了内力的呼喊。<br>
“哎呀怎么就来了！”<br>
躲得过初一躲不过十五，寸心低头扶着发钗，倩影一晃便已从侍女丛中钻了出去。<br>

“杨戬想吻寸心……”<br>
“啊？……”<br>
好像，好像也是正常的，可是就没什么要说的了吗？<br>
不行，从前总是我问，今次我偏要他自己说，明明该教的都教过了呀！<br>
怀中人的沉默似乎意味着她默许了这个回答，杨戬愈发自觉抑制不住心跳，捆仙绳上有二人都未注意到的流光闪过。<br>
“可以……吗？”<br>
“唔……可以啊，但是没有别的了吗？”<br>
臭杨戬，都先让你亲了，怎么还学不会自己道歉、自己道歉、自己道歉呀！<br>
“别的都可以吗？”<br>
“杨戬，你也答应过我，不会再要我等了呀——”<br>
这个遇上杨戬总是横冲直撞的西海三公主仰脸向上，盯着他看，直教他也看清了她眼底的一片澄澈无邪。<br>
她的目光停在他流云纹的天眼处：他的天眼，不是最能辩识人心，勘破万象吗？<br>
从前在灌口时，她常听人口称“倘若神佛有眼”为所爱所惜之人祈福。如今她在这尊神前，两相对坐，竟不知该如何向他祈愿诚心，哪怕她本即龙女。<br>
二郎真君，我袒露此心，你若真能显圣，请唤回我的爱人——<br>
他额前连通识海的天眼化形处被赋上一吻，轻而赤忱。<br>
顷刻间，杨戬灵台萦绕之混沌烟消云散，周身通泰的同时记忆如潮般涌来！<br>
过去漫长岁月间，自己与怀中人的爱别离、求不得全数如琉璃万华镜般复现……<br>
原来只差这一吻，原来他往事记忆并非清除而是封存，只差心上人心意相通的这一吻。<br>
他身躯一震，寸心还在怔愣中未明所以就被他紧紧桎梏，他身上的捆仙绳早在不知何时褪除，双臂早该被用来与爱人抱拥。<br>
“对不起寸心，对不起我的寸心。”<br>
他抱得那样紧，又那样爱重，才会把她的脸捧在双手间细察——<br>
这双眸又爱瞪人又爱掉珠泪，是她最最生动的地方，总是神采飞扬的还有跋扈的两弯眉，当然还有爱皱起的俏丽小鼻，也少不了这老赌气说不在乎，也叫他怎么亲也亲不够的嘴……<br>
寸心此时也已明了这尊神终于完完全全是她的夫君，起先还能应付，但实在被他赤裸眼神看得受不住，要偏开脑袋。<br>
杨戬不依，到底还是身体先行，与其说是来势汹汹地吻她，倒不如说是要吞吃她。<br>
这才该是有情人久别重逢，寸心心头愈热，索性同他缠吻，<br>
“怎么还是哭了？”<br>
他感知到湿意，正要察看却被怀中人揪紧了衣袖，另一手摁住他后脑不让他挪开。<br>
杨戬只好以指腹轻轻抹去她面上泪痕，唇边的泪珠则与吻一并吞吃去。<br>
“没良心的，有本事一辈子不记起我……”<br>
“是我不好，都是我不好，罚我任公主殿下差遣，随身侍候好不好？”<br>
“差遣你是便宜你了！”<br>
“那你再用捆仙绳捆我一回好不好？”<br>
“我不捆你了，哪里捆得住你呀，我还怕司法天神发落我呢。”<br>
“小神不敢，公主要捆便捆，小神绝对不忤逆公主……”<br>
“怎么不说要杀要剐？”<br>
“公主殿下怎舍得杨戬死呢？”不知是不是因了看遍西海藏书，如今的二郎真君与三公主对答起来果然进益。<br>
“你还贫！”<br>
寸心作势要打他，却又被紧紧揽腰吻住。<br>
……</p> <p>其实倔强斗嘴，或封缄一吻，都是有情人的赤忱。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/021000.差一吻.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%E9%99%AA%E4%BD%A0%E8%BF%87%E5%A4%A7%E5%B9%B4" title="标签">#戬心陪你过大年</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/2e5a09/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">【戬心陪你过大年】十九· 据说有个货郎戬x千金心</div></a> <a href="/pages/d914f7/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">【戬心陪你过大年】二十一· 据说有个小道长戬x渔女心</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
