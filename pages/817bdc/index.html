YJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">回家后的一些小事<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>乌云黑压压乌沉沉的，盖住了方圆数百里的海域，大雨拉了闸一般倾泻而下，狂风呼啸，掀起几十丈高的浪，有一艘小小渔船飘摇在大海中，眼见着就要被巨浪掀翻，轰隆隆一道闪电劈下，暗色的黑云中浮出一条浑身银雪的白龙。小船上的渔民见了，大呼着撤开手，倒头便拜，一个大浪打来，船彻底翻了。</p> <p>那白龙从远处腾飞而来，绕着小船沉没处飞舞一圈，只见海水瞬间形成一个倒流的漩涡，本已支离破碎的渔船重新合扣整齐，白龙又一抓捞出了落海的渔民，使出神通，将渔船与渔民送回了海岸边。</p> <p>做完这些，白龙轰鸣一声，直入海中去了。</p> <p>在这片深海的珊瑚阵中，坐落着一个偌大的宫殿，外间风雨飘摇，海中却宁静安适。龙族的耳目更比一般神仙清明，隐隐约约尚可听到海上的落雨声，敖摩昂化作人身，落在妹妹的行宫之中。这样的阴雨天气很适宜打瞌睡，外殿里的两个婢女窝在墙角的柱缘边，不曾注意到大太子的到来，摩昂也不在意，长身跨入清明殿中。有个卫军匆匆地奔入，见了摩昂，忙拜见：“大太子。”</p> <p>敖摩昂道：“急匆匆地，可出了什么事？”</p> <p>卫军道：“上方是雷公电母与公主在布雨，公主见海面上有一艘渔船，担心大雨害了渔民性命，又瞥见太子真身，于是托护法伽蓝传讯，让小人相询太子。”</p> <p>敖摩昂点点头，说道：“嗯，我瞧见了，你叫她不用担心。”卫军于是领命去了。</p> <p>大太子在清明殿中坐下，吃了三盏茶的工夫，还不见三公主回来，于是坐到方桌后，取近日空桑海的报折来看。他们西海王室拢共只得了三公主这一个女儿，年少时在家里无拘无束，不曾压她认真学过策论，后来……好在敖寸心也是有几分聪明劲儿的，单回家后在龙宫中跟着父王学了几年，现在已经事事都批复得有条有理，即使是交给他做，或许也差不大多了。大太子欣慰地点了点头，将手中的报折放回，忽然见到一溜金色的报折当中，压着一张蓝灰色的文书。</p> <p>摩昂一时起了好奇心，将那本文书抽出一看，只见正面几个大字：“川主庙”，心中已是一沉，忙翻开一看，洋洋洒洒的几段文字，竟然是灌口百姓写给二郎神的祈愿文书。摩昂又翻到章末细看，有人用朱红小楷批复了一段指挥庙祝行事的批语，当中还调遣了几个在川中赫赫有名的草头神将，摩昂上几百年时常关注川中动势，对这几人的名字十分熟悉。要说是何人批复，瞧此字迹分明是他这近年来愈发乖巧听话的好妹子敖寸心。</p> <p>摩昂心中登时五味杂陈，不知该欢喜还是忧愁，拿着文书怔愣了半晌，忽闻殿上传来轻快的脚步声，跃入一个金冠束发，白衣劲装的女公子，正是三公主寸心。</p> <p>公主见了哥哥，不胜欢喜，快步奔到摩昂身边，笑道：“大哥，你怎么一个人来了，嫂子呢？她分明说要来看我……哎？你的脸色怎么那么差？谁惹你……生……气……”龙女的目光顺着大太子僵裂的表情下移到他的手上，正展开的白纸黑字，正是她“犯罪”的证据，给人逮个正正着着，抵赖都无从下手。</p> <p>摩昂沉默着，目光如深潭一般，将龙女逼得更加心虚，默默地收回搭在哥哥小臂上的手，背到背后去低下头，悄悄去窥大太子的神色，见他仍直勾勾地盯着她，吓得又缩了缩脑袋。</p> <p>安静了不知多久，龙女心中发毛，试探地小小声道：“大哥……”又听大太子长长地一声叹息，吓得又住了口。敖摩昂看着眼前这总让人担心的妹妹，又捏着手中的文书，瞧上面刺眼的“川主”二字，心头止不住地发堵，又是半晌，缓缓地说道：“你是大孩子了，嫁过人，当了人家的夫人，后又回家来，有了自己的封地，处理这些事，看来也已经很得心应手。你长大了，大哥不能再罚你，你也不会再服我的管教。只是这样大事，事关整个西海的兴亡，大哥以为，你心里至少该有些计较。”</p> <p>其实摩昂从来不曾罚过她什么，连重话也少说。当年她犯下那样的滔天大错，回到家后，家人也从来没有再提过，只是问她过得好不好，那人对她好不好？是不是受了欺负才回家来的？寸心不知该如何答复，更低了头，又听摩昂道：</p> <p>“你回家来，父王母后怕你伤心，哥哥们更不好问，只当作没这件事一般，过去就过去了，这样当然最好，咱们一家团聚了，也当你已经绝了心思，晓得了人间苦难，在家里当公主……不好么？何以就非得系着他，离了离了，还要给他干这些累活？”大太子心中尚且有更多重话想一气讲出，可见了妹妹单薄的身躯，再也说不出更多，直将心头气得瓦凉凉地，捏着手中的文书一展开，指着那祈文道：“你好好看看，上面求的是‘清源妙道真君’，呼的是‘二郎爷爷’，与你有什么相干？这一番香火可曾有你的份儿么！”</p> <p>寸心不知说什么，只好岔一句：“有我的份儿的……”</p> <p>摩昂气得笑出声：“那点香火你一条龙要来干什么？你缺什么龙宫给不了你么？那姓杨的抛下你，抛下川中子民去追逐功名利禄，你还上赶着替他断后么？”</p> <p>寸心终于被戳中了痛处，嚅喏半天，小声道：“不是的，他没有……”</p> <p>“没有什么！”看她鬼迷心窍地还在替那负心汉狡辩，大太子气得直哆嗦，“你刚回家里来的时候，天天夜里都躲在被子里哭，第二天眼睛红得人人都瞧不下去，没人肯说破，你却以为我们不知道么？你以为只有你伤心么？父王母后见了，哥哥见了，难道就不心疼？难道就不痛恨当年不能留你，让你受了那么多委屈，在外漂泊了一千七百年不能相见？”</p> <p>龙女心中酸涩不已，眼泪滴落在胸前，视线中模糊，只知小声道歉：“对不起……”</p> <p>“谁要你道歉？谁曾怪你不成！都是那无耻无义之人犯的错！你只错在非要和他纠缠，被他伤了心，栽了这么大一个跟头，你还不知道疼！还要去贴着他！”</p> <p>寸心咬着唇，心知大哥是为她气恼，心头也难过，敖摩昂从没有和她说过这样的重话。又听他气得将那文书一把摔在地上，猛地起身，走到方桌边的矮柜前，寸心欲要拦阻，已赶不及，敖摩昂一把拉开矮柜门，里面竟然是几百份分门别类好的蓝灰色小册，上面都明晃晃地写着“川主庙”三个字，大太子心头一颤，气了个仰倒，大骂道：“他个天杀的真好意思！自己上了天去倒把这些杂事扔给你做！”</p> <p>“不是的……他事情太多顾不过来，这些，这些我从前就经手，索性就……”</p> <p>“敖寸心！你还护着他！姓杨的给你灌的什么迷魂汤，你们现在是什么关系，你要去庇佑他川中的子民？你失了魂迷了魄了？他如此待你你还要护着他帮着他？！”大太子本来没有那么火旺，只是敖寸心这气死人的天字第一号傻子，被个男人抛弃后还上赶着去倒贴，连句重话都说不得他杨戬了，倒让摩昂好生愤懑，猛地一甩袖，喝道：“玄乌进来，把这些别人的东西收拾好了送回去，另写一封信，仿着三公主的字迹写！就说已经由家人劝过，不再溺迷情海，就此别过，莫复相见！写得情真意切，悔恨无极些！”</p> <p>寸心听到此处已然急了，忙奔到堂前叫道：“不能！别！大哥，这是我自己要做的，和他没关系，你别生气，别……”</p> <p>大太子一把攥住龙女的手，强硬道：“不准再说，就听我的安排！你立即与我回龙宫，休得同他再有干系！”</p> <p>敖寸心极力地挣脱，只是徒劳，“不，我不回去！大哥，你把文书送回，但不能写那封信，求求你大哥……”她心中念着杨戬此时举步维艰的处境，又想起之前和他在庙里重逢时他那般模样，就算杨戬或许能看出这并不是自己的亲笔书信，可她不愿冒千分之一的险。万一杨戬没瞧出来呢，万一他信以为真了呢？</p> <p>“他就那么好，让你不顾家人，不顾身家性命也要帮着他么？”摩昂怅然道，“可是他没什么好的，他欺负你。妹妹，你非得和他这样藕断丝连么？他会再伤害你的，你听话。”</p> <p>“不会的，是我一直欺负他……”寸心已经哽咽不已，泪流满面，“大哥，我已经抛下他一次了，我不能再把他扔下第二次……”</p> <p>敖摩昂闻言，怔了半晌，这时才联系着从前的事品出些内情来，看着哽咽不已的妹妹，心中涌出无奈。这情情爱爱牵牵缠缠，或许是他不能懂的了。一招手，让缩在门口不敢动弹的玄乌去寻寸心的贴身婢女进来，替龙女收拾了妆发，煮一碗姜汤服下，也不再提送书写信的事，只是陪着寸心坐了一会儿，哄她不哭了。</p> <p>夜色逐渐降下，临行前，敖摩昂揉了揉妹妹的头发，想到那人或许也是这样坐在敖寸心身旁，或许还揽着她的肩膀，心中仍是止不住的气愤惆怅，那么大一点儿的小龙女长大了，已经不需要兄长的庇护，却去倚靠别的男人，教别的男人抱在怀里哄了。这时他才后知后晓地察觉到，从小呵护着长大的小妹妹已经嫁做他人妇，有另一个人在她生命中占据了如此重要的位置，可以与家人权衡。</p> <p>真是不爽，改日定要揍姓杨的一顿，让妹妹在一旁压阵，让他不许还手。不对，敖寸心这小龙女肯定要偏帮姓杨的，有她在场反而坏事。</p> <p>大太子叹了口气，交待道：“好了，既不写，也不送了。你只需记着一件事，想做什么就去做，家里的事自然有父王母后有哥哥们做主，不要你这个小龙女牺牲什么。”欲要再说些什么，却又觉得有些事心中明白，也无需再多言，又哄了哄更想哭的妹子 ，夜深了，匆忙回龙宫去了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/072412.回家后的一些小事.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/8eaf0a/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">老板女儿的舔狗空降成上司后</div></a> <a href="/pages/b834e4/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">龙的礼物</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
