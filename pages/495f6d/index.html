许久，他抬起头，望向空荡荡的室内，才渐渐醒悟，她已经离开了这里。<br>
是啊，她离开了这里，他才能偷偷搬回主卧里。</p> <p>床头的茶盏干涸得没有一滴水，杨戬重重叹了口气。<br>
她第一次说出“你把我折磨了整整一千年啦”之后又留下来十几年，久到让他几乎忘记。倒是如今她真的走了又夜夜来他梦里拷问他，起初他心慌心碎心悸，急着向她解释“不是的不是的，杨戬从没想折磨寸心从来都没想过”，后来久而久之麻木了，再后来他竟然咂摸出点儿别的味道——他们成亲至今一千七百余年，可她只说千年折磨，那便是还有七百年的神仙眷侣。</p> <p>杨戬趿上鞋子准备起身倒水吃药，刚站起猛一阵晕眩，忙又坐回床边歇息好久，然后再试着慢慢起身，没站直又胸口发痒猛一阵呛咳，寻水水在远处，取水又站不起，连续不断咳得肺都快炸了咳得眼泪都要流出来，忽然有人拉开纸门到了他身边伸手抚上他后背帮他轻拍顺气，很快就咳得轻一点了，那人更适时递上装满清水的杯盏，那人皓腕莹润素指纤纤不是寸心更是何人？<br>
她回来了！寸心回来了！<br>
杨戬心头狂喜也不去接水杯转头就投入龙女怀里。<br>
龙女起初还想叫他“小心点儿”，话没出口觉察到他扑在她怀中已经哭出来了，只好放下水盏将他仔细搂住，轻轻拍他肩背，不忍心，也叹了口气。</p> <p>她是八月十五离了这里回家的，家里早早备了各色欢迎节目，安排得满满当当，在家一个月，东南北海叔伯处又各招待半个月，已是十一月初了。她从北海刚回到家里还没来及感慨“原来西海这么暖和”，蚌女通报“东海四公主来了”。寸心迎出去没两步四公主已经自己走了进来。寸心看她言辞闪烁默契地把人都支走，只剩下她两个敖听心才凑到她耳边低声说：“杨戬病了。三圣母叫我来告诉你。”<br>
幸而早年间就布局打通了西海到灌江口的水路，寸心沿水路一路往东没遇到任何阻碍，当她从杨府的池塘中出水时，站在院子里她也有一阵恍惚。然后她瞧见东厢没有亮灯，心知杨戬定是自作主张搬回了主卧。于是她便往后院来，只是没直接进门，而是站到窗下静静看了一会儿——<br>
屋里杨戬睡得深沉。<br>
他真的病了吗？他往常是那么健壮。<br>
小婵会不会是在骗她？<br>
是不是他们兄妹又联合起来诓骗于她？<br>
——寸心正自惊疑突见杨戬霍然起身，他起身时的情形像极了他往年被噩梦缠身时的模样，她又听见他咳得那么厉害——<br>
是啊他定是病了，还病得不轻。<br>
否则她刚进入杨府就该被他捉住了。<br>
他已经病到察觉不到她的到来了吗？<br>
——寸心无论如何不能把现在扶床呛咳的身影和她记忆里的杨戬重合到一起，终于心疼占了上风，也顾不上计较他不经她的允许就擅自搬回来住，她冲了进去。</p> <p>杨戬惊喜的连问拉回她的思绪：“寸心？我不是在做梦吧？真的是你吗？你回来了？”<br>
龙女定了定心神，滴水不漏回答他：“嗯，是我，我回来看看你。”</p> <p>杨戬眼泪都没擦拉着她絮絮叨叨一个劲儿重复“寸心回来了”、“寸心回来了”，寸心无奈地任由他摸摸抱抱，半晌才问清楚，原本不是什么大毛病，是她走后他夜里多喝了点儿酒掉池子里泡了一宿，只是他又不肯吃药自己作践自己才作成了这幅病入膏肓的模样。<br>
寸心笑着打趣他：“我说呢，什么大病老君的丸药都治不好你，原来是真君大人讳疾忌医。”<br>
那人却不跟她说笑，悚然变色，龙女心知要糟可也没来及拦住，被他说出口了：“寸心要是不管我我还不如死了算了。”<br>
“呸呸呸什么寻死觅活的话也是能混说的？”数落他一场押着他也“呸”掉，好一阵折腾这才把事情岔过去，她又端了水，再递上药，还哄他说吃了药可以得到一个亲亲奖励，他立马抢过去一口吞了就要来亲她。寸心本想再逗逗他的，想说“也没说是吃了哪次药，全吃完才给亲”，但终究什么都没说，静静坐在那儿等他微凉的唇贴上来，贴了好久好久。</p> <p>十一月的灌江口夜里也开始起风了，寸心替他掖好被角：“好啦，二郎吃完药好好睡觉，寸心就坐在这里看着你。”<br>
他不说话眼神却死死盯住她。<br>
“我不走。我保证二郎明天醒来还能看到我。拉拉勾不骗人。”<br>
她勾起他伸出来的小指他终于肯闭上眼了，但却勾紧了手指不放开。太用力勾太紧了，她也只得由着他去。</p> <p>第二天杨戬难得地一觉睡到日上三竿，睁开眼先盯着房顶找回身体的感觉——很好手指还勾着——然后才慢慢偏头看过去——寸心还牵着他的手，她就倚在床边，也睡着了！是真的！她还在这里！<br>
杨戬禁不住一阵狂喜，继而又担心起她睡得不舒服，挣扎着起身想扶龙女躺下，却抱不动她，这才发觉自己竟全然使不上力。但还不待他自怨自艾龙女已经警醒过来，见他身歪体斜忙扶了他靠到床头，拿软枕给他垫了，纤纤玉手还抚上他胸口帮他顺气，看他气色缓和一些又去取了水盏来一勺一勺喂他，于是想法就变成了——若是这样能得她一辈子照顾，那就让他病到天荒地老，他也愿意。</p> <p>喂完水龙女从怀中抽出帕子来给他擦唇角，他一眼就瞧见那上面绣的双龙戏珠，那是他们当年出去游玩时在一个小镇上买的，绣工很粗糙，但胜在双龙和珠子都是粉的。<br>
龙女也察觉了他目光聚焦的所在，猛地把手收回去把帕子团进手心里。<br>
杨戬瞧她脸现红云说不出的可人，他素来最爱龙女娇羞之色，她素日也很美，极美，但总是撒娇弄痴时最拨动他心弦，不由得就出言调笑道：“寸心的帕子拿给我瞧瞧？”眼见龙女脸颊上的红色就这么斜飞漫延到耳根，他忽而想，是不是因为龙女对着他或嗔或怒时他最能确定她的心在他这里？她还留着他送的帕子……<br>
杨戬急切道：“寸心留着帕子，寸心心里还有杨戬，对不对？”<br>
龙女本因手帕泄露了心事暗暗责自己行事不密，竟被逮住了把柄，忽听他诘问，思到哪儿就说到哪儿，直接回：“左右都离了，心里有没有又有什么打紧。”<br>
杨戬说话时就挣扎着想坐起来，听见龙女如此回应更是气急，悲愤之下竟又生出了一股力道，紧紧攀上龙女臂膀：“杨戬听调不听宣，几时听过她瑶池王母的懿旨？”他抓她抓得那么紧，更兼目眦欲裂眼角嫣红，死死把她盯住，“寸心却说，寸心心里还有没有杨戬可打紧不打紧？”<br>
寸心原是话出口就醒悟过来，这人的病症不在身上实是心病，她本是心疼他的，这时见他忽现疯癫之色却又勾起十几年前的记忆，胳膊被他攥住的地方像那时一样生疼，那时也是在这屋里……<br>
不待龙女答话他又说到：“你当日问杨戬这一千年来到底有没有爱过，当时当日我不能回答，明里暗里多少双眼睛盯着要我接了那圣旨才肯罢休，但寸心你该知道的，你该懂我的心的……”他说着更凑近几分，放软些语调，“如今只得我们两人，我说与寸心听好不好？我……”<br>
寸心却哪里还听得进这些，她思路还在杨戬听调不听宣可她西海不成，这时接上话：“你反悔了？”<br>
杨戬以为龙女是与他一般心思忙接口：“是，我反悔了，我舍不得寸心……”<br>
却听得龙女再说：“你反悔容易，你将我西海置于何地？”<br>
“我西海”几个字忽如利刃般扎进他心里，杨戬忽如皮球泄了气。<br>
龙女趁机挣脱开，推开他便要出门，他又一次望着龙女背影，泪水迅速模糊了视线他终于冷静下来，他想起是龙女不要他了，她要回家，她抛下了他，他的太阳他的月亮再也不肯照给他一丝光亮……<br>
杨戬喉头一甜猛喷出一大口，趴倒在床边看手背上、脚踏上都鲜血淋漓，又见龙女绣鞋，她折返回来了，她又来照顾他了，她扶起他，她还给他渡来法力。她暖融融的法力游遍他身体他却觉得心下更冷了，越来越冷。她只是可怜他才回来看看他，等他好了她还是要走的。她现在就和当初她以为救的是哮天犬一样给他治疗，他现在在她眼里跟哮天犬并没有什么两样，他现在甚而不如哮天犬，他如今就是一条丧家之犬……</p> <p>龙女无从知道杨戬深沉的心思里都绕过些什么念头，龙女总是刀子嘴豆腐心，龙女最看不得人受苦，尤其是他。听说他生病就巴巴地跑来看他，这下见他吐血她又怎么可能再舍了他去？<br>
龙女先渡去法力稳住杨戬心神，又烧上热水，趁着烧水的空档收拾床铺，床单连他衣服一并换了，忙前忙后，等水烧好晾凉再扶他起来吃药。<br>
杨戬就着她手里噙了药，又就着她手里喝水，喉结上下滚动几次把药咽尽了，然后他重提了她之前说的“吃了药就给亲亲”，讨得她蜻蜓点水几个浅吻，只是才这几下就又累得喘起来，她扶他倚在自己肩头，他说“谢谢寸心”都说得有气无力。龙女默然半晌，忽而心念微动，问：“你刚刚要跟我说什么？你现在说，我听着。”他挤出个笑，摇了摇头低声道：“罢了。”</p> <p>他搂她搂得很紧，又没什么力道。<br>
她任由他靠着，她回抱住他，她想让他靠在她身上入睡，他往下拉拉她，示意她一起躺下，于是她也上床来，还拉过一床薄被同他一起盖住，一起入睡了。</p> <h2 id="_2"><a href="#_2" class="header-anchor">#</a> （2）</h2> <p>“梅花已经开了啊？”<br>
“我山上较旁处冷些，梅花开得早。”<br>

想到这里便觉自己碍事了，该多给他们创造些二人世界的机会，于是吃完早饭就告辞：“华山的百姓离不开我，我得空再来。”<br>
那两人携手将她送出门外，杨婵一步三回头催他们“回去吧回去吧，快回去。”那两人一直并肩而立目送着她，直到她驾云攸忽远去。</p> <p>杨府里这个白天似乎和往常差不离，两个人喝茶逗趣。他又夸了三妹的粉梅颜色别致香气高雅，龙女叫他去把冬天的衣物铺盖都翻出来晒晒他也做得认认真真仔仔细细。至晚间饭毕龙女拾掇了食盒正要摆到廊下去，突听得身后重重的倒地声，忙回身把人扶起来。<br>

目光也涣散起来。<br>
“我的腿……”</p> <h2 id="_3"><a href="#_3" class="header-anchor">#</a> （3）</h2> <p>凡间的大夫和药王医圣轮番瞧过，杨戬的腿是真废了，任是刀割针刺也毫无反应，鲁班制的轮椅送来的时候医圣表示敖寸心的针灸技法可以出师了，他得回天应职，以后就由龙女为杨戬掌针，至于这针要扎到什么时候才能有转机，那就“心诚则灵”，“造化功成”。</p> <p>寸心封了包珍珠送医圣出门——之前也是一般酬谢的药王，回身见杨戬安安静静坐在廊下。<br>

又听见：“若是能给足财物倒也……毕竟乱世命贱啊……”<br>

但是凡人迫于生计可以言语矫饰，他却不该将之视作平常。<br>

“‘小女子夫家’祖上有传家之教，略通易经八卦，恰有解产难的法子，敬请主家一试。<br>
“请摆开香案，再拿些笔墨朱砂和黄纸。”</p> <p>杨戬像模像样画了符，点火烧了，又念念有词一阵，然后闭上眼睛元神出窍，这才是关键的步骤。<br>
杨戬元神一路疾行来至阎罗殿外，秦广王听说即将上任的新顶头上司到访，慌忙迎出来，打起二十万分精神听候吩咐。杨戬至殿内正中间南面坐了，吩咐将灌江口的生死簿拿来查验，果见有一妇并子该今日寿尽，于是大笔一挥各添六十年阳寿，又翻至别页将灌口及附近那些行好事的善人们都勾勾画画依其好事多寡添上十数年不等，这才撂开手扬长而去。</p> <p>杨戬睁开眼睛时，寸心正俯在他身前拿手在他眼前晃，见他猛然睁眼还被小小吓了一跳小声“啊”了一下。<br>
一瞬间恍惚又见千年前海岸边那个明媚的少女——“你醒啦”——像一道光照亮他被痛苦和仇恨充塞的心房……</p> <p>“呱啊——”<br>
响亮的婴儿啼哭声吸引了所有人的注意，被围在中央一直呆滞着的妇人——应是产妇的婆母——这时也终于有了反应。<br>
老妇人朝屋里问了声：“青娘还好吗？”听见屋内一个疲惫的声音回答“母子平安”才滚下泪来，爬起身转来杨戬和龙女身前又扑倒连连叩头，龙女被杨戬拉住手，一同受了三个，他一放手她忙上前将人搀起，老妇人连声道谢却激动得除了谢也说不出个别的。又一会儿房门打开走出另一位——这应该便是稳婆兼产妇母亲了。看她眼下乌青花白的头发应是理过但仍凌乱着，她怀里的小花被子包裹着一个小婴儿，抱到二人面前行礼毕，还提出：“请二位神仙给孩子赐名。”<br>
寸心初以为是被看穿了，细想想应只是百姓敬称，只这一时耽误便推脱不及了，杨戬已经伸手将孩子接了过来。<br>
“寸心你看他是不是好可爱？他在冲你笑呢。”<br>
孩子确实可爱，小脸还皱皱的但已经会笑了，寸心也忍不住伸手去逗他，手指被他一把抓住，才出生的小婴儿，小手竟已经这么有力了，是生命之力。</p> <p>巧的是这孩子父亲也姓杨，杨戬思忖了一会儿，跟龙女商量道：“单名一个‘同’字可好？”她知道他是想取这孩子是他们共同救回来的意思，她当然没什么不好，只说孩子亲人觉得可以就可以。</p> <p>这一天他们还在灌江口最大的饭店“四海客栈”堂食了，回家的路上连春日的夕阳余晖照在身上也显得更多一些生机。</p> <p>走到河边时杨戬忽然问：“寸心为何拒了那婆婆的好意？她可是咱们灌江口最好的稳婆。”<br>
他心里的盘算打得有多响龙女岂会不知？但她也不愿在这样难得充实又快乐的一天里拆穿他，便只说：“这你就不知道了吧，我们龙都是生蛋的，技术不通用。”<br>
他当时只应了个“哦”。<br>
至晚间沐浴毕，龙女从湢室出来边走边擦着头发，却见杨戬操纵轮椅向她靠过来，他只穿着薄衫中门大开露出腹肌若隐若现，盈盈微笑晃得她花眼，语调温柔又兴奋。<br>
“寸心，我们来生蛋吧！”</p> <h2 id="_4"><a href="#_4" class="header-anchor">#</a> （4）</h2> <p>“寸心，我们来生蛋吧！”</p> <p>寸心不知道杨戬是在什么样的心情驱使下选择了这句话来向她求欢，但她知道自己被打动了，不止是因为这句话，还因为很多很多，因为时机到了。<br>
她回到杨府已经四个多月，小半年了。既然都回来了，搂搂抱抱卿卿我我都可以，还坚持自欺欺人的“不越雷池”又有什么意义？杨戬待她一如既往，她待杨戬也是一样，王母娘娘解除了他们的婚姻，那又如何，灌口百姓眼中他们不还是一对神仙眷侣？<br>
婚姻只是一种形式，有，固然有有的意义，没有，却也没什么大不了的。她心里从没想过把杨戬让给别人，杨戬也早就赌咒发誓今生只她一人，心里的位置，妻子的位置，都只有她，言下之意即使有一天她真的不要他了，他也不会去找别人。当时不觉，回思才知他有多大勇气，才知他深情几许。</p> <p>相较于他们之间深厚的感情，夫妻之名反而成最不要紧的了，反正他们也不是成亲后才开始探索对方的身体，那如今又有什么不可以？</p> <p>寸心站在原地，打量了一会儿杨戬。他除了坐在了轮椅上，其他一切看起来都和以往没有差别，和过去千多年一模一样。<br>
寸心走上前，丢开浴巾，搂住他脖颈，坐进他怀里。他呼吸显见得一窒，手在轮椅的扶手上握紧，上半身的肌肉紧绷起来，但双腿还是毫无反应。<br>
寸心没有在表情上显露丝毫破绽，她冲他甜甜地笑着，她抬起手抚摩他的脸颊，她吻他，吻他的唇，吻他的脸，吻他的下巴、喉结、锁骨，听他在她耳边喘息，感受他的臂膀在她身后收紧起来。<br>
杨戬也低头来吻她。主要是配合她的动作，亲她额角，亲她发顶，他自己头发也还未干，两个人的湿发有直有曲，缠绕在一起。</p> <p>相较于热烈且直白的龙女，杨戬的心思一向更加深沉也更加晦暗。说出来怕人笑话，他都数着呢，他已经三年零七天没有拥有她了，今晚会不会迎来转机？<br>
又或许，他如今病了，瘸了，他还能给她快乐吗？他还能满足她吗？<br>
他自己心里都没底，可她愿意让他试一试。她总是给他机会，从海里、弱水里，她给了他活下去的机会，总是她一次次把他从命运的谷底救起，到后来，她没有放任病入膏肓的他自生自灭，再到如今，他残废了，她也没有抛弃他……<br>
胸垒万千，杨戬觉得自己有许多话想对她讲，张口却又不知道到底该说哪句，只能一遍遍喃喃着“寸心”的名字，可她竟会回应他的每一声呼唤，而且从“嗯”、“哎”，到“嗯嗯”，到“怎么啦？”再到他头发蹭在她颈窝把她蹭痒了她边笑着边说“到底怎么了嘛”，“再不说我咬你了噢”——那个曾经说过要“一口一口咬死他”的龙女后来一口一口咬了他一千多年，可他还好好活着——<br>
脱口而出：“那你咬吧。”<br>
——如果有一天她真的一口一口咬开他的皮嚼烂他的肉把他吞下肚去，他就可以化作她的血肉，他和她永远在一起……<br>
寸心怎么也没想到这人吞吐半晌脑子不知道神游到了哪里竟说出个这个，怒从胆边起说咬就咬张口露出小尖牙咬在他最脆弱的颈侧——再深一点点，只要再深一点就会咬断他的动脉咬断他的喉管——即使她只咬一口就放开也留下了两排牙印并一些血点。<br>
“嘶……”不愧是川主最擅长变脸，一边摸着自己脖子一边换上副笑模样顾左右而言他：“我是说让寸心用下面咬。”他碾在指尖抹开的血迹换了一个路径还是进入了她的身体。<br>
寸心张张嘴终还是只发出一声叹息，他太过了解她的身体，叩开蓬门直奔主题，他靠着记忆里的手感精确定位，奇特的润滑又带来别样的新奇。<br>
她禁不住颤抖起来蜷缩起来，蜷起双腿一边更加配合他手的角度，像是半坐于他掌上敏感的小肉珠抵在他掌心任由他把玩，一边膝盖顶进他腿间压压蹭蹭与那凶器嬉戏。</p> <p>杨戬器大往常也要多做前戏，更何况这次旷得最久，寸心坐在他手上连喷两次了，花道仍然紧窄，紧紧包裹住他的食指和无名指，不留一丝缝隙。<br>
龙女总是比他着急，她早就解了他腰带把那雄壮伟物掏出来又握又捏撸了无数遍，分外想念分外眼馋却看得到吃不到，急得快哭了，少不得得他抱紧她、亲吻她、安抚她，上面轻轻啃咬她面果儿般的耳垂引开注意，下面将指尖再紧送进一分屈指揉按在前壁，趁着她高潮后卸劲儿的一点空隙加一根手指，等她适应一些后再重复一遍加到四指。他提前修剪过了指甲但龙女甲尖仍然锋利，抓得他胸口血痕交织。<br>
“可以了吧？”龙女刚结束一段如泣如诉高潮时曼妙的歌声，睁眼前出言催促，睁眼后瞧见他胸口痕迹又忙来舔舐——龙涎治伤最是妙品，舔过处迅速愈合，在汗水流上去引起的刺痛中又掺入酥酥麻麻，痒到人心里。<br>
龙女再次发出邀请，问话时腰肢也没停了摆动，含着他半个手掌上下吞吐左右摇曳。杨戬还在思忖准备是否足够充分了，龙女终还是觉得他太磨叽，拔起身子抢过那根肉刀就往自己身下捅去。肉刀粗砾虽然靠着先前的润滑和猛然的用力一下子吃进了小半根，但立刻又被穴肉紧紧咬住再难寸进。绞得太紧连杨戬也忍不住闷哼出声，下意识想要稍稍后撤，忽而又意识到自己真的失去了对双腿的控制力。</p> <p>脑海里空白了一瞬冷汗如雨潺潺而下。<br>
但忽而又庆幸无比！<br>
庆幸他失去的只是双腿，无论如何，他又回到了梦寐以求的温柔乡里！</p> <p>杨戬抬起头望上去，龙女小脸潮红眉头紧锁，呼吸急促白嫩嫩的胸脯连绵起伏，正在努力拧身摆臀，正在努力将他吞食殆尽。<br>
明明是最香艳旖旎的胴体，可偏偏又最圣洁也最美丽。<br>
他不禁在心里默默祝祷，想祈求龙女娘娘长久的怜惜。<br>
他会乖乖的，他会听话的，他即使有一些小小的过界也只是为了试探她是不是还在乎他，因为他以后就只能依靠她、仰赖她了……<br>
正想到这里龙女似是觉得他发呆太久不够尽兴，轻嗔薄怒丢过来一记眼刀，伸出白山茶花花瓣般柔腻的臂膀来搂住他，挟着香风把白山茶花花团一般的乳尖送进他口里。<br>
是做熟了的活计，杨戬在意识到之前已经开始了自然自发的吮吸，意识到之后吃得更加贪婪更加色急。<br>
龙女起初注意力全在内里，等把他吃得尽净忽而才发觉胸口一阵阵微痛，垂眸瞧去杨戬抱她抱得很紧，极紧，在她胸前埋头苦吃又紧闭着双眼。<br>
忽而有一些了悟了最初的问题——他用那样一句话来开场是因为深深压抑着自己的恐惧。<br>
如果她不愿意，如果她拒绝了他，他还可以跟自己辩解是因为他的用语轻佻冒犯到了她，而不是因为她不爱他了。<br>
他的害怕，他的不安，他想问又不敢问，他想问他又怕听到的不是他想听的回答，他那么肆无忌惮又那么小心翼翼，只是因为他不想再从她口中听到残忍的话。<br>
寸心低头亲吻他发顶饱含着爱意，他又抬起头瞧过来眼神里尽是懵懂和怀疑，直到他听到她说了他爱听的话，她说：“我爱你，杨戬，寸心爱你，好爱好爱你。”他才尽数释放，让她将他的爱意尽数收取。</p> <h2 id="_5"><a href="#_5" class="header-anchor">#</a> （5）</h2> <p>从那一日之后杨戬日日不辍，每天晚上都要缠着龙女“为了生蛋而努力”。寸心偶尔也会想自己是不是太惯着他了，但每每看到他笑得那么开心却不忍败他兴致，而且，他心情舒畅也有另一样好处，那就是配合治疗也更加积极：至少吃药时不再皱起眉头，不需要她三催四请放到凉了才勉强喝下，他还很期待每日的按摩时间。她给他按摩时他会讲一些小故事，有小时候的趣事，有战场上的往事，还有些不知道是哪里看来听来的传奇逸话……其实很多以前都讲过，但她还是听得津津有味，时不时对答几句，倒有种别样的和谐，仿佛之前十几年的剑拔弩张无言以对没有存在过，仿佛他们之间的相处一直是这么温馨又甜蜜。</p> <p>这一日龙女又收了西海的家信，拆看过后就来提议：“要不要试试温泉？也许对你的身体有好处。”<br>
杨戬笑着答应得很利索，还提议“我们挖个大点的池子，跟后园水榭那边接起来”，他还要了纸笔自己画了花样，大大的龙头喷泉龙角上别着花分明就是西海三公主的模样。寸心问他：“那你呢？”人大咧咧把笔往龙嘴里一横：“这里。”寸心愣了一下，他又把她小手一把攥住拉到嘴边亲着说：“杨戬从一开始就是小殿下的口中之物。”还要问，“杨戬的血好不好喝？寸心要再来点吗？”寸心腾地红了脸，她想起来当年自己第一次救人没经验，她已经尽量轻轻咬了，但还是把人咬出了浑身血痕，所以她把他放在沙滩上用鲛纱给他铺垫了还搭起遮阳棚，还一直守着他，生怕自己出海不利先惹下人命官司，直到见他快醒了又忙站到一边去腹稿练习摆出仙女的架势……等等这酉时还没过太阳还没落山这人怎么就这么顺杆儿爬起亲上来了？<br>
寸心一手推他脸一手推他胸，一边躲避一边连声叫着“杨戬”，但显然这并没能喝止他，并且她越是推拒他好像反而越兴奋。他雨点般的吻落了她满头满脸，就在这连连的亲吻声中忽然脑子自动从他们初遇的场景里捕捉出一个画面——<br>
“难道是你先喜欢我的吗？”<br>
——她问话的声音不大，但杨戬听到就立刻停了下来，还偏过头去红了耳尖。<br>
这下换寸心大笑起来，边笑还边伸指头戳他脸颊：“哦～你叫杨戬～原来我那么早就知道你的名字了呀～～”这下换杨戬抵挡不住寸心作乱的手了。<br>
他试了几下，但因为心虚自然难以发力，于是干脆放弃干脆躺了回去。但龙女不依，爬起来趴到他身上继续逗他：“快说，是不是你先喜欢我的？”杨戬闭上眼睛想要默认，但龙女可不会这么轻易放他过关，又连问了好几遍，杨戬抿紧双唇认命地匆匆点了两下头，龙女仍不满意双手呵了气就来挠他痒痒：“说出来。<br>
“快说快说，你说不说？<br>
“你骗得我好苦啊！<br>
“快说。不说我还挠你哦。<br>
“你骗我这么久，坏人，坏杨戬。我还以为是我先喜欢你的呢……”<br>
躺着的那人瞿然开眼：“那寸心是什么时候喜欢上杨戬的？”</p> <p>这一下倒是把寸心给问住了。<br>
她是在杨戬海边表白兼求婚时才真正确定他是真的喜欢她的，虽然杨戬一定不可能是那一刻才刚刚开始喜欢她，否则不可能开口就是陪回西海、陪见爹娘，也不知道那些豪言壮语在他心底盘桓了多久了，但她只刚刚从有家不能回的伤心中被拔出来，就沉浸在了两情相悦的幸福里，她好像真的没有认真想过他们是谁先喜欢谁的这个问题。</p> <p>杨戬是话赶话赶在了这里，听到寸心说“还以为是我先喜欢上你的呢”一瞬间连重点也没抓住，就单凭一腔热血问了出来，这一时片刻过去等不到龙女的回应，又大有悔意：若是她说出一个很晚的时间呢？若真是那样他简直不知道该为自己长久的自作多情而伤心还是该为自己费了那么多功夫到底是追到了心上人而庆幸不已。<br>
冷静冷静，先冷静下来再细细往前捋——她和自己成亲总不可能是不喜欢的吧？先确定了这一点杨戬忽觉心下定了大半，脑子也灵活起来：去梅山救他和劝他回魂时也是可以确定的，她为了他坚持了一路不肯撤去法力，她还为他流了那么多的泪。<br>
再往前，虽然对着四公主嘴硬“都是为了治理弱水”但寸心实是在为他谋划的。乃至她为他画弱水图，自然也不全是“治理弱水拯救众生要紧”，还有她大人大量，还有她喜欢他才会产生的怜惜，哪怕跟着他受苦受累她也只怨言了那一句——而且她说“跟着你”诶，他想起那时听到心下是多么暗暗激动又狂喜。<br>
越想越心定杨戬面上渐渐显出了笑意，见龙女这时恰好也瞧了过来，便接起龙角戴花问道：“寸心来弱水里救杨戬的时候，一定已经喜欢上杨戬了吧？”<br>
龙女想了想，轻轻点点头，轻轻“嗯”了一声。<br>
她想起的是这一次自己就吸取教训不再用牙叼着他了，但下一瞬又想起来些别的：“哼，你还说呢！好心给你骑你还拽人家角！”说着好像想起来当初被拽角角的感觉了似的，抬手往额角揉去。<br>
杨戬把她轻嗔薄怒瞧在眼里心里是说不出的熨贴，顺着话题又溜下去：“寸心把角再给杨戬摸摸。”龙女大吃一惊还没瞪完他，只听他又得寸进尺，“杨戬后来也给寸心骑回来了嘛，现在也在给寸心骑。”<br>
小龙女一向皮薄，尖叫着拒绝他再继续说下去，手边拽得到的靠枕都拎起来砸向他，不过最后还是认真承认了自己那时候已经很喜欢他了，为表诚意还幻化出龙角，趴在他胸口给他摸龙角，他摸一下她就痒得脚趾头都蜷起来，但她也能听到他的心跳，会突然加急。</p> <p>“来救杨戬之前三公主专程到金光洞报信，三公主还说‘看错’了杨戬。”<br>
“那自然是喜欢你。”<br>
龙女趴在他胸口，声音听起来有些闷，但很清晰。<br>
“还是在金光洞里，小殿下的剑尖停在杨戬喉头。”<br>
“也是，喜欢你。”<br>
不用抬头寸心就能从他沿着胸腔震动传来的笑意知道他又在庆幸赌对了，无奈地叹口气，但谁叫她就是这么个心软的小龙女，对上他就没辙，为了他一次次妥协退让，就如今也……算了，先不提。</p> <p>“在那两次中间，还有一次四姐和我一起，”四姐是敖丙哥哥的亲妹妹，由她出面当然更加有理。“那次从金光洞离开后，在山谷里四姐就问我是不是对你动了心，我虽然嘴上没承认，但她还是叫我要收住自己的心……”寸心还想问问他自己真的很不会掩饰吗，怎么四姐三妹还有狐妹都早早就看透了，偏那人又打起岔来：“那怎么行？不可以，寸心已经给了杨戬的心不许收回去。”他看起来着实有些紧张，龙女不得不先分神安慰他一番，还要叫他理解一下四姐也是一片好意不许他记恨，他最后倒是应下了，只除了表情还挺委委屈屈。</p> <p>再往前数就是在他父母大哥的坟前了。寸心也不清楚自己那时候是如何就那么自信他不会放弃她不管她，但他确实直接裹起她离开了那个是非之地，被他裹在怀里飞在空中虽然视野漆黑一片但她没有一丝害怕，是在这里动心的吗？当他在乾元山的山头上放下她，告诉她是因为那边有天廷的人在监视，所以“情况紧急，事急从权”，她那时竟还觉得他很彬彬有礼。</p> <p>“所以，寸心会不会是……寸心有没有可能……寸心是不是也一开始就喜欢了杨戬呢？”<br>
是什么问题让这个要么振振有词要么守口如瓶的家伙吞吐三遍也硬要问出来？<br>
寸心轻轻笑了笑凑上去在杨戬唇上亲了亲，她瞧着他喉结连滚好几滚，他又问：“寸心也是对杨戬一见钟情的对不对？”<br>
若说好感那确实还是有的吧，他长得好看——虽然当时寸心以为可能陆地上的人都这么好看，但他还勾起了她的好奇——她救了他他怎么不像海嬷嬷故事里讲的那样知恩图报？他竟然说她救的是“痛苦和仇恨”——“啊……”寸心觉得自己果然很迟钝，太迟钝了，所以才一直误会了一千多年，差点还要继续误会下去：既已醒悟了他一开始就对她有意，怎么绕这么一大圈才意识到这句话也绝不是怨她？他在还不知道她是谁的时候就开始担心连累她了，他真的……<br>
寸心忽然觉得词穷了，该说他是傻瓜还是说他太有运气？万一她是坏人呢？万一她欺骗他玩弄他呢？还好没有这种万一。</p> <p>杨戬继续盯着龙女，但他不问了，改成笃定的语气：“我们是双向的一见钟情，是两情相悦，是……”<br>
寸心便也不再反驳，接着他的话说：“我们是神仙眷侣。”<br>
他环在她腰间的手骤然收紧，气息也急。<br>
接下来自是彻夜无眠，心意相通心潮澎湃，其中旖旎自不必提。</p> <p>至外面隐隐传来鸟叫声，又一阵重重绞索伴着重重喘息，猛卸了力龙女趴回他怀里：“我知道的，我知道二郎一直爱着寸心。二郎现在也该相信了吧，相信寸心也一直深爱着你。”<br>
瞬间的惊疑过后杨戬确定自己并没有问过，只是寸心从来都懂他不由衷的言语，他不需要问她也会主动安他的心，她这是要告诉他，她就是因为爱他才回来的，她不是可怜他、同情他，她亲他抱他，她也和他一样意乱情迷。<br>
杨戬轻轻拨开龙女汗湿的额发，努力去勾了薄被替她盖上，他动作很轻没吵醒她，他又牵起她的手放在唇边亲吻，正幸福着，忽又想起：她既然一直这么爱他，那为什么还坚持要回家去？是不是她虽然爱他但她更爱她的家人？她因为爱他所以回来照顾他是没错，但她一直都没有放弃治好他，等治好了他，她就又要走了……<br>
杨戬记忆又飘忽回初见那日的海边，他见到龙女的第一眼，好像一切不好的记忆都远离了，就像现在一样，像过去的一千多年一样，无论发生了什么只要紧紧抱住她，他就能得到片刻的安宁，她是比太阳还要更耀眼的光亮，只要有她在就可以驱散他所有的阴霾。他毫不怀疑寸心的爱，但她对他的爱又给她自己带去了什么呢？是家人无端被打压迁怒，是整整一千年的“折磨”，还是回来继续跟他这个废人耗下去而不能奔赴新的生活……<br>
龙女趴在他身上早已沉入了深深的梦乡里，唇边还挂着笑意。他瞪大眼睛盯着帐顶，一夜无眠以一日的无声饮泣为继。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/091919.神仙眷侣.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99" title="标签">#龙年接龙</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/d13f18/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">鲛绡透·中秋特别篇</div></a> <a href="/pages/04ed5e/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">还愿</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
