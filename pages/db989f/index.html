LOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">安兮康兮，佑我爱人<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>人设是那种可以一起躺藤椅晒太阳喝药的病弱夫妻。</p> <p>“二爷——”<br>
司法天神的右脚刚迈出真君神殿，便被直健将军叫住了。<br>
“送去西海的拜贴又被退回来了！二爷，这已经是第二十四道了……”<br>
闻言那面容冷峻的俊美天神眼神反而软和下来，颇有些无奈地揉了揉额角，“接着送，一个月送一道。”<br>
“欸，二……”<br>
直健将军哪里拦得住天神纵地金光的速度，眼前只余那人的叮嘱和被微微激起的缱绻的仙云。<br>
“记着，是下界的一个月。”“唉！”直健将军心里苦。</p> <p>下界最近飞升了一个医仙，医术了得，但性情不羁，生前是个游医，成仙后受不惯天庭的约束，一甩袖子下界去了。<br>
比举颇触玉帝王母的霉头，本该有一祸，偏生他命好，生前一身治病救人的功德不说，又恰好赶上新天条出世，律法公正，瑶池也奈何不了他。<br>
司法天神此番下界，寻的就是此人。<br>
原是天神受了开天神斧一击，伤势甚重，然他一不愿妹妹与外甥愧疚，二来不愿耽误整理天条、肃清宇内，三是此正值改弦更张各方势力蠢蠢欲动之际，他的伤势不便叫外人知晓，因此只草草能下榻便装作一副已然大好了的样子，案牍劳形了许多时日，直到近日以来胸前伤口愈发疼痛难忍，力不从心，方才下界寻医仙好好看看身体。<br>
那医仙果真耿介，想他司法天神堂堂三界权贵众神之首，不知多少人想巴结，偏偏到他这儿看完病连起身相送的功夫都不愿做。杨戬为人大马金刀，浸淫官场数百载，心中愈发喜这般直爽之人。<br>
心中愉悦的天神打着玄扇走在回廊中，步履间走出了光风霁月闲庭信步的感觉。绕至前院时，那扇子却突然顿住了。<br>
前院有一棵枝叶葳蕤的神树，树下有位童子在往木牌上绑五色丝绦，杨戬来时曾听他介绍，不久便是凡间的端午，素有祈福的风俗，而此树历经凡尘八百载，仙泽渐生，格外灵验，若将写了名字的木牌挂到树上，那人便能安康。<br>
那些木牌丝绦，便是为端午准备的。<br>
此时这树下还立着一位气度不凡的贵女，身后跟着三四个侍婢。下界已暑热初显，她却裹着厚实的毛裘披风，头发长至腰际，海藻一般羸弱的蜷曲着，发髻简单素净，只一个小巧的红珊瑚发簪隐在乌发间。<br>
这身影，熟悉又陌生。不曾见过的故人模样，像一把利刃，狠狠插在司法天神的心上。<br>
“寸心……”<br>
他低低的呢喃了一句。<br>
那人微微偏着头和树下叽叽喳喳的童子交谈，约莫也是在听他讲述端午风俗和神树，偶尔点点头，连抬手去拾那木牌穗子来看的兴致都没有。<br>
真是，和多年前的南天门前相比，有过之而无不及啊。<br>
小童子歪头瞥到站在廊下黑袍天神，礼貌地提醒面前的公主殿下可以进去找医仙了，三公主道了一声谢，转身抬眸，微微一怔，很快换上得体的神色，朝他走去。<br>
她从前颜若桃花，如今桃花却被梨花换；脚边随着走动而像水波般荡漾的金粉裙角被压在雪一般厚重的披风下。在这榴花如火的时节，她却像开在隆冬的白荷，苍白娇弱得刺目。<br>
怎会如此呢？<br>
西海海畔明艳动人的三公主，有着一双灵动的美目，不由分说将他从深渊中救起，携光带热闯进他沉痛死寂的心里；杨府里彤裙翩跹的结发爱人，端庄的妇人装束也压不住她少女的娇纵，笑嗔皆动人。在杨戬的记忆里，她康健、火热，像明媚的骄阳，多年前南天门前她沉静如水的一瞥就足以让他心痛不已，如今怎会又添病弱呢？<br>
一个猜测在他心中形成，可他不敢确认，害怕确认。<br>
若果真如此、若果真如此……<br>
杨戬感受着那颗因爱与痛与涩翻涌而胀痛的心，那种复杂的、深刻的、隐晦的，被司法天神尘封在心底的，“人”的情绪，在见到敖寸心的那一刻全面苏醒。<br>
宽大袍袖下的手捏紧了扇骨，杨戬大步向她走去，来到面前，满腹言语反倒不知从何说起。复杂的、沸腾的思绪叫他的眼神也愈发的深邃复杂，加上他的缄默，落到三公主眼里，却叫她会错了意寒了心：千年的夫妻，至亲至近，曾经有多少牵绊和纠葛，落到最后，竟是无话可说么？<br>
三公主的心如同被人丟到刀子海里滚了一遭，她垂下眼眸，缓缓施了个礼：“小仙……见过司法天神。”<br>
流光容易把人抛，数百年前的灌口五月，裹挟着榴花香的穿堂风带起庭中一阵又一阵清脆和悦的竹风铃声，刚刚归家的杨二郎张开双臂迎接向自己跑来的夫人，轻柔的云纱和艳丽的蜀锦披帛笼着弱柳样的腰肢，灵动喜悦的雀儿一般扑进他的怀里；数百年后，那人小半张脸没在雪白的毛领中，停在了五步远处，恭谨又疏离地同他见礼。<br>
嘴里弥漫上一层厚重的苦涩，一呼一吸间胸腔都是钝痛的，杨戬有些僵硬地上前抬手扶起她，“不必，不必……你的身子？”<br>
三公主将鬓边的一缕散发拢到耳后，顺势避开他的触碰，冰凉的鲛纱滑过他的手心，就像那年西海岸边握不住的手。<br>
她把话儿说得轻巧：“这些年的住所湿冷了些，有些畏寒罢了，今日特来寻医仙瞧瞧。”<br>
果真如此……<br>
因果尘缘，竟是这般——搓磨！<br>
不愿面对那人眼里令人生厌的、名为“愧疚”的情绪，三公主将话头一转，问道：“真君怎会来此？”<br>
“一些旧伤罢了。”<br>
他也惯是个会隐瞒的人，从前除妖受了伤便常瞒着她不叫她发现，三公主与他斗智斗勇一千年，如今轻易便想通了其中曲折，只是心里愈发酸涩：他一向自负八九玄功，对自己的身体伤势不甚在意，从前还有个她可以逼着他养伤上药，如今无人盯着他，只怕那开天神斧的伤从未好透，到今日实在撑不下去了才来寻的医仙。<br>
三公主尽力放平自己的声音，小心翼翼藏起如今没有身份可以表达的心疼和挂念，打了句官话：“真君当珍重自身。”</p> <p>自那日回到西海之后，三公主的心里总不踏实。正心烦意乱着，有虾兵蟹将来报，天上的真君神殿送了好几车的天材地宝灵丹妙药来。<br>
三公主叫这冤家气笑了，自己还没见好反倒把药往外送，就这么不在乎自己的身体么？当即怒斥道：“连人带物打出去！”<br>
到了夜里仍不得安宁，梦中那人苍白着脸胸口血淋淋的样子将她弦醒。忧惧多日，三公主终于在五月初五那一天出了海。<br>
木牌取的是最好的沉香木，系着她亲手打的五色络子，三公主隐去身形，轻轻摩挲着那一笔一画写得郑重的名字，她抬头看着面前的神树，上面已挂了不少祈福的木牌，盈碧的枝叶间有淡淡的光华在流转，确是一片祥瑞之气。<br>
三公主笑了，“愿你果真灵验……”<br>
“寸心？”<br>
这猝然一声惊了三公主一跳，此等私情叫正主撞破委实让她又羞又惊。三公主费力稳了稳心神，双手紧紧攥住那木牌，藏得严实，才转过身来，勉力一笑：“好巧。那日听闻树下童子介绍人间佳节风情，好奇得很，特来一睹，真君也是吗？”<br>
好奇？在灌江口的那一千年，他俩入乡随俗，清明踏春，端午泛舟，重阳登高，什么佳节的烟火气没亲身体验过？<br>
这蹩脚之言听得杨戬直皱眉，又见她手里露出的五色络子，阙庭神目华光一闪，龙女惊呼一声，来不及阻止，“杨戬”二字便叫他看了个通透。<br>
“你——”<br>
杨戬又惊又喜，正要上前一步，却见那被戳破心事的龙女又气又急，转身就要跑。<br>
“站住！”<br>
情急之下喝了一声，司法重臣四百年积累的神威赫赫不经意间流露出来，便是穷凶极恶之徒也要吓得腿软，何况一小小龙女？三公主果然停住了。<br>
杨戬快步上前，见三公主赌着气背对着自己不肯转身，只得无奈地绕到她面前，打眼一瞧便是水光光红彤彤怒气冲冲的一双灵目，素白的脸上也气得浮上一层病态的潮红。<br>
这…….怎么又恼了……<br>
神威赫赫的某人当即失了气势，一边将人搂在怀里赔不是，一边开始反思自己：虽说妻子娇纵，但论起脾气来杨二郎绝对是更胜一筹，加上在某些方面他身为男子，有着刀俎对鱼肉的天然优势，因此从前在杨府他的夫纲立得十分稳当，竟叫他一时得意忘形，如今八字还没一撇呢，就敢拿腔拿调吓唬人了，实在不该。<br>
再说龙女，按她如今的心性，本不至于因羞恼轻易掉眼泪，只是现下她身体羸弱，没有足够的心力控制情绪，才会这般失态。<br>
怀里的人还要挣扎，杨戬连忙将人按住，道：“莫动，莫动，你看这是什么？”<br>
说着，从袖中掏出一块木牌，上面郑重写着：敖寸心。<br>
两块祈福的木牌并排摆在她眼前，字迹一个娟秀，一个遒劲潇酒，细细看来，还有四五分的神似之处，将三公主一下拉回记忆深处、重重光阴里的灌口杨府水榭，杨戬从后面拥着她，握着她的手在绢纸上落墨。<br>
非是“当时只道是寻常”，不论是在当时还是很久之后，丈夫怀里的温度和心跳，都让她无比眷恋。<br>
那样深重缠绵的爱意，虽只有点滴，却也可以支撑她在漫漫孤寂里，守着偌大的杨府，等着那人，一月又一月，一年又一年。<br>
于她而言，那是少有的、二人心意相通的时刻。<br>
只是这样的心意，如今……<br>
风吹过，有日光跃动声，有神树的枝叶婆娑声，有木牌相击声，还有……心跳动的声音。<br>
身为神佛者，为我心中人，甘愿叩神佛。<br>
两人对视一眼，展臂相拥。<br>
沉疴不必追。言语无声处，心意已明了。<br>
“寸心，寸心……”<br>
“傻子。”<br>
“回来吧，回到我身边，之后千年万年，我好好爱你。”</p> <p>安兮康兮，岁岁祷祝<br>
叩神佛兮，佑我爱人<br>
