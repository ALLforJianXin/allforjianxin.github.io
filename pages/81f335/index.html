n+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">酸甜一日<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>前文<a href="/pages/75616a/">《招摇行》</a></p> <p>离了首饰摊，一家三口又逛了起来。招摇山多金玉，多神树，多异草，数千年来吸引了各种精怪来此修炼，故而招摇山荟萃了各朝各代天南海北的风俗娱乐，整个城镇繁华有趣得紧。三人在招摇山玩到天光大亮才驾着云要回龙宫。</p> <p>但小龙崽还不足两岁，对什么都充满了好奇心，瞧见西海岸边一群悠扬漫步的海鸟就兴致勃勃地宣布自己要带爹娘去和咕咕咕玩，杨戬寸心没法，只好带着小龙落到沙滩上。</p> <p>三人刚降落，一大群海鸟便被惊起，小龙有些沮丧，眼角已经挂上了几点泪珠。寸心脑中灵光一闪，变了一小篮鸟食，对小龙道:“宝宝想不想去喂咕咕?”</p> <p>杨戬也耐心道:“宝宝带着饭饭去，咕咕就会和宝宝玩啦。”</p> <p>崽崽这才破涕为笑，欢快地拍拍小手，提起小篮子，迈开小腿跑去喂鸟儿。</p> <p>看着小小的身影摇摇晃晃地在前面走着，杨戬和寸心相视一笑，牵着手在孩子后面漫步。</p> <p>前面是天真可爱的孩子，身侧是厮守终生的爱人，寸心的目光突然变得很柔和又眷恋，她偏过头去和杨戬说话:“二爷。”</p> <p>杨戬也偏过头去看她:“怎么了?”</p> <p>“没什么，”寸心轻轻摇了摇头，看到地上成双的影子，突然俏皮一笑，抽出被杨戬牵着的手，跳着去踩一下杨戬的影子，又飞快地跑开。</p> <p>杨戬愣了一下，很快也回过神来，配合着妻子在后面追逐开来，笑骂道:“好哇，想把你男人踩在脚下是不是?”</p> <p>寸心嬉笑着在前面躲开杨戬，时不时还挑衅地回头看他，“是又怎么样?”</p> <p>“我今日非抓住你这小龙不可！”杨戬在寸心后面不远处追着，他把这距离的远近控制得很适宜，既不会太远以至失了游戏的乐趣，也不会太近而过早结束嬉闹。</p> <p>寸心一面扭着头跑，一面和杨戬说话， 没有注意到脚下的石头，一时重心不稳，整个人往后倒去，不由得惊叫一声。</p> <p>杨戬下意识就瞬移去接住妻子，很快又换了个姿势将寸心捉在怀里，惩罚性地挠挠她腰肢，笑道:“我也踩到寸心的影子了。”</p> <p>“你耍赖，这不许用法术的！”寸心有些不高兴地扁扁嘴。</p> <p>“寸心可真是不讲理，这事先可没有讲规矩，”杨戬将怀中的神龙箍紧了一些，“何况，要是我不用法术，寸心早就……”</p> <p>“哼，就算这样，你接住我之后也可以让让我嘛！”寸心有些不乐意地在他怀中跺了跺脚。</p> <p>杨戬察觉到龙女似乎真有些气恼了，忙将她放开，着急道:“那寸心再踩我几下，我一定不躲。”</p> <p>方才还陪她嬉皮笑闹，现在又小心翼翼，寸心瞧杨戬这副形容不免生出些拿捏着丈夫的得意，又有些欺负人的羞赧，噘着嘴斜他一眼，伸手去牵起他的手，“这还差不多。”</p> <p>明白了龙女并未生气，杨戬也放心下来和她一起散步。走了一会，寸心小声说道:“其实一开始我想说的是我突然觉得和你在一起好幸福啊。”</p> <p>“寸心，你说什么?”杨戬绕到寸心面前，想听她再说一遍。</p> <p>把目光落到杨戬眼眸底闪着灼灼亮光的眼睛上，寸心耳尖悄悄红了，“我说……你听不清就算了……”</p> <p>“我也很幸福。谢谢你，寸心。”虽然没能再听一遍，但杨戬能感受到寸心眼中绵绵不绝的爱意，一时之间整个人如同浸泡在蜜糖中。他迷恋地看着妻子，情不自禁地低下头去贴她的唇。</p> <p>感受到他的热情，寸心也觉情动，仰起脸去回应他。两人亲了个心满意足，又执着手悠悠地走着。</p> <p>二人正是浓情蜜意，不时前后晃动着交握的手，崽崽却挥着小篮子哒哒哒跑回来了，“娘亲、爹爹~”寸心放开杨戬，蹲下来揉揉小龙软软的卷发，柔声道:“宝宝和咕咕玩得开心吗？”</p> <p>这厢老六在下界见到了丁香，心中总担忧发生了不好的事情，踌躇一会便决定去西海探个究竟。</p> <p>海风将夫妻二人轻声细语哄孩子的声音和崽崽天真软糯的童言童语送到直健耳中，他静静地看着这一家三口其乐融融的景象，手无意识的捏紧了袖口，低声感慨道:“像你这样明媚美好的姑娘，也该有个好归宿了。”</p> <p>杨戬自然听到了这呢喃细语，眉睫一跳扭过头深深地看着来人。寸心亦有所感，也回头去看，疑惑道:“六哥?”</p> <p>“有什么事吗？”寸心看直健似有些反常，又问了一句。</p> <p>老六眸中有一丝酸涩和迷茫，“我在凡间看到一个和你很像的姑娘，担心你出事了，所以来看一下。”</p> <p>杨戬一看老六这个样子便知他对寸心怀有不一样的心思。任何一个男人都不喜欢自己的妻子被别人惦念，即使那人是自己的亲兄弟也不例外。杨戬脸色有些难看，冷冷道:“你没有龙族亲眷，也难怪不知，真龙寿命永无尽头，怎么可能轻易入轮回?”</p> <p>寸心略一思忖，想起昨天杨戬呈予她的云镜之景，便已明白直健所说的姑娘是谁。那姑娘看着气质和自己不太一样，但容貌却有七八分相似，也难怪他会以为那姑娘是自己的转世。</p> <p>听杨戬语气有些生气，寸心扯扯他衣袖，对老六道:“多谢直健将军关心，这三界之大，有人容貌相似也不足为奇，寸心在西海一切都好。”</p> <p>老六知自己有些失态，人家作为敖寸心正儿八经的丈夫，心有不满亦在情理之中。他眼睛已经清晰起来，跟杨戬寸心两人道别后便驾云离开了。</p> <p>风拂过脸颊，老六突然开始同情起杨戬来。虽然杨戬很少在他们这些结义兄弟面前提起儿女情长，但结拜近两千年，他不可能不知道杨戬仍心系敖寸心。如今敖寸心再嫁，若杨戬知道了，恐怕比他还要难受百倍千倍。</p> <p>回去得跟那条傻狗还有其他兄弟说以后再也不能在杨戬面前提起三公主了，免得他伤心，老六心想。</p> <p>但老六不知的是，杨戬为了不让人发现自己与寸心暗度陈仓，在去招摇山之前已施了法术将自己变了个模样，只有戴着天眼项链的寸心和已开天眼的小龙看到的才是他的真容。</p> <br> <p>突然发现结义兄弟对自己的妻子怀有男女之情，杨戬心中实在不快，已无心再玩，但这个时候小崽子仍是兴致勃勃，他也只能强撑着陪这不知疲倦的小家伙玩到尽兴。又玩了半个时辰，小龙崽终于面露疲色，娇滴滴地要爹娘哄着睡觉。</p> <p>回到龙宫，杨戬腮帮子仍有些绷着，气鼓鼓的像只河豚。寸心抿着嘴偷偷笑了一下，决意不惯着他，自己寻了本书在榻上翻读。</p> <p>杨戬暗暗往寸心方向瞥去，见龙女仍沉迷于看书，哼哼几声，使劲把扇子抖开。他抖开扇叶的动静不小，想惹人注意的心思简直不能再明显了，可寸心置若罔闻，既没有来问问他怎么了也没有来数落他。</p> <p>忿忿地摇了一会扇子，杨戬见龙女丝毫没有搭理自己的意思，凑过去抽走了她的书，“寸心，你真没看出来?”</p> <p>寸心眨眨眼睛，似乎真的知道杨戬在说什么，“看出来什么?”</p> <p>杨戬眉头微微蹙起，神情染上了几分犀利，“老六他……他对你是别有用心的！”</p> <p>“我知道啊。”寸心悠悠说道:“可在外人眼中，我们都分开三百多年了，他要追求自己的幸福也没什么不对嘛。”</p> <p>“自己的幸福?你还想给他幸福?”杨戬霍然握住寸心双肩，双眸中顿生厉色。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/031212.酸甜一日.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,
