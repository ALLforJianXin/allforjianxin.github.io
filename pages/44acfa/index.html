x/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">演技天王<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>是一直以来想写的梗请避雷避雷避雷<br>
1、枭雄二（主要是这儿请避雷）<br>
2、老杨王母事业cb<br>
3、恋情曝光</p> <p>司法天神杨戬，一个八百年来都在黑暗中摸爬滚打的人。自从品尝到权利的滋味，他决心要抛开那些愚蠢的自傲，一步一步登上人生的巅峰。</p> <p>曾经被他所唾弃的、不懈的、要扔进臭水沟里去的东西，他折断自己的良知和尊严也要再次抓进手里。昔日靠耿介刚直和战场上的不离不弃、赫赫功勋积攒下的人缘与名声，统统付诸东流。他想要继续往上爬，站稳自己的脚跟，势必要将这些夺回来。为了权利，他算计自己的兄弟，算计自己的知己，就连相依为命的亲妹妹他也没有放过。</p> <p>所以他一边认认真真搞工作，一边两面三刀堵外甥，决心置之死地而后生，用舆论这只大手将自己推向三界的风口浪尖，也推向更加高大的宝座。别人看他被打得狼狈辛苦，但真君玩得其实很开心，精准地盘算着自己的棋局，讲出来的每一个字都恰到好处，既稍露破绽又不坏大局。</p> <p>他的这些野心都被王母娘娘看在眼里。同样野心勃勃的娘娘很是欣赏她这个手段狠辣智计无双的外甥，决心要将之收到麾下，让他成为自己手中最锐利的毒刀。于是两人联手，齐头并进。当整个三界的神仙都在为小情小爱扼腕叹息的时候，杨戬和王母在兢兢业业地夺权冲业绩。</p> <p>三界众仙在谴责杨戬六亲不认，天条冷酷无情的时候，杨戬和王母依旧在兢兢业业地夺权冲业绩。</p> <p>一切都进展得十分顺利，沉香小棋子在东躲西藏之中提高了不少战斗力，待他成长到勉强可以糊弄住大家的时候，网就可以收上来了。</p> <p>然而，意外总是存在于计划之中的。</p> <p>沉香同八太子一行人逃到了一处山头，山头上有个府邸，府邸名唤九龙居。府邸的主人是个龙女，瞧着敖春和自己是亲戚的份儿上，收留了他们。</p> <p>要说此事原本并不算是个多么大的意外，放在平常，司法天神一道军令，任它几个龙女，说没也就没了（说起来他已经搞死一个了）。但坏就坏在，此龙女实非普通龙女，打架的能力虽然并不强悍，却架不住她是司法天神养在下界的相好。</p> <p>倒也并不能说那是他相好的，早在八百年前，真君他老人家还没有上天去当官的时候，他还是一位为人称道的英雄。而这位龙族三公主，实打实地是人从西海龙王的水晶宫里明夺正娶的夫人。</p> <p>后来二人和离，劳燕分飞。婚姻虽不算太和睦，然感情毕竟由来已深，轻易割舍不绝。真君在接旨的第二天就十分后悔，以致后来的后来两人开始藕断丝连，此番暂且不表。</p> <p>且说杨戬不舍与发妻分离，为求相聚，将原本九龙山上的土地山神一并捉光，关进了山洞之中，设下阵法，好教他们无处逃脱。原本这事该天衣无缝，毕竟这九龙居是早在他做川主之时便建造的行宫，寻常人哪里敢冒犯？却不想他围追堵截恰恰算漏了自己的地盘，委实是一桩祸事。</p> <p>这阵法竟叫沉香误打误撞地几个寻着，使蛮力劈开了。那几个被锁了许多年的地仙灰头土脸骂骂咧咧地爬出来，只道此等大仇不报实非神仙，暴躁地绝尘而去，势必告他杨戬一状。沉香在一旁听得有些糊涂，但好歹明白了大概，极其惊异自个儿那位冰块似的舅舅居然也会暗地里养女人。</p> <p>八太子咬牙切齿道这个家伙居然也会有今天，转念一想此番也连累了那位龙女姐姐，一时之间不知该喜该急。几人没了主意，小玉摇摇沉香的胳膊道：“沉香，现在怎么办啊？”</p> <p>沉香一摊手道：“我也不知道，”他转过去看了看身后的山头，“我想咱们还是先告诉寸心姐，带她跑路要紧。”这事儿实在太巧，谁能想到逃难还能半路翻出个他老舅的密辛来。</p> <p>当是时，司法天神大人正在和玉帝舅舅下棋，王母则在一旁和谐地观战，场面正是一派“其乐融融”。忽然瑶池外一阵喧哗，守卫来报说有几个狼狈不堪的地仙拼了命地哭爹喊娘，说要状告司法天神知法犯法，私养情人。</p> <br> <p>真君捻棋的指尖一抖，随即若无其事地放下，像模像样地皱起眉头，朝下训斥了一声：“放肆！”他抖抖银纹金绣的盘龙大麾起身，优雅地抬起他尊贵的下巴，角度邪肆又不失帅气，“灵霄宝殿之内，也容得你胡言乱语？”语气是他一贯的官腔，委实抑扬顿挫，阴阳怪气又不失魅惑威严。</p> <p>“真君大人……不是……不是小仙说的啊……”小侍卫果然被吓得抖了三抖。</p> <p>“陛下，娘娘，”杨戬又转过头来，下两步走到阶下，使他恰好比坐着的玉帝低了一个头。他瞪着自己水汪汪的大眼睛，长睫毛恰到好处地眨了一眨，表情早就切换得无辜又可怜，“小神冤枉，还请陛下娘娘给小神做主！”说到“做主”一词时适当地带了几分咬牙切齿，又因玉帝在场强忍着的悲愤情绪，简直是将演戏把握得炉火纯青，实在叫人叹为观止。</p> <p>（我真的不是二哥黑粉哈哈哈哈）</p> <p>玉帝还在迟疑，早有一旁的王母替爪牙推波助澜：“陛下，此等大逆不道的地仙，分明是胡说八道！待臣妾去审问，到底是哪个居心叵测的东西，要陷害司法天神，毁他清誉。”杨戬在一旁汗颜，此话实在不要脸至极，他自个儿都说不出口，实在是难为娘娘。</p> <p>玉帝点点头，挑眉许了。</p> <p>王母雍容典雅地笑了一笑，实则快将银牙咬碎，路过杨戬身边时不动声色地暗暗拖起他就走。</p> <p>娘娘摒退四周，留着杨戬听审。在地仙们一把鼻涕一把泪地诉说自己的遭遇后，王母疾言厉色地一锤定音直接按罪，一头叫值官报予玉帝说只是私人的旧日小怨，一头随手将几个地仙打入了天牢。</p> <p>做完这些事情以后她狠狠地瞪了眼向杨戬，后者不禁狠狠打了个寒战。</p> <p>娘娘把手里的告发信摔在杨戬脚下。这事儿还真是气人，她喘了半天气，指着杨戬咬牙切齿：“把你的那点儿私事，给我、处理、干净！”</p> <p>真君晓得再辩解没有意义，连忙低头拱手做惶恐状：“是，娘娘，小神知错，小神再也不敢了娘娘。”他的金眼线此刻闪出的都是委屈的光芒，“求娘娘饶了小神这一次，小神真的知错了。”如果不是人设限制，杨戬还想挤出几滴眼泪以表忠心。</p> <p>王母只觉一拳打在棉花上，气还真气不起来了，“下次再犯，我可保不了你！”</p> <p>“是，小神不敢了娘娘。”杨戬已知事情了了，低着头暗自一笑。小神说笑的，下次还敢。</p> <p>以至于后来天廷人人知晓，司法天神只要到娘娘跟前卖一卖萌，多大的罪都能赦免，这就是后话了。</p> <p>真君跑到下界去处理自己的“私事”，寻到敖寸心的时候，三公主一点没顾及两方对峙的处境，大大方方地扑到了杨戬怀里。杨戬顺手搂过她，还不忘顺势瞪了一眼对面一脸八卦的外甥。</p> <p>然此事之后九龙居是住不得了，杨戬忍痛将自己的小龙女送回西海，这大概也是沉香后来越来越惨的原因之一。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/030222.演技天王.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/808f1a/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">小师妹</div></a> <a href="/pages/86304d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">带话</div></a></
