--> <div class="theme-vdoing-content content__default"><h1 id="《十字坡》"><a href="#《十字坡》" class="header-anchor">#</a> 《十字坡》</h1> <h2 id="我们回家"><a href="#我们回家" class="header-anchor">#</a> 我们回家</h2> <p>新天条一出，那些因为情爱而受罚的仙女宫娥们都得到了宽恕。真君神殿桌上，奏折里写着密密麻麻的名字，七公主、八公主、三圣母……杨戬一个一个审核，生怕有什么遗漏。可偏偏奏折看完了，最想看到的那个名字却不在其中。为什么没有她呢？努力了几十年，因为她让自己把爱和遗憾留给三界众生。为什么？新天条已经出世，为什么还是救不了她？</p> <p>凌霄宝殿上，他问：为何赦免之人中没有敖寸心的名字。王母却说他公务繁忙头脑糊涂了，敖寸心被禁从不是因为情爱一事，几百年前她就与他解除了婚约，是一个人了。敖寸心是违抗圣旨被罚，即使是按照新天条也是不能赦免的。</p> <p>他愣住。当初，寸心因为他一千年没有回西海。现在，寸心还是因为他，为了保住他司法天神的位子，几十年不得出海。</p> <p>他不知道寸心现在怎么样了，只知道她在西海禁地。几十年了，没人进去过，没人知道她是不是还活着，如果活着，活得怎么样，是不是瘦了……她已经不再是龙族公主了，普通龙族的寿命也没那么长。她，还好吗？</p> <p>无论如何也是要为她求得一旨赦免的，他欠她太多，如今又怎能安心让她一个人留在那西海禁地受苦。</p> <p>等他拿着圣旨到了西海岸边，正是八月十五夜里。八月十五，八月十五。是他们结亲的日子，也是他接下司法天神一职，她跌跌撞撞回家的日子。现在，他为她求得赦免来解救她，却也是八月十五。小时候，母亲说，八月十五是月圆之日，也是一家人团圆之日。他和寸心的第一个八月十五，是团圆，他和寸心的第一千个八月十五，却是分离。那么，这次呢？</p> <p>他随着虾将军来到西海禁地。这地方好冷啊，好静啊。那一千年里，每个夜晚，寸心都是紧紧靠在他怀里睡觉的，她怕冷。而他，即使白天再生她的气，晚上总是不愿看她一个人缩成一团。她有时候也会赌气，不让他抱，他总是叹口气，轻轻抚着她的头发，一下一下，等她不闹别扭了，将她搂进怀里。</p> <p>如今，这个地方，她，是怎么挨过来的？</p> <p>他不敢再想，急急踏进那个低矮的小房子里。</p> <p>她安静地坐在一方小桌前，听到有人进来身体颤了一下，却没有回头。</p> <p>“寸心”他声音有些颤抖，“我来接你回家了”</p> <p>闻言她回过头，眼中有光也有泪。她还是那身绯色，是西海初见时那身，也是西海诀别时那身。可是，她瘦了，她的脸孔也没有以前那么精致了。原来，没了法力的普通龙族，是会老的。</p> <p>如今的她越发像一个成熟妇人。也好，他也早不是那个意气少年了，现在的他们还是很相配，就像一千多年前一样。</p> <p>他走到她身边，牵住她的手，将她搂进怀里。</p> <p>他感觉到有泪滴在他的手上，却不知道是她的还是他的。他听到自己声音有点哽咽， “寸心，我们回家。”</p> <h2 id="我们的家"><a href="#我们的家" class="header-anchor">#</a> 我们的家</h2> <p>寸心似乎太久没出海了，刚踏上岸边的沙滩就差点摔倒，幸好身边有杨戬在，她终于不用像在禁地里那时一样一个人晕倒，然后不知道躺上多久，再一个人醒来。</p> <p>远处一位老妇缓缓走来，寸心见她，亲切地喊了一声“龟婆婆”。龟婆婆看了杨戬，又对寸心说“那两三百年里，你日日在这海滩上坐着，等的，就是这位？”杨戬一愣，原来，接旨后的那几百年，她一直枯坐在海滩上想他么。寸心……</p> <p>“婆婆，过去的事情，就不要再说了。如今，我好好的。”</p> <p>“平安就好，平安就好……”</p> <p>寸心没想到，杨戬会带她回灌江口。</p> <p>“屋子不是搬上天做真君神殿了么？”</p> <p>“寸心，我说过接你回家，这里永远是我们的家。”</p> <p>许多话已无需再说，她都明白。他心中有她，他如今已是三界的大英雄，还能想着她。那她有什么理由逃避？那一千年，是她爱错了方式。如今，他们终于有机会重来，她不会再让心爱的人失望。</p> <p>日子一天天地过，寸心自从被关在西海禁地之后身体似乎大不如前了，总有个小病小痛。为此，杨戬每天下朝之后还去药神那里寻几味补药带回灌江口家里替寸心调养身子。</p> <p>“寸心，等你再好一些，我就去西海提亲。从前，是我莽撞了，让你一千年都不能回家看看，这次不会了。”</p> <p>寸心愣了一下，靠进杨戬怀里。他这么替她着想，她怎能不欣喜。</p> <h2 id="孩子"><a href="#孩子" class="header-anchor">#</a> 孩子</h2> <p>这种悠静的时光一天天地过，杨戬每天处理完奏折就和她待在一起，喝茶谈天。寸心被杨戬每日带回的补药滋养得面色红润，气色比刚出海时好了很多。</p> <p>这天是八月初，杨戬在喝茶时对她说“寸心，这月十五我们成亲可好？明日我便去西海向你的父母兄长提亲。”寸心闻言，脸上一红，低头啜茗不语。杨戬轻轻将她揽进怀中，左手执扇缓缓摇着。</p> <p>又是八月十五，又是一身鲜红的嫁衣，与一千多年前不同的是，这次她的父母兄长都来了，与他同朝共事的各路仙人也来了。她的第二次婚礼，和第一次一样，三界皆知。</p> <p>入夜，寸心坐在床边，透过红盖头她看见杨戬推门进来。他今天很高兴，她的兄长们故意灌他酒，他也尽数喝下。待他走进，身上却毫无酒气，眼神也清明。即使是隔着盖头，她也能看见他眼中盈盈笑意与温柔。</p> <p>那千年婚姻中，她与他不曾有一个圆满的洞房花烛，这一次，他和她都不想再留遗憾……</p> <p>不知怎的，自入冬以来，寸心在吃食上又不像前几月那样有胃口了，时不时还会干呕。杨戬放心不下，下了朝便拉着药神来到灌江口替寸心好好诊断一番。</p> <p>药神略一搭脉，心中便一清二楚。他捻着胡须，笑着对二人说“恭喜真君，恭喜夫人，即将为人父母。”</p> <p>寸心听了一愣，接着便险些落下泪来。这个一千年前就盼着的孩子，终于来了。</p> <h2 id="悲秋"><a href="#悲秋" class="header-anchor">#</a> 悲秋</h2> <p>从前一千年都是她为他洗手作羹汤，如今倒变成了杨戬照顾她的饮食起居，自从得知她怀孕，杨戬更是变着花样地准备吃食，嘘寒问暖无微不至。她虽偶尔身体不适，也被杨戬悉心调养总算没有大碍。</p> <p>孕中的日子，说慢也慢。她第一次做娘亲，腹中的孩子更是盼了一千年才盼来的，她便焦急地希望孩子快些长大快些出生，让她和杨戬好好体会一番做父母的喜悦。</p> <p>怀胎不过十月，即使寸心着急，这时光也是很快过去了。灌江口的景色也从满枝翠绿变成了秋叶金黄，寸心的产期就是这两日。</p> <p>偏偏这月余寸心疲乏得很，不知道是不是月份大了身子变重，她时不时就需要躺下休息，一天十二个时辰里有时竟能昏睡七八个时辰。杨戬也问过三妹，三妹说是妇人怀孕总会疲倦，寸心嫂子又在西海禁地那极阴寒的地方待过，身子不比以前，容易困倦也是正常的。</p> <p>这天夜里寸心睡得极不踏实，杨戬看她眉头紧缩嘴里呻吟出声，便急急叫了哮天犬去请产婆来家里候着。</p> <p>寸心似乎废了好大力气才从睡梦中挣醒过来，却觉得腿间一片濡湿，她轻呼出声。杨戬见了便知她这是要生了，急忙唤产婆进来帮忙。他本来是想留着房里陪着她的，寸心却说不想让他看见自己生产时的样子，他不好逆着她，便站在房门外等候。</p> <p>屋中寸心低低的呻吟声听着那么真切，他仿佛能看到她满头汗水挣扎用力的样子。也不知过了多久，天边已经泛青，屋内传来一声凄厉的喊叫。可是随之而来的确实一片寂静，他慌忙推门进去。产婆见他进来，要替寸心盖上被子的手竟忘记了下一步动作，就那么悬在那。</p> <p>她就那么躺在床上，身上的衣服被汗水浸湿。她的肚子还是高高隆起，安静地躺在床上就像前几日那样只是睡着了。可是，她的身下好多血。他杨戬活了近两千年，参加过那么多战役，战场上，不论是他的血还是敌人的血，他从来没有在意过，可是今天，他好怕。</p> <p>杨戬脚步踉跄地走近，接过产婆手中的被子替寸心盖好。手抚上她的脸，还是热的。他又颤抖着去探她的鼻息，却什么也没有。</p> <p>产婆悄悄退出去了，屋里就他们两人。杨戬眼中酸涩，却没有泪落下，他就这样跪坐在床边，紧紧地搂着寸心，不发一言。</p> <h2 id="十字坡"><a href="#十字坡" class="header-anchor">#</a> 十字坡</h2> <p>怀中的身子一点点冷下去，直至冰冷。杨戬抬起头，窗外已是一片大亮。他取了一盆热水来，替寸心擦拭，又亲手替她换上平日里最喜欢的罗裙，一切都很自然，就像寸心怀孕之后动作不便，他每日替她做的那样。他又细心替她盖好被子，独自一人出去了。</p> <p>这是他第几次来十字坡了？他也记不清了。只记得上次来的时候是刚知寸心有孕，他便带着她来向爹娘大哥报喜。这次呢？却是替她的妻子孩儿添一座新坟。其实是两座相依的坟。他和她千余年的夫妻，死后葬在一起也是理所应当。</p> <p>他只当她是提前去找爹娘大哥了，带着孩子一起。爹娘见到这么娇俏的儿媳，想必是很高兴的。</p> <p>再从十字坡回来，他已向天廷辞去司法天神的职务，独自坐在灌江口那一方小院里，也不知在想些什么。</p> <p>他这样神情恍惚也有数十日了，这些天里他脑子里便将那纠缠不清的千余年又重现了一遍。她的哭，她的笑，她的疯狂，她的痴缠，还有这几年中她的清静温柔。</p> <p>这天，他却在朦胧之间看见寸心从院子一角向他走来，怀中还抱着一个婴儿。她朝他温柔地笑，她怀中的孩子似是睡着了，不哭不闹的。她慢慢走近了，他想伸手去揽她，却落了个虚空。这种感觉他是有过的，就在那几百年前的西海岸边，他想再拉她的手，却什么也握不住。</p> <p>心中一阵强烈的虚无和痛苦竟让他咳出一大团血，他好似被抽干了周身所有力气，跌坐在椅子里，昏昏沉沉地闭上了眼睛。</p> <p>不过半月光景，十字坡上两座相依的新坟便相继填好。坡上有一只黑色老狗，无精打采地趴着，似是睡了。</p> <h2 id="千年修-视频"><a href="#千年修-视频" class="header-anchor">#</a> <a href="/pages/d32e83/">千年修（视频）</a></h2></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/012215.十字坡.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%8F%8C%E4%BA%A1%E4%B9%9F%E6%98%AFHE" title="标签">#双亡也是HE</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><!----> <a href="/pages/71b758/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">作</div></a></div> <div class="page-nav"><p class="inner"><!----> <span class="next"><a href="/pages/71b758/">作</a>→
