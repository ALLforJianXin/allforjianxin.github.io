fdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">浇花<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>杨戬下朝的时候，敖寸心正在浇花。</p> <p>敖寸心听见身后重重一声“哼”，回头果不其然就见那人一张臭脸，嘴撅得快能挂上油瓶了。<br>
龙女忙放下手里铜花壶，正要转身，眼轱辘一转想起昨日自己做小伏低到现下身上还有些酸困，便又改了心意，重拎起铜壶扒开叶片仔仔细细浇透水。<br>
杨戬枯等半晌又哼了好几声，那龙女却全神贯注于手下的丁香花儿，对他不闻不问。<br>
这要是搁三百多年前，杨二郎定是要拂袖转身挥挥手不带走一片云彩离家打个猎或者喝个闷酒的，但现如今他不会了，毕竟多少年忍辱负重沉浮宦海，能屈能伸的功夫早修炼得出神入化。</p> <p>“小殿下好雅兴。”杨戬的声音再响起时已经贴近到了敖寸心耳边。几步间他早散了冷冰冰的朝服铠甲，换一身柔软丝滑常服，黑地上遍开着曲折缠绵的暗花，“你对这花好上心呀。”<br>
敖寸心一边跟在自己身上作乱的一双大手作斗争一边嗔道：“小心点，她可关系着我东海八弟的终身幸福！”她自然不是没听懂他言下之意“你对这花都比对我上心”只是忌惮他凶器故意不想接茬儿，挣扎未果放软身段求饶道，“这花还是你给我的呢。”暗示“上心”中也有一部分他杨二郎的缘故哩，杨戬听得这话却恍惚了一瞬。</p> <p>那确实是他交给她的。<br>
三百余年“从长计议”在瑶池中刀指玉帝那一刻转了向，自那日后他行事愈发急切甚而有些不择手段，拿自己外甥做棋子恨不能将满天神佛都算计在内，何况一株小小的丁香，牺牲便牺牲了他不曾后悔，但面对那张脸，他确实在刀尖没入她胸口的时候，有些心痛和心慌。<br>
大难不死的杨二郎伤还没养好就迫不及待去西海接回了龙女，龙女听说当年那束丁香被他如此利用好一顿咂舌，听到她八弟敖春那节儿狠锤了他几下，责令他还她一个全须全尾的八弟妹，最后他求助了师傅才有了这么个法子。</p> <p>水浇完了，敖寸心一手抚摸着丁香粉白杂间的花团，另一手抬起去摸杨戬的下巴，问他：“你说，敖春能追到赵小姐吗？”<br>
杨戬拿下巴在她手心里蹭了蹭，先答一句“不知道”，反问她：“那我的幸福呢？”</p> <p>——敖春的幸福你日日兢兢业业，我杨戬的幸福呢？</p> <p>敖寸心被他扳回身，正面对他，看清他面上委屈眼里哀求，不禁哑然失笑，想打趣儿一句“多大的人了，跟小年轻争风吃醋。”似是回忆起什么打住了话头，出口的变成了：“你的幸福有我呀。”<br>
这便是点燃炸药的火花了。</p> <p>敖寸心只觉得场景飞转，定下来之后发现自己已然躺在了卧室榻上，暗叫一声“着了道儿了”，手忙脚乱去推他：“好二爷，今儿可饶了我罢。”那人轻搂住她一边任她踢打一边儿软话哄她：“今天你歇着，我来伺候你。”对着这样诱人条件和绝世容颜龙女实在是无法再说出更多拒绝话语，只好再嘱咐一句：“你轻点儿呀。”<br>
杨戬轻轻答了声“嗯”，帮龙女先去了珠钗，再凑近她面庞，在那软软唇瓣上叠上自己的。</p> <p>既应承了龙女，杨戬自然极尽轻柔，好一阵浅吻轻啄。浅吻轻啄间敖寸心早被剥了个赤条精光，睁眼一看他还裹得严严实实，不禁皱眉抗议，人振振有词要“先伺候好小殿下”，仍是不紧不慢，让热吻在她皮肤上一寸寸蔓延。<br>
唇爬过粉颊舌舔过耳垂，顺着细白颈项一路向下，在锁骨处打几个转儿，再攀上饱满结实的乳峰。龙女情动起来馥郁芳香，杨戬埋头在她胸前，两团软肉软绵绵滑腻腻吃个没够，一手捻住一边朱果再含住另一边，用干燥微粗的手指和湿软灵活的舌头同时描着形状，间或一吸，几乎将她的理智都吮了去。<br>
待事后理智回笼龙女定要恨自己记吃不记打，但现下是顾不上那些了，只觉得身上被他流连过的地方愈发敏感，胸前两点高高翘起，更似乎能感觉到卧室内并不存在的风。</p> <p>杨戬仔仔细细吻遍龙女全身，双脚也不放过，挨个吮遍那十个圆润的脚趾，敖寸心听到自己的声音，呜呜嘤嘤不成节奏，不需要触摸也知道花径里有多湿滑泥泞，还有股间难耐的酸胀酥麻，搅得她不得安宁。两条修长小腿试图交叠在他背后再绞紧一些圈住他，却因着衣料打了滑，发起性儿抬腿去踹他，反被他抓住脚踝两边一分，她还没来得及为自己中门大开挂上些羞色，他一猫腰直闯进来。<br>
“啊——杨戬——”<br>
戬字的尾音还在转，风急浪高就要将小船儿打翻。</p> <p>两千年爱恋缠绵，她身上的每个细节杨戬几乎都烂熟于胸，偏这花径从前只道用胯下凶器深耕，今日才收获如酒如蜜的仙液琼浆，饮得人如醉如痴，如上巫山，如赴高唐。<br>
软肉搅在下身搅得龙女灵海中一浪更比一浪狂，刚才急切切吮肿了花核，下一刻又蛮横探进了花径溪涧，拉拉扯扯，蹭得她好痒。新奇又诡谲，潮涨出去不住地涌向全身却丝毫降不下水位，敖寸心勉力夹紧双腿忍不住微微轻颤。去推他没能将人推拒反而在扭动间更凑近了些，将自己更送到他面前。又羞又急的龙女胡乱撑起身子，被他紧把住两瓣臀肉施展不了，被迫看他埋首在她两腿间咕啾咕啾吃得喜欢。</p> <p>“杨戬……”她声也颤。<br>
他倒好，得了便宜还要卖乖巧：“小殿下只管歇着莫挣动。莫非……莫非是小神伺候得不够好吗？”说话间略离了毫厘，只毫厘到气息还喷在花心上面。<br>
想啐他的一句“荒唐”又被阵水头冲了散。</p> <p>就快到极限。</p> <p>“好寸心，莫光顾着浇花，也浇浇我嘛。”<br>
说得什么混账话！可怎么就失了自制，决了堤坝？<br>
阵阵热浪打湿了杨二郎满头满脸，打湿了衣服打湿了发，坏心眼儿的郎君趁浪潮愈战愈勇不带停歇，所幸不愧龙神水丰，绵绵延延不断不绝。</p> <p>那日最后是睡过去了还是昏过去了敖寸心也分不清，只记得后头她一浇花他也要缠着她“浇花”有点恼烦。至于丁香花得道飞升再不需要她浇了之后会怎样，那就是后话了，下次再谈。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/87.短篇-2021/092000.浇花.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/c6746b/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">相见</div></a> <a href="/pages/05ff4b/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">小别</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
