天就家去了！再也不占着你杨府的半分便宜！”她越说越伤心，本来想强忍着不肯在他面前漏了怯，可惜这郎君的面目愈是可憎，却又愈是叫人惦念。一想到就要与他千千万万年的分离，竟不愿再顾忌什么体面，只想扑在他怀中狠狠地哭上一场，前嫌尽释，再也不提那些教人伤心的事情了。</p> <p>二人中间的烛火仍燃得葳蕤，二郎真君透过这烛光看她的脸，想起她方才孤零零一个人看着灯烛垂泪的模样，心中绞也似的痛，一时情切，一把握住她的手，期期艾艾地说道：“你也还念着我的是不是？那些话只是说出来气我的是不是？寸心，我错了，我错了，我们不要分开，我不要和你分开。”</p> <p>寸心怔愣间，已被他揽入胸怀。他的怀抱一如既往地温暖，灼灼热度快要将她点燃，驱散了这长夜的凄清。她轻轻地咬住唇，可惜眼泪早已不争气地扑扑簌簌滴下，无声地落在他的肩膀上。一时间，心里的委屈好像打开一个阀门，汹涌而出，她小心翼翼地抱住杨戬，紧紧攥着他的衣带，忍不住小声啜泣。</p> <p>二郎真君听在耳中，心里愈发地不是滋味，忙将龙女抱着，连声地道歉。寸心轻轻靠在他的肩上，听他或急或徐的言语，并不做声，只是眸光透过满眼的泪水照进寒色的庭院里，高大的梧桐树上挂满了竹制的风铃。当年她初次到杨府时，已是待罪之身，虽满心相信杨戬能够保护她，但心里的惶恐与陌生不安却一点都做不得假。每当夜深人静时，杨戬碍于男女大防不愿唐突而无法陪伴在她身边，只有梧桐树上竹制风铃钝钝的撞击声能教人安心下来。</p> <p>从那以后，每数年间旧的风铃腐化，她也从不嫌麻烦，催着杨戬手制新的小竹筒子，她将之穿好了，夫妻二人一同挂回树上。那时他们的感情最好，龙女会特意为他们的新风铃刮一阵风，然后在树下，伴着风铃声，轻轻地靠在丈夫肩头，犒劳他一日的辛劳。</p> <p>便是有几句争吵，换这风铃的日子却必然雷打不动，并不能推，那时他们会在树下拥吻，真君轻声向她赔罪，而她从来也包不住眼泪，一面哭，一面在他怀中闹将一阵，捏着小拳头直往他胸膛上捶。闹够了，哭过了，再大的仇也揭过了，彼此又能你侬我侬，和好如初。</p> <p>杨戬见她还肯抱着他，一时间心软得一塌糊涂，却又止不住地发慌，他颤着手抚摸她娇嫩的脖颈，声音也有些发颤，“我是不是弄疼你了？我，我不是故意的……寸心，我错了……”</p> <p>他将手环过龙女单薄的后背，做出一个绝对占有的姿势，身体崩得紧紧的，稍分开几寸去擦她的泪，对上她如酥雨洗过一般的眼睛时，眼尾也忍不住红了。忍受不了离别，再如何理智的人，临了了对上她，还是敌不过一句舍不得。杨戬舍不得断开他们的姻缘，舍不得她，舍不得这样有血有肉活色生香的日子。或许他再努力一些，做得再好一些，他们还是可以继续下去的吧？</p> <p>倘若不能，就这样浑浑噩噩地在一起，又有什么不好？只剩下他们两个人又有什么不好！</p> <p>寸心一时间也被他眼中的波澜打动， 在心底里轻叹了一口气，料想这漫漫的长夜，无数时辰，雨化春风，再多挣些相伴的时日，或许往后也能少去几分遗憾。真君热切的气息洒在她的面颊上，龙女怔怔地揪着他的衣带，被迫承受他急迫而粗鲁的亲吻。</p> <p>被他啃痛了，寸心皱着眉，实在忍不住捶他：“你轻一点！”</p> <p>杨戬顿感心喜，从善如流地贴住她的面颊，蹭了又蹭，温热又细腻的肌肤就在他身边，几乎没有一丝距离。他努力地再贴近她一点，立即换来一个小拳头，抑或一声娇呵。龙女此时就在他的面前，在他的怀中，或许那时的气话真的不能算数，他们就从此刻开始长长久久地留在这个地方，不理什么王母，不理什么西海，再也不出门去，每日缠绵，这样不好吗？</p> <p>空中云层密布，黑压压地透不出一点星光来，人心也在这样浓重的夜色里肆意地滋长着私欲，头脑昏昏沉沉地，一路跌跌撞撞走到卧房去，寸心皱着眉，还是忍不住哼出声来——他的动作太粗暴了，胸口的衣襟被胡乱地撕开，一片狼藉，点点红梅在她雪白的肌肤上绽开。卧房中不曾点灯，她的躯体在黑暗中白得煞是耀眼，杨戬感到手中的嫩乳软得很不像话，把他一身的傲骨都折尽，屈居于这汹涌的波涛当中。</p> <p>每当此时都要感慨，让他死在这里好了，醉西施之言诚不欺我，牡丹花下死，是做鬼也风流。</p> <p>寸心忍不得他粗粝的手指在腿心穴口处粗鲁的挑逗，一口咬在郎君肩膀上，身体却诚实地喷出许许多多水来，怪道杨戬一直调侃他海中公主出身生来多水，二人胯间教她流得滑溜溜的一片，他那大家伙挤入两条玉腿间，急不可耐地便去顶那花蕊，龙女狠狠地咬他一口，啐道：“那么急！死酒鬼倒也顾一顾你老婆死活，我却要疼死！”</p> <p>杨戬吃着她的娇乳囫囵道：“老婆……老婆……”他昏昏沉沉地说荤话，“好老婆平白胡说，哪一次不是把你干得爽死！”说罢令拇指曲起，直摁在花蕊出那颗充血肿起来的豆子上用力一撵，被男人压在身下的小龙尖叫一声，声音登时被他搞得软下 p> <p>他平稳而绵长的呼吸打在裸露的圆肩上，寸心一阵瑟缩，稍向丈夫的怀中依偎一些，杨戬未曾惊醒，兀自酣睡，睡梦中从善如流地拥她更近。</p> <p>寸心轻轻地一叹。</p> <p>就这样过下去吧，算得一天是一天。龙女细细打量着丈夫过分英朗的眉眼，掌心传来他炽热的爱意，心中暗暗想道。</p> <p>总是舍他不下的。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/043000.故来相决绝.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/8beac8/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">据说真君又跑去西海了</div></a> <a href="/pages/b15244/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">知味</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
