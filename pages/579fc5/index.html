n+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">故来相决绝<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>关于砸东西闹离婚以后为什么过了很久才真的离……</p> <hr> <p>那时风波频起，夫妻二人也互道过许多恩断义绝，杨戬纵使是百般的不舍，可是听了她那些戳人心肺的狠话，总将一颗放她家去的决心拿起又落下。这日出了门去，在街头的酒肆中坐着，闷吃了几碗烧酒。一个扎着两颗丸子的小童在街对面探头探脑地，摸了半天，走到杨戬身边问道：“请问您是不是城西江头杨府的杨二爷？”</p> <p>杨戬一愣，答了声是。又听小童道：“上旬您夫人曾在我家订了一百二十匹新布，约定季月癸未日送到您府上。可是我家阿祖与阿爹前去进货，至今未归。阿娘恐误了时日，特命我来与爷说明，倘使退货或赔付，请爷至家去商议。”</p> <p>杨戬见他年纪尚幼，言语清晰，问了几句书，又说并不妨事，遣他家去了。这时忽想起季月二十六，乃是他的生辰，杨府中哪里又缺了吃穿，要劳动杨夫人亲自去买布？想到此处，一时间心内隐隐地跃动，酒也不及吃了，眼见日头西斜，结了账即奔回家去。</p> <p>灌口江边的风瑟瑟而起，吹得杨府门前那一片杨柳树沙沙做响，杨戬走到街口，远远地望见家中隐隐约约泛出暖黄色的光，一时心中倒泛起涟漪。前日里二人才闹了个不快，将前堂砸得破败不已，她想是心急，也想是早已忍受不了同他困在灌口的窝囊日子了，终于把心里的话说了出来。</p> <p>“你折磨我一千年了。”</p> <p>杨戬有些颓然地坐在家门口的石阶上，看着簌簌的夏风吹起落叶，在墙角一卷，又一卷，最后仍落回泥土里。他徒然生出的勇气至此又像这落叶一般飘回了泥土里，或许从今往后便要在泥地里腐烂枯死。话已说出了口，又怎么是轻易抹得去的呢？她否定了这么多年两个人的感情，尚且伤人甚深，他却也脱口而出已应诺了王母娘娘要和离上天去做官，她不会再原谅他了吧？</p> <p>不知不觉天已经全然黑了，杨戬轻手轻脚地推开门走进去，只见堂中大亮，寸心独自一个人坐在厅中，握着一盏茶，却不饮，呆呆地看着方桌上一支跃动着的烛火。</p> <p>这时夜深人静，犬也不曾吠，她单薄的身影孤零零一个坐在空旷的屋子里，纵使堂内灯火通明，可映着窗外冷色的院子，甚属凄清。杨戬一时间将心狠狠地纠在一处，攥紧了拳头，真恨不得打自己两个巴掌。他是怎样做的丈夫？怎样照顾他的妻子？怎么竟教她那么伤心呢？</p> <p>胸中顿时生出无限的勇气，显圣真君拔步往堂中走去，那厅上的龙女闻得脚步声响，慌忙地别开脸去揩走挂在眼睫上的泪珠，见他直登登径往对面落座，显是一愣，随即气得心肺也生疼，</p> <p>“你做什么？还没吵够架，还是来索我赔你的风铃？既然要休了我，我明天就家去了！再也不占着你杨府的半分便宜！”她越说越伤心，本来想强忍着不肯在他面前漏了怯，可惜这郎君的面目愈是可憎，却又愈是叫人惦念。一想到就要与他千千万万年的分离，竟不愿再顾忌什么体面，只想扑在他怀中狠狠地哭上一场，前嫌尽释，再也不提那些教人伤心的事情了。</p> <p>二人中间的烛火仍燃得葳蕤，二郎真君透过这烛光看她的脸，想起她方才孤零零一个人看着灯烛垂泪的模样，心中绞也似的痛，一时情切，一把握住她的手，期期艾艾地说道：“你也还念着我的是不是？那些话只是说出来气我的是不是？寸心，我错了，我错了，我们不要分开，我不要和你分开。”</p> <p>寸心怔愣间，已被他揽入胸怀。他的怀抱一如既往地温暖，灼灼热度快要将她点燃，驱散了这长夜的凄清。她轻轻地咬住唇，可惜眼泪早已不争气地扑扑簌簌滴下，无声地落在他的肩膀上。一时间，心里的委屈好像打开一个阀门，汹涌而出，她小心翼翼地抱住杨戬，紧紧攥着他的衣带，忍不住小声啜泣。</p> <p>二郎真君听在耳中，心里愈发地不是滋味，忙将龙女抱着，连声地道歉。寸心轻轻靠在他的肩上，听他或急或徐的言语，并不做声，只是眸光透过满眼的泪水照进寒色的庭院里，高大的梧桐树上挂满了竹制的风铃。当年她初次到杨府时，已是待罪之身，虽满心相信杨戬能够保护她，但心里的惶恐与陌生不安却一点都做不得假。每当夜深人静时，杨戬碍于男女大防不愿唐突而无法陪伴在她身边，只有梧桐树上竹制风铃钝钝的撞击声能教人安心下来。</p> <p>从那以后，每数年间旧的风铃腐化，她也从不嫌麻烦，催着杨戬手制新的小竹筒子，她将之穿好了，夫妻二人一同挂回树上。那时他们的感情最好，龙女会特意为他们的新风铃刮一阵风，然后在树下，伴着风铃声，轻轻地靠在丈夫肩头，犒劳他一日的辛劳。</p> <p>便是有几句争吵，换这风铃的日子却必然雷打不动，并不能推，那时他们会在树下拥吻，真君轻声向她赔罪，而她从来也包不住眼泪，一面哭，一面在他怀中闹将一阵，捏着小拳头直往他胸膛上捶。闹够了，哭过了，再大的仇也揭过了，彼此又能你侬我侬，和好如初。</p> <p>杨戬见她还肯抱着他，一时间心软得一塌糊涂，却又止不住地发慌，他颤着手抚摸她娇嫩的脖颈，声音也有些发颤，“我是不是弄疼你了？我，我不是故意的……寸心，我错了……”</p> <p>他将手环过龙女单薄的后背，做出一个绝对占有的姿势，身体崩得紧紧的，稍分开几寸去擦她的泪，对上她如酥雨洗过一般的眼睛时，眼尾也忍不住红了。忍受不了离别，再如何理智的人，临了了对上她，还是敌不过一句舍不得。杨戬舍不得断开他们的姻缘，舍不得她，舍不得这样有血有肉活色生香的日子。或许他再努力一些，做得再好一些，他们还是可以继续下去的吧？</p> <p>倘若不能，就这样浑浑噩噩地在一起，又有什么不好？只剩下他们两个人又有什么不好！</p> <p>寸心一时间也被他眼中的波澜打动， 在心底里轻叹了一口气，料想这漫漫的长夜，无数时辰，雨化春风，再多挣些相伴的时日，或许往后也能少去几分遗憾。真君热切的气息洒在她的面颊上，龙女怔怔地揪着他的衣带，被迫承受他急迫而粗鲁的亲吻。</p> <p>被他啃痛了，寸心皱着眉，实在忍不住捶他：“你轻一点！”</p> <p>杨戬顿感心喜，从善如流地贴住她的面颊，蹭了又蹭，温热又细腻的肌肤就在他身边，几乎没有一丝距离。他努力地再贴近她一点，立即换来一个小拳头，抑或一声娇呵。龙女此时就在他的面前，在他的怀中，或许那时的气话真的不能算数，他们就从此刻开始长长久久地留在这个地方，不理什么王母，不理什么西海，再也不出门去，每日缠绵，这样不好吗？</p> <p>空中云层密布，黑压压地透不出一点星光来，人心也在这样浓重的夜色里肆意地滋长着私欲，头脑昏昏沉沉地，一路跌跌撞撞走到卧房去，寸心皱着眉，还是忍不住哼出声来——他的动作太粗暴了，胸口的衣襟被胡乱地撕开，一片狼藉，点点红梅在她雪白的肌肤上绽开。卧房中不曾点灯，她的躯体在黑暗中白得煞是耀眼，杨戬感到手中的嫩乳软得很不像话，把他一身的傲骨都折尽，屈居于这汹涌的波涛当中。</p> <p>每当此时都要感慨，让他死在这里好了，醉西施之言诚不欺我，牡丹花下死，是做鬼也风流。</p> <p>寸心忍不得他粗粝的手指在腿心穴口处粗鲁的挑逗，一口咬在郎君肩膀上，身体却诚实地喷出许许多多水来，怪道杨戬一直调侃他海中公主出身生来多水，二人胯间教她流得滑溜溜的一片，他那大家伙挤入两条玉腿间，急不可耐地便去顶那花蕊，龙女狠狠地咬他一口，啐道：“那么急！死酒鬼倒也顾一顾你老婆死活，我却要疼死！”</p> <p>杨戬吃着她的娇乳囫囵道：“老婆……老婆……”他昏昏沉沉地说荤话，“好老婆平白胡说，哪一次不是把你干得爽死！”说罢令拇指曲起，直摁在花蕊出那颗充血肿起来的豆子上用力一撵，被男人压在身下的小龙尖叫一声，声音登时被他搞得软下来，娇滴滴地直吟，水流得淅淅沥沥，把他一根偌大的阳具也喷湿。</p> <p>二郎真君捏在手里的腰也酥软，双腿缠绕在他腰上欲勾，他一时抵在花口间，用力一挺，只听得啪地一声，阳物挤开她最柔软处进入到她的身体里，直挺挺地狠顶到宫口，尽力一撞，寸心的呻吟都失了音调，“嗯……啊！二……二郎……不要……”</p> <p>这一声二郎可谓叫得千娇百媚，杨戬只觉得热血哗啦一下冲入脑门，一把按住她摇摆的臀挺起那话儿便往里招呼，咕啾水声越做越响，将她的叫床声都撞得支离破碎。快意汹涌地流遍全身，真君脑子里嗡嗡然一片，只来得及想，她上一回这样喊他却是什么时候了？</p> <p>最最狡猾的小龙女，不高兴了只喊杨戬的大名，有求于人倒连声二爷地叫唤，二郎这乳名叫得不常有，可能是她晓得一喊就要被他干死，遂不敢多喊。</p> <p>杨戬越这样想越干得起劲，因着二人前番争吵已经几乎半月不曾亲近，每日运起至阳的玄功也要烫着他自己好几遭，这时命根子终于回到舒适的海洋里，他爽得脊背也绷直，一股脑地宣泄着火气，吻着她的小嘴道：“好老婆，可也心疼心疼你男人，松开口些。”这口自然不是她任由男人亲吮的口，说的是她下面那张死绞着男根不放的小口
