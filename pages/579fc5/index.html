泪的模样，心中绞也似的痛，一时情切，一把握住她的手，期期艾艾地说道：“你也还念着我的是不是？那些话只是说出来气我的是不是？寸心，我错了，我错了，我们不要分开，我不要和你分开。”</p> <p>寸心怔愣间，已被他揽入胸怀。他的怀抱一如既往地温暖，灼灼热度快要将她点燃，驱散了这长夜的凄清。她轻轻地咬住唇，可惜眼泪早已不争气地扑扑簌簌滴下，无声地落在他的肩膀上。一时间，心里的委屈好像打开一个阀门，汹涌而出，她小心翼翼地抱住杨戬，紧紧攥着他的衣带，忍不住小声啜泣。</p> <p>二郎真君听在耳中，心里愈发地不是滋味，忙将龙女抱着，连声地道歉。寸心轻轻靠在他的肩上，听他或急或徐的言语，并不做声，只是眸光透过满眼的泪水照进寒色的庭院里，高大的梧桐树上挂满了竹制的风铃。当年她初次到杨府时，已是待罪之身，虽满心相信杨戬能够保护她，但心里的惶恐与陌生不安却一点都做不得假。每当夜深人静时，杨戬碍于男女大防不愿唐突而无法陪伴在她身边，只有梧桐树上竹制风铃钝钝的撞击声能教人安心下来。</p> <p>从那以后，每数年间旧的风铃腐化，她也从不嫌麻烦，催着杨戬手制新的小竹筒子，她将之穿好了，夫妻二人一同挂回树上。那时他们的感情最好，龙女会特意为他们的新风铃刮一阵风，然后在树下，伴着风铃声，轻轻地靠在丈夫肩头，犒劳他一日的辛劳。</p> <p>便是有几句争吵，换这风铃的日子却必然雷打不动，并不能推，那时他们会在树下拥吻，真君轻声向她赔罪，而她从来也包不住眼泪，一面哭，一面在他怀中闹将一阵，捏着小拳头直往他胸膛上捶。闹够了，哭过了，再大的仇也揭过了，彼此又能你侬我侬，和好如初。</p> <p>杨戬见她还肯抱着他，一时间心软得一塌糊涂，却又止不住地发慌，他颤着手抚摸她娇嫩的脖颈，声音也有些发颤，“我是不是弄疼你了？我，我不是故意的……寸心，我错了……”</p> <p>他将手环过龙女单薄的后背，做出一个绝对占有的姿势，身体崩得紧紧的，稍分开几寸去擦她的泪，对上她如酥雨洗过一般的眼睛时，眼尾也忍不住红了。忍受不了离别，再如何理智的人，临了了对上她，还是敌不过一句舍不得。杨戬舍不得断开他们的姻缘，舍不得她，舍不得这样有血有肉活色生香的日子。或许他再努力一些，做得再好一些，他们还是可以继续下去的吧？</p> <p>倘若不能，就这样浑浑噩噩地在一起，又有什么不好？只剩下他们两个人又有什么不好！</p> <p>寸心一时间也被他眼中的波澜打动， 在心底里轻叹了一口气，料想这漫漫的长夜，无数时辰，雨化春风，再多挣些相伴的时日，或许往后也能少去几分遗憾。真君热切的气息洒在她的面颊上，龙女怔怔地揪着他的衣带，被迫承受他急迫而粗鲁的亲吻。</p> <p>被他啃痛了，寸心皱着眉，实在忍不住捶他：“你轻一点！”</p> <p>杨戬顿感心喜，从善如流地贴住她的面颊，蹭了又蹭，温热又细腻的肌肤就在他身边，几乎没有一丝距离。他努力地再贴近她一点，立即换来一个小拳头，抑或一声娇呵。龙女此时就在他的面前，在他的怀中，或许那时的气话真的不能算数，他们就从此刻开始长长久久地留在这个地方，不理什么王母，不理什么西海，再也不出门去，每日缠绵，这样不好吗？</p> <p>空中云层密布，黑压压地透不出一点星光来，人心也在这样浓重的夜色里肆意地滋长着私欲，头脑昏昏沉沉地，一路跌跌撞撞走到卧房去，寸心皱着眉，还是忍不住哼出声来——他的动作太粗暴了，胸口的衣襟被胡乱地撕开，一片狼藉，点点红梅在她雪白的肌肤上绽开。卧房中不曾点灯，她的躯体在黑暗中白得煞是耀眼，杨戬感到手中的嫩乳软得很不像话，把他一身的傲骨都折尽，屈居于这汹涌的波涛当中。</p> <p>每当此时都要感慨，让他死在这里好了，醉西施之言诚不欺我，牡丹花下死，是做鬼也风流。</p> <p>寸心忍不得他粗粝的手指在腿心穴口处粗鲁的挑逗，一口咬在郎君肩膀上，身体却诚实地喷出许许多多水来，怪道杨戬一直调侃他海中公主出身生来多水，二人胯间教她流得滑溜溜的一片，他那大家伙挤入两条玉腿间，急不可耐地便去顶那花蕊，龙女狠狠地咬他一口，啐道：“那么急！死酒鬼倒也顾一顾你老婆死活，我却要疼死！”</p> <p>杨戬吃着她的娇乳囫囵道：“老婆……老婆……”他昏昏沉沉地说荤话，“好老婆平白胡说，哪一次不是把你干得爽死！”说罢令拇指曲起，直摁在花蕊出那颗充血肿起来的豆子上用力一撵，被男人压在身下的小龙尖叫一声，声音登时被他搞得软下来，娇滴滴地直吟，水流得淅淅沥沥，把他一根偌大的阳具也喷湿。</p> <p>二郎真君捏在手里的腰也酥软，双腿缠绕在他腰上欲勾，他一时抵在花口间，用力一挺，只听得啪地一声，阳物挤开她最柔软处进入到她的身体里，直挺挺地狠顶到宫口，尽力一撞，寸心的呻吟都失了音调，“嗯……啊！二……二郎……不要……”</p> <p>这一声二郎可谓叫得千娇百媚，杨戬只觉得热血哗啦一下冲入脑门，一把按住她摇摆的臀挺起那话儿便往里招呼，咕啾水声越做越响，将她的叫床声都撞得支离破碎。快意汹涌地流遍全身，真君脑子里嗡嗡然一片，只来得及想，她上一回这样喊他却是什么时候了？</p> <p>最最狡猾的小龙女，不高兴了只喊杨戬的大名，有求于人倒连声二爷地叫唤，二郎这乳名叫得不常有，可能是她晓得一喊就要被他干死，遂不敢多喊。</p> <p>杨戬越这样想越干得起劲，因着二人前番争吵已经几乎半月不曾亲近，每日运起至阳的玄功也要烫着他自己好几遭，这时命根子终于回到舒适的海洋里，他爽得脊背也绷直，一股脑地宣泄着火气，吻着她的小嘴道：“好老婆，可也心疼心疼你男人，松开口些。”这口自然不是她任由男人亲吮的口，说的是她下面那张死绞着男根不放的小口。</p> <p>寸心教他操得花枝乱颤，连连喷水，只得抱着他的臂膀尽力承欢，耳闻他越来越激烈的喘叹在耳边响起，灼热的鼻息喷在她的肌肤上，登时泛起羞红，更是情不自已地迎合他，也勾着他劲翘的臀肌，软绵绵地求他：“再……嗯！不，不成了……太涨了……大混蛋……不许，不许再用力了……啊！……”她似快活极了，眼角沁出泪花来，偏过头去洇湿一小片床单。</p> <p>杨戬忍不住笑，大掌抚上她的脸，在下颌处不停地摩挲，深顶她宫口，间或低头吻她，头晕脑胀地说着情话，“是不是很爽？你夹得我好紧……”巨硕的肉棒在她腿间飞捣，带出二人浑浊的体液四散淋漓，龙女不知被他干得高潮了多少次，小穴微微抽搐着不停喷水，吸含着那根大肉棒频频地挽留。寸心受他不住，一时哭着，大混蛋，大坏蛋地乱喊，轻轻咬他。</p> <p>杨戬听得心如蜜酢，贴着她直狠狠插了几百个回合，阳具深深顶入宫口，射了出去，足灌了好一会儿，这才将释放后未及疲软的肉棒拔出，白浆纷纷自密道涌出，淌在她腿心一片狼藉。</p> <p>真君从身后将她整个拥入怀中，顺着身位又挤入进去。龙女正在被射精的余韵中，分外敏感，仰起头甜腻地哼一声，小腿曲起，勾住他的腿，又是一整连声的奸插，杨戬一面入她，一面舔吻她白玉一般细腻的耳颈。看窗外已渐去乌云，透出明朗星光，恍惚间仿佛快要天亮了似的，杨戬一挥手关上窗，点亮几盏夜明珠，柔和的光打在怀中嫩玉一般的肌肤上，他仔仔细细地打量她，哪一处还不曾沾染他的痕迹，便贴上去一口含住，吮吸出一朵红梅来。</p> <p>寸心也享受他的标记，鬓角处隐隐地露出几片金粉色的龙鳞，一眨眼又隐去了。男人辛苦耕耘的汗液滴在她眼角，龙女正被顶得失神，腿都软了，无力地耷拉在他腰侧，忽然被掐住了腰狠狠地一阵抽送，她金色的眸子涣散开，失了魂似的高声吟叫，又教人吻住口舌，麦色筋肉虬结的男躯结结实实压在她娇软生香的身子上，肉杵像是要将她凿穿。寸心呜呜咽咽地流出泪来，终于有些承受不住，求饶的声音也被他撞碎。</p> <p>“别……我……不成了……嗯！”她被操得挺起腰背来，切齿难忍，“求……求爷……饶了我吧……唔嗯……”</p> <p>耻骨仍啪啪地相撞，龙女嫩肉都被打得发红，因难耐间尽力向后仰，两团饱满挺翘的乳肉颤巍巍地贴在他锁骨处。杨戬已杀红了眼，怎么可能止得住鞑伐，挺着肉棒一下狠过一下，恨不能吃了她，直干得那小穴高潮连连，大掌一时触到她肌肤，登时引起一阵阵战栗痉挛，她的身子都已熟透了。</p> <p>不知过去多久，二人的寝室中灯火明明灭灭数回，羞人的水声和拍打声、呻吟声喘息声久久不停歇。龙女教他肏得不知东西，早已任人摆布，双腿间溅满了白浊的水液，声音都已喊哑，只体会得到切切实实的爽，从头到尾都舒服得不知所以。直到一阵激烈的抖动，那硕大的、涨到极致硬到极致的肉棒在她身体里死命地抽动几百回合，不顾她崩溃的喊，男人忽然重重地压下来，脸埋在她肩窝处，性感的喘息也变了音调，死死抓着她身侧的床褥闷哼几声，浓浓的精液将她射了个满腹。</p> <hr> <p>清晨时，寸心睁开眼，只看见黑压压的一片，呼吸有些艰难，伸手欲推，搡了两下，身边的人嗓子里沉沉地囫囵哼一声，愈发抱紧了她。</p> <p>半边身子都给他压住，动弹不得，寸心挣扎一番无果，反倒教人又夹住了双腿，默默地停止动弹。身上还颇为黏腻，往日燕好后他或会抱着她去清洗一番，或用法术洁净一遍，昨日或许二人都忘情，战至最后再也没有心思，昏昏沉沉地就这样睡了。难得今日晨起居然没有腰酸背痛，反而懒洋洋地不愿动弹。微风透过窗棂不曾闭合的缝隙吹进来，寸心低下头，看到杨戬的手牢牢地抓着她，紧扣住十指。</p> <p>他平稳而绵长的呼吸打在裸露的圆肩上，寸心一阵瑟缩，稍向丈夫的怀中依偎一些，杨戬未曾惊醒，兀自酣睡，睡梦中从善如流地拥她更近。</p> <p>寸心轻轻地一叹。</p> <p>就这样过下去吧，算得一天是一天。龙女细细打量着丈夫过分英朗的眉眼，掌心传来他炽热的爱意，心中暗暗想道。</p> <p>总是舍他不下的。</p></div></div> <!-
