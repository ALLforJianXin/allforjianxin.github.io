振又作锦绣双蝶钿花衫，拿金缂丝双蝶戏珠头花掐了半翻髻，各方侧了侧身段又道“这般如何？”杨戬实在于此不通，难为的蹙起眉这下可叫龙女着急“怎的，还是不妥当？！”</p> <p>杨戬见她有些打蔫儿，忙开解“杨戬只知美丑生来便是，三公主姿容昳丽，哪件衣衫均自有千秋，在下实难辨出高低。”杨家小郎面庞周正讲话中气又足，便是些顺耳的“奉承”也讲的是鼻子是眼儿，哄起人来得心应手也不知哪里练出来的本事，颇有“口蜜腹剑”之能，龙女心里编排他却又耐不住高兴，一时杏眼弯弯嘴角含笑“你倒是会说话，那你讲这身好是不好？”</p> <p>杨戬细瞧了瞧，心道衣服是好衣服可若穿着招摇过市，难免有些扎眼，再招蜂引蝶就坏事了“今个日头足，穿的繁琐怕是束了手脚”龙女一听也觉有礼，正踌躇便听廊头狐妹唤道“杨大哥，寸心姐姐可去吗？”</p> <p>杨戬闻声转头正见狐妹要过来，婵儿拉着她嘴里说着些什么，瞧着嘴型好似“再等等，别打扰”杨家小郎甚觉欣慰，暗道自家幺妹确是体贴人，他要答话却叫龙女抢了一嘴“等等，这就来！”</p> <p>话声一落，龙女提着裙裾就跑了出来，杨戬这时见她换了件樱色连衣撒花裙，薄纱般衣料轻轻勾勒她纤软的身体，廊风一来敖寸心便将乘势而去，等等这衣衫也不妥当，他到底没来得及说话，年轻的姑娘们便说笑远去，他不由自言道“一两个都毛毛躁躁的。”他说罢又哑然失笑觉着自个这般委实便似个老妈妈。</p> <p>杨戬跨进敖寸心房中半步，欲为她带上屋门，这刻又猛然想起‘新修水路图’的事，暗道自个糊涂思量一二便往她房中案几处去“她方才正在画……”杨戬的思绪在见着案上铺陈的薄绢时戛然而止，白绢墨线是张人像，画中人打着扇只见小半张脸，他垂眼略勾着嘴神色安然。</p> <p>杨戬瞧着手中薄绢久久出神，心中有万千念头一时如麻，敖寸心人瞧着咋呼笔法倒是细腻老道；她是不是待我有失偏颇，我何时有这等憨态？她方才原是在画我……廊风渐长，院中榕树繁盛枝叶沙沙作响，也不知是风动还是心动。</p> <p>敖寸心初住进杨府的头月末这日，她深深怀疑起杨府的安全，甚为心惊胆颤，毕竟她在杨家兄妹眼皮子底下丢了画。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/072601.芳心暗许.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/a87355/" class="page-
