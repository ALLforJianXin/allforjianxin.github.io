啪啦一阵响，登时一惊，但恐杨戬有失连忙跑至近前推开房门，抬眼一看，那半俯在案几上满目通红的不正是方才还好端端的杨戬！</p> <p>“杨戬！”寸心急急奔过来一把捧起他皱紧眉头的脸，只道他一不小心走火入魔，连忙拉住他手将人制住，使了真龙之力将他推翻在身后榻上，死命按下，低头在他耳边徐念清心咒。</p> <p>杨戬此刻几近崩溃，后槽牙咬得死紧。他是受不住丹药阳气，只需与女子阴阳交合，不仅症状立消还得修为增长。敖寸心贴近时他顿感舒适，只想将浑身贴上好消解那股热意，哪里知道他娘子反手便是一记小擒拿，搁他耳边叨叨不知念了甚，再不消解他便要欲火焚身而亡了！</p> <p>“啊……啊……寸心……救救我……你救救我……”他低沉的嗓音被烧得沙哑，手脚教人制住便偏头去舔吻那人的脸颊，腰腹用力上顶。那物早已坚硬如铁，敖寸心跨坐在他身上，只教他一顶，登时发觉。她朝下一瞧，立刻羞得满面通红，连带手上桎梏不自觉放松，杨戬只一挣，松松脱开，一把抱住敖寸心的肩膀，翻身便将她压在了身下。</p> <p>“你到底怎么了！啊！”她不防，那人低头便是狂风骤雨，不及温存，直起身子拉扯腰带，满眼都是癫狂，红得可怕。</p> <p>那物顶在敖寸心腿间，被难耐的他不自觉摩擦，隔着衣物都能感受到他的憋胀。敖寸心见他愈急愈是解不开，虽不知发生何时，但丈夫既然憋闷自然心疼，忙素手拉住安抚他，寻到他腰扣，细细去解开。</p> <p>杨戬见此满心欢喜，俯身去亲她身子，吻她嘴唇，呢喃道：“寸心疼我。”三公主红了脸颊，不时安抚地回应一二。</p> <p>比起自己的衣服，脱敖寸心的衣服他倒更顺手些，三两下先将她底裤剥开，急色不待去解上衣，拉住她手猛地一扯自个儿裤头，那凶物登时弹出，教他按住妻子，扶稳对准，一个挺腰直捣黄龙。</p> <p>“啊——！”还未全然湿润，三公主承受不住，涩涩疼痛与快感交叠直要将她逼疯，不禁扣紧了杨戬的肩膀，指甲都陷进他肉里。杨戬此刻哪里还管？药性正是发作，理智都差点些烧没，只不过寻着原始的冲动，死死按住身下乱扭的女人，一气抽插几百下。</p> <p>敖寸心早叫他肏得尖叫不止，淅淅沥沥流出水来，好歹润湿了下处。往日夫妻二人情事虽有放肆，但杨戬终归温柔，颇顾她意，初时徐徐，后期才敢激烈。今次他近乎不做前戏，混不顾她感受，只教身娇体贵的小公主难受得眼泪汪汪。</p> <p>杨戬急于发泄，却憋闷不通，只得狂做交合，急色近欲端地就是天塌下来也不管不顾了。敖寸心只觉他浑身蛮力都用至她身，理智半点也不存，下处仿佛刀子教一下下剜她，她抓挠哭喊那人理都不理，再是放肆，她就要坏了。</p> <p>实在承受不住，求他也无用，她寻杨戬拿捏住自己的手，用力去掰，哪知他仿若铜墙铁壁，真龙也掰他不动。忽然不知那淫物冲撞到何处，她浑身一激，娇吟婉转，猛地搂紧杨戬头颈，下穴抽搐绞缩，涌出许多水来，将内里那凶器都绞得死紧。</p> <p>杨戬低吼一声，闭紧眼睛将脸埋入寸心胸口乳肉中。快感堆积只教他眼冒金星，不知所以，身子仿佛一时临冰天雪地，一时处酷暑焦阳，难耐又快活，憋闷又酣畅。</p> <p>哪知龙女趁他愣神功夫，不顾将将高潮虚软，手脚并用，一鼓作气狠命使劲居然将他推开几寸，娇臀猛动将他凶物和着水声拔出，一翻下榻却身虚脚软，站立不及，跪抚在地上便爬。</p> <p>杨戬一时愣神，身下欲望不得疏解霎时叫他难忍，见敖寸心这般喉头一动，沙哑声音道了一句“想逃？”他长臂一伸，麦色手臂刚好把在她白皙腰腹上，只不过轻轻巧巧捞了一把，敖寸心整个人教他捞了回来。</p> <p>他托起她臀将人转至面前，跨坐自己腰上，恶狠狠地前倾去吻她，就着立坐的姿势，腰臀嵌入她腿间，扶起金枪，将她按坐在那物上。</p> <p>“啊……嗯——！”敖寸心难耐地呻吟，杨戬却不满于此。只伸手虚扶着她，腰间一蓄力，便又是狠劲捣弄。寸心不防，仰起臻首咿呀喊叫，话都讲不清楚，抽抽噎噎哭喊：“你……别……啊！我要坏了，我不要了……”</p> <p>然彼满心欲望，神智都不尽清晰，哪里能够怜香惜玉呢？</p> <p>杨戬连要了几日，期间敖寸心抽抽噎噎，哭喊求饶，抓挠推拒甚至要逃，杨戬皆是不为所动，将人或拉脚踝，或拦腰肢，捞回继续。敖寸心但觉如若再无停歇，她怕是不成了，有时做着做着晕将过去，那人举枪射入时又将她肏醒，来来回回，做得天昏地暗，不知晨暮更替，蜉蝣几生。</p> <p>直至清晨，杨戬眉头一动，从榻上睁开眼睛，只觉浑身气脉通畅，神清气爽。支起上身，忽然发觉怀里抱了个赤裸的姑娘。</p> <p>他一动念，忙轻轻去撩开女子披散的头发，入目的不是敖寸心是谁？但见她浑身青青紫紫，全是纵欲过后的痕迹，脸颊通红，全是泪痕，嘴角都教人亲肿了。</p> <p>杨戬大惊，忙托抱起她，撩开被子站起身，至屏风后挥手便就一桶热水，小心翼翼将人放入。他取帕子去替她擦身，水有时溅到他臂膀上，火辣辣地疼，忽觉肩上全是女子抓挠的痕迹。</p> <p>他做了什么混账事情！杨戬尽可能放轻动作，拨开敖寸心的下处。入眼一片狼藉，红肿不堪，满是被欺负的痕迹。</p> <p>他心中一疼，轻拨温水去替她清理浊液，哪知寸心眉头一皱，登时哭了：“我……不要了……二爷……求求你……”</p> <p>杨戬一时只觉愧疚难当，心疼不已，连忙环过寸心身子，徐徐安慰：“是我不好……对不起，寸心，没有下次了……没有下次了……”</p> <p>三公主在他怀中渐渐安稳，歪头靠在他胸前。杨戬伸手去擦她眼泪，一时满心难受。</p> <p>却其实龙族身强体壮，只不过敖寸心娇贵，杨二郎又顶顶心疼媳妇儿，再不肯折腾。此时只教他半年上不得娘子的床榻。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/103100.九转玄功.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/645d03/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">卿本佳人</div></a> <a href="/pages/981c67/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">滟滟</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
