杨二郎去觑她面色，见她还低垂着眉目看手中的历书，不过神色倒也平静，想了想，斟一盏茶缓缓推过去，才说：“寸心想去哪里，杨戬都陪你。”<br>
龙女的目光移向水面，有些怔怔，似乎回想起了什么，少顷，端起浅杯一饮而尽，放下后立刻膝行几步绕过矮桌，攀进郎君怀里。<br>
当她的双手揽住他脖颈时，当她软甜的唇舌又和他的搅在一起时，杨戬悬起的心才稍稍放下些许。</p> <br> <p>很快就到了生辰当日。<br>
一大早寸心就起来梳妆打扮，杨戬下厨整治了几样清粥小菜，俟着她收拾停当那一刻恰恰好端上来，龙女略蹙蹙眉他抢先答“待会儿吃完再涂”，敖寸心抬头绽开个笑，边吃边夸“好香”、“脆脆的很清爽”、“好吃”，吃完后碗一推扬起小脸闭上眼，唇角的弧度显示她现在心情超级好，杨戬一时看愣了，又一时才反应过来，抹抹嘴角转身往妆台里取了口脂，回来用中指指肚一点点涂抹为龙女上妆，最后捧出铜镜唤娘子睁开眼。<br>
“粉润带闪，寸心涂这个颜色好看。”<br>
敖寸心审视了一会儿自己在镜中的倒影，也很满意，绽开个大大的笑脸，挽着郎君一同出门去。</p> <p>一路说说笑笑往城西，混入人流里瞧着和去给二郎爷爷过寿的民夫民妇似也没什么不同。龙女虽挽着他臂膀却一直落在他身后半步还捂嘴哧哧偷笑，杨戬再耐不得，停住脚长臂一展把人搂近，两人各出大半个身子紧紧贴在一起，突然近距离观看英俊郎君如玉面庞，敖寸心的心漏跳了一拍，一时也收了笑，然后才听见他问她：“笑什么？”听起来颇有些咬着牙发声的感觉。<br>
神仙耳聪目明敖寸心仍附到杨戬耳边把刚刚听来的“二郎爷爷”又学一遍，当揽在腰里的手猛地收紧的时候她还以为他要生气了，没想到他旋即又松弛了下来。杨戬转了半步与她面对面，微微低头好让他们的悄悄话不被路人听去：“那不正好？跟龙女娘娘最相配了。”<br>
敖寸心愈发愣怔了，这人怎么回事？最近讲话是愈发肉麻了。寸心面皮滚烫低下头一时不敢再瞧杨戬，低下头又见自己的小手被紧紧包裹在一双大掌里，更兼他俩站在道路当中所有绕过他们的行人都回头再掷一个揶揄的目光，不觉大囧，猛用力抽出手来。<br>
“快，快走吧……”</p> <p>说起来龙女喜凉这时节天气却闷热，好在玉垒山上树木繁茂郁郁葱葱，倒也不至于十分难受。但中途听到隐隐约约潺潺水声时还是忍不住开了小差。寸心褪去鞋袜白嫩脚丫沁入清泉舒舒服服发一声叹，杨戬站在小道的入口警惕了一会儿看也无人偏离道路，便回来她身边。还没站稳龙女掬起泉水泼向郎君，杨戬冷不防被兜头淋下，抹罢脸也只能无奈地笑笑，看她那么开心，他只盼她能再多开心、更开心，他蹲到她身旁替她撩水浇在小腿上，问她：“好点了吗？”寸心笑着点点头，然后伸出手拉他让他坐到自己身边，靠上他肩头好像这会儿又不怕热了。<br>
安静下来林间清风细微可查，杨戬几乎以为龙女睡着了。她忽然抬起头看向他，用目光勾得他低下头来，还亲了亲他。</p> <p>到得庙里已是午后，鬼判们频频接待还愿的祭牲和告愿的文书忙得不可开交，见正神前来慌忙要迎，杨戬摆摆手叫他们“不必了”，而寸心已经上前一步捋起袖子准备帮忙。于是杨戬快步跟上指示负责接文书的那个去帮别处，随即托住龙女小臂扶她到正中神位上一起坐了。二人一同接下络绎的保福良愿，期间也有极个别心术不正的妄图浑水摸鱼，都被龙女一一捡出。犯在真君夫人手里更是罪加一等，杨戬一个眼神过去鬼判自然记下好几笔。<br>
不知不觉天色转暗，人烟也稀。又接下一帖后殿内暂空，龙女翻开看字正好又是“求子”，这才顾上把压了半天的疑惑问出口：“你这业务还挺广泛？”<br>
杨戬手握成拳挡在口前虚虚遮掩尴尬，斟酌着说“百姓错爱”又觉不妥，但灌口风气就是如此，求什么都找二郎神，且由来已久源远流长，他把比干和公明都拘来合衙办公，求子的帖子也安排专人及时转交送子婆婆……杨戬磕磕绊绊讲着琐碎的工作，敖寸心似乎认真在听又似乎没有在听，她目光望向殿外不知落在哪一缕夕阳上，悠悠叹息声几不可闻：“那我的愿望呢……”<br>
二郎心头突跳，正欲剖白，突然闯进来几个女娘。年岁不一看装扮更是天南海北，叽叽喳喳一个说“怎么又跑一趟”，另一个说“你不懂，这会儿人少真君老爷才能更清楚地听到我们的愿望啊。”<br>
女娘们一齐闭眼合掌默默祷告，杨戬看龙女神色先是微微讶异，之后又转成温柔和煦，如果非要形容的话，这如水般的清透让他想起西海岸边第一眼初见，那时呼啸的海风好像现在还刮在他心里。</p> <p>庙门在身后关闭杨戬问起：“她们许的什么愿望？”<br>
敖寸心背着手低着头，鞋尖踢起路上的小石子，又走了好几步，才回答：“她们的愿望，就全交给我吧。”<br>
但其实，并没有留给他讨价还价的余地。</p> <br> <p>回到家天色尚未黑透，暮色四合两人默契地都没有去点灯，并肩立在院子中央等夜色再浓重一些，等星辰爬上枝头。<br>
不知道是谁先粗重了呼吸，抑或是不约而同，总之是抱在了一起吻在了一起。两人四脚步履蹒跚往后院去，钗饰衫裙丢一路，但没有人在意。</p> <p>终于挪进卧室，龙女身材娇小玲珑，杨戬将她整个抱起来抵在门后，甚至顾不得多做些前戏，手臂探过她腿弯一双大掌在那绵软臀肉上潦草捏过，掰开臀缝直直将自己挤进去。<br>
过分直接的刺激让寸心倒抽口气，连带那甬道也不受控制地收紧，更显得硬挺如肉刀破开身子带着些微疼痛，双手十指在他肩头握起，“你弄疼我了。”杨二郎连喘几口，嘴里问着“那我轻点？”行动上却毫不松懈，顶得门板嘎吱作响。<br>
龙女身骨到底非凡，虽然今日急躁一些一上来吃了点苦头，但到底是跟杨戬亲密惯了的，早被养得熟透，这一时在精准的挑逗下频频被攻击要害，没多久就得了趣，那蜜露自花道深处涌出，淌得股间湿滑泥泞起来，杨戬借此再往更深处去，猛然一送激得龙女仰直肩背声音也拔高，悦耳龙吟更助兴致杨二郎得寸进尺。<br>
“还疼吗？”<br>
那自然是不痛了。<br>
龙女伸展开双臂搂上郎君头颈将他按进自己胸怀里。杨戬张口就在她白雪般胸脯上留下一串红痕，然后品尝起挺翘珠果，这边吃完再吃那边，吮得敖寸心迷迷糊糊的，双腿缠上他腰间借着力，双手撑在他肩头开始轻轻摆动腰肢，自觉自愿将他胯下小兽吞吞吐吐，吞吞吐吐间花道里的蜜露被带出来许多挤出来许多，滴滴答答流到地下去。</p> <p>房里仍没点灯龙女逆着光面庞不甚清晰，月上中天遍洒银辉给她柔美的轮廓镀一层光更生出些圣洁之意，那半身以下光照不到的地方却是另一种淫靡。<br>
杨二郎一双大手将蜜桃样的臀肉亵玩出汁水淋漓，尺寸骇人的性器深入花道顶得龙女小腹随着他出入一突一突的，曲径通幽似乎已然探到底，可仍留了半掌长的一段进不得桃源乡里。</p> <p>忽记起在庙里没说完的“愿望”。<br>
不是不知道这愿望其实囊括着许多但现在最可以拿出来提的就只有——<br>
“寸心的愿望，就交给我……”<br>
“嗯？”龙女已然被操干得有些神智不清了，只随他话音顺口问，杨戬却抽出大半，只在浅处轻轻操弄。霎时腹内空虚起来龙女不满意，蚌肉紧扒着肉棒，收腿沉腰自顾自己，吃得下处咕啾作响，啧啧水声在昏暗的卧房回荡。<br>
但不够。还是不够。<br>
龙吟里不觉带上些哭腔，央求郎君怜惜。<br>
“给我，都给我，都给……”</p> <p>“这可是你说的。”</p> <p>得了承诺的杨戬自然仗剑直插到底，龙女甬道里律动陡然加快杨二郎知趣，紧送劲腰将柱头对准龙女体内另一张小嘴短促而快速地撞着吻着。<br>
龙女被弄得神颠魂倒，颠簸里高潮里不知今夕何夕，只向郎君讨要：“都给我，二爷都给我。二郎……全是寸心的……”<br>
抵在深处先射了一波，深深抵住静静感受龙女的依恋和缠绵，被她需要总能让他最开心快意。</p> <p>“我们到床上去。”男人的声音低沉魅惑不容拒绝，龙女背后硌在门框上，浪头低下后这会儿也正觉磨得难受，自然从善如流，轻轻“嗯”了一声点了点头。<br>
龙女本就是被杨戬抱在怀里的，便也不放她下来，还这么抱着往床边去。每走一步自然完成一轮抽插，他走得很慢，每一次抽出和插入都让她细细感受，每一次都要挤出些东西滴到地上去。<br>
杨戬低头亲亲龙女颈侧，闷笑着调侃：“殿下真是水多。”寸心也不示弱露出小尖牙就在他肩上啃了一口，杨戬笑得更开心了，连埋在她体内的肉棒都应声又涨大几分，涨得龙女腹心一阵酸软小小惊呼一声淅淅沥沥又下好多，杨戬体贴地原地站定等这一阵风浪过去，既有风浪下锚自然要更深，杨戬扣住龙女双股的大手把住她更往自己身上按，龙女于巅峰又叠起更高的浪头浑身颤抖着泻个不停，顺着郎君大腿小腿流到脚背上，再流下去，在地板上积出小小的水洼。</p> <p>终于来到床榻间敖寸心数不清自己已经去了几次了，直觉告诉她今夜还长着，但还是乖巧地团起身体双手抱住双腿，把最弱的弱点也暴露给他，杨戬大掌在龙女肚皮上摩挲好久，按一按能感受到皮肉下正是嵌进去跳动不已的自己，略略思忖又低下头从她小腹重吻起。一路吻上去再含了那香软的唇瓣，轻轻啄食啃咬的时候下面轻轻戳刺，舌尖探进去搅弄时下面也退一进三，一点点重入温柔乡里。<br>
又一次来到道路尽头，唇舌却稍离，缓缓直起身将她曼妙姿容尽收眼底。寸心的表情隐隐约约有些期待又有些怯怯，杨戬捧起蜜臀轻拍拍，本意是安抚她叫她“别怕”，她却抖得更厉害了，但颤动间倒并不躲闪甚至还又用力握了握他，招得杨戬再难自持，狠狠掐住龙女薄腰下顶上按，对准那处肉缝狠狠撞击。狂风骤雨下娇怯怯躲在肉道深处的宫口很快就被奸得软烂，被捣成一团艳红肉泥。旋即杨戬又集中精力对准小口顶弄研磨，小龙女腰身渐弓勉力迎合，随着他一毫毫凿进更深处，她把住大腿的指尖用力到泛白脚尖都绷起，但这样的紧绷却搞错了重点虽欲迎实还拒。杨戬被绞得头皮发麻可又怕最后一丝理智若也脱去狂乱间会伤了她，思来想去忽又探身去亲她，撬开紧咬的牙关这下所有鸣泣都露了行迹，一处松动处处松动，龙女全身上下每一处都全然向他敞开来。<br>
杨戬只觉得万千世界最极乐也不过在此处了，龙女宫口被破开时内里积蓄的蜜液汩汩流出冲刷着他，在进入的最后关头已然被他撑开的宫颈又骤然紧缩，夹得他腰眼一酥狠狠直撞下去。一下子尽根全没入，被宫口勒紧而愈发涨硬的柱头也撞上宫底肉壁，他的分身的顶端整个嵌进小小的子宫里，撑得满满的，龙女眼中一下子涌出许多泪来，眼尾却带着笑意。</p> <p>杨戬每一个细微的动作都能引发她深重的颤栗，弹软滑腻的宫囊不停嚅唆着把他含吃不息。腰肢弹动不成节奏，呜呜咽咽也没有规律，一边含糊不清地讨饶一边又痴痴缠缠不放他离去。<br>
这很好，这样非常好。杨戬俯身把龙女整个拢在怀抱里。<br>
再附到她耳边齿尖叼住白嫩的耳垂小心翼翼祈求：<br>
“寸心的愿望，杨戬都会实现的……”</p> <p>再给我点时间。<br>
不要离开……</p> <p>忽而高亢的吟哦让一切念头都被打断。<br>
所谓乾坤交感阴阳相合，不得不赞叹造物的神奇。<br>
全身的肌肉鼓胀血脉奔流好似都是为了往那里去。<br>
小小的宫室渐渐充盈，有人嘴上说着“好涨啊”，宫壁和甬道仍然挛缩不止贪婪榨取。<br>
杨戬不禁好笑这小龙总是心口不一，但没办法也只得他自己更多加宠溺。</p> <p>汗湿的睫毛根根分明鼻尖和唇角勾他心魄，或者该说她那么美味完全让人爱不释口，从额头到眼窝，从脸颊到下巴，一口口浅吻轻啄。<br>
浪潮变成涟漪渐渐平息，她突然说：“别走……<br>
“……堵着。”<br>
二郎真君被闹得红透了脸，可他无法拒绝，更加管不住身体比心思更积极，尚未疲软又再勃起，虔诚往她心口烙一个吻，在她细密的振颤里，又继续。</p> <p>……</p> <p>窗外鸟鸣清脆晨光熹微，一神一龙刚又结束一场喘息。<br>
龙女想转身去拿历书，略微挣动立觉腰胯酸软腹内涨满，那人还笑得得意。寻他腰侧捻一块皮肉拧了撒气，瞧他呲牙咧嘴演得卖力没忍住笑出了声，只好饶去。干脆戳戳他胸口叫他去捡，杨二郎使了个“托举法”连撕去的几页都捡来，瞧龙女又认认真真撕下一张有些好奇。<br>
他没开口问但龙女也答了：“再过几天就是七夕。”<br>
七夕是属于情人间的日子，杨戬想到又将跟寸心共同度过心下像漾了蜜。<br>
可她接下来的话让他只恨自己没有早点行动。<br>
“等过了七夕。<br>
“你去邀请师父。<br>
“也该接哮天……”<br>
话尾到底被杨戬吞了个干净，反正离七夕还有些时间，她也不抗拒再沉沦片刻。</p> <p>高潮迭起间二郎真君偷眼去觑龙女，她双目紧闭。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/081200.还要贴贴.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/c4f271/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">此夏</div></a> <a href="/pages/ef61e2/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">下海</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
