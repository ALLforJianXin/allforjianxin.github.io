敖寸心不由得往他坐的桌案方向走近几步，看烛光映照下他挺拔的身姿和唇角温柔曲线。看了好一会儿忽咬咬牙一拧身望侧旁小榻上坐了，坐下后随手捻了小几上果品闲嗑起来。<br>
“三妹今天才送的李子，我还没尝过，味道怎么样？”<br>
“还行，不够酸。”</p> <p>“好了！”真君大人办完公务撂下笔，见敖三公主被自己惊了一跳，忙拎起茶壶斟了杯，捧到她面前赔罪，“小殿下许久没来了，可想我过吗？”<br>
“这茶味道古怪……”<br>
“我先问的，小殿下要先回答我问题。”</p> <p>想，怎么会不想呢。<br>
敖寸心看他满眼的期盼，心底有话却说不出来。<br>
谁叫她自己沉不住气，他亲来宣旨的时候“西海公主面首三千”已经散播开了去。<br>
后来她循着规矩上天谢恩，他悄悄递了条。“愿为控鹤，亦可长信”。她不懂典故，刚拉住文曲星君，又被他抢走了。<br>
再后来她出南天门，他亲自追上来剖白一番，话赶着话敲定下却是这么个局面。</p> <p>许是看她久久不言，他垂下眼睑，“小殿下海里日日欢，自是想不起小神来……”她忙软声安慰，怕他再提要住到西海的事。初时她是怕瑶光殿里空无一人的事情暴露了，也太不得脸，“我怕真君事忙，来多了耽误你……”现在倒顾不得怕那个了，可有些事错过了，真的再找不到合适的机会讲。</p> <p>“你看我这……说这些干嘛。”他突然抬起头来，“小殿下可有话要与我说么？”<br>
她被心上人笑盈盈晃花眼，扫过他半遮半掩的胸前更目露贪念。她根本没在意他说了啥，只好摇摇头敷衍。<br>
“那，小殿下好容易来了，我们这就到床上去吧。”<br>
她身子一轻入了他坚实怀抱，把他味道嗅满脸。</p> <p>高床软卧芙蓉帐，他故意粗重的气息在她耳边流连，她旷了几个月的身子经不得撩拨，早已瘫，双手下意识护在肚腹前。<br>
“小殿下，小神好想你，你三个月没来了，它等得好苦啊……”那人满口胡吣着，掰开她手去摸身下那话儿，她被触到的火热硬挺烫得心口一颤，倒未放去，反握紧了。<br>
他便就着她手里动起来，口舌也来寻她的口舌，两下里纠缠。</p> <p>她手不得闲。他操作精准，没几下就把她从繁复衣衫里剥出来，勾开裙片往里探。<br>
“小殿下早就可了，却不提点，是要寻错处贬了小神么？”<br>
一派胡言。敖寸心翻个白眼不答话，反正那人不是第一次爱演。</p> <p>她稍抬抬腿，他手臂便兜了上来。稳住她腰身还垫了软枕，才扶那硬物抵在道口前。<br>
“小殿下，抱住我可好？”<br>
他微微探身下来，头颈离着还远。她便就近握了他盈盈劲腰，待花道渐开才发现，这仿佛像是她强要着他来。<br>
嘿，心思真不少。</p> <p>龙女被他算计激起了脾气，腰臀运上力道。神君动作显见得快了起来，亦有声音藏不住从喉鼻间逸散。<br>
“寸心，寸心……”<br>
杨戬就着这趟直往里趟，在那去熟了的地方攻城拔寨，直闯到忽而雨至才刻刻缓住，身下还受着她绵延的缠握，嘴上又调笑：“小殿下，可得了吗？”</p> <p>敖寸心往他胸口锤了下要后撤，刚歪了点身不妨被他捉住一边脚踝，回头看他抬了她这条腿正往肩上扛。<br>
“这姿势也好的，定让小殿下觉着爽。”<br>
那人一边说一边跨在她另一条腿上。转动间新鲜的摩擦感让她忘了话头，便又开始受他冲撞。</p> <p>“嗯嗯……啊，呀……”<br>
敖寸心觉着腹内快被他搅翻了天。这姿势他进出都方便，她无可阻拦。双腿被拉开到最大限度，整个人，整条龙都展在他眼前。他粗壮有力的阳物在她体内深深浅浅，每一次撞到深处都有酥麻感觉垒上来，他退浅了这感觉却不退去，一层层叠高，一层层让她更想要。她已不知道自己眼睛在看的方向有些什么了，也顾不得自己现在落在他眼里是什么形象了，只攥紧床单拼命守住一丝心弦不敢松开，不敢肆无忌惮。<br>
便在临门处，他动作又忽慢。<br>
她花道已是顶级敏感，她可以感觉到他每一毫前进每一毫后退，他每一丝勃颤。她婉转吟哦渐变成小声哭喊。<br>
“杨，杨戬……给我，给我……快……啊——！”<br>
他是个优秀的“面首”，不待她吩咐完。</p> <p>眼前昏黑散去，她还在喘。渐渐找回肢体感觉，似有大手温热她小腹间。<br>
想去拉他，一软。只摸到相贴处，粘粘。</p> <p>“小殿下最近是不是贪吃了些些？”他一边说着这话一边放开她抬了许久的腿，在她旁边躺好后又从侧方拥住她。<br>
“你什么意思？”他今天似乎特别执着于挑逗她。她本就存了点到即止的心思，正打算借这机会撒气跑掉，却发觉整个身子已被他箍进怀里，连腿都被他的腿缠住，再没有逃的余地。<br>
他埋在她颈窝轻笑一声，他跟她说“我想帮小殿下运动运动”。</p> <p>那是握得动三尖两刃杀伐三界的手，那是执得住无私铁笔明断直判的手，那手还很好看，指节修长……不，这些都不重要，重要的是这手现正探在她两腿间！<br>
圆润饱满的指肚在道口草丛中寻找着，很快寻到花核轻揉慢捻，刺刺的快感冲上来掩了她一切心念，“杨戬，不要……”<br>
她知道定是幻觉，可她就是觉着有来自身体内外两个方向的异物相合着折腾她，这副躯壳仿佛已经不是她的了，只会颤抖、痉挛，在颤抖中将自己送往他手里挑抹，在痉挛中拿小穴勉力吞咽，被他刺穿。<br>
“小殿下，你的身体可不是这么说的啊。”</p> <p>又换了好几个姿势，等他终于埋在她深处泄了的时候，她瞥见墙上小臂粗的红烛已燃掉了一多半。<br>
还好，海医还算靠谱。她受住了。她肚子里那个也受住了。</p> <p>敖寸心累得眼皮都快睁不开了，拉住神君手臂拱在他怀里寻个舒服位置，只想昏昏睡去，迷糊间听那人冷冷说：“先别睡，给你看个东西。”<br>
原本连还嘴都没有了力气的龙女在看到明黄锦绸上“赐婚”两个字时，完完全全清醒了。<br>
“这……这是？”敖三公主连话都有些说不清楚了。<br>
“本君不想做面首了，不行吗？”<br>
“就为这个？”龙女再不善解人意也听得出他声音里带怨气，想回身看看他脸色，却被拿住肩头不得动弹，“这么长时间都过来了”之言也不敢再说下去。<br>
他埋在她背后，良久。终于闷闷开口：“你真的那么狠心，便要我杨家血脉不知身世，名带私生么？”<br>
龙女诧异间张口，半晌吐出几个字：“你都知道了？”<br>
神君未言，只抵着她点点头。</p> <p>“你知道所谓面首……”点点头。<br>
“所以今天特意叫我来？”再点点头。<br>
“等下！那古怪茶水？”顿住片刻，这次只缓缓点了一下头。</p> <p>墙上的红烛快燃尽了，光线飘摇起来。敖寸心觉着颈后一凉，猛用力这次竟挣开了。她回过身，看见神君往日桀骜自持的脸上刻下哀哀切切，一双含情目殷殷望定她，在无声流着泪，心一下子软得一塌糊涂。<br>
“我不是那个意思……”<br>
“那你是什么意思？”<br>
他紧紧追问，龙女思来想去不好回答，索性另起头：“寸心愚笨，从前便多行差踏错带累二爷……”<br>
“我不怕。”<br>
“你听我说完。”<br>
“嗯。”<br>
“寸心心思浅，经不起挑拨，听两句话就送上门去给人拿捏，撇二爷在这高处不胜寒凉。后来又听几句传言就自暴自弃惹个大笑话。寸心委实配……”<br>
“不许胡说！”他还是没听她说完，还伸手挡在她唇边不让她乱言。他半起身撑一手在她颈侧，原本横淌的泪珠儿一下子都洒到她胸前。“是我不好的，是我没先跟你讲清，才叫你误会了。”<br>
龙女抬手捏捏他脸：“不，你计谋深远牵扯良多，那时我们劳燕分栖，你若寻我被人察觉到岂不是前功尽弃。”<br>
她是真真在后怕，却不知这话怎么又被他寻了隙截去，歪到一边。<br>
“那我们现在更该回在一起，这样就再没人会疑议。”</p> <p>“寸心，我好想日日拥着你，抱着你……”<br>
“可是……”<br>
“没什么可是。”杨戬俯身顺顺敖寸心耳边发丝，“回来吧。杨府缺个女主人，我只要你。”</p> <p>敖寸心觉得自己真是不长进，总被美色迷。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/091900.面首.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%9D%A8%E7%9B%9F%E7%9B%9F%E4%B8%80%E5%AE%B6" title="标签">#杨盟盟一家</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/3b78a2/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">沁月</div></a> <a href="/pages/5acd3d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">窃玉</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
