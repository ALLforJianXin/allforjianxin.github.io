这新天条下第一桩婚礼的新娘子应付完一天宾客，刚在婚房坐下喝口茶还没喘匀气儿，新郎便推门走了进来。</p> <p>三公主顺手又翻了个杯子给倒了茶，笑问：“怎的不陪客人了吗？”<br>
二郎真君再不是在前厅时那光风霁月模样，急色色上前搂抱住龙女，还埋在女郎颈窝深深吸气。<br>
“唉呀好痒。”敖寸心被他气息激得忍不住笑出声来。软甜甜声音入耳，杨二郎心头一颤，不由得手臂更用上几分力，仿佛只有用女郎那柔软的地方紧紧捂住才能避免他的心脏跳出胸口去。</p> <p>洞房不是第一次，抱她也不是第一次，可在洞房花烛夜抱她，还真真是第一次。强忍半晌压下鼻头酸楚，杨戬直起身来，打桌上取了酒壶酒杯，三下五除二办完既定程序，酒液刚滑下肚，长臂一展捞起女郎再伸手托稳了，微微扬起头看定她，轻声却清晰地言一句：“我爱你。”<br>
敖寸心这边突然离了实地，一声轻呼下意识将两腿缠在了他腰上借力，刚想嗔怪句，听见他话语，突变了脸色，纤纤玉手化成利爪从人肩头前移。双掌围定他脖颈要害，两拇指正按住喉头，只要再一用力：“你是谁！？不说的话信不信我掐死你！”</p> <p>说完那句没得到想象中的温香软玉，饶是智计百出的二郎真君也被打了个措手不及。<br>
敖三公主以一千七百年日日夜夜赌咒发誓不肯“上当受骗”，司法天神苦思冥想，脸色沉了又沉，不得已建议：“听声音宴席还未散，咱要不去前头寻托塔天王的照妖镜来？”<br>
龙女转转眼珠暗思量他既敢提这出难道真的是真的真的不带怕的？再想想杨府重重禁制现下又恰聚集着满天神佛，再大胆的魔头也没必要在这时这地冒风险。蹙起眉犹犹豫豫问句：“你真的是杨戬？”可手上并不敢放松，远的不说那人师弟就是个神通广大的，亦曾哄骗过她。<br>
——该怎么办呢？照妖镜虽好但若让她以现在这个姿势跟他出去，不管照出来是真是假——<br>
敖寸心被自己脑海里的想象吓得打了个激灵，再赶紧摇摇头把画面抹去。</p> <p>他又提“那会儿路过假山时候你扯了我衣袖，我以为……”</p> <p>嗯？那会儿？假山？</p> <p>正堂前院里高朋满座推杯换盏，老谋深算的家伙们客套着，年轻人却不得趣。随着夫君敬完一圈酒敖三公主借口更衣，不期然看了幕“私会”，男主是她东海八弟。<br>
“你爱不爱我”是懵懵懂懂少年男女最爱问的问题，听了百遍千遍“爱你”也仍忐忑仍想再追问一句。<br>
他寻来时她离席尚不久，他想出口唤她被她掩住轻“嘘”。<br>
她不愿打扰小情侣，他们转身时身后飘来轻语。</p> <p>“……我以为你想听这句。”</p> <p>敖寸心闻言愣了一下下，勾起唇露点笑意，攥住他脖子的小手不仅没松开，反而更用了力。</p> <p>“爱之一字最惹相思，杨戬他……”</p> <p>呼吸开始不大畅快，声音有些涩滞：“你逆鳞在耳后发里……”说到这儿杨戬悠忽忆起。</p> <p>那个不太清晰是何年何月的午后，恰满园春色风正好，他在廊下看书，她走过来挨着他坐了，俯下身枕上他膝头。<br>
她问他看的是什么，他说，“一个熟人的传记。”<br>
许是因他们也有个狐狸成精好朋友，她絮絮叨叨一个劲儿同情那祸国殃民苏妲己。三千情丝绕指柔，她的话他早听不进去，那一刻他突然有些理解了商王，江山哪里能与美人相比。</p> <p>后来他再找不到那卷书了。后来她缠着他还想听，那时年轻气盛恼她不知欲取也需予，编了个“讲过便是，只说一次”红着脸逃开去。</p> <p>敖寸心听他叫破她弱点时便卸了力，这时候未阻拦，被他又抱了去。<br>
他们胸口贴着胸口，他低声在她耳边细语：“我改了主意，以后每天都会说‘爱你’。”</p> <p>红烛燃尽日高企，醒来讲完第一句，龙女摸摸鸡皮疙瘩纠结了：“这话听不到时候怪想的，一直听怎么有些肉麻……”二郎真君不待她说完神色急，低头将那惹是生非的小嘴又含了去。<br>
敖三公主费尽力气挤出句含含糊糊的：“莫让小辈儿们看笑话。”止住了天神大人兴头，待人理好衣开了门，又扯人衣袖哼出三个字轻如蚊蚁。</p> <p>沉香小朋友传菜正忙碌，对着迎面儿来的人嘴上没个把门儿的：“哎呀大清早丁香你脸怎么这么红敖春又怎么欺负……”看见跟在女郎身后一脸严肃的人恨不得把自己舌头咬下来吞进肚子里。<br>
小玉救命，娘亲救命……等等，舅舅耳根怎么那么红呢？</p> <hr> <blockquote><p>后记：那个“爱只说一次”梗儿没错是我被动画片宝莲灯主题曲洗脑的结果哈哈哈</p></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/112500.说我爱你.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/d90180/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">醉生梦死</div></a> <a href="/pages/26100e/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">二爷您最近上火啊？</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
