w8Tr7p+hgLLNL0FPxx/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">【戬心陪你过大年】初七·何悟不成匹<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>桌上堆着烈酒、金疮药。杨婵端进来一盆热水，担忧的目光落在杨戬身上，被他眼神示意后，无奈地走出房间。</p> <p>他拿起那壶酒，整瓶浇在了肩膀上。那里有一根狭长的金标，将他的整个肩胛骨对穿而过，血自伤口沁出，汇聚在标口处，被那烈酒一冲，淅淅沥沥地落在铜盆中。</p> <p>杨戬虽未嘶声，但已痛得青筋暴起，接着铁夹抵上金标夹稳，发出当的一声脆响，门外矗立不安的杨婵绷紧了神经，下一刻，她听到杨戬一声闷哼，血肉撕裂的声音乍响，是他将金标生生地拔出来了。</p> <p>“二哥！你还好吗？”她急得冷汗直流，半晌听不到杨戬回应，直欲违背他的命令冲进去，方要推门，才听见真君虚弱而咬牙切齿地回答道：“我没事……再给我打一壶酒来。”</p> <p>杨婵闻言，只好忙去打酒，赶回时，只看到杨戬已经将伤口包扎好，面色苍白地半靠在睚眦宝座上，呲牙咧嘴的兽头仿佛立即要将他吞噬。</p> <p>听她回来，杨戬睁开耷拉着的眼睛，用左手接过那壶烈酒，仰头干了一口，以期缓解尖锐而绵长的疼痛。他闭着眼默默地喝下四口酒，这才将将好一些，长舒了一口气，安慰担忧的杨婵：“我没事了，三妹，你回罢。”</p> <p>三圣母心中有万分的担忧，但心中深恐兄长再添一份烦扰，只好装作不知，只是皱着眉走到他身边，扶他走到床侧坐好，状似无意地说道：“今日二哥受伤之事，除我之外再无第二人知晓。梅山几位大哥虽已被提前外派下界办理公务，但他们性子都豪爽，不明白二哥的苦心，已经与你渐渐生了嫌隙。或许二哥该早日将他们遣回梅山，以防日后生变。”</p> <p>杨戬为求算无遗策，已强压着自己殚精竭虑多年。今次为求得昆仑雪山众神的一诺而身赴险境，受此重伤，一时间也身心俱疲，排斥这些事的情绪异常膨胀，压着太阳穴揉了揉，对杨婵说道：“恐怕并不简单，先不说这些罢。”</p> <p>杨婵看出他眉宇间化不开的疲惫，心中担忧，面上却故作不知，浅浅地答了一声，收拾好房中血迹斑斑的绷带与器皿，悄悄退出了屋子。</p> <p>夜至半，神殿之中忽然异常的寒冷，杨婵从睡梦中被冷醒，披了衣衫到水池边查看，原来是下面的一层浓云正向下界降雪，寒气陡升，将整座真君神殿也围得冷冰冰地。</p> <p>三圣母心中挂念着杨戬，提着灯去主殿中查看，一进门便见到他寝室中的灯烛熄灭得整整齐齐，连忙走到他床前一看，只见他帘帐也并不放下，被褥不曾盖好，面上泛起一层病态的红，用手一探，果然烫得异常。</p> <p>三圣母连忙摇晃他：“二哥，二哥！”见他烧得混沌，一时取了湿帕子替他敷额降温，点燃屋子里的灯烛，又连忙替他掖好被子。她心知此是因金标神器入体，伤及内脉的缘故，决不能用法术干预，待内力神脉逐渐恢复，身体痊愈，神仙之体自然能不再生此凡俗之病。但想起兄长这一路以来的艰辛、坎坷、曲折，心中实在止不住地心疼。</p> <p>她将杨戬的被褥又拢紧些，翻出神殿中有疗愈功能的香料点上，正为他擦拭额头，忽然被他一把抓住手腕。</p> <p>“二哥？”</p> <p>“……”</p> <p>杨戬睁开眼，目光之中有灼灼的希冀，定定地看了杨婵半晌，闭上了眼，发出一声长叹，放开了她的手。</p> <p>“三妹，”他闭着眼，浓密的睫毛之下有点点星光闪烁，只是说着溃不成军的醉话，“我想寸心了，你找她来，我想见她。”</p> <hr> <p>杨婵深夜拜访三公主时，并不抱一丝希望。可她没想到，说明缘由后，敖寸心只是沉默了几瞬，便应下邀约，与她一齐潜出了西海龙宫，直上真君神殿。</p> <p>寸心推开门，走到床边，夜色如水一般，殿中的灯烛闪烁着，印在杨戬的脸上，显得他更加飘忽。龙女此时心中竟不知是凄然还是释怀，她坐到杨戬床边，那人似有所感，轻轻地睁开眼，见到她在葳蕤的烛火下，容颜宛若新婚的那天一样娇艳。</p> <p>他心中默默地呢喃道：“寸心，寸心……”抬起手欲触碰她的面颊，只是右臂伤重，竟抬不起来，阵阵的刺痛仿佛击在他心底。杨戬一时掌不住，怔怔地看着她，落下一滴泪来。</p> <p>龙女心头一颤，默默地伸手擦干他的泪水。这时教他能动的左手一把攥住，杨戬偏过头去，轻声地和她示弱道：“寸心，我好痛。你取床边的酒壶，再让我喝两口。”</p> <p>寸心倔强地不肯落泪，也不挣开他，替他掖了掖被角。龙女的手冰凉，贴在他的面颊上，慢慢地分散着热量。她也贴近他一些，说道：“现在知道痛了么？就不给你取，就不给你喝！痛死你，你才知道厉害！”</p> <p>杨戬心中大感委屈，连声求道：“寸心，我好痛，好痛。你心疼我，你最心疼我的，让我喝两口罢，求你了。”</p> <p>他原本行事谨慎，城府极深，但连年的殚精竭虑，已经将他逼到绝境。今次受此重伤，虽然不会危及性命，但痛确实不折不扣，何况又染风寒，又为镇痛饮下烈酒，一时间再也不能顾及甚么，心中只感到一阵又一阵的委屈，好像要将这么多年的酸苦都发泄出来一般。</p> <p>寸心本就心系他的伤势，见他如此，如何不一一顺从？只好取了酒，喂他喝下，又用酒液擦拭他的额头以期退热。折腾了大半个晚上，那烈酒的酒性正发作，总算将他的疼痛压下了七八分，杨戬逐渐安份起来，却极力地睁着眼，不肯入睡。</p> <p>杨戬第无数次挣扎着欲坐起，被寸心一根手指顶住额头按了回去。被制服的真君蔫蔫地半趴在榻边，头发卷卷的，乱糟糟耷拉在额间，看上去十分可怜。他纵使已经困极，但还是努力地睁着一双异常明亮的眼睛看着龙女，“寸心，我要靠着你的腿睡。”</p> <p>寸心本想狠狠心转头就走，但被他可怜兮兮的目光看得实在无法，只好伸手久违地揉了揉他的脑袋，触手间是极熟悉眷恋的软绵绵的感觉，也令她不由自主地想起他身上淡淡的松竹味道。她叹了口气，轻声说道：“不可以，听话。我等你睡着再走，好不好？”</p> <p>“我不要！”杨戬攥住她的衣角，怎样哄都不肯撒手，“寸心，你别走，别留下我一个人……”</p> <p>寸心一怔，素白的指节轻轻地描摹着他的眉眼。他瘦了，脸比从前更苍白了一些，是不是没有好好吃饭？晚上可有安眠，可有人为他添衣加被？</p> <p>“寸心，”他仍旧挣扎着不睡，委屈地眨眨眼，胡搅蛮缠道， “我要枕着你的腿睡，求你了——我要……”</p> <p>寸心拿他没办法，只得依从，熟稔地半抱起他，将他安安稳稳地枕到腿上，轻拍他的肩膀。从前龙女虽不喜杨戬喝得烂醉，可当他真的人事不省时，她还是会暗嗔一句冤家，然后心软地把他抱在怀里，就如现在一般抚慰他，教他睡得踏实一些，免受宿醉头痛之苦。</p> <p>纵使现在他们的关系尴尬，如此做法也不合时宜，可杨戬需要她，正如一个个流露出脆弱和孤独的夜晚一般，她没有办法拒绝，其实也根本不想拒绝。他方才说想她了，可天上一天，地上一年，她又何尝不思念他呢？</p> <p>杨戬哼哼唧唧地翻过身来，将脸贴在她的小腹上，抱住她的腰，依恋地蹭了蹭，软声道：“寸心，你唱首歌给我听……”</p> <p>他从前也如此撒娇过，龙女不以为异，也迁就地依着他，缓缓地哼唱起字句轻柔的小调。郎君被她安抚着，终于坠入沉沉的梦境，拽着她衣角的手也松开了。</p> <p>夜深了，寸心蹑手蹑脚地从寝殿中走出来。杨婵还未走动，忧心忡忡地站在殿前那颗快要死掉的梨花树下等着她。</p> <p>见她出来，杨婵快步迎了上去，“三公主……二哥他怎么样？”</p> <p>“他睡下了，没事的。”寸心与她携手自抄手游廊边缓缓向外走，边听杨婵道谢之语，见一路上的植株不是已经枯死，就是奄奄一息，整个宅邸透露着一股沉沉的行将就木之感，忍不住问道：“他一直……我，我是说，他休息得好吗？”</p> <p>杨婵摇摇头，叹息道：“他从不休息。”</p> <p>寸心一惊：“不休息？可人不睡觉怎么能行……”</p> <p>杨婵觑着她的侧颜，见她依旧明艳非常，丝毫没有因为这些年的风波而显得憔悴，反而透露出一股纤纤弱质之姿，教人看了就止不住地想要呵护亲昵。她不由得有些神伤，轻声道：“寸心……我想二哥他，一直很想你……”</p> <p>龙女闻言，只是低头不语。杨婵送她出了南天门，心中也晓得她在刻意地回避这个话题，再不敢多说，只是站在天阶的尽头，默默看着龙女化作龙身，往西海飞去，渐渐消失在云雾之间。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/012800.何悟不成匹.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%83%E9%99%AA%E4%BD%A0%E8%BF%87%E5%A4%A7%E5%B9%B4" title="标签">#戬心陪你过大年</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/535252/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">【戬心陪你过大年】初六·年岁深处</div></a> <a href="/pages/ba18a0/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">【戬心陪你过大年】初八·初尝</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
