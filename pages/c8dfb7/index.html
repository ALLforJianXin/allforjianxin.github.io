一礼柔声道“见过真君大人”。</p> <p>听闻此言显圣真君忽地抬起头，手中书卷搁置一旁，直起身来，眸光闪动“寸心？这听心的拜帖——我不知”他话声一顿又道“这便你我二人，倒不必这般客气。”</p> <p>他说着便起身来迎，龙女见了心下一松，亦上前几步捧出个檀木锦盒，温声道“听闻你有伤”敖寸心说着脸上勾出点歉然的笑意“只怕添了麻烦”——也不知那嫦娥仙子是不是真的大度。</p> <p>杨戬从不懂这些个女儿家的弯弯绕，直以为公主殿下疼他，一时间春风满面，声线温和“只是点皮肉苦，早无大碍。”他说着已来得龙女身前，将龙女柔软的手掌和锦盒都捏在了手中。</p> <p>显圣真君身量颇高，龙女站在他跟前只小小的一个，这会仰着纤小的面孔，圆圆的杏眼乌亮亮的瞧得人心软，“咱们坐下说话。”</p> <p>杨戬拉着她想叫她挨到自己身边来，龙女却端正的坐到小几的另一头，她或许是矜持，杨戬想着不觉摩挲下掌中细腻的手背。</p> <p>他俩往日好好在一处时，多是敖寸心说话，叽叽喳喳的像春日枝头的云雀，他便只偶尔回应两句，这姑娘也能笑意不止，连带他也高兴起来。</p> <p>可今日小云雀好似在生气，几番欲言又止，他问些什么也只嗯啊的应付两句，他想起往日龙女因为月宫仙子拈酸吃醋，委屈又恼怒的样子，抿抿嘴便要解释。</p> <p>敖寸心浅浅地呼出口气儿，鼓足勇气话道“那黑水河的鼍龙，司法府拿了他，欲如何处置呢？”听闻此人姓名杨戬眼前立马浮现起一张桀骜不驯的面孔，还有话语间提及龙女与他非比寻常的情谊。</p> <p>她今日是为那小子求情来了——心里冒出这个念头，二郎神只觉腮骨隐约疼痛起来，颇为光火“问他做甚？”杨戬说着本来牵着龙女的手也抽了回来。</p> <p>敖寸心瞧着他冷硬的面孔，心下涩然，杨戬端直“以权谋私”历来都是他的霉头，可念起几近哭瞎眼的姑姑，敖寸心还是咬咬牙话道“我姑父已然正法，若这幺子也有个长短，可叫我姑姑如何活呢？”</p> <p>龙女说着倾身去劝“他年纪尚小，总有糊涂的时候，给他个活头，往后父王和姑姑都会好好教的，这取经路上为难的人何其多，也非个个都……”</p> <p>敖寸心正说着，杨戬忽地转过头来，剑眉菱唇皆一挑，声色沉沉“殿下好像不太会求人”，轻嘴薄舌间杂着倨傲之色，叫人颇为难堪。</p> <p>他本不欲如此，那鼍龙本就至多吃上几年牢狱，也就饶过了，可是眼见她为旁人心焦，他如何不恼，这些恶意此消彼长，偏叫她知难而退。</p> <p>龙女闻言一怔，他俩相识千年，杨戬向来持道守礼，往日便是气极，对她也是没有这般刻薄面孔的，耳畔又响起听心姐姐劝她的话‘皇门阶前便是黑黢黢的染缸，有谁能全须全尾地出来呢？他如今是千般心肠万般手段，你又何必去自投罗网。’</p> <p>敖寸心腹内酸楚，犹豫不决，杨戬见此心下却一松，那小子果然还是不值价的，他正想着这龙女却起身跪坐到他脚边榻几上，双手攀上他的小臂，整个人软软地倚到他膝头，眼里起着淡淡的薄雾，柔声细气道“真君，饶他一回罢？”</p> <p>她今日穿着件藕荷色的春衫，云雾般单薄的衣料，打这高处看去是她纤长白皙的脖颈，这会见他不言，整个人便又往他怀里靠了靠，双手抓着他腰上的鞶革，贴紧了腿侧传来的是她柔软的体温，龙女话声软糯又委屈“寸心没有法子，帮帮我好不好，二郎？”</p> <p>鼻尖是萦绕不去的柔媚馨香，心头烈火越烧越旺却变了味道，杨戬紧瞧着敖寸心目光灼灼，心下翻来覆去地想“这样惑人的把戏，又是谁教给她的？”</p> <p>沉默间龙女几近落泪，她无从知晓杨戬心下所思，只想着掌权者譬如她父王，大抵吃软不吃硬，是以便拿出那套装痴撒娇，望杨戬可怜可怜她，可这家伙却像油盐不进，瞧着她的样子像是要吃人。</p> <p>龙女想着正要退缩，杨戬忽地将她整个人提拉起来，一个翻身按倒在榻，他双眼暗沉声线压抑着什么有些哑“那殿下可得给些甜头。”他说着气息拂到龙女耳畔，竟有些烫人，龙女受惊缩瑟一下，下意识便要去推他，却被他抓住了手，“怎么，小殿下竟这般吝啬吗？”杨戬轻轻摩挲着掌中细腕，隐晦暧昧。</p> <p>“天神权近通天，便是三界魁首亦为您倾倒，小龙如此薄柳之姿，不值大人青眼……”龙女奋力欲将手抽回，挣扎无用，不觉去踢他却叫人轻易制住，柔软富有弹性的身体叫他紧紧压在身下。“本君如此权势煊赫，你却不放在眼中，胆大包天，”后头这几个字说得有些咬牙切齿，杨戬鼻尖轻轻蹭过她的面颊，眼睑低垂，金色眼尾有些许殷红“要罚”，他说罢便偏头吻住了她。</p> <p>湿热的舌撬开龙女的牙关，与她的软舌纠缠，几时又叫他带到嘴中，重重吮吸近乎活吞了她，这一双手也是不老实的，一来二去便将她剥的干净，身上一件单薄上衫可怜兮兮的挂着，浅红色的衣衫将掩难掩这白腻的肌肤。</p> <p>龙女一吻罢了才得以喘息，她历来矜持偷瞧眼自个几尽赤裸，慌手慌脚地便要去遮掩，“这会儿怕是迟了。”她的动作哪里逃得过神君的眼睛，他戏谑一笑，心里堵着火嘴上愈发不饶人“久旱逢甘霖，只怕如初艰涩。”这厮说这话手掌便沿龙女细软的皮肤，摸到她腿间温热滑腻那处。</p> <p>龙女闻言一怔，片刻才反应过来这浑人在胡吣什么，立时耳背脖颈均是绯红一片，瞪着一双雾蒙蒙的杏眼便要骂，却又得急忙去阻他胡来“你……啊……别！”</p> <p>可怜龙女守下失上，神君那头五指一拢，又将她乳肉把在手中，公主殿下娇生惯养，身骨敏感堪堪叫他拨弄两番，嫣红的乳尖便俏生生地立了起来，夹在这修长的指缝间。</p> <p>肤白赛雪，鲜若春花，叫男人深色修长的手掌‘欺压’着，这三种颜色在煌煌殿宇之中衬得何其鲜明，杨戬往日不若如此‘胡来’，倒是头一遭瞧得这般清楚，血脉贲张叫他额角突突直跳，龙女自然羞恼推打起来不过柳絮拂身，好似欲拒还迎。</p> <p>邪火横冲直撞，叫他发疼，龙女觉着臀肉抵着的物件，坐立难安，这会怕起来挣个不停，可那指点江山挥斥方遒的长指，早往她里头钻，直叫她发颤，龙女徒劳地抓着男人的紧实的手臂，宛若蚍蜉撼树。</p> <p>“你逃哪里去？”杨戬一低头，便瞧着她嫣红的耳尖，垂首含了去以牙啃弄，听得她颤声呜咽，甚为恶劣调笑道“本君熟路管保殿下也欢喜”他说着又舔吻下龙女润泽的朱唇“不是有求于人？伺候好了，便都依你。”</p> <p>说着，那手指又往里探入。</p> <p>这福地久疏人事，甚为狭小，紧热滑嫩的内壁收缩着，将他的手指吸裹得严实，他颇费了点力气才能堪堪抽动。</p> <p>龙女听在耳中纠结难堪，不肯配合，双腿紧合着，倒将他的手掌也夹在腿间，却哪里阻得了这手指作怪，他恶劣地在她穴间抽插拧转，不时还曲起手指，撑开紧致的内壁以便大行其道。</p> <p>龙女呻吟呜咽，脑子也昏聩，已叫不上不下的快意迫得蜷缩起来，上身绵软无力地仰倒在榻，白皙单薄的肩颈映在宝珠华光之下，纤小白腻的渡有柔光，杨戬垂头去吻，便觉她正瑟瑟不止，颇为可怜。</p> <p>如此却叫杨戬更是妒火中烧，欲望冲来更叫他满眼通红，征服感腾升，哪还分得出心思怜惜她？伸手打她腰间一圈，将人一翻，令她仰面靠在自己怀里，一手猛然扯去她身上仅余的衣衫。</p> <p>娇生惯养的公主殿下，身段白腻得好似上乘羊脂宝玉，乳肉浑圆挺翘，纤软的腰肢难堪一握，也不知待会弄狠了可会断折于此。再往下，他正覆在龙女的腿根处，湿淋淋的汁水叫他五指间也腻滑。</p> <p>龙女心下恼怒恨他刻薄，挣动愈凶，宛如跌落罗网的野马，又似张牙舞爪却无甚用的幼猫，杨戬瞧来两分懊恼外全是心痒难耐，他直想与一番疼爱，狠狠地弄哭她。</p> <p>杨戬只手掐按住龙女凹陷的腰窝，令她俯身在榻无法挣脱，另一头只手一翻叫她门户大开，并拢食指和中指拨开花户，慢慢探入，嘴上任是不饶：“殿下这身上何处，本君不曾染指？亲过吻过，往日便你这人也是我的。”他说着话，整个人贴将上来，将她牢牢锁在怀中。</p> <p>龙女最恨他气壮理直的污言秽语，伸出手胡乱推着他厚实的胸膛，却若打上了铁板，神思昏乱，却还欲奋力去抵挡涌来的一茬接一茬的快感，嘴里不觉胡乱斥骂着：“混蛋！你……无耻！仗、仗势欺人！”</p> <p>龙女白软赤裸的胴体横陈于榻，无用而又奋力地挣扎，宛若除去礼盒的甜美糖糕，任人采撷。</p> <p>“嗯……我不成了……住手……”</p> <p>龙女周身泛起沉溺情欲的殷红，樱唇微微开阖，喉头难耐地呻吟溢出，粉色的舌尖在唇齿间隐现，杨戬瞧着心头发烫，低头去吻深深地吞咽，手上的动作愈快，粗暴起来，插弄得龙女随之飘摇，忽而整个身子绷起，穴肉紧缩，一手紧紧握着杨戬浮动的手腕，居然颤抖着泄了身。</p> <p>这灭顶的快感令龙女眼前浮光不止，脑中嗡鸣，擂鼓般的心跳吵闹不止，他松开的唇间亦是不歇的喘息，杨戬眸色幽深，紧瞧着沉溺欲海的公主殿下，她丰润白皙的脸颊上透亮殷红，杏眼水雾蒙蒙，似要垂泪，便如同叫风雨狠狠吹打过的海棠，近乎残破更甚娇弱诱人。</p> <p>这会倒‘虚情假意’起来，杨戬垂首，伏在她唇边轻轻舐弄，打起商量：“小神如此尽心尽力，叫殿下欢愉，公主可否垂怜？”</p> <p>龙女沉于欲海哪里脱身，此刻正是敏感至极，叫他舔吻着便觉周身酥麻，内里好不空虚，那些‘轻浮’的念头涌动不止，却任然逞强“无人与你约定什么！我再不要求你！你……”龙女话声未落完，双腿就被人一扯，垂眼去看，这厮却早已将衣衫退去，直将那骇人的物件，顶了过来。</p> <p>龙女恼怒惊慌，不住躲避：“不要！你别……别这样！”“不要什么？别怎样？嗯？”眼见龙女如此境地，还矜傲不止，嘴中拒绝的话仍不休，显圣真君心底那些个恶劣乖张的脾性全数冒了出来：“我这是要上你，多少年了，竟还弄不熟么？”</p> <p>龙女哪里听得这些话，直叫杨戬说得羞愤欲泣，可惜这身子却不争气，对着杨家二
