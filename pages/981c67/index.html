。</p> <p>杨戬想敖寸心大概是困了先睡了，于是轻手轻脚地走进去，再轻轻关上房门。等到他转过身，便被一下子扑按在了门板上，怀里偎进了一具娇娇软软的身子。</p> <p>“我还以为你不来了。”敖寸心抱住他的腰，埋在他怀里撒娇。</p> <p>杨戬下意识握住怀里人的腰，她应该是刚洗完澡，头发还带着潮湿的气息。“不会的。”不会不来的，你在这儿，我还能去哪儿？</p> <p>“还好没过时间，我买了蛋糕。”敖寸心一手打开了灯，一手拉着他走到沙发处，“我们小杨同学终于二十啦。”</p> <p>等到灯开了，杨戬这才发现敖寸心浑身上下只套了一件白衬衫，两条笔直雪白的长腿在他眼前晃来晃去，他忍不住有点高兴，想她这是专门穿给他看的。</p> <p>茶几上摆了一个已经插好蜡烛的蛋糕，蛋糕不大却很精致，是敖寸心会喜欢的那种款式。他其实不喜欢吃甜的东西，而且宴会上他已经吃过蛋糕了，但看到敖寸心笑意盈盈的眼睛，他想自己还能吃很多很多的蛋糕。</p> <p>敖寸心点好蜡烛，又跑走关了灯，“你快许愿，快点快点。”</p> <p>杨戬闭上了眼睛。</p> <p>敖寸心透过烛火望着他的脸，突然发现杨戬是真的长大了，他再也不是那个躲在墙角的男孩子了。他现在是男人了，是不是也不再需要她的保护了？</p> <p>杨戬许好愿吹灭了蜡烛，借着敖寸心刚刚拉开窗帘透进来的光看着面前出神的女人，他有些不悦，现在对着他也会出神吗？他微微凑近了些，刻意放低了声音，“想什么呢？”</p> <p>敖寸心被这一声唤回了神，她望着他的脸，笑了笑。</p> <p>然后凑过去吻了他。</p> <p>唇上突然传来柔软的触感，杨戬瞪大了眼睛愣在原地，直到敖寸心稍稍退开了些，他才喘了一口气。</p> <p>“不喜欢？”敖寸心看他这样有些失落，原来都是自己自作多情吗？</p> <p>杨戬闻言猛地望向她，似是要瞧进她心底去。天知道他等这一天等了有多久！她怎么会觉得自己不喜欢？</p> <p>“还是你更喜欢常娥？”敖寸心为了掩饰尴尬，伸手抹了一指尖的奶油，然后又悄悄舔了个干净。</p> <p>杨戬一眨不眨地望着她的动作，清楚地感觉到自己硬了。</p> <p>“嗯？怎么不说话？”敖寸心微微歪头看着他，“被我说中了？”她的脸色已经不好看了。</p> <p>“这关她什么事？”杨戬调整了一下坐姿，唯恐被她看出点什么。</p> <p>“你和她去花园不是花前月下去的吗？”</p> <p>杨戬皱眉，“你怎么会这么想？我和她只是朋友，再说她已经要结婚了。”</p> <p>“哦。”敖寸心点点头，也不再去问他们去花园说了些什么，因为她发现了更有趣的东西。她的视线慢慢地滑到他双腿间，“不舒服？”</p> <p>杨戬脸一下就红了，索性房间没开灯，他自暴自弃地想对面的人一定看不出来。</p> <p>敖寸心又坐近了些，半个身子几乎都倚在了他怀里，“要我帮忙吗？小弟弟？”</p> <p>杨戬闻言僵住了身子，想到自己与她差了五岁，她定是嫌弃自己年纪小经不住撩拨！想着就去抓她的手按在了自己双腿间：“我哪里小了？”</p> <p>手上的东西即使隔着裤子也能觉察出尺寸不凡，敖寸心忍着笑，“你天赋异禀，行了吧？”</p> <p>杨戬自然听出了她言语里的笑意，羞恼地一下抱起了她，敖寸心惊呼一声，双腿自发地缠在了他腰上，“你要干什么？”想了想，又加了一句：“小弟弟。”她这厢正得意，却叫杨戬狠狠揉了一把屁股。</p> <p>她本就只穿着一件白衬衫，刻下整个臀部都在他手里，被他狠狠揉了几下，敖寸心忍不住惊叫出声。她还没反应过来便被杨戬丢在了床上，杨戬整个身子压了上去，将她困在自己双臂与床榻之间。</p> <p>“等不及了？”敖寸心冲着他挑眉，纤细的手指顺着他的胸膛慢慢往下游走。</p> <p>杨戬俯身贴近了她的耳朵，带着喘息和委屈开口：“姐姐，帮帮我吧。”</p> <p>敖寸心猛地闭上眼睛，叫他这句话撩拨的浑身似有火烧。察觉到耳边濡湿的吻，她睁开眼睛，双手顺着摸到他腿间，解开裤子摸了进去。</p> <p>杨戬被这动作激得闷哼一声，她的手与自己最脆弱却又最坚硬的地方亲密接触，明明刚刚还装的很成熟的样子，眼下手上的动作却毫无章法，他心上泛起一阵满足，忍不住抱紧了她，在她耳边或是轻哼或是说些私密的话，听的敖寸心整个耳朵都要烧化掉了。</p> <p>她双手握着撸了一阵，发现手里的东西除了更坚硬之外毫无变化，便有些想放弃，“要不你自己来吧……我不太会……”</p> <p>“不行，姐姐怎么能半途而废？”杨戬松开一只手伸下去摸着她的手一起动作，敖寸心被他强制着不能松开，又不知道过了多久，还是忍不住带着哭腔开了口：“我手好酸啊，算了吧……”</p> <p>杨戬有火泄不出正难受，又见她泫然欲泣的样子，只觉心下的火愈烧愈旺，他凑近她的耳朵，咬着她的耳垂开口：“我不进去，你用腿帮我吧？”</p> <p>敖寸心眨着眼睛还没反应过来，人却一下子被杨戬翻了过去，他将她摆成跪趴的姿势，伸手将她的白衬衫扒开丢下了床。因着姿势的缘故，她腰间的那朵红玫瑰正对着他，杨戬想到宴会上她的打扮，想到这朵玫瑰被那么多人看了去，心下酸胀，没忍住啃了一下。</p> <p>“嗯……你做什么？”敖寸心惊呼。</p> <p>“以后不要穿那么露的衣服了。”杨戬解开她的胸衣，又伸手去扯她的内裤。</p> <p>“嗯……哪里……哪里露了？”敖寸心是真没觉得今天的礼服有任何不妥之处。</p> <p>“我说露就是露了，姐姐怎么老和我唱反调？”杨戬覆上去，伸手握住她的胸乳又揉又捏，“乖一点，把腿夹紧些。”</p> <p>敖寸心双臂撑在床上，膝盖紧紧靠在一起，大腿之间几乎没留下什么缝隙。她被这姿势羞耻的想哭，又因着杨戬在自己胸前作乱的手想叫，到最后只能咬着嘴唇忍着声音。</p> <p>杨戬从自己裤子口袋里掏出来一盒事先准备的润滑液，挤了些抹在敖寸心大腿内侧的皮肤上。敖寸心被他这一番动作惊住了，“你怎么随身带着这个东西？”</p> <p>“你觉得呢？”杨戬哑着嗓子笑了一声，敖寸心被这声笑攫住了心神，心里直叹他变化太大，直到他从她腿缝间顶进来的时候才回过神来，扭扭腰去适应大腿间奇异的触感。大腿毕竟不是会带来太多性快感的地方，但她依然用了点力夹紧自己，好让杨戬觉得舒服。</p> <p>腿间抽插的速度快了起来，对方的皮肤拍打在屁股上，留下了两块红印。杨戬弯下身来咬她耳朵问她疼不疼，敖寸心把脸埋在枕头里拼命地摇头，厚着脸皮晃了晃腰，让他继续。</p> <p>过度摩擦爽里带着疼，皮肤火辣辣的不知道有没有被磨破皮，敖寸心膝盖不住地打颤，眼看就要跪不住了。在她腰腿脱力歪倒在床上之前杨戬接住了她，给床头垫好枕头让敖寸心靠了上去。腿依旧被并起，杨戬两只手一合就能把她的膝盖骨包在手心，让两条大腿紧紧闭好。</p> <p>“再忍忍，就快好了。”杨戬咬着她的耳朵，“你在法国的这一年有没有想过我？”</p> <p>“你快点……”也不知道敖寸心是没听到还是装作没听到。</p> <p>“嗯？想没想过？”杨戬不放过她，在她胸前的手捏了捏小红粒。</p> <p>“你别……”敖寸心颤着手握住了他在胸前肆虐的大手。</p> <p>“你回答我了，我就快点结束好不好？”杨戬轻声诱哄，腿间也停下了动作。</p> <p>“想。”敖寸心终究还是没狠下心拒绝回答，“我很想你。”</p> <p>杨戬搂紧了怀里的人，猛地动作了几十下，然后抖着身子射了出去。</p> <p>“我也很想你。”迷迷糊糊间敖寸心听到杨戬在她耳边小声说道。</p> <p>杨戬是第二天将近中午才醒的，他醒来时房间里已经没有人了。茶几上的蛋糕还放在那儿，旁边还摆了一张纸条。</p> <p>“记得吃蛋糕哟~我有事，先回去了。”</p> <p>起先杨戬还疑惑为什么回来了敖寸心还要住酒店，现在总算知道了，她定了第二天的机票！法国究竟有什么好？让她这么念念不忘？</p> <p>杨戬愤愤挖了一块蛋糕。行，既然山不就我，那我就山去！</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/110100.滟滟.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">
