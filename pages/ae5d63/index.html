杨戬端坐不动：“在哪里？”<br>
“这个，这个他没说。”<br>
杨戬冷哼：“心眼还不少。”哮天犬会使心眼也不是一天两天，从前是他太过纵着它了。“你先回去。我马上派人去阴间接他。”<br>
阎王拱手退下。杨戬按着扶手叹息，哮天犬竟能用求死的方式借地府传信，他也没有理由再不许它回神殿。如今沉香已跟着孙悟空学了三年，想必略有所成，按那小子浮躁的心性，定要大闹一场的，但时机仍未成熟，还得再压他一压。</p> <p>……不愧是以做员外为理想的刘沉香！杨戬被那一路敲锣打鼓的百姓噎得说不出话，这样大张旗鼓，生怕人发现不了他？拼着死上一次也要递回来的消息毫无用处，不知哮天犬作何感想。<br>
分身已在华山候着，为防万一，再将梅山众人也打发去，正好让他们顺道接了哮天犬。杨戬在神殿外来回踱步，天廷又是半日过去，寸心可有想他一想？<br>
思量间，沉香已打开屏障进入华山。分身即刻凝聚，拦在沉香面前。<br>
学艺归来的沉香果然与从前大有不同，不再是叫着“舅舅”求放人的青涩少年。他带着得意和自满出言讽刺：“那你真身的心在哪儿？哦，对了，反正你就没有什么良心。”<br>
杨戬险些笑出声。<br>
初出茅庐的青年也曾遇险，下海上天到处寻他的姑娘见了他，冲口而出的第一句却是，“没良心！”<br>
分身看向沉香：“那是你还不明白，到底什么是心。”笑意几乎藏不住，“比如说爱心、野心，都是心。”<br>
沉香并未细想什么良心、爱心、野心，也不在意它们到底有什么不同，他只是想在口头上压过杨戬。“那你这颗心是什么心？”<br>
分身笑答：“你没有机会知道了。”</p> <p>凡间三个时辰于天界不过一瞬，沉香果然背够了书，顺利过关。此刻众人目光皆在华山，杨戬将刀一收，纵身下界而去。<br>
敖寸心虽出不得西海，可海域宽广深邃，数年不出海也不觉拘束，杨戬来时她尚在外游玩，听闻消息匆匆赶回。<br>
“怎么突然来了？”寸心仔细打量，见杨戬气色尚好，略松一口气；又将人上下捏过一遍，不似有伤，才终于放心。<br>
一身衣裳让龙爪子扒拉得乱糟糟，满腔思念都被她点燃。杨戬抱起龙女走向内室按在榻上，“想见你。”<br>
寸心眉眼都柔和了，抬手摸进杨戬襟口：“我也想你。”<br>
也不知谁的动作更快，谁更急切，扯掉腰带剥开衣襟，龙女脖颈胸前已落下片片红梅。即使每天都到海中相会，杨戬依旧不能安定，他的一颗心怎能距他遥遥九万里。软腻胸乳随掌力变幻形状，乳尖红樱也被吮成宝石，寸心喘息着：“杨戬、杨——”随即被堵住口舌翻搅其中，腿间挤进大手，在腿根轻轻触碰，带起一阵阵的痒。<br>
“不要急，就来。”<br>
“谁、谁着急？”一边夹紧了去蹭，一边还要嘴硬，不能不让杨戬轻笑出声，使两根手指在外揉搓，偶尔才故意轻轻去刮花心。<br>
蜜水淌了满臀，龙女急躁再不能忍，缠住她的神君用力翻身将人压在身下，吃进坚挺肉杵一吞到底，才得空骂几声“你这坏人”，接着自顾上下起伏，没几下便绞紧颤缩一冲到顶。<br>
杨戬尝到无边快意，突突跳动的不止肉刀还有他的心。按着龙女伏在胸口，他慢慢向上挺腰，“等会儿寸心又要咬哪里？”<br>
“我、我咬你做、做什么？”寸心习惯性反问，又马上想起自己总被撞得失神，撑住身下胸膛略略抬起，“你还、还要挑地方……”<br>
节奏骤然加快，她成句的话也再不能说出来。熟悉了两千年的粗硬肉具依旧令她沉迷，耻骨间又腻又滑，挤着花蒂饱受刺激，甬道撑到胀满，快速的抽插强劲有力。肉刀杀至最深，刀刀见底，好似劈开了泉眼，山溪冲出来又被抽到山外。<br>
眼看着身体就要弓起，杨戬将龙女在身前按紧了，不许她有丝毫分离。朝着他熟知的地方重重捣去，听到尖叫在耳边响起。来，寸心，我们一起。<br>
龙女的尖牙刺在颈侧，帐中泛起点点腥气。尝到血的神龙已然魂魄出窍，抖着颤着绞着将他挤榨，又毫无意识地舔净所有血滴。
杨戬觉得圆满。<br>
他在寸心的身体里，他们融为一体。</p> <p>待龙女清醒看见疤痕，莫名羞愧抬手就要疗伤，却让杨戬按住不许：“留着，下次补偿我。”没意识到被人使了诈，寸心乖乖点头，从脖颈亲到他的心口。<br>
见好就收，杨戬转移话题，开始讲他那外甥，学艺归来去救母，行事高调大张旗鼓。末了来一句“他也说我没良心”，盼着龙女说点好听的哄他一哄，却听寸心不解道：“你叫他背书做什么呢？不如多指点他习武。”<br>
按住心事不肯再提，杨戬磨牙，你才是没良心的小龙女，等下次再来，一定……一定好好收拾你。<br>
“他太浮躁，读书也好磨磨心性。”这是摆在明面上的答案，说到哪里都能让人信服。<br>
“如果沉香问你，背书和见母亲到底有什么关系，你怎么答呀？”<br>
杨戬轻笑：“他根本不会去想。”读书可以开智明理，能够给人增添智慧。而神斧出世恰需如此。只要计划顺利，沉香早晚会去昆仑雪洞——“读书总归是为他好，能助他实现愿望。”<br>
寸心听杨戬这么说，便也点点头，又转而担心道：“小婵会不会跟他出来？”<br>
“凭着一把砍柴的斧头也想劈开华山？他是在做梦。”他的手从龙女脊背揉到腰间，“况且三妹也不会跟他走。”<br>
龙女摩挲他的下巴，有些痒。“三妹虽知天条不公，却还抱有期望，想得天廷赦免，以为有了赦免就可以名正言顺。”杨戬不欲多说，“寸心不必担忧，我心中有数。”<br>
“那也是你做哥哥的没给人做好榜样。”寸心戳上杨戬的脸，反让他抓住手捂在心口。<br>
“我是上过当。”他的心在她手掌下跳动，“幸好我还有弥补的机会。”</p> <p>相聚的时光总是短暂，杨戬很快又要离开。只要手下按计划行事，沉香或许会找上神殿。他那样骄傲自大、轻浮急躁，不受点挫折怕是不能改。<br>
敖寸心给杨戬整好衣襟，再三叮嘱：“一定小心，可不许受伤了。”<br>
“放心。”杨戬在龙女唇上轻啄：“我的心在这儿，我还要好好地回来取呢。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/082700.你真身的心呢.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/ef61e2/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">下海</div></a> <a href="/pages/736579/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">圆满</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
