——————</p> <p>上一年晚了，这一年便想赶个早，离开草原为时不晚，心潮澎湃的二郎真君径直入了西海，一路上直奇怪——今日巡逻的虾兵不少，只是怎地都行色匆匆，远远就往与他相背的方向去？<br>
离瑶光殿愈近，愈是看不到人影，转过处照壁突遇一名蚌女迎面闯来被他一惊张口只叫了声“三……”便被二郎神放倒又悄无声息了。很多年后杨戬才知道这蚌女此时想说的并不是“三只眼”，还累得她家公主破费安抚，但那是后话了。</p> <p>三公主正在对镜梳妆，海底没有风却也知该回头望。<br>
窗台上谁家儿郎？伸手相邀，逆着光。笑意融融，融化了谁的心肠？</p> <p>敖寸心回过神儿来的时候已经落入了杨戬怀里，他靠在窗边，她靠在他身上。耳听他今天煞是直白，直白地诉说着：“寸心，我好想你。”龙女不由得害羞红了脸颊，轻轻嗔他：“我这里都快过了一年呢，你才一天……”被他截过话头，闷闷答：“人说度日如年……”</p> <p>窗外鱼儿成群结队，屋里人成双。<br>
身量小巧的龙女要踮起脚尖才能亲到情郎。</p> <p>因着还没到思春期，与上一年急色色性致勃发不同，兼之察觉到郎君情绪异样，这次龙女分外乖巧，一下下浅浅地啄着他唇瓣，再碰碰鼻尖，将自己呈上。龙女又一次亲上来时突然调皮，伸舌尖舔过他唇珠，这下杨二郎再耐不得，抬手拢住她后颈将吻加深，直吻得龙女气喘吁吁，仿佛这样才能解解他心里的痒。<br>
趁着吻与吻的间隙，龙女粉拳轻锤，便要转身“去床上”。可杨戬从后面紧紧将她抱住，大手不安分地在她身上游走，从脸颊到耳垂，顺着颈侧下来，隔着薄薄一层鲛纱握上两团柔软又丰满，轻轻揉揉再捏捏，指尖推起乳头，龙女禁不住发出些许细弱嘤咛，似掩掉了“啵”一声花蕾绽放。<br>
杨戬大手继续下探在她平坦的小腹上往返流连，一寸寸肌肤的接触，引出体内深处的欲望。拿两根手指挤进双腿间时故意用力的按压让龙女情不自禁低呼一声绷紧身体，脑海有霎时的空白，回过神发现软了的双腿阻不住他作乱的手，他也不急着登堂入室只在外围按揉，不一时龙女下处就含满春水，在他指尖撩动到阴户时一下子泄出来，湿完他的五指再顺着她自己腿根儿往下淌。要不是被他有力的臂膀紧紧揽着她可能已经站立不住，腿心儿的颤抖还没停下又一阵狂风暴雨，她只觉腰后抵上来的那玩意儿又更形粗壮。</p> <p>再唤一声，“杨戬……我们去床上……”<br>
明明从前她也这样叫他，不知今日是不是被人一句“真情”戳中了心房？<br>
天家思凡屡禁不止，千年后同千年前也没什么两样。说到底男欢女爱人之本性，便是神仙也无法割舍七情六欲，便如他，说什么司法天神万神之上，可那并不是他心中所想。<br>
他只想——</p> <p>杨二郎胯下猛兽抵近龙女门户，低沉着嗓：“寸心，我想你……”<br>
“我也想你呀。”<br>
“我想你叫我……”<br>
“嗯叫什么呀？二郎？”</p> <p>龙女贝壳般小巧的耳廓早红透了，杨戬轻咬上她发烫的耳垂——这便是猜错了——立刻再改口，“二爷？”下体被粗暴破开的痛楚便是在说她又错了。虽是相处了千多年的熟悉物件，却每次来每次都让她心有戚戚，不来又想。<br>
杨戬粗壮的什物一下子插进去小半，龙女拧动起腰肢主动吞咽，他却突然定住了。这不上不下的感觉让敖寸心煞是难熬，正想回头问问他到底要怎样，这人却说起不着调儿的：“我最近在凡间办事，办完就直接过来了。”<br>
嗯？所以怎样？噢这是说自己也不止想了一天吗？<br>
敖寸心忍不住想笑，觉得这人真是可爱得紧，连谁想谁多一点都要比较，又听他继续说。<br>
“八妹下凡到草原，找了个叫巴特尔的年轻人……”<br>
杨天神似还在斟酌措辞，龙女却似悟了，唤声“夫君”别过头来将他望。<br>
龙女甜笑着，甜笑着唤他“夫君”，轻巧巧填满他空落落的心脏。</p> <p>龙女半扬起小脸又凑近他些：“在寸心心里面，二郎一直都是我的夫君啊。”<br>
是这样？</p> <p>下方在缓缓深入，上面唇与唇紧贴，愈吻愈引得心脏狂跳血脉贲张。<br>
终将凶器连根没入，龙女身娇体软无处凭靠，被人整个裹挟着转过身怼在窗台，窗外一尾小鱼受了惊迅速转身消失在珊瑚树上。</p> <p>杨戬大刀阔斧出入着龙女身体，看蜜桃样的臀瓣间花蕊翻红吐白，听龙女淫声浪叫一会儿“寸心不成了”一会儿又“夫君快些莫怜惜”，刚刚放下的心再次吊起来——这妮子满嘴胡诌到底哪句是真哪句是假？她现在明明时候未至，明明该神思清明些的……终还是言语了出来，“我晓得的，寸心莫哄我了。”与下身的激烈碰撞不同，声调凄凉。</p> <p>龙女小穴被那人阳物塞满，小腹被他捣得酸胀，不明白下处的热烈和他的话为何如此不一样，可被他撞得断断续续依然要说“不哄……你啊谁……哄你……了……”</p> <p>便是你哄我。哄了一千多年了。</p> <p>自然说不出口，只冲那绣帘撒气扯开来露出透明的窗。<br>
龙女惊呼“杨戬，别这样，窗户……外面有人！”那人并不理会她，甚而双手竟探到她两条腿腿弯下，从后将她抱起整个人都抬高露出在窗台上。<br>
这一时又换了恶狠狠的语调：“我不是三公主的夫君吗？三公主不让别人看看你的夫君吗？”</p> <p>龙女看向窗外，再向上望，隔着望不穿的千重碧波再隔着九万里天地，那云巅上的天宫到底是怎样的冰冷无情，折磨着多少有情人，又是怎样折磨着她的二郎。</p> <p>“你说的对。”</p> <p>龙女放下遮掩着胸口和下身的手臂，转而向后探去拢住他头颈，吻吻他脸颊鬓边。她整个被人控住没得太多施展，便只能夹紧些，这下不知又怎么招惹了那冤家，那人上身向她倾来压得她只好攀上窗框，一双椒乳贴上水晶窗。</p> <p>“你夫君疼爱你，小殿下可要受住了。”<br>
话音未落已经开始了冲刺，杨戬把住龙女盈盈一握的纤腰直往自己身下按，长出长入出来时龟头还被龙女小穴含着不舍得放，入时又连根没进根上挂着的囊袋打在她尿口又酥又爽。<br>
龙女再说不出话来只能发出些呜呜咽咽的声音，迷迷糊糊想着，千年前那次出海，到底值不值当？</p> <p>再醒来时是在自己的贝壳床上，软软的枕头软软的被子，还有温暖的怀抱和胸膛。<br>
脑海里突然跳出来昨夜浪荡——意识到这是西海不是杨府！——三公主这会儿直想找个什么深渊钻进去隐世而居再不见人了，却被拉下捂住小脸的双手来：“我设了屏障。”</p> <p>“噢。”</p> <p>等下这人怎么还在这里？</p> <p>敖寸心侧过脸，映入眼帘的是温柔缱绻一张俊脸，浓密纤长的睫毛在鼻侧打下的阴影根根分明，他呼出的气息扑面而来，让她心跳又开始慌。<br>
那人似乎看得穿她心思，下一句就是：“你还没到日子，我这次多待几天。”然后把她又往怀里拢拢，“再陪我睡会儿。”<br>
四下里寂静无声仿佛这龙女寝宫是另一方天地，仿佛这天地间只他两个相拥相偎相依傍。<br>
总归要嘴硬下：“我该起来了，蚌女要来了……”那人答曰：“不会的，不会有人来打扰，让我再抱会儿寸心吧。”她已然眼皮打架，没想明白他哪里来的笃定，又沉入梦乡。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/020222.又一年.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%80%9D%E6%98%A5%E6%9C%9F" title="标签">#思春期</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/03/11, 18:40:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/b30038/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">及时行乐</div></a> <a href="/pages/97385a/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">狎龙</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
