----></h1> <!----> <div class="theme-vdoing-content content__default"><p>好雨知时节，春夜的细雨落在西海的海面上，竟生出了几分缠缠绵绵的情意。</p> <p>秘境内，许久未见的夫妻此刻安静地相拥在一起。</p> <p>“天廷耳目众多，你以后还是别来了了？”龙女窝在丈夫的怀里，声音软软的，还带着几分埋怨。</p> <p>杨戬揽住娇妻的细腰，抓住那只扶在自己胸前的小手，细细地揉搓起来。</p> <p>“王母现在还不敢动我”，说完便冷斥了一声，“玉帝昏庸，王母一心想独揽大权又怕被众仙诟病，只好找个替死鬼帮她办事，心里的算盘打得紧啊！”</p> <p>话到这，龙女也明白，杨戬与玉帝血海深仇，不可能真心帮玉帝做事，身份又是玉帝之妹瑶姬之子，并且与天上众神不曾有过交集，比起李靖等外人，杨戬是最合适不过的人选。</p> <p>龙女抽出手指，帮丈夫揉开皱起的眉心。玉帝王母不仁，杨家个个妻离子散，死死伤伤，这是化不开的恨，解不了的怨。</p> <p>杨戬享受着妻子温软的安抚，手也情不自禁地在那细腰上摩挲起来。</p> <p>寸心嘤咛一声，腰更是软了几分，整个身体缩进了杨戬的怀里。两人虽已和离，情份未断，只盼着时机合适，再续前缘，因此，堂堂司法天神不禁学起了人间浪子，常来偷香窃玉。</p> <p>杨戬嗅着妻子的秀发，手也不老实地往上游走，一手揽着妻子的香肩，一手附在胸前的山峦上，挑逗性地揉捏起来。</p> <p>“杨戬！”龙女因为丈夫这孟浪怒嗔了一句，脸上更是一片嫣红。</p> <p>“嗯？”杨戬听着这句撒娇似的斥责，故意往龙女的耳边呵了口气，压低的声音夹着魅人的磁性，“怎么？多日不见，寸心不想与为夫共赴巫山么？”</p> <p>不待人回答，杨戬有些粗暴地含住妻子那微微张开的红唇，胭脂伴着津液被传递吞咽，舌头在强势地扫过龙女口中的每个角落后，又缱绻地勾住对方细细缠绵。</p> <p>情迷意乱的龙女杏眼透出隐隐水光，只觉得燥热难耐，身体不由得紧贴着丈夫，难耐地蠕动起来。</p> <p>杨戬被这下意识的举动刺激得吸了一口气，冷情眼梢也染上了红晕，狠狠地吸了一下妻子的香舌，才不情愿地退了出来，扯出的条条水丝把两个人刚才激烈的吻展现得淋漓尽致。</p> <p>龙女趁此透了口气，稍稍清明了一些，才发现自己的衣衫已经被扯得凌乱不堪，杨戬的手已经顺着领口探进了自己的裹衣中，自己的山峦已经被一只大手掌控了一半。</p> <p>“寸心，你可知龙涎有何作用？”杨戬肆无忌惮地揉捏起手下柔软的胸部，手指按压摩挲着有些发硬的红缨，逼得龙女连话都不能完整说出。</p> <p>“何......作用......”龙女眼中的水光此刻已经溢出，脸上更是宛若红霞。杨戬是个十分克己的人，对于情事却每每放浪形骸。</p> <p>“你呀~”杨戬叹了口气，一口含住龙女粉嫩的耳垂，舔舐起来。一千多年的夫妻，这条粉龙还不知道自己的魅力有多大，真让杨戬“恨”得牙痒痒。</p> <p>毫不留情地剥去龙女身上已经松松垮垮的外衣，将人压在软榻上，杨戬炙热的目光让龙女害羞得团了团身体。</p> <p>杨戬轻笑一声，一声寸心出现在耳朵边，柔柔的，麻酥酥的，十分诱人，听得龙女骨头都软了，眼睛顿时睁大。</p> <p>杨戬满意地起身舔了舔自己的嘴角，在龙女直勾勾的眼神里，一件一件脱起了自己的衣服。指尖抹过脖子，白色的外衫落在了地上，手指划过腰际，衣带被丢在身后的粉衫上，接着随手一扯，衣襟就开了。</p> <p>龙女看着那健壮的半光裸胸膛，眼睛痴痴的，片刻被臊得扭过头去。</p> <p>房间里暗香浮动。</p> <p>龙女被牢牢地扣在杨戬的怀里，赤裸的肌肤贴在一起，两个人都发出了一声舒爽的叹息。唇舌再次交缠，由一开始的浅尝到粘腻，再到失控疯狂，越发激烈。</p> <p>待龙女呼吸凝滞时，杨戬唇舌便一路攻城略地，由美人颈移到了凹陷的锁骨那处，吸吮轻咬着那块肌肤，迅速地留下了一串红色的印记。一只手不断戏弄着龙女挺立的朱果，一只手顺着胸脯一路向下，尽情揉捏着龙女身上的每寸皮肤。</p> <p>龙女喘息着紧紧扣住那人窄腰，口中的嘤咛越发不断。</p> <p>杨戬双眼猩红，身体某处硬得已有些发疼，但顾忌着龙女的身体，还是耐着性子做足了扩张，直到一汪春水溢出，杨戬才将自己的欲望抵在幽洞外，低吼一声，挺身而入。</p> <p>“杨.....杨戬！”过于饱胀的感觉让龙女全身一哆嗦，发出一声惊叫。</p> <p>杨戬疼惜地用舌头舔着龙女的耳廓，一只手在龙女身上安抚性地摩挲起来，身体也开始缓慢律动。</p> <p>水乳交融，香汗淋漓。</p> <p>握紧龙女的腰肢，杨戬不住地顶弄着那火热柔软的深处，肉体撞击声和“滋滋”水声融在一处，令人羞赧。</p> <p>龙女迷糊中手攀住身上人的胳膊，情不自禁地分开双腿，当火热触及她最软弱的地方时，麻酥酥的感觉瞬间侵占了身体各处，脚趾微蜷，下意识地用力绞住体内的火热。</p> <p>因为被突然夹紧，杨戬喉咙里溢出一声低吟，把本来就为自己打开的大腿分到极限，动作也开始狂野起来，一次比一次插的更深。</p> <p>“别......”龙女被突然起来的狂野弄得头皮发麻，身体微颤，喉头发出微微的轻啜。</p> <p>“寸心啊寸心。”杨戬抱住身体已经软瘫的妻子，控制不住身体的欲望膨胀，发疯似凶狠地捅了几下，把自己的欲望推到龙女身体深处。</p> <p>与身下的粗鲁的动作不同，杨戬的吻是温柔的，细致的，从妻子的眉眼到白皙的脖颈，最后唇舌交缠，从浅尝到粘腻，难舍难分。</p> <p>禁欲多时的司法天神，将人折腾了许久，直至娇妻真的承受不住，才把自己的欲望释放在幽洞深处。</p> <p>云雨初歇，喘息声渐渐平息。</p> <p>杨戬环住龙女的腰肢，把人圈在怀里，亲了亲龙女的头顶，一起享受着情事后的温馨。</p> <p>看着缩进被子里只漏出眼睛以上部分的龙女，杨戬无奈地笑了笑，老夫老妻，龙女却每次情事过后害羞得像只虾米。</p> <p>“杨戬！”被丈夫调笑的龙女恼羞成怒，恨恨地在那人胸前咬了一口。</p> <p>妻子鲜活的表情让杨戬想起来千年前他曾许下的承诺，杨戬握住龙女的手，十指相扣。</p> <p>“杨戬的妻子只能是你，杨戬也只有你一人。”所以，再等等我。</p> <p>“嗯。”西海不枯，寸心永远等你。</p> <p>曾经沧海难为水，除却巫山不是云。取次花丛懒回顾，半缘修道半缘君。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/04.04.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/7d0cbc/" class
