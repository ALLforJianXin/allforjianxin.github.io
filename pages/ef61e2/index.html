想不到嫦娥竟会追问：“你对三公主，真的动过情吗？”<br>
她仿佛没有听到杨戬刚说过的“被情字煎熬”。也许杨戬说什么并不重要，她只需要说她想说的话。杨戬不想再听下去，跨步向前。<br>
嫦娥却还要追上来：“你当初娶她，是为了爱，还是为了报恩？”<br>
一千多年来也只见过两三次的人，在神仙往来进出的南天门问出这种问题，实在荒谬至极。她想听他答什么？问过了还自顾自加上“劝解”：“三公主也许做错过什么，但有一点，她是爱你的。”<br>
实乃废话。她若不爱，怎会留在灌江口；她若不爱，如何忍受自己“折磨一千年”？寸心确实有错，错在爱他。都是因为他，才让寸心落得如此境地。<br>
王母娘娘想要走狗，自然着力打压杨戬的声望。这正合他心意，外人眼中的神仙眷侣散了伙，只能因为他杨戬忘恩负义，为求宦达抛弃发妻。如此骂名在意料之内，他心甘情愿受着，只要寸心能好好的。<br>
又琢磨了一下“值得同情的并不只是你一人”，杨戬在心底冷笑。人皆同情西海三公主，偏她与众不同么？三番两次利用信息差说些似是而非的话，看似温和无害，实则暗藏毒刺。他既已到了这个位置，也该用些职务之便，慢慢调查起来——一千七百年，他忍很久了。</p> <br> <p>“嫦娥说得没错。我不是因为爱，才娶寸心的。”杨戬忧郁地站在月下，吐出一半真话——管她说没说，在他嘴里她就是说了。杨婵噎得要死，险些翻出白眼。她的好二哥痛苦了一千年，太痛苦了所以几十上百年也不去看一次亲妹，没事就打发哮天犬来小住还美其名曰给妹妹解闷，两口子能一整年都不开杨府大门。眼看亲哥嘴里越发离谱，从七情六欲说到男欢女爱，她再不想听下去，只想说完了赶紧跑。<br>
到了广寒宫，杨戬躲在玉树后听得颇有兴致。面对三妹，嫦娥提起他的态度，与单独在他面前时相比，可称得上截然相反。当然，也未必是因人而异，许是因时不同呢，毕竟现在他已不是三界景仰的治水英雄、战场上功勋赫赫的神君，而是玉帝王母残害凡人的走狗。她现在怕人知晓，又想撇清，迟了。<br>
只是没想到玉树碎片竟会落到西海。不知这是王母的要求还是嫦娥擅自行动，不管哪一样，都证明他过去一年的谨慎是正确选择。<br>
杨戬在西海边站了一宿，从未想到命运居然还会如此眷顾于他。当三公主如从前一般扑入怀中，当龙女对他又拧又打，他心中只余狂喜。</p> <p>敖寸心拉着杨戬的手，引他走向海面之下。<br>
距离上次入海已近两千年，回忆那么远又那么近。<br>
然而杨戬暂时还没有故地重游的机会。<br>
当年他直捣龙宫，闯入公主寝殿，抢走西海的宝贝公主，打飞无数水兵，如今想来西海分明是做样子给天廷看罢了；只是他年轻气盛，又生怕寸心当真弃他而去。直到接下懿旨，暂时分离，也不曾正式拜访岳家。如今下得海去，却是让三公主偷偷带去封地，倒真有点见不得人的样子。<br>
寸心看起来气色极好，与离家时相比还丰腴些许，可见在西海过得舒心。是了，西海才是她惦念千年的家。<br>
三百年来，她的喜怒哀乐无他参与，她的生活中是否还有他的痕迹？他尚困在昨日，而她的时间已飞速流淌。</p> <p>西海三公主的封地在西海偏南处，是一片温暖的浅海，海底植被颇丰，物产繁多；又有大小岛屿几座，景致各异。此刻天色将明，杨戬被三公主拉着，直下海底到达宫殿群外。<br>
三公主却不走正门，绕来绕去转到建筑深处；路上抬手送出水流，似是传信，偶遇几个宫人皆是行礼后匆忙离开。杨戬反手捏住龙女指尖，心中略有忐忑。他这样见不得人吗？还是说寸心想瞒着她家里？不知道现在西海对自己到底如何看待……又想到他此时的名声，越发觉得没希望。<br>
就这样一路乱想，直到被寸心拉入一座院落，走过大厅，进入内室坐在桌案后软垫上。<br>
杨戬这才暂且收了心思，抬头打量房间。此处格局竟有几分熟悉之感，方才走过的前厅正中有屏，左右有侧间，绕过厅堂两侧小门，穿过花廊，便是卧房；踏入卧房的那一刻，他就知道左侧屏风后必有浴池，右侧垂帘后定是床帐。<br>
案上已泡好一壶香茶。<br>
龙女在他身旁坐下，倒一杯茶递来：“我这儿如何？”<br>
杨戬接过茶杯，又放下。他缓缓吸气，胸腔慢慢鼓胀。难以置信的喜悦击中了他，一直以来束缚他的某个枷锁突然断裂掉落——如今这样的场景摆在面前，可替代千言万语。寸心回到西海也会想念在杨家的生活，是不是也一直在想着他？</p> <p>敖寸心特意把杨戬带到这间仿杨府规制的寝殿，自然是存着让他开心的意思；其实她平日并不常来，来了也是徒增思念，何必自苦。她盯着杨戬的脸，见到他眼里骤然亮起的光，得意地凑上去贴近了些：“怎样，喜欢么？”话音未落就被死死箍住，深且重的亲吻封住她的双唇，舌尖急切探入，在她口中搜刮一圈又狠狠纠缠。<br>
直到喘不过气。<br>
寸心捶他：“做什么呀这么急……还没答我话呢。”<br>
杨戬一言不发托着龙女腿窝站起来快步行至床榻——与杨府内相差无几的一张床塌，三两下扯掉盔甲。她跪坐他腿上，而他积年的欲望已显露无疑。杨戬定定看着龙女，等她许可或否定。他知道自己的卑劣，以卸甲做出对渴望的明示，寸心可能会羞涩，或许会推拒，但最终总会不忍拒绝他。<br>
其实敖寸心并不曾考虑太多，或者说她从未有过疑虑。杨戬想要她，她也想要杨戬，过去或者现在，一向如此。她扣住杨戬肩膀，沉腰碾下。<br>
好似火星突然点了油桶，浑身肌肉即时绷紧胀满到极限。杨戬僵硬微抖的手扯开两人腰带才将裤子剥下去，便就着龙女分腿跪坐的姿势，把怒胀的阳具顶进去，重喘出声。<br>
距离上次深入她体内已过去太久太久，可即使是这么久，他也从未忘记她甜美诱人的滋味。骤然裹缠上来的肉壁几乎箍紧他的呼吸，他只能喘息着低吼着拼命向上，如打桩一般疾速向内猛凿，无法自控，不能稍缓。<br>
隔着三百多年时光才又一次容纳杨戬粗壮的肉刀，硬逾铁石的东西势如破竹刚入内便挺入最深处，让敖寸心尖叫一声哆嗦着泄出一汪黏滑春水。没有充分前戏原该一路生涩，可无数年空虚的闺阁独处早让她把杨戬想了又想，此刻久别终于重逢，她甘霖尽出迅速润滑了甬道，随着抽挤流淌出来。<br>
掐着杨戬的肩膀，敖寸心一口咬上他的脖颈，呜呜咽咽抽泣起来。“你怎么才来……杨戬你这混蛋，你怎么才来……”话语让疾速的颠簸撞得凌乱破碎，杨戬扳过寸心的脸亲上去，狂乱的吮吻啃噬像要吞她入腹，身下顶撞不停，全身经脉血肉中都是奔腾的情欲，销魂蚀骨的快感抽打着鞭挞着让他无法停息。<br>
太可怕了，根本没有停下舒缓的时间，高潮接二连三炸得寸心脑中一片空白，身体被控住只能被动颠簸起伏，每一次捣入都将甬道撑得毫无缝隙，密集的捶碾撞击让快感层层攀升，高潮叠加，刺激到了癫狂的地步。<br>
不知越了多少高峰穿过多少巨浪，敖寸心声音已经沙哑，杨戬才颤抖着射进龙女身体深处。敖寸心的脸早已红透，因频繁的高潮汗水涔涔，嘴唇咬得发肿，闭着眼睛恍惚许久才慢慢缓过神来。杨戬搂着她兀自喘息不休，两人下处黏腻一片，上身衣服都还在，只是凌乱许多。身下穴内仍在抽搐，寸心却抓着杨戬衣襟嚎啕大哭起来。<br>
杨戬心中剧痛，除了喃喃“是我不好”“全都怪我”，再不知如何开口，索性什么也不说，只搂着龙女安抚，自己也慢慢红了眼框。<br>
许久，痛哭转成抽噎，杨戬才轻拍龙女，准备退出稍做清理。敖寸心却按着他不许起身，抽搭道：“不、不许起，我还要，”哭腔又带起来，“我还要你。”<br>
“好，我们再来。”杨戬安抚地亲亲她的额头，给她擦掉眼泪，一边前后磨动一边慢慢解开两人外套内衫，又脱了寸心小衣，温柔地亲吻她的脖颈、揉捏她的乳房，将乳尖蓓蕾吮得硬挺。两人歪倒在榻上，杨戬搂住八爪鱼一般缠紧她的龙女，用她最喜欢的方式去挑逗她刺激她，将她送至山巅抛下，轻柔地接住缠绵许久，又缓步把她拉到云端。直到她说够了不要了，他才放任自己获得满足。</p> <p>我不是因为爱，才娶寸心的。杨婵不知道，杨戬说的是久藏于心的愧疚。<br>
他也曾夸口，“为了爱”。<br>
自万念俱灰中睁开双眼，她就填补了他胸口缺失的那一块。她从鲛绡后透出光来，引着他的视线与心神追随不止，每一次想要远离的尝试都让他变得残缺变得痛苦。他想让她留在身边，他想与她日日欢好，他都如愿以偿。<br>
为了爱，为了谁的爱？<br>
是他渴求她的爱，是他索取她的陪伴，是他想让她的身心都完完全全属于他一人。幸而，她也爱他；但她还有西海，割不断的血缘亲情横亘在她们之间。<br>
一千七百年后，他终于能够诚实面对自己，一切皆是本欲，他有欲望，他在索求，寸心才是在付出的那一个。西海受寸心牵连，而寸心为他所累，只因王母想要走狗，他油盐不进，寸心是唯一突破口。<br>
当他终于直面他的欲望，坦承他的索取，他能做的只有放开她，让她回家。<br>
时至今日，寸心对他眷恋依旧，仍然愿意接纳他，或许仍旧爱他。天地时差有如鸿沟，他是否仍是三公主唯一的选择？<br>
从早至晚缠绵整日，寸心终于沉沉睡去，睡着了也紧紧抓着杨戬不肯松手。杨戬知道，从这一天起，他的生活将产生剧烈改变。他必须将寸心细细密密保护起来，不能让天廷再伸手到西海。他必须设法加快步伐了。</p> <p>敖寸心快活极了，她每天在杨戬怀中醒来，闹上半晌，再拉着杨戬逛她的封地。杨戬也终于知晓龙女口中“你家床忒小”是与她公主殿下的珊瑚床做了对比，两人在那座仿杨府的院落住了半月，又搬到公主日常起居的寝殿里，三公主把宫人都撵到外围，美其名曰“免得你天神官威吓到我家侍女”，每天开开心心享受司法天神尽心尽力体贴入微的服侍。<br>
她还让杨戬穿好朝服给她看，再提笔作画，把她日常见不到的司法天神记录在纸面。<br>
“好，画完啦，你来看看？”敖寸心收笔，唤杨戬来瞧。画中人一身银甲披挂，手持三尖两刃刀，立于山巅，面对大海，乌黑大氅在海风中翻腾。敖寸心越看越喜欢，拉着人赞道：“杨戬你真好看。”<br>
杨戬瞧了瞧画中纯黑色的大氅，解下披风裹上龙女：“好寸心，你再仔细看。”自那日在夜间重逢，她还不曾仔细看过他的装扮，方才作画时也没叫他转身。寸心不明所以扯开披风低头，“……这是，我？”其实并不像她，但她就是知道，那一定是她。<br>
“寸心才是最漂亮的。”杨戬亲吻龙女发顶。<br>
“我知道，”寸心笑起来，“我们俩一直都是最般配的呀。”</p> <p>在西海三公主的封地中，杨戬度过了许久未有的松快时光。海域自成一体，隔绝天廷一切窥探，在这里他不是司法天神，不是二郎神君，就只是敖寸心的杨戬。<br>
计算着日子，他在天界黎明来临前与龙女告别，又重新做回那个满腹算计声名狼藉的司法天神。待到天界的下一个黑夜，他会再次入海，与心爱的龙女相聚，为她献上他的一切。<br>
他仍有欲。无数次，他想不顾一切把寸心带在身边，藏入神殿深处，将她与三界隔绝，让她身边只有他一人，心心念念全是他。他仍会索取，用尽每一分力去索求龙女的爱。<br>
但他更知道他该付出，只要能让寸心欢喜，让寸心平安，他的爱就能获得满足。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/081223.下海.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/24b934/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">还要贴贴</div></a> <a href="/pages/ae5d63/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">你真身的心呢</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
