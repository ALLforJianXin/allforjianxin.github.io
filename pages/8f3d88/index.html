h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">体似酥<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>是夜凉，龙女独自躺在大床上，垂眼看着半开窗棂外月影婆娑，心内安宁，便待入睡，忽然听到门扉一声响，哐地一下撞开了，跌跌撞撞跨入一个高大的汉子。</p> <p>她不必细看便晓得是杨戬，心中烦乱陡起，随手扯过身旁的软枕，用力向他砸去，“你还回来做什么！你还肯回来！”</p> <p>杨戬吃得酩酊大醉，教那软枕砸了一下，反手抱入怀中，踉跄行至床头，扶在帐杆上，呼吸间喷出酒气，混不吝地笑道：“好夫人，你二爷今日醉了，替我宽衣，好与你睡觉。”说罢，便一手拉开帘子，附身倒了下来，抱住龙女又亲又摸。</p> <p>寸心岂是好相与的，挥手直打他，见他不管顾只知揉蹭她身子，心头不由委屈，泣骂他道：“不过说了几句便离家三四天，浑灌了几两黄汤，就来搅人清梦！你就知道那档子事，否则也再想不起我来！”</p> <p>杨戬正吮她的香肩，那话儿直挺挺地立住，抵在她身子上不住地磨，因喃喃呐呐地道：“什么话？想你身子也成了罪过？好娘子，就允我作弄一回，我忍了这许久，再也禁不住了……”便解衣带，直欲入内。</p> <p>寸心哪里肯，伸手尽力一推，杨戬虽醉，身形壮硕，推他不动，反拉扯着搓揉肌肤，硕大的行货塞进她并拢的腿心处，龟头棱角擦在鱼口处，龙女一声娇呼，毕竟与他做了多年的夫妻，一时间身子酥软，牝中痒热，流出许多水儿来。郎君觉察，因笑了一声，期期艾艾地吻将上来，口中含糊不清道：“小淫妇，你也想着我这家伙不是？腿张开些……爷今日干你下不来床……”</p> <p>他酒醉后言语粗俗，寸心听在耳中，一面觉得羞恼，一面却愈加身子软乏，欲心渐起，也是多日不曾与这冤家云雨，是以难耐。他声音乍响在耳畔，也觉得醇厚动人，亲切之至，更不提行动亲昵，唇齿交缠。</p> <p>她正欲做最后抵抗，并着腿咬他下唇一口，骂道：“你只会欺负我……没良心！唔……”话音未落，双腿已教杨戬强行掰开，一手将枪头压下，挺身而入，竟直直地没根顶进，将龙女肏得惊叫一身，顿时软身依偎在他臂膀上。郎君一举进了温柔之地，只觉包裹紧密，温软难当，淫心大起，趁着酒意酣浓，一手拿了一个奶子飞快地插拽起来，棒身上青筋暴起，入在牝户当中，不过三四回合便操得龙女蜜水直流、娇啼不绝，把半条床褥都浸湿了。一时情切，再不肯挑他的错处，抱住郎君脖项，来来往往地耸将起来。</p> <p>一时入得二三百个回合，龙女久疏情事，料想丈夫也是如此，但觉小腹中那话儿硬如精钢，大得不住，直操得身子酥麻，牝中痒热，浑身翕翕然，美快不可言，已泄了三回。杨戬醉眼朦胧间见此，更是不胜欢喜，将她搂在怀里亲了几口，使那行货往里垦行，撞得花心微张，又是一口淫液吐出。他颇为舒畅，对身下满面红霞的娇客问道：“小荡妇，我的这根鸡巴干得你怎样？”</p> <p>龙女素日也与他胡闹的，却怎么听过这等脏的言语，登时羞恼个不住，连连打他，“你说的甚么！哪里学来这些腌臜话，在外面浑说也罢了，现在却来逗引我！我是你老婆，不是那脂粉头子！啊……”却被他深深地一插，堵住口舌，狠狠地搧打起来。未几又入了几百合，方才稍止，压着美妇一径舔含冰肌玉骨，含糊说道：“寸心便受着我的欢爱，也不该疑我……”龙女又丢了三四回，软身偎在他怀里，也深惧他久旷之身，因软了嗓音只弱弱柔柔地与他告饶，“哥哥，你只顾搧弄到几时？只恐身体酥软，明晨受罪，饶了我，快些丢了罢！”</p> <p>郎君听在耳中，心中爱怜不已，愈觉销魂，忙将她两条玉腿扛在肩上，猛然干将起来，肆行抽送，不胜欢娱。龙女也教他捣得飘然舒爽，将身子只顾迎播着他，二人足干了一二时辰，方云雨稍止，身困体乏，那行货也不待拔出，便相拥着囫囵睡了。到第二日晨起，淫念不减，又播插着干了半日，这才起床收整净身，夫妻二人再不提前番吵闹，和和美美地对坐饮茶，又浓情蜜意起来。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/103000.体似酥.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/427457/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">川主大人，太好哄了</div></a> <a href="/pages/047153/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">分身有术</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
