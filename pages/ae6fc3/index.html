iZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">欲结亲大圣激真君动凡心<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>话说大圣昔日历经九九八十一难，护送玄奘法师去西天取经，功成名就后愈发散漫，他是天生地养的灵猴，师从道教，后又入了佛门，反倒乐得这泼猴无人拘束。<br>
是日天朗气清，大圣自水帘洞返往灵山，路过西海时见祥云下方碧波千顷、浮光跃金，好一派和畅风光，不由得心情大好。西海小白龙是他的小师弟，那娇蛮的三公主他又曾唤过一声“妹妹”，千丝万缕，路过故人府洞，哪能不上前讨一杯酒来吃吃？于是大圣按下祥云，纵身跃入海中，踏波逐浪而去。<br>
海底风光绮丽，游鱼珊瑚缤纷万千，锦簇之中簇拥着一座宏伟的水晶龙宫。大圣一向不拘礼节，隐去身形直奔后花园而去。说来也巧，精巧山石还没看多久，前方就出现故人声音，大圣上前，曲折幽径豁然开朗，夜明珠的光辉映得四周光亮如昼，五彩珊瑚柔软娇媚如花，前方石桌旁二位贵女一坐一立，一娇一飒，可不正是西海三公主与东海四公主。<br>
“四公主，寸心妹子。”<br>
平静花园中乍然响起两声呼唤，惊得人浑身一震，四公主连忙将妹妹护在身后，大喝一声“谁！”<br>
大圣这才想起众人此刻还看不到自己，嘿嘿一乐现出身形，“两位公主勿怕，是俺老孙。”<br>
“大圣！”<br>
听心收起剑，寸心又惊又喜：“许久不见，大圣怎会突然造访我们西海？”<br>
“师傅唤俺老孙回灵山去，路过此地，来找寸心妹子你讨杯酒吃。”<br>
三公主与四公主相视一笑，四公主道：“你这猴头，原以为你入了佛门能规矩些，竟还是这般张狂。”<br>
孙悟空欸了一声，“你不说我不说，谁知道呢！”<br>
三人笑罢，寸心依言遣人去取酒，正要询问小白龙在灵山近况，一侍女捧着琉璃宝盒走过来，两位公主见了脸色一变，大圣见了心中好奇，凑上去问道：“这么漂亮的盒子，装的是何宝贝？”<br>
侍女答：“是北海二太子送来的珠钗，说是上好的东珠，望三公主笑纳。”<br>
听心上前打开盖子，莹润珠光映入眼帘，她啧啧赞叹了两声，转头冲寸心眨了眨眼：“没想到他对你这么上心。”<br>
寸心原本面露难色，却见那猴头在旁张望，神思一动，转口吩咐侍女将那珠钗取来为她戴上，听心惊诧，一时搞不懂她心中所想，只见寸心又坐回石桌旁，掌心上翻幻化出一面水镜，侍女取出珠钗，小心簪入她的发髻中，东珠光泽和润莹白，衬得她面如满月、顾盼神飞。<br>
“这么好的成色，二太子真是有心了。”<br>
大圣挠了挠头，“寸心妹子，什么北海二太子？”<br>
三公主面上流露出几分羞赧，将话说的含混：“大圣见笑，我父王与兄长一直为我操心......他日西海若有酒席，还望大圣赏光。”
他与三公主相识多年，一直当她是个直爽之人，没想到打起官腔来这么信手拈来，真不愧是龙宫的公主。大圣忍不住要抓耳挠腮，胸中郁闷，连酒也等不得了，匆匆告辞，“三公主四公主，俺老孙突然有事，告辞了！”<br>
“诶，大圣——”四公主追了两步，折回来看向她那古怪的妹妹，“寸心，你怎么突然改口了？”<br>
三公主施施然摘下珠钗扔回盒子里，哼道：“四姐，你不妨猜猜那孙猴子走这么急是去哪儿了，我猜，他定是去了真君神殿。”<br>
再说孙悟空，他出了西海果真直奔南天门而去，一路疾驰，真君神殿门旁值守的两位神将见他前来上前问候了声“胜佛”，大圣无暇顾及，揪着衣领将一人拎到眼前：“你们二郎真君呢？”<br>
神将答：“在、在大殿处理从前的冤......”<br>
未等话说完大圣便将人一扔，呲牙嗤道：“糊涂！糊涂！老婆都要没了，还守着他那些宝贝案牍呢！”<br>
神将哎呦一声摔进同伴身上，两人盔甲相撞头晕眼花，再去看时哪里还看得到那猴头身影。<br>
“杨小圣——”人未到声先至，孙悟空跳进殿里，左右排烛灯火通明烟熏火燎，呛得他呸呸两声抢步上前，抬头一看，上首的天神银甲黑氅威风凛凛，金色神目淬着冷光，与左右二神正翻阅卷宗，好一个宝相庄严、心怀大爱的司法天神。真君闻声只是抬起眼皮扫了一眼，“大圣为何而来？”<br>
哼，这杨小圣当真可笑！老婆都要与别人再嫁了，他还在这儿不紧不慢地跟他拿乔呢！当年他与西海三公主的婚事闹得鸡飞狗跳，身边的兄弟们各个不看好，只道是两个天生冤家注定不和，只有他灵猴火眼金睛，从中咂摸出些真情实意来，后来三公主上天为杨小圣顶罪，他便知道自己当初没看错，这两人日子虽过的一地鸡毛，心却是着实在一处的。<br>
这么想着话已至了嘴边，孙悟空又突然顿住：不对，不对，万一那寸心妹子是真放下了，决计与前夫大路朝天各走一边，他这么说出来岂不是坏了她的事？<br>
真君见他欲言又止，在殿中来回踱步十分苦恼的样子，一时好笑：“大圣，到底有何烦心事？”<br>
却见孙悟空恍若未闻，双手一会儿背在身后一会儿抓耳挠腮，半晌似顿悟一般豁然开朗，三两步上前窜坐到案上，一手撑着身体逼近，眯起眼睛问他：“杨小圣，二郎真君，我问你，你心里可还念着西海三公主？”<br>
“......”<br>
“我再问你，听说你每隔两三日去信西海一封，可曾收到过回信？”<br>
杨戬脸沉了沉，“不曾。”<br>
“好，俺老孙刚从西海来，正巧撞见那北海二太子给三公主献殷勤，听三公主话里意思，西海龙王有意与北海结为姻亲。”<br>
“什么？”<br>
杨戬大惊，霍然起身，孙悟空歪头一笑，跳起来将他按回宝座，“急什么，急什么，俺老孙又不是蠢的，看旁边四公主的神色，三公主许是故意这么说，想让话传到你耳朵里激你的。”<br>
杨戬脸色阴沉，手心里似乎也发了汗，“我原想，旧天条下被压迫的人等不得，先将他们平反了再去寻她，未料到......”<br>
大圣心里门清，眼睛一转，伸手搭上他的肩凑上前去，往火里又添了把柴：“你自个儿拿定了主意，人家却不一定如你所愿，说不定你先前所为早把人家的心伤透了，自此三公主与你花开两处莫问前缘。再说，就算她心里还念着你，老龙王能同意吗？他的女儿为你离家千年，又为你吃了挂落，他定是恨你入骨将你视为瘟神，绝不会让三公主再嫁你，到时不管三公主愿不愿意，给她绑起来嫁了，总好过再落你手里去不是？”<br>
杨戬听了这话狠狠撂开猴子的手，冷笑一声：“不必激我，我那岳父如何想我我心中明白的很。”他站起身，一步一步走下去，拇指缓缓摩挲身前兽吞，步履沉稳坚定看不出什么，身后大氅却像是被莫名的风吹着鼓动不止，左右二神神色惶惶，额上冒出冷汗，一句话也不敢说。<br>
大圣也不出声，等了半晌才听真君发话：“大圣，带好你的如意金箍棒，速与我去找玉帝请旨复婚，若他不同意，便请你抄起你的金箍棒与我同将他的玉清宫搅上一搅，问起罪来杨戬为你兜底！”</p> <p>tbc.</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/021005.欲结亲大圣激真君动凡心.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99" title="标签">#龙年接龙</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%C2%B7%E7%94%B2%E8%BE%B0%E9%BE%99%E5%B9%B4%C2%B7%E5%B9%B4%E5%A4%9C%E9%A5%AD" title="标签">#戬心·甲辰龙年·年夜饭</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/23, 15:07:57</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/91e78d/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">真君电池已耗尽</div></a> <a href="/pages/f3a3ce/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">燕归</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
