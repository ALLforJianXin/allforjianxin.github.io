得其一分风采足矣。</p> <p>拿神袛勘比凡人，此为大不敬。</p> <p>杨戬瞧着这张脸，不由笑得眉眼弯弯，又哪里恼得起来，联想到三妹也曾在圣母庙遭人觊觎，便是姓刘名彦昌那傻书生。其情其景，是否正如今日？</p> <p>那日之后，三妹委身于那书生。</p> <p>他是否也该，如这姑娘所愿？</p> <p>……</p> <p>信女口头期许一番，拿出篮子里的供果供茶仔细摆上，三拜三叩上三香，跪在蒲团上自绢袋里掷出三个铜钱作六爻八卦，以此求借天神旨意。</p> <p>熟读《周易》经、传两则，通晓六十四卦辞意。杨戬趁她虔诚，暗做手脚，取本卦变卦，卦意有二：地泽临，坤上兑下，少女从婚之象，循序渐进之意。本卦则为巽上艮下风山渐，寓意草木渐茂，凤鸣岐山，出门有益，求财必准，此乃上上签。</p> <p>少女高兴极了，谢过神君，回去闺中日日等候着天意降临，也就是二郎庙中卦上所说，清源妙道真君答应许给她的那个世间最好的男子。</p> <p>……</p> <p>又几十载过去，杨戬如常坐在庙里。捻杯茶，摇扇子，眯眼笑看古今香客去了又返，也见惯世人啼笑奔忙，贪欲陷利遭无妄。叹一句光阴岁月好薄凉，带走花香，怎知风花落尽人亦亡？</p> <p>他等了许多年，却始终等不到那个来还愿的姑娘。直至丁香花期已过，任再强的法力也无法留住青春，最后还是消糜解脱，枯死了……</p> <p>她不会来了。</p> <p>杨戬想着，满心伤怀，想前去送她最后一程，就像很久很久以前寸心人至大限，两鬓留有雪与霜，他就守在床边送她去轮回转世。</p> <p>转世转到这一遭，她许愿想要一个世间绝好的男子，丰神俊朗如二郎真君。他也允了。</p> <p>可见那小龙女骨子里还是记挂着他的，记着他的好皮相，约摸着是过奈何桥时正撒娇耍赖不肯喝孟婆汤。</p> <p>记得娘子为此抱怨说，“杨戬啊杨戬，你是修真得道成的神仙，不老不死，龙族可是会老会死的！到时我长了白头发，老掉牙了，你依然少年模样，还是这般好看，那怎么办呢……”</p> <p>那时新天条颁布，西海重逢，杨戬听寸心有此担忧，笑着袖子一拂，看起来撑死不过二十的样貌变作三十上下，安然与夫人相配。“左不过你老，我陪你一起老就是了。”</p> <p>此去经年，他陪着她渡过朝朝暮暮，一起携手走遍万里河山，若问还有什么遗憾，便是不能随她同生共死。</p> <p>……</p> <p>杨戬第三次见那姑娘……应该是说，去见姑娘的坟啦。</p> <p>墓碑旁有人为她发丧烧纸，是真君许给她的那个世间最好的男子。</p> <p>杨戬看着坟包幽幽叹气，一袭道袍飘渺，幂篱上附的皂纱长至颈下。蔽其面，凡人不可视，只看出来者超凡脱俗仙风道骨，想必是出自哪座仙山的神隐之士。</p> <p>男子历经岁月蹉跎，少年已成老者，见道长，全礼相敬。杨戬见此人，观其眉宇之间依稀可见其年少风骨，皆是与他一般模样。</p> <p>真君怜他亡妻之痛，回想起过往种种，不禁出言点化。“你可知，你生从何来？”</p> <p>老叟摇头，“还请道长指点。”</p> <p>真君却不予多说，直摘了帽檐，现出真身，泄尽天机。</p> <p>同时前世今生相互打过照面，凡人枉遭折煞，一时惶恐不已。</p> <p>人活一世数十载，三十而立，四十不惑，五十知天命。老来从心所欲不逾矩，便是活得够本。</p> <p>老者一睹神君真容，顿悟前世今生事，有如醍醐灌顶大梦初醒。既知天命所归，忙俯首作揖谢过真君。</p> <p>杨戬见他开悟，知他功德圆满，欣慰点头。敛下帷帽裙檐化身去，留下一句交代。“你既功成，切莫再流连人间，且随她去罢。”</p> <p>……</p> <p>当真不出月余，老翁乐天辞世，死于梦中。</p> <p>……</p> <p>杨戬收回转世，当晚也做了个梦，梦见与寸心人间相伴偕老，恩爱百年。</p> <p>醒来时正好三妹来看他，带来华山的桃花酿和一株紫丁香。</p> <p>杨婵嘻笑寒暄，道，“西岳草木皆春，桃林比往年开得更好。妹折一支丁香送君手上，不知侬嫡亲亲生二哥哥，可寻出嫂子今生投胎在哪家？”</p> <p>杨戬听出妹妹在笑他，笑他几千岁的人了还这般多愁善感，每送走寸心一次便要忧郁好一阵，他们夫妻不嫌腻歪，她这个做小姑的都看烦了。</p> <p>生离死别的戏码年年演，也不怕玩脱了。杨婵赶忙提醒二哥，“你还不快将嫂子带在身边，这样旁观她受轮回之苦，生老病死是小，要是哪一世与旁人相爱相恋，哥哥可就要找个绿油油的帽子戴戴了。”</p> <p>神君惊觉，当即入了凡尘去，找出龙女托生，化身世隐居士，忽悠那一对生养夫妇说，“此女骨骼清奇，天赋异禀，是可造之材。不若让她拜我为师，随贫道修行个十几二十年，出山后必可成大器。”</p> <p>自此掳走她于襁褓之中，去蜀地随便寻了一座山头修了一处道观作为修行道场，不过问三界事，只想助她早日得道成仙。</p> <p>媳妇儿嘛，还是一手养大的比较放心。</p> <p>他教她说话走路，教她读书写字，教她写自己的名字――敖寸心。</p> <p>后来的事……</p> <p>后来的事是寸心逐渐长大了，十几岁的年纪逐渐有了海边初见时的身段出挑，扮成道姑的样子也十分好看。</p> <p>杨戬再次欣慰地眯眼笑，捻起茶杯翻阅万卷道家典籍，寻求长生之法。</p> <p>屋外寸心正在给院子里的花花草草浇水，发现真君宝贝的那支丁香如过去十多年一般好端端开着，不免感慨道家法术实在太神奇了！</p> <p>“寸心，进来一下。”</p> <p>“哦，来了！”听到真君喊她，寸心赶紧放下洒水壶欢欢喜喜跑书房去了。</p> <p>她故作乖巧地趴在书桌上看杨戬写字，铜铃一样的双眼又大又圆，实在单纯可爱得不得了。</p> <p>她笑着说，“师父，你叫我啊？”</p> <p>师…师父？</p> <p>杨戬听到这个称呼，脸都绿了。</p> <p>这种结果当初不是没想过，所以才犹豫再三想到底要不要摒弃凡间的伦理纲常，执意将她带在身边。</p> <p>“早说了不许这样叫我，谁要做你师父。”</p> <p>寸心觉得莫名其妙，一个称谓而已，道长一个出家人，何必为了这些小事挂怀。“常言道：父母，生身、养育、衣食之恩。师者，传道、授业、解惑。真君已尽其十之八九，我不叫师父，便该叫……爹爹？”</p> <p>“不可不可！”杨戬大惊失色，赶紧捂住小寸心好一张厉害的嘴巴，不许她再多说一个字。</p> <p>真君心下苦闷，这走向跟他预想的不一样啊……</p> <p>连连哀叹，想自己一手将她带大，是助她勘破六道轮回修仙悟道，好指望日后能一起长相厮守。谁又要做她亲故恩师，有义务没权利的。</p> <p>于是，清源神君因为一个称呼，大发雷霆。</p> <p>即日，罚她背诵《太上清静经》全本。</p> <p>……</p> <p>观中香火袅袅，锄出一亩三分地，享尽天地风雷山水之灵。夏日树下乘凉抚琴，煮一盅好茶，静听有女朗朗读书声。</p> <p>“大道无形，生育天地；大道无情，运行日月；大道无名，长养万物；吾不知其名，强名曰道。夫道者，有清有浊，有动有静；天清地浊，天动地静；男浊女清……”</p> <p>杨戬摇着扇子出声纠正，“错了，是男清女浊。”</p> <p>“……男清女浊，男动女静；降本流末，而生万物。清者，浊之源。动者，静之基。人能常清静，天地悉皆归。”</p> <p>……</p> <p>“师父师父！”</p> <p>杨戬一个扇骨子敲在她脑袋上，“是还想背书？”</p> <p>“那寸心要怎么叫你嘛。”</p> <p>“本君俗家姓杨，你不若叫我杨哥哥。”</p> <p>“杨……哥哥？”</p> <p>寸心觉得自己要吐了。</p> <p>“乖~”杨戬宠溺地摸摸小寸心的头顶，将刚刚打乱的发丝捋顺了来。“想问什么问吧。”</p> <p>“按太上老君所说，鸿蒙混元初始，天地曾合。降本流末为清净，将男女比喻为乾坤日月，而日月朝暮不相逢，如何才能归一呢？”</p> <p>这实在是个好问题。</p> <p>杨戬不禁狡黠一笑，抬手间自然而然就搭上了小姑娘的肩头，目测比量之下，浑觉还没二两肉。</p> <p>“你还小，等你长大些，我再解与你听。”</p> <p>……</p> <p>End</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/110600.蜀有谪仙.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54
