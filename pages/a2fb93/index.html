手批了，也好早日教人脱离苦海。</p> <p>他拿起金灿灿的折子，翻开一瞥，忽然心跳如雷，灵台混沌，定了定神思，再凝目一看，只见折子上写道：</p> <p>“龙朔二年七月初三，处暑，南郡李博安不敬于帝，获罪于天，遂连降一月暴雨。西海三公主敖氏寸心私挖沟渠，引水入河，忤逆圣旨，私乱帝令。因其上天自认，从轻处罚，发回西海，削去爵位，永世不得出西海一步。”</p> <p>杨戬看到这里，不由大惊失色，心中仿佛有钟罄声响，振聋发聩，只余下一念，想到：南郡的沟渠明明是我命人暗中挖掘，瞒得严严实实，绝无一点披露，怎么这折子上却说是这个龙女？西海什么时候又多了一个三公主，我怎么从来没有听说过？难不成是有人得知此事，暗中放置在此，要要挟于我？可以我今日之权势，此等小节又能奈我何？</p> <p>他皱了皱眉，向下看去，只见下面写道：“此旧天规责处不妥之处，龙女挖渠，实为众生，今依新宪，赦免龙女之罪，重赐公主爵位，并立即解禁，不得有误。”左侧已经加盖了司法天神大印，杨戬细看这字迹，竟分明是自己所书，可细细想来，居然全无印象。</p> <p>事有蹊跷，真君只觉得此事并不简单。他在空旷的神殿之中走来走去，坐立难安，哪里还有半分休息的心思。待看天色，正当破晓，与其无端猜测，不如亲自走一趟西海，查一查这个中缘由。此念既起，杨戬也不再拖沓，一摆黑麾，出了真君神殿，直下西海。</p> <hr> <p>一入龙宫，待说清了来意，龙王爷脸上的神色好似有些不对劲。这时天光初现，一大清早地上门来找茬并不怎么礼貌，不过毕竟是真君老爷亲自莅临，龙王一家哪里敢表达出自己的不满。只不过真君提起的敖闰这个三女儿，属实令人有些头疼。</p> <p>西海三公主敖寸心，乃是同那位鼎鼎大名、身入佛门的玉龙太子一卵双生的亲妹子，自幼身体孱弱，从不出西海半步。几年前，这位三公主的身体逐渐康健，终于自母后处软磨硬泡得了一个出海的机会，正值华山三圣母的儿子沉香斧劈华山迎出新天条，那女娲娘娘留在华山之芯的三色补天石自山体中露出一角，华光照得三界齐辉，将将浮出水面的小公主被这圣光一晃，居然就此昏迷过去，直挺挺地在寝殿中躺了三日，药石无医。西海上下悲痛欲绝，以为她已是活不成了，三公主却在第四日的早晨无端端清醒过来。</p> <p>龙宫等人先是欢喜，待细看龙女，却发觉她就此生了癔病，整天地胡言乱语，如若不顺言应她，她便要发疯发痴，痛哭流涕。众人无法，担忧她再发作，跑出去遇见甚么危险，只得将她软禁在公主府中。</p> <p>而这位公主的癔症，说来竟与眼前的天神大人有十分相干。杨戬坐在龙王爷礼让出来的宝座上，扶额苦思，听着龙后娘娘掏心掏肺一阵道德绑架式的拜托，不明白事情是怎么样发展到现在这个状态的。</p> <p>据说三公主敖寸心，自清醒以后一心思慕于二郎真君杨戬，并且一直坚信两人早已山盟海誓，定下白首之约，真君大人于忍辱负重之时便已和她两心相许，改完天条以后，就会来迎她过府，至今龙女还日日困坐于公主府后花园的玉露园中翘首以待，每日以泪洗面，等着真君大人来看她。</p> <p>杨戬：……好狗血的故事，怎么听起来……倒是我辜负了她？这群龙为什么用这种眼神看我……他们是不是商量好了要讹诈我……</p> <p>盖因二郎真君一向洁身自好，虽然经年来在三界名声不好，常被抹黑，但是他毕竟是王母麾下重臣，不近女色的人设简直恨不得刻在骨子里。如果不是为了新天条曲折的颁布历程，不得已为拖嫦娥仙子下水刻意营造出了一个痴汉形象，相信不近女色四个字到现在也还是能明晃晃地写在杨戬其人的八卦志介绍页中。</p> <p>不怪在场龙族眼神各异，自家妹子思慕天廷第一首辅大臣，且此人能力超群，相貌更是一等一的俊俏，倒很是说得过去。再者道世间不乏有空付痴情的男男女女，相思之念一起，做此青天白日梦梦到神经了融入幻想中不愿梦醒也并非不可能。几位原本以为敖寸心约莫也是如此，毕竟哪里来的机会叫她与司法天神相会。然而今天司法天神居然亲自来了！还是来指名道姓要找三公主！再说这两人没个首尾，谁还会相信？</p> <hr> <p>走过水晶宫晶莹剔透的回廊，四方庭院之中有一棵巨大的龙牙花树，开满了紫红色的龙牙花，随着海水的流淌，花瓣洋洋洒洒地落在阶前，杨戬被这乱花迷了眼，朦胧见只见堂前坐着一位美艳少妇，身段玲珑，体态婀娜，因在家中，并不拘泥于衣衫齐整，是以香肩半露，依在软榻之上，露出一段洁白粉嫩的藕臂。真君只看了一眼，忽然感觉自己古井无波的心湖狠狠地跳动了起来。</p> <p>这是一种很奇怪的感觉，真君自小颠沛流离，长至成人后位高权重，形形色色的窈窕淑女见过无数，没有一个走入过他的心房。当年在刘家村的小湖边，尚未经历磨练的沉香问他，自己的母亲长得漂不漂亮，杨戬怔愣了好半晌，第一次为了回答外甥的问题将妹妹与诸位仙女浅做对比，这才得出了“三界少有的美人”这个结论。</p> <p>可是这位尚未看清容颜的公主殿下，与他只隔了一个庭院的距离，却令人感到心房颤动，佛钟大震，心脏的跳动声令人感到振聋发聩，好像有什么东西要喷薄而出，溢满了他的心脏。他本是来查案的，可一看见她，忽然什么事也不想说，什么事也不想做了。杨戬心中怦怦地打起鼓，忽然想到，只望这样的场景，这样的美人，应该永远安稳地留存在一隅，派几营重兵，时刻护卫，否则如若不小心碰碎了，这人世间，不知要少去多少的风情。</p> <p>杨戬情不自禁地向前踏了一步，那位美人被他所吸引，向这边看来。隔着纷飞的花瓣，一双剪水秋瞳，好像带着绵绵的情谊，和他对视一眼，让杨戬呆在当场，如遭雷击。</p> <p>三公主一转头，猛地看到阶前站了一位郎君，长身玉立，丰神俊朗，不是杨戬是谁？她心房大动，猛地跃起，穿过落花的庭院，快步奔到他身前，投入他的怀抱。</p> <p>杨戬不知为何，居然下意识抬手拥住了她。龙女紧紧地搂着他的腰，泣声说道：“二郎……二郎，你来了，我知道你一定会来的……他们说你不会来，说你要和嫦娥一处去……我不信，你说了你会来接我的！我一直等着你……”</p> <p>“我……”杨戬说不出话来。她当真是发癔症？可是这些话，为什么无端端地令他动容呢？她虽容颜俏丽，粉面桃腮，令人见之忘俗，可自己根本没有见过她，为什么……为什么，竟如同见过一般？</p> <p>“二郎，我好想你，你为什么这么久才来看我？”寸心紧紧地抱住他，声音清脆绵软，杨戬低头一看，只见她肌肤胜雪，娇美无比，不禁看得呆住了。怀中是她柔软婀娜的身体，温香软玉，撩动他心弦，真君只觉得心如擂鼓，满面通红，别过头去，不敢再看。</p> <p>“你怎么不说话？”龙女见此，暗暗称奇，止住了泪水，拉着他小臂，探过去看他的眼睛。见他眼神躲闪，双颊绯红，不由疑道：“你做什么躲我？难道你也要和他们一道骗我，装作不识得我？”这样说着，她不禁悲从中来，撅起嘴啜泣道：“你……你要是这样，我再也不理你啦！”说罢转过身去，泪珠从小脸上一滴滴落下。</p> <p>杨戬本对她心动不已，又觉自己孟浪荒唐，不敢多看，见此哪里舍得，连忙扶住她的肩膀，柔声道：“怎么……怎么会？我不会躲你，我，我就是来看你的。”此话既出，热血上脑昏聩不堪的灵台逐渐清明，暗暗骂道：杨戬啊杨戬，你今天是怎么回事？说得却是什么乱七八糟的？</p> <p>龙女闻言，心中大动，暗暗想道：“他还是我的二郎无疑！”惊喜地转过身来，欲要投入他怀中，不等他张开双臂，却又忽然变脸，嗔道：“你说的甚么月光不月光的，我可听说了！是不是你见嫦娥仙子回心转意，所以腻在她的温柔乡里，躲我的闲了！”</p> <p>杨戬只觉得此话异常熟悉，仿佛在哪里听过似的。想起莫名出现在法案上的赦免令，只觉这个龙女身上有太多秘密，如若刺激了她的癔病，恐怕再也找不到突破之地查明此事，倒不如就此假装配合，也好从长计议。思定而动，杨戬在皇门阶前奉迎了八百年，早练就一身卓绝演技，当即换做一副温柔缱绻的笑脸，抚上她的肩膀，宽慰道：“哪里来的三姑六婆嚼我的舌根？我心中只有你，那些不过权宜之计。”</p> <p>寸心本是试探他，闻言大喜，乳燕投怀般搂住他的项子，软声道：“果然是你！杨戬，你还记得我的，还记得我们是夫妻的，对不对！”</p> <p>杨戬闻言一囧，原来“他”和这位公主殿下不止是两心相悦，居然已经成亲了啊……低头一看，又是一愣，竟是这美艳女郎饱满的红唇离自己极近，几乎要擦到自己的下颚。她一身饱满嫩弹的皮肉紧紧地贴着真君的身躯，虽嫁人一事只是她臆想，但她一举一动具是风情万种，眉目含春，身体挨近他，令人嗅到一阵诱人的芳香。杨戬不禁暗想，真若被人疼爱滋养了几千年，才养得出此等尤物，如若我真的……不知该有多好……</p> <p>这样想着，他面上却不显，只大胆地搂住了她盈盈一握的腰肢，低声哄道：“是我，寸心。”</p> <p>公主闻言，喜不自胜，忙牵着他近了内殿，缠缠绵绵卿卿我我，自也不提。只说天日暮迟，霞光满天，海面上波光粼粼，风平浪静，好一派欣欣向荣模样。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《我闻》/22021423.美艳少妇.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox
