何止不搭理，连门都不给他进。<br>
这哪里能难住法力高强的司法天神？送了三天信都没个回应，杨戬索性潜到公主封地，轻松放倒院外的侍卫、殿门口的侍女，大摇大摆推门进屋。<br>
花瓶破空飞来，杨戬轻巧接住——敖寸心可太了解他了，专门在厅里等着呢。<br>
“还生气呐？”放下花瓶，把散落一地的花枝也重新插好，就见公主殿下气哼哼地转身，留个背影给他。杨戬也不恼——他可太了解敖寸心了，这是在说“我就等着看你怎么哄我”呢。<br>
看着倒也不是很生气。<br>
敖寸心等杨戬俯下身子把她搂在胸口，又亲上脸颊，才歪头冷哼：“你来干嘛？”<br>
“小神是来伺候三公主就寝的，”只字不提公主生气的原因，杨戬一把抱起龙女便向内室走，“公主殿下离了我，怕是觉也睡不好。”<br>
“胡说八道！”敖寸心放松身体靠在坚实的臂膀上，“我睡得可香了，才不用你伺候。”<br>
说话间已走到珊瑚床边，杨戬放下龙女就开始解自己的外衫，边脱边问：“当真？真的没有起个大早坐在外面生闷气？”<br>
龙女噎了一下，没有理他。<br>
杨戬脱得只剩里衣，一条腿跪在床沿伸手向内，从龙女身下扯出他的朝服大氅，“没有睡不着的时候搂着小神的衣裳聊以慰藉？”<br>
眼看龙女恼羞成怒就要发作，杨戬见好就收，把刚招呼到他身上的两只龙爪子抓下来箍住，“还得三公主来堵一堵小神胡说八道的嘴。”亲下去，狠狠地亲，唇舌相交津液相融，让三公主一句话也说不出来。<br>
敖寸心给亲得浑身发软，都没留意杨戬什么时候松了桎梏，在他解她衣服的间隙用脚趾夹着他的亵裤往下拉扯。杨戬终于放过公主迷人的红唇，又将她的手拿起来探入衣襟：“公主摸这儿，”他按在心口，“你怎么忍心冷落它好几天呢。”<br>
“谁让你惹我生气……”公主已经给剥了个光溜，在天神老练的揉捏挑逗下逐渐泛起情欲，还要忍不住顶他一句。反正这个厚脸皮的也从来不听。<br>
果然，“小神这就赔罪”，赔罪的手熟门熟路找到“赔罪点”，上下翻飞内外夹击，很快让她舒服得轻声哼叫，夹紧了腿抬腰催他，“就你话多，还不快来。”<br>
杨戬得令：“保证让三公主满意。”说罢便把那青筋怒胀的肉具在穴口滑动几下，顺着湿黏的蜜液一进到底。<br>
顶在尽头重重碾了会儿，才慢慢抽出到头，再缓缓进底，狠狠用力。手也不闲着，掐着龙女的腰臀揉捏，又抓住软弹乳房搓捻；嘴也不空着，在龙女一身娇嫩的皮肉上又吮又啃，更不会放过乳尖两点红荔。<br>
这是他进出了两千年的甬道，一毫一厘都无比熟悉。他知道该顶到何处用力，知道在哪片褶皱碾压，在哪块软肉搅动。他把控着节奏，预备慢慢将龙女拉直巅峰。敖寸心果然舒爽至极，喉中发出快乐的呻吟，两手扳在杨戬肩上，沉醉于缓慢深重的抽插。<br>
快感慢慢堆积到极限，需要向上突破。寸心动了动腰臀，内里抽紧去绞他，“你，快些呀……尽会磨人。”她掌下的皮肉倏然绷紧，身上人也停顿一瞬。<br>
硬逾铁石的阳具上，青筋突突直跳。杨戬保持着不疾不徐的速度，在更加丰沛的蜜水中顶入又撤出，磨得龙女难耐地抬臀去凑。他的背肌已然绷紧，汗珠顺着脸颊落到下巴，又滴到龙女胸口，碎裂四散。“寸心，嫁我吧？”<br>
龙女还没迷糊，听他这样问，抬手捶打：“我又没说不嫁！再快些呀你……”她着急地向上抬，用更快的速度吞入他，小腹抽动绞着里头抽吸不停，“……别折磨我啦。”她的手掌转向杨戬胸口，又顺着满是汗水的肌肉向下抚，一直摸到小腹上。<br>
到底谁折磨谁？<br>
杨戬太阳穴也突突直跳，额头绷紧，情热血沸快要将他烧起来。和三公主讲条件，他就从未赢过。此时此刻，看身下欲色蒸腾的妖娆躯体，听耳边娇媚婉转的甜腻呻吟，哪里还能忍得下？方才他定是糊涂了才会想那昏招……销魂之处温热湿滑，层层软肉将他裹起来又绞又吸，再不快些行动起来他简直要炸掉了。<br>
敖寸心尖叫一声，立刻让杨戬的猛力抽插捣得说不出话，积累多时的快意瞬间爆发，一重重一浪浪，从内穴到四肢寸寸酥麻颤栗，浑身颤抖不能自持，再顾不上去想什么嫁不嫁的问题。<br>
硕大凶悍的肉根高速进出，时时夹杂些轻重不一方向不定的碾压搅动，颠得公主神魂不稳，蜜水汩汩外冒，抽出来流下去淌出一片湿滑。天神的动作越发疾速，唯有此刻，他能全然掌控龙女的欢欣愉悦，带给她纯然的快意巅峰，这每每也令他内心无比充盈圆满，令他不知餮足的欲望暂得安抚。<br>
直到龙女嗓音有了一丝干涩，他才全然放松，将浓精射入深处，撑着身子闭目粗喘，感受阵阵裹缠与弹动的余韵。</p> <p>“不生气了，嗯？”他搂着人轻声问。<br>
敖寸心腻在杨戬臂弯里不想起身，甚至懒得打他两下，“我哪有说不生气，还气着呢。”<br>
杨戬小心道：“八月十五有什么不好？从前成亲也……”<br>
“八月十五还是我回西海的好日子呢。”寸心轻轻用脚尖踢他，“你也要庆祝不成？”她到底不想再说出“和离”两个字来。<br>
杨戬知道寸心的心思。她觉得八月十五成亲那晚吵了架，直到次日他上战场也没见上一面；八月十五那天又离了婚，当天相隔万里；更有一层怜他八月十五家破人亡的意味，她是定然不肯说出口的。换个新日子重新成婚，才有全新开始的气象。<br>
她只是想要一个好的开端，她想好好的与他一直在一起。龙女这等心思，会令他觉得生活还有许多的甜。<br>
“先去洗洗。”杨戬抱起龙女泡进浴池，用温热的水给她擦洗身体，再用浴袍裹好龙女安置在小榻上，才迅速收拾好自己，去清理床帐中的一片狼藉。<br>
敖寸心瞧着杨戬忙碌，一如过去许多年。他总说娶到公主已是他三生有幸，是天大的福气。她如何不知杨戬心思？他在那天失去圆满的家，桀骜的少年被迫长大；好不容易能有新的开始，又在天廷步步谋算之下再次崩塌。如果不能弥补往昔遗憾，那分裂与缺失的一角总不能填满。<br>
可她真的怕，怕回忆的侵蚀，怕伤痛的纠缠。她想那一天永远快乐开心，岁岁年年，和杨戬在一起，永远只有值得庆贺的欢愉。<br>
杨戬整好床铺，又端来蜜露给龙女润喉。“我的心思你都明白，寸心。”他在她身边蹲下，等龙女喝完了拿走空杯，“和杨戬一起，你什么都不用怕。”<br>
龙女垂眼看他，睫毛上带着水汽，眼中有些迟疑。<br>
“不，听我说完，”他阻止她开口，“我也不是一定要弥补什么——我确实想，但和你一起的未来更重要。“他托起她的手，亲吻每一根手指。<br>
“人常说，十五的月亮十六圆。我想与寸心一起，从团圆的八月十五，看到圆满的八月十六，从今往后，每一天，每一年，我们都一直在一起，再不会有任何遗憾。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/090900.圆满.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/ae5d63/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">你真身的心呢</div></a> <a href="/pages/4e2533/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">红线</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
