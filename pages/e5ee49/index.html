LOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">秋裘<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>祝真君夫妇结婚离婚纪念日快乐！（偷笑</p> <hr> <p>寸心是被热醒的。</p> <p>灌江口八月暑热未消，又兼枕边人玄功在身阳气十足，将她牢牢搂在怀里，她醒来时，身上出了一层薄汗。</p> <p>轻轻将搭在腰上的胳膊移开，寸心刚掀开被子，身旁就传来杨戬略有些低哑的声音：“怎么了？醒得这么早？”</p> <p>“出汗了，不舒服。”转头打掉他伸过来揽她的手，嘴里嗔道：“这么热的天，你像个火炉子似的，离我远一点……今晚你去书房睡！”说罢下床趿着鞋头也不回地走向湢浴间。</p> <p>这……公主娘娘怎么又发脾气了？真君老爷摇了摇头，在夫人的一通埋怨中清醒过来。</p> <p>等寸心洗去一身的粘腻回到内室时，杨戬已经起身，正弯腰整理床褥。寸心扫了他一眼，走到妆台前坐下，手里拿着块帕子擦湿漉的发尾，边问他道：“时辰还早，你怎么也起来了？”</p> <p>杨戬叠好褥子，走过来接过她手中的帕子，为她细细擦着头发，自镜中看了她一眼，故作谨小慎微道：“小神想将功补过伺候三公主，求三公主大人不记小人过，不要将赶小神去书房。”</p> <p>寸心被他逗笑，一时玩心大起，扭身阻了他的手：“真君折煞小龙了，真君大人权势煊赫，小龙哪敢劳烦真君大人伺候。”</p> <p>“此言有理，那便罚你这小龙来伺候本君更衣。”</p> <p>寸心一愣，没想到他转的这么快，瞪圆杏眼掐了杨戬一把，才气哼哼地去拿他的腰带，杨戬心满意足地抬起双臂，他身量高大，胸膛宽广，寸心双手环过他的劲腰，身形合在一处时像是被他拢在怀里。</p> <p>杨戬低头，看到她好看的眉眼浸在熹光里，心里漫上一波又一波的甜蜜。她的呼吸、她的温度、她身上沐浴过后的香气无一不在诉说晨间独属于夫妻的一份亲昵。</p> <p>戴好腰带后，寸心顺手给他穿上外罩，然后扶着杨戬的肩踮起脚，将他被压在天眼项链和衣领下的头发撩出来，杨戬顺势把住她的腰。</p> <p>“诶对了，给三妹和师父的请帖送了吗？今天可是我们第一次中秋家宴呢！”</p> <p>“放心，哮天犬昨日就全部送完了。”说着，杨戬牵着寸心的手走向妆台扶她坐下，挑了一只螺笔，寸心熟练地仰起头便他着手。</p> <p>螺子黛在眉上轻轻扫过，她舒服地眯起眼睛，口中不忘打趣道：“二爷如今画眉技术了得，我们若是到街上开一间铺子去，由二爷亲自坐镇，想必十里八乡的姑娘们一定会把铺子的门槛踏破吧！”</p> <p>杨戬的目光从黛色秀眉上移开，无奈对上寸心狡黠晶亮的眼睛，“其实杨戬还会画夜叉眉——”</p> <p>他话只说了一半寸心就会意，忙捂着脸躲开，杨戬哪会让她跑，一手丢了螺笔，拉住她的胳膊往怀里一拽，再掐着她的腰将她提到自己腿上按住，肌肉紧实的胳膊牢牢箍着她，一尾神龙便教他囚在怀里了。寸心挣扎一番不得，便想撒娇卖痴糊弄过去，一边腻声叫着“杨戬”，一边抬头要去亲他蹭他，杨戬使坏故意仰起头不让她碰，却好巧不巧，那柔软的唇舌正好含住他的喉结，贝齿不轻不重的触碰更是平添刺激。</p> <p>“嘶——”</p> <p>“你……”寸心刚想问他是不是碰疼了，一对上杨戬的眼神就说不出话了，浑身鳞片簌簌竖起来。</p> <p>“寸心，你咬疼我了。”他高大身躯朝人压过去，目光和声音都染上几分意味不明。</p> <p>“胡说！”娇矜的龙公主推拒后无路可逃，仍要与他争一番是非，“杨戬，明明是你坏心眼先抬头的，本公主也没咬你！”</p> <p>杨戬“啧”了一声，“这么说来，杨戬是该向殿下赔个不是……”拇指和食指暧昧地揉捏着她凉软的耳垂，很快将它揉的通红滚烫起来。</p> <p>寸心脸也烧起来，更加卖力地推打着他的胸膛，身子也奋力挣扎，“混蛋，你放开我……”杨戬本只想逗逗她，教她这么一闹腾欲火却真起来了，大掌朝她臀股上一拍，咬牙道：“扭什么！”</p> <p>之后屋里就响起龙女哭哭啼啼的声音，直到日上三竿，这对早起的夫妻也没踏出房门，徒留哮天犬在外面干着急，“今天不是要摆家宴吗？主人和三公主怎么这么晚了还不出来布置……”</p> <p>等夫妻二人再度收拾妥当从屋里走出来时，天色已过去大半，准备一桌珍馐定是来不及了，只能吩咐哮天犬出去置办些酒菜回来，寸心剜了杨戬一眼，埋怨道：“都怪你胡闹，早先明明答应三妹我们亲手准备一桌家常菜，待会儿若是三妹问起来，看你怎么答！”</p> <p>杨戬抚上她的双肩，“好了好了，都怪我，一时情难自禁……”</p> <p>心虚的真君老爷在心里暗暗祈祷他那胞妹瞧不出来，聪慧的三圣母却一眼就看出了端倪，“二哥，这菜……”她兄长一个眼神递过来，杨婵就及时转了话头，“……这菜品相看着真不错，你与二嫂费心了。”</p> <p>沉香来他舅舅家次数不多，捧着碗吃得开心，“对啊，舅舅舅妈，你们手艺真不错，和醉仙楼大厨做的一样好吃。”</p> <p>杨戬原本正一心剔蟹肉，被他外甥这天真的话一噎停了手中动作，“沉香，好吃就多吃一点。”少说点话。</p> <p>“哦，哦。”</p> <p>寸心抿了抿唇，偷偷瞪了他一眼，杨戬将盛着蟹肉的碟子推到她面前，好声好气赔笑，“寸心，尝尝。”</p> <p>沉香云里雾里，杨婵却将她二哥二嫂的眉眼官司看得清楚，兀自暗笑一会儿，才轻飘飘将话题扯开，“对了，玉鼎真人不来吗？”</p> <p>“师父早些时候传了信来，让我们不必等他，修道之人不重视这个，估计是不会来了。”</p> <p>杨婵刚要点头，忽然听到一句“谁说老道不来？”众人转头去望，只见一绿袍道人风风火火地走了过来，白髯红颜仙风道骨，杨戬寸心忙起身去迎他入席。</p> <p>玉鼎落座后先饮了一大盏茶水，点头应了众人的问好，又从怀里掏出几本书，捋着胡须笑的得意，“嗨呀，紧赶慢赶终于赶上了！呐，这是我的新书，一人一本，来！”</p> <p>哮天犬、刘彦昌、杨婵、小玉，玉鼎一圈发下来，轮到杨戬的时候他抬手去接，却被玉鼎一巴掌拍下去，“去！这不是给你的。”转手将书塞给沉香，重新拿出一卷竹简递给杨戬，“这才是给你的。”</p> <p>寸心凑过去一看，只见上书“龙族秘法”四个字，面露不解，“真人，我就是龙族之人，二爷还要什么龙族秘法呀？”</p> <p>“哎呀，”玉鼎把扇子挡在脸前快速扇了扇，露出一双眼睛在他们夫妻二人身上来回看了看，“你们真不明白？”</p> <p>“明白什么？”</p> <p>“你们两个糊涂蛋，当然是想要你们早点给我生个小二郎呀！徒弟媳妇你是龙族又有什么用？那一千年还不是被你俩闹过去了？书读百遍其义自见，多看看书呐……”</p> <p>话说到这儿，寸心皮薄早就红着脸缩杨戬身后了，杨戬顶着妹妹妹夫和两个小辈揶揄的目光，硬着头皮向玉鼎拱手一礼，“杨戬多谢师父费心。”</p> <p>“哼，知道为师费心就好。”</p> <p>此后便是宾主尽欢，言笑晏晏。用过膳后，众人四散院中，或低声交谈，或静心赏月，或醉心佳酿。庭中月华如练，凉风习习，亲友在侧，岁月静好，一生佳事莫过于此。</p> <p>杨戬饮下杯中清酒，喟叹一声，忽然听到一声“二哥”，回身看到杨婵走到他身边，眼中闪烁着晶莹和温柔的笑意，“二哥……”</p> <p>杨戬扬起嘴角，拍了拍她的肩，“三妹，二哥都懂。”</p> <p>昔年家破人散天上人间多少恨，踽踽独行误会重重多少怨，生离泪濛濛死别亦不过咫尺，今日的一切，在杨家兄妹眼里，都好似一场不真实的美梦。</p> <p>“都过去了，二哥跟你保证，我们以后都会好好地在一起。”</p> <p>会好好在一起，爱人长久厮守，亲人长久团聚，他们还会有许多个这样的岁岁年年。</p> <p>心念四起，杨戬下意识就想将妻子妥帖地揽入怀里，四顾一周，才在池边寻到人。寸心坐在栏杆上，半身化作龙尾垂入池中有一搭没一搭地戏水，粼粼池水摇碎的月光投到她身上，明暗之间她的身影意外的寂寥。</p> <p>杨戬的心倏忽一紧，杨婵顺着他的目光看过去，也犹疑起来，“二嫂……这是怎么了？”</p> <p>“她……我不知道。”</p> <p>“你们吵架了？”</p> <p>“没有。”</p> <p>杨婵又想了想，忽然紧张起来，“难道是因为中秋节？因为月亮？”</p> <p>“不会，”杨戬摇了摇头“寸心性情洒脱，她既想明白从前我们的症结从不在于嫦娥，就不会再困扰于此。”</p> <p>沉吟一会儿，杨戬有了一个猜测，心中登时苦涩懊恼不已，“只怕是寸心想她的父母兄长了。中秋佳节，本是亲人团圆之时，是我不够体贴她，忘记陪她回西海见她的亲人了。”</p> <p>“二哥，没事，你今晚回去后好好宽慰二嫂一番，明天再陪她回一趟西海，二嫂一定会开心的。”杨婵低声劝慰道。</p> <p>“嗯，只能如此了。”杨戬长叹一声，默默记在心里。</p> <br> <p>晚间沐浴过后，寸心早早上榻歇息了。往常若非精神不济或者身体不适，她总要磨蹭许久才肯休息。杨戬在她身边躺下，自背后将她紧紧搂入怀里，头埋进她的颈窝里，“寸心，对不起。”</p> <p>寸心一愣，拥着被子转过身来，对上杨戬的眼睛，疑惑道：“怎么了？”</p> <p>“明日杨戬带你回西海，见你的父王母后和你的兄长们，好不好？”</p> <p>“嗯？杨戬，我还是不明白，怎么突然要带我回西海？”</p> <p>“你今晚不是因为中秋不能与你的父母兄长团聚心情低落的吗？是我不够体贴你……”</p> <p>寸心听到这里才明白杨戬在说什么，噗嗤一声笑出来，“傻瓜，你在想什么呀！我们龙族又不过陆上的节日，才不在乎什么中秋不中秋呢！”</p> <p>杨戬搂着怀里笑的花枝乱颤的夫人愣了好半晌，才反应过来自己的糊涂，无奈失笑，“是杨戬关心则乱。”</p> <p>笑完后，又将人从怀里挖出来，先佯装冷脸低声喝了句“不许笑了”，然后抚摸着她的肩头，柔声问道：“寸心，那你今晚怎么了？可是小神哪里做的不好，惹公主娘娘不开心了？”</p> <p>哪知寸心听了这笑语，抬臂环住他的脖颈，整个人埋进他胸膛里不肯说话了。杨戬知道她心里有事，也不催她，只是调整了一个合适的姿势，将她稳稳搂在怀里，大掌一下一下轻柔地抚过她的背，一点点安抚妻子的心。</p> <p>良久，寸心才闷声说道：“杨戬，我一想到从前我们是在中秋和离的，我就不舒服。”</p> <p>她无法忘记那一天的疯狂和心死，无法忘记两个人各自执拗到最后头破血流的痛苦，无法忘记血淋淋摊开在那时的自己面前的事实：她和杨戬彻底走散了。</p> <p>大抵从前的回忆太过铭心刻骨，即使她从不是囿于过去之人，即使此时此刻她正偎在她丈夫的身前，那种真切的痛苦仍会紧紧攫住她的心脏，让她疼得想落泪。</p> <p>单薄的身体在他怀里轻轻颤抖着，杨戬心疼到无以加复。他又何尝不疼呢？少年夫妻老来伴，他们却把这婚姻之路走的绊绊，神殿冰冷无声孤身独处之时，天地之间九万里，一毫一厘，寸寸皆为相思苦。</p> <p>室内安静了一会儿，寸心从心绪里缓过来抬起头，才看到她的丈夫，堂堂七尺男儿也红了眼。</p> <p>“寸心，”他低下头，对着她的脸颊吻了又吻。床笫之间空间狭小而隐晦，心安得让人不由得心房溃退，所有的感情都流露出来，杨戬默默感受着胸腔里翻涌的饱涨充盈，将怀里人搂的更紧。</p> <p>两人额头相抵，絮絮说了许多话。寸心白天时被他闹过，本就倦怠，心绪平复后，很快便在他的低声话语中沉沉睡过去。杨戬等了半天不见她回话，低头一看才发现她双眼阖着，只是眼睫时不时颤抖一下，似乎睡得还不是很沉。</p> <p>“寸心，寸心？”</p> <p>“嗯……”</p> <p>“你睡着了？”</p> <p>“嗯……”</p> <p>杨戬失笑，趁机讨便宜，“为杨戬制一套新衣好不好？”</p> <p>“嗯……”</p> <p>“我们要个孩子好不好？”</p> <p>“嗯……”</p> <p>他屏住呼吸，忽然有些细小的紧张，“寸心，我们永远在一起，好不好？”</p> <p>“嗯……”</p> <p>于是杨戬揽着枕边人，心满意足地闭上眼睛入睡。</p> <p>窗外，圆月正当空。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/091015.秋裘.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85
