bN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">小日常<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>蜀地入了夏日子愈发燥热起来，奈何这环山地势常不见日，便是热气也不似别处那般直来直往，直闷得人心里烦郁。尤其是夜里还有几丝凉气，身娇体软的三公主要搭了薄被才能安睡，可偏偏一觉起来浑身又是汗津津的，再加上身侧夫君将她紧紧拢在怀里，她虽好与杨戬缠缠绵绵，可眼下这般也实在是种“酷刑”。再加上昨夜她有意承欢胡闹甚久，这一大早醒来是腰肢酸软又香汗淋漓，好不容易轻轻掀了他的胳膊，脚刚沾地就双腿一软险些栽倒地上，心里暗骂这浑人得寸进尺不知节制，却还是得轻手轻脚披衫系带随手挽个妇人髻再悄声出门。</p> <p>到底是暑天，早起的人也难有甚么口腹之欲，只备了几块点心再配上解腻汤水，寸心自己饮罢才好声好气嘱咐了哮天犬：“你主人醒了就告诉他这汤在厨房温着呢，也给你炖了骨头，约莫再过一个时辰就能吃了。”那狗子正捧着块小点吃得满脸都是，听到“骨头”二字才舍得抬头朝他的女主人嘿嘿一笑，又因为嘴里塞满了点心只能含含糊糊应一声，这摸样十分憨厚滑稽，惹得龙女轻笑一声才提了裙角匆匆出门去。</p> <p>六月二十四，可算是灌口一带数一数二的热闹日子，二郎庙里香客络绎不绝纷纷盼着真君老爷心情好多遂了他们几个愿望。挎着竹篮的真君夫人路过庙前，看着来来往往的凡人也觉好笑，杨戬虽庇佑一方土地却也不能随意更改凡人命格，兜兜转转还是老话一句“命里有时终须有，命里无时莫强求。”</p> <p>这街上人一多，商贩也多，寸心也难得如同那寻常妇人一般巴巴地赶早来挑些新鲜肉菜回去好给寿星张罗一桌生辰酒。她平日里书看倦了无事可做便好研究菜色，起初还是十指不沾阳春水的小公主，这么些年下来倒是能烧得一手好菜。杨戬这个人呢，偏偏又不贪口腹之欲，哪怕是早年间她误将糖当成了盐搁进菜里，他也能安慰两句再把饭菜给吃下去。不过敖姑娘对这人上心，日日张罗饭食也归结出了这闷葫芦的偏好，赶着生辰定要做一桌最好的来给他庆祝。</p> <p>早市快收摊了，可是还没挑着满意的嫩笋和枞菇。三公主这急性子暗暗生出几分恼意，正凑巧这街市上人挤人还将她手里提的鸭蛋挤得摔到了地上去，奈何对面是个五六岁的小姑娘此刻还眼泪汪汪地搅着衣襟，她心下一软道了声“无妨”就放人过去了。再回头准备重新买两个，偏生已经卖完了，这下公主殿下心里更烦躁，干脆提着篮子打道回府。</p> <p>她这没好脾气地一推门，将院里正在啃骨头的哮天犬惊得一噎，杨戬搁了茶杯投过来询问的目光，却瞧寸心鼓着腮帮重重“哼”一声径直去了侧面厨房。她这厢在厨房里大刀阔斧直要把心里的火气全发泄到躺在案板的这块猪肉上，哮天犬被厨房里传来的“砰砰”声吓得冷汗直流，回头再一看杨戬脸色也不很好，特意猫着腰蹑手蹑脚溜到厨房门口，门刚开了条缝差点就被一块抹布砸了脸，往后一倒正好靠在了主人小腿上。</p> <p>“你朝他发什么脾气？”</p> <p>“我现在连发脾气也不行了吗？你不问问我为什么发脾气，上来就要和我吵架么？”</p> <p>杨戬叫他噎得没话，一振袖袍拉上哮天犬就往外间走。敖寸心瞧他步履带风仿佛有什么天大的怒火，一时间气馁下来——不是说要好好给他庆生的嘛，怎地又和人吵起来了！可她心里也含了委屈，毕竟特特起早准备，这浑人不心疼她不说还一点耐性都没有，想罢带着哭腔娇喝一声；“不许走！”</p> <p>话音刚落那人停下脚步却也不回头看她，远瞧去只见肩背起伏似是在压抑着什么。寸心吸吸鼻子丢下锅铲跑到人身后一把抱住腰，“你不许走。”鼻音软糯，“你回回把我一个人丢在家里。”低头见那一双小手又在身前死死攥着他的衣襟，杨戬探口气转身扶住她肩膀，“我不欲与你争吵。”寸心干脆埋到他怀中放肆哭起来，也不管这人是不是洁癖索性把眼泪全糊在他前襟上，“我不要你走。”</p> <p>杨家二郎哪懂得女儿家千回百转的心思，只知道敖寸心一哭起来自己就什么办法也没了，好声好气地将人搂在怀里轻轻哄道：“怎么哭了呢？我不走了，就在这陪着你。”伸手擦擦她眼角泪珠，“厨房油烟重，还是让哮天犬去外面买些现成的回来吧。”说罢执起她小手，另一手拦住肩膀带他往房里去，行至一半转头吩咐哮天犬：“去东街的饭庄买些酒菜回来，挑几道你主母爱吃的。”</p> <p>待回到了厢房，抱着敖寸心倚在榻上，龙女止住了哭才想起来在他怀里不安分地扭动：“今日要亲手给你做菜的。”杨戬从背后亲吻她白嫩脖颈，心不在焉：“嗯？为何？”寸心囔囔道：“二郎你忘了？今日是你生辰。”他被龙女身上清甜香气勾走了魂，手上也不规矩起来：“无妨，旁处多讨些利息即可。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/011400.小日常.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/e45c1c/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">夜袭</div></a> <a href="/pages/dc460d/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">二婚不一样</div></a></div> <div class="page-nav"><p clas
