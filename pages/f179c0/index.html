荡荡的夜里。</p> <p>杨戬冲撞幅度越来越大，他很少有这么冲动的时候，冲动到他恨不能将眼前这个人一点一丝拆吃入腹。</p> <p>几番动作，敖寸心的体内的炙毒慢慢平息了下来，杨戬将她的身子放平，嗓子哑得可怕：“为什么？”</p> <p>“药是……”</p> <p>话未说完，身上的人就打断了她：“我是问你，为什么去找他？”</p> <p>敖寸心闻言微微愣了愣，嘴唇颤动：“真君怕是高看了寸心”。</p> <p>世人皆知，乾坤宫的药最毒，解法也只有一个。</p> <p>“小女不是贞洁烈女，自然是要活命。”</p> <p>他骤然停下了身下的动作，一把拥紧她的腰，嗓子里干涩得不行：“你就这么恨我？”</p> <p>月光虚晃在神殿两三盏摇曳的烛火中，敖寸心好像看见他眼底的水光。</p> <p>杨戬哭了。</p> <p><br><br></p> <p>西海解禁，她自请捉妖补过，孰料那蜈蚣精不知从哪里寻来这毒物，趁她不备下了手，好不容易撑着身子才从岐山出来。</p> <p>往北海方向驾云时敖寸心未曾多想，半路上却遇到了他，隐约恍惚间也不记得是如何被他带来神殿，带回这个她熟悉了千年的地方。</p> <p>敖寸心想过他们再见的千百种方式，却从没想过竟是这般难堪。</p> <p>她低下头，不敢再看那人一眼，咬了唇片刻才用微不可闻的声音说道：“腌臜事，不敢脏了真君。”</p> <p>“敖寸心！”</p> <p>五石散本是丹芷帝君为了惩治犯错的宫人而制，服下后关在内室，看着他们被无处泄发的情欲被折磨至死。</p> <p>“为什么不找我？”杨戬按住她的后脑，声音低沉暗哑，似带着审讯犯人时的威压。</p> <p>敖寸心有意躲开杨戬的眼神，语气慢慢地冷下来：“我不想死。”</p> <p>杨戬一时气闷，讨伐铺天盖地，像是刻意的报复，这次却惹得她抽噎不止。</p> <p>冰凉的泪落在他的肩头，杨戬恍然醒悟过来，眼中的一意孤行的怒气渐渐融化成了温柔和自责：“寸心…”</p> <p>敖寸心在杨戬面前，是最坚硬的顽石，固执到宁愿自己撞得头破血流也绝不肯主动来找他。</p> <p>“是我不好”，杨戬这些年来尝试第一次手足无措的滋味，伸手触碰到她的脸庞，指尖拭去她的泪水：“别气了好不好？”</p> <p>敖寸心一把躲进了他的怀里，放声大哭起来，像一只受惊的小兔，嘴里含糊不清说着什么。</p> <p>“我知道，我都知道”，杨戬搂过她的后背，拍哄宽慰着失控的人儿。</p> <p>哭了一会，敖寸心的神智清明了几分，从他怀里坐起身来，抹干了泪，撅着嘴发狠：“不准说。”</p> <p>杨戬应承下来，又拉她入了怀，一时无言。</p> <p>时光几何，杨戬望着她，眼里不舍，深吸了一口气：“我很想你。”</p> <p>“你呢，有没有话想和我说？”</p> <p>敖寸心怔了怔，将手环上了他的腰际，不由抚上他的背脊，掌心交触，算是作了回答。</p> <p>两人间滲出了潮湿的欲望，杨戬暗哑的嗓音在敖寸心耳边悄声：“可以吗？”</p> <p>敖寸心红了耳根，片晌后把脸埋进他的肩窝，点了点头。</p> <p>杨戬脱去了自己的玄衫，又轻轻地帮她褪下了剩余的衣带，将两人的肌肤紧紧相贴，温热透过皮肤进入她的血液，一点一点抚平敖寸心的慌乱。</p> <p>他的动作比平日里要慢，一寸一寸地湿润，像是要把两人融进彼此骨血中。</p> <p>敖寸心的面色越来越红，不自觉地挪蹭着他，身子软得睫毛都轻微发颤，敏感到甚至可以感受自己身体里的血脉跳动。</p> <p>“杨戬，你好重。”</p> <p>杨戬见她呼吸加促，心跳漏了半拍，放缓了幅度，小心翼翼：“很不舒服吗？”</p> <p>“我…”，敖寸心趴在他的胸口直抖，手指扣紧了他的腰，用力到指甲都几近泛白，在抑制不住的呻吟声中挤出几个字：“你要负责了。”</p> <p>“是么？”</p> <p>“专心一点”，杨戬稍稍退出半分，又狠狠地撞进深处，嘴角带着久违的笑意，压低声音，“小殿下知道便是。”</p> <p>天界的日子本不分四季，三百年的相思在原先冰凉的殿里一圈一圈荡漾开来，上万缕的爱意堪能溢出旁人听不得的深情。</p> <p>一室光华流转，命中注定。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/101000.两心知.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.
