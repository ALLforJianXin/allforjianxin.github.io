K/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">记第三十七次拉回坠入爱河的老婆<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>这世上最不值钱的便是承诺，即使是三界第一战神的承诺，也万万做不得数。</p> <p>杨戬遇见敖寸心的第三十七次，她正在和第三十七个男人纠缠。</p> <p>二层的小酒楼，随着真君的侧目，几乎所有人都注意到了街边小摊上吵闹着的一对男女。龙族生来俊逸不凡的容貌让他们鹤立鸡群，混于熙熙攘攘的人群中，一眼就认得出来。</p> <p>杨戬暗想，即使敖寸心不那么漂亮夺目，将她放在这世上的任何一个角落，他也是认得出来的。</p> <p>街边的两个人由于地势落差没有看见他，堂而皇之地在闹市摊贩前争吵起来。男子做出一副实在忍受不了她的姿态，脸拉得老长，声音不期然飘到杨戬的耳朵里。</p> <p>“三公主，你能不能不要这样任性啊？我什么事情不是顺着你……”</p> <p>你这件事便没有顺着她。杨戬暗想。</p> <p>“我都不想说……买这么多东西，你又不用，你买它干嘛？”</p> <p>她喜欢就买了，又不是什么大事，这也要生气？杨戬暗想。</p> <p>“前些天你砸了我爹送给我的玉佩，我被他大骂一顿，我也就不想说了……”</p> <p>你这不是说了嘛？杨戬暗想。</p> <p>“……”底下的吵闹声依旧清清楚楚地蹦到他耳朵里，真君愈听愈觉得，这实在是个毫无担当与耐性的男子，按照敖寸心的脾气，说不定隔天就能把他给踹了。</p> <p>然而三公主没有当场发飙。他听见龙女轻巧婉转的嗓音响起，软软地，温柔到了骨子里，是他最为熟悉的语气。</p> <p>“好啦，是我错了。给你赔罪好不好？”</p> <p>轰地一声，杨戬原本古井无波的心潭，像是被人浇了一层火油，扔进一只明焰，猛烈地燃烧起来。他气得浑身都在颤抖，身旁的仙友见此，早已识相地告别离去，只余杨戬一个人坐在这个宽阔的雅间里，死死盯着街边那二人的身影，眼神恐怖得像是要杀人。</p> <p>三公主似乎感知到聚焦在身上那道灼热的视线，举目向阁楼上望去，模糊见到一个白袍公子坐在窗边，不是杨戬是谁？</p> <p>——</p> <p>三公主被杨戬带到一座小巧的石桥上。</p> <p>两岸翠绿的杨柳树随风伊伊地飘摇，她顶着杨戬灼灼的眼神，竟有些不敢顶嘴。走过来的这一路上，她喋喋不休地控诉着他方才将自己身旁的男子一掌拍飞的恶劣行径。可是真君黑沉着脸，除了拉着她一股脑向前走，就没有再同她说过一句话。此刻来到这个地方，她已骂歇了气，一时间被他盯得不自在起来。</p> <p>敖寸心低垂着头，也不看他，只是默然不语。石桥边有飞鸟略过，眼见日头已经偏向西斜，杨戬有些难耐地长长叹了口气，仿佛想要赶走身边这股烦闷的燥热。</p> <p>三公主听他这句长叹，只觉他将近两千年的无奈都凝结在这一叹中，隔了几十年的沧海桑田，又完完整整地回到原点，叹还给了她。她忽然有些生气，正想着如何将这股莫名的烦躁发泄出来，一抬头，只见杨戬正忧愁地盯着她，抬起一只手自然地揉了揉她的脑袋，漠然道：“天宪新出，有关男女私情的天条被废止。玉帝降下旨意，曾是夫妻的男女，如若因天条之故分开，可携当年降下的和离圣旨，至三十一天业火台上，将之降入三昧真火中，则此圣旨立即作废，二人仍是夫妻。”</p> <p>敖寸心眉头一皱：“你什么意思？”</p> <p>他又叹了口气，仍旧盯着她，目光中有说也说不尽的温柔，“玉帝颁下此令的第二天，我便拿了两千年前你我和离的圣旨，扔进了业火台中。”他揉她脑袋的手滑下来，要捧住她的脸，被敖寸心扭头躲开。杨戬却不依不饶，强硬地捏住她的下巴，迫使龙女抬头看他。</p> <p>“寸心，”他咬牙切齿“所以说你现在还是我的妻子……你跑不掉的。”</p> <p>他的面目是从未有过的狰狞，三公主有些害怕，想要挣扎，却被他凌厉的眼神喝止。半晌，她带着些许哭腔闷闷地说：“你捏疼我了。”</p> <p>杨戬几乎本能地放松力道，愣神间，却被她一把推开。</p> <p>他踉跄了一下，将将稳住身形，又想要伸手去抓住她，却听她抽抽噎噎地哭了起来：“凭什么你说好便好，你说离就要离？你总是这样……你总是欺负我……”</p> <p>她的哭声如同绵绵密密的春雨，滴滴浇在心头的荒芜上，带着悲凉和丝丝愁苦，令他不得不为止动容。杨戬不禁回想，三百年前的杨府之中，也是同一个人，拿同样的方式来对付他，哭泣声中生生控诉，却是要和他一刀两断，永不再相互折磨。</p> <p>郎君的心闷痛起来。</p> <p>倘若敖寸心听得见杨戬的心声，她恐怕会更生气。二郎神搞不定西海三公主，这是近些年来三界神仙共知的秘密，就连三圣母苦恼于杨戬不安心养伤一事时，也常拿敖寸心来压他。杨戬想，他是不是生来便有哪一根筋和敖寸心搭不上，为什么自己总是搞不懂她在想些什么，总是做出自以为正确的错误决定，总是将他们二人推得越来越远。</p> <p>尽管心头的思绪纷扰而烦闷，真君仍想要先去哄好她。他拉住寸心的手，委屈道：“他们真的有我好啊？”</p> <p>三公主仍旧抽抽噎噎，边哭边想，要论体贴，恐怕真的没有人及得上杨戬了。他会在雷雨天气第一时间惊醒捂住她的耳朵，会在每一次回家的时候给她带回整车整车的礼物，即使她任性地和其他人约会，好故意气他，他也从来没有对她恶语相向过。</p> <p>他总是摆出一副在原地等待的姿态，敖寸心有些气愤地想，可是每每在那个原地等待的人，分明是她。</p> <p>龙女恶声恶气地呛他：“比你好，比你好多了！”</p> <p>被她张牙舞爪的样子招待了一回，真君气昏了的脑袋在此时渐渐清醒过来。二人站在石桥上僵持了大半天，小河船道上已经有商贩陆陆续续地划着花坊画廊回到港湾。经过小石桥的桥洞下，竹篙与古旧的青石板撞击，发出清脆的响声。</p> <p>有位姑娘的红枇杷剩下了几只，见到桥上一对金雕玉砌的男女，操着吴侬软语朗声叫卖：“公子小姐，侬们可买枇杷不买？鲜嫩多汁极，可尝一口啊～”</p> <p>杨戬正觉有些闷热烦躁，闻言叫下了她，走到石桥底边，将她船上的枇杷尽数买回。他抱着一袋枇杷回到敖寸心的身边，轻声道：“好啦，我们回客栈去。我给你剥枇杷吃好不好？”</p> <p>三公主看了他一眼，见他怀中的枇杷确实鲜嫩肥大，又见他脸上明晃晃地写着“殷勤”二字，只好将肚子里怄着的那口气咽了下去。她站起身，将将要迈步，却瞧见杨戬还愣愣地站在原地看着她。</p> <p>她有些好笑，抬手擦了擦脸上遗落的泪珠，转过头舒了一口气。</p> <p>算了，和他计较什么呢？左不过是一只只会咬人不会讲话的蚌壳罢了。</p> <p>“走了，不是要给我剥枇杷嘛？”她后退一步，拉上杨戬的袖摆，拉着他往回走去。</p> <p>杨戬三两步跟上她，悄悄地去看她的脸色。日头愈向西斜，阳光有些泛红，照在她白皙娇嫩的脸上，散发出一层神圣的光晕。</p> <p>杨戬沉默了一路，至下榻的那间酒楼，净手剥了枇杷。见敖寸心毫不客气地一个个吃下肚，他举着满手的汁水，还是忍不住又问她：</p> <p>“所以……他们真的比我好啊？”</p> <p>十分小心翼翼。</p> <p>三公主正吃着枇杷，闻言险些被呛到。她忙端过一边的茶水，仰头喝下，顺了顺气，她责怪地看向杨戬。</p> <p>他摆着一副十分受伤的表情，教敖寸心忍不住软了心肠。</p> <p>“是你最好，你最好，行了吧？”</p></div></div> <!----> <div class="page-edit
