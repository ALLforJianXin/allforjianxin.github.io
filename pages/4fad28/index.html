="/pages/edc744/" class="sidebar-link">西海龙三</a></li><li><a href="/pages/8f10d8/" class="sidebar-link">水性</a></li><li><a href="/pages/a85007/" class="sidebar-link">解药</a></li><li><a href="/pages/87eaf9/" class="sidebar-link">你裙子好难脱</a></li><li><a href="/pages/99a6c8/" class="sidebar-link">想见你</a></li><li><a href="/pages/94bdb4/" class="sidebar-link">酒香否</a></li></ul> </aside> <div><main class="page"><div class="theme-vdoing-wrapper "><div class="articleInfo-wrap" data-v-06225672><div class="articleInfo" data-v-06225672><ul class="breadcrumbs" data-v-06225672><li data-v-06225672><a href="/" title="首页" class="iconfont icon-home router-link-active" data-v-06225672></a></li> <li data-v-06225672><a href="/2020/#短篇-2020" data-v-06225672>短篇-2020</a></li></ul> <div class="info" data-v-06225672><div title="作者" class="author iconfont icon-touxiang" data-v-06225672><a href="javascript:;" data-v-06225672>鱼头</a></div> <div title="创建时间" class="date iconfont icon-riqi" data-v-06225672><a href="javascript:;" data-v-06225672>2020-02-26</a></div> <!----></div></div></div> <!----> <div class="content-wrapper"><!----> <h1><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeCAYAAAA7MK6iAAAAAXNSR0IArs4c6QAABH1JREFUSA3tVl1oHFUUPmdmd2ltklqbpJDiNnXFmgbFktho7YMPNiJSSZM0+CAYSkUELVhM6YuwIPpgoOKDqOBDC0XE2CQoNtQXBUFTTcCi+Wlh1V2TQExsUzcltd3M9Tt3ZjZzZ2fT+OJTL8yeM+eee757fmeJbq//KQL8X3DUSFOcfr7cRsRtxNQMWueeVzOkaITIGqQHNg5y8+jNW9ldM7A6nTpAjuolUikAwq7CE3WcM2RRDz+XGVgN3FptU/aUSlvq9Pa3iZ1+sgAqJyyAFqkipd9dqiwHF3P65YycLWc/6sqGrvoEoIp6DOFaX5h6+dnfjkWprwqsPk0dUGq5vySwDImC10KxFHgGL1SWoc92O3eVht09qdXNH11I2SsTsJYqMWzihqGMi+A+Garf3BAuuLI5oGlULyNfyB/HYNujwktOfRrMr5t77NmevqaUopx0grnKAyvVpmwUDB4x6FPXuGvYLTDwWsejwgtgkYKPqRJg8SV6xaiZ3ZTppGneS4yfH5/66fZSDHv+QZci/+h5c5UHtpy67JUqGppM0sh0Nc1dW6/N1W5Yoqat8/TU/VnadmdeW2PLLSyh0cvxBs3KbqTmwYPpxN4do/mzE8nEpvX/UMu2Wbp74zUAK5q6WkHns7V0eWkdPbPzd3rxkTGybadYySumVzhcaJFbs5UrEkQ/+CK8gF5dnh/6ciIZ73gwQ927L1IitoxKLXYP3SjYdOrHHfTZhRRlFyrorafPk20B3HPD1y2G3qKZME5Jcf3t/HUC13/8tSd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">怦然心动<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>龙女那日险些吃了恶蛟的亏，又在杨家狠心人处受了气，腹内是生出一万个怨怼，本想着回家去，寻上兄长好好记上一笔，管教那三首蛟往后在水里爬着走！</p> <p>可奈何人算不如老天发威，弱水下了界，淹得到处一片汪洋，龙本主水，那位又专擅诿过于人，届时真出什么纰漏，怕还得这头兜着，如此一来整个龙宫忙得是人仰马翻。</p> <p>龙女固然娇气却也明事理，撇下公主气派，与灾民同进同出，一头扎进治灾救人，忙活不休，今日正采罢药草下傅琳山，却在半道叫人劫了去路。</p> <p>来者瘦高个，皱巴巴的脸皮，高颧骨两颊瘦削，一双豆豆眼，瞧着有些贼相，他穿着身有些破烂的褐色短打，陡坡上走的晃晃悠悠，山风一刮好似要倒，这会一抬头和敖寸心对上，倏忽快步赶上来嘴里喋喋道“可西山头的仙姑？”</p> <p>敖寸心心骨矜傲，又见他生的不太讨喜，闻言便只轻轻颔首，那人见她答应一时喜上眉梢，有些兴奋的舔舔嘴唇，搓搓自己干皱的双手，“还真是仙姑，小老儿寻您许久了！”</p> <p>敖寸心见他如此情态，便猜他许是求医问药，心念一转缓声道“你倒不必特意来寻，我现下常在西山，若有恶疾去等便是，也不慢。”不然若是个个来堵，她可再做不得事了。</p> <p>这瘦高个闻言连连点头，腆着脸笑得逢迎，口条甚快“仙姑心善咱这十里八乡都再传，只是小老儿确有大难处，还请仙姑援手！”他说着耷拉下脸，立时像个苦哈哈的核桃。</p> <p>龙女甚为厌烦这般哭爹喊娘的卖惨，求爷爷告奶奶起来又像择不开的狗皮膏药，世上如此投机耍滑的不在少数，但倘若真有什么‘天大的难处’却也该帮一帮。</p> <p>敖寸心想着，接口问道“你先说来”，这人抹把脸话道“俺住南山，那山上有个虎大王，鱼肉乡里，年年都要上供，现如今大水淹了地，家家都没米开锅，可哪里有上供钱，昨个那大王发了话，再有两日上不了供粮，可要将俺们下锅了！”</p> <p>如此泰半便是要她去抓妖，可她却是个疏于拳脚的如何……敖寸心想着忽的脑中电光一闪，话道“这活计实非我所长，你不若去寻这山脚下杨家，那当家的儿郎，功夫绝佳定能帮得上”</p> <p>话声一落这瘦高个一怔，面上的错愕转瞬即逝，抿抿嘴有些期期艾艾“这杨家小老儿也晓得，的确乐善好施，只是现在忙得常常见不着人，若是仙姑愿领个路……”</p> <p>哪个愿意！人将话说成那般，她再去寻——不介是为个什么，便有够跌份的，她才失不起这脸面呢！但这话却不足为外人道哉，龙女想着便有些负气“我与他也不甚相熟，若是不在，那我去了也是一样。”</p> <p>话罢就见这人急赤白脸地，屡次张嘴都没能说上话，龙女过意不去，想了想便道“这般你说那虎妖要几个钱？我先垫予你”敖寸心说着便要拿银钱，却又想起什么话道“不过可先说好，这事不兴说道，你可别传将出去！”</p> <p>敖寸心说着早将手伸了出去，这人却瞧着她发愣，一双手也哆哆嗦嗦的，欲言又止，龙女瞧着心里也起疑，又细细打量他瞧着确是个凡人，便在此时忽的传来一串尖利的笑声。</p> <p>“老小子！你可莫要辜负仙子好意！”虎妖打那树后转出，几步来到瘦高个身后，快有人半个脊背大的爪子，落在这人肩头险些将他拍到在地，他咧着嘴笑起来显出白森森的牙，张狂直极。</p> <p>斗狠，历来输人不输阵，敖寸心瞧着围着她的七八个妖孽，将微微颤抖的脊背挺的笔直，扬一扬白皙的下颌，讥笑道“我道哪个狠角色？！便你几个毛都退不干净的，打哪耍威风呢！”</p> <p>这虎妖喉咙好似卡着了，笑起来像风卷着的破窗子，呼啦啦的，一双眼绿油油的闪，将那人往后一推，靠上前来“某也不曾想，仙姑原生得这般漂亮。”</p> <p>龙女叫他盯得恶心，震袖一挥显出银光泠泠的宝剑，指着虎妖喝止“瞧着些！莫要闪了舌头！”虎妖闻言竟然愈发兴奋，瞧眼周围的兄弟“脾气还挺冲！”狞笑着又道“杀食你前可要好好教教！”</p> <p>话声一落妖邪便冲上前来，龙女见状便要闪躲，却忽闻风声眼前有白影闪动，接着便是此起彼伏的惨叫声，她再回神脚边是半截子胳膊，缺口处鲜血潺潺不止，她瞧着恶心疾退几步。</p> <p>流年不利龙女叫小石子儿一别，踉跄着往后摔去，电光火石间腰上一紧，叫人搂在怀中，拂面而来的是熟悉又陌生的芳樟味道，林外天光落在他肩头微卷的头发上，折出淡淡的金色，他英挺的眉目紧蹙着，似结冰霜的瞳仁里是她的倒影。</p> <p>好看的人生气起来，也多半是好看的，龙女正迷迷糊糊的想着，杨戬将她扶正，她正想说话，却见这人忽的矮下身，接着便是天旋地转，杨家二郎将宽阔的肩膀抵上她的腰腹，结实的手臂卡住她的腿弯，在龙女的惊呼里，将她像抗米袋般抗了起来。</p> <p>那人沉声交代一句“闭眼”，便脚下一点往山下奔去，敖寸心恍惚间看见地上交错着的残腿断臂，死死闭上眼睛。</p> <p>他们在山脚停下，杨戬欲将敖寸心放在这路边石墩上，想伸手去扶，可肩上这软软的身躯，哪里都不好下手，他正犹豫着，身上这人却待不住了，膝头轻轻踢蹬两下，就打他身上爬了下来。</p> <p>敖寸心倚坐着觉得腹内翻腾，她连连干咳两声，转头就想数落杨戬，打眼一看却见那先前跑走的瘦高个叫他逮个正着，这人跪着一个劲磕头，嘴上连连叫苦“爷饶命！爷饶命！小老儿也是被逼无奈的……”</p> <p>杨戬抬脚将他踹翻在地，口中喝道“在哪偷奸耍滑！打那虎穴便跟着，眼见着你与虎作伥，拿了诡计坑蒙于人，如今还不认服！”这厮皱着脸，跪起身还要再讲，却叫杨戬喝止“早有人来吾处告你！你今个快快回去将那些不义之财分还，不然定叫你好看！”</p> <p>说罢又将他一脚踹远，这瘦子就地一滚，灰头土脸的跑远了。</p> <p>敖寸心离得近耳力尚可，听得真真切切，转念想起自个说与他不熟时，这厮指不定就在不远暗处，瞧着她讲的一板一眼，立时羞赧的两颊发烫。</p> <p>杨戬回过身来就见，龙女微微挨着石墩子，坐的小心翼翼，微丰的两颊绯红，他抬头瞧眼足足的日头，不由快步走去挡在她身前。</p> <p>杨戬半蹲下身瞥眼她裙下妃色的鞋面，缓声道“若实在脚痛，我送三公主回去罢。”龙女因着先前月宫的事本就憋气，又恼他欺瞒，哪里能给他好脸色，扭回头来便呛声“怎么送？若像方才那般，我只怕还没到地儿，就叫你先颠死了！”</p> <p>杨家二郎少年时倒是个滑头，但如今在昆仑知了礼端方起来，一时竟不知如何应对这姑娘，只怕她以为自己轻慢，忙辩驳道“动手过的地儿，都是血污你又伤了脚，急着走这才——”他说着话眼见龙女眼尾上挑着，抿起红润的嘴唇，佯装气鼓的脸上是遮不住的俏皮笑意。</p> <p>他心神一松嘴上讷讷道“我也不熟……”敖寸心闻言瘪瘪嘴，话讲的有些酸“你倒是想熟呢！”杨戬闻言啊了声不明就里，转瞬回过劲儿来张嘴便想解释‘嫦娥的恩会报’这事。</p> <p>可到底无从说起。</p> <p>敖寸心见他神色阑珊，以为叫自个堵得生气，心里不忿却又不想这般冷场，想了想张嘴点了下他的肩膀，话道“但今个还是承蒙你搭救。”杨戬闻言不由想起她骄傲的故作勇敢的模样，脸上不由带出点笑意“三公主”想夸她却显恐唐突转了话头“诸多恩德便算偿报一些。”</p> <p>还真是门清！敖寸心想着气恼又委屈，将手一撑便要站起身来，杨戬瞧着，不由将搭上她抬起的手掌，见她起的有些吃力，另手想便想去扶，这会却又避讳起男女之防，犹豫间倒是敖寸心自个搭着他的臂膀站了起来。</p> <p>俩人紧挨着，他鼻尖是清楚的香甜，龙女轻轻的咬着下唇，白润的两颊紧绷着，眼角也泛着殷红，杏眼里水光潋滟，盈盈欲滴，瞧着便如不堪风雨摧折的海棠，可怜也可怜。</p> <p>龙女吸了下鼻子，朗声发问“算这么清楚？你何时这般听我的了？”敖寸心说着话身子竟有些难以抑制的颤抖，“本公主确是偶有任性！”她鼓起莫大的勇气，轻声问道“杨戬你讨厌我吗？”</p> <p>敖寸心的眼睛素来漂亮，生机勃勃的灵动，只一眼便千言万语，这会紧紧的瞧着他，在阳关照耀下跃动不止的全是期许——她的确很喜欢我。</p> <p>这被回避遮掩的答案来得猝不及防，杨戬心头忽的一热，直直软陷下去，张口便要答话。他不觉握紧双手，掌心里的滑腻细软易折，杨家二郎心里和喉咙都是酸涩的，他奋力张嘴却只轻轻说了句“对不起。”</p> <p>敖寸心闻言漂亮的眼睛倏忽暗了下去，那水珠几乎夺眶而出，她抽回手猛的背过身去，将脸一抹又将小巧的脸面高高抬起，再不看杨戬只将他绕开便走。</p> <p>杨戬瞧着她单薄的身影，难以自抑的开口道“三公主！我们相熟的！你若有难处大可以来找我！”</p> <p>龙女闻言脚下一顿，没再回头旋身化龙而去，杨戬瞧着顷刻不见分毫的绯色，心下恼恨：怎样的难处才是足够的理由，叫我接近你。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/022600.怦然心动.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/5eb17d/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">【戬心＆黄金】阐教弟子的特殊喜好</div></a> <a href="/pages/808f1a/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">小师妹</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
