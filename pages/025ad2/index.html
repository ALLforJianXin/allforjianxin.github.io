!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>“玲珑骰子安红豆，入骨相思知不知。入骨相思，相思入骨，知不知……“这日天晴，杨府里的龙女闲来无事，便卷了本集子趴在廊下美人靠的栏上有一搭没一搭地翻着，口中念念有词。风过时，拂起龙女额前的碎发，露出她饱满光洁的额头。今日的寸心只描了眉，略点了唇脂，更衬得她肌肤赛雪吹弹可破。</p> <p>杨戬在寸心身侧，不似寸心一会趴一会坐，他在条凳上坐得极正，手中书册一连翻了好几页，但到底忍不住，往寸心身上看了好几眼。</p> <p>“你小心些，别把书晃下去了。”杨戬终是忍不住出言提醒，不出意外换来龙女一记白目。</p> <p>“掉下去捡起来便是了，大不了再买一本。”寸心说得轻松，见廊前池塘风荷并举沉龟浮鲤很是惬意，便放下书册去逗弄那探头的锦鲤。池内的锦鲤因在杨府里养了许久，早已不惧寸心身上的龙气，很是喜爱寸心，见她戏耍，便十分配合地在池中腾挪穿梭跳跃，惹得寸心连连抚掌。</p> <p>杨戬没奈何地摇摇头，继续专注书中的万千世界。</p> <p>“杨戬。”寸心逗了锦鲤一会觉得无聊，便戳了戳身侧的男人。见男人没反应，又挪过身靠近了些，扯了男人的袖子唤道：“杨戬。二爷。”</p> <p>“嗯？”杨戬抬眼，等着寸心说下一句。</p> <p>“二爷，你说，那句‘玲珑骰子安红豆，入骨相思知不知’里的红豆，跟我们平时吃的红豆是不是一个东西啊？”寸心一双大眼睛眨巴眨巴满是求知欲，正殷切地看着她的夫君。</p> <p>“这个……”杨戬冷不丁地被问这一句，一时有些为难，快速搜索脑子里各类经史子集民间话本访过的名山大川风土人情，最终笃定地答道：“不是同一种东西。”</p> <p>寸心听了杨戬的回答很是兴奋，又问道：“既然不是同一种东西，那诗里面的红豆相思豆是什么样子的？二爷可曾见过？”</p> <p>“这个……”杨戬第二次为难，再次如实答道，“不曾。”</p> <p>寸心撇了撇嘴，放开杨戬的衣袖闷闷道：“我当二爷见多识广，什么都见过呢！”言罢站起身朝后厨走去，“也不知书上相思豆跟街市上的红豆差了多少，今晚做个红豆羹来尝尝！”杨戬闻言失笑，拾起寸心落在条凳上的词集后也跟了上去。</p> <p>又过了两个多月，白露那日杨戬说是受友人之托要去除妖，回来时已近中秋。因一些不便提及的往事，寸心对中秋素来无感，但还是捡了几样果子摆在房内，权当是做做样子。</p> <p>玄色衣甲随意地摊在榻上，衣缘外露着的一抹殷红甚是打眼。</p> <p>“这是什么？”寸心好奇，将那抹殷红拿起，却是一个荷包，料子是上好的蜀锦，花样是简洁的云纹。寸心认出来了，这个荷包是杨戬出去除妖前她给绣的那个。</p> <p>捏了捏荷包，里面似乎有什么东西，一粒粒圆鼓鼓的。</p> <p>“寸心。”这时杨戬走了进来，看见寸心手上捏着的荷包，道，“这里面有东西，你打开看看。”</p> <p>寸心点了点头，从荷包里掏出几粒周身光滑且大部分鲜红、只在尾部带着点黑的椭圆珠子。寸心讶然：“这是什么玩意儿，这么新奇？”</p> <p>“这是相思豆。”杨戬从寸心手中接过荷包晃了晃，“上次你不是问我，诗里面的相思豆长什么样子，这次我去滇南除妖，当地人说这个就是相思豆，又叫做相思子、红豆。不过，这个红豆有毒可吃不得，做不得红豆羹，你拿着玩，得当心些。”</p> <p>寸心闻言欣喜，问道：“二爷竟还记得？”</p> <p>杨戬失笑，不答反问：“你不记得了？”寸心撇撇嘴，嗔道：“我同你吵了这么许多，哪里样样都记得？“面上却是十分开心，将荷包里的红豆如数倒在桌面上，一一端详把玩。见寸心开心的样子，杨戬轻笑着坐到寸心身侧，将她一只手握在手心捏了捏：“以后我不在时，你就看看这红豆。”</p> <p>寸心睨了杨戬一言，驳道：“睹物思人？这可不是二爷的作风……”杨戬有些尴尬，摸了摸鼻尖，想着找些什么由头将这个话题岔过去。只见灯下龙女正专心地研究桌面的相思子，笑意盈盈眉眼如画，动人可亲，杨戬难免又起了其他心思，稍一用力，龙女便落入了他怀里。</p> <p>“你……”寸心被人打断，正想发作，哪知杨戬的一只手已探入她衣襟，就如她把玩红豆那般，将她胸口的“红豆”肆意揉搓。</p> <p>“好寸心，不若你也让我来观一观红豆。”寸心被杨戬揉得没了脾气，男人的唇流连在她耳后颈侧，温热的气息落在细嫩的肌肤上酥酥麻麻，直教人招架不住。</p> <p>寸心保持着最后一丝清明，艰难反驳道：“红豆不是在桌上，你要看便看么。”说着，一双藕臂已缠上杨戬的颈，唇边嘤咛溢出。</p> <p>杨戬轻笑，将怀中龙女打横抱起，向内室的床榻大步走去。</p> <p>天旋地转。</p> <p>秋夜微凉，而房间内情浓意盛。两具温热的躯体赤裸相贴，杨戬身上的某处滚烫灼着寸心叫她难以忽略。就算做了这么久的夫妻，每每床笫之事时寸心还是难掩羞怯。</p> <p>杨戬早已对寸心的敏感之处了如指掌。轻车熟路地剥去身下龙女的亵裤，桃源洞口已是溪水潺潺，两根手指顺势衔住洞前悬珠，一下一下地轻扯，惹得寸心搂住他脖子的手又紧了紧，娇喘连连。</p> <p>杨戬俯下身去，吻住寸心娇嫩的唇瓣，柔软湿润的舌尖相互纠缠，一切都是这么恰到好处。杨戬将寸心双腿分开，略微用力，灼热坚硬的玉茎便轻而易举地滑进了桃源洞中。寸心低呼，在杨戬唇上轻咬了一下。男人倒也不恼，只是身下那话儿用力前冲，上下来去，一只手循着龙女的腰肢一路向上，停在高耸滑腻的玉乳前，峰尖红豆在连连爱抚下早已饱胀，殷红欲滴，待君采撷。</p> <p>“二爷，二爷。”寸心的柔荑在杨戬背上肆意抚摸，身子随着他的律动摇摇晃晃，艰难仰头，在他耳边低声唤着。</p> <p>“我在。”鼻息交换，津液交融。杨戬将寸心搂得更紧了些，兰麝香气弥漫，正是两情浓。</p> <br> <p>寸心一个激灵，再睁眼，床榻上只余其孤零零一人。哪里有杨府？哪里又有杨戬？</p> <p>幽居西海的夜漫长无边，寸心早已忘记这是第几次从梦中惊醒。只是这次的梦多了几分旖旎，倒是冲淡了许多醒来时的落寞。</p> <p>寸心颤颤地从枕下摸出一个物件。是梦里的那个荷包。荷包的颜色因岁月侵蚀早已褪去大半，只装在里面的相思子依旧鲜艳如昨。</p> <p>干燥的布面沾了湿，寸心拈起一粒相思豆打量，眼神清明，面容沉静。</p> <p>入骨相思知不知。杨戬，你予我的相思，你可还记得？</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/13.13.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:52:30</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/ac3a27/" class="page-na
