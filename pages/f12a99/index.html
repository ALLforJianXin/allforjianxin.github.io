YJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">绘声绘色<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>【正在《宝莲灯前传》首播15周年的这一天，你从故纸堆里翻出一个陈旧的小册子。】</p> <p>【啊，无非又是那些东西。他爱她，她也爱他。多么无聊。】</p> <p>【翻开残破的书页，上面写着：</p> <p>又名《杨戬也在为西海三公主画图》】</p> <p>【什么东西？姑且看下去吧。】</p> <p>平日里无事，寸心并不总想着出海。她在陆上生活了一千多年，如今回到幼时的生活环境，在自己家中，百般惬意千般舒适，况她又是整个西海捧在掌心的唯一公主。<br>
但若是硬定了不许出海的话，就难免让龙想要把头伸出海面看一看了。<br>
金乌西坠，西海上一片炫美金光。海面波澜微起，将夕阳余晖打成片片碎金，洒入海中，将水中的粉龙也映得光彩灼灼。<br>
杨戬寻到寸心的时候，便看见粉龙浮在海面之下，修长身躯随水而动，龙头微抬，小心翼翼地用龙角去碰触海面。<br>
无声的震动荡开，金色咒文一圈圈如波纹散去，龙首垂下来，吐出一声轻吟。</p> <p>杨戬脚下发力向前，水中的波动已让龙女知道有人前来。她并未回头，龙尾一伸一缩，已将人卷至面前。<br>
金色竖瞳正对杨戬。<br>
杨戬伸手向龙抚去，但下一刻，整条龙倏然消失，绽开笑脸的姑娘扑进他怀中：“杨戬！”她伸手将他环抱，仰头开心道，“你来啦！”<br>
荡漾的碎金落在寸心脸上，她眼中只有喜悦欢欣。杨戬收紧手臂，低头亲吻她的眼睛，又吻上刚刚吐出他名字的双唇。<br>
待寸心用力揪着杨戬衣襟慢慢喘息的时候，杨戬犹豫片刻，小心问道：“寸心，你刚才是在……”<br>
寸心扭头伸手，指着不远处：“明明是我封地的岛，现在也上不去。”说着又想起杨戬这人的性子，回头果然见他眉头微皱，心知这人又要愧疚自责，忙伸手按在他唇上，“你去给我摘花。”她又拉着他向前飘，“这时节岛上该是成片的桃花了，我要染桃花味儿的指甲，再做些酒……从前你还嫌我做的酒没味道呢。快去快去。”<br>
杨戬话也来不及说，让寸心一推，一道暗流就送他向上浮。回头看一眼寸心，见她就在原地等着，才顺着水流行去。<br>
岛上果然有大片桃林，正是满树红粉。杨戬无心赏景，只使个决便收了无数花朵，带枝的单朵的，盛放的半开的并一些花苞，用法力护着，又匆匆下海。<br>
他的好姑娘不愿他自责内疚又为她忧虑痛心，他又如何不懂。他俩心意相通，俱是为对方打算，不过一个笑吟吟指挥，一个点点头办事，彼此默契罢了。<br>
两人拉着手，向龙宫潜去。<br>
“下次出来记得带人。”看见殿外候着的几列侍女和护卫，杨戬低声叮嘱。<br>
寸心捏捏他的手心，也小声回道：“你也替我想想啊。我才不想让人看我扑在你身上亲。”说完又笑起来，“好啦，我自己出来会带人的。不用担心，嗯？”</p> <p>龙女依旧住在昔日宫殿中，不过拆去些公主规制的物件。雕梁画栋依旧，碧瓦朱甍如昨，倒是新添不少陆上近年常见的家具器物，并各处送来的奇珍异宝，尤以东海所赠为多。<br>
自西海三公主闯进瑶池替司法天神顶下罪责，他二人偷偷往来两百余年的事再也瞒不住西海龙众。现今的司法天神比两千年前那个混小子不知长进多少，整日里觑了空便往西海来，殷勤又周到；便是公务繁忙时人不能亲至，也有心腹送来节礼，一年四季不曾重样。西海一众瞧那送到心坎上的礼单，假作不知自家姑娘在里头出了多少力；无他，只一起吃过一次饭，就让那一对前夫前妻旁若无人的甜甜腻腻给酸得牙倒。<br>
得，就这么着吧，只要寸心喜欢，他们还拦什么？只要把消息按在西海之内便可。自此以后，杨戬出入前三公主的封地不用避人，可叫殿下身边随侍好生见识了一番，还以为两千年前这人就是凭着甜言蜜语与贴心周到哄走公主的呢。<br>
见自家殿下与司法天神牵手而来，侍女送上茶水点心便鱼贯而出。但凡二郎真君来到西海，伺候殿下的活计就让他包圆了去，她们只管等着招呼茶水餐食，连殿下的身都近不得。<br>
寸心知晓杨戬忙起来宵衣旰食不得半分空闲，有心让他好好休息，便先推他去泡个舒舒服服的热汤，亲手给他按摩疲劳的肩颈，坐在池边让他靠在腿上，给他揉一揉绷紧的太阳穴。<br>
他竟这般睡过去了。<br>
不知道他又是多久没有睡觉。寸心轻轻拨开他额角的湿发，轻轻亲在他皱紧的眉头。杨戬不提她也知道，为给她免罪解禁，他不知想了多少法子，做了多少打算，只要一日没有结果，他就一日不得放松。<br>
可她总是心甘情愿的，她很清醒地知道自己在做什么，从以前到现在，一直都知道。因为他就是值得呀，她想。</p> <p>幽幽暗香渗入层层帘帐，唤醒一夜好眠的人。<br>
杨戬撩开重重幛幔，找到在窗前伏案作画的龙女。窗外是高大的珊瑚林，曲张虬结的枝杈间有五彩缤纷的游鱼，在春日的暖流中欢快地嬉戏。<br>
“你醒啦？”<br>
龙女自窗前回首，波动的水光透过琉璃窗格，映在她的脸上，鲜艳又明媚。这样的寸心，他怀疑他是不是永远也看不够。杨戬应了一声，弯腰搂在龙女肩头，低头与她贴了好一会儿。<br>
寸心有些好笑地揉了揉那一头微微卷曲的乱毛，“没睡够就再躺会儿。”<br>
“不睡了。”杨戬闷在龙女发间发出声音，“在画什么？零零碎碎的。”<br>
画纸上只有零星几朵小花。龙女伸出手：“好看吗？”杨戬低头，见一片指甲上已绘有小花一朵，黄色花蕊细细伸展，花瓣由嫩红渐变到浅白，将原就粉嫩的指甲衬得愈发可爱。<br>
他把龙女的手托来仔细端详，又按在小臂上比了比——嫩白的指尖柔润的肌肤又加上那朵小花，在他微黑肤色的映衬下愈发显得鲜妍。<br>
“我给你画。”兴致骤起，杨戬捏着龙女手指便去拿画笔。<br>
武神粗糙的双手可提万斤兵器，亦能细细描摹自然万物，将之化作另一形态绘于龙女指尖。没过多久，寸心在眼前张开五指，满意地点头。那些花儿极为相似，细看又朵朵不同；更有树枝或绿叶偶尔点缀，十片指甲的图样都各自成画，无一不美。<br>
“脚上也要。”她抬腿搭在杨戬膝上，用脚趾挠了挠他。<br>
各色花瓣与海藻捣出的汁液调配出深粉浅红、嫩绿陈褐。杨戬端起龙女脚丫，略一揣摩，提笔作画。这里安排整朵大花，那里画上几片花瓣，不一会儿就全部完工。<br>
特意调配的颜料干得很快。寸心蹬在杨戬身上，翘动脚趾欣赏了一会儿：“好看。”<br>
“是你好看。”杨戬一手还拿着画笔，一手握住龙女脚踝抬起，在她脚心轻轻亲下。寸心“哎呀”笑了一声急急缩脚，“痒。”杨戬收手闪避不及，一道褐色线条划在龙女脚背。<br>
“诶，这要好几天才褪得掉呢。”寸心看了一眼，并不在意，“还好是在脚上。”<br>
灵光一现，杨戬按住正要起身的龙女，“既如此，我添上几笔。”<br>
大拇指上的花朵下，褐色枝条从脚趾伸向脚背，沿途开出小花几朵，又有大小花苞，零星点缀在枝头。<br>
寸心赞叹不已，提着裤腿赤脚转了两圈，又笑嘻嘻地在他腿上坐下，响亮地亲上一口，伸出手来：“手上也要。”<br>
杨戬的视线落在龙女胸口几颗小痣上。<br>
“等会儿，不急，你别动。”他圈在龙女腰间的手臂收紧了些。<br>
莹润洁白的肌肤上，小小痣点额外显眼。杨戬小心落笔，勾出极细的线条，须臾便成小花两朵，嫩红浅黄鲜妍明媚，在柔润雪肤之上，随着呼吸轻轻起伏。只是不待他多看几眼，寸心便掰开他的手臂，自己凑到穿衣镜前美了好一会儿。<br>
杨戬看着龙女背影，忽觉饥渴。<br>
他走上前去，撩起垂滑的青丝，搂着她的腰肢贴上去，在颈项落下亲吻：“颜料还多。”<br>
寸心握上他的手，扭头后仰：“那给我画手背上？”<br>
杨戬提着龙女纤腰上抬，托着臀腿把人抱回窗前，“在你背上画几朵大的，保证好看。”<br>
“可，那我也看不见呀。”寸心琢磨了一下，应该会好看，但除了作画之人，还有谁能看到？<br>
杨戬并不坚持，改口道：“那就画前面。”<br>
寸心立刻转过眼睛，盯着他看了一会儿，嗤一声笑：“我就知道你……等会儿我也要在你身上画。”<br>
“好说，好说。”杨戬叫人戳穿也无丝毫羞惭，反而显出些得逞的笑意，他把人放在贵妃榻上，“还请公主宽衣。”<br>
——不管王母娘娘的口谕怎么说，杨戬在西海一贯照旧唤她“公主”。<br>
寸心斜靠在塌上，上下扫一眼杨戬：“画画就画画，你不许做别的。”<br>
“是么。”杨戬轻笑，“都听公主的。”<br>
他拉拢窗边纱帘，从架上找出香块，放在海螺样的香炉里点燃。缕缕青烟从螺口升起，清淡怡人的香氛在室内飘散开来；又抽开龙女腰间系带，将衣襟略略分开，动作轻巧，一丝肌肤也没碰到；接着将小裤向下褪了些，笔尖蘸过颜料，落在龙女肚脐周围。<br>
寸心小腹一缩。笔尖软毛搔在皮肤上，带着颜料的凉意和无法忽略的轻微触感。随着笔尖每一次的触碰，她的小腹都微微颤缩，一些酥酥麻麻的痒意在肌肤上丝丝扩散。<br>
花枝在小腹上延伸，一时长出绿叶，一时冒出花朵。垂眼看去，杨戬低头作画，不时蘸取颜料或更换画笔，状极认真，并不抬头看她。寸心蜷了一下脚趾，勉力定住不动。<br>
几片花瓣似被轻风吹散，飘上去从腹部荡向胸前。画笔像调皮的舌尖，在她肌肤之上游移，带来微微细细的痒，终于停在双乳之间。<br>
杨戬抿了抿嘴，提起遮盖乳房的襟口拨开，笔触在鼓囊囊的圆润乳房上慢慢落下颜色。他仍不抬头，额上却慢慢渗出汗来。<br>
他动作缓慢，笔尖落在乳晕之外，慢慢勾勒一朵小花。龙女盛雪肌肤之上，艳色渐次开放。寸心呼吸渐重，乳房酸胀起来，又麻又痒，总嫌他动作太轻。杨戬目不转睛，手指紧紧捏住笔杆，极力控制，把一片花瓣慢慢绘在乳晕之上。他的动作愈缓，寸心呼吸愈急，脚趾缩了又缩，胸脯高低起伏，喉咙也有些痒。<br>
冰凉的笔尖落在乳头上，绘下一颗小小的花苞。乳粒逐渐肿胀发硬，像两颗艳丽的红果，果肉膨胀，花苞亦微微绽开。寸心忍耐不住，轻喘出声。她动了动腿，心里希望杨戬落笔能再重一些，可画笔又落在旁处，把花枝延伸到乳房之外。<br>
她两条腿拧在一处挤了一会儿稍作缓解，枝条又带着四散的花瓣从肩头落下，洒满另一侧圆乳。一只黑色的蝴蝶覆上去，在落花之中半遮半掩，蝶首吻上已然硬挺的朱果。<br>
“——杨戬！”开口才知声音沙哑难控，寸心抬脚蹬在杨戬膝上，沿着大腿滑向衣摆掩藏之处，碾压鼓胀的阳具，挤向他的小腹。肉具硬热，在她脚心蓬勃弹动。他喉中发出一声低喘，却道：“别乱动。”说罢拉着龙女小裤寸寸向下。她的双臂还在袖筒中，身躯却已一览无遗。<br>
杨戬的手不曾碰触她肌肤的一丝一毫，但冰凉笔触所过之处随着轻麻和微痒逐渐烧起火来。湿润的笔尖落在她大腿外侧，如同他的舌尖，一路舔舐。晨光经海水折射，又透过轻软纱帘，落在杨戬脸上，他神情专注，落笔沉稳，但手背上绷紧的筋脉和额头的细汗昭示出他此刻的不宁。<br>
他端起龙女踩在他腰间的那只脚，亲在脚心，又一个一个吻过脚趾。灼热的吐息落在脚尖，撩拨着原始的欲望。寸心嘤咛低吟，腰肢微微扭动，难耐地攥紧了滑落身侧的衣裳。腰间的花枝垂下来，落花飘在腿上，沉向脚面；斜生的枝条从另一条大腿的侧面长出，向上伸展。<br>
杨戬抬着龙女腿窝折起，换了一只干净毛笔并捏起法决又清理一次。<br>
“这花开得正好，”他说，“已酿出蜜了。”<br>
柔软的笔尖扫在蜜露出处，轻碾停留。寸心骤然发出又娇又软的喉音，小腹猛地抽动，纤腰上抬又落下。又轻又痒的触感在花穴周围绕了数圈，又在微微翕张的穴口缝隙轻轻撩拨。寸心咬住嘴唇，抬脚去踢。杨戬一把抓住她的小腿，终于抬头看她。龙女将一根手指含在口中，一边吮咬一边含糊地说：<br>
“好了，我现在就想要。”<br>
龙女香甜的气息就在鼻端萦绕。任何时候只要看到她，他便总会动欲，何况此时，她正赤裸地躺在身前，面颊潮红，眼眸中是湿漉漉的欲望，双腿间是香潺潺的欲露。他早已硬得胀痛，她又带着喘息带着轻泣提出如此要求，想要他。杨戬喉头连连滚动，阳具撑起裤子，滴滴前液在布帛上晕开。<br>
他看着寸心满是欲念的脸，把浸满蜜液的笔尖送入口中吮吸。寸心发出一声低嗔，嘟囔着“我不画了不画了”，挺腰伸脚去够杨戬腰间硬物。<br>
又被杨戬按住。<br>
浸过春水的笔尖又蘸取颜料，把腿侧斜出的花枝延长，伸向两腿之间。寸心两腿大开，全身的感觉都汇集下去。细软的笔尖轻触肉珠，落下一点红粉，寸心发出一声似痛苦似欢愉的哼喘，穴肉从内到外抽动啜吸，却什么也触不到，只有空落落的麻酸痒胀。她咬住指尖，难耐地催促：“不要画了嘛，我就要你。”<br>
杨戬极力克制挺腰而入的欲望，勉强将视线移开，臂肌绷得极紧，稳稳当当地落笔，将与肉道颜色相类的鲜花绘在溪谷入口近旁。甜香弥漫，蜜露渗出，他伸出指尖轻抹，把甜水涂上刚画好的花芯。<br>
寸心难受得直哼哼，向下沉腰去追他一触即分的手指，又被他躲开。她挣开钳住她双腿的手臂，起身去剥杨戬的衣裳。<br>
杨戬的呼吸早已没有先前的节奏。他由着龙女折腾，等他也赤条条直挺挺立在当地，便将她一把抱起，走到一人多高的穿衣镜前，伸脚勾来软椅，将龙女翻身放下，把挺在小腹前的阳具按下去，挤向龙女臀间，吐出一口沉沉喘息。<br>
“还没完，不要急。”他哑着声音说道，圈住龙女腰腹挤压胀痛的阳具，制住她颤动的身躯，提起画笔，将乳房一侧的枝条延长，拉上漂亮的肩胛骨。<br>
他已经失去先前强装出来的淡然稳定，急切地挥动紧绷的手臂，画下几朵大小不一的花。最后一朵与大腿一侧延伸出来的花枝相连，落在龙女急切扭动的臀瓣上。<br>
寸心全然不顾上他在背后又折腾什么，所有注意力都集中在两人贴紧却未嵌合的地方。穴口得到按压固然一时解渴，但内里又更加空虚。她抬头看向镜中的自己，可她已经完全没了欣赏画作的心思，只想知道他什么时候才能如她所愿。<br>
终于，他把画笔向后一扔。<br>
忍不了了。<br>
“寸心，看看你自己，”杨戬抱着她倚在自己身前，面对镜子靠坐椅上。他一手圈住龙女腰肢摩挲不停，一手抚上胸口狂乱地揉捏，将他刚刚画好的花朵搓成各种奇异的模样，“看你，多漂亮，是不是？”他低头咬住她的颈项，留下克制之后的齿印。<br>
两人腿间已经一片湿滑。寸心死死抓住扶手，不等她出声应答，他把她略微上提，扶着怒胀的阳具，挤皱花瓣，撑开花芯，逆流而上直入深处。寸心尖叫出声，剧烈颤抖，堆积许久的欲望冲破顶峰，肉道抽搐着吐出更多春雨花露。她的身躯如弓绷起，又在杨戬强有力的臂膀中瘫软下来。她靠上背后坚实的胸膛，眼角渗出欢愉的泪花，嘴里嘀咕出许多埋怨杨戬的话。<br>
杨戬扳过她的脸亲吻上去，又让她看镜子。“你看，我在这里，”他拧着宝石般的乳尖，将它按入弹软乳肉，在花瓣上揉搓，另一只手顺着胸口滑下去，抚上二人交接处，那里水光潋滟，一片红润，“在你的花里。”<br>
寸心的视线顺着他的指尖移动，看到青筋勃胀的阳具还有一节露在身外，穴口绷得紧紧的，勒在泵动的肉柱上。她不由得抽紧小腹，呻吟出声。<br>
杨戬一口咬在她的肩头，挺腰抬臀快速向上，一下一下往最深处顶。他的指节陷入柔若无骨的躯体，他的唇舌吞噬充满情欲的汗水，他所有的热血都涌向怀中。<br>
只要抬起眼眸，就可以看到镜子里，他凶悍的肉茎正在她腿间迅速进出，坚硬热烫，无法抵抗的快感在寸心脑中炸开，她呜呜地胡乱哭叫着，指尖掐入杨戬腿上隆起的肌肉。杨戬突然起身，端着龙女边走边上下抬动，几步行到榻边，弯腰放下龙女，给她扯来枕头塞在身前，两手掐住龙女细腰，一边揉搓腰臀上的粉红花朵一边狂热地捣进去。<br>
这样可以毫无阻碍入至最深。寸心被顶得向前趴去，又被他捞起来按下，她失声尖叫，直喊着慢点轻点，回应她的却是一阵狂野的急速磨碾捣插。她很快失了声音，空张着口出不了声音，只能埋头呜咽，颤抖着让高潮冲刷到痉挛无法控制。<br>
“轻什么？”杨戬兴奋地喘息，弯腰啃噬龙女脊背，“寸心明明喜欢得很。”他连姿势也不肯换，拨开她肩头的长发露出整个背部，着迷地在她背上四处乱抚，明知道寸心此刻说不出话，还故意问她：“是不是？是不是喜欢？”一边重重撞击，一边咬她：“不回答？那我再重些？”<br>
寸心让频繁的高潮刺激得一丝清明也不剩，完全无力回应，肉体失去控制，只余下无穷无尽的颤缩和肉道中本能的抽搐挤压。不知道如此过了多长时间，捣插不休的硬热肉杵终于顶在深处尽头，爆出股股浓液。<br>
与往常留在她体内尽享余韵不同，杨戬射完之后便退身抽出，将龙女抱起翻身，让她斜靠在床头，大掌揉上她仍在震颤颤栗的小腹。寸心小声喘气，哼哼着说：“不来了，我魂儿都给你弄没了。”<br>
“寸心你看，”他凑上去给她抹去泪花，狂热地吻上去，舌头撬开齿关在她口中扫荡，“你这么好看，这么漂亮，”他松开唇舌，“我才是，一见到你，魂都被你吸个干净，你看，”他掐着龙女下巴让她向下看，“你又把它吐出来。”<br>
什么鬼话连篇！寸心去扳他的手指，软绵绵也用不上力，只好轻轻“呸”他一口。这人昨晚还疲倦到泡着汤池都能睡着，今日就像个多日没开荤的色鬼一样，又狠又粗野。她拍了一下杨戬，“你收拾，我不想动了。”<br>
“急什么。”杨戬根本就没软下来过，折起龙女双腿打开，着迷地看向她腿间。经过一番激烈交缠，花色更艳，而那花瓣中间唇肉口中，汩汩流出的正是浓白浆液，如鲜花吐露，在翕张的花心点点外流。他捻一些在指尖，抹在龙女小腹上，接着欺身上前，扶稳昂扬肉具，一点一点捣入他自己刚刚喷吐的浆液，左右微一滑动，挤开藏在浓浆下的小口，重新塞进依旧微微颤缩的甬道中。<br>
他目不转睛地看着自己慢慢陷进去，陷入鲜花般肉体的包裹中。寸心无力地仰头，发出娇软绵长的呻吟。杨戬向前膝行，与她亲密无间地交接，把蜜露浓浆挤成一片黏稠。他躬身下压，贴近他亲手绘就的鲜花，带着厚茧的手掌裹上去揉捏一团软肉，看花瓣从他指节间挤压出来。</p> <p>浪涛声声只在海面之上。任它如何狂风巨浪，海底总是一片平静。西海前三公主的寝殿外，不当值的卫队与草头神在校场比武，无事可做的侍女散坐闲聊，偶尔猜测司法天神这次又会停留几天。小金乌的光芒照入浅海，成群的游鱼吐着音波在珊瑚丛间嬉戏。<br>
司法天神的结界笼罩寝殿，隔绝内外，将龙女浓香密密遮掩在内。<br>
杨戬自认重欲，可比他肉身欲望更重一层的，是满足龙女的渴求。天地时差巨大，他不能常来，而两千年前直到今天，龙女为他付出的一切，更是他粉身碎骨也无法报答；他总是不知道，如何才能对她更好。<br>
他知道，他与寸心，都热切地喜欢从彼此肉身汲取欢愉，但他更知道，他们热烈地爱着彼此。在欲望和狂欢消退之后也会永恒存留的东西……<br>
是爱本身。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/041400.绘声绘色.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/08/19, 23:19:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/b11608/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">年复一年</div></a> <a href="/pages/25cd7b/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">她是龙</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
