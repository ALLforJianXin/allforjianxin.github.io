jgAAAABJRU5ErkJggg==">此情可待<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>人间总有许多期盼团圆的节日，天上神仙久而久之便也觉得团圆也真算是一上乘乐事也，他们都活的太久，见过了太多离别，或许就是人间的道理，吃过太多苦的人，尝到一点甜便会格外在意。<br>
黯淡的真君神殿内杨戬微微倚了高台上座椅疲惫地揉了揉眉心，去凌霄宝殿时他隐约听见谁说了句今天是什么节日，听得不甚真切他也不在意，节日什么的，于他们这些神仙，有什么意义。<br>
仙娥低埋着头端来一碗甜汤放在他面前，杨戬瞥了一眼微微皱起眉，“什么东西？”<br>
“回——回真君，是食神送来的元宵。”仙娥吓得跪倒在地颤声道。<br>
元宵，杨戬眉间川字淡去了些，他摆摆手示意仙娥退下，伸手拿起那碗看了看，掐了个诀一挥手消失在昏暗的大殿中。<br>
华山之下杨戬缓步走进山洞，天生贵胄的气质与这仙牢环境格格不入，他微微侧目看向结界内的杨婵，她散发苍白着脸坐在地上，闻声抬头看了他一眼又漠然垂下眼眸。<br>
“今日元宵佳节，三妹，吃口元宵吧。”<br>
杨婵冷笑一声依旧不抬头，只抚着手上玉镯哀声道：“元宵佳节，求得是阖家团圆，你害的我一家相隔，妻离子散，而今又来送这元宵做什么？”<br>
杨戬皱眉不语，杨婵似乎找到了宣泄情绪的方法，又继续道：“二哥而今又可还有团圆之地吗？这个司法天神，高高在上的孤家寡人，你做的开心吗？”<br>
修改天条一事牵扯甚广，其间太多不足为人道的心酸和强压他并不指望妹妹理解，可是，她这样语气，他很难过。<br>
杨戬隐忍着怒意走出山洞，垂眸看了看手里小巧的碗刚抬起手又缓缓收回，掀起朝服下摆在洞口台阶上坐下，盛起一个元宵来喂进嘴里，那糯米团子凉了有些噎人，其中馅料也并不好吃，有些太甜，只是糯米又黏重，在嘴中牵扯着甜腻味有些让人作呕。<br>
杨戬随手把碗放在一旁，抬眼看着灰蒙蒙天空心中忽而生出些凄凉仓惶之意，是啊，这个孤家寡人的司法天神，他做的开心吗？<br>
眼角有些微微润湿，杨戬深吸了一口气浅皱起眉瞥开眼，哮天犬嗅着气味朝他奔来，绕着他转了两圈又嗅了嗅，衔住他的衣角拽了拽，又朝着一个方向叫了两声。<br>
敖寸心轻声哼着小曲从屋里端出熬好的元宵馅料来放在院里桌上，在手边方巾上擦了擦手正要动手，眼前那天神便缓缓落下，嗯，这次有进步，脚先着的地。<br>
敖寸心不说话，杨戬也不语，她心中有些恼火，这人一天什么毛病，便也不搭理他，自顾自地做起元宵来。<br>
“这是在做什么？”杨戬直愣愣问道。<br>
敖寸心抬眼瞥他一眼，完了，这人可能要傻，“元宵。”<br>
杨戬又皱起眉，“今日节日，西海是苛待于你吗？怎要你自己来做？”<br>
“现成的有什么意思，就是要自己做才好玩呢。”敖寸心轻哼一声。<br>
白白的糯米团子在她手心来回揉搓着不一会儿就成了滚圆的模样，被她小心翼翼放在一旁像颗小夜明珠似的格外好看，杨戬看愣了神，敖寸心往一旁挪了挪，头也不抬道：“在我这儿没有现成的东西吃，真君大人若是想吃，劳烦来动一动手。”<br>
杨戬微微一犹豫，走到她身后拥住她，大掌包住她的手，“我不会，你教我。”<br>
活了这么久的人连个糯米团子都不会揉，还好意思说的这么坦然，敖寸心撇嘴一低头，看见他露出的手腕上的伤疤心中又忽一抽痛，她抽出手来转而握住他的手，带着他的手一点一点学。<br>
两人就这样紧紧拥在一起，没有人说话，也没有多余的动作，只是揉搓着手里的元宵，一颗一颗，皆是一点一点团圆。<br>
“寸心，唤我杨戬。不要叫我真君大人，可好？”他在身后问的有些小心翼翼。<br>
他怎会用这样的语气说话，他是那样骄傲的人，那样生来贵气的人，那样意气风发的人，敖寸心忍不住转过身去看他，碍着手上的糯米粉不得触碰他冰冷的脸，可眼中确是不加掩饰的心疼：“你怎么了？出什么事了？”<br>
杨戬微微阖上干涩的双眼，摇了摇头道：“没事儿。”<br>
她显然是不信这一句话的，甚至更担心了些，于是也顾不得手上的糯米粉，轻轻捧住他的脸道：“今天过节，不想那些不好的事。”<br>
他俊秀的脸上沾上了糯米粉，不复从前的法相森严，甚至有些滑稽，敖寸心低头又扑哧一声笑了，在他唇上轻轻啄了一下，“去烧水，我给你煮元宵吃。”<br>
杨戬也不曾想到，有朝一日自己的法术竟要用在这烧火之事上，只是穿着这森严朝服坐在火堆前，他倒也有几分新鲜之感，待火堆燃起敖寸心架了锅煮上元宵，一颗一颗的糯米团子在滚水中翻腾，她看得心中雀跃，背着手娇憨笑道：“好了，快来吃。”<br>
刚煮出来的元宵又软又糯，内里的桂花馅儿也是恰到好处的甜，这味道很是熟悉，似乎是千年来他记忆中的元宵味道，杨戬把她盛在自己碗里的元宵吃了个精光，心满意足地赞叹她的手艺无人能及。<br>
“从前天廷也是会过节的，怎么，你今日在天廷没有吃元宵吗？”敖寸心看着他的样子不禁心里一动，两人就坐在小屋前的台阶上，丝毫不在意自己身份，她犹豫了一下，慢慢靠在他的臂上。<br>
杨戬本不想同她说那些事情，只说食神当神仙太久技艺愈发不如从前，可垂眸看着她并不相信的眸光中水光云影，又不觉反思起来自己千年同她的那些往事，若是那个时候每每把话说开了，他们又何至于至今日。<br>
那些事情他说起来很是平常，仿佛所受的罪所受的磨难，都不是他本人。敖寸心的眉皱在一处，她不敢去细想，将杨婵视作自己生命中最重要一部分的杨戬，听见自己妹妹说出那些话时的心情。<br>
敖寸心轻轻抓着杨戬的肩，把他整个人扳过来面对着自己，抬眼看着他紧皱的眉头和眼中的痛苦，犹豫着扬起头吻上他额上的天眼。<br>
她从前也知道这处天眼与他而言是不同的地方，可直到躺在了自己的贝壳床上，敖寸心脑子里还有些浑浑噩噩的没回过神来，她明明只是想安慰他一下，怎么就成了而今情形了。<br>
他埋头在她颈间一声一声唤着她的名字，起初敖寸心还能应他两句，可之后回应就成了断断续续的轻吟，她抬手抱住他的颈，将整个人都贴在他身上，只努力说出一句完整的话来：<br>
“杨戬，让我亲亲你，亲亲你，就不难过了。”<br>
他浑身一震，闷哼一声抱紧了怀中的人骤然卸下力来，两人呼吸声沉重地交融在一起，敖寸心只觉自己指尖都是酥的，在他背上的伤疤上轻拢慢捻，“做什么事都好，只是别伤了自己啊。”<br>
“寸心。”他贴着她的鬓角轻轻吻她的侧脸，他自诩一生光明磊落，坦荡行事，却唯独在对她的这件事上时时生出懊悔之心，缘何那些年他们就这样错过了，而又在分开的一刹那发现深藏于心的爱意。<br>
敖寸心闭上眼睛，“嗯？”<br>
“你有什么愿望吗？”<br>
敖寸心实在累极了，连抬眼看他的动作都做不到，只是下意识往他怀中靠了靠，轻声道：“我希望西海平安，希望父母亲人都能安好，希望你这个冤家保重好自己，别再一身伤地落在我跟前了。”<br>
杨戬摸摸她的长发，笑笑又道：“我是问今日元宵节你有什么愿望吗？”<br>
“我想看花灯，好多好多的花灯。”<br>
她虽说被下令禁足，可凭他而今权势就算把人带出去又有谁敢多言，只是那样就难免会将她牵连进自己身处的诡谲风云中，他不敢。<br>
杨戬心中天人交战时敖寸心已经沉沉地睡过去了，再醒来时床上已经只剩自己了，她唤了两声没听见回声便坐起来，看窗外已是天黑，虽说知道他不能在她这儿久留可招呼不打一声就走了她心中也还是不平，气得把手边他睡过的枕头扔在地上，赤足踩着自己的外衫出了门。<br>
一出门她又愣在原地，整个院里挂满了各式各样的花灯，就连地上也摆着河灯，凡间的灯按理说在这海底是亮不起来的，可不知是谁使了什么法子，她这一处小院都笼在满园花灯的融融暖色下，吸引着她往灯下走去。<br>
其间最大的那盏花灯下一张笺纸来回微摆，敖寸心摘下来是他锋利字迹：“此情可待”。<br>
龙女笑起来，散发赤足在满院彩灯下心满意足地转着圈，不用多想她也知道是谁为她布置下了这一院花灯，她觉得心中有些好笑，曾经两人朝夕相对时总是相互伤害着对方，现在却又能如此了。<br>
实则她是舍不得而今这一切的。<br>
杨戬端坐在真君神殿之上看着化出的神镜中她欣悦愉快的模样自己也微微笑起来，人间繁华她走不进去，他便为她带来其中最美，他此刻孤寂一时也无太多关系。<br>
不必众里寻她，她自在灯火阑珊之下。<br>
如此，他很知足。<br>
