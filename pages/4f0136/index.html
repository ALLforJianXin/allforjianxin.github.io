戬只怪夏日的衣衫怎么这样薄，今天的触感怎么这样灵敏。他感受到敖寸心柔软的胸脯贴近自己坚硬的腹肌，随着环抱的动作轻轻压下，抵在他身上好像挤得变形。热流轰的一身炸开在血脉里，令他整个人都僵硬起来。</p> <p>寸心发觉他僵着身子，也不伸手，还道他莫不是不喜同她如此亲近，微仰起头嘟着嘴问他：“你不喜欢我抱你么？”</p> <p>郎君尽量避免和她的身体有太多摩擦，只瞧着远处池塘中新开的荷花：“没有。”语气冷冷清清。</p> <p>三公主顿时就委屈了，偏还踮起脚艰难地伸手揽住他的脖子：“你是不是不喜欢我啊？你为什么不抱抱我，嗯？二郎？”</p> <p>杨戬的薄唇猛地抿紧，低头和她对上视线——
太糟糕了，太糟糕了。</p> <p>她晶莹的樱唇嘟得那么可爱，她是故意在挑逗他罢？杨戬一把揽过敖寸心的腰，抬手挑起她白嫩的下巴，低头吻上日思夜想的柔软。她细密的唇肉真如所想的一般柔软，撬开牙关攻略城池，寻到那一处销魂的香舌，舔吻吮吸。放肆地嗅闻她身上诱人的体香，他放在寸心纤腰上的手不自觉隔着衣料抚摸起她娇软的身体，喉头尝尽甘甜。</p> <p>龙女被他吻得窒息。没人教过她这个时候应该怎么办，只得任由身躯绵软下去，到最后无力地倚靠在杨戬的怀里。</p> <p>他最终喘着粗气，稍分开些许，喉头滚动，看着眼前含苞待放的娇美佳人，视线落到她微微敞开的衣领处。杨戬身形高大，并非有意低头看她，却仍旧不经意间一窥妙境。</p> <p>不能再待下去了。</p> <p>他放开握住她腰的手，将人轻揽在怀里。梧桐树上的竹风铃被风吹拂，相击发出木块的钝响。他们彼此熟悉着对方的气息，忽然不必再多说什么。</p> <p>已经很明了了，不是么？</p> <p>——</p> <p>敖寸心一贯是个心大胆子小的，敢惹杨戬是以为他恪守礼节不敢造次，如今脸红的，却又变成了她。</p> <p>杨戬粗糙的指节缓缓摩挲着她的腰，她觉得痒但又不大敢躲，真不知这厮何时变得这样孟浪，心头一气直想再过几下捶他的干瘾。</p> <p>——可是她现在不大敢。</p> <p>杨戬感到她老老实实地待在怀间，不禁有些好笑。便撩起她一缕发丝道：“这样如何，够不够当做喜欢了？”</p> <p>三公主听出他言语里的戏谑，一时气息微促不甚服气，抬眼看他含笑的双眸，一咬牙一闭眼，伸手揽住他的肩膀踮脚凑上去，在他唇上猛地一亲。</p> <p>亲完她脸色爆红一扭腰跳开三尺之外，灵活地跑了。</p> <p>跑了……</p> <p>杨戬呆在原地，不自觉以指亲抹唇间的湿濡——唔，她的口水还留在他嘴上。</p> <p>强按下心头的悸动，杨戬转过头去咽了咽口水。</p> <p>一连翻开几本卷宗，入眼不入心。二郎少爷烦躁地将竹简放回书架，至桌前倒了一杯凉茶，一饮入喉驱散热意。微微的凉气侵入体内，不一会儿便消失得无影无踪。</p> <p>杨戬扶额。</p> <p>——就不应该太过逾礼。</p> <p>正懊恼间，他收拾睡衣去冲了个凉，见诸客房内无一亮灯，想是大家今日又不回来了。他摇摇头沿着回廊欲回东厢，路过敖寸心的房间，不经意间自微开的窗棂一撇。温暖的灯光透着隐隐约约的诱惑，房内屏风太薄，实在遮不住三公主婀娜的身段。</p> <p>她在……在换衣服……</p> <p>他不愿去看，可惜方才那一眼早深深印在脑海里，怎样都忘不掉。非礼勿视清心宁神，但怎么都阻止不了欲望的延伸，她的腰好细，两手足够握住，胸前柔软的线条……他今日……见到她领口的光景……</p> <p>杨戬一拍脑门——你在想甚！</p> <p>乒乒乓乓地收拾一番，将灯熄了，他赶紧躺到床上将自己团起来。</p> <p>睡着了就好了。</p> <p>被窝甚是燥热，少年郎忍不住将手伸下……但到一半，又连忙缩回来。论起此时杨戬不过是个二十余岁的男孩子，有正常的生理反应，平日放纵一下也就罢了，毕竟没有具体的想象对象。但今日，他晓得，全是因为敖寸心。</p> <p>既然真心欢喜她，如此便已折辱了，大是不该，怎能再去放肆。</p> <p>混沌了大半夜，他翻来覆去地睡不踏实。夜凉如水，小院内的梧桐树沙沙作响。他听得清楚，暗自忍耐着肆意燃烧的心火，烦躁不堪。</p> <p>忽然有脚步声起，他猛地睁开眼睛，翻身坐起。那人毫不遮掩，转至他的房门前，施施然推开了门。</p> <p>杨戬借着微亮的月色瞧得清楚，逆光中仙气飘飘的脸颊纯净得像丁香花一般，她的眼睫忽闪忽闪，美得不似人间之物。</p> <p>是了，她本就是龙族金尊玉贵的公主殿下，是最美丽，最漂亮可爱的——是他小心翼翼，怕连累，又怕吓跑了，不敢宣之于口的心上人。</p> <p>“你……”他俩同时开口，在脉脉含情的对望之中双双哑然。</p> <p>敖寸心仿佛没有看清他眼底的诧异，她扭动着诱人的身体向他走来，唇角勾起一丝若有若无的妖媚。她撩开了杨戬窗前的纱帐，站到他面前。</p> <p>“三公主，你有什么事么？”正经装惯了还是有些作用，尽管心底已经颤抖，他说出的话依旧平静得察觉不出一丝波澜。</p> <p>小殿下的目光魅惑起来，凑近他，居然伸手掰开他的双腿，将身体软得似水蛇一般，滑进他的怀里。</p> <p>“你，做，做什么……”</p> <p>“杨戬，你别动。”她将手搂上他的脖子，丰满圆润的胸脯紧紧贴上了他的胸膛，呼吸之间带着点点的颗粒，触感明显至极。</p> <p>杨戬不敢动了，他大概控制得住手脚腰背，但他实在控制不住那个地方……他是个血气方刚的男人，不是柳下惠！</p> <p>“你，你别……”郎君尽量控制自己的气息平稳，微向后仰想要避开身体间的摩擦。三公主坐在他的腿上，素手自他肩头滑落，暧昧地抚摸他浑身的肌肉。见他遮遮掩掩有所躲避，她委屈地一挑眉，竟然伸手扶住他的腰，跨坐在了他的身上！</p> <p>“三公主……你……”</p> <p>“别叫我三公主，”她的声音软软糯糯，尾音上挑，勾着他的魂魄直入云霄，“叫我寸心……嗯？杨戬……”她娇声叫他的名字，素手一个用力，将他推倒在榻上。</p> <p>“你……”他咬牙，颤抖着手去扶她的腰，想要将她抱下去。可佳人并不如他所愿，柔媚地捉住了他的大掌，向她含苞待放的白皙娇乳按去，……</p> <p>“嗯……！”杨戬的呼吸急促起来，腰下的亵裤顶撑得高高的，浑身紧绷。他想要赶紧收回手，急道：“寸，寸心，你怎么……”</p> <p>她柔若无骨的手又从腰际缠绕上来，放肆地按住他的薄唇，阻住他讲话。她皱眉娇柔欲泣地拨开他的手，拉开他的腰带，委屈得将他唬住，居然任由她动作。</p> <p>敖寸心抚摸着他的腹肌，手慢慢滑进了他的裤子里……抓住勃然坚硬的那物，坏心地揉动起来……</p> <p>“嗯……啊……”他受不住，撑着手肘半支起身子，抓住她的手：“你做什么？你不必……”</p> <p>“唔……”敖寸心没有给他废话的机会，狡黠地一扑过去，将他重新扑倒在床上，樱唇微张，含住了杨戬滚动的喉结。她一手抱着他宽阔的臂膀，一手拉开他的裤子，扭起腰肢，扶住青筋鼓胀的阳物坐了下去。</p> <p>她发出一声绵长娇柔的腻腻哼声，搂住他的脖子上下套弄起来。杨戬再也忍不住，搂住她的腰，翻身将人压在身下，疯狂地发泄起来……</p> <p>欲望喷薄而出，沾湿了床单。杨戬猛地睁开眼睛，气息凌乱浑身是汗，环顾四周，哪里又有敖寸心的身影？</p> <br> <p>是场春梦罢。</p> <p>他拉开被褥，湿了大片。</p> <p>红着脸揉了揉眉心，起身换上衣衫，收拾着将皱皱的床单和衣物拿去清洗。路过回廊的转角，接着就碰上早早起床的三公主，迎面向他走来。</p> <p>“早。”三公主笑得纯洁明媚。</p> <p>“……早。”杨戬不自然地别开头，快步逃开，好教她发现不了自己红彤彤的耳根。</p> <p>三公主奇怪地看着走远的杨戬，道是他还在为昨天的事情别扭。</p> <p>真是个别扭的闷葫芦，三公主气恼地想。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/052915.蒹葭苍苍.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%98%A5%E6%A2%A6" title="标签">#春梦</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="
