aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">劫灰<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h1 id="劫灰"><a href="#劫灰" class="header-anchor">#</a> 劫灰</h1> <h2 id="楔子"><a href="#楔子" class="header-anchor">#</a> 楔子</h2> <p>婴儿的脸颊粉嘟嘟的，嫩得仿佛能滴出水来，红润的小嘴微微撅着，好像在梦中抗议着人们扰他清梦。敖寸心一眨不眨的看着婴儿，恨不得把他放进眼睛里一样。见此情景，杨婵的眼泪再也忍不住，悄悄地滑落。<br>
“寸心，”杨戬的声音嘶哑，他深深吸了口气，压住了心里翻腾的情绪，“你只是睡一觉，我会在西厢陪着你的，等你醒了，孩子会跑来叫你娘，会和你撒娇，你们都会很好的，相信我。”<br>
“杨戬，孩子以后……你要多费心了。”敖寸心目光还是停留在孩子粉嫩的脸上，没有看向杨戬。<br>
“寸心，你放心，我会照顾好他，等你醒来，你会看到孩子好好的。”<br>
“多谢。”<br>
饱含感激的道谢，如同一把利刃，刺中杨戬的要害。刷的一下，杨戬脸上血色褪尽。<br>
敖寸心终于把目光从婴儿脸上移开，转向杨婵。两个女子眼神交汇的瞬间，敖寸心露出一丝微笑，杨婵再也控制不住自己，跪在了床前，右手越过婴儿，搭在寸心肩上。<br>
“三圣母，劳烦你，送我回西海，入龙冢……我是西海三公主，我要回去，永远在西海，陪着父王母后。”<br>
杨婵不顾杨戬淬了冰的目光，不停点头：“寸心姐，你放心，我晓得。”她眼泪也顾不上擦，连声道，“你放心，我会照顾好二哥和小侄子，我会经常去看望四公主，我会……会亲自送你回去。”<br>
杨戬面色阴沉，斜了杨婵一眼，再转头去看敖寸心。敖寸心似乎再也看不见眼前的兄妹，眼光穿透了西厢的房门，飞出了神殿，越过天海之间的屏障，又看到了那片海。<br>
“我是西海三公主……西海……”</p> <h2 id="第一章"><a href="#第一章" class="header-anchor">#</a> 第一章</h2> <p>“唰！”的一声，三尖两刃刀穿云而来，阻在杨婵面前。<br>
杨婵面色惨白，大声喝道：“宝莲灯！”<br>
荧光闪过，神灯得主人召唤，自虚空中浮现出来。三尖两刃刀退出少许距离，仍是拦在杨婵身前。<br>
“三妹，不许妄动！”杨戬的声音竟然同时从前后两个方向传来，杨婵手持宝莲灯，看着不远处的三尖两刃刀，咬咬牙，飞身前去意图硬闯。<br>
“三妹！”后方杨戬的声音又近了许多，话语中的焦虑听得越发清楚。<br>
杨婵牢牢紧握宝莲灯，与三尖两刃刀交错而过的瞬间，三尖两刃刀忽的动了，斜刺里突然穿出向杨婵面上打来，逼得杨婵不得不退了一步，不待她缓过神，后招又至，格挡挑刺一招一式清晰分明，令杨婵难进半步。<br>
杨婵额上挂着冷汗，不断后退，空有宝莲灯在手，却不敢催动法力对抗面前的无主神兵。利刃已送至面前，她本能的要退半步，恰在此时忽觉遍体生寒，一个瞬间，已经被杨戬的气机锁住，动弹不得。三尖两刃刀此时也猛的收势停住，距离杨婵粉面不过分毫。<br>
杨戬转到杨婵身前，神情冰冷，望着胞妹如同看向一个陌生人，上下打量杨婵几眼，目光在宝莲灯上停了一停，慢慢抬起右手，探向宝莲灯。<br>
“住手！二哥住手！”<br>
杨戬恍若未闻，径自取过宝莲灯，口中默念了一句什么，宝莲灯放出盈盈粉光，绯龙盘踞在光芒之中，垂首闭目，神色安详。<br>
“寸心……”喃喃一声呼唤，杨戬抬手向绯龙招了招手，光芒不曾减弱，绯龙也并未如他所想的那样幻做人身。杨戬握住手中神灯再试一次，粉光只是波动几下，绯龙的影子却是转为透明，竟然有了消散之兆！<br>
“二哥住手！”杨婵又是一声惨呼，看着绯龙的影子已经眼中含泪，“你快放手！”<br>
“你做了什么！放出寸心！”杨戬将宝莲灯递到杨婵面前，紧紧盯着她，一字一顿道，“放开她！！”<br>
杨婵见杨戬不再催动法力，才松了一口气：“二哥，是你该放手了。我答应过寸心姐，我要送她回西海。”<br>
“寸心是我的妻子！”<br>
“她要回西海！我送她回去！二哥，我此生最后悔的事情，一是当初为了彦昌和你反目，还有……上次的事。我对不起寸心姐！”杨婵的眼泪不断落下，神情却是出奇的坚定，“我不会把寸心姐交给你的，我才是宝莲灯的主人，只有我能取出灯中的龙身。”<br>
“好！好！好！”<br>
杨戬怒极反笑，连叫三声好，阴冷的眼神令杨婵不寒而栗，竟然猛地一颤！<br>

床榻上，一道身影猛然坐起，狐妹刚离开床榻两步，被吓得一哆嗦，连忙回去扶住这被噩梦惊醒的西海三公主。<br>
“狐妹……你怎么在这里？”<br>
“寸心姐姐，这里是杨府，你晕倒后是杨大哥把你带回来的。”<br>
小公主的脸上还有点迷茫之色，看看狐妹，又转头仔细打量一圈，才确定自己已经出了识海。<br>
狐妹怜爱的看着小公主，抬手给她擦去额头冷汗，又去端来一碗热粥，要喂她喝下。<br>
“寸心姐姐，你是昨天晌午晕倒的，到现在都没吃东西，肯定饿坏了吧。”方才杨婵来送粥时，还说起杨戬也很担心寸心，等寸心醒过来一定要去告诉他，狐妹本打算拿这个哄寸心开心，现在看她魂不守舍的样子，也不敢说了。<br>
小公主推开狐妹的手，歉意地对她摇摇头：“狐妹，天蓬元帅现在在哪里？”<br>
“天蓬元帅？他昨天走后，一直没有再来过。寸心姐姐，你找他有事？”<br>
“我只是想问问，西海现在如何了。”<br>
狐妹又把粥碗端到小公主面前：“寸心姐姐，你先吃了粥，我陪你一起去找天蓬元帅，打听一下西海的事，要是找不到，四海龙族也都在帮忙治水，他们说不定会告诉你的。”<br>
“狐妹，我有点晕，你扶我起来。”<br>
小公主拿定了主意，脸色也好了许多。狐妹不疑有他，高高兴兴的扶着小公主站起来，看着她整了整衣服向外走去。<br>
“寸心姐姐！”<br>
“狐妹，我等不了，我现在立刻去找四姐。”小公主看着狐妹秀美的面孔，心中一动，想起识海里敖寸心说的话，灌江口杨府的人她都提到了，为什么独独少了狐妹？</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/10.连载中/190601.劫灰.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/06/02, 21:53:45</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/330365/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">牢笼</div></a> <a href="/pages/e6da08/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">宿敌</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
