eNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">水性<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>八百里洞庭风光浩荡，虽是无风水面涟漪却不止，映射出天边一抹残阳如碎金一般流淌。当杨戬第二次蹙着眉心凑过来的时候敖寸心不免有些得意，要说起水下功夫，龙族可是当仁不让的三界第一，饶是二郎真君这般神通广大的在水底也得靠她渡去空气。</p> <p>两人唇瓣相贴，杨戬托住她后脑用力吸吮，鸦羽般的睫毛轻颤眉头逐渐舒展，龙三公主眉眼弯弯笑意渐深，搭在他身前的葱白手指勾住已经松散的束带，“你可还行么？”缓了气息的真君一把揽过她纤纤柳腰，抵在细嫩脖颈间低语，“夫人想要的，便是不行也得行。”龙女闻言咯咯笑起来抬手拧了他一把，“说得好像我强迫你一般。”</p> <p>灌口一带也有水源却每每碍着凡人不便化作真身畅游，如今这浩渺洞庭虽比不得西海广袤，也足够三公主嬉耍。到底在水里住惯了的，举手投足之间皆是风情，杨戬借着水底微弱霞光瞧见寸心泼墨般的长发四散开来仿佛能勾人心魄。</p> <p>龙女未曾习过舞，身段却比任何人都要柔软，正如此刻她云亭双腿在他腰间勾缠，青丝随着他的颠动漾出波澜，眼角泛红染上春意，眉心轻轻拧着主动贴上面前男子薄唇，杨戬嘴角勾起笑意顺势在她口中汲取甜蜜。紧紧揪住郎君衣襟，寸心不自觉后仰唇齿间溢出难耐呻吟，只觉得这人好大的劲儿差点把龙族公主给憋过气去。躲闪着去推他却听得真君委屈叹息一声，“寸心不管我了么？”</p> <p>哪儿能不管呢？只是下处不停上面不歇，龙女自个儿先顾此失彼，心里暗骂那只成精的狗更像只狐狸精时时都要缠着杨戬。眼瞧妻子走神，索性搂得更紧点撞得更凶些，叫她无心顾及其他。寸心嗔怪着捶他肩，“你干什么呀！”杨戬却皱着眉凑过去神色并不好受，下意识覆上菱唇给他渡去空气，毕竟是自己拉着他来水底胡闹……</p> <p>湖里鱼虾从未见过灵气逼人的龙族更别说法力深厚的仙人，一时间聚集了许多在周遭，寸心羞怯紧绷夹得杨戬闷哼一声，她急急抬手挥散鱼群身子一扭正好叫那人顶在敏感处，整条龙绷直了身体抖个不停，恍惚间额头显出一对粉红的龙角。</p> <p>成婚数年，杨戬从未见过妻子这般半龙半人的模样，那龙角小巧莹润勾得他失了魂，低头吻上去是绵绵软软的触感，怀中人往下一缩颤得更厉害只能任他为所欲为。</p> <p>好不容易回过神来龙女只觉得哪里不对，这人不是在水里喘不上气么，方才折腾的时候瞧他好得很呀！</p> <p>“杨戬，你是不是诓我？”</p> <p>“什么？”</p> <p>“这都一柱香的时辰没给你渡气了，你又能呼吸了？”</p> <p>真君低下头去笑得狡黠。</p> <p>果然……</p> <p>“你这浑人居然占我便宜！唔……”</p> <p>夫妻间的事，怎么能叫占便宜呢？</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/100102.水性.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width
