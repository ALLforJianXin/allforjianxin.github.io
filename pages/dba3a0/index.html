的变故吓着了，面颊愈发苍白，正不知如何动作，却听得长门处的水君磕磕绊绊地奔入，倒在地上战战兢兢地磕头：“天——天神，这是，这是小儿的新妇……您……您……”</p> <p>“新妇？”满身煞气的男人轻笑一声，他的嗓音也很沙哑，或许是常年身居高位，又擅审讯杀伐，令人听在耳中，当即两股战战，不寒而栗。水君双手抖得更厉害，空张着嘴不敢出声，这是他头一回见着这么大的官儿，便是西海龙王于他，已是望尘莫及之尊贵，更何况跟前这位爷煞名在外，口含天宪，这些年在官场如鱼得水，做事狠辣，谁若与之为敌，任你是御前红人，根基深厚，他也想杀便杀，玉帝王母都管不得他。冷汗直流间，却又听得那位活阎王说道：“不是新寡妇么？”</p> <p>“……是……是……”这话却如何接得？水君仓惶间，忽然抬头瞥见神君冷硬的战靴与女子洁白的丧服裙角交织在一处，明明真君已欺身近了祭台的火炉边，她已无处退后，若要站得稳，全身大半的重量必须倚靠在男人身上，才不至跌落香灰中。电光火石间，水君忽然忆起西海龙王召见他，意欲许婚时，神色间的仓促与急切。楚水河与西海王族之间实乃天壤之别，可两家订婚之后，龙王却施恩丰厚，在西海水系当中数次对楚水行方便之举，即便是他女儿已经为三嫁之妇，但仙界向来等级森严，而不以名节之类的虚腐儒教糟粕束缚仙人，此等礼遇，也已经十分厚重了。</p> <p>竟原来如此……年迈的水君恨恨地，咬碎一口老牙，可他敢怨西海龙王推他至风口浪尖，害死他小儿子一条性命，却连腹诽眼前这尊活阎王一句都战战兢兢，这厮恶名在外，嚣张跋扈已极，恐怕要诛灭楚水一族，也只在意念之间。</p> <p>灵前的炭火噼里啪啦地响，杨戬定定地盯着寸心苍白的脸许久，又看她额前戴着的一条孝布，忽然觉得十分刺眼。仿佛记忆当中，她并不是如此，八百年前，她似乎还是一个极天真烂漫的小姑娘，自金翅大鹏鸟口中捡回一条小命，分明吓得半死，不到一日却复又生龙活虎，缠着他采野果、筑竹屋，鲜活极了，只有活泼的粉色可以与她相配，又热烈，却不失娇痴。</p> <p>八百年的光阴一眨眼就过去，她忽然如此憔悴安静，令他心中泛起丝丝的苍凉——是啊，他也变了，变得阴险毒辣，城府深沉。他生了很严重很严重的病，已经病入膏肓、奄奄一息，在这阴晦泥泞的深渊当中，除了求助于记忆里那个鲜艳明媚的少女，别无他法。只是不知，她是否还情愿帮他，是否还愿意接受当初她许下的心愿，期许见他。</p> <p>“怎么不说话？”杨戬用余光瞥了一眼灵前的画像，衬着满屋的白幡、她满身的白衣，令他眸色愈发幽深。见寸心支支吾吾地不敢言语，他忽然生出快活的感觉，微笑着轻嗤：“多年不见，寸心变了。当年在西海边还依依地拉着我的袖子求我来瞧你，怎么今日见了，不见你欢喜？嗯？”</p> <p>三公主闻言骤然睁大了眼睛，此处是她夫君的灵堂，不过新丧，外男便长驱直入拽着她说出如此亲昵之语，成何体统！她慌忙瞥了大厅一眼，却见楚水一族皆低低伏在地板上，见不到众人表情。</p> <p>杨戬见状，终归恼了，面上的笑瞬间结满寒霜，一把将龙女的脸捏过来，不顾她惊惶挣扎，冷声道：“怎么？嫌我丢人了？当年你轻声细语地叫我哥哥，柔情似水地吻我时，不见你嫌丢人啊？”他如今喜怒无常，做事全凭心意，性格愈渐暴虐，时常无缘无故地生气，一但生起气来，便爱打杀人，嘴上更加不饶。寸心哪里见过这般冷厉的修罗，登时被他吓哭，呜咽哀求：“我没有……我没有……”</p> <p>杨戬一怔，她的泪水滴在他的手指上，仿佛将他烫伤一般，猛然松开捏住她脸的手，心中被人惧怕着的快意登时消失无踪，顿感一阵短暂的茫然。可不过半晌，他便捏起寸心的小手，不由分说地揽住她，沉沉道：“跟我走。”当即将她劫出了楚水河宫，满殿的人将脑袋抵在地板上，直到草头神的甲胄撞击之声远去，才冷汗泠泠地爬了起来。</p> <h2 id="第二回-旧情人相逢多烦忧-枉相思经年已如昨"><a href="#第二回-旧情人相逢多烦忧-枉相思经年已如昨" class="header-anchor">#</a> 第二回 旧情人相逢多烦忧，枉相思经年已如昨</h2> <p>麒麟殿中有一股若有若无的灰尘气，宫人日日擦拭清洗，但或许因为它的主人并不常来，即使是窗明几净，暖炉中燃着烈烈炭火，寸心独自坐在绒毯厚铺着的床上，依然觉得冷，熏香也甚是呛鼻。</p> <p>她坐得离门口老远，听着珠帘噼里啪啦相撞的声音，心里虽有些怕，但或许因着与那人有些故旧交情，也还能强自镇定，背脊直挺挺地，一副倔强的模样，只不过还是在渡殿屏风后男人暴躁地扔出一侧掩膊后，被巨大的撞击声吓了一跳。紧接着传来沉重的脚步声，杨戬卸下铠甲，身着一件隐隐印着龙纹的玄色常服大跨步走进来，看到她缩在床尾瑟瑟发抖的模样，不由得一顿。</p> <p>半晌，他冷硬地说了一句：“别害怕。”他随手拿起案上的一支翡翠镯子，走到寸心面前塞到她手里，“从前可不怕我，嫁了三回，胆子小了。”</p> <p>三公主闻言，暗想他从前是如何光风霁月，温文尔雅的少年郎，怎么八百年不见，变得这般骇人，与仗势欺人的权贵又有何分别？一时心中凄凉，暗自愤慨，于是扭开头，一言不发，却被迫不明所以地接下了那支手镯紧紧攥着，生怕一不小心摔碎，他又生气。</p> <p>真君轻轻皱了皱眉头，坐到她身边，见她不说话，也不愿看他一眼，心中有些烦躁。正不知说些什么，低头见她攥着那支玉镯，便问道：“你光拿着干什么？怎么不戴上？”</p> <p>寸心诧异地偷看他一眼，见他眼中切切实实是疑惑，这才仔细去看那支手镯，确实是个不可多得的凡品，成色飘绿，又冰又透，而且圈口与她的手大小恰好相匹。难不成他的意思，是将这支镯子送给她么？</p> <p>正自愣神间，杨戬却等得不耐烦了，一把攥起寸心的手腕，意欲强行戴上。可他从来不曾做过这等事，将她的手都捏红了，却怎么也戴不进去。寸心痛得低呼一声，用力一挣，却听到叮的一声脆响，那支玉镯摔在地上，断作三截。杨戬听得心头一阵火光，却被她使劲挣开双手，杏眼气得通红，忍无可忍道：“你到底要干什么！”</p> <p>杨戬正位司法以来，从不曾被这般顶撞，颇觉新奇，如此不怒反笑，站起身来居高临下地俯视她，缓缓拨动右手拇指上的碧玉扳指，冷笑道：“不愿意戴？倒也无妨。我扒了你的衣服，教你无物遮羞。我的东西，看你穿是不穿！”话音未落，便要欺身动手。寸心惊叫着反抗，却哪里掰得过他的蛮力？一时间腰臀被他小腿牢牢地压住，杨戬扯开她的子衿，露出一侧圆润白嫩的肩头，不顾龙女激烈的抵制，就欲将她撕剥干净。</p> <p>“你混蛋！杨戬……住手！你这禽兽！呜呜……我要杀了你，杀了你！住手！呜……”三公主左支右绌，逐渐抵挡不住，徒劳地哭喊着，心中既觉屈辱，又因往日一片真心错付伤情不已，泪水汪洋似的流，泣不成声，无力再挡，任由他撕开了里衣，露出半面酥胸，形容狼狈不堪。</p> <p>杨戬心中凌虐他人的快感发泄泰半，见她居然哭了，一时间心中竟狠狠地一揪，方才积压的半腔怒火也消去了许多，逐渐寻回些理智来，不由拨开她凌乱的发丝，正欲细瞧她，忽然颊边掌风一掠，啪的一声脆响，龙女愤然反击，结结实实地扇了他一耳光。</p> <p>他一时间怒火狂窜，勃然变色，猛地扼住她脆弱的颈脖，几乎就要掐死她，可视线忽然对上她朦胧的泪眼，心底那团极易燃烧的邪火忽然被扑灭，胸膛剧烈地起伏着，定定地看了她半晌，忽然翻身而起，逃也似地夺门而去。</p> <p>寸心虚弱地咳嗽几声，瑟缩在床尾遮挡着身体，捂住脸哭了好久好久。</p> <p>九重天上分不清日夜更迭，真君神殿从来都是黑乎乎地，抬起头只能看到一轮巨大的孤月罩挂在上方，月光冷冰冰地洒在神殿的黑曜石暗瓦上，教人看了瘆得慌，若无要事，没人想往真君神殿走。</p> <p>寸心在麒麟殿里哭了好一会儿，直到嗓子哑了，眼睛又红又涩，才渐渐的收住了悲伤，偷偷打量着这座殿宇。只见四处装潢奢华，摆件简洁精致，照明清一色皆用夜明珠。从规制来看，似乎是主人的正寝，抬起头透过纱帐朦胧见吊顶，竟是极其尊贵的九脊重檐庑殿顶。传言玉帝有意以二郎真君为帝储，这下龙女已经可以笃定，这里必然是杨戬本人的寝殿，否则不可能用如此规格的殿顶。</p> <p>初时她惧怕杨戬去而复返，再行凶事，但躲了半晌听不得动静，转念又想如今自己身陷囹圄，纵使缩着又能躲去哪里？试探着爬了起来，打开寝殿里的衣箱，却见里头干干净净，也不知杨戬过的是甚么日子。左翻又找，忽然瞥见他遗落在屏风后的那堆铠甲，小心翼翼地翻找后 终于扯出可以勉强蔽体的外麾裹住了自己。</p> <p>她又在殿中磋磨了许久，唯恐殿外有人看守。可沿着床洞窥看一圈，又竖起耳朵听动静，终于确定殿外无人，又等了半晌不见杨戬回转，只觉腹中饥渴，浑身发凉，鼓起勇气推开半扇门，探出身去四处一看，空荡荡的小院之中回廊百转，果真没一个人。</p> <p>三公主深知在这九重天上的真君神殿当中，想要逃出去实在难如登天，于她而言更是痴心妄想，可还是忍不住暗暗祈祷，她自父王第一回许婚以来便厄运连连，连着嫁给三个自己不喜欢的男人，又连着死了三个丈夫，心中那一点少女的天真早已被磨没了，本以为就要如此磋磨飘荡一辈子，却在灵堂之上被人抢了过来，受此侮辱，实在已经足够倒霉了。倘若苍天有眼，教她这一回逃出生天，那么她……</p> <p>想到这里，寸心忽然愣住，逃出去，然后呢？她还能去哪里？倘若回西海龙宫，不说父王是否会庇护她，单是她族人数众，若受司法天神的迁怒，今后如何为生？倘若不回西海，虽然天地之大，可她法力微弱，被司法府通缉，何处又能容身？</p> <p>如此，竟然是无处可去，逃出这座宫殿，等着她的恐怕就是实打实的监牢了。</p> <p>三公主乍然心灰意冷，双手扯着黑麾紧紧裹住自己，真君神殿的地板怎么这样冷，这样冰，让她觉得自己被抛弃得远远儿的。曾经她以为自己拥有很多，她有疼爱她的父王、母后，有三位兄长，也有暗暗藏在心头的英俊儿郎，她从前每一天都在暗暗期盼着心上人意气风发地登门拜访，笑吟吟地与父亲求娶她。或许他会受到父亲和哥哥们的刁难，可她定会站出来替他解围，毕竟自己那么喜欢他——那么喜欢他……</p> <p>寸心正缩在回廊尽头的角落里断断续续地哭着，忽然听到一声绵长的叹息，她吓了一跳，本能地往后一缩，警惕盯紧了小院门口，只见是杨戬闪身跨入，走到龙女跟前，手中托着一件女子襦裙，一言不发。</p> <p>寸心躲累了，心中已起了自暴自弃之意，恶狠狠地瞪着他，呛道：“你到底想干嘛！”</p> <p>谁知杨戬这一回不复方才嚣张了，踟蹰地握了握拳，碾着衣裾支支吾吾地说：“对不起……我不是，不是故意的……”</p> <p>寸心觉得他这人很是奇怪，一会儿犯浑，一会儿又来装可怜，逞无辜，好像方才对她施暴的人不是他。她根本不想理这个混蛋，偏过头去，哼了一声。</p> <p>杨戬干站了半日，实在不知应说什么，蹙着眉将衣服放在她身旁，然后走到另一边贴着她坐下。</p> <p>寸心觉得他简直莫名其妙，倔强地挪开两寸，不肯与他相依。杨戬大感受伤，又实在理亏，心绪恍惚了半晌，咬牙挪到龙女对面，作揖赔罪，“我实在对你不住，求你原谅我，我再也不那样了。”说着，又连连作了好几个揖，“龙女妹妹，我错了，我错了……”</p> <p>寸心一愣，见他如此，不由想到曾经与他共处山谷时，倘若有时她有意为难胡闹，杨戬总会如此作揖赔罪，哄她满意开怀方止。这一遭重逢以来，他与曾经判若两人，倘若未曾提及二人以往，寸心险些要以为他妖魔附体，这才变得如此凶暴。可不过是转眼间，他怎么……</p> <p>这不由得教寸心生出些许依赖之意，试探地止住他作揖的手，她擦了擦满脸的泪水，问道：“你到底是谁……到底是不是我的杨大哥？”</p> <p>杨戬见状，只觉得心如刀割，垂下头来拿起她的手，缓缓放在自己脸上，轻声道：“对不起，你打我罢，我绝不躲。”</p> <p>三公主恍恍惚惚地，虽不知他前番作为究竟为何，可连日奔波，担惊受怕，如今只是觉得自己的那一个杨戬终于回到身边了，一直以来绷着的精神终归溃散，在他熟悉的温言软语之中打开了防备，感到二人依旧在那个充满了美好的小小山谷之中相依相伴，最后轻轻靠在杨戬肩头，被他抱回房间，哄着暖呼呼地睡了过去。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/10.连载中/220910.俏龙女数做新寡妇，俊天神大闹水灵堂.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div cla
