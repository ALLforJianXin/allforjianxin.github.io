Sd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">何以致契阔<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>杨戬只觉一股大力直击到面门，浑身的法力因为刻意卸去防备，一夕之间被冲散，震荡得四野晃动不安。他喉头一阵发紧，倒被自己迸射出去的法力狠狠地击打出去更远的距离。</p> <p>他听见耳边的风声尖锐，似乎要划破耳膜，刺得他脑海轰鸣，之后周身猛然一凉，寒气侵入他的身体，冰冷刺骨。</p> <p>再之后，他便失去意识了。</p> <p>他大抵是觉得自己应该没那么容易死掉，即使死掉了，也没有几个人会心疼。他倒是死得潇潇洒洒，没什么好惦念的了。即使大业未成，总归他死了，眼不见心不烦。</p> <p>三公主拧干湿热的毛巾，替杨戬擦干额头上细密的汗珠。他高烧不退，已经三日有余。有时候敖寸心甚至怕他就此烧傻了，顾虑了一会儿又摇摇头觉得不大可能。</p> <p>杨戬自积雷山落败，直直砸进三公主的领海中，落在她的后花园里。法力全失，宛如凡人。昔日他战神之躯，邪魔伤痛不敢附身，如今一夕失势，小小风寒都足以把他击倒。</p> <p>龙女已经不想回忆，她见到他的时候究竟有多么心惊胆战。</p> <p>他昏迷不醒，烧得额头滚烫，手脚却冰凉。拉着他的手抱在怀里捂着，怎么也捂不热。她记得自己好像哭了，说了些往日去去来来的痴话罢，好歹把他折腾到床上，拿热巾擦拭了身体，揣进厚厚的被子里捂着，额头上放着冰块降温。</p> <p>然后她就枯坐在杨戬的榻边，痴痴看了他好一会儿，直到蜡炬成灰，明珠暗淡，她恍惚地合着眼泪，徐徐睡去。只睡了一二时辰，再次醒来，脑海中如同大厦轰然崩塌的茫然才好了一些。</p> <p>杨戬的呼吸已经平稳了，依旧烧得迷迷糊糊。寸心坐在他身旁，轻轻拨开他因在噩梦中挣扎而散乱的头发，惊觉他两鬓早已被汗水打湿。</p> <p>“寸……寸心……”他忽然有了些动静，龙女赶紧攥紧他的手，凑近去细听他的呢喃。平日他宽厚清冽的嗓音，此刻混杂浓浓的鼻音，有些软软糯糯的，愈发显得可怜。敖寸心只觉得，自己心都要碎了。</p> <p>如何要叫他去做那劳什子的官呢！他好好儿地待在灌江口，又能有什么错处！何苦如今天地相隔，何苦如今疾病缠身？三公主素来于他爱意深重，只瞧着杨戬难受，便心疼欲死，追踪溯源，胡思乱想之际，便怪起自己昔日的龌龊来。她要强得很，倘若真君好时，她决计不肯从命，但二郎至此，亲人反目，兄弟离心，他蝺蝺独行在那虎豹豺狼的泥沼之中，可又如何是好呢？</p> <p>如今他着了道，连傍身的法力都一并失却了，豪迈慷慨可顶天立地的英雄就要折在这个小小碧落中，他该多伤心，该多难受？寸心越想越心碎，又趴伏在杨戬的身上，呜呜地哭起来。</p> <p>“二郎，呜二郎你醒醒罢……算，算寸心求你了，好不好，好不好？”</p> <p>杨戬的眉头狠狠地蹙起，好似在经历什么天大的磨难一般，将牙关咬得死紧，无法掰开，枉论喂药。他此刻满面的狰狞，浑身的肌肉骤然紧绷起来，于噩梦之中挣扎不休，汗流浃背。他难耐地呻吟，忍到极致，终于再也无法承受一般，把周身的力道全卸了去，瘫软在小殿下柔软的被窝里，眼角有泪滴滑落。</p> <p>他好像习惯性地想要在此时寻找依靠，即使昏迷间，依然微微侧头，寻着寸心的气味靠过来，然后被她伸手，轻轻地搂在怀里，不住抚摸他松软的头发，聊以慰藉。</p> <p>“没事了罢，二郎，没事了……”寸心尽量将他环住，让他靠在自己柔软的身躯上，把所有的温暖都献给他。</p> <p>寸心知道，他又梦到了那个惨烈如阿鼻地狱般的场景。烈日当空，生灵涂炭，他的眼睛里流进的不知是血还是汗，火辣辣地痛。白衣染血的少年，眼睁睁地看着自己的母亲化为灰烬，被别人恶毒地害死。</p> <p>旁人或偶有听闻，叹他一声多灾多难。可只有三公主才真真切切地明白，他究竟有多么痛苦。午夜梦回，杨戬失声嘶吼，冷汗沾湿了枕席，她只好将他搂在怀中，又揉又哄，直到他将压抑不住的嘶吼和粗喘按捺下，如同一只受伤的小兽，安静地依偎在她的怀里，紧紧地抱着她，泪流满面。</p> <p>此刻他一如千年前，叫她如何不心疼呢？</p> <p>神殿凄神寒骨的一个又一个日夜，他倘若有幸入梦，是不是也有这样的时刻，冷汗流了一次又一次，茫然环顾四周，可那时，又有谁能够陪伴在他身旁来安慰他？</p> <p>怀中的杨戬在细碎地颤抖，他哽咽间，好像恍惚地抓住龙女的衣袖，轻轻唤了一声：“寸心……”</p> <p>三公主赶紧拉起他的手，连声答应：“我在这儿，二郎别怕，别怕。”</p> <p>“……”</p> <p>“原是噩梦，我没接旨嘛？”</p> <p>寸心如遭雷击，顿时怔在原地，心中五味杂陈。原来教他这样痛苦，睡梦中也无法忘怀的，居然……</p> <p>那一个压抑到无法释怀的日子，她只道自己悲痛得撕心裂肺，却从来没有想过，当时的杨戬，是否郎心似铁，又是否黯然销魂？</p> <p>杨戬只是醒过来一小会儿，马上又重新昏睡过去。这已经是很不错的恢复了，只要醒过来一次，他就不会有大碍了。</p> <p>寸心呆坐在他床边，轻轻拨开他的头发，看着他逐渐平静的面容，不由得再次剖开自己尘封的记忆，将纷纷扰扰的五味红尘，再次回味咀嚼。不知他背身向她沉默良久的时候，是不是还在等待她的一句劝阻？倘若她哪怕表露出一分不愿，他是不是仍会接下那道圣旨，同她分崩离析，身陷囹圄？</p> <p>不会的，不会的。她的二郎原是最最温驯，最最谦和的。谁将他逼得这般模样？敖寸心啊敖寸心，你日日以为修身养性，修的是甚，养的又是那门子的性？难道直至此时，你还不明白他的心意嘛？当日在西海岸边，他为什么不敢看你的眼睛？！</p> <p>二郎，二郎……情不知所起，一往而深。</p> <p>——</p> <p>杨戬醒来的那天，阳光明媚，穿透重重碧波照耀到西海海底，将他的眼睛闪了一闪，最终迫使他离开了好不容易安稳下来的梦境。</p> <p>他舒舒服服地靠在三公主柔软的怀抱里，身体因为躺了好几天，使不上一点儿力气。真君稍稍侧头，刻意地去嗅寸心身上久违的馨甜香气，将浅眠的三公主蹭醒了。</p> <p>“杨戬……”她连忙想要起身，“你终于醒了呀……”</p> <p>“别动罢，”郎君的鼻塞依旧没有好全，拉着她的手，嗓音有些莫名的可爱，“给我靠靠，好嘛？”</p> <p>三公主安静下来，没有再坚持。</p> <p>他们相顾无言，却并没有什么泪千行。阳光暖融融地，纵使杨戬并不喜欢晴天，可他依然觉得现下的天气真的很好很好。</p> <p>“杨戬，你为什么老是受伤呢？”寸心忽然有些生气，“你不是三界战神嘛？为什么还不飞升成圣，刀枪不入？还要我来替你担心？”</p> <p>“……”杨戬好像没话讲了，他将脸埋进寸心的怀里，好像那样就能躲避所有的是是非非，只做自己想要做的事情，</p> <p>“大抵是因为……”他声音闷闷的，震得寸心很痒，“我六根不净，对你念念不忘罢。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/083019.何以致契阔.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" wi
