日头高挂，已近午时，她又一次起晚了。还说要让人羡慕杨戬有个好媳妇呢，天天睡到这个时候，应该没有好媳妇是这样的吧？寸心想着，心里也不太确定，好媳妇都要做什么来着？<br>
反正睡半个上午肯定不对。至于为什么不对……还没想出来。只是见到别人都早起，自己却这么晚，真是不好意思。<br>
她正拧着被子生闷气，杨戬推门进来，一见她便笑：“醒了？”<br>

寸心把脸藏在被子里，小声嘀咕：“他，他睡相不好，老惹得我睡不着呢。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/121000.日复一日.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/90dd25/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">就要贴贴</div></a> <a href="/pages/a92b32/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">春光乍泄</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
