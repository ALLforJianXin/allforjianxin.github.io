什么，想来是在要爹爹呢。”寸心靠着他，将脑袋轻轻地贴在他的肩窝处，“还没有批好嘛？你都不分昼夜地上值许多天了。”</p> <p>这些日子的朝务异常繁忙，偏王母近日不在天庭，大大小小需决策之事，除玉帝杨戬以外皆无人有权批复，甥舅二人每日早朝后各分一堆朝务各自处置，且又有例行的法务之事、军务之事、督检之事，以及不时的急务，忙得杨戬焦头烂额，分身乏术，甥舅二人难得地同时想念起王母来。</p> <p>而此时寸心带着女儿前来探望杨戬，于神殿住下，虽共住一室，但他忙得脚不沾地，早早地去上早朝，自此当值，晚间批复折章，不时与朝臣会议，归来时披星戴月，囫囵睡上一二时辰而已，居然与龙女见不了几次面。</p> <p>龙女正是哺乳期，平日已习惯了与女儿早早入睡，每一次清晨醒来，不见杨戬的身影，又暗自懊恼许久。今日特意先哄睡了女儿，又到小厨房去亲手烹制几碟小菜，往他办公的地方送去。</p> <p>杨戬深深地叹了口气，揉了揉额角，“还多着呢！估计要到后半夜。你熬不得夜，且先回去睡吧。给我留一盏灯，待批好了，我回来躺一躺，再去早朝。”</p> <p>寸心见他面色憔悴，眼底似有乌青，在烛火下看得不分明，愈凑近他，扑到他怀中细看。杨戬轻轻笑着抱住她，只觉得怀抱温热馨香，心中忽然也感到一些怠倦，用鼻尖蹭了蹭她的额头，“怎么啦？”</p> <p>“二爷，好辛苦啊，”龙女挨近他的嘴角啾了一下，“真的不回去休息一下嘛？你这几天都瘦了。”</p> <p>杨戬只觉得嘴角有甜丝丝的味道沁开，一时疲累也散去不少，一只手还拿着折章，怎么也看不进去了。</p> <p>屋外的海棠花愈是夜深，香得愈浓烈，真君却忽然不再感到刺鼻，反是暗香浮动，沁人心脾。葳蕤的烛火之下细看妻子，只觉得她肌肤生得格外白皙，许是方做了母亲，更觉得整个人透着温润的玉泽，凑近了他，还有一股奶香味。</p> <p>若不是顾念着妻女生活之舒适便利，杨戬早就想将她接到身边来住，如今阔别日久，又长疏旖旎，一时亲近起来，竟也没了章法，在中门大开的大殿当中交流起倾泻如注的潺潺爱意。</p> <p>桌案被撞了一下，随手置在桌边的文书啪嗒一下摔在地上，也无瑕去捡。好在深夜中无人来此当值，二人年轻时也从来不守什么俗规陋律，纵使如今，真君执掌了律宪，也依旧如此。</p> <p>只是浅尝辄止，亲了亲她嫩嫩的小嘴，杨戬便已感到身上一阵一阵止不住的发热。他将龙女往上抱了抱，稍高过他的视线，只觉得胸口处被软绵绵的东西抵住，不由自主地往下看。她的领口微微敞开着，胸衣包裹着两团粉嫩雪白的圆球，两条丝带系在颈项之后。因着哺育孩儿，愈生得硕大饱满，颤巍巍地抵在他胸前，随着她清浅的呼吸微微抖动。</p> <p>杨戬受不了奶香气的诱惑，抿了抿唇，双手扒开她的衣领。那对滚圆的奶子争先恐后地弹出，龙女娇呼一声，搂紧了他的脑袋。</p> <p>白嫩的乳肉尽在眼前，真君伸出一只手，握住一侧抚摸着，并不敢用力揉捏，他咽下一口津液，抬起头问道：“寸心，孩子可吃饱了……”</p> <p>寸心面上一红，轻轻地打了一下他的侧脸，“臭流氓……”见他仍不依不饶地要问个究竟，只好捏着他的耳垂小声道：“她喝饱了……每次只喝得半碗，一日要挤出两碗来倒掉呢。”</p> <p>“什么！”杨戬心疼得一塌糊涂，“怎么能倒掉，实在暴殄天物！”</p> <p>“说什么混账话呢！”寸心又捶他一下，耳根子都教他逗得红透了。杨戬喷地一笑，一口含住她一侧的乳头，小心而温柔地轻轻舔吮，尽力抚慰她因哺乳而被咬痛的嫩肉。</p> <p>好在龙女的乳水根本不须疏通，顺畅得恼人，也不需他用上甚么吃奶的力气，只是以手轻轻地一揉，当即争先恐后地汹涌而出，几乎是喷到他的口中。杨戬不曾防备，囫囵地吞咽下，尚且有余量从嘴角流下，蜿蜒地流入他二人相贴的衣物之中。</p> <p>寸心紧紧地攥着他的衣服，低下头去，只看到他闭着眼，睫毛好长好长，高挺的鼻梁抵在自己的乳肉中，正专心致志地吮吸她的奶液，一举一动都好不温柔。她这几日带着孩子，因是新做了母亲，有这样那样许许多多的事情不能做，又有那样这样数不清的事情需要担待，虽然心中疼爱极了女儿，恨不能将一切的关爱都捧出来给她，但有时夜深人静，一个人哄睡了孩子时，也会感到异常地不适与失落。她虽不清楚究竟不开心在哪里，可今日与丈夫亲昵暧昧时，心底里掩藏的委屈忽然像洪水一般涌出，又被他温柔的抚慰一滴滴地吮吸走，胸中渐渐涨满了无尽的爱念，一时间只觉得爱他爱得不住，想要与他水乳交融，耳鬓厮磨，一丝缝隙也不要有。</p> <p>这样想着，寸心不由得软了身子，坐在他的腿上，愈抱着他的项子贴紧了他。今日杨戬只穿着一袭黑袍办公，柔软的布料本宽大蓬松，教她这样一贴，他腹间那根大家伙可藏不住了，龙女感到它狰狞地涨立着，抵在她的小腹上。</p> <p>“嗯……”埋在乳波中的男人一动，呼吸陡然急促起来，他
