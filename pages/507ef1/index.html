h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">浓情<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>这一回的气怄得最久，夫妻俩轰轰烈烈地吵了一架之后，各自抓狂了好几天，双双冷静下来之后发觉，梅山的文帖少了，惹事的狗子也安静了，就连天上各星官的仙鹤都不爱往灌口飞，一时间万籁俱寂，月明风清，整个三界都安静了，除了杨家两口子还在怄气。</p> <p>杨戬极疑惑为川蜀大地近日里来竟能如此平静，往日里敖寸心被他哄得好好儿地，夫妻二人蜜里调油之时，这琐事净爱往他庙里凑。且问哪一个情到浓时愿意出府去风餐露宿的？哪一个？！如此倒也罢了，偏吵架时这山精野怪就不闹事，就好像他杨戬上辈子欠了他们，竟专挑他没空时出来闲逛。偶或吓着几个凡人，压倒几片庄稼，川主大人认命地领着自家草头神打杀妖精，倒也能去一去胸中肝火。</p> <p>既然无妖精可打杀，这半年来积存的阳货也无处可泻，真君每天都极暴躁，每天清晨故意将阳气转升的时辰睡过去，竟也无济于事，只好顶着烈日骄阳光了膀子在演武场上挥洒汗水，释放精力，打完几套拳，故意在敖寸心的院子旁边绕上一圈，可惜这狠心的小娘子竟然对他视若无睹，杨戬气得肝疼，心中更加郁闷，既然兄弟们不来邀约，自己喝酒解渴也罢。</p> <p>这日他练好了拳，将外袍往肩上一搭，随意地在家中逛了两圈，只行在抄手回廊上，心里默默地想着，这一气也气得太久了，怎生寸心就如此狠心，自己已经故意晃到她身边许多次，竟都被她轻飘飘地略过了。实在不然，还是他这做丈夫的先服个软，哄她两句吧。</p> <p>不知不觉居然走到她房门口，他心中一顿，又踟蹰起来，是否要先行低头，挨一顿埋怨和好便罢了，可要今日去道歉吗？要怎么道歉呢？如果不小心说错了话，她更生气了，那怎么办？可还是需列一个章程才好。</p> <p>他这样想着，可还是久久徘徊在正院附近不愿离去，今日的太阳毒辣，晒得他周身汗津津地发热，练拳时喝了半坛烈酒，酒意上涌，翻起周身已经半年不得调和的阳气愈沸。他有些想念妻子冰冰凉凉的替他擦汗的小手，有些渴望她舒适宜人的温玉软床。</p> <p>杨戬在门口悄悄望了一眼，不见寸心身影，心下微有好奇，轻手轻脚地走进了房间，见室内窗明几净，珠光宝气，温凉宜人，心中没由来地微微一酸，耳中闻见微微的水声，向内室走去，迎面而来一阵湿润水气。</p> <p>他心下暗想：是了，许是在沐浴。有此一念，愈发不自觉地向湢室走去，腹中的烈酒愈加蒸腾，烘得心里热乎乎的，有些持不住静念。转过朱阁，撩起绣帘，打眼只见那扇巨大的山水屏风之后，一个女子玲珑的身体若隐若现。</p> <p>杨戬已经许久不曾见她身子，不由得有些意动，痴痴地向她走了几步，将手轻轻搭在屏风旁的衣杆上，鼻息间蓦然窜入一缕缕甜腻的沁香，正是她身上的香味。</p> <p>真君一时血气翻涌，情火如炽，转头看去，只见衣杆上搭着一件粉嫩肚兜，香气最盛，不由得双手取下，捧在鼻尖深深嗅了一口，心中阵阵慨叹，下腹三寸的那一根阳物骄然傲立，充血发硬，自裤中鼓出。</p> <p>耳闻阵阵水声，他不禁心跳如鼓，愈发情切地走近了两步，自屏风间的缝隙向内看去，只见浴桶内一个粉面桃腮的美人，肤白如玉，娇艳欲滴，水中飘着片片蔷薇，恰巧遮住了她胸前滚圆的起伏，衬得她愈发莹润无瑕。</p> <p>杨戬喉结一动，咽下一口津液，阳具愈发涨硬，裤中逼仄难忍，于是顺手解开了腰带，掏出那怒涨的龙根，搓了搓手上那柔软芳香的小衣，脑海之中满是靡靡的色欲，反手将那肚兜裹在了阳根上，胸膛起伏间，看着屏风后沐浴的美人疏解起来。</p> <p>正是情念当头，水气氤氲间，室中愈显暧昧，杨戬汗湿的额发搭在高挺的鼻梁上，微微晃荡挠得他极痒，浴桶中的丽人撩起晶莹的水珠洒在那一片白皙腻滑的凝脂美背上，使人无端端地想起昔日这嫩滑的肌肤被他压在身下，亲得狼狈不堪的模样，郎君呼吸愈发粗重，看得眼热，动作愈发快，无意撞到了手边的屏风柱上。</p> <p>龙女听见声响，心中一凌，忙将身子沉入水下，厉声喝道：“谁！”</p> <p>半晌只听见屏风之后一个低沉的男声轻喏道：“是我，别急。”</p> <p>寸心一愣，旋即认出这是杨戬的声音，心中不禁又酸又气，酸的是这冤家与她闹了近乎半年的别扭，明明是他说出那狠心薄情之言，偏就不肯低头来认个错，为着他的狗兄弟，硬生生与她同在一个府邸，却分房离心，见了面也不置一词，唯恐多说几句又是一阵争吵纠缠；气的是他直愣愣地闯入，什么话也不说，还要骇她一骇，她简直恨死了这人木头般的一张嘴，不是气死人就是急死人，更不济还要往你心上捅一刀，教你痛彻心扉，却又时时把握着刀柄摁上一摁，唯恐这把刀子猛地抽走了，自己就要血涌而死。</p> <p>她心中乍然泛起许多委屈，咬着牙偏过头去，呛声道：“好端端的，来吓人做什么！”不待他回答，又没好气地拍了一下水面，溅起几滴晶莹的水花，弄出“哗哗”的声音以示自己很愤怒，嘴上却是默默地转了个弯子，语气极不耐烦地说道：“把我的衣服递给我，无端被你扰了兴致！”</p> <p>何为软话硬说，便如此节，寸心虽然埋怨他，可心底里实则因为惦念他，这才肯怄这一口气，既要表现出自己的愤怒，又唯恐他听了生气，转身就走，那便得不偿失了。好不容易今日杨戬迈入了房间，她心中其实是喜悦的，又不肯在两个人的江湖之中先露出马脚。所谓先动先露绽，唯恐自己稍动声色，叫他不经意间堪破了自己的真心，拿捏在手中轻贱。</p> <p>她心中千回百转，杨戬此时却浑然不觉，男人在精虫上脑的时候是很难被所谓的小儿女情绪所左右的，就算龙女此时更骄纵些，他也很难再生她的气——毕竟他平日里骄纵她也惯了，何况此时还别有所图。</p> <p>他默默地拿起她最外层的一层薄纱织衣，绕过屏风，走近浴桶。寸心正背对着他，一手护着胸前春光，一手来探取衣服，却一手摸到那件丝滑透薄的外衫，转头一看，顿时气急：“你拿这一件，我怎么穿？”这薄纱只在外袍之外做装饰用，透明纤薄，怎么穿得？寸心气得转身欲骂，一见杨戬形容，一时怔住，一节莹白如玉的手指着他，羞恼道：“你，你，你这臭不要脸的混蛋！”</p> <p>杨戬走近几步，沉着声音道：“在你面前，我有什么脸可要？”话音未落，一把将她“哗啦”一声抱了起来，用那透明的薄纱一裹，抵在浴桶边缘狂风骤雨地吻她。</p> <p>这一件薄纱是配在她那套金丝竹纹广袖绛红璎珞裙外的，通透非常，丝线略带紫红色，稍可显现华光，此时被裹在她一丝不挂的娇躯上，真是衬得她美艳无极，玉体嫣红，娇躯嫩得泛光。她重心不稳，反射性地抱住杨戬的臂膀，他身上浓烈的男子气息扑面而来，一时唇齿相交，缠绵悱恻，不禁动了恻隐之心，胸中的怒火忽然降了下去，翻涌上来绵绵的酸意和爱意，竟乖乖地扒着他，毫不反抗，由着他一双粗粝的大手顷刻间摸遍她光裸的酮体，一张小嘴也给他任吻任亲，于他怀中瑟瑟地微微抖动。</p> <p>杨戬宛如恶狗护食一般按着她亲了半日，及分开时，见她双目泛着无辜的微波，两颊通红，粉面含春，一时间情切，剖白道：“好寸心，千错万错都是我的错，咱们俩和好罢？你别晾着我，你不知道我有多难受……”说完，那难受的祸源顶着她腿心使劲儿磨了两下，硬邦邦胀鼓鼓地，控诉着自己的不满。</p> <p>寸心被他顶得一软，小穴一痒，淅淅沥沥地淌出水来，听见他的话，心中却气愤，使劲地轮着拳头照他汗津津的铁膀子狠狠地拍打，边打边骂道：“谁晾着谁？谁晾着谁！你说那种话的时候有没有想过我？你现在又恶人先告状！杨戬，你有良心没有？你有没有良心！”</p> <p>杨戬生受着她的怒火，肩膀放软了不去硌她的手，一声不吭，只紧紧抱着她，待她打累了，又凑近她的脸亲了又亲，哄道：“我知错了，再也不敢说了。我当时犯浑，心里真的不是那么想的，真的……寸心，好寸心，你这一生体谅我的次数多了，就再多这一次，成不成？好不好？我再也不惹你生气了……”他将脸埋在她肩窝处，声音含糊不清，却格外的缱绻难言，哄得她心中如雪寒逢春，桃花绽开一般，不免软下来，又照着他铁一般的膀子狠狠打了几下，方觉气消，尚欲出言，却不觉身下那肉棒已得寸进尺，怼着她已经逐渐湿滑的穴口一顶，竟入进了半截。</p> <p>寸心一整惊呼，脱口而出已成娇吟，她与杨戬做了不知多少回，身子早就被他玩坏了，一沾着他，一被他亲吻抚摸，下面就湿了，一双美乳也颤颤巍巍地泛红，直教人看得血脉贲张。</p> <p>杨戬喘着粗气，将挂在那话儿上的肚兜在手上，抱着她放肆起来。幸而浴桶又大又重，寸心被他抵在边上狠撞，也只是有少许的水泼洒出来。久不经情事，二人都敏感非常，色欲如烧，她酸软的花心饥渴难耐，吮着那进进出出的巨大棒子蠕动绞吸，含得他双眼发红，死死地按着她挺动腰臀，啪啪啪一阵狂干，只干得龙女娇喊阵阵，整个杨府正院都能听到。幸得这偌大的宅子只夫妻二人居住，纵然放肆一些，也并无不妥。</p> <p>杨戬许久不曾与她欢爱，憋得极其难受，好不容易能插入这销魂的甬道之中，逆根兴奋得连连跳动，怜惜也顾不上，只一气向她穴里操着，意欲发泄。寸心被他插得尖叫连连，敏感非常的花蕊被干得高潮连连，居然是被他一插，花心便吐出一大口蜜液，将二人相连交合的下体打得又湿又滑，娇嫩香腻的白皙身体被这古铜肤色、肌肉虬结的男子按着乱摸一气，只觉得方洗干净的身子被他脏兮兮的汗水沾染了，鼻息间满是男子辛烈之气，杨戬亲她时，舌尖隐约伴着几分酒味。</p> <p>他是高洁如松竹般的君子，寸心对他爱意绵绵，并不觉得难闻，反而惊异于二人之间的亲密，更觉情动，一双玉臂主动环住他的项子，夹着他的颈腰纵情呻吟，间或有余力时含着那粗棒子拧腰一吸，只觉身上的男人呼吸愈发粗重，下一记撞击愈发勇猛，又被干得泪花涟涟，不住地夹着他求饶。</p> <p>“二……二爷……好像又粗了……嗯……啊啊……啊……好大……轻一点……啊……”她被干得含混不清，脱口而出些甚也不分明，只觉得天旋地转，郎君将她一揽，站起来放直她的双腿，粗棒子仍抵在花户进进出出，杨戬低头去吻她，带着她往床上走。</p> <p>这姿势极不好走，二人跌跌撞撞，棒子往穴里干的同时，死死抵着她裸露在外那颗被插得发情而肥美翘丽着的花珠摩擦。这一处极其敏感，寸心被他磨得双腿发软，叫声愈发甜腻，终于不及走到半途，花液喷涌而出，小穴痉挛不止，夹着巨大的肉棒死死收缩。</p> <p>看她如此动情娇态，杨戬心中一阵涌动，暗暗想着：“她也是想着我的。”如此愈加情切，压她在榻一阵狂插，直做得她香汗淋漓，不住地抱着他的脖子喊娇，只嗔他道：“好哥哥……好哥哥……你轻一点……啊！嗯……嗯……你怎么还不好嘛……呜呜……”</p> <p>杨戬爽得青筋暴起，一面按着她大力地顶弄，直往她宫口里头钻，一面咬牙切齿地哄着她：“就好了，就好了，好夫人，我多日不曾碰你了，积攒得多了些……”他嘴上这样甜言蜜语，该干的却毫不含糊，次次顶至最深处，试图顶开她宫口的小缝，染指她最销魂的宫腔。寸心叫他顶得几乎失神，生理性的泪水流了满脸，两条美腿蹬直了，肥美的双乳夸张地上下摇摆着，只觉销魂荡魄，快感如潮，哽咽着去蹭他的下巴，望君怜惜。</p> <p>杨戬一面安抚地亲她，一面伸手去捉住两只美乳，又捏又摸，狠狠一插，竟顶入了那狭长的道口，登时被她紧致的穴肉死死地绞住，忍不住骂了一句粗话，反复来回干了数百下，直干得她抽搐连连，高潮不断，淫液四溅，深深地抵入那极其狭窄的宫腔喷射出来。</p> <p>他存货极多，射了半晌，竟不停歇，只射得她娇躯乱颤，叫声又媚又绵。她小腹本就绵软单薄，而杨戬这行货粗得可怖，只插入一半，便能看到她的小腹明显的鼓起，此时那阳具堵在媚穴中灌进大量浓精，竟射得她小肚子鼓鼓地隆起，形似怀胎一般，只是腹中尽是他那淫物，涨得人又酸又麻，极乐又难受，磨得她小猫似的嘤嘤去推他，口中含混不清地娇嗔责难。</p> <p>他射罢也不抽出，只觉得脑海中一片空白，通体畅快，怔怔地看着她圆鼓鼓的小腹出神，就着插在里面的姿势，伸手去摸了摸她的小肚子。寸心正是敏感难言，哪里容得他摸？哼声拍掉他的手，大张着双腿一动也不敢动，媚叫道：“你……你出去……好涨……嗯……”</p> <p>奈何他那阳根在阵阵收缩的媚穴之中不及疲软便很快抖擞起来，捅着她叫嚣，捅得她直哭。寸心忍不住挠了他几下，哽咽道：“哪有你这样的，要，要坏了，不许再……嗯……”</p> <p>他稍稍一动便带着她的小腹微颤，满腹的精液被他堵在穴中，穴口缓缓地渗出滴滴白浊，糊在她红肿的媚肉上，看得杨戬眼热急了。他缓缓地说道：“好……我出来……”</p> <p>寸心察觉到那根插在下体的棒子缓缓地往外拔，腹中满满的浓精随着他的离开争先恐后地往外溢，穴肉自发留恋地吮吸着那棒身，一时间竟有些不舍。她忍不住轻哼出声，大开着双腿方便他拔出去，忽然感到身下一紧，一阵快感袭来，惹她长吟一声，颤颤巍巍地着拉他的小臂问道：“嗯……怎么了……”</p> <p>杨戬也大汗淋漓，缓缓摆动下身道：“你忍一忍，放松，拔不出来……”</p> <p>原是她高潮收缩律动的小穴太紧，而他重新勃起的阳具蘑菇头太大，要轻轻地抽出来有些不易，只好抵在入口处轻轻磨动几下。这细微的抽拉虽不激烈，却顶得她穴口酸痒，小肚之中的精液挤动，一时间快感更盛，惹得龙女呻吟不止。</p> <p>杨戬心下一沉，掐着她的小腰，往后一抽，只听她尖叫一声，下体的淫水混着浓浓精水喷涌而出，流了满床的白浆，默默地静待半晌，仍还有浆水缓缓流出。</p> <p>杨戬待她神智渐明，复又将她抱起，令她骑在腰上，挺着欲根缓缓顶进去，入到最深处，这才舒坦地松了一口气，任由缓过劲儿来的小龙女娇滴滴趴在胸口，抢过他手中那狼狈的粉嫩肚兜，一把覆在他的脸上。寸心用那肚兜捂着他气急败坏地说道：“叫你再作怪，闷死你！”</p> <p>杨戬好脾气地陪着她闹了半晌，最后扶着她的腰将人顶得娇喊连连，不住告饶，软倒在他怀里，动根手指头的力气都没了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/061500.浓情.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/23, 15:07:57</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/db989f/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">安兮康兮，佑我爱人</div></a> <a href="/pages/4c5571/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">失身</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
