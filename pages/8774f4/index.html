宣言：给爷he ! ! !</p> <hr> <p>盛芳邻原道自己已经死了，死得渣子都没剩下一丁点儿，哪里想到有朝一日还有睁开眼睛的机会。</p> <p>虚浮在九龙绕柱的大殿内，他现下只是一缕幽幽的魂魄。地下一道血色的符咒，还在源源不断地压缩他的魂力，痛苦兜头袭来，任谁都无法忍受这样的折磨。</p> <p>“啊——”他禁不住大叫一声。迷雾重重的大阵侧方，一个老头恍然听到他这一声吼叫，连忙起身：“诸位且止。”</p> <p>四方诸神同时收回了法力，盛芳邻感到压制在魂魄上的力道松懈，咬紧的牙关松开，呼出了一口气。</p> <p>暗处的老者踏八卦方位走出，暴露在石柱之中夜明珠的照耀下。盛芳邻惊呼：“师父？”</p> <p>正位的尊者，赫然是东华帝君。左方玉帝，右方原始天尊，后方如来佛祖。沉闷的密室盘桓着密密麻麻的上古神咒，给人一种窥探得天机的神秘感。盛芳邻想，自己一个已死之人，如何劳动这几位上古大神来救。</p> <p>“徒儿，”东华帝君道，“你劫数已满，使命已成。如今我等为你聚魂，恢复本貌，重回仙躯。”</p> <p>他听闻此言，微微一愣，脱口而出：“我早该做古，何故再回去徒添烦恼，万万不可。”</p> <p>本来是三个人的纠葛，如今他死，也算是了却诸事，还要回去做什么呢？她虽重情重义，但想必，此刻仍会过得更好。恼也恼了，恨也恨了，总归他权不如人，不能保护好自己的妻儿。随即想到自己的两个孩儿，心中又是一软。倘若杨戬还要穷追不舍，会不会善待他们？一时间内心五味杂陈，痛苦不已。</p> <p>东华帝君道：“时至今日，我与你讲明道理。你是二郎真君的一缕魂魄，当日他伤重，恐之后历劫会有闪失，故而我四人抽他一魄，投入凡间，化身成你，代为历劫。我收你做弟子，妄图保全他身，却不想此劫还是完完整整地落到了他的身上。”</p> <p>……</p> <p>杨戬使纵地金光来至山门前。石柱之后两个洒扫弟子见他，拱手行礼：“师兄。”</p> <p>他点头，步行上了石阶。</p> <p>芳草芝兰，紫云浮升，玉虚宫殿门打开，杨戬跨步入殿。元始天尊座下小童已迎他入内，启暗门入密室。</p> <p>他甚是熟稔，照八卦方位徐徐前进，到了血阵，见内有夜明珠光，于是拾级而上。</p> <p>里面的四个人令他有些微微诧异。</p> <p>“师祖、佛祖、陛下、帝君。”杨戬面无波澜，一一行礼。</p> <p>东华帝君手托魂魄，将已经炼化的盛芳邻交给了他。</p> <p>——</p> <p>敖寸心近来处理山中事物，照顾两个孩子，着实有些力不从心。每月休沐时，帝君照例会派人宣下一道法旨，可今日她处理完手头的锁事就坐在正厅等待传旨的仙君，太阳都下到了半山，仙君还没有来。</p> <p>“怎么搞的。”她皱了皱眉，提灯走出了院门。草地上已经稀稀落落有了几只发光的萤火虫，门口的椿树底下，有一个纤长的身影。</p> <p>敖寸心怔愣在原地。</p> <p>那个人转过头来，看见她时，微微一笑：“寸心。”真像当初那个，落座她心底的白衣少年。</p> <p>“你来干什么？”她攥紧了手，心碎的感觉已经成了习惯，在看到旧物旧人时，条件反射地涌上来。</p> <p>杨戬叹了口气。</p> <p>他抬起手，将手里的东西摆到她面前：</p> <p>“这是盛芳邻的魂魄。”</p> <p>——</p> <p>她几乎要粉碎这些年的心理防线，奔上去抢过那盛了魂魄的法器，遏制不住地颤抖起来。</p> <p>他还没有魂飞魄散……他还活着，盛芳邻还活着！禁不住地热泪盈眶，可不愿在杨戬面前透露出一丝一毫，倒让杨戬无奈至极。</p> <p>“这件事……有些……”</p> <p>杨戬难得的哑口无言。这件事解释起来好尴尬，他神经病一样分成两个人，互相还不知道，然后为了同一个女人折腾了好一番，到了生离死别精神崩溃的程度，怎么说怎么尴尬。</p> <p>毕竟当时的疯狂和痛彻心扉，是实实在在的啊……这么说，还是他们两个，互相折磨了一次又一次。</p> <p>杨戬承认，得知这个消息的时候，他欣喜若狂。</p> <p>原本以为，自己失去了所有的一切，一度想要神魂俱灭，拉着那个走远的人一起坠落，他将自己折腾得几乎精神分裂，曾经一度想要掐死那个刻在骨子里的女人，然后把她的尸首锁在自己的身边，这样她就永远都逃不了，永远不会离开自己。这个念头冒出来的时候，他吓了一跳，看着自己的双手，忽然觉得自己变得肮脏可怕，变态至极。</p> <p>可是原来，她逃往的方向仍是自己吗？</p> <p>杨戬觉得，上苍真是给自己开了一个大大的玩笑。</p> <p>——</p> <p>油灯燃尽的时候，敖寸心坐在杨戬对面，很久都没有出声。</p> <p>杨戬也自觉地安静，等待她自己缓过神来。</p> <p>……</p> <p>“真好笑。”她低着头幽幽说了句，“真是好笑，这样卑劣的谎话你也说得出口。”她低着头，杨戬看不见她的表情。</p> <p>“寸心，我没有……”没想到她会这样认为，他愣了一下开口想要解释。</p> <p>“我知道你没有！”敖寸心尖叫一声，猛地起身掀翻了桌子，“杨戬……你凭什么……你怎么能这么耍我呢……”她克制不住源源不断的眼泪，声音带了哽咽，肝肠寸断。她知道这不是杨戬的错，也知道他不会拿这样的事情来欺骗她，可她真的没了理智，就是想要怪他。仿佛这样，那些血淋淋的伤痛会得到救赎。</p> <p>杨戬心头大痛，伸手要去揽她入怀，却被狠狠地推开。她哭得痛彻心扉，那些曾经带给自己的折磨，带给杨戬无尽的伤痛，全都是一个笑话啊。她一次又一次地践踏他小心翼翼捧上来的真心，折磨他也折磨自己，一心一意想要摆脱他，只是为了另一个男人。可她心里何尝不痛？杨戬扭曲着面孔问她，心到底是什么做的，她难道就不心痛吗？两千年的深情，怎么可能随随便便就抛得下。她将自己夹在两段感情之间，遭受良心和情感的谴责，遍体鳞伤。</p> <p>现在杨戬跟她说，他们是一个人。</p> <p>是一个人啊……</p> <p>她怔愣着流泪。</p> <p>杨戬握紧拳头，伸手把她拉过来，狠狠按在了怀里。他颤抖着嘴唇开口：“对不起。”</p> <p>对不起，因为我的执念，又一次伤你这么深；对不起，为了我的劫数，将你连累至此。</p> <p>敖寸心被他紧紧箍在怀里，使劲摇了摇头，泪水沾湿了他胸前的衣衫，好像他们两个人此时宣泄而出的悲痛。</p> <p>良久，她在他怀里轻轻说了一句：
“……对不起。”</p> <p>——</p> <p>两个姓盛的小娃娃一时之间接受不了自己改姓杨，也接受不了自己“换掉”的爹爹。</p> <p>已经融合了魂魄有盛芳邻记忆的杨戬：“……”</p> <p>……算了吧，两个不行就再生几个，总能生得出姓杨而且听话的小娃娃。</p> <p>杨戬这么想。</p> <hr> <p>ps：不得不说这个梗真的好难写，但是为了he!(??????)?<br>
