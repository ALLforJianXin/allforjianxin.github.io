天霸道龙女哄小作精了吗？（上）<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>西海敖三最近很苦恼，因为她感觉她二爷最近情绪变化有点跌宕起伏。</p> <p>是，西海敖三承认，这事追根究底，其实应该算是自己的错。作为一个，只要杨戬不气她，她就很懂得反思自己的敖三公主，她这几日已经愁眉苦脸反思好几场了。</p> <p>事情的起因是敖三公主扔了杨二郎的花，把杨二郎气跑了。杨二郎在外转悠了几圈，最终在灌江口集市卖花的小摊身边落了脚。却见杨戬一蹲便是好几日，因他想破脑袋也想不明白，凭什么别家丈夫送花，妻子会开心，偏偏他家的，居然把他的花给扔了。是以他便想，自己多看看，兴许便能悟出门道来。</p> <p>偏他看了几日，却是越看越不明白，盖因其他夫妻都是欢天喜地来，高高兴兴地去，不像他同龙女，成天除了打架，还是打架。晚上打架便也罢了，白天还要再打别的架。</p> <p>摸不准女人家心思的杨二郎无奈叹了口气。说起打架，其实他还有点怀念。几天没同龙女彻夜打架了，这滋味他有点受不了。</p> <p>是故他便怏怏归家了。</p> <br> <p>因着想不明白，故而杨戬回到杨府时，面色便有些不好看。龙女从厅堂一路提着裙摆，穿过正房，穿过庭院，迎到门口，才刚想要扑进杨戬怀里，忽而便见杨戬仍旧板着脸。龙女未免便有些愣住。</p> <p>刚好杨戬离家这几日，听心也来寻过寸心，甚至细细同她分辨过一回。龙女在那短短的踟蹰功夫里，想起听心训诫的话，未免便有些心虚。所以站定，小心翼翼伸出手，拽着杨戬的衣角摇了摇，嗓音倒甜，却又小声试探问：“二爷，你回来啦？”</p> <p>杨戬见到龙女迎上来，原是想将她拥进怀里的。偏龙女停下了脚步，杨戬便以为，龙女还在生他的气，震慑得他都不敢如何变动面上的表情。</p> <p>继而龙女又那般撒娇，撒成这副小女儿娇态。成亲近千年，杨戬看惯的都是龙女中气十足霸气外露的撒娇，陡然见龙女重新变成这般娇滴滴的模样，杨戬又是一阵未缓过神，连板着的脸都忘了柔和下来。</p> <p>龙女见杨戬的神色迟迟未动，显然又误解，以为杨戬犹在生气。想了想听心姐姐语重心长的教诲，龙女一狠心一跺脚，决定光天化日，将那些耳鬓厮磨的看家本领堂而皇之给使出来。</p> <br> <p>是故寸心嘟嘟囔囔的，一面用眼神勾着他，一面整个人钻进杨戬的怀里，紧紧搂着他的脖子。一面用手摩挲颈后，一面磨着他的鼻尖。</p> <p>杨戬虽说脑里仍一片混沌，未曾反应过来，但身体早早便形成了记忆。眼见龙女环上来，下意识便张开怀抱，任凭龙女钻进自己怀里，被自己的外衣包裹着，放肆撒娇挑逗。</p> <p>作为一个血气方刚的正常男人，杨戬的喉结跳动得嚣张。</p> <p>龙女感受到了杨戬喉结的滚动，笑得愈发娇媚，心里忐忑，面上却仍旧娇滴滴：“二爷，都是我错了嘛，你就原谅我一次，今儿不吃晚饭了，好不好？”</p> <p>是了，如今金乌正欲打道回府，华灯初上，也该到用膳安寝的时候了。</p> <p>龙女朝他怀里蹭了蹭。隔着薄薄的鲛纱，那两团汹涌的触感很明确。龙女又在他面前，呵气如兰。</p> <p>这下好了，作为一个血气方刚的正常男人，杨二郎的老二跳动得更嚣张。</p> <p>于是杨戬的面容终于柔和，他长长叹了口气，决定先将这些迷惑尽皆抛之脑后，认命再说。</p> <p>毕竟，架是吵不完的。然，倘若不认下妻子这些在闺阁之中最如鱼得水时才会使出的把戏，恐怕自己以后再也享受不到这滋味了。</p> <p>人生得意须尽欢。今夜两人打了一场很是融洽的架。</p> <br> <p>然而次日起身，敖三公主又开始满杨府折腾起花花草草时，愣头青杨二郎独自一人坐在书房里，怎么想也想不明白。</p> <p>他还是想不明白，为什么自己送的花会被龙女丢。他更想不明白，为什么自己明明都还没开始哄龙女，龙女反而来哄自己了？</p> <p>可巧，今日玉鼎来蹭饭，见杨戬这般愁眉苦脸，本着身为人师该有的职责，玉鼎语重心长地关切了一下杨戬。</p> <p>问完来龙去脉，玉鼎蒲扇一摇，两手一揣兜，满不在乎地笑：“这倒容易。以前都是你来哄她，那现在她来哄你了，你觉得不习惯，那你就多被哄几次，不就习惯了吗，我的好徒儿。”</p> <p>笑得不怀好意。</p> <p>杨戬疑惑，一本正经地追问：“那，徒儿又该如何让寸心多哄哄我？”</p> <p>玉鼎恨铁不成钢地戳了戳杨戬的脑袋，瞪他道：“笨啊！依葫芦画瓢你不会吗？”</p> <p>杨戬：？</p> <p>玉鼎：“你再去摘些丁香花送给我徒儿媳妇，再惹她生一次气，不就好喽？”</p> <p>杨戬：？这不太好吧。</p> <p>可未等杨戬提出异议，玉鼎就忙不迭地将杨戬往外推，一面推，一面语重心长地劝诫：“徒儿，你记住啊，有道是实践出真知，但是这个真知呢，你得多实践几次，才能找出其中的规律。所以呢，”玉鼎凑近，高深莫测地拍了拍杨戬的肩，挤眉弄眼道：“记得多摘几次花啊。”</p> <br> <p>杨戬被玉鼎扫地赶出杨府，赶去灌江口郊外的丁香林去了。杨戬一面摘，一面沉思。他觉得师父的话，约莫、兴许、极有可能，是不正确的。他又一想，左右他都在市集的花铺子那头看过那么多案例了，自己对着花铺的小夫妻依葫芦画瓢，兴许还是有可能的。</p> <p>念头是美好的，执行起来却是极其残酷的。</p> <p>杨戬兴兴头头地捧着一束花归来时，龙女就如前几日那般，正端坐在大堂等着他。</p> <p>望着妻子娇媚的笑颜，愣头青杨二郎忽然怔住，讷讷看着她，先前备好的说辞，竟都忘了大半。</p> <p>可妻子正捧着花，满眼期待地等着他开口。杨戬只得硬着头皮上阵，说了什么全靠临场发挥：“我父亲从不摘花，但早些年，我却见过母亲在集市上买花送我父亲。只是那时候我不懂事，见那花生得好看，我便将母亲地花偷了来，想要偷偷送给我当时定亲的隔壁姑娘家，我以为母亲不知道，但其实……”</p> <p>原本还算正常的语调，在龙女越来越凶的目光中，慢慢低了下去。</p> <p>龙女气势十足地将花给抛至院外。</p> <p>伴着一声没好气的娇叱：“二爷，你若是不会说话，我看你还是别说了！”</p> <br> <p>杨戬无奈地摇头耸肩，慢慢退出杨府。正要迈出大门的时候，杨戬瞧见，玉鼎正躲在角落里，朝着自己挤眉弄眼地笑。</p> <p>得，看来最了解徒弟的，还是得师父。虽说杨戬使出的方法和玉鼎教的不一样，但是最后所达成的结果却一样啊。</p> <p>这叫什么？这叫殊途同归。</p> <p>但显然，杨戬并不太想接受这份殊途同归。</p> <p>偏他又不好对师父说什么，只得摇头负手，径自出门，再度往灌江口那市集寻去。</p> <p>也罢也罢，多查探几天，兴许就对如何以花哄人这件事，得心应手了罢？</p> <br> <p>但是在杨戬转头那一瞬间，玉鼎却悄悄给他使出一个诸事放心、为师会替你看着的眼神。</p> <p>诚然，玉鼎在这方面指使不了杨戬，但是他能哄骗龙女啊。</p> <p>玉鼎意味深长地笑。</p> <br> <p>而此时，正在气冲冲瞪着地上丁香花的龙女并不知道，就是这些个丁香花，即将在不远的将来，在龙女所不知道的情况下，助力龙女亲手养出来一个爱作死的亲亲老公。</p> <p>是所谓，罪魁祸首是也。</p> <hr> <p><a href="https://jianxinonly.lofter.com/" target="_blank" rel="noopener noreferrer">后文见<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/31.31.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0
