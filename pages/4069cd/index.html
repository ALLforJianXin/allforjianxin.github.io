敖寸心端起碗，拿着调羹有一搭没一搭的搅了几下，又放回去了。<br>
“端下去吧。”<br>
“等等，”侍女收好碗，正要转身来开，又被敖寸心叫住，“把司法天神请进来吧。”<br>
她看着侍女掩饰不住的惊讶神色，不耐烦地敲敲桌子：“总这样来西海也不是什么好事，这次把话说清楚，以后也能省心些。”<br>

二人相对而坐，皆是无言。</p> <h2 id="第二章"><a href="#第二章" class="header-anchor">#</a> 第二章</h2> <p>从寸心的住处，到龙宫的大门，再到西海的海岸，杨戬闭着眼睛都不会走错的这条路，又一次让他难以迈开步伐。<br>

杨婵心中冰凉，不敢去看二哥现在的神情。<br>
杨戬在门外站了半晌，慢慢走过去，拿起龙珠，紧紧握在掌心。<br>
杨婵随着杨戬走进客房，看着杨戬欲言又止：“二哥……”这一瞬间，她想说的很多，三公主心意已决，还是不要再强求了……她和刘彦昌情深一世，到底鸳鸯失伴，想不到二哥也是姻缘难成，他们兄妹终是命苦……<br>
“杨戬只认输，不认命……”杨戬轻轻摩挲着掌中的龙珠，眼神温柔，语气平静，“寸心，既然你要两不相欠，可以，现在你我两清。明天，我们从两不相欠开始。”<br>
西海最璀璨的宝珠，照亮了杨戬生命中的荒芜，那光芒充盈心房，融他血，入他骨。西海边上，他拥抱过心意相通的妻子，哪还能忍受余生无人相伴之苦？<br>
你想要后会无期，特来还珠。<br>
我却说，来日方长，青天——<br>
可补！！</p> <hr> <p>作者有话要说:</p> <p>寸心失忆是龙后做的手脚，听心知情，因为她和寸心关系最近，又最了解寸心的婚姻，龙后干脆拉她做同党。听心知道真相又心疼妹妹，和龙后立场一致，她说的话容易对寸心产生影响。西海上下说杨戬的好话，引起了寸心的逆反心理，听心在和妹妹谈心时，稍一拆台，姐妹茶话会自然摆满了杨戬的杯具。<br>
写完了觉得寸心很可怜，她没了龙珠后，自己的想法被人无视，每个人都以“为她好”的名义要求她活下去，要求她为此忍受龙王去求杨戬。她坚持到死，没想到死后，被人违背她的意愿复活，记忆还被篡改，想不起来自己曾经用生命坚持的意愿，周围的人依然用“为她好”的名义，插手她的感情婚姻。幸好她这一次还是坚持了自己的想法，没有屈服。<br>
杨戬还觉得龙后没有为难他，没想到人家多少年前就给他挖坑了，还拉来个神队友。事实证明，杨戬遇到做娘娘的女人，都要掉次坑。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/90.短篇-2018/081422.还珠.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/11/05, 18:50:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/6c0bdc/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">执妄</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
