AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">兄妹<!----></h1> <!----> <div class="theme-vdoing-content content__default"><h3 id="上"><a href="#上" class="header-anchor">#</a> （上）</h3> <p>我这地界，从前可真称得上穷山恶水，向来没个人烟。山上秃棱棱尽是石头，长不得林木，只有稀稀拉拉几根草；平地上也积不起土，不过是山石渐平，树木依旧扎不得深根；水里清凌凌一眼见底，鱼虾更不曾有。<br>
偶有鸟雀路过，野兽误闯，转几个圈便离去，留不下来。<br>
我多年来习惯了，况且人少事儿也少，与那些繁华地界整日忙碌的同僚相比，我只管自己清闲度日，偶尔与山神水神串门聊天，倒也觉得自在。<br>
千多年来，此地唯一的热闹就是来了条龙。可惜那龙住了不多久，不上一年，便随取经人离开，偌大地界又恢复了昔日清冷模样。<br>
忽一日，我正闲睡，听见有人唤我，声带仙力，不可不应，便匆忙起身闪至地面。<br>
到了地上，见两男子，一个白袍一个蓝衣，且不管是何身份，先行礼见过上仙再做应对。顷刻间山神也应召而来，我俩对视一眼，山神拱手道：“敢问上仙尊号？”<br>
“杨戬，从灌江口来。”<br>
原来是二郎神！我与山神忙又补了个礼。<br>
上次听到二郎神的消息，还是几百年前他帮天廷捉石猴，但从前谁不知晓他治水事迹？他打上天廷的事也是很多年里大家津津乐道的话题。眼下终于见到本尊，却是面带忧色，不似我想象中那般威风赫赫。<br>
旁边蓝衣的神仙看不出来路，我正欲相询，却见二郎神将他按在石上坐下，转身问道：“水神在何处，为何不现身？”我心知水神这老小子滑头，他不来定有不来的理由，我且先替他遮掩遮掩：“此地无事，水神常往上下游别处水域助力帮忙，许是有急——”<br>
“听闻西海三太子已随取经人西行，不知当日是何状况？”<br>
竟是省了寒暄，可见心切。我突然想起，二郎神他夫人，可不就是西海三公主？当年热热闹闹洒满三界的请帖，我至今留存，反正藏在地下，也无人追究。我又瞄那蓝衣公子一眼，不知他是何来路，与三太子有甚相干。<br>
这打眼一看，蓝衣公子面色白得没有一丝生气，身形也瘦削得很，坐在大石上一动不动，直愣愣盯着潭水，抿紧了嘴唇，看也不看我们一眼。<br>
我瞧他脸生，与三太子并无相似，便放下他是西海二太子的揣测。不管他是何人，这取经一事乃三界神仙妖魔鬼神所共知，并无隐秘机要可守。<br>
山神与我对视一眼，慢慢与二郎神讲起那日经过。</p> <p>其实也没几句可说。无非是白龙吞了唐僧的马，大圣斗他不得，差人去请观音菩萨，最终白龙化马，唐僧一行渡河而去。<br>
这二位听我们讲着，并不插话。二郎神听我说到阻了大圣入水寻找，劝他去请观音来，还特地道句谢，又对蓝衣公子说：“至少他平安无事。可听着土地山神说了？一路有揭谛、功曹暗中护送，孙悟空亦神通广大……”<br>
蓝衣公子并不理他，终于转头看向我俩，张口半晌，才抖着嗓问：“他……他为何要吃唐僧的马？”这一出声可把我吓了一跳，嘶哑粗砺，活似干渴多日不曾沾水。我看他唇色泛白，两片嘴皮子直哆嗦，可别真是三太子什么亲友罢？<br>
这念头一起，我顿生犹豫，话也不知该怎么说。<br>
山神却似乎不曾考虑许多，快言道：“饿呗！这潭水里无有活物，他春夏还能吃些误入此地的獐鹿，秋日也可捕些南迁路过的鸟鹊，眼下入了冬，再无鸟兽可捉，可不是饿得慌么！”<br>
我赶紧把脚从地底下伸过去，暗中往上踹他；又小心去瞄眼前二位。<br>
这一抬头，就见那蓝衣公子面色更惨，他将一只手按在腰前，我见那手上关节凸起，骨节分明，握紧了往下压。山神也忒口快，这样事体哪里能说给三太子亲近的人听？<br>
紧接着二郎神挡住了我的视线。他弓腰凑近蓝衣公子说话：“都过去了，都过去了……我们回去可好？我派人缀在后面递消息回来再一一说与你听，我们这就家去罢？”<br>
说完回头，一道凌厉眼风扫过来，刀似的，着实骇人。<br>
我心里生出个想法，这蓝衣公子莫非是……<br>
“二位且放宽心，这水里虽无生灵，但水清潭深，三太子一向住得舒坦，又无杂事烦心；且菩萨说他将来可成金身正果——”<br>
蓝衣公子从二郎神身后露出半张惨白的脸，细声细气地问：“他是如何化——化成——那个样子？唐僧待他，可、可还——”<br>
他似乎说不下去。我见他脸上的血色都似冲到一双眼里，愈发肯定我心中猜测，又有二郎神在上微微摇头，便堆起笑来拱手道：“三太子听到取经人来，便从云头落下，他们一道过河走啦。”<br>
二郎神收了眼刀，垂头温言道：“如此，我们先回去可好？”<br>
我心中大大松一口气。<br>
却听山神冷笑一声，“他一个土地在地面上如何见得真切？小老儿在山头看得清楚，菩萨给三太子抹去龙角，摘了他项下明珠，三太子口中衔起横骨，再无言语，这才落地驼那唐僧——”<br>
他说得又快又急，我从地下连番踢踹也阻他不住，直到他突地被什么扼住喉咙，啊啊半晌说不出话才算住了口。<br>
我心中直叫糟糕，二郎神一身煞气摄人压得我头也不敢抬，掀起眼皮偷偷去瞧，蓝衣公子忽地侧身，拳头死死按在胃上，干呕不止。<br>
“寸心！”<br>
二郎神忙去抚他脊背顺气，蓝衣公子全不理他，全身筛糠似的痉挛不止，呕了半晌也只吐些酸水。<br>
这名字喊出来我就知道完蛋。三太子在时也没少念叨他的双胎妹子，我们自然知晓三公主闺名。<br>
忽然一声轻响，山神被夯进石中陷入大半身子，我看他手抓脖颈满面通红一个字也说不出，抬眼再看，二郎神与三公主已消失不见，不知去向。</p> <h3 id="下"><a href="#下" class="header-anchor">#</a> （下）</h3> <p>二郎神好歹留了山神一条命。<br>
老滑头水神这会儿才出来。我俩费了半晌功夫，把山神从石中拔出，我们仨都累得瘫在地上，缓了半天才有力气说话。<br>
我先一个踹一脚再说。<br>
“你是个傻的！二郎神好歹是三太子妹夫，你捡好听的说说不就完了？没见二郎神先都在瞪你？”<br>
“我哪想到那人会是三公主？”山神还在喘气，“若单是二郎神，我更要说得再细些才好！”<br>
水神问他为何，山神还振振有词：“他做人妹夫的，就得知晓妻兄如何境遇，若是个疼老婆的，回去该说说该瞒瞒，有意外才好应对不是？”我和水神一时说不出话，这听起来似乎也有道理？山神犹在叨叨，“我原先当真是为三公主着想来着。”<br>
是不是山神做久了，脑子里塞满了山上石头？ “你就不见那蓝衣公子反应如何？还说，还一直说！踢你都踢不停。”<br>
“若明说那是三公主，我自然不敢，”山神还不大服气，“谁能想到三公主会变作一个男子！”<br>
我与水神你看我我看你，简直不知如何接话。山神脑子一根筋也不是一年两年，说他傻吧他还有点想法；说他精吧又时常闹些让人哭笑不得的事故。<br>
唉，但愿二郎神这次出了气就罢，莫要后头再与这傻子计较。千多年的老邻居，我也不想他有个三长两短。<br>
老邻居还有个滑头水神。我又问他：“你这老小子，怎的先不出来？”<br>
水神哎哎叫道：“我一望便知那是龙，怎敢出来？就算不是三公主，我一个小河涧的秃头水神，在真龙面前哪里做得了假！”<br>
行，一个二个，都有道理。唉，只可怜三公主，听得胞兄如此遭遇，不知心中如何惨痛，还能安生度日吗？</p> <p>又过了十多年，倒是无事，想来这事儿也翻篇儿过去，再没人计较。<br>
谁知忽然传来消息，有旨意说那二郎神，竟在天上当着众仙的面，说后悔从前与三公主结亲，还抛了三公主去，上界做了天神！<br>
我们仨聚在一起破口大骂，都说那二郎神不是个好东西。山神尤其懊悔不已，还发誓说以后遇到二郎神定要给他好看。我与水神只当他胡吣，一个小小山神，焉能与天神作对？真是发梦。<br>
话又说回来，谁不想？我们好歹与三太子也算有点交情，三太子胞妹让人欺了，谁不想给她出口气？况且就算没有交情，听得一个堂堂天神，抛弃发妻谋求高位，任谁也要呸他一口才算痛快。<br>
——话虽如此，司法天神微服来时，我还是大气也不敢出。<br>
前些日子，不知怎的，上头一纸调令，把山神调离此地，听说去了个尽是土地土山污泥坑的地界，说不上好也算不得坏，论起出产倒比这蛇盘山强些。<br>
接着二郎神来过两次，削了半层山头，处处盖土，又与我商议将地上也如此炮制。见我犹豫，二郎神直言道：“天规在我手中，土地不必忧心，这些许改动并不妨事。”<br>
如此不上几年，草木渐生，鸟兽也来觅食；待到林木葱茏，在此定居繁衍的禽鸟野兽也渐次增多，更有凡间猎户出入，慢慢热闹起来。新来的山神是个憨憨厚厚的老好人，我们往往喊上水神一起吃喝闲聊，日子过得有滋有味。<br>
后来二郎神率人在楠郡降下天罚，内中详情别人不知，我们做土地的可都是一清二楚。我对他也有些改观，虽则对发妻无情无义，倒是个顾惜生灵的。只是他改造我这处地界又是何用意？</p> <p>又过些年，忽一日，我又在地下闲睡，上头有人吆喝唤我，听声音倒耳熟，上去一见，果然是那玉龙太子！如今也该唤他声菩萨了。山神水神都匆忙来见，我们齐齐恭贺他修得金身正果。<br>
三太子还带着一位女郎，我正琢磨，水神已笑呵呵地行上礼来：“这必是三公主了。”<br>
我忙细细看去，那三公主真容果然与三太子有些相似，只见她面色红润，身形也不似当年那般单薄，我心道西海养人呐，三公主脸上不见一点神伤凄色，反倒如闺中少女般扭着兄长的胳膊娇声软语，见水神招呼，松开手转身对水神施礼：“当日未能一见，如今我还要多谢水神对我三哥的照顾。”<br>
水神连称不敢，山神在旁憨笑，我见这俩不中用，赶紧变出桌凳，设在树下，请二位真龙就坐。如今正是季春，树下落英缤纷煞是好看，玉龙太子左顾右盼，问道：“不足百年，此地竟是大变模样？”<br>
我想这也无甚好瞒人的，便把二郎神所为一一道来。说罢便听三公主哼了一声：“要他好心，马后炮。”<br>
三太子笑言：“那也是好心了。”<br>
三公主说：“谁要他这般，难道还盼你再来一次不成？”我抬头去看，见她眉目飞扬有神，丝毫没有生气模样，心中生疑，这三公主说起二郎神倒不像有怨，莫非当日之事另有隐情？只是到底与我无关，便也把这念头抛到一旁不管，只听三太子劝她：“山神土地如今日子更好过些，不也是好事？”又见三太子转头向我，“二郎神先替我做了，倒教我无甚可谢你们——不知当年山神如今去了何处？”<br>
我一个激灵，抢在那两个憨货和老鬼精前头答话：“三太子和善，咱们又不是图什么后报——前头山神性子古怪，嫌弃如今这番热闹过头，自请去了人少地界，小老儿也不知晓他详细地方。”<br>
三太子道声遗憾，又问还有什么可报答我们。我连连推辞，忽听三公主道：“三哥你也问问水神呀，这土地可净会说好话。”<br>
我忙低头，抹抹额上的汗——想来三公主事后略一思量就能明白，我当日虽不曾说谎，却实在是瞒了不少。或许就是为防着这个，她才变作不相干的男子前来，而当年山神也正是如此才吐露真相。<br>
水神也精乖，对三公主连连道谢，又犹犹豫豫，半晌才为难道：“我这水里若能有些活物，也显得热闹些。”<br>
天下水系归龙族统管，水神早有此心又不敢擅自施为，如今遇上两位海中真龙，可不是瞌睡碰上枕头！三公主将此事一口应下，又得了水神一叠声的夸赞。三太子在一旁看着，面露微笑，并不出言，只在水神看他时点点头。<br>
二位真龙不需我们相陪，自行在地上散步赏景，又上山入潭游玩一圈，直到天色将晚，才告辞而去。<br>
不多久，水里也热闹了，引来的鸟兽也愈发多样，我们这儿简直一片繁荣景象，再无过去那般荒凉。</p> <p>又是二百多年过去，我和水神都胖了一圈，与山神关系渐好，慢慢快要把从前的老邻居抛在脑后。<br>
忽一日地动，我忙四下打听，却得知二郎神将自家亲妹也压在山下。我除了暗叹倒霉的华山山神与土地，又琢磨起来，这事依旧只在我们这等小神之间流传，大家俱让二郎神压得死死的，一句口风也不敢往天上露，仔细想想，怕是门神灶神灵官御史，也都让他拿捏在手中，实在称得上权势滔天。<br>
都是经历过两千年前惨剧的老人，我与山神水神偶尔也会凑到一起嘀咕，二郎神怕不是在护着他妹子？到底上一个他亲娘，便是玉帝亲妹，也给晒没了；外甥女又如何比得？自己先用上刑罚，将来设若事发，也好转圜。<br>
又过十几年，有月宫仙子在大朝会上告发二郎神压妹一事，紧接着又听说二郎神追杀他自家外甥，我们再也猜不透他究竟是何打算——到底还是与我们不相干，管他呢。<br>
只是万万没想到，我还有听到老邻居消息的一日。<br>
山神自有山神的渠道。有一日，山神一副见鬼模样来与我打探他前任，我和水神催他半晌，他才讲给我们听。原来我那倒霉老邻居，多年过去依旧是那副带了脑子但不太多的冲动性子，又爱打抱不平，竟真让他逮着机会，好好羞辱了二郎神一把！<br>
后土娘娘在下，小老儿真不是有意听了这等事情还要发笑的土地！见我憋得脸上抽搐，早已哈哈大笑的水神问我：“你憋啥？是为着二郎神，还是三公主，还是为着咱们老邻居哇？”<br>
我还没来得及答话，忽然一阵龙压铺天盖下，水神山神哧溜一声瞬间没了影。<br>
可怜小老儿让三公主提在手中，听三公主怒问：“说！从前那个山神在哪？”<br>
我咳了半晌，与她赔笑：“不知他如何惹了公主生气？那老伙计性子耿介又呆傻，三公主莫——”<br>
三公主打断我的话，目露凶光：“少说有没有的！我只问你，他到底在哪里？”<br>
佛光一闪，又一只手提着我后领将我解救下地，原来是三太子。<br>
“寸心莫生气，那山神不明真相，原也是一腔热血善心。”<br>
三公主“啪”一声拍在她兄长手臂上，“这也好心那也好心，你果真是做了菩萨看谁都好！”她又瞪我一眼：“不说算了，看在你照顾我哥的份上。”我忙连连作揖，心道老邻居可真得谢谢我才是。<br>
三太子哄了许久，才哄着三公主一起走了。<br>
剩我一人在原地琢磨，三公主竟是护着二郎神的不成？</p> <p>自然是琢磨不出来的。<br>
直到上界发下新规，水神又带来西海三驸马的消息，我才终于恍然大悟。<br>
原是天规拆散有情人呐。<br>
如今天宪有道，三界气象翻新，我这地界又是生机勃勃，我只管做个小小土地安闲度日，神生完美喽。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/122800.兄妹.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/2de55d/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">惊心动魄</div></a> <a href="/pages/525850/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">海里事</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
