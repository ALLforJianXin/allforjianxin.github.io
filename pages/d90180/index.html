k2mvC7JB8tG04Ef5PiXtG0UtxupRQSfTnBoCy554x18yJHI6I+G5Eru4LHmPJZEQsrvPUbMiA8G/WgMK7w7I+ez7++o2ANfbrjvaOl1tFMs+htG3IrZH9/hDX1Pr8Tc0UvH8tcX29KzAgIGcEkINyW5BF9x891hw6VYqgJHEk0huccS7vh3C6gTiODL+26huuBtbct8eZnqLML8PkxGYpuPZBqtqwkSjgc4mB5gbgig5i+y0UDK35LMxXisn9xQtK+nd26gTIHsHe/oblK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">醉生梦死<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>递上的帖子明晃晃回了几个赤字，想是那人提着朱笔稍离司法公文，匆匆所写。杨婵叹息一声，虽道亲兄妹间，千年情义深厚，可二十年前视若等闲之事，现在瞧来总觉隔阂稍存。</p> <p>天上一日，人间一年。于杨戬而言，节庆不过眼眸微合，瞬时逝去。但这既是一家团聚的第一个年头，三圣母老是念想，要将兄长请来过一过新年。</p> <p>九重天上清清冷冷，她为探望哥哥时有来往，但昔年对天廷有旧怨在先，总是心有所恶。她既有如此印象，再一想那人身边……</p> <p>梅山兄弟教他调回梅山练兵去了，大家心中有愧，不敢多言，总是摸不透他的心思。他的身边，尽是粗人外客，怎能照顾好他呢？余下一狗，只教杨婵生出一种老猫向火的错觉。</p> <p>沉香蹦哒到母亲身边，开口就戳中她心事：“娘，不如今年过年，咱们到真君神殿去过罢？”</p> <p>三圣母看着儿子，知他所想同自己一般无二，却还迟疑：“会不会耽误你舅舅……”</p> <p>“先递个信儿问问他。”彼略一思索摸着下巴想出个招。</p> <p>“就这么干！”母子俩击了个掌霎时开心起来。</p> <p>哪知送信的小纸鹤摇摇晃晃带回来的纸仍拿朱笔批了个歪歪扭扭的“否”，怕连墨都没换过，真不愧天地时差是也。</p> <p>三圣母疑惑：“二哥真这么忙？我记得前些日子哪吒来过，说玉帝给他放了假，他整日闲得很啊。”莫说平日公文加身时，二郎真君有个极过分的法术，只教时间取之不尽用之不竭，用来办公正合适不过。</p> <p>莫不是他当真心中生了隔阂，不愿见她这妹子了！杨婵虽然温婉得体，但若遇了素来宠她惯她的兄长，娇性脾气也是有的。怎说此事是她之过，他到底愧疚个什么劲儿！前些日子不是早讲通了，不许再如此？！</p> <p>三圣母脾气上来了运了仙法便要往九重天去。沉香见此当即跟上，却教母亲扇了回来。</p> <p>“好好待着我去就是！”</p> <p>且道三圣母，既至南天门，入了天廷，径向真君神殿去。</p> <p>她进神殿也不用通报，只来至殿前，远远望去见杨戬背对着大门靠在桌子上，没在做事却在发呆。</p> <p>她疑惑，走上前去唤了一声：“二哥？”</p> <p>“啊……啊？”天神不知怎的慌慌张张，手上一抖将桌边的砚台碰落了，掉在地上“砰”地好大一声。他想回头也想去拾那砚台，到底抬起袖子匆忙抹了两把脸，这才蹲下捡起那砚，转身放在桌上抬头瞧见是她，呐呐唤了声：“三妹？”</p> <p>杨婵眯眼，敏锐地发觉杨戬脸颊上一道未擦尽的红印。女人的直觉和经验告诉她——这是道唇印。</p> <p>杨戬不出所料地没答应这事儿，问他理由也教这司法首辅扯七道八含糊过去，险些将杨婵哄绕进去了。待她被这黑心哥哥哄乖觉了送出门去，凉风吹来抖了个激灵，忽觉不对劲儿。</p> <p>杨戬不想说的事情就是再问也无法，杨婵略一思索放弃了询问这条路子，回家寻了儿子稍一商量，打定了主意。她倒要看看二哥这大过年的要去干些甚。</p> <p>——</p> <p>除夕。</p> <p>果不其然这厮不在神殿，连哮天犬也没带，教他留守在殿内，清冷得很。</p> <p>杨婵问哮天犬：“你主人去哪儿了？”</p> <p>哮天犬：“小犬不知道能不能说……”</p> <p>沉香旁敲侧击：“舅舅吩咐不让说？”</p> <p>哮天犬：“那倒也没有……”</p> <p>……</p> <p>杨婵带上儿子下了西海，心里猜测得八九不离十，杨戬这厮果然有了媳妇儿忘了妹妹，年三十儿拒了她去西海过，啧啧着实可叹可悲，居然还不教她知道。</p> <p>本来事情到此她不该再探，但杨婵素来晓得她这对兄嫂的属性，今天互给个唇印明天就能甩对方个巴掌。</p> <p>就教这俩好，这事儿也得她这小姑子多掺合掺合，做妹妹不易做杨戬的妹妹着实不易呀啧啧啧。</p> <p>待瞧见眼前之景杨婵只想给自个儿个大嘴巴子，戳瞎了她的眼咯，她就不该管这茬子事儿。</p> <p>三公主的水晶宫中，丝竹乱耳帐幔飘摇，三圣母同儿子化作两只小蚊子歇在撒落满地的花瓣之下。阁中男女笑声阵阵传出，杨戬面上覆了白绫，并额头天目一道，遮住了他三只眼睛。柔柔的纱帐随海水轻缓飘摇，娇俏的龙女左躲右闪，清脆婉转的笑声混着灵动的脚步，身着粉色鲛纱煞是好看。杨戬教白绫蒙住眼睛，正双手前探笑着去抓她。</p> <p>许是喝了些酒，杨戬双颊现红云，脚步踉跄，听得公主银铃般的咯咯笑声，便扑身去搂。如若搂空了便笑着再抓，如若搂住了……就抱着亲一口。</p> <p>……小蚊子杨婵拿细细的触角移一瓣花过来挡住了儿子的眼睛。</p> <p>——</p> <p>刘彦昌刚刚挂好灯笼，就见老婆儿子悠悠飘回来。他立马站好就要行礼，往后一瞅却没瞧见杨戬的身影。</p> <p>他疑惑问：“二舅兄呢？”怎的没给架过来。</p> <p>沉香讪讪没说话，却见三圣母撇撇嘴：“醉生梦死去了，别管他。咱们开饭，小玉呢？叫她出来……过年了……”</p> <p>……</p> <p>爆竹噼里啪啦地响，三公主暖融融的闺阁之中，杨戬迷迷糊糊躺在小殿下香香软软的怀里，抬起手抚上那教人魂牵梦绕的脸，开口道：“是……杨戬所愿，醉卧美人膝……”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/111617.醉生梦死.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2
