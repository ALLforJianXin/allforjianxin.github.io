大哥好不易得了空，该好好歇歇。”</p> <p>杨戬一激灵打了个寒颤，不，我看你是在为难我杨某！如此不寻常，问也含糊其辞杨戬想着，又将她细细打量，但见龙女一身藕荷色少花样的宽袖薄罗裙，乌亮长发只使了个梅枝花钿绾着，身段娉婷低眉顺眼，倒真有几分温柔素雅的味道——事有反常必有妖！</p> <p>敖寸心说罢就见杨戬一双瞳仁黑黢黢的凤眼紧紧盯着她瞧，饶是龙女生性开化明朗那也遭不住心上人这般打量，脸上立时有些烧，她再顶不住要别开眼，却见杨戬忽的勾唇笑起恰似春风化雪温声话道“三公主说的是。”</p> <p>他说罢抬脚绕过敖寸心便往里间去，敖寸心忙不迭跟上软着调子“去哪里呀？”杨戬瞥她一眼微不可见的叹了声气儿“书房”敖寸心自要缠他不放，为这胡话张口就扯“陆上风情多奇致，我年幼又久居海中诸多不知还请杨大哥指教。”</p> <p>杨戬在书房门前刹住脚一头拉门，这厢嘴里故作为难“这倒不难，只是一早忙碌倒有些腹中空空……”敖寸心自然上道咧嘴柔柔笑道“那杨大哥想吃什么？凉糕好不好？”她说话于案边落座，手上一晃显出一方食盒。</p> <p>杨戬取上竹卷回过身，就见案几上推来一盏乳色小食，他一怔再瞧敖寸心笑脸盈盈，心下不免佩服：有备而来啊！杨戬眉峰一扬也不多话，坐下使汤匙尝了一口唇线绷紧些，敖寸心悄悄咽了口唾沫有些紧张“我向小婵讨教了亲手做的，好不好吃呀？”</p> <p>这倒有些意外也难为她心细，杨戬想归想嘴上却有些熬不住“殿下莫不是弄差了盐糖，这滋味有些怪啊？”敖寸心见他拧起眉头，腹内腾得燃起一股火脱口一声你就要理论，可转念又想男人多喜欢温柔听话的，便又忍了忍硬扯出个笑“或是我未弄好也未可知，不若我再做一回！”</p> <p>敖寸心说着便直起身去拿那凉糕，却不想杨戬将那碗盏往旁一推，笑道“罢了这会儿又不饿了！”敖寸心瞧着他笑眼弯弯，哪里有什么赏心悦目，只想上去狠狠咬他一口！</p> <p>杨戬咂咂嘴只做浑然不知，好似无意又道“这发了汗又吃了甜，要是有口香茶……”他说着偷瞿龙女一眼，果见她桃腮紧绷银牙好似咯吱吱的响，一张笑脸已是要塌了却又生生憋上气，柔柔道“煮茶虽然繁琐，不过杨大哥要是口渴，寸心也煮得。”</p> <p>龙女说着衣袖一拂桌上便是一套天青色茶具，连炉子都起好了，杨戬见龙女两指一点便引水来，恍若无知又多嘴道“三公主可要清楚这海水可是煮不得的！”</p> <p>敖寸心强颜欢笑“这是自然。”</p> <p>龙女点上茶叶，杨戬“诶这叶子放多就涩了。”</p> <p>敖寸心银牙也咬碎“那便煮淡些。”杨戬又‘专心’看起书来，不咸不淡的嗯了一声，茶香氤氲起龙女正要滤了这一道，便闻杨戬懒懒散散道“成了没？三公主手脚快些罢。”龙女手上正忙垂头就道“再一番熟水便好了。”杨戬挑挑眉“你磨蹭什么呢，我可给你渴坏了啊！”</p> <p>去劳什子个温柔！欺人太甚！啪！龙女一拍红案，水珠都震出些，她霍然起身喝道“杨戬！你不要得寸进尺！”杨戬见此心上牵动好不得意“哟！装得够久呀！”</p> <p>龙女不防叫他戳穿，只一怔便破罐破摔鼻子出气，哼哼的“装甚么？！本公主不过不乐意伺候了！你的福气到头了！”她说着又将纤小的下颌一抬趾高气扬的。她发作一通难免泄气，又想起方才种种，便知杨戬先前实为‘有意作弄’，只觉这人百分不领情心中好不委屈。</p> <p>杨戬见她这会瘪着嘴杏眼潋滟，楚楚可人，方才那般气势骄横眉眼飞扬，也是一番风流，心下浮动脱口道“你这样就好。”说罢才觉有些逾矩，想要改话头却见龙女闻言身子拧了下，甜甜得笑了起来糯糯问他“当真吗？”</p> <p>杨戬倏忽间觉着心头陷下去，哪里还改得了口，“自然可亲如何不好。”他说罢不知掩饰什么忙又道“我帮你收拾。”敖寸心欢欣得嗯了声乐颠颠的模样，叫他也是心下欢畅。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/102600.卿本佳人.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0
