“这西海小龙向年间所犯乃是忤逆犯上的死罪，留下条命来已是陛下和娘娘法外开恩了，真君若一意孤行……”</p> <p>“我主意已定，今日是来同你交代而已，土地公不要敬酒不吃吃罚酒了！<br>
“……有什么事情你只管推到杨戬头上便是。杨戬劈山砍日的金刚石斧，还不算钝拙呢。”</p> <p>二郎真君离了蛇盘山回到家里时天已经黑透了，他如往常一样绕到西厢要望一望，见灯未亮正忖度“她竟连灯也不给我留了么”狗子凑近前来吸吸鼻子，“主人，三公主好像出去了”惊得他差点儿捏断三首蛟的腰。<br>
“追！”</p> <p>往东北急飞千余里，哮天犬在被风永久吹歪脸之前总算是嗅到了往下的路线，一人一狗一扇按下云头落在一片营建中的宫苑前。<br>
这宫苑遍植牡丹，夜色中清香浓香幽香与龙女特有的甜香交织，驳而不杂，沁入心脾直叫人百炼钢也作绕指柔。<br>
“主人，好像还有别人的味道。”<br>
“闻得出是谁吗？”<br>
“狗儿一时想不起来。”黑毛狗子头都快挠秃了，下意识往神君身边靠，被递过来的折扇又推远些。<br>
“你们在这里守着慢慢想，莫让闲人闯进来！”神君一边交代一边迈了两步，略停顿下了道禁制才又顺着味道往更深处寻觅去。</p> <p>拨开花树如拨开云雾，花朵娇艳神君无心欣赏，龙女本事他最清楚不过了千多年没丝毫长进驾个云速度像猫儿爬刻下一个人跑出来这么远怕不是他前脚离了杨府她后脚就出门了？好几个时辰过去身边还有别人他不敢再往下想只愿早一刻寻到她便好一分罢。</p> <p>找见她是在一株双色牡丹树下，把人搂进怀里先验了呼吸平顺囫囵安好，才醒过来她甜香扩散原是被酒激发了。<br>
有心数落两句，扶起身见她红润双颊微弯唇角，出口的成了“你倒是个不操心的，撇下我自个儿在这儿醉得欢畅”，从语气到心底都软绵绵柔乎乎起来。</p> <p>他实在比他以为的要更加怀念拥着她在怀抱。</p> <p>这杨二郎正兀自贪恋着龙女柔软身躯，贪恋着她沁甜香气，那被他抱住的小殿下悠悠醒转来，腻声唤他：“二爷？你来啦？”<br>
杨二郎刹那僵了手脚，就好似少年心事被撞破般呆愣愣话也忘记说。醉醺醺的龙女倒是大方，撑着他臂膀站起来，伸手摘了朵牡丹别在他耳朵上。<br>
“你看这花好不好看？牡丹人称国色天香，正是同二爷一样呢。”<br>
杨二郎闻听此评语既有尴尬，又隐隐有些被夸奖的欢欣，脸上红一阵白一阵，还要故作不经意，大手沿龙女小臂往上，拿住花和柔荑，拿住花和柔荑移到龙女鬓边去。<br>
替人别别好，嗔一句“胡闹”，再细细端详。<br>
双色牡丹粉白相映，正恰似龙女肤白胜初雪，颊粉如烟霞。</p> <p>千年风霜未曾在他两个面容上留下痕迹，可并不代表一切都如往昔。愈是眼见得龙女笑靥如花，杨二郎的心愈是要沉到泥地里——南天门外西王母夸口宣赦免旨意，不愧是上古神祇，一场谋划千年久，处处玄机。</p> <p>良久，杨二郎哂笑着从记忆里抽离——反正他已经打定了主意。<br>
“寸心，我们回家吧。”再揽龙女入怀，她盈盈细腰仿佛不堪一握，激起他男儿意气：“我不会让你离开我的。”——她那么软弱那么娇小，她就该被好好珍藏，被人捧在手心里。<br>
龙女今日借酒消愁难以自持，本就大悲大痛心神动荡，是以行为乖张。这下听得了他的话，抬手便拢住郎君头颈，将自己送上门去。</p> <p>将郎君，推倒在牡丹树下。面色如花，眉眼似画，贪欢一晌，什么儿愁苦思量，菩提大道，皆先抛抛下。</p> <p>柔软樱唇贴上的时候，杨戬闭上眼让自己沉浸于甜蜜。一念转过，反正已下了禁制，不会再有第三人在，便在这里也可以。一场缠绵深吻松散了二人衣衫，龙女手上加力，他便顺势勾着她滚倒于草地。<br>
几百年来的争吵不休仿佛并没有消磨掉什么，只要她碰到他，只要他碰到她，身体自会诉说爱意。</p> <p>龙女贝齿在郎君下巴和颈间轻轻啃噬，磨得他阵阵痒意累积，另一面双手下探，在他难耐间握住他胯间的粗壮，一瞬间所有的难耐仿佛寻到了目标，都往下身冲去。<br>
“二爷憋得久了。”<br>
真是喝了酒胆子大了，什么都敢说！<br>
杨戬正想要拉起龙女好好教育，却不妨她一猫腰躲了过去。紧接着便有温热和柔软包裹住他某处身体。<br>
二郎器大，又兼蓄了久力，龙女尽张檀口也不过勉强吞下小半，便就这样吞吐起来，没几下倒弄得自己眼泪汪汪的。<br>
“二爷，太大了。寸心吃不下了。”<br>
“啧——”虽然胀得仿佛要炸开了，但他总是舍不得她委屈。“不吃了。寸心用手摸摸二郎就可以。<br>
引着她一双柔荑握住那处，缓缓上下，龙女脸颊在酒色滋养下飞满红霞，泪珠儿还没滴完，又已绽开笑意，若雨后海棠，若摇摇春光，最牵动他心意。</p> <p>奶白色的液体划过道弧线，有些落在唇角，有些落在鬓边。龙女下意识伸出小舌去舔了舔，还没品出味道，一时天旋地转，再一时便被一副强壮身躯覆在了身上。<br>
郎君在亲她之前又念了句：“我不会放开你。”<br>
他的吻霸道又甜蜜。他怕她久疏亲昵更娇气，一边吻她，一边伸手贴住她底裤轻轻按揉着。揉了一阵子龙女呼吸急促起来，腰肢开始拧动，更开始发出些声音，哼哼唧唧。于是他再进一步，褪下碍事的下裳，将平日里握惯兵器的手并起两指——那手指可以力提千钧，也可以温柔又灵活——探进龙女身体。<br>
花道甫开，积蓄的蜜露便顺着他指缝流了出来，流过臀丘间谷地，流入草丛里。<br>
先直来直往，再勾连缠绵，间或辗转反侧。又换了动作，像小兽一双前足灵巧剪动，让她在舒爽上再层层叠起。</p> <p>打量下被她打湿的下摆，干脆全部脱了。捧起她的翘臀和细腰，用自己，贯穿过。</p> <p>灵肉同欢，飞上重天，如梦似幻间，她好像听见他说：“我们要一直在一起。”</p> <p>狗儿靠着屏障正酣眠，突然身侧一空跌醒了来。<br>
站起身便见自家主人抱着三公主出来，迎上去正要开口，被杨戬一瞪又把话吞了回去。<br>
“先回家。”<br>
杨二郎吐字几乎没出声儿来，狗儿是靠读唇语才读懂他意。</p> <p>杨戬怕龙女吹了风，尽可能飞得很慢了，可龙女还是渐渐蹙起眉头，似乎不太舒服。</p> <p>梦里，也是记忆里。<br>
观音菩萨说。<br>
——西海龙三注定是要捐身灵山，为佛护法的。</p> <hr> <p>嗯考据党又要bb时间线了👀这篇时间定位在大约西游开始前到西游开始初期，反正是鹰愁涧收小白龙之前。在剧里就是戬心闹别扭分居但还没到杨戬去帮三藏师傅那段，也就还没到更后面小狐狸啦那些事情🤪我脑洞是大到漏海的这篇设定成宝莲灯世界就是没有小白龙西海三公主就是那个要西去取经的后面她闹腾都是因为怕连累别人连累杨戬所以主动求离婚……</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/88.短篇-2020/100101.西海龙三.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%9C%89%E6%83%85%E4%BA%BA" title="标签">#有情人</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/02/19, 21:33:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/dd6669/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">太上忘情</div></a> <a href="/pages/8f10d8/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">水性</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
