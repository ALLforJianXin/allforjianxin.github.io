KejgAAAABJRU5ErkJggg==">撷樱<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>圆润殷红的樱桃湃过凉水后盛在透明玻璃碗中，颗颗晶莹如玛瑙，含桃带露，色艳香浓。沾了水的手指拈起一粒樱桃，葱白深红两相映，更显娇艳可人。</p> <p>“好吃么？”杨戬也拈起一粒樱桃送入口中，问道。身侧的寸心已斯斯文文吃完了一粒，正用帕子擦嘴。绯色的汁液点染在素色丝帕上，夺目非常。</p> <p>杨戬又拈起一粒，却是不吃，只放在手中把玩：“你说想吃樱桃，我便寻了来，你如何谢我？”</p> <p>寸心闻言，撇嘴道：“真君老爷神通广大，寻一篮樱桃便叫人谢，叫人听见可不得让人笑死。“见寸心无赖，杨戬无奈地捏了捏她的鼻尖，笑道：“神通广大是不假，只是摘樱桃是个细致活，还是要花些功夫的。”</p> <p>寸心一下抓住重点：“摘樱桃？这樱桃难道是二爷亲自摘的不成？”</p> <p>杨戬颔首，顺势将寸心一只柔荑握住，道：“是邛都*的樱桃。”</p> <p>寸心闻言，又惊又喜。惊的是堂堂冷面二郎真君，竟亲自动手为她摘樱桃；喜的是过了这么多年，人事浮浮沉沉，她的好夫君竟还替她记着川西的樱桃。</p> <p>当年还住在物产颇丰的蜀地时，她就偏爱邛都的那串红樱桃。每到果子成熟时，便要托人去买上许多，以至后来渐渐有传闻说，二郎庙里的神仙爱吃樱桃。于是好长一段时间，一到樱桃成熟季节，二郎庙里的果品就多是大筐小筐的樱桃，倒让寸心饱餐了许多年。</p> <p>往事如烟，邛都的樱桃依旧年年红艳，只是爱吃樱桃的龙女从灌口杨府到西海，再到九重天的真君神殿，早已不复当年。</p> <p>见寸心捏着一枚樱桃愣神，指甲已嵌入果肉，绯紫色的汁液从果皮上的伤口顺着寸心指缝一路漫延至掌心，可寸心却浑然不觉，杨戬蹙着眉，便将龙女的另一只手也握了过来。温热湿润又柔软的触感替代指间果汁的冰凉，寸心终于回神。</p> <p>“呀，你做什么！”寸心低呼。只见着杨戬将她被果汁侵染的那根手指含在嘴里吮吸片刻，接着舌尖一路向掌心滑去，将那绯紫色汁液舐得一干二净。</p> <p>龙女面上瞬间密布彤云，想将双手从某人爪中挣脱，哪知无济于事。杨戬佯怒道：“好好的樱桃你不吃，在这愣神。”</p> <p>寸心是个胆子大的，加之早已将杨戬的脾气摸得一清二楚，知他做假，也不辩驳，努努嘴道：“我要吃樱桃。”末了又加了一句：“你喂我吃。”</p> <p>杨戬一愣，终是乖觉地听从老婆大人的吩咐，挑了一枚又大又红的果子送进龙女口中，又将她吐出的果核接着，一副贤夫模样。</p> <p>见他这般，寸心“噗嗤”笑出声，又引得郎君侧目：“你笑什么？”</p> <p>寸心正了正神色摇了摇头，杨戬却是不依不饶，干脆将龙女拢入怀中，在她双颊上又亲吻又呼气，直叫寸心连连躲闪。</p> <p>“西蜀樱桃也自红，野人相赠满筠笼。”*杨戬吻了吻寸心的唇角，喃喃道。</p> <p>寸心很快接了下句：“数回细写愁仍破，万颗匀圆讶许同。”*旋即笑道：“没想到，二郎真君竟自称‘野人’！”杨戬也笑：“归于山野之人，可不就是野人么？”</p> <p>寸心笑意更浓：“如此，便谢过野人相赠的朱樱，本公主很是喜欢。”</p> <p>杨戬朝温香软玉处贴了贴，低声哄道：“既如此，小神还想向三公主讨一件赏赐。”那西海三公主没有做声，剪水双瞳滴溜溜地转，等候郎君的下文。</p> <p>“西蜀的樱桃正好，”杨戬的唇贴着寸心的，一只手揽着她的腰，另一只手沿着她的腰侧一路下滑，钻入了衣摆之下，“三公主的‘樱桃‘想必也是非常滋味。”</p> <p>听得杨戬话中意有所指，多年夫妻寸心如何不知他心意。笑骂一句，便任由郎君将她打横抱起，转眼间，二人已浑身赤裸，双双落在锦被上。</p> <p>“还请三公主为小神赐果。”杨戬说着，熟稔轻柔地抚上寸心胸前的朱樱，羽毛般的触感令寸心浑身战栗。</p> <p>杨戬倒是不疾不徐，唇舌手指并用，像在品尝什么珍馐美味般。两粒樱果被轮番侍弄早已挺立，与成熟后悬于枝头的樱桃别无二致。</p> <p>寸心有些难耐，搂着杨戬脖子的手臂紧了紧。杨戬了然，轻车熟路地分开龙女双股，腰身一沉，玉茎便轻松滑入蜜洞之中，时而浅插，时而深刺，恣情捣弄，龙女颜色俱变，娇声颤颤。</p> <p>杨戬又捡了个枕头垫在寸心腰下，提起她一双素足放在肩头后再次尽力抽送。龙女柳腰款摆，朱樱嫩蕊任郎君恣采，不多时便香汗淋漓，杨戬亦泄了元阳，替寸心擦了身子，二人共枕，相拥而眠。</p> <p>“二爷。”神殿的夜较凡间似乎更凉一些，寸心蜷着身子，朝身前的杨戬贴了贴。</p> <p>“嗯？”感受到怀中龙女的动静，杨戬垂眸，吻了吻她光洁的额头。</p> <p>“下次你再去摘樱桃，可不可以带上我啊？吃了那么久樱桃，我还没有去摘过呢。”带着些撒娇的意味。</p> <p>杨戬失笑，应了声“好”。神殿的夜寒冷如往昔，可此刻他的房中却是炽热非常。沉寂已久的思念被唤醒，他只想将怀中龙女牢牢锁住，再不让她逃离。</p> <hr> <blockquote><p>*邛都，今四川西昌。</p></blockquote> <blockquote><p>*均出自[唐]杜甫《野人送朱樱》。</p></blockquote></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/《关山云雨｜岁岁情长》/18.18.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E6%88%AC%E5%BF%8348h" title="标签">#戬心48h</a><a href="/tags/?tag=%E5%85%B3%E5%B1%B1%E4%BA%91%E9%9B%A8%EF%BD%9C%E5%B2%81%E5%B2%81%E6%83%85%E9%95%BF" title="标签">#关山云雨｜岁岁情长</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/20b715/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">大婚</div></a> <a href="/pages/a3fb92/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">姐姐太爱我了怎么办（下）</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
