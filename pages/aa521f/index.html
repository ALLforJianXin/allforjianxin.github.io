真君夫人自打生了孩子后性子愈发“和顺”，现下一边颠了儿子哄觉，一边踱步过来替丈夫把灯挑亮些，温温柔柔交代句“不急的就放一放，身体要紧”。<br>
杨戬抬头上上下下打量遍妻儿，绽开笑颜轻轻“嗯”了作为应答。他少年时的梦想终是实现了，他娶回了心爱的姑娘，还有了连接他与她血脉的孩子，所谓“幸福”可能就是这个模样。<br>
敖寸心被盯久了有些害羞，饶是前前后后与这人做了近两千年夫妻了，她依然还完整保留着少女情怀的美与娇。<br>
“我，我先带盟盟去歇息。”<br>
龙女起身走的头两步有些虚浮，杨二郎在她后面抿嘴想笑，又怕她听见了着恼拿拳头硬压着嘴角。</p> <p>敖寸心将孩子在卧榻内侧安置好，去卸了珠花褪了罗袜，转回来兴许是见儿子睡得不太安稳，忙挨着小人儿躺下，轻轻拍着，轻轻哼唱着。<br>
杨戬批复呈文的手顿了下，又继续，只是字迹似乎更柔和了许多。批几笔就抬头望望，这岁月静好。<br>
女声哼唱的摇篮曲终是渐渐低落，乃至停了。真君大人望向龙女背影耳边又响起头前她那句“不急的就放一放”，莞尔一笑从善如流，搁下笔揉揉脖子，蹑手蹑脚摸上床，放下纱帐呵暖双手，依在夫人身侧。</p> <p>龙女下午哄儿子午休时其实已经睡过了一觉，这时候实在不太困，是以杨二郎虽然动作极致轻柔，也惊走了她刚哼小曲儿养出来的瞌睡虫，这下黑暗里她睁着两只水灵灵大眼睛，再睡不着啦。<br>
背后男子的气息平稳绵长，拂在她耳尖有些痒。抬手搓一搓，干脆翻身朝向他，小手搭住他腰侧时察觉到那人僵了一下，龙女转转眼珠，用最轻最轻的声音问他：“你也睡不着吗？”<br>
半晌才有个几乎听不见的“嗯”回答她，要不是他点点头碰到了她刘海，她真的会以为是幻听了。</p> <p>在龙女等待回答的片刻里，二郎真君其实已经默念了三遍清心咒语，堪堪压下被撩起的小小火苗。他将这司法府从天上再搬回灌江口本就是为了多陪伴家人，天上一天凡间一年，往日一天的工作量现在有一年时间来做，哪里需要宵衣旰食加班加点，他日日拖到这么晚才就寝，还不是因为，不方便嘛！<br>
继续专注默念清心咒的真君大人不知道自家夫人心里又在转些什么。只觉得敖寸心小手摸索着从他腰里往上爬，一直爬到他颈边，又摸上他脸颊，然后听见她说：“你亲亲我好吗？”</p> <p>龙女话说得竟有些哽咽，回忆起来她的丈夫好久没亲过她了，如果不算那些落在额头脸颊的吻的话。<br>
他们是赶在她显怀之前操办的婚礼，忙完一整套繁琐仪式又忙搬家，饶是她真龙之身强横也疲乏得很，歇息了些日子，还没来得及再腻歪，例行请脉后医圣爷对她夫妇苦口婆心劝道，“注意保养，毕竟月份渐大”。她夫君虽没有借此就躲出去，但相处间手脚规矩了太多，让她难免有些失落。</p> <p>他的唇果然又是落在额头，敖寸心心里一紧突然委屈想哭一哭——听说世间会有男子趁妻子怀孕时出轨，他是没有的；可还听说有些男人嫌弃生过孩子的女人身体变化……<br>
从脸侧小手微微颤抖中杨戬敏锐察觉到了妻子情绪，刚想追问，一刹那福至心灵闪了个念头，忙抬手捏住她小巧的下巴。</p> <p>他的吻还是那么甜，他的舌头还是那么软，含在口中，化在心间。<br>
敖寸心拧拧身，更贴紧些他。</p> <p>不过他只给了加长加深的亲吻，亲完停了一会儿，他凑到她耳边说：“睡吧。”<br>
他的大手在她背上轻拍着，让她觉得很安心，虽然也觉得哪里怪怪的。迷糊了一阵子她想起来，怎么那么像自己拍儿子哄睡觉呢！他把我当孩子了？！可我是他的妻子啊！</p> <p>敖小寸一个激灵钻进了个牛角尖，越想越不对，一时间思绪像脱缰野马，杨二郎只感觉本已渐渐安分下来的姑娘忽又紧张起来，忽又问他：“你再不愿碰我了吗？你是不是嫌弃我了？？”<br>
这小脑瓜里都在想些什么呀！<br>
狠咬咬牙根，真君大人从牙缝里挤出一句：“我们真该给盟盟找个保姆了。”</p> <p>我问你愿不愿碰我！你说盟盟干什么！<br>
气性上来的三公主可再憋不住了，挥起拳头就往那人心口锤一下，正要兴师问罪竟被那人抢先捂了嘴巴。</p> <p>“嘘，别吵醒孩子。”</p> <p>孩子孩子又是孩子，前头就没彻底压下去的委屈再翻上来，三公主的泪立时淌了满脸花。</p> <p>二郎真君脑子当机了一会儿，虽然知道必定是自己做错了或者说错了，但是真的不知道做错了什么又说错了什么呀。<br>
趁他愣怔敖寸心拉下了他覆在她唇上的手掌，拉住他寝衣领口翻身就坐到他腰上：“别顾左右言它，老实回我话！”</p> <p>气势不错，如果没有那足以透过她底裤沾湿他亵衣的露水的话。</p> <p>沉默中蔓延的似乎是尴尬。黑暗下看不见脸色，可敖小寸知道自己脸一定红透透的，毕竟已经烧到她不用摸就能感觉得到的温度了。<br>
她松开了捏着杨戬衣领的手指，正在想怎么找台阶下，忽然被大掌托住脑后，被带得俯下身去，又一次跟他呼吸相闻，口舌交缠。</p> <p>这个吻明显比刚刚的要霸道许多，充斥着情欲的味道，他的舌头在她口腔里翻搅遍，再拖出她的到他唇间细尝鲜。</p> <p>忍了好几个月了，从未曾好好修炼过禁欲之功的清源妙道真君早就绷到极限了，那“请保姆”的话跟老婆提了不止一次，奈何亲亲娘子不知哪里听来的“孩子要时刻自己带着才亲近”，愣是不依他。不依他就算了，他苦着自己，她还要疑他，简直没天理啊！</p> <p>杨戬直将敖寸心亲得快喘不过气来，再胯下猛送一下直顶得她往上蹿了蹿，才放开，同时压低声音问她：“这回答小殿下满意了吗？”<br>
早不是无知少女了，敖寸心十分清楚被他顶住那下撞上来的是什么。这回答她自然满意，同时又有些酸他不肯明言，也暗暗滋生起了许多讨要补偿的想法。</p> <p>“既然真君大人也有意，那我们……”</p> <p>说实话这样主动的龙女很难见，加之他们之前又是分房又是和离地折腾，还有那么段时间身份不尴不尬，是以当敖寸心小手拢住他头颈娇臀在他胯间轻碾时杨二郎只觉得自己的理智都要飞走了，拼尽全力留最后一丝清明提醒她：“盟盟，盟盟还在旁边睡着呢。”</p> <p>两个人都已动了情，这时候怎么可能再停下？</p> <p>龙女身子偏开，一阵窸窸窣窣后，轻柔如兰的气息喷在他耳边：“好了，我把他眼睛蒙上了。”</p> <p>杨二郎略略挣扎，终是松了自持，用微带薄茧的大手覆上龙女胸乳，先握一握感受下尺寸变化，再拿指尖撩开衣襟拨弄朱果，引得她颤颤栗栗。龙女也不示弱，干脆解了他束带将那粗壮红烛剥出，翩翩粉蝶来回掠几过，蜜露润润，纤腰一沉，便听得他极致憋闷着还是有细微哼声漏下。</p> <p>龙女一边耸动腰肢一边拿细白贝齿啃咬杨戬的嘴唇、下巴、喉结，杨二郎只觉得上下要害处都被制住，股间腻滑滑难着力任人摩擦，身上痒起来那点火者却悠忽来去不再挠他。思量下他选了下路突破，两只大手几乎将龙女纤腰满握，使上劲儿往下一带，更抬头咬住她耳垂，叫她“殿下这般急色，且受住小神咯”。</p> <p>龙女被人摁紧了顶弄，那人早摸熟她的身子，这会子只管往厉害处闹。一时深一时浅，一时轻一时重，一时急来一时缓，再顶紧了又是磨又是碾，她下面抽搐着早顾不上用唇舌惹火了，只想着咬紧的牙关就要关不住声音可怎么办，突被他猛戳到关键处，愈发了性儿，一张口，在他肩头狠狠咬下。</p> <p>二郎真君倒抽口气肩上的痛倒让他从欲海深处往上浮了些儿，摸摸龙女身上散乱衣衫，忍不住轻“啧”一口，提左手搂定她背探右手托稳她臀，一翻身把她压到下面，再撩起条锦被将他二人从头到脚都遮掩了。</p> <p>确都是旷得久了的，杨二郎贪恋龙女滋味儿不带歇，真龙神潮起潮落似涌泉。到得云海上高山巅，终失了守，一个浑厚低沉，一个娇音婉转，两种声色合一片。</p> <p>两个人都还在喘，也都觉得刚刚最后那下似是动静大了点。<br>
龙女心思直些先耐不住问出来：“他没听见吧？”<br>
杨二郎没回答她却另说起：“至少他肯定没看见。”</p> <p>敖小寸看看他们头顶上黑咕隆咚密不透风，觉得杨戬的话还挺有道理。两人又耳鬓厮磨一番，被子里闷太久气浊起来，她抬手掀了，然后觉着被子外头好像亮得有些过分，两夫妻对视一眼在对方眸中看到了同样猜测，同时偏过头去，<br>
——卧榻内侧本该安稳睡着的杨盟盟小朋友额头上天生神目正一闪一闪。</p> <p>“咳咳，”龙公主终于明了了丈夫心意，也同意了，“明天，明天就给盟盟招个保姆吧。”<br>
司法天神吞下句“早该如此”，舌尖打转，出口的成了：“夫人说了算。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/111100.粉蝶暗偷香.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E6%9D%A8%E7%9B%9F%E7%9B%9F%E4%B8%80%E5%AE%B6" title="标签">#杨盟盟一家</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/04/17, 12:48:19</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/8861ab/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">情迷</div></a> <a href="/pages/d90180/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">醉生梦死</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
