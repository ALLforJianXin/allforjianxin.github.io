bN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">想见你<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>彩云瑞气千条，金光闪闪的南天门较之百年前磅礴恢弘得多，处处透露出奢靡的繁复和精巧。敖寸心在海底下待了几十年，猛地一出海，瞧见甚物都有耳目一新之感。</p> <p>本来以为只会在朝堂上匆匆一瞥，哪里晓得转过角门便瞧见了那个教人牵肠挂肚的冤家。</p> <p>杨戬一身银甲朝服倚着三尖两刃刀靠在午门金柱下，仙气飘飘遮住他的神色，于敖寸心眼中便有些失真，恍若他仍旧是闺阁床榻边的那幅画。三公主早早料想过这番情景，左不过在朝堂上相见互道一声别来无恙，到底不愿意失态。可真的见到他，仍旧愣在了原地。</p> <p>引路的侍女十分有眼力见地退下了，独留寸心一个面对神神叨叨杵在原地闭目养神的真君老爷。寸心攥紧拳琢磨了一会儿，料想这厮早就察觉到她走到近旁，却仍不舍得抬一抬他尊贵的眼皮，暗地里已将人咬死了千百遍不止。</p> <p>敖寸心靠近他，正思量着如何同他打个尴尬又不失礼貌的招呼，内庭中恰有一位白衣白帽白拂尘的值官颠颠赶了过来，至跟前行礼道：“真君大人，娘娘宣您过去一趟。”</p> <p>三公主见杨戬的睫毛抖了一抖，深吸一口气眨眼便见他好看深邃的星目直直望过来，犀利得叫她狠狠打了个冷战。还未来得及开口只教杨戬探过来牵起了手，熟稔地轻轻一握，人已凑到她耳边吹了口气，嗓音清冽：“散朝后烦请到神殿一叙。”未及她反应，径自转身同值官一道入内庭去了。</p> <p>敖寸心揉了揉被他捏过的掌心，其间还残留着杨戬身上久违的龙涎香味，不知为何凭空生出一丝旖旎。大抵是从前的小习惯甚为难改，也不晓得真君大人是否仍保留着他的潜意识，仍清楚明白地晓得拿指尖按捏她的掌心于他俩而言是一个多么暧昧的举动。</p> <p>解禁的朝会他就站在她的前方，寸心低着头，仍能感受到身上那道灼热的视线。几十年前的南天门外她已感受过一回，是以她此次能够将他那幅难以言喻的表情想象出个十足十。杨戬啊杨戬，你大概就是个自前世赶来讨债的冤家。</p> <p>三公主没将绕梁圣音听进耳朵里，也没将朝会间的形色神仙看在眼中，脑子里只有九重天上一层又一层滚也滚不尽的仙雾，还有杨戬眼中道也道不完的情意绵绵。朝会后的酒席间，真君大人或不得已与同僚攀谈几句，眼睛却始终没有离开过龙女。</p> <p>他俩没有挨到散席，各自找了一个借口溜出来，至四下无人的荷花池边，再无它事相扰。相顾无言，杨戬拉起她的手，把她牢牢地按在怀里，在瑶池边迫不及待地拥吻了许久。</p> <p>——</p> <p>杨戬牵着她的手将她带回神殿。寸心还没有来得及四处打量一会儿自己曾经的领地，便被他拉进了烛火葳蕤的寝殿。真君反手关上门，忙着卸去自己的铠甲，然后再凑过来，拉着她的手解开自己繁复的腰带，最后抱起她，将她抵在暗色的门板上放肆地亲吻。</p> <p>“你，你……”寸心哽咽着，在他亲吻的间隙高高地仰起头，好让泪水不那么容易滑落。她把冰凉的手指轻轻贴在杨戬紧闭的眼睛上，然后一点一点挪到近旁揉了揉他的耳朵，捧起他的脸，仔仔细细地描摹他久违的脸庞。</p> <p>杨戬终于睁开眼睛，那里面有令她诧异的星芒，细碎地铺满了他整个眼眸。</p> <p>曾几何时，海风呼啸着吹拂过他的脸庞，二郎劈山逐日，可曾想过有朝一日，竟也不敢直视她的眉眼？杨戬曾想，倘若当时鼓起勇气再看她一眼，今日的天宪，又是否得以出世。</p> <p>“你醉了嘛？”寸心眼角有些泛红，喏喏地问他。</p> <p>杨戬猛地喘了口气，抬手擦去薄唇上沾染的浓浓胭脂，一把将她抱了起来。他身姿甚为矫健，沉沉道了声“没有。”转头将敖寸心压进了柔软的床榻中。</p> <p>“我想见你。”</p> <p>真君一口下去，又将敖寸心的胭脂抿去大半。拉着龙女褪去自己上身衣物，然后颤着手去解龙女的裙带。可惜杨戬解了大半辈子夫人的裙子，依旧无法对女子繁复的衣裙了如指掌。细软的绸缎精致地打了一个又一个小扣子，杨戬不敢粗暴地撕坏它们，可是又静不下心来依次解开它们，只好烦躁不堪地顶着满头大汗粗喘：“我……操……你的裙子好难脱……”</p> <p>正值火花四溅间寸心亦顾不得责怪他脱口而出的粗话，一手拉下他抚在双乳前揉捏不止的大掌，抬起他的脸复吻上去，小臂使力已将裙带撕扯开，露出白嫩的双腿，柔柔地缠上了杨戬压在小腹上的窄腰。</p> <p>两人的喘息和闷哼呻吟是催情的燃料，干柴烈火金风玉露，相逢即是如胶似漆，水乳交融。时隔多年真君委实不减当年伟岸风采，寸心被他抱在身上，刚握住粗壮的柱身，且试探着入了一个头，杨戬崩溃地撑起身子握住她肩膀，眼角泛红：“疼么？”</p> <p>寸心下意识地摇了摇头，下一刻教这厮一把按了下去，那物满满当当地挤进她狭小的甬道中，几乎将人撕裂，龙女眼角不受控制地流下泪水来，惊叫一声禁不住这样滔天的快感，狠狠地咬了一口杨戬的脖子。</p> <p>“嘶……”许久不曾见识夫人的牙口，杨戬痛得一个激灵，绷紧了浑身的肌肉，然后情色地揉捏龙女的臀尖。将粗壮的性器深深插在她的身体里，慢慢地碾磨着一寸又一寸敏感的肌肤。那物憋胀充血，青筋暴起，脉冲涌动，细细摩擦着敖寸心的嫩肉，她绷直了脚尖，紧紧地抱着杨戬，喉间溢出甜腻非常的哼叫，终于受不住阵阵的痒意，同真君一道动作起来。</p> <p>到底身娇体软不过几个来回便叫郎君捣弄淅淅沥沥泻了身，杨戬见水光潋滟见风情无限，将软软搭在身上的龙女托抱起来，教她扶着床栏趴跪在床头，一手握住她的小腰，扶着湿漉漉的阳物猛肏进去。</p> <p>敖寸心一身娇嫩白皙的肌肤在昏暗的神殿中同漆黑的布料形成鲜明的对比，烛火色暖打在赤身裸体的两人身上，愈发勾魂摄魄。杨戬觉得自己已憋坏了，忍坏了，撞得她哼叫破碎不堪，大开大合间拉起她的双手，配合着抽插的动作放肆地冲刺。到最后，忍不住酣畅淋漓的快感仰起头，眼尾闪过一丝迷茫的白光，将精华尽数交给了她。</p> <p>缓过神后，郎君缓缓地退出。将跪立不稳的龙女搂在怀中，拉起一旁的锦被拢住两人紧紧相拥的身体。</p> <p>三公主总要多他好一会儿才能回过神，二人甜蜜地相拥亲吻，将额头碰在一处，这才沉沉睡去，谁还管今夕何夕，物换星移呢。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/100602.想见你.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,
