dUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">鸳帐<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>神殿之中的茶叶换了新的一批，总算没有了那股难以下口的苦涩陈气，侍从们原是每日泡了一大盏，摆在前厅中款待来客，然而真君近日要养伤，从不出门，从不见外人，这泡茶一事，也就暂且搁置下了。这样一来，原本囤积的旧茶只得由一殿中大大小小的侍婢们享用，消耗得十分缓慢。三公主暗暗和同住一室的小柳抱怨，再不更换茶叶，本姑娘就不愿再干下去了。</p> <p>小柳却并不能品尝出其中滋味，只道此茶已是御赐的圣品，你怎么如此不识好歹。</p> <p>三公主被气了个仰倒，不愿再跟这土鳖讲话。</p> <p>敖寸心变作自己的婢女，又被“自己”派到神殿中，名为替公主殿下探看真君，已有好几日了。</p> <p>当日杨戬重伤不治，被横着抬回天庭。老君兜率宫中的丹药源源不断地派人挑到神殿，一担子接着一担子，像是在填无底洞。那时三界中便有人言说，这一次，真君恐怕是散了真元，救不回来了。</p> <p>敖寸心一听，登时急了，不顾天庭固步西海的禁令，想方设法也要跑来瞧这该死的短命鬼一眼，为障天庭的耳目，不敢以真身强闯，只是同侍女小螺用混元草改换了样貌。如今在海底受那不长眼的虾兵看管的，正是变作龙女的小螺哩。</p> <p>三公主正要去领新茶，不想半道上被一位草头神叫住，只说真君要见她。</p> <p>龙女登时心中一喜，当即扔了装茶的盒子，同他去了。这真君神殿中，众侍女皆侯在外殿，只做一些洒扫的清闲活计，内中真君的领地，是一概不要女人侍奉的。寸心到此地数日，直至如今，还没能见到杨戬的面，如今终于要得偿所愿，自然激动。</p> <p>只穿过冷峻肃穆的重门，内殿中清清冷冷地，仿佛没有人气，入得中庭，草头神停下，告诉她径向中路走去便是，自己则不再跟随。</p> <p>敖寸心应下，心中倒有些凄凉。如今要见真君一面，真是比见玉帝还要难上三分。也不知他身体到底如何，这么冷的地界，怎好得养伤？他身旁又没有妥帖的人照顾，这些天，他又是怎么熬过来？</p> <p>她迈步入内殿，只见杨戬正坐在上位，支着头，眼眸微阂，长睫洒下一片雾蒙蒙的黑影。他的身子看起来很单薄，面色白得吓人，混不似旧日意气风发，反而透着一股暗沉沉的气息，即使闭着眼睛，眉角额间透出的都是凌冽。不过幸好，他看起来虽并不康泰，好歹不像是传闻中那般快要死了的形容。</p> <p>她呆了一呆，忽然回过神来，暗道自己此刻还是一个婢女，不可逾矩，便躬身行礼道：“见过真君。”</p> <p>这是……杨戬闻言，心中一跳，支着额头的手揉了揉眉角，缓缓睁开眼睛，目光有些凌厉，又带着一分诧异，扫到龙女身上，三两下将她魂底都看了个通透。</p> <p>“……免礼。你是三公主……的婢女？”真君晃了晃神，捏了个官腔，一字一顿问道。</p> <p>“回真君，奴婢小螺，奉命来看望真君。”龙女不敢抬头，眼前人的威压让她有些受不住，避过他探查的眼光，寸心挑拣着应有的礼节向他回话。</p> <p>杨戬挑了挑眉，饶有兴致地观摩她的动作，说道：“你们公主派你来做什么？”</p> <p>寸心暗道，且来看看你死了没有，想不到如此活蹦乱跳，倒令我白担心一场。面上也不动声色，只回话：“殿下担忧真君身体，特派我来帮忙照看。今日见了真君，见真君无事，公主……终于可以放心。”</p> <p>杨戬心中一动，她说得轻轻巧巧，性子本不敢犯事却不顾禁令偷上天来，想来当日情境不似她言语中这般平静，龙女担忧他的一片痴心，他向来看得明明白白，二十多年来藏在心间，伤了累了，便拿出来摸一摸，看一看，告诉自己，便是世间所有人都不要杨戬了，还有她是会等他回家的。</p> <p>他长叹一口气，起身走到她面前，将她扶起来，一手挑起她的下巴，迫她看向自己。那张脸清清秀秀，不似她一般娇艳欲滴，可一双眼睛却顾盼神飞，眼波流转，看着他的眼神那么柔软，教他无可救药地陷进去。</p> <p>杨戬的态度软下来，却仍旧面无表情，说道：“既然是你们公主派来看我，不留下照顾，怎么说得过去？”</p> <p>三公主直直与他对视，见他面如冠玉，剑眉星目，俊朗更甚从前，不禁心中怦然而动。本以为他就要赶她回西海传话，想不到竟能留下，登时应声称是，待回过神来，杨戬早已拂袖离去，这大殿上孤零零地，只站着她一个人了。</p> <p>——</p> <p>小螺就此得了特待，从外殿搬进内殿，专门照看真君的饮食起居，每日侍奉杨戬汤药，替他整理文书，打理便服发冠，至于粗活，她倒不用做，自有小侍抢着帮忙。真君内殿中都是爷们儿，甫一来个小女娃，大家都颇照顾她，有时候杨戬事务忙些，她竟比真君歇息得还要早。</p> <p>一日她帮杨戬剪烛添香，那烛芯烧得靡了，用针一挑，登时满屋亮堂。杨戬趴在桌上小憩，迷蒙间被光一晃，睁开眼，只见得敖寸心在身畔侍奉，伸手将她小臂一拉，那女子便跌进自己怀中。</p> <p>龙女惊呼一声，顺势搂上他的颈脖，待回神，心中一片懵然，睁着眼定定瞧着杨戬，迷茫道：“真君，你做什么？”</p> <p>杨戬也已醒了，暗道不妙，忙将她扶起，低头整理仪容，只道：“抱歉，唐突了。”</p> <p>敖寸心见他如此，心中隐隐压着怒火，却不好发作，稳下情绪向他道一声安，就自退下。</p> <p>这样的夜晚倒是不常有，杨戬的身体并不好得完全，更多时候他躺在寝殿中睡自己的觉，一旦睡下便是天昏地暗，不知何时才会醒。前些日子他的伤口尚严重时，这种情况更加严重，昏睡两三日是常事，只急得一帮侍从连连跺脚，而这些时日他好了很多，最长也不过躺个半天左右。有时候扁鹊来替他诊脉，真君却又不醒，一帮人不得已，只好托唯一被准许入内的小螺姑娘进去叫他。</p> <p>杨戬诊了脉，喝了药，又有些昏昏欲睡。龙女替他放下帘帐，掖好被角，正要起身离开。</p> <p>兴许是扁鹊的药加了太多安神的成分，杨戬有些迷蒙，忽然拉住姑娘的衣襟，待她回头，笑着逗她：“你真是贴心。”</p> <p>寸心猛然涨红了脸，心口怄得发慌，又不甘心就此露出了破绽，就着真君神智不清时，一把拍下他的手，一跺脚，转身离去。</p> <p>杨戬听她砰地一声砸门而去，不禁摇头浅笑。究竟是这小妮子太笨，还是自己额上这两道流云纹看起来太像摆设？</p> <p>——</p> <p>敖寸心却难得地沉得住气，一连几日都不露破绽，该做什么便做什么，好像那日的事情没有发生过。倒是真君颇稳不住心神，许是受伤，靠她越发近，便越控制不住自己的行止。</p> <p>一日杨戬在浴池沐浴，裹了里衣回寝殿时，正碰见龙女在替他更换床褥。那褥子上染了三公主特制的熏香，杨戬身上的水气蒸腾，体温有一些高，但闻这久别重逢的香味，心头狠狠地一动，看向寸心的眼神也有些炽热。</p> <p>她窈窕身形就在床边，一举一动，顾盼神兮，便是当年灌口的娇娇夫人模样。杨戬轻笑一声，猛然上前抱住她，双手紧紧揽住她柔软的小腹，低下头将脸埋入她的肩窝，猛地一吸，将丝丝甜香沁入心房。</p> <p>龙女一惊，不住地挣扎，呼道：“真君！你做什么！”</p> <p>杨戬只抱着她，不顾她死命扑腾，坏笑着逗她：“若共你多情小姐同鸳帐，怎舍得你叠被铺床？”</p> <p>敖寸心闻言一愣，只觉一股燎原的怒火窜到头顶，将她整个人都烧起来，登时气得胸腔发抖，侧过身，死死盯住他，咬牙切齿道：“你……你说什么？你再说一遍！”</p> <p>真君不觉将这淫词浪语溜出口，此时已经后悔莫及，连忙松开手，哄道：“……你别生气，是我胡言乱语。”他见龙女眼中怒火更甚，一时怔住，忙又道：“我不是……我晓得你……”</p> <p>“你不是什么？”三公主怒极反笑，“你不顾廉耻，连我也要一并辱没！敖寸心在你眼里是什么！”</p> <p>杨戬见她果然误会了，赶紧解释道：“我没有此意，寸心，我知道是你，和你开玩笑，失了分寸，万望你见谅。”</p> <p>知道是我……龙女闻言，一时间反应不及，呆了半晌，先涌上心头的竟是他如何看出我来？忽然觉得这不是最要紧的，又想道，原来他早知道是我，一直在骗我。继而回忆方才情境，已经晓得杨戬是知道自己所为，故意出言作弄。</p> <p>三公主一时间又是气又是急，恶狠狠擂了他一拳，眼泪已掉下来，骂道：“你这混蛾子短命鬼，学得什么混账言语，只会欺辱我！”</p> <p>杨戬生受了这一拳，闷哼一声，将身子挺直了，去揽住龙女，一手掐诀，将她变化了形容。只见云雾轻拂间，一张粉面桃腮的娇艳小脸显出，兀自沾湿泪痕，只如雨后的海棠花，可怜可爱。真君心中一动，抱住她，说道：“寸心莫恼，我知错了。”</p> <p>敖寸心晓得了原委，气已散了三分，此时被他柔声一哄，又气消五分，只不再赶他，依在郎君怀里，抽噎道：“我担心你，不顾天规来瞧你，为的是你欺辱我么？为的是你取笑我么？杨戬，你这混蛋，你这混蛋……”</p> <p>真君心中一痛，慌忙拥住她，揉着她的头发，将她的脸靠在自己的肩膀处，低头亲吻她的眉角，轻声道：“哪里是辱你？只不过想你，想得发疼了，再见你旧日身形，再也忍不住一腔衷肠，望同你鸳帐内重温旧梦呐。”</p> <p>三公主闻言，只羞得满脸通红，气也消了，伸手去拧他腰间的软肉，嗔道：“你……你只会欺负我。”</p> <p>“我哪里敢？”杨戬攥住她作乱的小手，笑道：“偷进我神殿的小姑娘，骗了本君，还想全须全尾地回去？”话音未落，一抄手，将龙女横抱起来，不顾她的惊呼，扔进了床帐中，掀开松散的里衣，欺身压了上去。</p> <p>“你别这样……”龙女只觉他炽热躯体覆上来，结结实实压住了自己，她身上衣料单薄，杨戬却是一丝不挂，腾挪摩擦间，肌肤相触，感官无限放大，久违的暧昧将两个人的皮肤衬染得泛红，她不觉轻吟一声，伸手抵住郎君的胸膛，道：“你别……瓜田李下，如何做得……嗯！杨戬！”</p> <p>真君大手抚上她饱满弹润的臀肉，隔着衣料感受龙女窈窕玲珑的曲线，低头用嘴巴挑开她胸前的衣料，埋首下去吃吮，只觉满口馨香，面颊上紧贴的肌肤润滑细嫩，使人如登云霄，口干舌燥。他止住她的手，一双色气的眼眸盯着她，柔声道：“怎么做不得？寸心不也想我？”</p> <p>“我……”不待她说完，杨戬将她的手往枕上一按，低头堵了上去。他侵入内里，寻她的唇舌吮吸舔吻，一手已解开她的衣襟，探进她的腿间，三两下揉弄出汁水来。</p> <p>龙女挣扎不得，反被他撩拨得动了情，迷迷糊糊地想，不要说瓜田李下，到此地步，还有甚名头可以挂碍？恍然被他松开桎梏，却顺势攀上他的项子，一抬头，主动将身子送到他的手边。</p> <p>真君轻笑，低头舔吻她的耳垂，沉声问道：“我重不重？嗯？”</p> <p>“啊——”被他的指腹揉捏着蕊珠，龙女收紧了脚趾，眼角浸出几滴快意极致的眼泪，紧紧搂着杨戬的颈脖，在他的肩膀上狠狠咬了一口，泣道：“二爷——”</p> <p>杨戬忽然放开手，拨开她的双腿，扶稳金枪，缓缓顶了进去。那嫩肉久不曾疏，细细密密包裹了上来，敖寸心长长地一吟，手脚颤颤巍巍地缠上他的身子，待交合到底，忽然一阵绞索，竟是龙女早早泻了阴元，淅淅沥沥水流成河，将床单打湿了一大片，小家伙软了身子，抱着杨戬不住地抖，娇声道：“二爷……你轻些……”</p> <p>真君被她绞得一阵酥麻，满头大汗，住了挺弄，将她搂住又捏又揉，哄道：“爷省得。”止了半晌，待身下的动静过去了，这才徐徐抽插，待她承受得住了，又肏得狠些。那龙女久不经人事，初时有些钝痛，待进出通畅了，绵绵密密的快意几乎要将她裹住，不禁心驰神摇，咿呀应和，二人交合得畅快舒爽，只插得肉穴肉棒咕啾作响，淫液横流。</p> <p>鸳帐内热火朝天，郎情妾意，红烛高燃，满室靡香。那烛火几乎燃尽，杨戬被寸心缠住腰背，他抱住龙女，一转身，躺在她身下，教她坐在腰上，肉筋深深地顶进她体内去。</p> <p>她软乎乎的小腹白嫩光滑，身子里插入一根大棒，将她的小腹顶起，随着进出起起伏伏，触之心惊。龙女坐在那物上，摇晃着腰肢，套弄起来，汁液沥沥浇在他枪上，从交合之处淌下来，湿滑肌肤，水光潋滟。杨戬喘息粗重，不多时闷哼一声，已至精关，何况女子坐于上位，愈发激人，正肏弄间，忽然撑起身来，长长地哼了一声，将头埋入龙女的肩窝，肉筋一颤，射出一股浓浓的精液，弥散在龙女小腹中。他兀自抱紧了寸心，软在她怀里，被她揉着头发，二人躺到在床，喘着粗气，久久不息。</p> <p>这时的真君一向柔软可欺，敖寸心揉着他的脑袋，吻了吻他紧闭的双眼，将早早踢到床脚的褥子扯过来，遮盖住两人赤裸的身体，心中暗道他此刻还有伤，来日方长，以后再欺负他不迟。待真君喘息片刻，回过神，二人相视一笑，相拥睡去不提。</p> <p>第二日寸心起来时，杨戬还在她身边安安静静地睡着。</p> <p>她轻手轻脚地替他掖掖被子，然后爬到床头，在他紧闭的天眼上落下一吻。</p> <p>杨戬觉得很痒，睡梦中蹙了蹙眉。</p> <p>三公主被他逗得一笑，好心为他拨开额前杂乱的碎发，擦拭了睡梦中沁出的细汗，然后爬下床，回身挽好帐幔，悄悄地溜出了寝殿，跑回自己的小房间，只装作无事发生过。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/87.短篇-2021/061222.鸳帐.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,
