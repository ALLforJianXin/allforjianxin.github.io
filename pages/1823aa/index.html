有点生气是怎么回事？</p> <p>仁佑王殿下立时睡意全无，撑起了身子压过去。那厢龙女睡得沉，忽觉气息不顺，胸口处好似有座大山，迷迷糊糊睁开眼睛直伸手去推，又哪里推得动？</p> <p>左不过又将她夫君的火气提上一提，敖寸心觉着嘴被人堵上了，又热又闷，一阵湿热的气息扑面而来，惊得再也睡不住，挣扎着睁开眼睛，眼前的黑影看不清面目，熟悉的白檀香却告诉她身上压着的是个什么人。</p> <p>“你干什么呀，唔不要闹……嗯……”刚刚睡醒的小公主软软糯糯，嗓音好生可爱，直听进了二郎真君的心窝窝里头。</p> <p>欲望起了头就再也止不住，可怜敖寸心睡得迷迷糊糊不知所谓，就叫“登徒子”施为了一番。不过杨戬虽然表现得硬气，骨子里是个怕极了老婆的。这一点当然没有任何人敢挑明了说出来，他们夫妻俩自个儿也从没有意识到过这个事实。</p> <p>但是事实就是事实，杨戬在敖寸心被惹恼后的抓挠中败下阵来，一只手别过媳妇儿的下巴拯救了自己肩膀上的肌肉，认栽地试图跟她交流。</p> <p>“你怎地搞得我像个采花贼一般？”特别特别特别无奈，小蹄子真是欠收拾……敢咬人……不就是亲亲摸摸有什么大不了……那么多天不给他碰真真过分……好罢，确实是他先招惹的人家。</p> <p>杨戬在敖寸心的瞪视中败下阵来，些微心虚地摸摸她的脸，又凑上去亲一下，被龙女气极咬了回去。</p> <p>敖寸心动动身体，感受到了小腹上方压着的奇怪物件。她睡得好好的被弄醒了起床气很大，海中生物特别怕热，而杨戬作为一个阳气十足的男性神仙，他的作用基本上只有冬天可以体现出来，可是海龙又是极不怕冷的……</p> <p>三公主可管不了这么多，她现下只觉得被挨着好热，被杨戬压着更热，感受到他想要做的事情那一定会顶顶的热。</p> <p>拒绝的手伸到一半，皱着眉头抬头看了他一眼，唔，眼睛水漉漉委委屈屈的。</p> <p>三公主被折腾到现在醒了大半，起床气消下去以后也不是那么的不讲理了。而此时杨戬趁虚而入，在她心软的那一秒钟卡点插话：“你都多少天没让我碰了，今晚就让我抱着你睡，好嘛？”</p> <p>“那……那……就只准抱着，不许动手动脚的。”</p> <p>“好，好。一定，一定。”</p> <p>感受到小公主的乖顺，郎君忙不迭点头应答。</p> <p>听见他的承诺以后敖寸心安了心，抵着他肩膀将他从身上推回身边，同往常一般缩进郎君的怀里，环上他的腰，再撑不住又要睡过去。</p> <p>神智飘到一半，迷糊间只觉身边的人窸窸窣窣的骚扰她，轻轻扯她寝衣腰带，一点儿也没有要老实睡觉的意思。</p> <p>敖寸心在半梦半醒之间思绪慢慢转了一圈，才根据和杨戬成亲这些年来不分日夜练出来的危机感想明白了这个王八蛋想干什么。</p> <p>杨戬挨了一拳，被掐了腰眼上的软肉，疼得直抽气，慌忙求饶：“哎呦，你轻点儿啊，掐坏了还不是算你的。”</p> <p>“姓杨的，给我老实点儿。”</p> <p>姓杨的会妥协才怪。他扒拉下来龙女挠他的手，边抱着老婆哄边接着脱人衣服。</p> <p>“既然睡觉咱们就脱了衣服，什么也不做。你不是热嘛？别闹了乖乖的，你只管睡。”</p> <p>按理说敖寸心要相信他的鬼话才怪，但是她着实困的狠了，只不想再跟这胡搅蛮缠的骗子多说。听人这样讲也就顺这台阶下，由着他了。</p> <p>待她第三次被打扰，睡意已经远去，她再也不困了。</p> <p>小腹上那个东西灼人的很，衣裳早给郎君剥光了，因为不敢太大动作吵着怀中的睡美人，杨戬将那些衣物都堆在枕间。就比如他脸边的肚兜……</p> <p>这幅场景淫乱得很，青楼的风流郎君才会将姑娘的贴身私密之物亵玩于头脸。</p> <p>好罢，也就只有她一个人知道，伟岸的二郎真君究竟是个什么货色。</p> <p>这种事情他做出来不奇怪。</p> <p>“你别……嗯你烦死了！”她嘟着嘴扭动身体躲避那东西，可是不小心蹭得它愈发滚烫涨大，在杨戬似笑非笑的眼神里，本来不想生气的三公主彻底被惹毛了。</p> <p>“唉，”杨戬赶紧补救一下，他瞧着敖寸心炸毛的小动物一般，刚睡醒水灵灵的眼睛只觉得可爱。</p> <p>欲望浮上来浮上来浮上来。他娘的，杨戬心说，爷快要忍不住了。</p> <p>“寸心，寸心，乖乖的。”郎君摁住不老实的小龙，大手顺着她光滑如凝脂搬的肌肤滑倒她肩膀上，一使劲儿压进怀里，揽住她腰牢牢抱着。两个人没有一丝遮蔽的肌肤紧紧的贴在一起，那滋味……</p> <p>妙不可言。杨戬身上一股股热流冲到下腹，浑身都发烫。脑袋都憋得充血，说话愈发诱惑。</p> <p>“杨……杨戬……”敖寸心被他的反应也撩起了一些性质，不过仍然不想妥协。她轻轻地攀附郎君的肩膀将他往外推，“不要……嗯我不要……”</p> <p>“听……听话，哦……我就放在这里，我不进去，你乖乖的，乖乖的……”</p> <p>敖
