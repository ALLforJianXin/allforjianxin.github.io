x/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">原则危机<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>连日来的阴雨连绵不绝，阳光也透不出来一星半点。在家待得久了，三公主只觉闲得愈发腰酸腿软，总盼望着出去走上一走。</p> <p>恰有扑天鹰往瓦檐那处飞来，落地化作个男子，径往屋内行来。敖寸心眼尖，一眼瞧见他手中端持的请帖，登时高兴地迎了上去。</p> <p>“可是有人邀二爷吃酒嘛？”龙女兴奋地问。</p> <p>扑天鹰端端正正行了个礼，方才笑答：“正是金辨将军甲子天岁相邀，正待呈予主人的。”两人说笑间，已至内院。</p> <p>真君正端坐位上饮茶，待扑天禀明了事，施施然接过请帖，边徐徐展开，边道：“几百年不见，他倒还能想得起来我。”</p> <p>龙女见状忙抚上杨戬肩膀坐在他身旁，顺手接过桌上余茶饮了一口，才道：“金辨将军是何许人物？你封神战时的朋友么？”</p> <p>杨戬点头道：“正是。他本为商臣，只因阻修鹿台，被纣王剜了眼睛，这才投奔归周。”</p> <p>“啊？”寸心瞪大眼睛，“那他岂不是没有眼睛么，怎生去天廷做官？”</p> <p>“那自然有清虚道德真君替他……”杨戬稍顿，心中暗忖这娇娇龙女生而为神胆子却小，若叫她得知金辨将军杨任的相貌，晚上不免会有噩梦，随即改口：“替他重塑双目。”</p> <p>“哦……”寸心点点头，只觉这位将军也算苦尽甘来，正自思量，忽然回神，才想起自个儿的“正事”来。复又凑近些挽上丈夫的手臂，轻轻摇晃，口中求道：“杨戬，你带我去嘛～”这音色柔柔糯糯，听着能软了心窝。真君赶紧抬头往柱角瞧去，发现扑天鹰不知何时早溜得干净，才放下心来，侧身搂过寸心的纤腰，低声劝道：“下次再说，金辨将军你却不要见了。”</p> <p>“为什么？他同西海有什么仇么？”寸心眨巴着眼睛问。</p> <p>杨戬不太受得住她这个模样，忙抬头别过眼，试图同她解释：“那倒没有，只因他长得不大好看，怕你瞧了……会害怕。”对不起了杨任师弟。</p> <p>“哎，”寸心显然不接受这个解释，“你还真当我瞧人只瞧脸么？你且告诉我他怎生难看了，能将我也吓着？”说着她跪坐稍离，掰开杨戬的腿钻进他怀中去，搂上他脖子蹭了蹭，又求道：“你就带我去带我去带我去嘛——”</p> <p>杨戬好笑地抱紧怀里乱扭的团子，当做球一样揉了两下，哄道：“真不能带你去，若要什么我捎回来就是。放心，不过几个时辰，明日便回。”</p> <p>寸心哪是善罢甘休的，嘟起嘴拉下他颈脖，往他薄唇上啄了两下，“二郎～我就要去……唔……！！” (⊙o⊙)</p> <p>杨戬眯着眼将这作怪的小龙按在桌上吻了个天昏地暗 ，末了支起身来，拇指轻轻擦过嘴唇。</p> <p>“还要去么？”两手支在她身边威胁道。</p> <p>哪知寸心眨眨眼，猛地扑过来，把毫无防备的二郎真君扑倒在厚厚的长绒地毯上，小手抚上杨戬的脸，照他刚刚的轨迹擦过薄唇，美目一转，软下身子贴将上来。</p> <p>“寸心……”杨戬想要伸手，却被她轻轻地按回去。</p> <p>她凑近去亲他，边亲边糯糯地求：“让我去嘛，好不好嘛……”</p> <p>“不……你……”</p> <p>寸心小小地啧了一声，拿自己的鼻尖去蹭蹭杨戬的鼻尖，“带我去嘛……”</p> <p>“不，不行……我……”</p> <p>寸心蒙住他的眼睛，探入灵舌。香甜可口，曼妙已极。龙女身上的甜香包裹着杨戬，声音钻入耳中，更胜鲛人魅惑的歌声。真君迷迷糊糊暗忖，护体神功刻下怎地不灵了。</p> <p>“带我去嘛……”</p> <p>“……嗯……好……”</p> <p>——</p> <p>待寸心瞧见了杨任将军的尊容，小脸吓得煞白。</p> <p>杨戬施施然同兄弟打招呼，在别人瞧不见的地方轻轻拍了一下龙女的屁股，在老婆的瞪视中眯了眯眼。</p> <p>还得时不时治你一治。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/013015.原则危机.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/07/31, 22:37:15</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/db7d09/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">真不是海鲜过敏</div></a> <a href="/pages/0011db/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">纠葛</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
