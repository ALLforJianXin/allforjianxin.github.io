浅笑道：“都快做娘亲了，还想着玩儿！且莫要管甚具区，我问你，你和杨戬孩子都快生出来了，到底要瞒着叔父叔母到何时去？”</p> <p>寸心扬了扬眉，艰难地支起身子来，四公主连忙扶着她坐稳，“我出来玩儿三四年也是寻常的，父王母后不会起疑。等生了孩子，再回去也不迟。”</p> <p>四公主斥她说胡话：“胡闹！难道要瞒他们一辈子？”她见寸心咬着下唇一脸不情不愿，无奈地叹了口气，“你们俩到底是怎么想的？既然重新选择在一起，早日过了明路，将这婚给成了，那也就行了。何苦像如今这般拖着，你都身怀有孕了家里人还不知道！”</p> <p>寸心被她训得蔫哒哒地，可还是嘴硬道：“四姐，你可要帮我再瞒些时日。我保证，会告诉我父王母后的。”</p> <p>“寸心，”四公主有些担忧地看着她，“往日也就罢了，可是你……你都有了杨戬的孩子，你们二人本来就是夫妻，如今历经磨难在一起，叔父叔母疼你，不会怪你的。”</p> <p>三公主仍旧摇摇头：“四姐，你别劝我了，我心里有数。”</p> <p>看她如此坚持，听心长叹了一口气，只好作罢。目光移到她凸起的肚子，又忍不住再劝了一句：“可是孩子……”</p> <p>“四姐，”寸心挠挠她的手心，“谁说有了孩子就一定得成亲的？咱们可是神仙，不搞凡人那一套。成亲以后诸事繁琐，真不如一个人自由自在。”</p> <p>“你真的不愿意和杨戬成婚？”敖听心带着点儿威逼利诱的味道询问道。她看得分明，这小丫头满腔情丝仍旧挂在杨戬身上，二人自新天条出世以来，几乎费尽心思黏在一起。她们这帮旧友本以为好事将近，等了十几年，却仍旧没接到二人的请柬。四公主思及这两个冤家是碍于西海龙王等人与杨戬的隔阂，这才迟迟不肯复婚，几次提出要从中作保，却皆被寸心婉拒了，如此也闭口不提。可现如今，寸心已经怀有身孕，再过几个月便要生产，此时还一个劲儿地抵触此事，实在有些不大对劲儿了。</p> <p>只见寸心一扭头，孕期的小脸白里透红，被杨戬养得滋润极了，即使作出生气的表情，嗔痴间也风情万种，如暖风拂面。她哼了一声，切切说道：“不愿意！”</p> <hr> <p>与四公主道别后，寸心便由婢女扶回暖阁午睡，正是迷迷糊糊地，困得浑身酥软之间，忽然感到身边有个暖炉靠过来，极其轻柔地抱住她的身子，将她圈入臂弯之中。寸心闻到他身上的白檀香气，顿感心安，呢喃着找了一个舒适的姿势，窝在他怀里渐渐睡去。</p> <p>孕中嗜睡，但觉浅，总是一段段地歇。寸心只睡了半个时辰便悠悠转醒，在杨戬怀中蹭了蹭，惺忪地去亲他。待吻过睁开眼，这才发现他原来一直醒着，默默看着她，大手拨开她颊上的碎发。</p> <p>龙女有些脸红，却抱着他愈发贴近了一些。她自有孕，一改从前畏热的体质，极为贪暖，十分喜爱真君这樽体贴的暖炉。将面颊贴在他心口处，感受他蓬勃的心跳声，只觉得无比心安，浑身都暖融融地。</p> <p>见她如此，杨戬心中却愈发地困惑：“既然如此依恋，推拒成婚又是为哪般？杨戬这么令她讨厌嘛？”</p> <p>他今日处理完公务便到后花园去，正巧听见姐妹俩的对话。</p> <p>“你真的不愿意和杨戬成婚？”</p> <p>“不愿意！”</p> <p>这三个字在他心头狠狠地扎了一刀，怔在当场。这些年来，他与龙女重归于好，浓情蜜意更胜当年，只是每每提出成婚，她总是默不作声地敷衍掉了。实在敷衍不过去，被他逼急了，她就随意找些小故与他争吵。杨戬好不容易与她破镜重圆，又怜惜寸心为他受过颇多苦难，怎么舍得她再伤心？因此不过争执三言两语，必定服软道歉，柔声哄慰，再也不敢多提。</p> <p>可如今，他们已经有了孩子，就因着讨厌杨戬，她连孩子的面子也不愿意给，怎样也不肯成亲吗？</p> <p>杨戬看着她娇美的脸，忍不住圈紧了一些，却被寸心挠了一爪子，嗔他道：“毛手毛脚地，可仔细压着你闺女！”</p> <p>寸心打掉他的手，支起身子欲要下床，忽然被热烘烘的暖炉贴上来一拢，嗯了一声，软软地靠回去。杨戬跟着她起身，贴在她身后复又环住她，脑袋搭在她的肩上，他埋首吻了吻她的雪颈。</p> <p>龙女只道他是想和自己亲昵，左右无事，便靠在郎君胸膛上侧过头来与他亲吻了一阵子，正唇齿交缠间，忽然想到床侧的窗户没掩上，一时间羞怕路过的丫鬟瞧见，略推开他想起身去关个窗户。</p> <p>白嫩的脚丫在空中晃了两下，还没趿到绣鞋，忽然又被杨戬一把捞了回去，紧紧地贴了上来，抱着她不肯撒手。寸心嘤咛一声，反手摸了摸他的脸，“今天怎么那么黏人呢？”</p> <p>杨戬默然不语，只是有一下没一下地吻她的头发，大手托住她圆鼓鼓的肚子，掀开里衣熟稔地滑进去。寸心懒洋洋地娇哼一声，微微推拒着，“窗户……没关好……”</p> <p>哐当一声，是杨戬运了法诀击去叉竿的声音。龙女正沉浸在他的温柔当中，听得一惊，灵台顿时一片清明，这才察觉出几分不对劲儿来，皱起秀气的眉头与他分开一些，转过头来问道：“怎么了？”</p> <p>杨戬抿了抿唇，定定看了她一眼，固执地摇了摇头，憋出两个字：“没事。”可那面上紧绷着的线条、故意躲开她眼神偏向别处去，可不像是没事的样子。</p> <p>龙女以为是他公务上遇见甚么烦心事，小手搭上他的心口揉了揉，体贴他道：“是不是累了？二爷若有事要忙，不必老是窝在这里陪我的。”</p> <p>杨戬听得胸口一窒，回过头来审视她的眼睛，忍不住反问道：“你就那么不想看见我？”</p> <p>寸心听得莫名其妙，“你说的是甚么话？”她性格本就娇蛮些，如今在孕中，更是受不得一丝闲气，愈想愈是生气，“我关心你两句，你阴阳怪气些什么！仔细收一收司法天神的官威，没得叫我娘俩胆寒！”拐开他的手，自他怀里挣了出来。</p> <p>杨戬一看她生气了，哪里还顾得上自己，连忙伸手护在她周围，柔声哄道：“没有，没有，没有阴阳怪气。好寸心，别生气，我混账，不该说这些，仔细孩子——”</p> <p>“谁要给你生孩子！”寸心顺手揪起一旁的软枕，照他怀里砸了几下，“臭杨戬！臭杨戬！不给你生孩子！不给你生！”</p> <p>真君直愣愣地站着，生怕偏去一星半点，被她断定为躲闪，又生一场大气。“好好好……怎样都好……咱们不生气了好嘛？改用拧的好不好？待会儿该手疼了……”</p> <p>杨戬搂着她哄了大半日，寸心这才渐渐消了气，躺在他怀中有一搭没一搭地吃着葡萄干。此时突如其来的不爽快发散出去，忽然又觉得方才的杨戬多多少少有些可怜，于是将他喂过来的葡萄干卷在舌中，支起身子吻他，唇齿交缠间轻轻咬开，二人口中瞬间溢满了甜腻腻的味道。</p> <p>缠吻了一会儿，寸心与他微微分开一些，一点他泛红的鼻尖，正欲开口说话，却又教杨戬缠上来亲了又亲，她唔唔了几声，还是沉浸于他激烈的热吻当中。</p> <p>寸心一双柔荑搭在他肩上，随着二人情欲的不断蒸腾不自觉滑到他颈后交织在一起，满心只愿亲密无间，一寸也不愿分离。杨戬嚅着她的舌间逗弄了一会儿，只觉得这嫩肉红唇分外温软，忍不住深入其中，含住她间或一吸。龙女最是受不得他这番挑逗，急促地娇呼一声，二人脑海中皆闪过一阵白光，竟激吻得眩晕了一会儿。</p> <p>寸心软了身子挂在他怀里，察觉到杨戬的手已经不知何时伸到衣衫之中，隔着小衣覆在她胸前，不由得轻哼一声，隔着外衫按住他欲要作乱的大掌，“嗯……大白天的，你干甚么坏事呢……”</p> <p>“干甚么……”杨戬在她耳边低笑，“干你。”正耳语间，他隔着薄薄的小衣揉起她软嫩的乳肉。寸心生得本就不小，有孕之后，不止肚子大了，胸前的两团雪乳也像吹气似的涨了起来，对雄性的需求愈发迫切，可便宜了这色欲重的郎君，每日流连于两峰傲人乳肉之间，乐不思蜀。</p> <p>他极其熟稔地揉捏着她的双乳，不一时搓开小衣，十指陷进乳肉当中去，只觉得温软至极迷恋不以，愈发用尽浑身解数爱抚她，只弄了一小会儿，龙女已经身酥骨软，吐气如兰，娇生生地按住他摸向腹下的手，“不……不行了……二爷轻一些……疼疼我……”</p> <p>杨戬的声音也沙哑，“好，二爷疼你。”埋首含住她的耳垂轻轻吮吸着，大手敷在她圆滚滚的孕肚上安抚了几下，愈往下去拨开寸心的双腿。</p> <p>“嗯……嗯……杨戬……”她轻哼着，时不时用脑袋蹭一蹭郎君的肩窝，声音压得又软又糯，和他撒着娇。杨戬探到她的腿心，发觉已然濡湿了。如此将她的衣裤脱下一小截，露出白花花的双腿，又生怕她的小腹受凉，扯了丝巾来盖住。这一小会儿的功夫，龙女已是经受不住，软了腰肢贴向他，频频去吻他的锁骨，讨好地求道：“二爷给我……寸心想要了……”</p> <p>真君侧过头去亲一亲她的额头，手指点在她最为敏感的小豆豆上，缓慢地绕着圈，他常年握刀的手长满了厚茧，龙女细皮嫩肉地，怎生遭得住？只觉眼前一阵一阵地发黑，咬着一口贝齿难耐地呻吟，“不行了……不行……别……别弄了……给我……二爷给我……”说到最后，已是带了哭腔。</p> <p>他不慌不忙地将她稳妥圈好了，任凭龙女如何挣扎也伤不着自己，手指在她私处作乱弄得蜜水潺潺，满手湿漉漉地，间或往那充血的小凸起上一摁，龙女短促地娇叫一声，腰肢欲要往上一挺，又被他轻柔地拉回来继续“折磨”。</p> <p>寸心双腿被迫大开，承受着他的亵玩，又觉身后贴着一根又热又大的粗棒，心中清楚那是何物，心中爱恋渴望至极，几乎就要崩溃。求告无门，只得小幅度地蹭它，感到身后的男人呼吸一窒，娇哼得愈发动人，“二爷……快给我好不好……寸心，寸心快不成了……嗯……啊……二爷……好哥哥，快干我啊……”</p> <p>杨戬温香软玉满怀，见妻子满面红润，娇态毕显，也忍得辛苦，本想再支撑半刻，好一吐心中郁结，可瞧着寸心可怜巴巴的娇颜，甜糯的小音不住地恳求他的疼爱，心头一软，沉声道：“好……这便……”他没将话说完，而是一把拉开纨绔，将那紫黑色
