大的珍珠网，将露华点在珍珠上，秋集时罩在天上比作星辰，好看极了！四姐，你去看了不曾，真有那么漂亮吗？”寸心靠在四公主肩头，双眼亮晶晶地看着她，一手握着暖手炉，一手扶着自己圆滚滚的肚子，尽量挪到一个舒适的角度靠坐。</p> <p>四公主为她打着扇，浅笑道：“都快做娘亲了，还想着玩儿！且莫要管甚具区，我问你，你和杨戬孩子都快生出来了，到底要瞒着叔父叔母到何时去？”</p> <p>寸心扬了扬眉，艰难地支起身子来，四公主连忙扶着她坐稳，“我出来玩儿三四年也是寻常的，父王母后不会起疑。等生了孩子，再回去也不迟。”</p> <p>四公主斥她说胡话：“胡闹！难道要瞒他们一辈子？”她见寸心咬着下唇一脸不情不愿，无奈地叹了口气，“你们俩到底是怎么想的？既然重新选择在一起，早日过了明路，将这婚给成了，那也就行了。何苦像如今这般拖着，你都身怀有孕了家里人还不知道！”</p> <p>寸心被她训得蔫哒哒地，可还是嘴硬道：“四姐，你可要帮我再瞒些时日。我保证，会告诉我父王母后的。”</p> <p>“寸心，”四公主有些担忧地看着她，“往日也就罢了，可是你……你都有了杨戬的孩子，你们二人本来就是夫妻，如今历经磨难在一起，叔父叔母疼你，不会怪你的。”</p> <p>三公主仍旧摇摇头：“四姐，你别劝我了，我心里有数。”</p> <p>看她如此坚持，听心长叹了一口气，只好作罢。目光移到她凸起的肚子，又忍不住再劝了一句：“可是孩子……”</p> <p>“四姐，”寸心挠挠她的手心，“谁说有了孩子就一定得成亲的？咱们可是神仙，不搞凡人那一套。成亲以后诸事繁琐，真不如一个人自由自在。”</p> <p>“你真的不愿意和杨戬成婚？”敖听心带着点儿威逼利诱的味道询问道。她看得分明，这小丫头满腔情丝仍旧挂在杨戬身上，二人自新天条出世以来，几乎费尽心思黏在一起。她们这帮旧友本以为好事将近，等了十几年，却仍旧没接到二人的请柬。四公主思及这两个冤家是碍于西海龙王等人与杨戬的隔阂，这才迟迟不肯复婚，几次提出要从中作保，却皆被寸心婉拒了，如此也闭口不提。可现如今，寸心已经怀有身孕，再过几个月便要生产，此时还一个劲儿地抵触此事，实在有些不大对劲儿了。</p> <p>只见寸心一扭头，孕期的小脸白里透红，被杨戬养得滋润极了，即使作出生气的表情，嗔痴间也风情万种，如暖风拂面。她哼了一声，切切说道：“不愿意！”</p> <hr> <p>与四公主道别后，寸心便由婢女扶回暖阁午睡，正是迷迷糊糊地，困得浑身酥软之间，忽然感到身边有个暖炉靠过来，极其轻柔地抱住她的身子，将她圈入臂弯之中。寸心闻到他身上的白檀香气，顿感心安，呢喃着找了一个舒适的姿势，窝在他怀里渐渐睡去。</p> <p>孕中嗜睡，但觉浅，总是一段段地歇。寸心只睡了半个时辰便悠悠转醒，在杨戬怀中蹭了蹭，惺忪地去亲他。待吻过睁开眼，这才发现他原来一直醒着，默默看着她，大手拨开她颊上的碎发。</p> <p>龙女有些脸红，却抱着他愈发贴近了一些。她自有孕，一改从前畏热的体质，极为贪暖，十分喜爱真君这樽体贴的暖炉。将面颊贴在他心口处，感受他蓬勃的心跳声，只觉得无比心安，浑身都暖融融地。</p> <p>见她如此，杨戬心中却愈发地困惑：“既然如此依恋，推拒成婚又是为哪般？杨戬这么令她讨厌嘛？”</p> <p>他今日处理完公务便到后花园去，正巧听见姐妹俩的对话。</p> <p>“你真的不愿意和杨戬成婚？”</p> <p>“不愿意！”</p> <p>这三个字在他心头狠狠地扎了一刀，怔在当场。这些年来，他与龙女重归于好，浓情蜜意更胜当年，只是每每提出成婚，她总是默不作声地敷衍掉了。实在敷衍不过去，被他逼急了，她就随意找些小故与他争吵。杨戬好不容易与她破镜重圆，又怜惜寸心为他受过颇多苦难，怎么舍得她再伤心？因此不过争执三言两语，必定服软道歉，柔声哄慰，再也不敢多提。</p> <p>可如今，他们已经有了孩子，就因着讨厌杨戬，她连孩子的面子也不愿意给，怎样也不肯成亲吗？</p> <p>杨戬看着她娇美的脸，忍不住圈紧了一些，却被寸心挠了一爪子，嗔他道：“毛手毛脚地，可仔细压着你闺女！”</p> <p>寸心打掉他的手，支起身子欲要下床，忽然被热烘烘的暖炉贴上来一拢，嗯了一声，软软地靠回去。杨戬跟着她起身，贴在她身后复又环住她，脑袋搭在她的肩上，他埋首吻了吻她的雪颈。</p> <p>龙女只道他是想和自己亲昵，左右无事，便靠在郎君胸膛上侧过头来与他亲吻了一阵子，正唇齿交缠间，忽然想到床侧的窗户没掩上，一时间羞怕路过的丫鬟瞧见，略推开他想起身去关个窗户。</p> <p>白嫩的脚丫在空中晃了两下，还没趿到绣鞋，忽然又被杨戬一把捞了回去，紧紧地贴了上来，抱着她不肯撒手。寸心嘤咛一声，反手摸了摸他的脸，“今天怎么那么黏人呢？”</p> <p>杨戬默然不语，只是有一下没一下地吻她的头发，
