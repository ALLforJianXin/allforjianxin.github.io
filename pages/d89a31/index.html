样了……你要嫁我的……”</p> <p>寸心喷地一笑，尽量不压到肚子，用力地圈住他，只是他身形太健硕，实在圈不进怀中，“好好好……嫁给你还不行嘛……”</p> <p>郎君埋首在她肩窝里，抱着她摇了摇，“真的？”说着抬起头来吻她，“真的嫁我？寸心……唔……”</p> <p>两人腻歪着亲了很久，寸心艰难地将身子转过来与他面对面，又要顾着肚子，待寻到一个省力又舒适的姿势时，已是气喘吁吁。</p> <p>杨戬忍得更加辛苦，双手扶着她，别过脸去喘粗气。自从寸心有了身孕，孕中对情事愈加渴望，每每交合时，杨戬都强耐着性子，将龙女伺候得舒舒服服，却丝毫不敢动弹一二，生怕伤着她和孩子，实在折磨等很。</p> <p>寸心跨坐在他身上，这个姿势入得很深，她咬牙适应了一会儿，穴中的嫩肉被他挤得直发痒，忍不住一阵痉挛，绞得他失声一哼，满头大汗。</p> <p>她憋着笑靠过去亲亲他，小手摸着他的脸渐渐滑下来，戳着他的喉结打转。她靠过去吻他的锁骨，撒娇道：“肚子都被你搞大了，不嫁你，还嫁谁？”</p> <p>杨戬险些破了功，苦笑着大喘粗气，轻捏她的臀肉，“我的小祖宗，求你少撩拨我……我快撑不住了……”</p> <p>“那我说嫁你，你怎么一点儿不见兴奋？”寸心故意咬了他一口，在杨戬的锁骨上留下一小排牙印。</p> <p>“兴奋的，”他动情地吻着她的发顶，“兴奋得快要晕过去了。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/100400.嫁给你还不行嘛.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a><a href="/tags/?tag=%E5%AD%95%E6%9C%9F" title="标签">#孕期</a><a href="/tags/?tag=%E5%AD%95%E8%BD%A6" title="标签">#孕车</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/23, 15:07:57</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/ac259f/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">见龙</div></a> <a href="/pages/b4a4e4/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">原形毕露
