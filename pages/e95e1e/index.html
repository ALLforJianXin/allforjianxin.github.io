家中已经很多天，说是要到华山来寻找失踪十六年的父亲兄长，实则是找一个正当的理由闯荡江湖，游戏人间。没成想刚上山就遇见一伙打家劫舍的盗匪，觊觎华山山洞中的珍宝，丁香远远躲在一旁的岩石上，只怕还未成为绝世女侠，小命就先折在此处，实在不值。</p> <p>那伙喽啰却十分命短，虎头虎脑地一伙儿冲进去，结果被山洞前的法阵嗖的一声化为了飞灰。</p> <p>丁香被吓得一个激灵，正要躲开，然而忽然察觉身后有脚步声，连忙躲到石前。那人凑近些许，好像发现了她，侧过身一探头，猛然见到戴着一张青面獠牙面具，披头散发的小姑娘张牙舞爪地向他吼：“大嘴猛怪，见人就吃！”</p> <p>来人正是二郎真君，他因政务心中正不忿，想来探望妹子，只望她迷途知返，可暗自晓得不过又是一场争吵，只觉心力交瘁，此时陡然出现一个不识好歹的凡人，登时心火愈盛，随手一挥，天眼现出一缕凌厉的流光，咔嚓一声击碎了青衣女子的面具。</p> <p>那蓝色的碎片散开，一阵山风吹来，将她披散的碎发掀起，一张早已沉浸在记忆长河中永远沉睡的脸，撕破了时间的阻隔，从杨戬心底血肉模糊的泥潭穿溅而出，血淋淋的展现在他眼前。天神的思绪忽然有些模糊，眼前的人，令他陡然回忆起三千年前的西海海岸，也是这样一个女孩子，隔着重重的轻纱，美丽的脸颊若隐若现。她的脸和面前的这个人重叠起来，是他刹那间分不清今夕何夕。</p> <p>只可惜这样复杂的思绪只在他心中停顿了一刹那，那个人早已经神魂俱灭，他亲手将她的身躯封入冰棺中，如今她一个人，孤零零地躺在极深极暗的西海之底，自从她死的那一刻，杨戬的心也死了。他将自己最后作为人的情感与她一起埋葬在海底，从今往后的七百年，他做惯了冷冰冰的神明，再也没有一丝温暖和情感，执掌三界间的生杀予夺。</p> <p>“变戏法的？你那只假眼睛是什么在发光！抠出来给我看看……”她没有说完，就被杨戬一把拉住手腕。他目光深邃，看着眼前这张熟悉的脸，理智叫嚣着这个人的危险，应该将她直接杀死，可是他已经冷寂了七百年的心，被那惊鸿一面勾出的回忆所占据。</p> <p>他目光灼灼，迟迟下不了手。</p> <p>——</p> <p>丁香被梅山老大小心翼翼地赶走了，梅老大看似为真君着想，实则算是救了她一条小命。杨戬强压下心中的激荡，做完下界的事情，返回天界，又在瑶池走了一趟，回到真君神殿，只觉得心力交瘁。</p> <p>神殿后花园中有一处杨戬亲手操持的暖阁，从来不许任何人进入，真君亲手浇水施肥，在此栽种了一株丁香花。</p> <p>想当年，杨戬为了讨夫人欢心，亲手折下一株丁香回家赠予她。当时的敖寸心高兴极了，软磨硬泡要与他一同栽种一颗丁香花树，如此小事，杨戬怎能不依？二人缠缠绵绵地共手栽下这株花树，初时寸心对它极上心，每日悉心养护，没过多久，那没耐心的小龙女便觉着没什么意思，放手丢开。真君大人只好独自承担起养花的这一重任，直到二人和离，龙女再没有想起这一茬儿事情，杨戬将它移栽到天上，每日总要抽出那么一小会儿亲手打理，唯恐假手于人，花便被养死。</p> <p>杨戬上天做官拢共七百年，这颗花承载了真君老爷亲手灌溉的甘泉，灵气充沛，长得枝繁叶茂，生机勃勃。即使偶尔疏忽，也已能自行摄取养分，茁壮生长。然而十六年前，花树忽而不开花了，真君老爷苦思冥想，问便三界植物达人不得其法，一度心情复杂。哪里晓得今日下凡，陡然遇见一位叫做丁香的小姑娘。</p> <p>真君额上生天眼，能看破世间妖魔诡谲，真理道法，自然能够认出，此乃他府中那棵丁香花的花灵脱胎下凡，生成人形，应历一世尘缘劫，也好修成正果。杨戬摇着折扇，孤零零地一个人坐在不再开花的花圃暖房中，心头是一片片的荒芜。</p> <p>就像当初他留不住敖寸心一样，就连一株花，他也是留不住的。</p> <h2 id="【2-桃花林】"><a href="#【2-桃花林】" class="header-anchor">#</a> 【2.桃花林】</h2> <p>涂炭多年的华山，一夜之间，陡然开满了鲜花。那一片桃林最是抢眼，泉林之间，既有青翠欲滴，又有粉嫩灼华。从前三公主最喜欢桃花，喜欢拉着杨戬一同坐在桃花树下，将昔年埋在树下的瓦罐挖出，共煮一杯桃花酒。这种时候他们两个从来不会吵架，寸心靠在杨戬的肩头，和他一同赏开满山野的桃花，花瓣落在他们的肩头，心中一片安宁与祥和，没有龃龉，没有龌龊。杨戬总是在想，或许寸心心中也和自己一样，都在这一刻感受得到他们之间美得令人奋不顾身的爱吧。</p> <p>真君老爷正沉浸在回忆中，忽然一阵悦耳的笑声将他打断。他心头有些恼火，正想将不知死活的来人捏扁，天眼查探处，原来是一株误入了桃花林的丁香。</p> <p>杨戬推开房门，迎面遇上了小跑过来的丁香。她倒是一点儿也没有闯进别人领地的自觉，反而十分地自来熟：“是你，变戏法的！”</p> <p>她的声音很清脆，像婉转鸣啼的黄鹂鸟。淡淡的阳光洒在她的脸上，粉腮柔面，未出阁的女孩子，脸上的绒毛软乎乎地，笑起来美艳不可方物。杨戬心中一软，回想起前些天初遇她时，自己是如何掩饰不住地气急败坏，心头麻痒间，眼睛直勾勾地盯着她的脸，缓缓抬起左手，正要狠下心肠除掉这个不可预测的变数。如果不是梅山老大及时劝阻，这朵小丁香花恐怕早就香消玉殒了。</p> <p>自己已经杀了她的父亲和兄长，再没有道理害她性命。想到此处，杨戬轻声一叹。听她在耳边叽叽喳喳，“你是神仙吧！这座山是你变的吗？”</p> <p>他分明在她眼底看出了闪闪发光的崇拜。杨戬情不自禁地想起，以往敖寸心不和他置气的时候，偶尔也是会用这样的眼光看他的，偶尔也是会这样缠着他不放的。</p> <p>真君心底一沉，折扇在手心轻轻敲了一下，硬起心肠，呛声道：“你怎么又来了？”</p> <p>丁香活力十足地一揖：“请你收我为徒！”</p> <p>杨戬也不睬她，径直走下台阶，想不到小丫头锲而不舍地追上来，又是一揖：“请你收我为徒吧！”</p> <p>他将目光转到遥远的天际，一抹淡紫色的光闪过——嫦娥就要来了。如果不立即做好准备，三妹思凡被捕的事情就要败露。现在还不是一个合适的机会，只有等沉香在多走一段路，多遇见一些事情，多长一些本事，他才能施展自己的下一步计划。他回首看见丁香，那熟悉的容颜又一次侵入眼帘，上一次他说什么来着？送她下山，再有下次，我不会再这么客气。</p> <p>杨戬已经很久没有遇到过这样不怕自己的人，曾经有一个，敢在他生气的时候叫板，敢和他吵架，甚至敢动手打他，她讨厌嫦娥，讨厌自己对她冷漠，讨厌自己不把她放在心中。</p> <p>真君已经很少想起这些事，但既然想起来，也还是很想替自己辩解一句：我没有。</p> <p>杨戬长叹一声，放软了语调，说道：“赶快下山去吧。”</p> <p>“你不收我为徒，我就不下山！”小姑娘居然得寸进尺耍起了无赖。杨戬暗自反思，难道自己对她真的太过宽容，以至于她竟以为二郎神是什么宅心仁厚的神仙，会被这样的小把戏威胁到吗？</p> <p>他睇她一眼，手腕翻转，将折扇一旋，抵在丁香额头，一阵华光闪过，将她变作一块大石。</p> <p>做完这一切，也不管石头花的死活，收了折扇，走回屋中。奈何在桌前坐了半晌，饮了冷茶，心续杂乱而不能平复。已经刻意去忘记了几百年的脸，忽然出现在自己面前，成天晃来晃去，挥洒着自己的灵动可爱，任谁都不会无动于衷吧。杨戬悲哀地想，能不能再多看一眼她睁开眼睛的样子，多看一眼，也不至于会扰乱大事的吧？</p> <p>没有杂事可吵的时候，敖寸心也曾拉着他，一齐到茶楼戏园中听曲儿。此事是杨戬所长，他曾在灌江口的大街小巷穿梭玩闹，于此市井之规信手拈来。龙女是深海中的公主，不晓俗世，于此十分好奇，待兴致起时，也曾学那戏子咿呀吟唱：</p> <p>“你我相约定百年，谁若九十七岁死，奈何桥上等三年。”</p> <p>……谁若九十七岁死，奈何桥上等三年。</p> <p>杨戬伸出手，竟不知觉冰凉的泪水已沾了满脸。</p> <h2 id="【3-真君神殿】"><a href="#【3-真君神殿】" class="header-anchor">#</a> 【3.真君神殿】</h2> <p>杨戬终究心软，不舍这株丁香鲜活的生命化作顽石，枯度几十年光阴，凄凉地死去，思量许久，只将折扇一展，将她完完整整地送回了家。</p> <p>瑶池金光灿灿，瑞气千条，这些年他一向刻薄狠辣，官场沉浮，多见诡谲狡诈，于此正义凛然的宝殿之中栖身，只觉得世事如一场大梦，纸醉金迷昭华流光，内心却干枯得宛如死木，于道貌岸然一途修炼得愈发精深。近日追捕沉香，罕见地得以接触几位如初升朝阳的青年人，未免被他们蓬勃的生气感染，变得有些多愁善感起来。</p> <p>可惜令人烦忧的是，那朵小丁香花也不期然搅和了进去，令杨戬感到十分头疼。</p> <p>诚然他已心如死水了七百年，如今麾下棋局已至重中之重，再没有什么东西能够阻挡他的大计。待一切归尘归土，他也终于可以卸下肩膀上这厚重的担子，回到他心心念念的海底，陪着她永远沉睡。这是他宿命中的归途，他期盼了七百年的结果。</p> <p>在她死后的七百年中，杨戬其实很少想到她，也从未在梦中见过她的模样。日子还是照旧一天天过去，神殿中案头的奏折来来去去，多得是令人烦心的事务，没有任何东西会因为她的离去而停留。他寂寥的身影披盔带甲枯坐在真君神殿的宝座之上，四下里安静得落针可闻，杨戬没有感受到孤独，因为心头早已麻木，没有波澜，没有哀愁。</p> <p>当一个人感受不到痛的时候，他的灵魂其实早已离开这个世界，只剩下身躯在苦苦支撑。</p> <p>杨婵还陪在他身边的时候，对他麻木不仁的态度十分担忧。她也曾言语劝解，可是杨戬早已练就油盐不进之功，无论她怎么入情入理，真君只会回答：“你不必担忧，我根本不觉得难过。”</p> <p>是真的不难过吗？</p> <p>杨婵劝他：“不如我替兄长将记忆抹去，从今往后，也好……”</p> <p>“三妹，”杨戬打断她，“一个人的记忆可以被法术抹去，可是世间没有任何一种法术，可以抹去感情。”</p> <p>如果抹不去感情，怎么可能不难过。</p> <p>杨戬的性情愈发暴虐无常，就算是最亲近的兄弟也琢磨不透他的心思。哮天犬偶尔办砸了事，即使错不在他，也免不了杨戬一场责难。他习惯于在玉帝王母面前曲意逢迎，在天廷百官面前耀武扬威，人人都恨他，人人都骂他，可是杨戬不在乎。</p> <p>与他看来，这个世界上，早就没什么东西可在乎了。</p> <p>——</p> <p>一路上，杨戬几次险些控制不住自己的情绪，沉香不知死活，时常惹怒他，他有时候几乎要出手将他打死，只不过理智仍在，心魔始终被牢牢地压在心底。他将“杀”字放在嘴边，无论是东海四公主，还是万窟山与他曾有渊源的小狐狸，只要挡了他的路，就没什么是非曲直可言。他恨这小子竟敢拿感情要挟别人，恨他妹妹的这些故交们一个个都那么爱管闲事，恨她们敢拿虚无缥缈的传言败坏自己的名声，纵使他已根本没有什么好名声可言。他一边怨恨她们，一边却顺其自然地利用她们，二者从不冲突。</p> <p>在净坛庙里，杨戬又一次见到那张令他朝思暮想的脸。</p> <p>假如没有丁香的出现，杨戬恐怕会在日复一日的奔劳中将他与敖寸心之间零零碎碎的琐事渐渐遗忘，等到他终于将杂物摆平，想要从记忆中抽出那么一两件安逸温暖的事情反复回忆咀嚼的时候，他会不知所措地发现，自己的世界早已一片苍白。可是她出现了，长着一张与敖寸心一模一样的脸，这让杨戬感受到前所未有的恐慌。因为他真切地感受到了记忆的流逝，身旁的故人们大多对丁香的样貌见怪不怪，顶多就是觉得熟悉与谁人相似，毕竟八百年的光阴足以让人遗忘很多事情，其实杨戬很想亲口问他们一句：“难道你不记得了吗？这是寸心啊！”</p> <p>这是寸心啊，她曾经将杨戬从西海里救出，曾经挽回了数万条差一点儿被弱水吞噬的生命，曾经在他面前提着裙摆转圈圈，在初春暖融融的阳光下脆生生地问他：“杨戬，你说要和我成亲，真的不是骗我吗？”</p> <p>怎么，你们那么轻易就不记得她了呢。</p> <p>时间好像在抹平一切她存在过的痕迹，有时候杨戬也会恐慌地发现，有一些他本该牢牢印在脑海中的过往，居然也开始松动掉落。在遇见丁香之前，他可以地不去想她，在遇见丁香之后，他却惶恐不安地开始搜集他们之间过往的所有回忆。</p> <p>——</p> <p>刘彦昌被囚禁在真君神殿，日夜受刑，杨戬单吊着他一口气来折磨他，就是因为故意不想他好过。他从繁杂的朝堂上脱身时，如若在嫦娥、王母等人面前受了气，就一定会提起镶满倒刺的皮鞭给刘彦昌加一顿餐。都是因为这个下贱的凡人，所以自己的妹妹才会迫不得已搅入这场令人窒息的谋划之中。</p> <p>嫦娥貌似还对他所谓的“爱心”有所期待，下了朝会，在凌霄宝殿的侧门处拉住他，对他一阵劝告。</p> <p>杨戬罕见地瞪了两眼她攀在自己胳膊上的手，只不过他情绪的波动太快，仙子并没有辨认出他晦涩难懂的目光当中那一抹不安。其实当时的真君在想：“假如给敖寸心知道，恐怕又要生一场闲气。”</p> <p>只可惜，就连这个小小的烦恼，都已成为镜花水月，只是虚妄罢了。</p> <p>刘彦昌是个硬骨头，总有吃了熊心豹子胆的勇气来挑衅他。杨戬暗自寻思，果真是有其父必有其子，刘彦昌和沉香一样讨厌，总能无端端揭开他深埋在心底的伤疤。当他被杨戬抽得满身伤痕，也能够用他自以为恶狠狠鄙夷的目光瞪着因为方才发泄了一番苦闷而面露快感的杨戬，颤声发笑。</p> <p>杨戬稍显诧异地看了他一眼，面色是万年不变的森然，刻薄道：“你居然还笑得出来？”</p> <p>刘彦昌喘息着咳出一口血，笑道：“你是不会懂的，”说罢侧目看了一眼他，又道：“像你这样的禽兽，你永远不会懂的。”</p> <p>杨戬几乎要笑出声来，丹田内翻涌的灵力昭示着他波澜不惊的外表下激荡的心神，他稍显失态，半眯着眼，死死盯着刘彦昌：“我不会懂？”他迈步走过伤痕累累的刘彦昌，眼底是一片片的寒霜，“因为你知道，我把三圣母压在华山下受苦。我给你带来的皮肉之苦，会让你觉得在和三圣母承受一样的痛苦……”他闭上眼睛，心底浮现出那孤独等候在西海海底的冰凉的身影，迟到了七百年的痛苦在此刻莫名其妙地席卷了全身，杨戬的手抑制不住地颤抖，他绝望地凝视着穿透神殿窗棂照印着森森然刑具的寒冷月光，开口如金玉相击，声音回荡在这空荡荡的天牢里，孤独而寂寥：“你以为，只有你们懂得什么叫情，什么叫爱吗？”</p> <p>一滴泪水悄无声息地落在满是灰尘的地板上，这撕心裂肺的疼痛，他已经刻意遗忘七百年，可却也实实在在地痛了七百年了。</p> <p>他背对着刘彦昌，私牢中阴沉沉地，没有烛火，刘彦昌根本察觉不到杨戬情绪的变化，只是摇了摇头，说道：“我真是小看了你杨戬，没想到你连这都懂。你懂的可真不少啊，可我又不明白了，你若是从来不懂也罢了，懂又做出这样恶毒的事情来，你真是连禽兽都不如！”</p> <p>——</p> <p>杨戬独自回到那棵早就不会开花的丁香花树下，默默地凝望早被他尘封在过往里的卧室。</p> <p>他伸出手，推开那扇充满了回忆的门，脑海中浮现的是那一年他推门而入，敖寸心满眼嚅着泪，飞身扑到他怀里的样子。</p> <p>当时他被寸心缠着上天做官，不堪其扰，恶狠狠地扔下一句“上天做官就要休了你”的话来吓唬她，见这天不怕地不怕的混世魔王被呆呆地唬住，心中有一丝快意，潇洒地拂袖而去。可没过多久，当他回到家中时，看见的却是黯然神伤的龙女。</p> <p>杨戬当时就慌了，暗自思量是不是将话说得太严重，脸上还是硬邦邦地。直到温香软玉投入怀抱，嘤嘤哭诉他的罪状，他才稍显不知所措，伸出手将她圈住，叹气妥协，可却还要嘴硬：“你不惹我生气，我就不烦你。”</p> <p>看样子寸心当时并不很满意这个回答，不过因为是她有错在先，所以也没有再追究。</p> <p>杨戬走入尘封的卧室内，心中回想着她无数次从这个房间走出来，投入他怀中的场景，心底是一片涩然。恍惚间衣角带倒了不知什么东西，一盒粉红的胭脂咣当一声摔在了地上，登时摔得四分五裂。</p> <p>杨戬连忙低下头，也不记得要用法力，途劳地用手指聚拢一地的烟尘碎屑，却怎么收也收不净，反而将双手折腾得沾满了嫣红色的脂粉。他怅然地看着满地狼籍，目呲欲裂，不期然间一滴泪水从眼眶中滴落，晶莹地投入十丈软红之中。杨戬跪在地上，崩溃地收紧了手指，泣不成声。</p> <h2 id="【4-华山】"><a href="#【4-华山】" class="header-anchor">#</a> 【4.华山】</h2> <p>自从敖寸心身死，杨戬就变得愈发捉摸不透。如果说做一两件所谓的坏事可以理解为真君老爷心情不好以此出气的话，长此以往，本就因其休妻做官而心生不满的众兄弟们都觉得二爷这是真的变了。杨戬的乐趣变得越来越奇怪，这种奇怪在三圣母入狱后变得更加猖獗，简而言之就是变态。</p> <p>刘彦昌本来就因为杨婵的缘故被杨戬怨恨，不知道他在牢里又是怎么样拼命作死，反正他被打得惨不忍睹，而最直接的牵连者就是他唯一的儿子——沉香。</p> <p>沉香与小狐狸、八太子，外带一个半路杀出的丁香为伍，几人受了坚守在华山的康安裕暗中帮助，竟然闯入了关押三圣母的山洞之中。在那里，杨戬留下三口仙气，给这个毛都没长齐的破小子三关考验。如果他通过了，说明不至于粪土之墙不可圬也，如果他通过不了，说明实在是个废柴，活着实在没必要。当然了，留着撮合一下自己和妹妹的感情也无不可，反正他最后是要去死的，死后杨婵面对自己的和美家庭，再反观死无全尸的兄长，恐怕会非常后悔不听他的劝告。杨戬恶狠狠地想。</p> <p>至于这个想法是一时生气还是当真如此狠心，已不可考。反正当沉香顺利地通过了前两关，有些不大服气的真君老爷想为难一下他的心却是真的。他反手化出利箭，神目一扫，趴在牢门束手无策的四个人于洞壁上显出身形。杨戬眼睛一眯，危险地看了一眼搅和在其中的浅绿色小鬼，想把她拎起来揍一顿的心火越烧越旺。好在那只是个幻像，他拉满弓弦一箭射了过去，沉香也是个讲义气的，往箭头一扑，登时掉出了关卡，砰地一声砸在灰扑扑的地板上，形容十分狼狈，但却惊喜地发现自己居然没死，抱着健全的躯体又笑又跳。</p> <p>千里之外，真正的二郎真君流云神目华光一转，三关已破。他稍感欣慰，领着身后的哮天犬慢悠悠地御风，也不架云，嘴上说着快走，飞得却依旧英俊潇洒衣袂飘飘，哮天犬因最近被敲了数次狗头，有疑惑但是不敢多嘴。</p> <p>二人给母子二人留够了叙旧的时间，晃悠悠地落到山洞口。假装被哪吒打了一拳的梅山老大从石头后面钻出来，朝杨戬哭道：“二爷你来了，你看他把我头都打破了，这得算工伤吧？我好可怜啊……”</p> <p>“……”杨戬理都没理他。</p> <p>一敲狗头：“追！”二人提起衣摆往几人气味消失的地方奔去。哪吒想来是帮定沉香了，遣四人先向北走，自己朝反方向跑去。杨戬心中暗道不妙，若给自己追上，恐怕几个小家伙插翅难飞，自己再纵容他们出走，又要被安上一个渎职的嫌疑，立即转身向南行去，却被哮天犬拽住手腕，“主人，这边！”</p> <p>杨戬眉头一皱，说道：“我明明看见这边有人影。”</p> <p>哮天犬无奈道：“那是哪吒！”</p> <p>真君老爷非常无语，只好随哮天犬向北追去。好在哪吒半道上看出不对，又折返回来，一见一身白衣神情肃然的杨戬，心头猛然一酸，但他向来嫉恶如仇，立即换上一张笑脸迎上前去：“杨二哥，我正到处找你呢！走走走，咱们喝酒去！哎，哮天犬，别怪我啊，伤还疼吗？”说完，伸手要揽杨戬的肩。</p> <p>杨戬对他笑得很难看的小嫩脸一阵白眼，抽出插在腰带上的墨玉折扇向他手腕处一格，扇尾一压抵到哪吒脖颈的大动脉处，面色阴沉。</p> <p>哪吒见他如此不念旧情，怒急反笑：“我好心请你喝酒，你却如此不知好歹！”说完，身形一动逃离杨戬扇下，祭起乾坤圈向杨戬攻来。</p> <p>杨戬也不化出三尖两刃枪，只举起墨扇与他斗在一处，扭头向哮天犬道：“你去追沉香！”哮天犬得令追去，又被沉香等人捉弄一场。</p> <p>——</p> <p>杨戬拧着哪吒的胳膊上天认罪时，鼻青脸肿的三太子十分不服气，真君下手本不重，却随着他的叫骂逐渐加大手劲儿，哪吒疼得呲牙咧嘴，骂得更狠了。：“杨戬！你个良心被狗啃了的东西，三圣母是你妹妹，你也下得了狠手！那个绿衣服小姑娘长得像三公主你看见没有？即使这样你也不肯放过她？啊，你造孽太多，恐怕早就忘记欠下的这个债了！枉我当年在西海边遇见她，她还口口声声说你是个英雄！狗屁狗屁狗屁！”</p> <p>杨戬心中狠狠地一沉，猛地捏起哪吒胸口的护心镜，将他扯到面前，目呲欲裂，吼道：“你说什么！”</p> <p>哪吒被他掐住手腕处灵脉，动弹不得，不由得懊恼万分，骂声不绝：“说你呢！忘恩负义！狼心狗肺！三公主碰上你算是倒了八辈子大霉了杨戬！”</p> <p>真君心头一阵绞痛，险些失态，是啊，是啊，如果不是因为自己，恐怕她不会死，恐怕她早已嫁给一个真正可以疼她爱她的同族人，夫妻和美，幸福快乐。他早些年切切然地觉得只有自己是世界上最爱她的人，敖寸心嫁给自己，自己能够给她最好的东西，所以两个人不顾一切地成亲，在一起走过一千七百多年。最后，他将龙女抱在怀里，说出对不起三个字的时候，心都是颤抖的。他的顾虑有那样多，就连死都不能即刻相随。</p> <p>杨戬沉默不语，在哪吒一阵阵挑衅中败下阵来，一言不发地将他押赴凌霄宝殿，认罪伏法。</p> <p>听哪吒在凌霄宝殿上和玉帝王母耍嘴皮子，杨戬心中有些好笑。什么时候这个单纯莽撞的孩子也学会了这些虚与委蛇，看来在天廷当值的这些年，确确实实将他改变了许多。只不过这样的转变，往往意味着不好忍受的憋屈和压抑。</p> <p>看起来哪吒和敖寸心的关系很好嘛，看在这么多年来只有他看起来一直记着龙女并且很为寸心愤愤不平的份儿上，杨戬就不苛责这小子的出言无状，只是把他关起来五百年，应该算小惩大诫吧？一肚子坏水儿的真君老爷暗想，毕竟这些年来这小子没少给他惹麻烦。</p> <p>这一日的政务不少，被这群小孩插科打诨了一阵子，已经搅扰了杨戬的许多安排。他回到真君神殿，批改奏折，一坐就是整夜。天色微晞，真君神殿所在的第十四重天是有晨昏早晚之分的，劳碌一整日的神君披着厚重的盔甲，趴在案上微微阖眼，沉沉睡去。</p> <p>恍然间，他感到一只轻柔的手在抚摸他的脸，似乎还带着一缕熟悉的甜香，杨戬心头一紧，猛地抬起头来，却看见晨光穿透院旁演武场栽种的几颗长青树的树梢，光斑跳跃着印在他的脸上，一个美艳的妇人跪坐在他身旁挽起他的手，轻柔问道：“二爷，怎么在书案上睡着了？”</p> <p>杨戬一愣，忽然目呲欲裂，猛地将她抱在怀中，闭上眼，泪水抑制不住地流淌而下，滴滴洒在女子柔嫩的肩膀上，“寸心……寸心……”</p> <p>龙女一怔，温柔地环抱着他，轻轻揉了揉他卷卷的头发，“二爷做噩梦了？不怕，不怕，寸心在这里……”</p> <p>“寸心，我梦到你不在了……”他话音未落，眼前忽然一阵昏暗，神殿的一支蜜蜡烧断了烛丝，砰地一声掉在地上，惊醒了沉浮梦中的显圣真君。</p> <p>他怔怔地看着空荡荡的真君神殿，心中一阵绞痛。</p> <p>寸心，原来方才我做的，是一个美梦。</p> <h2 id="【番外】"><a href="#【番外】" class="header-anchor">#</a> 【番外】</h2> <p>杨戬因犯众怒而遭贬谪，坐不稳司法天神之职，只得回到昆仑，被判禁足思过。玉帝有心袒护，并不言撤下其官职，只说暂时由他人协助司法，且官位没了，爵位仍在，昆仑山延绵数千里，又是其起势修身之所，这不是贬谪，分明是避祸。改天条的诸位反王虽然觉得不满，但也没有办法，只好由他去了。</p> <p>数年之后，东海四公主的魂魄温养得宜，托肉身而复生，这才将杨戬忍辱负重一时道出，三界哗然。玉帝王母正以此造势，将二郎神官复原职，凌霄宝殿之内亲赐下圣旨，允诺为储君。然而二郎真君于此时正值成就金仙之关键，托师父玉鼎真人代为接旨，谢玉帝封赏，但因金仙劫数当前，仍拜托托塔李天王、太上老君等人协助司法，自往十万红尘杀劫之中历难去了。</p> <p>——</p> <p>敖寸心带着大女儿敖铭、二女儿敖锐、三儿子敖钦，还有怀里一只将将学会走路的小团子敖悦闯入净坛使者猪八戒的净坛庙中，以寻使者一叙。</p> <p>原来小院中的四个孩子，都是敖寸心与杨戬所生。当年二人和离之后，敖寸心发现自己居然有了身孕，正值杨戬按捺不住相思之情前来寻她，二人于是重归于好，下界过了二十年有余，生下一对女儿，大女儿取名叫敖铭，二女儿起名叫敖锐。没过多久，寸心又有了身孕，这一回生下一个儿子，取名敖钦。三个孩子年岁相当，杨戬只要得空便偷下凡间与妻儿相聚，教导儿女，他们自幼跟随身为三界战神的父亲修习法术武功，又是龙与神的孩子，天赋异禀，到如今早已有所小成。又是如此过了几百年，按凡人年龄推算，两个姐姐已长到十六岁，弟弟也已经有十四岁，敖寸心又再度有孕，怀胎数年，诞下一个软软糯糯的小姑娘，取名叫敖悦。</p> <p>数年前，杨戬忽然没了音信。她们母子五人本居住在一处风景宜人的海岛，为掩饰身份从不与外界互通，加之天宪结界加身，无法出海，只能徒劳急切。如今新天条出世，天廷整理新宪，按部就班，几年后敖寸心被免除罪责，于是今日携几个孩子杀到净坛庙来。</p> <p>“啊哟，哪里来的小娃娃，对你猪爷爷无礼！”敖铭姐弟三人将躲在暗处的猪八戒举过头顶抬了出来，老猪哇哇大叫，可惜作用甚小。敖寸心手上牵着小女儿，见猪八戒被拖出来了，倒施施然行了个礼，好像派人抓猪的不是她，“元帅，别来无恙。”</p> <p>猪八戒闻言转头一看，见一个容貌淑丽的女子站在门口，手上还牵着一个粉雕玉琢的小姑娘，三个钳制他的小兔崽子见了她，齐齐喊了一声：“娘！”</p> <p>性本好颜色的前天蓬元帅先是呆了一呆，忽然觉得这女子十分面善，待想出些许关窍，又听见诸人对她的称呼，又是一愣。</p> <p>“你你你你……三……三公主？”</p> <p>敖寸心点点头：“元帅。”</p> <p>猪八戒暗瞅几个小少年的长相，待看清他们额间一抹小小的胎记，心头跳了一跳，语气中还存几分侥幸：“……他们是？”</p> <p>三公主道：“是我与杨戬的孩子。”</p> <p>猪八戒只觉得自己的三观都稀碎了。</p> <p>杨戬那厮前段时间还一副道貌岸然的模样，以执掌无情无欲的天条在三界之中大摇大摆，乱发淫威，眼看他一副恶毒舅舅做派，还拿鞭子抽他的猪肉，却不想私底下孩子都生了一堆，所谓人不可貌相，海水不可斗量，难怪他看起来不像是正人君子，倘若王母娘娘知道了，不知道会不会被气死……</p> <p>敖寸心见他一副被吓到的神情，心中焦急，忙又问道：“元帅可晓得杨戬在什么地方？”</p> <p>八戒闻言一顿，连连摆手：“不知道，不知道，这我怎么会知道。”</p> <p>三公主眼睛一眯，围绕在猪八戒身边的三个孩子攥紧剑柄，围着他逼近了一步，眼神危险。</p> <p>杨戬两个女儿是一胎双生，虽然并不长得完全一样，但两个小姑娘自幼像杨戬极，性格稳重，眉目一凝便杀气逼人，又得父亲倾囊相授，法力不凡，即使是吃了无数仙丹的沉香，恐怕也只能和姐妹二人战个平手。</p> <p>不要说还有老三敖钦，虽然小时候皮了些，但和两个姐姐年龄相仿，一齐练剑修灵，三人配合默契，加在一起，威力更是增倍，猪八戒怎么是敌手，但他往前一缩，嘴硬道：“老猪……老猪真不知道啊！”</p> <p>敖寸心自己法力平平，但带着几个孩子出门，简直横冲直撞无人可挡，半点没在怕的，说道：“是不知道，还是不想知道！”</p> <p>三个捏着剑柄的又逼近一步，猪八戒眉头一跳，被黑恶势力强迫，败下阵来，呜哇呜哇大叫一通：“佛祖啊道祖啊不能怪我，人家老婆孩子都找上门来了，不教人家知道也不成体统啊……”</p> <p>敖寸心＆孩子们：“……”</p> <p>猪八戒带她们来到一盏玉灯前，咂咂嘴道：“三公主可看好了啊，我这法术只能施一回，叫你们看见杨戬的影像，他是去历劫了，总会回来，要是看见了什么不该看的……可，可不能怪我老猪……呃也不能怪人家杨戬啊……”八戒暗想，倘若这杨小圣投胎转世遇见一个甚红颜知己，被三公主给看见了，回来之后要找我算账，那可怎生是好。</p> <p>只见玉灯缓缓燃气烛火，火焰纵烧间，升腾起一阵金色的烟雾，凝于灯上，渐渐显出景象来。</p> <p>——</p> <p>只见一片血色茫茫间，杨戬的黑色盘龙大麾在冰天雪地之中格外显眼，他取出一朵藏在袖间的丁香花，踉跄几步，终于跌坐在寒玉冰棺的石阶之上。那玉棺四面的棺盖都已经打开，其间躺着一位沉鱼落雁的女子，竟是敖寸心。</p> <p>猪八戒一惊，暗忖杨小圣此番历劫居然不曾投个别胎，而是又做了自己一回。</p> <p>只见杨戬将手中的丁香花轻轻地戴在了女子的发鬓上，然后神色温软，伸出手描摹那女子的面庞，不同于他满面的血污，竟对比出诡异的妖冶，她的面颊红润，就如同沉睡过去，可几人知道，恐怕她早就已经死了。</p> <p>杨戬并不说话，他簪完那朵花之后，便两手交叠在冰床边沿，身躯僵硬地弯垂在侧，枕在手臂上，静静地看着龙女沉睡的面庞。镜外的几人注意到这方冰天雪地的洞府布置杂乱，除了敖寸心身侧，几乎布满了猩红的血迹，看颜色，恐怕是刚刚撒上去的。也就是说，镜中的“寸心”，可能刚刚过世。</p> <p>敖寸心心中一紧，她晓得杨戬历劫后，便安了一分心，只道他定能平安归来，可此时得见他劫中景象，又惴惴不安，这些年来，杨戬每一次到西海，无不是满目疲惫，只余她一人和孩子们可以宽慰照顾他，如果连自己都死了，孩子们也不曾有过，他要怎么熬过漫漫宦途？</p> <p>敖悦年纪小，看见杨戬，只轻轻叫了一声“爹”，但她察觉到母亲和哥哥姐姐们情绪不对，便乖乖被哥哥抱在怀里，只盯着想念很久很久的爹爹安安静静地看着。敖钦抱着妹妹，见父亲昔日挺直的肩膀萧索地软倒在冰棺旁，心中是说不出的伤心。两个姐姐从小冷静睿智，可见到一向崇拜的爹爹如泰山轰然倒塌，也自心酸。</p> <p>镜中的杨戬枯坐在寸心身旁，一动不动，可镜外的寸心看着他的背影，只觉得胸中苦闷，鼻头一酸，愣愣地听着杨戬，又是思念，又是心疼。他不动，几人却也不恼，可惜玉灯的灯芯几乎燃尽，杨戬的身影就要化在那一片烟雾缭绕中。</p> <p>忽然杨戬眉头一蹙，捂住胸口，哇地一声呕出一口鲜血来。他的眼神逐渐涣散，画面一转，几人居然能见到他识海中回忆的影像：</p> <p>也是这样的大雪茫茫，杨戬牵着敖寸心的手，走在灌江口银装素裹的雪地里，纵然是神仙，可两个人裹得毛茸茸地，似要沾一沾这凡间隆冬的气氛。龙女依在杨戬暖呼呼的怀里，被他以厚重的狐裘披风拥住，在这飞雪连天的小院中赏景。</p> <p>敖寸心见院墙边堆了一个圆滚滚的雪人，伸出一段青葱的指节指给杨戬看：“杨戬，你看。”</p> <p>杨戬笑着拢住那一只小手，塞回怀里，说话间带出的暖气化作一团团白色的雾：“我小的时候，大哥带着我和三妹，在院子里堆雪人，还要安上眼睛鼻子，可好玩了。”他本意是要带寸心一齐玩一玩隆冬厚软的雪，不想怀里的龙女闻言，沉吟了一番，眼眸亮晶晶地转过身，搂上他脖颈，语气里满是对未来的期待：“二郎，等我们有了一个小孩子，我们也带他年年堆雪人玩儿，好吗？”</p> <p>她软乎乎的话语将杨戬一颗心熨烫得暖融融地，伸手将她牢牢抱住深深一吻，柔声道：“好。”</p> <p>这经年前的回忆，化作一滴眼泪，从杨戬的眼中滴落下来，砸在躺着敖寸心的寒玉冰棺上，立即冷彻心底。</p> <p>那盏玉灯的烛油燃尽，青云一晃，散开来，杨戬悲痛的身影化入雾中，消失不见。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/10.连载中/210826.折花.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/0
