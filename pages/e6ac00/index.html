2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">鸳鸯枕<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>“寸心，你在吗，寸心”杨戬呼喊着妻子的名字，今夜是中秋家宴，正赶上师父来看他和寸心上天谢恩，于是在真君神殿后花园就摆上了宴席，看着寸心、三妹、沉香、师父、梅山兄弟和哮天犬这些对自己最重要的家人和睦相处，杨戬自是无比宽慰，酒过三巡菜过五味寸心却悄悄离席，杨戬顿时也没了兴致从席间退了来找她。</p> <p>靠近自己寝殿时听闻一阵小兽呜咽声，从前与自己欢好时嚣张的妻子总是乖巧的像小兽一样呜呜咽咽，杨戬循着声音踏入寸心正卧在他的床上。眼前景象却让杨戬呼吸加重——龙女脸颊潮红，今日穿在身上的翠绿色低胸襦裙已经散开露出了两团饱满的乳肉，身下的亵裤也早被蹬掉，两腿间一片晶莹还夹着他清晨换下的中衣。</p> <p>杨戬正看的出神，寸心却娇娇的喊了一声“二爷”，更是叫的他心神荡漾。“寸心，我在呢”他除去自己的衣物俯身上榻，本可以用法力帮妻子除去衣物，可自己动手方为闺房之乐。滋溜一声龙女的抹胸就被解掉，两团饱满的乳肉耸露出来，上面还颤巍巍的结着两颗朱果美不胜收，杨戬心神荡漾低头便含住了妻子的乳肉，入口便觉得香甜异常芬芳四溢，手里也不闲着，一只手赏玩着妻子的丰乳，另一只已悄悄探入身下。</p> <p>只深入两指，便觉甬道十分湿润，且紧致如初，杨戬身下儿臂粗的行货已急不可耐，正欲直捣黄龙，龙女却呜呜哭了起来“你欺负我”说完就摆手要把这个登徒子打下去。杨戬也来了兴致“小生如此艳福，得与娘子共赴高唐，同浸云雨”，便耐心地从帐顶抽出几条白绫将龙女的手脚捆缚住挂在帐顶。这龙女虽饮多了佳酿头晕脑胀，却不忘她心爱的二郎“住手你这登徒子，我夫君可是威震天界的清源妙道二郎真君，你要轻薄了我他可不会放过你”。杨戬微微一笑含住龙女的耳垂“小娘子，待那二郎真君找到你，我同你都该有两三个娃娃了”说罢挺身而入只觉滑腻异常且紧致温暖，真是个销魂乡。二人已数百年没有欢好，今日再聚只觉得彼此身体如此美好。</p> <p>杨戬为恐龙女受罪手段十分温存——他轻舔寸心的乳首抚摸着她的后背，下面的阳具也轻轻浅浅地动着，龙女果然十分受用，杨戬的阳具却被温柔乡蛊惑想更进一步，于是挺起了腰用力一顶，龙女不觉吃痛，怒嗔“你这登徒子这么用力干什么”，杨戬不理她，动作大开大合十分勇猛，仿佛要把这三百年的亏欠全补回来。敖寸心娇喘连连泪珠莹莹，奈何九转玄功至刚至阳，她招架不得晕了过去。杨戬正在兴头抱着软成一团的龙女更是畅快，二人颠鸾倒凤不知天地为何物。过了两三个时辰，杨戬方准备鸣金收兵射出阳精，稠白的粘液从龙女阴道流出浸湿了腿根。这坏心眼的郎君并没有取出阳具而是留在了龙女体内，他抱着敖寸心沉沉睡去手下还不忘摸着两团软肉。</p> <p>第二天清晨过了酒劲儿的龙女看着沾满了双方爱液的床榻和健壮赤裸的郎君又羞又忿——羞得是二人没名没分不着寸缕却过了一夜，忿的是这郎君弄得自己全身酸痛，恨不得挖个坑把二人埋起来隔绝世界。这坏心眼的郎君却犹在梦乡抓着龙女胸前两团粉桃儿不放。</p> <p>敖寸心正欲下床梳洗，找不到主人的哮天犬却着着急急地冲进来“主人你怎么不见啦，我找了你一整晚” ，不料却被惊醒的杨戬喝住“哮天犬你快出去不然我把你打下凡间”，吓得胆小的狗儿连滚带爬不敢迟疑片刻。</p> <p>三月后权势滔天的司法天神与恢复名号的西海三公主再结百年之好，来喝喜酒的沉香向康老大打听哮天犬怎么不见了，康老大长叹一口气“唉，三个月前他被真君打了一千军棍现在还下不了床”，沉香想着哮天犬对舅舅十分忠心便去向舅舅求情。谁知他丰神俊朗的舅舅只冷喝一声“他活该”，此时远在梅山的哮天犬捂着屁股“哎呦，那悍妇给主人灌了什么迷魂汤，他居然打了我还让我滚来梅山一千年不要回去”。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/86.短篇-2022/010700.鸳鸯枕.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/08/19, 23:19:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/495ece/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">无暇赴死</div></a> <a href="/pages/b30038/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">及时行乐</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
