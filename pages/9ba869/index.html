k2mvC7JB8tG04Ef5PiXtG0UtxupRQSfTnBoCy554x18yJHI6I+G5Eru4LHmPJZEQsrvPUbMiA8G/WgMK7w7I+ez7++o2ANfbrjvaOl1tFMs+htG3IrZH9/hDX1Pr8Tc0UvH8tcX29KzAgIGcEkINyW5BF9x891hw6VYqgJHEk0huccS7vh3C6gTiODL+26huuBtbct8eZnqLML8PkxGYpuPZBqtqwkSjgc4mB5gbgig5i+y0UDK35LMxXisn9xQtK+nd26gTIHsHe/oblK/b29fUmN/8Y+9jAQrnBp56m1LcDlDp9irKTExSKduXJVWSqdBMA08pEJnEIOB3FPPMybu/oeV8zFeYN3xx576Q6RH+VmplE4ncQV5v+5rzSoyOU7PuEAg8g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">留香<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>功法运满周天杨戬长长吐出一口浊气，胸腔间的闷痛已消散无踪，可转念思来征胜梅山七怪先机已失，又因自己疏忽累带狐妹，杨戬一时甚是郁郁不快。</p> <p>他正劳神忽闻门前声响，抬头只见敖寸心探了小半身子瞧他，与他目光一触神态却扭捏些，又往廊外张望一番才柔声道“拿了些伤药予你。”杨戬闻言哑然失笑“来便是了，作甚么偷偷摸摸？”</p> <p>敖寸心捧着药匣子又阖了门闻言瘪瘪嘴，边行边道“还不是玉鼎真人，镇日神神叨叨，今个你都伤着了还可劲阻我……”到底是这人师父龙女别个不听，玉鼎的面子却是要给只怨上半句便罢了。</p> <p>杨戬侧开身形叫龙女跪坐到他身旁去，闻言则是一哂“玄功机巧施用起来，还不是叫你空等。”龙女敛起衣袂执一碧色胖肚小瓶与他，又奉上茶“理是这个理，可到底腹气创散我哪里放心呢。”</p> <p>杨戬低头一撇见这瓷瓶上簪花小楷灵秀，正是‘九宝玉露’几字，往日玉虚宫里也见着几回，道是良药却因着山参、何首乌几味端是涩苦难咽叫人踌躇“功法几转已是无碍，良药哪里当饭食省些糟蹋罢。”他说着便要将这瓷瓶推将回去。</p> <p>敖寸心自是不依，拿着他的手便往回推“晓得你好本事，这药又值个什么价，你用了生益是好，不作为也无坏处，怎的是个糟践？”她见杨戬仍要推脱真要急了眼，倾身来攘他切切求道“你便用些，全我个安心罢，好不好嘛。”龙女近乎伏到他怀中，温香软玉模样声儿又娇，尾音拖着软软糯糯，直像生了好些个丝线往人骨头上绕。</p> <p>铁打的也遭不住杨戬弗如，要认栽却打巧叫敖寸心碰着伤处，不由身上一僵拧了眉头，龙女待他上心千万一眼瞧穿，哪里饶过立时就要勘验，杨戬忙拘了她那些个矜持男女大防之类尚未出口，便见敖寸心眼巴巴的模样，双瞳水光盈盈堵得他嘴也空张。</p> <p>“我自个来”杨戬说着褪去衣袖袒了右个半身叫龙女细瞧，这心前伤处只一点皮肉尚未好，不触及甚至疼也不疼，可奈何杨戬肤色不深，一番映衬下这紫黑就瞧着委实扎眼了。</p> <p>敖寸心又是深闺里娇养是个针扎了都要哭两声的主儿，哪里见得这个她登时倒吸一口凉气，忙取了些化血油膏含在手心搓开这才给杨戬揉上。</p> <p>龙女素手在他心口轻轻打圆儿，加之五指纤长温润如此拂来揉去随即带起一片酥麻，杨戬通身一震立时绷紧了，敖寸心忽觉指下肌骨生硬直以为自个下重了手叫他吃苦，又念他立于桅樯自个却无些许用处，心下戚戚顷刻喉头酸涩难忍。</p> <p>龙女与他不过一掌之隙便是发间香气儿也清楚，她这厢忽的委屈杨戬自是惊觉，慌忙去瞧这女郎竟已盈盈垂泪不止，杨戬不堪女儿家心思可到底与她一处有些时日，这会也能估摸几分是以忙道“哭什么？你这力道吹气儿一般，只弄得我痒罢了。”</p> <p>他说着五指一张包上这玉脂小脸，粗手粗脚的给敖寸心抹起泪来，龙女顺势扬起头又更依着他嘴中喃喃不歇“是我不好，我若将三首蛟看牢，或好歹莫叫狐妹落单这事……这事……”她说着蹭着杨戬宽大的掌心嘤嘤戚戚“亏你还教我咒术防身，我却只拖累你了……”</p> <p>敖寸心素日进退得宜，虽是承他庇佑却掩不住公主性子，傲起来那是直戳人肺腑管教他七窍生烟，杨戬男儿气性重倒乐得她拖累，是以见她秀眉耷拉着翦水秋瞳哀哀望来，细嫩双颊泪痕尚新，这樱唇朱红莹润微张着显出一点儿柔嫩新粉——如此纤弱娇色却更叫他怜爱。</p> <p>前些时日偷撷之事于他心下又活泛不休，他在龙女桃腮上摩挲的拇指，渐往她唇侧流连去，杨戬心不在焉的应两句无妨、莫哭了却不见龙女消止，那点少年莽撞忽的涌现——杨戬一低头将龙女亲了全乎。</p> <p>敖寸心脑中轰然无声，眼睛瞪得恁大，手抵上杨戬胸膛却又顾念他有伤进退皆不得，杨戬瞧她发梦手掌一动扶上她后首，将这亲吻加深。</p> <p>杨戬菱唇薄凉侵占来时将她柔唇碾压描摹，粗重的喘息打在她脸上臂膀缠过她的腰肢，教她牢牢贴上他宽厚的胸膛，敖寸心只觉晕头昏脑，迷迷糊糊的阖上双眼连牙关也失守。</p> <p>杨戬长驱而去轻巧含住龙女口中柔滑，她身娇这下细细哼了声，骨肉愈软双臂只轻轻挂着，头颈勉力仰起承他欢好，杨戬喜这香软更是深入重重吞吮，敖寸心身子轻颤手上脱了力，整个人叫杨戬托着腰背往席间歪斜软倒去。</p> <p>龙女这等娇软不过便宜他逞凶，杨戬就这势头偏过去亲她脸颊耳廓，最后趁她歪头喘气儿的时机，顺着那松开的衣领将这白皙纤软的脖颈也是一番细细品泽。</p> <p>敖寸心叫这轻慢酥痒挑弄的又羞又急，要推拒却如何敌得过这武神的力气，只任他腻玩，待绵软的胸房也叫他隔着衣物捏在手心里，敖寸心终是惊喘一声，将骨子里的力气全施用，手掌抵上杨戬肌肉鼓胀灼热的臂膀，勉力推打急言道“杨戬！你做什么！”</p> <p>却见他仍埋头不为所动，那些往日恐慌涌来，她哭了“唔……不可以……真不可以……求求你……别”他这会吻在她精巧的锁骨上，这哭声在耳畔乍响，杨戬恍然倏忽起身背过脸去，忙整顿衣衫。</p> <p>他方妥当待要说话却闻龙女小声道“我先走了。”杨戬慌忙留她“寸心！”他说话间将龙女拽了回来，敖寸心身子一僵，垂头也不看他只一味挣动嘴里道“你这浑人怎的叫那邪物带坏了去！”，杨戬忙哄道“寸心，好寸心！对不起！是杨戬不对，再不会了，你别气……”</p> <p>他说着见龙女安定下来，便又去抱她，亲龙女额角蹭她发顶，敖寸心羞赧拧他也受了“是极全赖殿下警醒！”他说着又使那直挺的鼻梁蹭蹭龙女软躺的耳廓“我俩再待会”龙女瞧他眉目温柔又兼“可怜”，便轻声道“只一会。”</p> <p>——————</p> <p>师父拦着寸心也非不无道理，杨戬之后想道。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/89.短篇-2019/100200.留香.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-4
