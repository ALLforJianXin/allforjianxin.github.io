g803PwBJ0CExno/jcMbN8tONYeOmHiuUNryvm3fRUy4tMPVLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">今夕<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>披星戴月间突然停下脚步时香火功德如潮水般涌上身来，才让真君老爷想起今天原是自己的生日。<br>
这一刻思念如浪排山倒海迎面扑来，从左侧胸腔蔓延开的疼痛让人窒息，直到看到龙女恬静的睡颜，才渐渐平复。<br>
她睡得沉熟呼吸绵甜脸颊红扑扑的，指尖上传来温热触感惊觉自己已经过于接近，那总让他爱不释手的白嫩鼻尖微微抽动似是想醒，动作比脑子更快放完昏睡诀才意识到，是指尖太凉了吧，揣进怀里放在心口捂暖了再试，这次她就不抗拒。<br>
数不清多少次忙里偷得片刻喘息，远远望望她也能让自己坚信一切都是有意义，回望过去才发现却已经很久了，从她离开家之后三百多年了，已经太久了，他太久没有离她这么近的距离。<br>
以至于，当再次吻上她柔软的唇瓣时，即使唾弃自己，也不想停止，不能自抑。</p> <p>还有零星的功德聚拢来，一点一滴。<br>
还有向真君夫人问好的，不知是来自哪处偏僻。<br>
杨戬自嘲地笑过之后却有连他自己都觉得癫狂的念头翻上来，再挥之不去——<br>
人间的传说还把他们联系在一起——<br>
显圣二郎不听宣王母的懿旨本就做不得数——<br>
又忆起往昔——</p> <p>柔滑的肌肤温润的香气终于不再只是记忆里，在他手下熟睡的龙公主的身体逐渐裸露，裸露处又都被痴吻覆及。从脸颊到锁骨唇舌流连明知不应该亦忍不住在皮肤上留下痕迹。胸前两点艳红似莓果香甜多汁，一边被他舔舐一边被他掐拧两边一样膨胀立起。脸埋进两团绵软间细嫩的肌肤散发着醉神的香气，再一路向下香气愈浓亲亲小腹。</p> <p>——往昔生辰时寸心总会笑吟吟说“今日寿星最大，本公主让你一天，做什么都可以”——如此的许诺她亦未曾收回——<br>
馥郁的肉香蒸腾得真君老爷口干舌燥，不住舔唇、不住吞咽，捧住她蜜臀的双手不觉用力，试问谁能抵挡住心上人的诱惑？她触手可及，她就在这里。</p> <p>昏睡诀的效力是让人难以醒来，却不能将五感完全封闭。寸心酣睡间觉察到有人接近，一开始没挣醒确实是慌了一会儿，迷迷糊糊中也想不起西海的水晶宫戒备森严哪能那么容易被人突破。倒是后来那人贴上来亲她，熟悉的感觉她一下子就认出了是杨戬，于是一下子就放松了下来，那一刻她甚而小小地雀跃了一下——她早知道他常来看她只是都偷偷摸摸远观而不近前，可她是西海龙宫的三公主，天下哪有公主先低头的道理，她倒要看看他究竟能忍耐到几时——而后来他抱着她又咬又啃的，寸心忽而有点害怕——即使龙宫不许议论九重天上事，她也听了些传闻，虽道是她自己不愿意另觅“归宿”但管不住旁人嚼舌根，兼之四姐曾通传过他的挂念，有好事者便编出了司法天神仍视前妻为禁脔的说法，说他数次阻碍龙公主相亲说得有鼻子有眼——许多谣传从前寸心都是一笑置之浑不在意，但这会子昏睡中被人亲吻亵渎，忽而就没了底气，都说皇门阶前最是染骨处若他真的近墨者黑……<br>
寸心心中又羞又急，可偏偏越急越是睁不开眼，使尽全力挣扎也只能弹动些许，落在杨戬眼中竟是龙女更抬起腰胯往上顶了顶来接近他、邀请他……</p> <p>闹得许久没有开过荤的真君老爷老脸一红，似当年初试时的纯情一闪而过，似当年一样轻轻问一句“寸心，我可不可以？”她不回答便当是默认，紧接着只剩饕餮般的贪婪扑上去。<br>
使牙把最后遮羞的片缕也叼去。<br>
顾及龙女久未欢愉杨戬耐着性子做前戏，舌尖先舔裹得豆粒颤巍巍起立，吮一吮被抓在他掌心里的臀肉都在颤抖像是很满意。似鼓励又似等不及更让天神难压抑，憋闷许久的情愫终于寻到了出口终于可以放纵一回，胡乱揉一揉肉臀按摩下腿根，使指尖扒开缝隙粉嫩的穴肉一张一翕跟他打着招呼，猛低头全乎含住，啧啧有声品尝起来。</p> <p>寝殿里本安静寂然更衬托得水声清晰。</p> <p>杨戬吃得专注寸心心中却如江海翻来倒去。才听到杨戬问询时有一瞬间在想刚刚的翻转印象是不是对他人品过分质疑，及至私处成了人口中之餐又气他居然真的趁龙之危，又开始害怕，混身骨肉紧绷起来绷到抖若筛糠那人竟更形恶劣偏不给她痛快只用软舌撩拨着，一深一浅左右交替，时而再用力吸吻，似钝刀子割肉才适应了一处又变换莫测，龙女迷迷糊糊想难道这就是几百年练成的消遣人的手段，又好像不太对天下一年天上只一天他如此快的转变恐怕这才是本性？<br>
但快感磨人不给她机会深思熟虑，杨戬唇舌口鼻全都贴紧，狠狠抵住往内里钻刺的同时也在花丛中狠狠碾磨，寸心几乎疑心自己喊出了声，高潮过去仍能感觉到穴肉在没有规律地挛缩，有几声依稀的细微喷水声她没听清，马上变成了更大声的“啪啪”打水声，天神的指尖在龙女阴唇上跳动可惜她现在看不到他的表情，否则她会发现他面带笑意像在欣赏和弹奏上好的乐器。</p> <p>待到龙女小腹的波动更平息些杨戬才慢条斯理抹去唇角水迹，直起身来缓缓褪去衣服。手中脱衣眼睛也不闲着用目光丈量龙女——胸围似乎缩了半寸肩头和腰侧则略显丰腴——一时间为她显见得富足的生活发自内心地高兴，又一时情绪急转直下——她龙归大海自由自在却把他困在那冰冷黑暗的真君神殿。</p> <p>渐渐冷了眸色也冷了语调：“敖寸心你好狠的心……”</p> <p>寸心听话入耳还没反应过来意思身体就被迫承接了比话语更狠的肏弄，一千多年来那根让她受尽了折磨吃尽了苦头的雄伟巨物招呼都不打一下，直挺挺闯进来直插到到底撞得她呼吸也一滞，双腿被弯折双膝被打开到最大，滚烫的肉棒在甬道内毫不怜惜地横冲直撞。若是往昔寸心定要又踢又打推他出去，甚而会亮出小尖牙给他挂一点儿彩，可今日龙公主被迫躺在这里被迫只能委身承欢。寸心何时受过这样的委屈更兼五感不灵难以了解外界状况，只以身受的鞑伐为苦越想越是羞愤。羞愤已极间寻遍全身上下只剩一块软肉还稍能驱动。<br>
杨戬刚刚注意到龙女眼角沁出几颗清泪余光就扫见她两片唇瓣间粉嫩闪动，常年练成的肌肉记忆反应更快，一手的食指中指已经塞入樱桃小口按下软舌，继而才体会到肉道角度改变带来的别样刺激，抑制不住发长长一声叹息，待这阵可怕的快感过去可怕的猜想浮上心头——“要寻短见？”</p> <p>她怎么可以？！</p> <p>天神发起狠来上下一起搅动搅得淫液和唾液同流齐溢，龙公主华丽的卧榻此时完全沦为淫荡的温床，锦被早滑落在旁委顿于地，鲛绡覆面的枕褥沾了水深浅分明斑驳陆离。杨戬逐渐减轻昏睡诀的效力，一点点减轻，维持最低的限度不让她醒来，但又可以观察到她更多的反应。<br>
手指直插喉头她费劲地吞咽带动小舌顶上指根仿佛娇嗔后的顺从，把她紧密的缠握想成她主动要他是她自愿与他交合自愿跟他寻欢作乐……</p> <p>突然又彻底慢下来让龙空虚。</p> <p>这一切，他原本日日触手可及。</p> <p>手指从龙女口腔里撤出，粗粝的阳物也缓缓往外抽离。被磨得红肿充血的穴肉还紧扒着使得摩擦的水声仍然黏腻。</p> <p>差一点丢盔卸甲拔腿而逃……<br>
但又不甘心。</p> <p>过了今夜也许他再没有机会……</p> <p>不知显圣真君心里是如何一番天人交战，只道他的欲望还在小小的穴口内抽来插去。</p> <p>却说另一厢的龙女，体会过狂烈的滋味儿又如何能满足于浅浅的搔弄，因着昏睡诀效力的减弱她渐渐可以扭动身体，可以摇动腰部，还可以试着发几个气音。<br>
她忽觉小腹上一凉紧接着第二滴、第三滴。<br>
心头一凛：怎么了？<br>
杨戬怎么了？</p> <p>眼皮还好沉重挣扎不开拼全力只挤出两个惦在心头许久的音节，看不见他表情但他有所反应，他俯下身来把她抱起来，抱她坐在他怀里。<br>
龙女手臂还是浑无一点力气，一边软软搭在郎君肩上，另一边小手被握在大手的掌心里，被牵起来亲了亲。脸颊也被亲到，后背被稳稳托住，寸心不觉翘起嘴角。<br>
他的怀抱还是那么温暖，虽然她接受他深重浓烈的风暴但她也喜欢这样的缱绻细雨。</p> <p>又一次念出他的名字：“杨戬，”<br>
接着说，<br>
“生辰快乐。”</p> <p>显圣真君显然没有预料到“久别重逢”会是这样的问候，他愣神了片刻全身只剩一处突突直跳，龙女咯咯娇笑着就要睁开眼睛，又被大掌覆面。拿睫毛挠挠他掌心，稍稍抬起下巴向他索吻。蜻蜓点水根本不够摇摇头要他继续，凉凉的薄唇亲起来好舒服。</p> <p>又有几滴滴在胸口上。</p> <p>龙女双手握上杨戬蒙住她眼睛的大手，向下拉开，轻缓但不容抗拒。杨戬的眼睛亮晶晶的睫毛湿漉漉低垂着。<br>
寸心无奈地叹口气，决定今天还是“寿星最大”，算账的事情来日方长。</p> <p>“二郎今天会留下来吗？寸心给你过生日。”<br>
“……”<br>
“二郎不愿意吗？”<br>
