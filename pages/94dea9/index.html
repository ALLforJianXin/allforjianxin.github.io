VLdAGkUhNWuggGrJcXPv+ouCjz0MKUHz1J2/E8IC9nqTabcxgaBYM0hPhD5Y65FsbxRQKxCQrDjDctW7PUM3HuZunFyifSAqEfuzCp48Il24luWUWZoyJCaPR82jE0+kFA643wRFVni4RYSq3ohJO2pZ7B5dO4xkDWbEpossJPLSrPjYID8rS2UHTlvyNxqIGsg674XJJ7vnh5L7PNwC4hh2sjCI96mzszOTpxLF0T7l88Yz7lAuK6OnL8gXLOnTvpzSb22YG8W7us3jSebFHeeqnXRG1vt+MoUM84LQIBmMsCTAcOauTh0T0l0neQK7m2bLMt2mGxU3HYssS0J2cdv5wljlPsrIuZLAG/2DOZIXgCYT8uMGZN+e2kSirfxZOPCsC0f24nTZzspnVn9VePS1Z5vubmAGGXG8ZFno9Hel0yfA5ZPhF7Dh972BQJ2qCpgH67lmWtBYbvk6sz02wjky2vXyz0XErP/kFB619js1BtwfOV4OPRqOQBjy3Qbk18vigUPPSD5ceHnwck7W9bhAqZdd7SuG7w4/P2F/GaJh8c7e9qgow+Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">新婚之夜<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>妆台上长染红烛，公主将胭脂抹在唇间，轻抿染匀，对着铜镜自赏片刻，满意地抚动满额坠饰。满室镶嵌的明珠之外罩着一层红绸，致使透出的光也是酡红色的，映在公主华丽的饰品上，亮晶晶的折射珠光。</p> <p>忽然身后一阵玉石相击之声，公主似有所感，转头一看，只见二郎真君一袭白衣，手持折扇站在赤色珠帘后，隔着一串串专为殿下成婚所制的红宝石玉藻，定定地看着她，并无言表，眉宇间透出冷意。</p> <p>他并不开口，公主知道他心中不快，连忙将胭脂放在一旁，起身拨开珠帘走到他身旁，一双妙目也盯着他，眼中却含着笑意，“你怎么来了？我以为，你再也不理我了呢。又巴巴地跑来找我，就知道真君大人您心口不一——舍不得我，是不是？”</p> <p>龙女这样说着，双手探到他腰带处，交叠着抱住他的腰，尽力将黑漆漆的眼睛睁得圆圆地，这样显得可爱，冲着他狡黠地笑。杨戬不着痕迹地瞥了她一眼，又飞速地将眼神挪到别处，只不过四周净是刺目的红色，他吐出一口名为心烦的浊气，冷嘲道：“说笑了，我和公主什么交情啊，公主喜宴我怎能不至？”</p> <p>“宾客都在前殿饮酒，怎么真君独身到洞房来？”龙女将袖口挽起，伸出一节白皙的小臂，顺着杨戬的腰一寸寸攀到胸前，软着嗓音说道，“怪说交情不浅，大人要来叮嘱我什么？有什么为人妇之道要传授呢？”</p> <p>杨戬默然，半晌冷冷地哼了一声，拨开她转身走到榻尾坐下。喜床布置等更为华丽，从头到尾铺天盖地红彤彤的，上绣双龙戏珠的纹样，点缀着澄红红的晶石。真君见了，忽然发了脾气，一脚将榻边的喜凳踢翻，连带着喜盆喜帕，画着鸳鸯戏水的瓷罐，全被他踢倒在地。</p> <p>寸心虽有准备，也被这声响吓了一跳，忙走到他身边坐下，抚他的胸口，“怎么那么大气性，明明同你说过了只是做个样子，你急什么呢？”</p> <p>“只是做个样子？”杨戬咬着牙重复一遍，正待发作，一转头瞧见敖寸心凤冠霞帔，描眉画目，衬得如花儿一般的脸蛋愈加娇艳无比，心中更是气恼，“你打扮成这样，给他看的？我记得这是你母亲为你备下的嫁妆，从来放在箱中，连我也不肯给多看几眼，你今日戴出来是什么意思？”</p> <p>当日二人在灌口成婚，实为二郎真君抢来的亲，龙宫不及也不敢为他们张罗，只敢在数年后偷偷地送来一箱又一箱嫁妆，头一个箱中便是专为公主炮制的凤冠霞帔，虽未能用上，公主更视若珍宝，连夫君也不允私动。</p> <p>“别生气，别人倒没看见，却不是被你先看了么？”公主糯糯地抱住他，素手渐渐向下探去，“今夜让你看个高兴，好不好？”耳语罢，勾着真君的脖颈吻了过去，贴在他的唇边又吮又舔，亲得他渐渐松开齿关，探进舌去。</p> <p>杨戬本打定主意不要理她花言巧语，却怎生受得住这般，反扣住她的后脑深吻回去，唇舌交织，吻得她脱了力，软绵绵地倚靠在真君怀中。半晌杨戬终于松开她，双颊已显出潮红，再看龙女，早已媚态横生，一身艳红的嫁衣，肤如凝脂，螓首蛾眉，双腿发软并坐在真君身上，紧贴着她臀边的鼓胀早在吻她的时候硬挺起来，此刻更是抵在她身上弹动不休。</p> <p>龙女自然感受到了，身下一阵阵的潮意泛起，抚着他小腹处块垒分明的肌肉滑下去，熟练地握住，听到他隐忍地闷哼一声，这才满意地撸动起来，柔声道：“别生气了，过了这一茬，我父王对你点了头，你想怎样就怎样，我都听你的。说嫁你，就嫁你，你喜欢这个，我再穿一次给你看，行不行嘛？”</p> <p>殿下柔若无骨的小手抓住他这大把柄作乱，杨戬抵御不住，侧过头去吻她的耳垂，闻言却仍旧不满，“他日你父王又要你嫁给另一个，永远瞧不上我。”</p> <p>龙女闻言，手上重重地捏握一下，真君自然不敌，喘出声来，寸心见状坏笑半晌，亲密地搂住他又亲又吻，软声道：“二郎，我父王这一次也是没办法，才叫我做局。我又不是真的要嫁给他，你急什么？”</p> <p>“乐成祁一个小杂碎，我一刀砍死就了事，你父王就是要给我添堵罢了。”真君咬牙道。</p> <p>“你是司法天神，插手雷部之事，我父王要受上司刁难的。”此事杨戬也并非不知，寸心又道，“你同雷部的人又素有旧怨，虽然闻太师素性正直，但手下的将军大多是截教门人，要是你来插手，我父王今后怎么混嘛。”</p> <p>此事杨戬更是晓得，但寸心一旦回护龙王，将他置之不理，真君就更是不忿，心中只觉得敖闰是个没用的，只不过抓个小小泥鳅一般的反贼，要用女儿去设伏圈套，亦或是故意的，专为恶心他。关键敖寸心早年是因他深觉亏欠家中良多，如此无理的要求也要答允下来，不惜同他翻脸闹别扭数月。前几日二人刚刚大吵一架，杨戬一忍再忍，虽暴怒如雷，又不愿眼睁睁看着寸心嫁给那个什么狗屁的青梅竹马，又想不能中了敖闰的离间阳谋，梗着一股气，今夜才出现在这里。</p> <p>总之和她的家人比，自己永远是比不过的，何必再行辩解自找苦吃。杨戬心中烦闷不已，“我砍死他，你乐不乐意？”</p> <p>“谁？”寸心懵了一会，旋即醒悟，笑道：“我父王说了，他手里有我姑姑的印信，否则何必布这样的局，你别冲动，他也罪不至死。”</p> <p>“我看他是罪该万死，”杨戬握住龙女的双肩，反身一压将她骑在跨下，恶狠狠地说道：“说吧，怎么补偿我？”</p> <p>公主惊呼一声，捧住胸前已经在上下顶动的巨物，踢掉绣鞋，双脚勾住杨戬的小腿，从他皂云官靴的上沿向下探去，摩挲着不断勾来蹭去，笑道：“凭你想如何，都依你。”双手缠上杨戬腰间，熟练地解开他的腰带，将他腰间的玉佩收在枕下，剥出粗烛便送入口中。</p> <p>龙女吞吐这大家伙向来都是不顺利的，只将头顶的蘑菇勉强塞下，双手握在根部，尽力去弄，不过一二十合，满口的酸麻，满眼都是泪珠。杨戬满面潮红，轻轻抚着她后脑闭上双目，呼吸渐渐粗重起来，紫红粗柱上盘错青筋，意欲爆冲，又怕弄坏了娇滴滴的公主殿下。不一时，只听她啵地一声吐出口去，那物上下摇摆着打在她唇上脸上，激进的脉络沿着触碰的地方传到她身上，龙女浑身早已酥软难耐。</p> <p>杨戬一把将她压住，几下就将新娘隆重华丽的婚服扯了个七零八落，随手扔在地上，不一时便将她扒得只剩下小衣。仍旧是赤红的喜色，将她精致玲珑的身躯映衬得更加妖冶妩媚，杨戬忍不住抚摸上去，一把便隔着小衣捉住一只丰乳，另一只手滑到她身后，捏住一只软臀揉捏。</p> <p>寸心如何受得住这般的调戏，仍强撑着摘下凤冠步摇等饰品，掐诀置回床头合欢柜中，细嫩的胳膊环住真君宽阔的肩膀，凑上去吻他的脸。杨戬轻哼一声，说道：“做什么摘了，戴上才像是肏新娘子。”</p> <p>饶是老夫老妻，寸心仍被他讲得羞极了，一掐他颊边，“你说什么不要脸的话呢！”</p> <p>杨戬终于坏笑道：“不是么？我趁着新郎官未到，在洞房花烛夜肏新娘子呢，定将你肏个神酥体软，喜床都爬不起来。明日按例敬茶拜谒，公主却被姘头干得死去活来，好教你知道，哪个才是能做夫君的料。”</p> <p>如此说罢，一把拉开龙女的双腿，将那湿漉漉淋漓着蜜液的小穴暴露在红烛光下，扶住长枪，猛地肏入。</p> <p>好一顿水乳交融，不分彼此。寸心艰难地容纳着他，还不及喘息一二，小臂粗的行货在里头肆意妄为，横行霸道起来，捣去戳来，将龙女弄得颤粟不止。她尽力忍耐着声气，此处不是灌口杨府，也不是真君神殿，甚至不是在她天高地远的封地行宫中，他们在这几处地方早有合欢，放肆非常，但今日的喜宴设在龙宫，外出便是偏殿，虽然有结界相隔，响动过大未免有伤风化。</p> <p>然此夜专为真君而设，如若不哄好了他，往后不知又要拿来计较多久，不是同她计较，就是同他自己计较，既然不能留下祸患，只好牺牲色相。寸心缠着杨戬愈紧，声声喘得使劲浑身解数娇媚入骨，一把把温柔刀挠在他心尖上，激得明知故入瓮的真君越战越勇，勇往直前。</p> <p>寸心果然招架不住，软乎乎地喊道：“不……不要这么……好哥哥，你温柔一点……”</p> <p>“那怎么成？你见过偷人的磨磨唧唧，磨磨蹭蹭的么？”真君坏笑着顶她，“再者说，你又见过哪个姘头软弱无能，几下交了底的？我自然要努力些，把公主殿下弄高兴了，下次偷人还找我。”</p> <p>好不要脸，寸心忽然觉得“死鬼”一词于他身上委实的贴切，张口半天，感觉有些难以启齿，反而被他伺机伸了两根手指在口中，迫她吃那早先流出来的前精。</p> <p>龙女娘娘从善如流地含住他的手指，乖乖去舔他的指腹，一嘬一吸，把上面沾着的那点咸腥吃进腹中。真君大人玉树芝兰，那玩意虽不至好闻，但也绝不算难以下咽，情到浓时，公主还是乐意品尝一二的。但这并不代表她可以容忍那么多东西全灌到嘴里，一下子挤个满口，呛得人眼泪直流，凡有几回如此，无不是真君大人吃醉了酒，对她轻浮妄为。今夜他嘴里明明没有酒气，却眼见得将那紫红的尘柄拔出，热烘烘湿漉漉的就要往她脸上顶。</p> <p>殿下以为这厮又要玩什么射进嘴里的把戏，双手撑住他下腹上推搡着，说道：“做什么，不许撒野！”</p> <p>“给我口，快点儿。”杨戬拿住她的小手直撸，急不可耐。方才从温柔乡出来，快感惹得他红了眼，偏要再到那樱桃小口中再来上几遭才肯罢休。眼看龙女软在胯下，嗔目瞪了他一眼，心头更是一荡，坏笑道：“怎么，刚刚不是才弄过的，自己的东西你嫌什么。”说罢便要捏住殿下小脸使她张口。</p> <p>寸心连忙推打，“不要，你一次那么多，弄在嘴里好难受，我每回都要呕的，不许你弄！”</p> <p>杨戬一愣，“哪里就要射了，你也太看不起我。”</p> <p>“好哇，原来你从前都是诓我！”龙女怒目圆睁，恶狠狠地瞪着他，以表羞恼。她的小衣此时还挂在臂弯里，乱七八糟地揉在胸前，虽然卸下发饰，但刻意描摹的妆容仍然艳丽得非常，口脂被他弄花了一些，倒是更显妩媚。杨戬素来和那些故作清高的书生犯嫌，并不敢苟同甚么未施粉黛更美之言，夫人如有闲情逸致打扮一番，在他看来实属大餐一顿，谁能对着公主殿下亲手织就的十丈软红无动于衷呢？总之他很容易彻底沦陷。</p> <p>好比现在，她脸上的妆容如此艳丽，洞房中处处绯红，映在她雪样肌肤上，显得淫靡又圣洁，这种时候拿眼睛来瞪人，格外危险，龙女娘娘显得英气又艳丽，征服这样风华绝代的美貌少妇敖寸心，实在是杨戬生平排在前几位的一大痴念。他俯下身去蹭着她的耳朵吻她，声音中因沉沦欲海难得带有几分鼻音，“好夫人，给我个痛快，求你了。”</p> <p>色字刀自少年时起早把他剐了一遍又一遍，寸心也受不了他，一来二去，终归如他所愿。只不过这一回杨戬志不在此，从征服过的小嘴中撤出，又将龙女骑在胯下，狠狠地奸弄了数个回合。妆台上的明镜只照至红纱帐上，喜床晃动着，传出一阵阵男女交织的喘息，寸心早就把不敢放肆大叫一事忘个干净。</p> <p>胡闹了大半夜，终于云收雨歇，公主但觉口中干哑，支使他摄来一杯茶，二人同饮，又在两口中不知转了多少回。寸心终于吻罢他，挣扎着躲开，唇上还沾着亮晶晶的茶水。她脱力倚靠在杨戬怀中，软声撒娇：“你欺负人，明知道我故意哄你，你还那么过分。”又想到他方才是如何地“过分”，一时面颊又发起烫来。</p> <p>“我知道，所以不能辜负公主良苦用心么。”真君满足地眯了眯眼，“既如此，不和你计较就是了。”</p> <p>“你！那么多次！”寸心亮出小尖牙咬他，“这几个月，哪一回不让你得意了！”回想起自从西海有此计划，而她又不得不答应下来，试图说服杨戬得到默许的这几个月，为着哄他，如何的浑身解数也使尽了，平日里不允他的那些，数月来无不百依百顺，于真君而言所谓夜夜笙歌也不为过，却苦了她一条真龙，被人骑在身上作威作福，方才还要瞧他的脸色。</p> <p>杨戬攥住她的手亲了又亲，“两回事。”闺房之乐是一回事，婚事又是另一回事，敖闰要是再敢往他头上扔草，被雷劈死也要威吓一下老龙王，能不能乖乖的当他老丈人，能不能？</p> <p>一把拉起大红喜被，上绣双龙戏珠，盖在二人光裸的身子上，二人又依依不舍地吻了许久，缠抱着一同入睡。</p> <p>夜半中天，万籁俱寂，正是一片安宁静谧的光景，门窗刺喇喇一声轻响，翻入一道黑影。花烛还未燃尽，是要烧到天明，红帐内沉睡的男人猛地睁眼，随手扯过一件布帛，一跃而起，只听得铮一声响，公主搁置在妆台畔的青冈软剑被他随手抄起，自软红帐幔中突刺而出。那翻窗而入的不速之客大惊失色，不曾看个分明，低声说道：“殿下，是我！”</p> <p>杨戬大怒，手起剑落迎头砍下，那人慌忙举起剑鞘格挡，金属相击擦出一片火光，剑势只不过稍稍偏移向右，贴着那人的发丝而过。</p> <p>殿下哪里来的这般力气招数？乐成祁正自疑惑，抬头一看，只见一个蜂腰猿背的男子站在帐侧，背着烛光半边脸隐在暗处，只腰上系着一件亵衣，光裸的臂膀上满是女人的唇印和咬痕。</p> <p>“你是……”心下已有几分猜测，只不过仍不愿尽信，只得怔愣在地。</p> <p>杨戬本就看他格外不顺眼，才被公主安抚下了不平，哪知这厮竟然真敢寻来！重重地哼了一声，举剑便砍，乐成祁慌忙反手举起兵器格挡，二人搏打起来，也不过一二回合，杨戬将之一脚踢翻，踩在脚下，反手就要刺死，忽然听见帐中传来女声：“二爷休恼，留他性命。”剑尖相距咽喉不过一寸。</p> <p>杨戬回头看去，纱帐重重，公主不曾起身，此处不能窥见丝毫，这才放下心来，咬了咬牙，终归收起宝剑。地上的少年闻言，直欲起身，又被杨戬重重地踩回地面。他满头大汗，心裂欲碎，咬牙瞪着杨戬，只不过实力太过悬殊，任凭他如何挣扎无济于事，这时心中茫茫飘过蜉蝣撼树的无力感，苦笑大喊：“殿下！阿肆还在家里等着我带你回去，他说要再酿一坛桃子酒，来年我们三个再饮酒下棋。叔公劝我不要来，我没听，我是为你回来的！殿下！”</p> <p>杨戬眉头一挑，几欲杀人，又听帐内女子轻声道：“成祁，两千年了，我长大了，不再爱喝桃子酒了。把姑姑的印信交出来，父王或许还能饶你性命。”说罢，将枕边的一只海螺祭出，讯息飘出窗棂，不一时，巡海夜叉将暖阁团团围住，叩见三公主。</p> <p>门外，蟹将军指着虾元帅大惊失色：“老虾！你不是应该在里面保护公主么！你为什么在这？！你留公主一个人对付叛徒？？！”</p> <p>“是公主支我出来的。”虾元帅无奈道。“等会你就知道了。”</p> <p>蟹将军急得就要破门而入，却看到暖阁咯吱一声打开，一个身量高大的玄衣男子提着五花大绑的叛徒走出来，一把将之扔在地上，随意地同他们见了礼。</p> <p>“真……真君大人……”蟹将军结结巴巴。</p> <p>“二位自便，本君就不送了。”真君一掸衣袍，转身走回屋内，红色的烛光从半开的门缝处洒出些许，咯吱一声，被人严丝合缝地关好了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/84.短篇-2024/122500.新婚之夜.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA" title="标签">#得寸进尺</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/05/10, 22:33:43</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/04ed5e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">还愿</div></a> <!----></div> <div class="page-nav"><p class=
