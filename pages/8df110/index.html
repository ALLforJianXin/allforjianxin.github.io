你自己如何海量呢？路都要走不稳了。”寸心掺着杨戬，一面念叨他，一面缓缓向寝室走去。</p> <p>“都是战场上的好兄弟，多年不见了，一时兴起，多喝几杯何妨？何况夫人，”他轻笑着，讨好地捏了捏她的手指，“哪个比得上你真龙海量？在你面前，自然何人都算量浅呀。”</p> <p>寸心嗔怪地睇了他一眼，搀着他转到九曲回廊之上，屋檐之下悬挂着颇有诗意的橙红色宫灯，偶尔有夜风抚动惊鸟铃，发出几声清越的声响，听着前院的动静逐渐变小，龙女抚了抚他衣领边一个小褶，说道：“都回去了吧？我见有几个兄弟喝多了，何不留他们住一晚？方才我正欲挽留，你那么急着拉我做什么？岂不显得咱们缺了地主之宜。”</p> <p>杨戬脚步稍有些踉跄，只是微醺而已，倒也并没醉，闻言将搭在她身上的手臂一紧，整个人凑她更近，几乎要以面相贴，大掌暧昧地摩挲她圆润的肩头，声音有些低哑：“叫他们住什么住？一群臭小子，愣头愣脑的，免得冲撞了你。”</p> <p>寸心喷地一笑，推了一把他压下来的肩，说道：“我又不是甚么娇滴滴的女郎，当年灌口治水时府里人丁嘈杂，也不见你多心疼我啊。”</p> <p>“什么话？我怎么不心疼你？要不是看你害羞，每天晚上我都……”</p> <p>“不害臊！”龙女啐他一口，因想起些陈年往事，脸颊红扑扑地，“你还说别人，你才是粗手粗脚地就会惹我生气！”</p> <p>他笑得更欢，凑近她粉腮去亲了一口，手掌抚她的肩膀揉啊揉，“我怎么粗手粗脚惹你生气的？嗯老婆？”</p> <p>寸心忽然感到后腰处教人用粗棍子顶了一下，她一愣，忽然羞得面红耳赤，狠狠拍了一下他正欲作祟的手，发出啪的一声脆响，“你干嘛！越来越无状了！知不知羞的！”</p> <p>“哎？怎么亲一下都不行了？”郎君凑在她耳边蹭着嘀嘀咕咕，耳鬓厮磨，不一时又缠着她问道：“寸心，我算着你的日子过了，是不是？”</p> <p>“好哇，你净想着这些事。”寸心瞪他一眼，见他仍吊儿郎当地不着调，气得拖麻袋似的扶人进了房间，将床帘挂上金钩，未及掩门，却被那冤家缠上来牢牢地按住，身后朱漆木门关阖发出咚地一声，他湿润的唇带着浓郁的酒香扑面而来。</p> <p>杨戬亲她亲得重，仿佛要吞她下腹，平日里故作风雅时偶尔还舍得装着文质彬彬地亲亲，喝了酒以后本相毕露，必定是亲得极其粗鲁，跟个恶狗似的。敖寸心踩了他一脚，意为你个色鬼轻一点行不行，杨戬没有理她，照旧啃得啧啧作响。</p> <p>“哼嗯……”都是老夫老妻了，唇齿间亲昵，格外容易动情，寸心因来葵水几日不曾允他近身，此时被他这样一搂一吻，鼻息间尽是丈夫身上刚阳的男子气息，一时间身酥体软，只觉下腹一热，蜜处已湿，羞得抱紧了他的项子，软语求道：“好二爷，到床上去。”</p> <p>“唔……嗯，”郎君正埋首舔吃一双大半自衣间剥露出的美乳，囫囵应了声，也不舍得松口，一把托住她饱满的臀，将她举起来边吃边走。</p> <p>寸心扶着他的肩膀立身，小声地说：“轻一点……”话音未落，二人相拥着倒在床上，他饿了好几天似的，匆匆扯了半条被子遮在腿上，捧着她又亲又啃又摸，龙女低头只能看到他忙碌的发旋。</p> <p>竭尽全力舒展着四肢供其品味，龙女心底还是怜惜他几日吃素的，因为月信期间她虽不能行房，但性欲教之以往尤盛，如此愈发难捱，心火旺盛，脾气也不大好。杨戬若靠她近一些，她便觉得极其烦躁，少不得不断找些小故，与他争吵。</p> <p>杨戬素日也是气性重的人，但到底爱怜妻子，想她身体不适，也不与她计较许多，遇见龙女无理取闹时，也就由着她胡搅蛮缠一阵，温言哄慰，及逗得她开颜为笑方罢。</p> <p>如今信期既过，龙女深知丈夫欲念深重，更兼修习玄功，阳气精纯，却不禁断情色，比之常人所需尤切，忍得这般时日，又要体谅她性格娇蛮，属实劳累。今夜既金风玉露相逢，少不得要随他索食至饱方罢。</p> <p>寸心爱怜地揉了揉他卷卷的头发，他埋在她胸口乱啃，头发到处乱跑，蹭得她痒极，又感到他从不离身的项链一下一下触到她小腹，不时冰得她一凌，本能地扭身要躲。</p> <p>杨戬察觉到压在身下的猎物有想跑的趋势，发出几句类似于抗议的咕噜声，本来身体微有些侧，立即挪正了结结实实压在她正上方，双手捧着她的臀肉囫囵揉着，十分不舍地放开口中叼含着的一方乳尖，抬起头可怜兮兮地看着她。</p> <p>寸心顺势捧住他乱糟糟的脑袋，只见郎君面色潮红，双唇水润，双眼湿漉漉地，像只大狗狗。他浑身携狭着逼人的欲望，看得她浑身一热，在那双大掌不知规矩地揉弄抚慰之下，忍不住一哼，双腿夹住他劲腰自穴间又流出许多水儿来。</p> <p>“啊！嗯……二郎……嗯轻一点……啊……”杨戬见妻子也情动，不由得热血沸腾，猛地沉身一顶，那粗长的阳具直挺挺抬着头挤开她的嫩肉生生插入半根，直插得她一声惊叫，淫水淅淅沥沥直流，穴肉一阵一阵地收缩着吸绞他的肉棒，仿佛在饥渴地吃吮服侍
