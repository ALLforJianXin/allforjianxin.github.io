产卵预警。</p> <hr> <p>杨戬与敖寸心成亲日久，平常时日也常是蜜里调油，偏每过一阵子那女郎就要发作无名邪火，乒乒乓乓砸得家里鸡犬不宁，他只能避出门去，不是跟梅山兄弟去打猎，就是来三妹的圣母宫混几天日子。</p> <p>“……二哥，你可知道，女子来月事时会情绪起伏？”杨婵给哥哥又添了茶，然后一边换新茶叶，一边委婉提醒。<br> 
她哥端茶杯的手停了一瞬，放下后面容上带些疑惑：“既是月事为何半年一次？”<br>
杨婵放茶叶的手抖了一下茶叶洒进小火炉里火苗突地一窜。“……咳……二哥……咳咳，嫂子，嫂子她是龙啊。”</p> <p>圣母娘娘取个水的功夫她哥哥已经不见了踪影，千里之外杨戬站在杨府门前拈着张纸沉吟片刻，塞到跟在身后的狗儿怀里：“哮天犬，照这个采买。”然后推开门进去。<br>
走在去卧室路上的杨二郎满心欢喜，“待会儿按三妹给的方子煮了红糖姜茶，定能让寸心明白我的体贴之意”，却在推开门后呆立。</p> <p>红绡帐暖玉生烟，满室甜腻香气他最熟悉，更闻几声压抑喘息再难自抑，急冲两步却迎面一鞭龙尾抽来，闪身躲过的同时一猫腰，抢到床边撩开纱帐。</p> <p>“寸心？寸心你怎么了？”<br>
帐里半人半龙痛苦扭动，纯白寝衣早扯碎了蔽不了体。敖寸心平日最爱扑到他怀里，这时却躲闪起来让他的心揪在一起。复再放软声调：“寸心，让我抱抱你。”暗自做了准备还好这次她没推拒。<br>
抱到了人他松一口气，下一瞬却摸到她身骨滚烫还抖得厉害：“你怎么了？可是哪里不舒服？我叫扁鹊来看。”想要起身又被拽住衣襟：“不要！不用……”龙女声调由高渐低身子也软在他怀中，杨戬忙坐上床榻搂龙女斜倚在他身上，行动间好像碰到了什么，骨碌碌滚在了地上，他抬眼去看。<br>
——一颗蛋？</p> <p>却说神龙与人类迥异本也不是什么好避忌的，只龙女年轻脸皮儿薄，又是逃家出嫁身边也无个长辈教导，她不好意思开口与郎君分说，借小性儿隔阵子一闹，把人都赶出去她好独自熬过，竟也被纵容这许多年。</p> <p>敖寸心本就羞涩难言这一时见着那郎君愣怔，还以为是嫌了她这副模样，不禁悲从中来，眨眼间泪水盈满眼眶，抬手就往他胸膛锤去，边锤边推边嚷着：“你放开我放开我，你出去……”<br>
杨二郎被她唤回神儿，看那双眸潋滟柔芷呈露的小模样怎么舍得丢得开手去，可又怕伤了她不敢乱用力，只一手将人搂紧另一手接了龙女锤来的小拳头按在心口，一叠声哄她：“寸心别怕，别怕。杨戬回来啦。”<br>
饶是敖寸心再不聪敏这时也觉出了味儿来——他并不介意。<br>
想通这一层，惯会撒娇弄痴的小公主扁扁嘴就是委屈：“你怎么才回来啊……”她手还在他胸口只觉胸腔里的震动突然更快更有力。<br>
杨戬闷声笑笑，想起三妹提点，温声问她：“你可是来月事身上不爽利？”<br>
龙女咬咬嘴唇微微点头，杨戬凑上去亲了亲她嫣红眼角，余光又瞥见地上那颗蛋，未及思量如何相询怀中女郎突又抖如筛糠——他的问题便不必问了。</p> <p>龙女臀尾难耐地扭动着，喘息越来越急，再接着便有白白的圆圆的东西从她小穴中露出来，能看到它一点点扩大，撑开小穴如艳红花瓣徐徐盛放，那当中的卵便如花蕊一般。<br>
花盛开到一半停了。<br>
杨戬粗略衡量了一下，这颗比刚刚那颗显然更大一些，所以让龙女吃力。龙女下面被卡住不上不下，饱涨难耐的感觉冲击着神智，几乎欲疯欲死，神君思及她已一个人重复这样的遭遇许多次，心中酸涩道“为什么不告诉我呢？我是你夫君啊……”龙女只顾努力将卵排出体外，分不出精力听他话语，那硬硬圆圆的卵就卡在甬道尽头，恰好压迫着她的敏感点，她腹心用力正让那压迫更甚，小腹一阵酸软溢出一汪春水，借着这潺潺流水润滑第二颗终于也顺利排出了。<br>
随着轻轻“啵”的一声第二颗卵离开龙女身体，刚吐出龙蛋的小穴没能立刻收缩，嗫嚅着回味着，尾巴倒先安分了下来，盘过半圈从地面攀上杨戬小腿，有一下没一下地蹭着他，她额角顶在他下巴处，正好也蹭他两下，让二郎真君目力所及是一室淫靡，心下却软乎乎的。<br>
杨戬拿袖子帮敖寸心擦了额上脸上的汗水，视线略溜达出去见两团柔软白腻，不由得下腹一紧。忙轻咳一声转开视线，抽出一只手来——敖寸心小拳仍放在他胸口——向女郎微微隆起的肚腹摸去。<br>
宽厚又温暖的大手在龙女小腹处画着圈按揉，微粗的肤质却揉得她舒服极了，舒服得几乎想要睡过去。但也只是几乎，在她体内又一颗龙蛋渐渐硬了外壳，急须排出。杨戬也感受到了这变化，一边轻柔帮她按摩，一边往下微微用力——这一颗大小居中，相对容易地就完成了。</p> <p>再下一颗就没有那么容易了。<br>
杨戬不知道的是，这次这颗在敖寸心历来所排的卵里也算大个头的了。疼痛折磨得龙女腰背都挺了起来，如一张反张的弓，最高处雪白山峰上两颗红樱映着窗缝里漏进来的日光亮晶晶的，诱人採攫。<br>
杨戬咽了咽口水，手臂从龙女肋下穿过，继续帮她揉着小腹，可只有自内而外的推力不足够，这一颗塞得太满没有缝隙给体液渗出润滑，穴口的软肉扒在蛋壳上不滑开，以至于他手稍重一点差点儿要撑得小穴撕裂，轻一点儿那玩意儿又被吞进去。反复几次龙女被折磨得就快要失去理智，抱起他手臂就是一口，停了用力加上挣动间动作太大，这颗卵一下子滑回腹心，激得她长长一声哀鸣，窗外突然淅淅沥沥下起小雨。<br>
杨戬理了理妻子散乱的鬓发，轻轻跟她说：“休息一下，休息一下我们再试一次。”龙女有气无力地眨几下眼皮表示同意。<br>
再一次将卵推到穴口时，杨二郎心念一动，摇身又变出个自己。变出的杨戬来到床尾跪在龙女身边，伸两手如他平日前戏里帮她放松的动作般按揉她腿根和小穴两侧，果然有些帮助，龙女没觉得怎么痛，已到了最关隘处。<br>
杨戬在上处加力不停，变出的分身干脆舔上去用唾液帮她润滑，终于扯开小穴唇瓣，帮这颗大小可观的蛋诞了下来。</p> <p>有了那颗巨卵的扩张，又有了“两个”杨戬帮忙，连比前头第二颗更大的也通过得比较顺利了。断断续续又产下了三颗，但长时间的折腾也让敖寸心几乎脱力，这第八颗还没出来呢，第九颗就迫不及待地赶了上来，捣乱着刺激着那隐秘的腺体。<br>
春水一如窗外止不住的雨，她被杨戬手掌和最后一颗卵内外夹击一溃千里，神思混沌早不知今夕何夕。怕拖久了对她身体不利，杨戬控制分身小心翼翼伸三指略撑开穴口，将最后两颗蛋取了出去。</p> <p>许是小憩了一阵，龙女再睁开眼睛的时候看到她夫君一张俊脸近在咫尺，而自己在他怀里。察觉她醒来杨戬也紧接着睁开眼睛望向她，眸光如水温柔得快能将她神龙溺死在其里。<br>
杨戬伸手搭上寸心肩头轻轻摩挲，抚过她肩头几片龙鳞触感让他俩人都新奇。良久，杨戬开口道：“寸心，我是你夫君啊。没什么需要避着我的，知道吗？”<br>
杨戬话说得极真挚极温柔，却不知龙女想到了哪里，一霎那红了脸颊耳根，再一霎那干脆幻回本体。杨戬拥着条扭来扭去的小粉龙哭笑不得，干脆也幻化作一条黑龙同她纠缠在一起。<br>
两条龙从床上一路纠缠到地上，胸腹紧贴趾爪相扣，另一种淫靡。</p> <p>狗儿照方采买完再照着步骤熬好姜茶，中间突然下雨还淋湿了他晾在外面的披风，回来时差点儿熬干了水，忙在添过后重新煮开，闻着甜甜香气反正他自己很满意。<br>
捧着汤罐茶碗往后院儿去，远远见着正厢大门敞开没看清里头黑黑红红是什么就高声呼喊“主人主人，茶熬好啦！”走到半道儿吃上了闭门羹。
里头传来句：“出去。”<br>
又补上句：“你自己喝了吧。”<br>
狗儿委屈。</p> <h2 id="后续小剧场"><a href="#后续小剧场" class="header-anchor">#</a> 后续小剧场</h2> <h3 id="小剧场1"><a href="#小剧场1" class="header-anchor">#</a> 小剧场1</h3> <p>敖寸心心情好的时候也是会下厨做饭的，尤其在杨戬刚出门回来时更显殷勤。<br>
这一日的菜色里有个炒蛋饭，杨戬吃了一口突然停下了，旁边狗儿看在眼里接口道：“主人主人，三公主做的炒蛋饭是不是特别古怪！没有街头儿刘妈妈家炒的好吃。”<br>
本以为是口味上跟主人产生了共鸣的哮天犬没想到迎接自己的是兜头一扇子，然后还被抢了碗。<br>
“不爱吃拉倒。以后都不许吃了！”</p> <h3 id="小剧场2"><a href="#小剧场2" class="header-anchor">#</a> 小剧场2</h3> <p>哮天犬端着刚煮好的红糖姜茶往后院儿送，路过花圃时候看到土里几片蛋壳，寻思着：“三公主又种花啦。”</p> <h3 id="小剧场3"><a href="#小剧场3" class="header-anchor">#</a> 小剧场3</h3> <p>杨戬炖了骨头汤。不是给狗儿的，是给龙儿的。<br>
“来寸心喝汤，补补身子。<br>
“来寸心吃排骨，补身子。”<br>
狗儿蹲在廊下捧着碗肉汤拌饭：“……”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/01.文/87.短篇-2021/120411.盈满.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%96" title="标签">#人外</a><a href="/tags/?tag=%E4%BA%A7%E5%8D%B5" title="标签">#产卵</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2022/05/01, 01:24:22</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/93bfdf/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">病态</div></a> <a href="/pages/f9e0d0/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">情潮汹涌</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
