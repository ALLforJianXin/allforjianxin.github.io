XtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">海里事<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>“哟，这不是我西海三妹？”<br>
这一嗓子阴阳怪气，敖寸心乍一听得，转头去看，来人可不是两千年没见的敖丙？  <br>
“我还当是谁，”她嗤笑一声，放下酒盏，“华盖星君一向少见，东海的酒可还喝得惯？”<br>
敖丙眉眼往下一耷，“你这丫头也笑话我。”<br>
见寸心往旁边挪了挪，敖丙自己又拽张垫子来，硬挤到她身旁坐下。<br>
寸心拈一个新盏来给他倒酒：“你倒还能认出我来。”<br>
“西海的小妹妹，哪里能认不出。”她与幼时一般可爱，如今更添一层美艳，即使在龙族中也是极为出色，“长成大姑娘了。”敖丙感慨道。<br>
“少跟我装长辈，咱俩可没交情，”寸心哼了一声，“我就记得从前你拽我角，让我大哥揍了一顿。”<br>
“行，说正事。”敖丙闷了一口酒，“你家老三没来？”<br>
“他礼到了就行，我大伯都没说什么。你找他有事？”<br>
敖丙叹气：“说什么礼不礼的，我就想找他说说话嘛。”<br>
“那你找我大哥二哥去问，找我干嘛？”寸心嘴上不客气，手头不停又给敖丙添酒，“好像咱俩小时候多好似的。”<br>
“咱不是都行三么。”<br>
寸心闻言翻个白眼，“你是不是最近当值懈怠了，怕我大哥训你呢？”<br>
敖丙搓手：“那倒……倒也不全是。”他踌躇了一会儿，“好妹子，跟我说说那个司法天神呗。”<br>
得，原来是在这儿等着她呢，什么三哥都是借口，这才是他的“正事”吧。<br>
寸心把酒盏往桌上一顿：“不熟，没话说。”<br>
敖丙谄笑：“别跟我开玩笑，那不是你夫婿么，虽然算不得驸马……”<br>
“前夫！”寸心一掌拍在桌上，咬牙切齿，“别跟我提那混蛋！”<br>
果然传言都是真的。敖丙暗想，那混蛋果真是抛弃发妻上天做官，近来更是为虎作伥倒行逆施，残害凡间生灵亦不手软，恐怕也不会顾忌前妻情分，他该咋办哟。<br>
他好不容易逮着机会下界来，因当值来得晚，只让母后骂了一通又揉搓半晌，都还没顾得上打探消息。原以为西海三妹处能探听些许，看她这个样子，倒有些问不出口了。</p> <p>“嫂子？”<br>
寸心回头，惊喜地站起来：“小婵！”她上前一步拉住来人的手，“好几年没见你，还是老样子。”<br>
敖丙抬眼看去，来人是个温柔和善的女仙，周身俱是祥和气息，观之可亲，正柔柔说道：“好几年没见嫂子，也还是一样精神。”<br>
能唤这丫头“嫂子”的，还能有谁？<br>
“谁是你嫂子呀，”敖寸心噘起嘴，“我跟他可没关系了。”<br>
“好，好，三公主，三公主。”三圣母好脾气地应声。<br>
寸心摇摇她的手：“你就唤我寸心，不是挺好嘛。”<br>
敖丙自己给自己倒酒，支起耳朵听他西海三妹说话。原来这三圣母是四妹请来的客，他就说么，今日给八弟过满月，来的都是自家龙，携朋带友的不少，却没听说哪个能与司法天神有关联。<br>
只是他与这三圣母也从无交情，今日不过初见，更不用说他还想打探机密，根本毫无办法。<br>
还是再缠一缠西海三妹。<br>
瞧着这丫头与三圣母关系倒还亲密，俩人亲亲热热拉着手说了半晌话，三圣母又寻他四妹去，三丫头才重新坐下，提壶灌茶。<br>
“那是司法天神的妹子？”敖丙殷勤地给寸心倒酒，趁机询问。<br>
寸心不接他的酒，自己拿茶来喝，“你不都听到了？关心他做甚，有话直说。”<br>
敖丙诚恳道：“我就问问南郡的事。都是我东海听令行雨，这等伤天害理之事，将来设若清算……”<br>
敖寸心手上一顿，也不抬眼，低头接话道：“你也说了是东海，何必问我。四姐没与你讲？”<br>
“我开席才来，还没来得及。”<br>
“那你急什么，等会儿问四姐，问大伯，哪个不能和你说？偏要来找我。”寸心手中握着茶杯转来转去，并不抬头看他。<br>
敖丙没觉察异样，自顾自叹口气：“当初那杨戬打起仗来不择手段，我就该想到他是心狠手辣之人。”打定主意待会儿去找四妹，便又好奇起来，“你居然跟他过了一千多年，怎么忍下去的？”<br>
敖寸心才与杨戬吵完架，原本就一肚子火，听敖丙这么一问，更是气不打一处来，“怎么，从前灶王爷的折子没往你那传过？”<br>
敖丙忽然想起一事，四下张望一番，低头小声：“听说他家灶王爷叫割了舌头？”<br>
寸心大惊：“说的什么话！”怒火瞬间转向，“你们天上都这么传他？”她眼中冒火，“好好一个星君，也听别人嚼舌头，传闲话，没凭没据的跟着人瞎说八道，好三哥你死过一次也还是没一点长进！”<br>
“别别别别生气，我这不是偷偷问问你么。”敖丙拼命竖指头叫她声量小点，又讨好道：“那你说，我用不用给他神殿送礼？”<br>
“好端端的送什么礼？”<br>
“这不是怕有万一么。”<br>
寸心瞧他这熊样有些想笑，又隐隐有些难过。从前她东海三哥也是兴云布雨的正神，英姿赫赫何等潇洒，如今让天廷拿捏在手中，竟要低声下气去讨好人——<br>
想到杨戬她心里更是一痛，这样日子究竟要过到什么时候？天上众仙可还记得他是护佑一方的川蜀之主，可还记得他是拯救苍生的治水英雄？<br>
可她只能眼睁睁看着敖丙与他人一般，畏惧杨戬、憎恶杨戬，又为着“不得罪小人”而讨好于他。<br>
先前是因为什么和杨戬吵架来着？算了不重要了。寸心倒满两个酒盏，双手递给敖丙，又与他碰杯：“别人如何你就跟着做，不出头便好。若有事，你来寻我。”<br>
敖丙大为感动，仰头一口干了，暂且放下一段心事，又好奇道：“都前夫了，你还替他说话呢。”<br>
“怎么，”寸心斜睨过去，“你见到哪吒难道回回都要打起来？”<br>
“那倒没有。”敖丙抬抬唇角，“任谁神魂受困十多年，日日夜夜看着仇人一路建功，也看烦了。”他难道不曾恨意冲天？不过顺应天道不得不接受罢了。天上多少当年生死仇敌，大家如今见面也不过一笑了事。<br>
敖丙毕竟是爽快性子，说完了也就放到一边，转而有一搭没一搭地说起闲话来。<br>
“我后来听四妹讲过你带她去金光洞的事。好妹子哥哥心里记你的情，那十几年一直想着你呢，可惜你也不去看我。”敖丙絮絮叨叨，“……就是给定在一处当真无趣，每日里来来去去见的就那几个大老粗。”他喝得有些醉了，“当初你俩刚成亲，好妹子你怎么不同去西岐？好歹可以跟我说说话，再者夫妻同心协力，说不定杨戬行事还能讲些良心……”<br>
敖寸心翻个白眼。“接着喝，再喝点。”她给她添酒，醉死他才好！“三哥上天做星君，也有五年多了吧？”敖丙闻言稀里糊涂地点头。<br>
“我长了两千岁，你才多过五年！果然还没长脑子。”寸心用空酒壶敲他的头，“你也不看看去的都是什么人？”<br>
敖丙糊涂道：“什、什么，不都是同僚？”<br>
果然傻了。“莫非我是道门中人要听他天尊法旨？”<br>
敖丙摇头。<br>
“阐截相争我们四海可要参与？”<br>
敖丙还没傻到底，接着摇头。<br>
“天廷缺人手，可与我有关？”<br>
敖丙答：“那自然一点关系也没有。”<br>
寸心瞧他：“还行，回去睡觉吧你。”<br>
“别赶我别赶我，”敖丙仿佛忘了这是他自家东海，拽着他西海三妹的袖子不放，“要不好三妹你也去天上看看我，天上就我一个，连一起擦鳞的伙伴都寻不出来。”说罢露出手臂，给寸心看他的鳞，“你前夫势大，叫他给你寻个职位，也好没事找我玩。”<br>
寸心不妨他冷不丁说出这等傻话，“噗”一声喷出酒来，忙用帕子捂嘴，咳了半晌，见敖丙还殷殷看她，气道：“莫说四海，就是三江五湖，谁家好龙吃饱了撑的上天寻摸官职？自家水域还忙不完呢，上去听令受气，闲得慌？”<br>
话虽如此，寸心后来到底寻了好些新近琢磨的保养方子，叫人送上去。敖丙承她的情，更加努力暗中与杨戬作对，又在同僚之中把西海三妹讲得惨之又惨，将杨戬的“忘恩负义”“冷血冷心”说得尽人皆知，此乃后话。等那二人重新成亲，寸心住进神殿，敖丙才惊觉被他二人骗得好惨，从此绕着神殿走，此乃后话之后话。<br>
只说此时，寸心却因提在敖丙面前提起哪吒，一时想起当年她为敖丙找上金光洞的事，那时她一剑直刺杨戬脖颈，却如何也下不了手，而那傻人就直愣愣站着，她若不曾及时收劲儿，眼看就要割破他的喉咙。<br>
哪里像敖丙说的那样心狠手辣不择手段啦，明明是个傻子；战场上非常时刻要用非常手段，那也正常嘛。寸心托腮回忆片刻，忽然有些想他。</p> <p>东海八太子的满月宴办得圆满，宾客散去，只剩东海自家团坐闲话。龙王龙后这才得空仔细看看自家老三，想多说几句吧，人又醉得很不像样。<br>
龙后唤人去煮醒酒汤，“做得苦些，最好叫他喝一口就醒。”<br>
虽然华盖星君不当值时也会抽空下海回家，可到底天上一天地上一年，相聚时少，分离日多，东海一众哪能不想他。<br>
龙后摸摸襁褓中幼子的脸，又去看瘫坐一旁的三子：“今日都在与小寸说话呐？”<br>
敖丙迷迷糊糊地抱怨道：“西海三妹长大了不如小时候好玩。”<br>
“妹妹又不是给你拿来玩的。”龙后笑他，“和她说什么了？”<br>
敖丙努力振作精神，搂着龙后胳膊与她撒娇：“我都说当初在那处困了十多年，她不去看我也就罢了，也不说心疼心疼哥哥我。”<br>
时过境迁，龙后当年何尝不曾疾痛惨怛撕心裂肺，如今心境渐趋和缓；况且敖丙在天廷当值，怎能糊涂？她揉揉他的脑袋反问：“她要如何去？也不合适。”<br>
“跟她自己找的夫婿同去有何不可？”敖丙摇头晃脑，“与我找许多借口，就是不心疼我。”<br>
龙后好笑：“找些什么借口？”她倒想听听小寸怎么说。<br>
“说什么不是道门中人不听法旨吧，她自家夫婿是天尊徒孙，跟着走走有什么关系？”<br>
龙后摇头，给敖广使个眼色，转头又去看她小儿子。敖广亲手给华盖星君端来汤药，掰着敖丙的嘴就往里灌。<br>
敖丙惊天动地咳了半晌，嘴里苦得似吞黄连，“爹、好爹，您干啥呢这是？”<br>
“给你清醒清醒。”敖广用空碗敲他——不知自己恰好敲在寸心敲过的地方，让敖丙“嗷”了一声，“莫说人家小寸比你多长两千岁，就是当年小寸也知道这事做不得，你还不长进！”这个蠢货，“两教相争，与四海有甚关联？凡人间朝代兴替，与海里有甚关系？天廷急需人手，四海再掺和进去，灵霄殿里那二位可还坐得稳？”<br>
敖丙愣住。<br>
“到时候何止私下寻隙，只怕还能名正言顺多安几个罪名来。”敖广气他愚蠢，“今后少提这些不着四六的馊主意！”<br>
敖丙捂头应声，丝毫不敢再提他还想让西海三妹上天做官的事，怕又挨打，忙换了话头问起正事来。<br>
龙王龙后对视一眼，龙后道：“楠郡的事有明旨，我们心中有数，不消你操心。你只管跟着别人行事，遇着司法天神，与同僚一般应对，莫去出头。”<br>
敖丙嘀咕：“西海三妹也这么说来着。”<br>
龙后笑笑：“小寸比你聪明呢。”</p> <p>话分两头。<br>
那厢寸心回到西海，与父王母后道别，转头出宫迫不及待奔向封地。<br>
侍女迎上来给她换掉出门的华服，寸心问道：“他呢？”侍女朝内努嘴：“真君一整天都没出来。”<br>
一颗心这才落回原地。寸心迈进内室，只见山似的案卷摞在桌上，杨戬给埋在当中，奋笔疾书不停。<br>
好像先前才吵了架来着。寸心绷起脸：“怎么还没走？”<br>
杨戬这才抬眼——他早听到动静，就等着寸心开口呢，看着莫非还没消气？“海底日长，也好多做些事。”<br>
寸心快步上前夺过杨戬手中的笔：“就知道你不是因为我来的。”<br>
杨戬顺势把人圈过来拉到腿上：“哪能呢。是公主香闺怡人，小神腿软走不动路。”埋头在她颈间啄了几下，才问：“今日出去可有好玩的？”<br>
“我见着小婵啦，四姐请她来的。”<br>
杨戬应了一声，“还有么？”打定主意逗她说话，说不得一会儿就忘了生气啦。<br>
“东海三哥也来了，还抱怨我当年为何不去看他。”寸心早就消了气，连为着什么吵架都忘个一干二净，她放松向后贴在杨戬胸口，扳着他的手指把玩，“还问我要不要讨好司法天神，省得你给他穿小鞋。”<br>
“我闲得慌么。”杨戬忍俊不禁，“看来杨戬的名声真是恶得很了。”<br>
“你有我呢。”寸心背靠杨戬，并不回头，只拿着杨戬的手亲了亲，声音很温柔，“不管什么时候，我都在。”<br>
杨戬没有出声，低头与寸心贴了一会儿，长长叹出一口气。正是如此，无论如何，他都还有寸心；只要有寸心在，他就什么都不怕。<br>
只是相会难得，他并不想寸心多思多忧，片刻后杨戬又笑问：“敖丙叫你去看他？他几岁？”想到寸心居然为这蠢货独自找上金光洞，“幸亏三公主手稳，杨戬才得以保全性命，还要多谢三公主大人大量了。”<br>
寸心在杨戬怀中笑作一团，半晌才摇摇他的胳膊：“你回去了可不许欺负他呀，他就是傻了点嘛。”<br>
何止傻，简直愚蠢！便是王母亲女龙吉公主，生来地位显赫，手中法宝无数，榜上有名也不得不死过一遭才算；那敖丙也不看看他同僚都是什么来路什么身份什么能耐！更不用说当年天廷与道门共同算计又各有心思，哪能让四海参与其中？时至今日还看不清形势，这敖丙不看着点只怕哪天再惹出祸来也未可知。杨戬在心中暗记一笔，只对着寸心连连应诺，便暂且放下不提。<br>
司法天神与三公主坐在一起，一个又提笔做起两套案卷，一个查看长史送来的各种折子，双双忙到半夜，才又亲亲热热搂搂抱抱滚上床榻，海底日长，且共眠去。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/122812.海里事.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/02/13, 00:36:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/85ae60/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">兄妹</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
