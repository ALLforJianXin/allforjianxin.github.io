tNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">寸心：杨戬总想让我夸他<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>和<a href="/pages/df6fc9/">《吃醋》</a>是同一系列</p> <p>寸心半坐半躺在美人榻上，拿着本书在翻看。瑶华殿的珠帘被撩开，相撞的珠子发出叮叮当当的清越声音，杨戬走到榻边坐下:“看什么那么入迷?”</p> <p>被打断的寸心有些惊喜，她还以为杨戬还要过些日子才能来呢。放下了手中的书，她抬起双臂张开怀抱。杨戬钻进她怀里，亲亲她双唇，然后抱着她翻身。</p> <p>她歪着头躺在杨戬怀中，问:“新天条都整理好了吗？”</p> <p>“还没，在下界整理快得多，再设一个时间流逝慢的结界，我在里面很快就能整理回来。”</p> <p>突然想到了在东海八弟那听到的传言，寸心猛地坐起，气鼓鼓地瞪着杨戬:“你给我说清楚那句披月光是什么意思？”</p> <p>已经习惯了她爱吃醋的性子，杨戬叹了口气:“你都从哪里听的?你别多心，我心里从来都只有你一个人，永远都是。”</p> <p>这话说得还不错，但她还是不太满意:“我听八弟说嫦娥可是被你这话感动得不惜违抗王母也要下界。”越说越气，她高声吼道:“你说，你是不是想再娶一个?”</p> <p>“瞎说，你怎么还要跟她吃醋呢？你又不是不知道我为什么把三妹压到华山下，那种时候怎么可以把真相说出来让三妹徒增愧疚呢?”杨戬伸手拉着她小臂将她搂进怀里，“我是跟着老君回兜率宫的，并没有看到她，直到论功行赏时我才在灵霄宝殿看见她。”</p> <p>“这还差不多。” 寸心问，“那这次推出新天条，谁拿下了首功啊？”倒也不是在意功名利禄，她只是单纯地好奇到底谁会是被认为是那个最大的功臣。再者，她也想知道如果自己“贪慕虚荣”，现在的他会是什么反应。</p> <p>前几日，她看了一个话本，书中两个无心仕途的兄弟阴差阳错之下各自娶了一个希望丈夫封侯拜相的女子，一个为爱妥协考取状元最后又因朝堂波诡云翳而弃官，妻子也明白了和心爱的丈夫相比，任何功名都是过眼烟云，最终夫妻一起远离庙堂过上了幸福美满的生活；另一对夫妻虽也爱着对方，但无法忍受对方与自己的追求南辕北辙，一昧地要对方妥协，最终劳燕分飞。</p> <p>寸心感觉她和杨戬的经历与话本中的两对夫妻的情路多少有些重合。</p> <p>杨戬一笑，看起来颇为开心:“寸心猜一猜。”</p> <p>沉香学艺功成时，杨戬很欣慰，好似一个望子成龙的老父亲如愿以偿了，于是寸心觉得自己猜到了答案:“沉香吧。”</p> <p>杨戬平静地摇了摇头:“那倒不是。”</p> <p>得到了否定回答的寸心倒也不觉得奇怪，毕竟在她看来，杨戬才是这整个棋局的谋划者，于情于理首功都应该是杨戬的，“那肯定是你了，在推出新天条这事上，没有人比你贡献更大了。”</p> <p>杨戬没有吭声，眼睛有些亮光，大拇指习惯性地在她背上摩挲。</p> <p>“不过沉香那么厉害，我本来想玉帝王母也可能会给沉香首功，让他为天廷效力。”寸心补充道。</p> <p>寸心觉得自己说得非常合理，既讲了本应出现的理想情况又考虑了现实会发生的可能，没想到杨戬的脸却有些绷着。</p> <p>“难道也不是?”寸心有些迷惑了。</p> <p>“是，玉帝也是因此让我官复原职的。”</p> <p>听到杨戬提起官位，寸心终于想起了自己的另一个目的，不过她有点看不懂杨戬的反应，他现在好像不太开心，但刚开始问时他还笑着，于是她决定把话本中的故事讲给杨戬听。</p> <p>故事说完了，杨戬面上一副若有所思的神情。</p> <p>“杨戬，”寸心说，“如果我现在也非要你继续做这个司法天神，你会怎么做呢？”</p> <p>“那这样的话，”杨戬将她搂得更紧些，“我就继续做，等寸心满意了，我再辞官，寸心会愿意跟我去过逍遥的日子吗?”</p> <p>寸心对这答案很满意，豪气道:“你想辞现在就辞了吧，现在三界安定，沉香又有着那么高强的法力，玉帝王母肯定不会抓着你不放的！”</p> <p>杨戬垂下眼眸轻哼一声，又闷闷说了句“不辞”，随即将她往上一提，疾风骤雨般地吻了过来，然后抱着她往里侧一滚，两人的位置颠倒过来。寸心不由得惊呼一声，却很快又被杨戬堵住了嘴，只余下含混不清的唔唔声。</p> <p>第二天醒来时，寸心腰腹还有些酸，她暗暗骂道，杨戬那家伙真是的，突然折腾得那么厉害。</p> <p>快到午时，哮天犬拿着张红色的纸来到瑶光殿。原是沉香和小玉的孩子这个月初八满月，请了杨戬去参加满月宴。</p> <p>因着沉香的婚期与泾河小外甥的百日宴是同一天，所以寸心记得很清楚，沉香成亲才四个月呀，孩子竟然都满月了吗？</p> <p>杨戬告诉她，沉香的媳妇小玉是狐妹的女儿。狐狸孕期是两到三个月，怪不得那么早。寸心想着，如果狐妹看到自己女儿得到了幸福，肯定会很开心。</p> <p>初八这天，杨戬带着寸心和小龙崽到刘家村。到了刘家，除了杨婵，其他三个人脸上都呈现出意外的表情。寸心想，他们肯定是没想到杨戬有老婆，还有个那么大的孩子。</p> <p>杨戬将她和小龙崽介绍给他们。寸心看着沉香颇为沉稳，与杨戬之前恨铁不成钢地跟她说的那个心志不坚反复无常的臭小子相差很多，心觉杨戬培养他耗费了不少心力，笑着赞赏了几句这个初次见面的外甥。</p> <p>宴席结束后，两家人在屋里闲聊。小龙崽得知表哥就是那个法力高强劈山救母的沉香，惊喜地问自家父亲:“表哥真的那么厉害吗？”</p> <p>杨戬揉了揉小龙绒绒的小卷毛，笑道:“当然了，启儿得向表哥学习呀。”</p> <p>沉香笑了笑，似乎有些不好意思:“是舅舅和师父教导有方。”</p> <p>“这是不是叫青出于蓝而胜于蓝呀？”</p> <p>前天才教的《劝学》，今日就会用了，寸心对小龙的学习很满意，笑道:“启儿用这个词很合适哦。”</p> <p>此时，抱着小龙的杨戬表情有些难以形容。</p> <p>回家的路上，杨戬突然侧头叫她:“寸心，沉香和小玉成亲了。”</p> <p>“嗯?”寸心疑惑地眨眨眼睛，示意杨戬继续说。</p> <p>“一般来说，妻子听到别的女人崇拜自己的丈夫都会有些不开心的。”</p> <p>寸心觉得这话好没道理，不以为然地扬起小脸:“杨戬，你这话不对，按理来说，有更多的人崇拜自己的丈夫，妻子应该会以此为荣才对。”</p> <p>杨戬叹了口气，道了句“寸心说得对”后就默默牵着她的手继续驾云了。</p> <p>“不过，”寸心说，“这和沉香小玉有什么关系啊?”</p> <p>“寸心，你这样赞赏沉香，”杨戬把头侧向另一侧，“我怕小玉会不开心。”</p> <p>“杨戬你今天好怪怪啊。我是他们舅母啊，小玉怎么可能连我的醋都吃啊？”寸心迈了一步，看着杨戬有些沮丧的脸。明明他不久前还反问她怎么还吃嫦娥的醋呢，现在居然说担心小玉会因她夸沉香而吃醋，寸心真是一头雾水。</p> <p>夸沉香，吃醋。</p> <p>寸心在脑内快速回放刚才发生的事，画面定格在她夸小龙用词合适之后杨戬莫名其妙的表情，他似乎是有些不开心。她忽然眼神一闪。</p> <p>“也是，沉香只让小玉夸就好了。”寸心赞同的点点头，“你嘛——”</p> <p>说到后面，寸心故意拉长了声音，杨戬果然期待地看着她。</p> <p>“你嘛，你说的很有道理。”寸心笑着揶揄道，“不过，你是不是想我夸你啊？”</p> <p>杨戬赶紧侧过头去避免和她四目相对，过了一会，轻轻点了点头。</p> <p>“你很敢想啊。”寸心踮起脚尖在杨戬脸上落下一吻，笑道:“我的大英雄。”</p> <p>杨戬抑住要上扬的嘴角，脚下的云飞得更轻快了。</p> <hr> <p>不久后，沉香有事来神殿报告，杨戬逮着机会要训练沉香。</p> <p>沉香不想打，但又拗不过舅舅，只好硬着头皮到了练武场。</p> <p>“不行，”寸心看到就要开打的舅甥俩，跳到场上，拉住杨戬，“你伤才好了，要是又受伤了怎么办。”</p> <p>“噼啪！”寸心和沉香好像听见了心碎的声音。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/85.短篇-2023/050712.寸心：杨戬总想让我夸他.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="1
