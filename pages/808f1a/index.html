x/Q35mA8aEUrH6nCgwEl0tn7wUiZYJnNRh6DK4UH/k0lfyrsBKdPVv/AriGIQcEDQZ65LBAGe2Rzui9Ybjz7XUppz1/uKBbyVPGkN3ZAeC6hr0x7Nr38N5+EqkoOm17xpoqR9ohQF55ERSvr4Dkr3chNfC3DMzGJlNBElW8w9nsGQvhNGIzDkXzCg8cLK951xHsFBlTJspJNi3ZFIMF2AeDV3q8DNOB+YHi6QTrChDIWDBRi5U5f+ZMfJLu3ccrqxtdxk4SKH336LFxSmkqefwU5T8fhdSdQf9IVKD6aNiwI/hnmcAZ91isYMJIaCUCx9W098+LgruikeTqzqqxKPUwqJyCPJiyemVVZBOijDGjD38Os0jOiSPL1z3SPjXNANbiNPXAdzTfukjjuknNBbyz3nwgTd3AVFqUJ5hpHlq9MveLnWwttUfoygBmvVjuikxND3znrhsELnZk7k+OjIGxeNEkomyLVta0xxn+HZhjBc4YZ/AFjHjz9u3xRZl2BN4aq9nFwWh16IrQ1aHHEd3j1+4/dB9OtH4e29A2H1DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">小师妹<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>待到两名垂髫孩童扣响灌江口杨府的大门，敖寸心才知道半年前杨戬所说的“只带回一千二百草头神”原是诓她。武夷山金毛童子心思巧妙，初时哄得杨戬收他二人为徒，现下也会讨师娘欢心，特特幻做乖巧的孩童模样叫敖姑娘心下一片柔软。彼时二郎真君从战场归家堪堪半载，正与娇妻浓情蜜意，杨戬原意让二人留在昆仑修炼，奈何公主娘娘发话要留两个小童在家住，杨戬自然不会反对，金毛犼这招曲线救国着实巧妙。</p> <p>两只小犼虽是一胞长大，性子却大不相同。唤作君离的天生好动，日日跟在杨戬后头练功学得有模有样，唤作君归的更黏人些，喜欢窝在敖寸心跟前撒娇玩闹。杨戬既是严师，师娘自然得扮红脸，好声好气地哄着小犼跟着师父和哥哥练武。日头好的时候师徒三人在院子里比划，敖寸心就坐在廊下看着，自家夫君潇洒俊逸自是不必提，两个小萝卜头一招一式比划起来真真可爱的紧。</p> <p>这日休息的早，君归哒哒地跑进里屋央着敖寸心继续说昨儿没说完的故事。“父王母后连得两个儿子，就想要再要个女儿，后来就有了我和三哥敖烈……”</p> <p>“原来师娘是家里的小妹妹啊！”君归被敖寸心抱在怀里，指尖绕着她垂下的黑发，黑溜溜的眼睛转了转笑嘻嘻道：“那师娘什么时候给我和哥哥生个小师妹呀？”</p> <p>虽说童言无忌，敖寸心还是闹了个大红脸，指尖点点小犼的额头“恶狠狠”道：“又瞎说！小心被你师父听见要罚你。”</p> <p>“为师觉得君归说得有理。”杨戬牵着君离进屋，眉梢眼角都带着笑意，惹得龙女面颊绯红娇嗔着瞪他一眼，将怀中小童放下，留下一句“我去给你们爷仨张罗晚饭”便逃也似的出了门。​​​​</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/022601.小师妹.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor
