Sd++vqFveMUTwAUxSUFI1QekR1+bIze3D9MF2aq6cPvG72CgnldWCFqyRw3lwH8ZMerjTD9ElRO7Gv44wNpC90aASqGfVlz/Rx17srQ57/UU26hkhQqUB7dBR71WmzQhHUnblGmVOEw0jhbV1n9OlXUDCIRGaNV5Jp43N516fN7JmnTHdfp7Hgy0luO4aMhtkLL8Bi3bUWYvzh5Mn1dTxrL6QmGuRhGL/TiTTxRoEdTszSaq9GR0NGA3KdkOz3hqSV3MIDhQ5IVX/Ivx3umBti2es2h4eZby7x8br1rkf7Mo90AqC8aQ3sJeNzqFRu+vSANAQe3PL7l0HGOAdwDCeZYvNKeoZp1Qfs6Aipndh86HmFRi0LAnEO47wsqM6cdfjh3jBPUzhZy7nvlUfFsamED1VQt6aISHVymXZ/B2aCtIG8AI8xfobj2d3en1wWVhOeHELKmLQ1s211s88comkv4UCwWyF787mJdYXtNfhKAXVqnKTq8QZvGAGGOfaTo5pGZ/PwbUCr5+DPr/1J92JNHr9aOl/F3iI5+O1nfybsGxoimvZ3ViWSluDITw3P37mypheDIPY0tw7+O/5ApbkYw+zpfaUVu32Pi98+defdUhEpZkRFq0aqyNh9FuL9hpYbEm6iwi0z2REd09ZmyENEbuhjDWzKvZXTqKYaBIr3tt5kuPtQBZFvEUwHt60vfCNu41XsksH9Ij1BMMz1Y0OOunHNShFIP5868g5zeXmuLwL9T4b6Q2+KejgAAAABJRU5ErkJggg==">悲喜双生<!----></h1> <!----> <div class="theme-vdoing-content content__default"><p>这郎君打天井穿过，和风掠过他光洁的鬓角，隐约紧绷着，诚然显圣真君今日并不十分愉快。</p> <p>行得门前树下，身后那位赶了上来，火急火燎的“你往哪去？！”便是这么个扎人肺管子的主，起腻了一句句二郎勾得他神魂颠倒；闹起气儿来便你你我我的，讲话直膈人。</p> <p>杨戬想起方才听得梅山兄弟来请的信儿，这公主殿下一时阴下来的脸色，喉头的气儿就鼓胀起来，声色硬邦邦的“不过青城山有些烦事，走上一遭去去就回。”</p> <p>话落，这娇娘就似讽似嗔的哼了声“便是除妖，我如何是个不明事理之人，但叫你去不得不成？”她转到杨郎跟前，瞧着他紧绷着的唇线，眉骨间的树影正阳下竟有些发冷。</p> <p>可敖寸心又是哪个，恃宠而骄、色厉内荏，杨戬愈是拉着脸，她便愈是能顶，如此张口便又道“只叫你上禀，不过一纸文书之事……”</p> <p>如何便是小事！他与那厮灭门之仇，若不顾及龙女离家背乡之苦，娇弱难堪他便合该不死不休才是！杨戬想着忽的侧过脸来，凤目圆睁疾言厉色“明事理？！三妹、梅山兄弟——林林总总，你何时消停过！”</p> <p>公主脾气哪里又是闹着玩的，显圣真君这话说罢，龙女立时柳眉倒竖，刻薄尖酸起来“你这浑人！果真没得心肝！我私奔来此，哪里对你不住！为着我，这么零星半点的你便也做不得嘛！”</p> <p>堂堂显圣真君哪里去知曲意逢迎是个什么笔画，这会赶着此处哪里有什么温声细语，薄唇开阖堵人心口就是一句“不成！”</p> <p>杨戬瞧着龙女听罢，一双杏眼立时水汽氤氲，绯色的唇角耷拉着，哀伤难过的像风霜下打蔫的芙蓉，这话怕是说重了。</p> <p>电光火石间这厢杨戬正思量，那头龙女心下亦是百转千回，只道这些时日叫浓情蜜意迷了眼，竟没了轻重上赶着叫人掂量，端的是轻贱到了底。</p> <p>浩大的失望之后是滔天的怒火。</p> <p>啪！杨戬抿抿嘴，正要再说颊边却忽有风来，紧接着皮肉相击之声就清脆的在这院里炸了开，杨戬霎时间身上心里都刺啦啦的疼。</p> <p>倒也难怪，想这显圣真君自出山得道来，可谓擎天的神通，便是封神大战也全身而退，可这世道哪个会对枕边人设防，何况敖寸心历来一万分紧要他的。</p> <p>二郎神君这遭正被打的发懵，竟也没顾上那偏私的兄弟，眨眼里就听他嘴里呼号着“你竟敢动手！”，一爪子呼过去，龙女立时重重的摔倒在地。</p> <p>显圣真君吓了一跳，倾身便要去扶，又见哮天犬龇牙咧嘴的还往上冲，只得慌忙拦着嘴里不住喝止其名，可这厮护主向来要拼命的，杨戬不好下死手，心里又顾念着敖寸心，一来二去险些还叫他带倒了。</p> <p>敖寸心的抽噎声钻着哮天犬叫嚷的间隙，直搅得他心乱如麻，“够了！”二郎神君手头上劲，厉声喝止将哮天犬向外一住，他面沉如水低声道“你且去，随老大走。”</p> <p>哮天犬不通人情却也惯会耍滑，自然瞧出他已然恼极，却也委屈嘴上嗫嚅“主人……”，“走！”显圣真君一声喝止，哮天犬垂头耷耳恋恋不舍的往外去，一步三回头，他这主子却早凑那龙女跟前去了。</p> <p>显圣真君在龙女身旁蹲下，捏了捏汗津津的手心，伸手便往敖寸心肩头去扶，小殿下颤巍巍的却往旁边缩去，杨戬瞧在眼中只觉喉头愈发干涩，奋力柔声细气“摔疼了罢，我瞧瞧。”</p> <p>他讲着话小心的拨开敖寸心散开的鬓发，垂头靠上去瞧她，龙女偏了偏脸，捂着嘴的掌心湿漉漉的眼尾，具是嫣红不已，“哪里磕着了？如此坐着可都是地气，我抱你回房好不好？”</p> <p>这郎君说着话要抱她，可龙女不由想着那会的冷面冷语，动起手来的嫌隙，心里便似叫烂絮堵的死死的，横着手臂便推搡他“不要你！再不要你了！”</p> <p>杨戬听着身形一僵，将她强拉到怀里，安置在腿上，龙女单薄的身体却哪里抵得过杨戬的力气，只得挺值脊背瞪着杨戬，听他轻声道“嘘，你乖乖的，挨着我些，地上脏不是？”</p> <p>他瞧着那边叫哮天犬挨着过的脸，红彤彤的面颊水痕尚新，他想碰碰这伤处，却又唯恐她恼了，气将起来愈发不搭理他。</p> <p>是以只得小心地，理了理她的衣袂，拢拢她的头发，宽厚、温热的手掌打她纤小是脊背顺来，掠过她薄窄的腰线，正要使真气走上龙女全身，却叫龙女忽的拿住了手，喝止了句“你！”</p> <p>敖寸心还在断断续续的抽气，绞着秀眉，可怜的样子，好似弄疼了她“是扭着了？”杨戬忙不迭问道，敖寸心瞧着他剑眉蹙起，薄唇紧抿担忧的样子怎样也掩盖不住，倒非轻浮。</p> <p>龙女瞧在眼里，又想起方才自己打他那下，后悔、委屈——情难自抑，整个人猛地埋进杨戬的怀里，再顾不得什么，大声哭泣，捶打着他的肩头“我讨厌你！讨厌你！”</p> <p>杨戬将她抱的更紧了些，不住的抚摸揉捏她的脊背肩颈，低声道“是杨戬不好，寸心如何才欢喜呢？告诉我吧，好不好？”</p> <p>龙女听着将脸埋进他的颈窝里，哭的愈发厉害“寸心想回家，想回西海——要回家……”显圣真君听着，手上一顿，沉默须臾，好似打定了注意，轻轻一叹，沉声道“都依你，什么都依你。”</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/88.短篇-2020/061600.悲喜双生.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/12/25, 00:27:02</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a hre
