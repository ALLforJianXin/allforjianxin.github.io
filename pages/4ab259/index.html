高强，力大无穷，酣斗间，竟与上古神兽打得旗鼓相当，不分伯仲。</p> <p>迦楼罗生性狡诈，几番作怪都无人阻拦，这时遇到这个青年，只火冒三丈。可是打斗片刻，竟无法占这青年的便宜，一转念头，见小树之后的龙女探头探脑，当即展翅绕过青年，向那小龙袭去，妄图叼走一顿餐食。</p> <p>青年大惊，自怀中掏出一件宝器，向前掷出，以图阻断它的去路。这宝器本是备来一举擒兽的，此番祭出，乃是为救这个无辜龙女的性命。那金翅大鹏鸟果然畏惧宝器的威力，调转了方向，可这样一来，想要擒住迦楼罗，更加困难了。</p> <p>这三目白袍的青年，正是奉命前来降妖的昭惠显圣真君，二郎神杨戬。他追踪妖兽之气已有多日，今次探得它出没在西海，连忙提刀来降。他担忧附近民众安危，未带足兵甲便匆匆忙忙赶了过来，此时竟至有此一失。</p> <p>金翅大鹏鸟又同他战了几个回合，见从他身上讨不到便宜，便有退逃之势。杨戬哪里肯依？神目张开，射出一道道金光，袭向金翅，正欲上前再战，不料迦楼罗口中吐出一股浓浓毒烟，顷刻间笼罩住山谷溪流。杨戬的神目距他较近，被这毒雾一灼，登时酸痛难当，晃神间，已被他逃远了。</p> <p>杨戬见此，正欲要追，可是迷雾封山，又哪里追得出去？轻叹一口气，想起山谷之中尚有一个龙女躲避，便收起神通，降下树林，辨认道路，向方才打斗之所找去。</p> <p>那龙女远远听见打斗之声，吓得魂飞魄散，缩在树后，瑟瑟发抖。这时又见迷雾满谷，熏得眼睛刺痛，远处乒乒乓乓的声音又依稀不再可闻，更加害怕。</p> <p>她原是西海龙王敖闰膝下幺女，名叫敖寸心，乃是西海三公主。只因前些日子贪玩，逃出家中，跑到凡间集市消遣，想不到那只金翅大鹏鸟正修养于这附近的海湾之中，见她路过，又是龙族，登时生了歹念。三公主自然不敌这上古异兽，一路逃窜，直到今日，逃到招摇山来。</p> <p>杨戬一路找来，在这迷烟缭绕的山谷中委实艰辛。幸好二人有缘，真君眼尖，只见树后一片嫩色衣角，已知端地，说道：“小姑娘，不要怕，我已经将它赶跑了，你快出来吧。”</p> <p>三公主先是一惊，闻言钻出一看，只见那青年立在不远处，神光熠熠，瑞气千条，教人十分安心。周围已无鹏鸟之际，显然已经被它撵走，敖寸心长舒一口气，爬起来走到杨戬面前。她心中的担忧一失，一连几日艰险逃命的担忧害怕便涌上心头，此时一见面前这个正气凛然的青年，登时感到委屈不已，哇地一声哭了出来。</p> <p>她哭得山摇地动，极难过伤心，小脸都憋得通红，倒将对面的杨戬吓了一跳。他自来板正耿介，除了家中小妹，从无与花季少女相处的经验，见这姑娘哭得梨花带雨，一时间居然无从下手。过了半晌，方劝慰道：“别哭了，有我在，你不会有事。”</p> <p>三公主虽然还未哭得尽兴，但却极懂礼貌，哽咽道：“我不，我不怕了，谢，谢谢你救了我，呜呜呜哇哇……”</p> <p>杨戬：“……”</p> <p>——</p> <p>三公主哭了许久，见四周浓雾锁谷，无法将出，杨戬也就陪她站了许久。少女见他无奈地看着自己，倒觉得有些不好意思，只哭过之后，胸中委屈扫尽，一时间羞涩起来，渐渐停止了呜咽，揉揉眼睛，攥紧了自己的衣角，谢道：“大哥哥，多谢你救了我。”声音软软糯糯。</p> <p>杨戬摆摆手，说道：“不必言谢，应当的。只是妖雀吐出毒烟，笼罩山林，我们出不去，只好等它自行消散。”</p> <p>敖寸心见他长得英俊不凡，一身白衣衬得整个人仙气飘飘，气质干净，早已心生好感，又在这诡谲多变的山林中，他方才还救了自己性命，一时间更加倾慕，上前一步，仰头望着他，眼睛水汪汪地，笑道：“有大哥哥在我身边，我不怕。大哥哥，你叫什么名字？我日后一定报答你的救命之恩。”</p> <p>杨戬笑道：“你不必放在心上。我姓杨，单名一个戬字，这只鹏鸟是因为我的疏忽才逃到下界的，连累你受了这番苦楚，应该由我向你道歉才是。”</p> <p>三公主瞪大眼睛：“你是杨戬？是那个……”她挥舞着胳膊比划了一番，“那个长着三只眼睛的二郎神吗？”她一眼望去，只见那青年额间竟确有一道金光流云纹，心中暗道，恐怕这便是他的眼睛了，忽然又觉得这番说法不大礼貌，于是又找补道：“啊……对不起，我从没想过二郎神君会长得这么文雅。”</p> <p>杨戬见她活泼好动，也是一笑，暗道自己经年来威名甚重，无怪乎别人将他想做青面獠牙的模样。又想自己还要和她同处几日，只怕她过分拘谨，反而不美，于是柔声劝道：“没关系。你只把我当做朋友就好。”</p> <p>三公主见他如此平易近人，心中更加欢喜，雀跃道：“太好啦！我竟同二郎神君做了朋友！”她见杨戬笑盈盈地，没有不悦之意，便又凑近了他几分，将手背在身后，说道：“杨……杨大哥，我叫敖寸心，家在西海。”</p> <p>杨戬闻言，心中已有计较，暗道：“原来她是西海三公主。”他点点头，对她言道：“我省得了，你怎么不听你父王的话，乖乖待在家里，反倒自己跑出来啦？”</p> <p>龙女闻言，便将事情的前因后果同他讲了一遍。夜色渐浓，二人在林中找到一块临水空地，捡了些许干柴，燃起一簇火焰，双双安坐在一旁柔软的草地上。杨戬听完她的话，笑着摇了摇头，叹道：“小姑娘，太过贪玩。如果不是我正好出现，你可成了金翅大鹏鸟的口中食粮了。”</p> <p>“可不是有你出现，救了我嘛。”敖寸心双手支着脑袋，坐在杨戬身旁，眼睛圆圆地、亮晶晶地，笑盈盈看着他，脱口而出。她与杨戬在一处相处半日，见他面容俊美，温润如玉，气圣神泽，谈吐不凡，早对他倾心不已。龙族之人天性奔放，直爽自由，有所喜爱，绝不私藏，她又是从小金枝玉叶的贵公主，如今有了心上人，自然毫不掩饰自己的心思，一整个晚上，她不是擦亮眼睛盯着杨戬，就是暗暗地瞄着他发傻。</p> <p>相比之下，杨戬这个大老爷们儿倒更加拘谨一些。二人谈话许久，见夜已深了，便在草地上铺设树叶，双双睡下不提。</p> <p>第二日晨起，天刚蒙蒙亮，三公主便醒了过来。她一睁眼，见这山谷中的雾气仍旧浓密，阳光丝丝缕缕透进来一些，多少可以见物，转头要找杨戬，见篝火依然旺盛，身边的蒲团上却不见人影。</p> <p>敖寸心一慌，向四周张望了一会儿，想要出去寻人。但转念一想，倘若杨戬回来，找不到她，又要着急。兴许他是去寻觅出谷道路，不多时就会回来的。于是便坐在原地，取了身边的甘泉解渴，静静地等待杨戬回来。</p> <p>只过了一盏茶时间，上游的河道处隐隐约约显出一个人影，果然是杨戬回来了。他本是要去寻些猎物吃食，奈何天生不会认路，唯恐走不回来，只好沿着营地旁的水路一路往上，捉取了一些鱼虾，再沿着小河一路回来，如此便不会迷路。</p> <p>他额头上的神目昨日被妖兽灼伤，今日方好，可透过雾气而视，不使神通则可比他人多看出几丈，远远望去，只见龙女在篝火旁边焦急等待，忙加快脚步赶回。</p> <p>龙女听闻河道边有响动，转头一看，果然是杨戬。她心中一喜，连忙迎上，却陡然看到他手中的一筐鱼虾，立即惊呼一声，停住脚步。</p> <p>杨戬诧异道：“你怎么了？”</p> <p>三公主看着半死不活奄奄一息的水族小朋友们，眼睛里透露出恐惧，颤巍巍指着它们道：“杨大哥，你抓他们干什么？”</p> <p>杨戬道：“当然是烤来吃的啊……”</p> <p>三公主登时哭了起来：“怎么可以吃鱼！怎么可以吃虾！他们那么可怜……呜呜呜……杨大哥放它们回家好不好……呜呜他们现在跟我一样可怜……”</p> <p>杨戬：“……”好好好……</p> <p>——</p> <p>杨戬头一回和这样娇滴滴的小公主相处，并不懂得如何应对，只好事事顺从。为了她不再伤心，只好将刚刚捞到的一小筐鱼虾全部放回一旁的小河里。看着四散而去的美食，杨戬觉得有些胃疼。</p> <p>想来三公主从小生长在大海里，和水族甚是亲密，如今要拿来果腹，自然是不肯的。如果有人同自己说，想要宰了哮天犬烤来吃，自己当然也会觉得过分。如此一想，鱼虾倒是不吃也罢。只不过他偌大一个男子，过得苦一些却没什么，可又怎么好让敖寸心一个娇滴滴的小姑娘一起饿肚子？当务之急，还是要找到食物再说。</p> <p>杨戬说道：“是我思虑不周，很是抱歉。那我到山谷中打些野味，你看如何？”</p> <p>敖寸心点点头，自然应允：“……杨大哥，是我多事了，只是我从小和它们作伴……你别见怪。”</p> <p>杨戬摆摆手：“不会。只是眼下有一个问题……”</p> <p>“什么问题？”</p> <p>“惭愧，我一向容易迷路，要是就这样去了，只怕再也找不回来了。”</p> <p>敖寸心：“……”杨大哥看着老成持重，没想到还有这么可爱的特点……</p> <p>二人在池塘边商量了一会儿，还是决定一个留守营地，以防不测，一个外出办事，寻物充饥。杨戬思来想去，并无其他办法，临行前将颈脖上常年佩戴的吊坠解下，给了龙女。他郑重道：“龙女姑娘，请你保管好这件法器，它从我额上天眼中炼化而出，和我互有感应，我若迷失方向，则探查它的所在，一探便知归路。”</p> <p>敖寸心也听过他天眼神器的威名，知道它的要紧，自然谨慎接过，护在怀中，说道：“杨大哥，你放心，我一定会保护好它的。”</p> <p>杨戬见她一脸坚毅，不由得一讪，笑道：“那倒不是，你的安危才是最重要的。我去后，如果有危险，它会保护你。”</p> <p>三公主只听见“你的安危才是最重要的”几个字，脑海中轰地一声，小脸顿时红透，心中只如擂鼓轰鸣一般跳动，竟连杨戬和她道别的言语都没有听见，只在原地呆住半晌，待回过神，左右一看，哪里还有杨戬的身影。</p> <p>——</p> <p>这天傍晚，二人饱食了一顿烤山鸡，围坐在篝火旁谈天说地。说到兴处，皆开怀大笑，酣畅快活不已，竟不像在荒山野岭。只是苦于浓雾弥漫天空，看不清天上的星斗，倒是失了一大乐趣。杨戬自幼师承昆仑山玉虚宫元始天尊门下玉鼎真人，师学渊源浩瀚，博古通今，所知所言在龙女耳中都新奇不已，被她缠着，讲了许多有意思的故事给她听。不多时，小龙女自己却困了，缩在杨戬身旁，眼睛一阖一阖，在故事和睡觉间来回纠结，终于还是敌不过困意，轻轻地靠在杨戬的肩膀上，睡了过去。</p> <p>杨戬一笑，摇了摇头，将她稳稳地放回蒲团，自己则在另一旁打坐入定，一夜就这样过去。</p> <p>一连几日过去，二人候在在山中，等待浓雾散去。白日里，杨戬前去寻觅吃食，敖寸心在营地接应，晚上两人做些简单菜肴，吃些山瓜野果，倒也畅快自如。</p> <p>杨戬多年在天廷做事，谨言慎行成了习惯，陡然遇见一个天真浪漫的小公主，相处起来，每一句话都是推心置腹，无所私藏，不由得感到放松舒适。</p> <p>那金翅大鹏鸟虽然逃出南山，但它与杨戬一战，伤势不轻，这一去，自然又要落入杨戬布下的天罗地网中。待草头神依他所布阵法拿下妖兽，满山毒雾即会消散。</p> <p>匆匆半月过去，杨戬日日查验，见毒雾只散了些许，不由得有些懊恼。他摇摇头，从树梢跃下，叹了口气，对一旁的三公主道：“还是没有动静，看来咱们还是要做个长久之计为妙。不如我明日砍伐竹木，先在涧边搭一个竹楼，也好当做你我栖身之所。否则日日露宿荒郊野外，总归不甚舒适。”</p> <p>其实他少时修炼，几年间以天为被以地为席也从来不打紧，有时候出门降妖跑到荒山野岭，凑合着在树上待一宿也就过去了，何曾搭过什么竹楼。敖寸心晓得他是为自己着想，心中一动，点头应了。几日相处，她已初识杨戬脾性，知他做事稳重，温柔细致，虽然嘴上不说，但会事事安排妥帖。前日她葵水至了，半夜痛得冷汗直流，杨戬惊醒后，先是替她把了脉象，随后为她传功渡气，驱散寒意。第二日晨起，篝火旁居然放了一碗热腾腾的姜汤，用法力维保着温度。</p> <p>想到这里，寸心脸上又是一红，连忙低头掩饰神色。</p> <p>杨戬当即开工，从林间砍回一些精良的竹子木头，只过了几日，就在上游的瀑布旁搭起一座小小的竹楼。二人搬进竹楼中，日子逐渐过得有滋有味，竟像是一双隐居在深林中的璧人。</p> <p>招摇山山谷里的物产十分丰厚，这些日子两人已经把山里的各类吃食琢磨得七七八八。三公主是海龙，御水神通得天独厚，竟能将海盐分离而出，二人就此有了食盐，舌尖终于不再寡淡。而烤了许多天的野味之后，杨戬从河边寻到一块儿大石，质地细腻，似玉非玉，他将三尖两刃刀变作一只凿子，忙活了半日，凿出一口可以乘煮汤水的大锅来，终于不用像以前一样取一海碗左右的泉水悬在掌心中烧热，二人就此又多了烹煮之物，一天竟能凑出个四菜一汤，生活简直不要太美好。</p> <p>——</p> <p>忽然有一日，山谷口吹来一阵强风，将笼罩在山间的浓雾吹得干干净净。阳光透过树梢照到地下，杨戬正在外狩猎，见此大喜，收起手里的金弓铁弹，转身化出一朵云彩，飞出了山谷。</p> <p>结界果然已失，他出入再无阻拦。杨戬向招摇山顶望去，只见一个襦裙女子，手持宝莲灯，站在山峰大石上，不是杨婵是谁？</p> <p>“三妹！”杨戬呵了一声，身形一转，已落在山顶。</p> <p>杨婵见是兄长，也自欢喜：“二哥，终于见到你。金翅大鹏鸟已经落入你的阵法，此刻被草头神擒拿，羁押在天廷。我赶来驱散这一山毒雾……你怎么样，没有受伤吧？”</p> <p>杨戬点头，说道：“我没事。”又将这些天来在山谷中的事情说了一遍。说罢，又对杨婵吩咐道：“我应要快些返回天廷，封印妖兽，事不宜迟。那位小姑娘是西海龙王的女儿，你送她回去，也好让我放心。”</p> <p>杨婵笑道：“二哥不必担心，送她的人也来了。”</p> <p>原来是西海龙王找不见爱女，派人搜索踪迹，一路寻到招摇山，却苦于锁山毒雾，不得入内。听闻是二郎真君下界除妖，便托人找到了和杨婵相熟的东海四公主敖听心，请她找杨婵帮忙，寻回三公主。</p> <p>四公主和杨婵计议许久，今日开山，自然跟来。此时她已经入谷寻到敖寸心，杨戬和杨婵说话间，姐妹二人已来至山顶。</p> <p>三公主见到久违的阳光和姐姐，雀跃不已，此时看见杨戬，知道即将要分离，又是一阵难过。她遥遥喊道：“杨大哥！”拉着四公主奔上大石。</p> <p>几人相互见了礼，又诉说了一番前因后果。杨戬即刻要返回天廷，耽搁不得，这就要离去，西海也担忧三公主久矣，只好在此告别。</p> <p>临行前，三公主忽然向前几步，叫住杨戬：“杨大哥！”</p> <p>杨戬停下脚步，回头看她，说道：“怎么啦？”</p> <p>“杨大哥，”龙女奔到他面前，期期艾艾地拉上杨戬的衣袖，晃了一晃，“杨戬大哥，你可别忘了我啊。”</p> <p>杨戬轻轻一笑，柔声道：“你放心，不会的。”</p> <p>“真的？”</p> <p>杨戬郑重地点了点头。</p> <p>龙女忽地伸手，拉住杨戬的臂膀，踮起脚尖，在杨戬的脸颊上轻轻落下一吻。吻罢，她红着脸，转身拉起被她吓到了四公主，一溜烟逃走了。</p> <p>本来急着要返天的二郎真君愣在原地。</p> <p>身后的杨婵先是一惊，待反应过来，喷地一笑，上前揶揄道：“杨大哥——杨大哥？愣着干嘛？还不快走？”</p> <p>杨戬也反应过来，白玉一般的俊脸上难得泛起红晕。他看了满脸笑意的妹妹一眼，有些羞怯，兄妹二人架上云朵，不一时，已经不见踪影了。</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/87.短篇-2021/060301.思公子兮不得闲.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87" title="标签">#短篇</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a><a href="/tags/?tag=AU" title="标签">#AU</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2025/08/19, 23:19:48</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/9ce580/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">清明</div></a> <a href="/pages/591af4/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">思念</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
