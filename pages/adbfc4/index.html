“啪！”<br>
“咣当！”<br>
怒吼、异响，接二连三的从真君神殿里传出，吓得杨婵还没迈进去神殿，先退出半步。她站在门口略等了一下，听着神殿中再无声响，悄悄问殿前当值的草头神：“二哥怎么这样生气？”<br>
草头神面无表情回道：“回三圣母，小人不知。”<br>
杨婵听闻心里一堵，又看了草头神一眼，见他毫无异样，忍不住心底叹了口气，到底是不一样了，神殿上上下下现在对自己居然这般客气。<br>
杨戬声音又传出来：“还不出去！再探！”<br>
杨婵咬咬牙，快步走近，未语先笑：“二哥，我来看你了。”一进门，见杨戬满面怒容，殿内遍地狼藉，饶是杨婵早有准备，还是吃了一惊。<br>
“二哥，怎么弄得这样凌乱？”杨婵绕过地上的书籍纸笔，靠近杨戬，仔细看他的脸色，“什么事把你气成这样？”<br>
杨戬横了哮天犬一眼，哮天犬立刻低头，一声不吭地退出神殿，守在门口。<br>
“三妹，最近和四公主八太子可有往来？”<br>
“四公主自打回了东海，一直忙于公事，好久没来过华山了。前些日子八太子本是要来的，偏赶上四海有事，东海龙王不许他出门。二哥，可是东海有什么消息？”<br>
“四海有事？呵呵，好一个四海有事！”<br>
杨婵心里打鼓，四公主死而复生，八太子成亲在即，都是四海大事，怎么惹得二哥这般震怒……<br>
杨戬冷笑两声，抬手将一封书信递给杨婵：“三妹，你也看看东海最近在忙什么事。”<br>
杨婵接过书信，粗粗看了几眼，心底疑问脱口而出：“北海太子向西海求亲？”杨婵抬头望着杨戬，迟疑一下，才道，“二哥，四海联姻是常事，可北海……我在凡间只听过东海、西海、南海的消息，北海素来名声不显，是我在山下的这些年，北海出头的吗？”<br>
“出头？北海可从来没出过头！”杨戬神情缓和，只是声音依旧冰冷，“我在天廷这些时日，四海述职向来是敖广为首的三位龙王，北海敖顺称病不出，太子代父呈上奏折。”<br>
称病不出？没露过面？杨婵早已非昔日天真少女，自然知道此中大有文章，心里推敲着，慢慢地道：“二哥，四海水族同气连枝，三海这般庇护北海龙王，也是正常，这次北海太子求亲，虽是意料之外，却是情理之中，不值得二哥震怒。”<br>
杨婵说完，立刻察觉不好，若只有联姻之事不可能令杨戬恼怒至此，可是……二哥对西海也不曾另眼相待，若是为了那人，她早已失却封号，永禁西海，自然不可能嫁到北海……<br>
杨婵迟迟听不到杨戬声音，抬眼望去，只见杨戬似笑非笑难辨喜怒，索性直言：“二哥的意思，八太子所言的四海有事就是西北二海可能联姻？东海并未主动告知，想来此事还在商议。”<br>
杨戬仍是那副似笑非笑的神气：“想来三妹最近事务繁忙，忘了敖闰膝下男儿众多，龙女却只有一位。”<br>
“二哥，三公主早已没了封号，如何能配太子？”<br>
“北海太子敖宁是龙后所出，一人之力支撑北海这许多年，他若要娶一个普通龙族，何必非要西海求亲？这次北海向敖闰求亲，为表诚意，敖宁自愿入赘定居西海。”<br>
“这……”<br>
“北海为四海之末，向来万事不出头，这个节骨眼上，跑去向西海求亲，自愿入赘……呵呵，身为太子，甘为赘婿……”<br>
杨婵拾起脚边几卷公文，放在桌案上，杨戬方才大发雷霆，将手边物件全砸在地上，只留下一卷画轴，摆在桌案正中。杨婵见画轴铺开的那一半长约尺许，上面绘着碧海万顷，夕阳余晖撒下，映出粼粼波光，越看越是眼熟。<br>
“三妹不认识这地方了？”<br>
“西海！”杨婵脱口而出，“这图上是西海，二哥，这是……”<br>
“这是四海图鉴，新天条出世，天地异动不同以往，过去是五岳合力镇守三界，这次轮到四海各献奇珍，以此应劫。”<br>
“二哥，我与四公主交往多年，从未听她提过四海奇珍，也没见过这图鉴，眼下娘娘正在挑选吉日好去凡间历练，要在她下凡前将新天条处理妥当，北海求亲之事，我去东海探探口风吧。”<br>
杨戬左手在图鉴上轻轻拂过，西海景色渐渐消失，画轴自动卷起飞入他袖中：“前几日东海龙王献上图鉴，我才知晓四海奇珍之说，四公主不提，想来也是有她的顾虑。娘娘今早传唤，四海奇珍事关重大，要等一切安排妥当才能动身。东海那边有劳三妹，若有消息，让哮天犬去西海寻我。”</p> <h2 id="第二章-功德"><a href="#第二章-功德" class="header-anchor">#</a> 第二章  功德</h2> <p>杨戬在西海边按下云头，并指成诀，几息过后便有一虾兵应召前来。<br>
“小将见过真君。”虾兵褪去障眼法，显出草头神的本来面目，对杨戬行了一礼。<br>
“寸心最近可好？”<br>
“回禀真君，前些日子四海龙族祭祀，清点礼器，三姑娘因此略有些忙碌。小将正好看管库房，日日得见三姑娘金面，听侍女言语，这次龙族祭祀是数千年未有之盛况，令三姑娘颇费了些心思。除此之外，三姑娘一切安好。”<br>
“这般操劳么……”杨戬握紧墨扇，皱起剑眉，“龙宫连个清闲差事都找不出来了？”<br>
“真君宽心，西海龙后早已安排人手来做这些杂事，只是三姑娘如今在龙宫挂着个女官的名头，清点礼器是分内职责，三姑娘又执意为母分忧，才亲自过问。龙后心疼三姑娘，特意将得用的侍女送来。”<br>
杨戬点点头，又问道：“你在西海这些年，关于四海图鉴之事，知道多少？”<br>
“真君，小将在西海这些年，从未听过四海图鉴之名，直到上次龙族祭祀，四海龙王齐聚，请出图鉴送上天廷，才得知龙族有此神物。”草头神想了一想，补充一句，“当时摩昂太子和东海听心公主正巧同时来探望三姑娘，看他三人神色，也是不知此物的。”<br>
“哦？敖摩昂敖听心也是不知？”<br>
淡淡一句反问，令草头神心中一凉。<br>
“龙族盘踞四海多年，对此物闭口不谈，须得祭祀后，才敢请出图鉴，这等信息为何不在信中上报？”<br>
杨戬面色如常，语调依然不急不缓，草头神却是额头沁出冷汗，立刻拜倒：“真君恕罪，当时小将与当值兄弟都不知龙族为何突然祭祀，商议后决定看龙王行事再上报此事……哪知祭祀之后，东海龙王突然宣布四海龙王要将图鉴呈上天廷，北海龙王抱病在身，由太子敖宁代父上天，他四人当即动身，小将来不及将传讯……”<br>
杨戬摆摆手，打断草头神的话：“罢了，事发突然，暂且饶你一次。敖宁求亲究竟是怎么回事？”<br>
草头神小心翼翼地瞄了杨戬脸色，随即低头不敢多看：“回真君，当时敖宁太子与西海龙王一同从天廷回来，龙王神色与平时无异，想来敖宁太子并未在路上透出口风，太子在西海歇了一日，才正式求亲。小将得知此事，用真君所赐符咒写了密信，传回神殿。昨日三姑娘已婉拒婚事。”<br>
杨戬闻言脸色稍缓，轻声道：“这次疏忽不可再犯。好了，退下吧。”<br>
“真君，小将还有一事正要禀报。”草头神左掌摊开，掌中已多出个一寸见方的小木匣。他右手掐诀，微光过后，木匣已经变得长约尺许，里面整整齐齐码放着一排锦囊。<br>
“真君，这是小将和兄弟们在西海当值这些年里，龙宫诸人所赐之物。外人赏赐本不应受，只是这其中大多是三姑娘赐下，兄弟们不敢推辞，又不敢用这等小事回去打扰真君，只得暂且收下，全寄放在小将这里。”<br>
杨戬走近两步，看这一匣子锦囊都是鼓鼓囊囊，有几个隐约可见荧光从中透出，装得不知是什么宝贝。杨戬面色一缓，心道龙宫富豪为三界之首，对下人随手赏赐都能积攒下这许多锦囊，可见她手边是不缺的，不觉轻笑出声：“既然是主母所赐，就收下吧。”<br>
杨戬心情大好，打开墨扇轻轻扇动，“你们这些年守在西海颇费心力，本君也并非不知你们辛苦。”话音未落，点点金光已从墨扇中飞散而出，罩住草头神与他掌中木匣。<br>
金光落在草头神身上，瞬间消隐无踪，草头神才回过神来，惊喜交加：“功德金光！真君助新天条出世，天道降下功德金光……这……小将惭愧……”<br>
杨戬墨扇竖起，止住草头神话语：“二百草头神护卫主母，有功当赏，不必多言。”<br>
草头神再度拜下身去：“多谢真君！”清源妙道真君肉身成圣，久享人间香火，一千二百草头神作为他麾下兵马，自然也有功德在身，可是往日除害免灾、降妖伏魔的功德，怎能与新天条出世、天道所赐功德相比？再者，他们奉命在西海暗中保护敖寸心，护着的是他杨家主母，尽的是分内职责，万万没想到竟然有此意外之喜！！</p></div></div> <!----> <div class="page-edit"><div class="edit-link"><a href="https://github.com/ALLforJianXin/allforjianxin.github.io/edit/master/docs/10.连载中/210906.相守.md" target="_blank" rel="noopener noreferrer">编辑</a> <span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></div> <div class="tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD" title="标签">#连载中</a><a href="/tags/?tag=%E6%B8%85%E6%B0%B4" title="标签">#清水</a></div> <div class="last-updated"><span class="prefix">上次更新:</span> <span class="time">2024/10/07, 10:50:40</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/e95e1e/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">折花</div></a> <a href="/pages/872e13/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">一家五口</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
