<h3 id="【一·司法天神】"><a class="header-anchor" href="#【一·司法天神】">#</a> 【一·司法天神】</h3>
<p>司法天神埋首案牍已有些时日，本道天宪既出诸事便可落定，奈何在其位谋其政他仍是日日连轴转，刻下觉着喉头胸腔似有风过好些肉痒，他耐不住咳了几声。</p>
<p>“兄长且歇片刻，待用了药再瞧罢”华山圣母手持托盘亭亭立在案旁温声道。</p>
<p>神官见了摆手言道“不妨事，待我将手上这点西海章子看完，海属的事儿便算了了。”</p>

<h2 id="_1"><a class="header-anchor" href="#_1">#</a> 1</h2>
<p>司法天神，他从一个卑鄙无耻、罔顾亲情的小人峰回路转到今日劳苦功高受众仙家连连称赞爱戴的仁德显圣，其间使了多少手段，恐怕只有他自己知道。</p>
<p>说是为天下众生，其实不过幌子，有时候入戏太深，连自己都快分不清到底是是为了私情还是公义，直到那天又在瑶池遇见她。</p>

            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">月半</span> <span title="创建时间" class="iconfont icon-riqi">2024-02-10</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E6%9C%88%E5%8D%8A">月半</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99">龙年接龙</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%C2%B7%E7%94%B2%E8%BE%B0%E9%BE%99%E5%B9%B4%C2%B7%E5%B9%B4%E5%A4%9C%E9%A5%AD">戬心·甲辰龙年·年夜饭</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <!----></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/b8b385/">
            如醉
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">卡佳</span> <span title="创建时间" class="iconfont icon-riqi">2024-02-10</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E5%8D%A1%E4%BD%B3">卡佳</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99">龙年接龙</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%C2%B7%E7%94%B2%E8%BE%B0%E9%BE%99%E5%B9%B4%C2%B7%E5%B9%B4%E5%A4%9C%E9%A5%AD">戬心·甲辰龙年·年夜饭</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>这几年，杨戬的事业越来越上道，公司发展稳定，许多合同只需他经手签字，不用再四下奔波谈业务。他也在敖寸心工作的城市买房定居下来，小情侣住在市中心的大平层里。这阵子，城东开发区要新建一所医院，底下的人请住建行业的领导吃饭，杨戬作为公司老板自当在酒桌上应酬几句。可是这官场的老油条们一个赛一个的能喝，一场酒局下来，安排好车辆送领导回去，杨戬自己也有点晕晕乎乎的。部门经理送走了最后一拨人，自己说话都开始舌头打颤，还晓得过来关心老板一句要不要叫代驾。<br>
杨戬靠在车边，夜晚的凉风吹得他清醒不少，点上一根烟，“不用，家里有人来接。”抬手招呼路边的代驾小哥过来把经理送回家。</p>

            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">山楂</span> <span title="创建时间" class="iconfont icon-riqi">2024-02-10</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E5%B1%B1%E6%A5%82">山楂</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E9%BE%99%E5%B9%B4%E6%8E%A5%E9%BE%99">龙年接龙</a><a href="/tags/?tag=%E6%88%AC%E5%BF%83%C2%B7%E7%94%B2%E8%BE%B0%E9%BE%99%E5%B9%B4%C2%B7%E5%B9%B4%E5%A4%9C%E9%A5%AD">戬心·甲辰龙年·年夜饭</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>月洞窗上的霞影纱银红鲜亮，晨光从外面漏进来，照得人暖融融的。<br>
杨戬抱着寸心卧在锦衾内，她温热的呼吸将他的胸膛挠得软酥酥的，令他心中十分惬意。他低头去看，只见趴在他身上的人仍合目而睡，口内唧唧嘟嘟说着睡语:“杨戬，你真讨厌。”嘴角还流淌着一道清亮的龙涎。也不知梦到了些什么有趣的。杨戬又是爱，又是笑，不禁伸手轻拧一下她的腮。</p>
