            昨夜西风
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">鱼头</span> <span title="创建时间" class="iconfont icon-riqi">2019-05-26</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E9%B1%BC%E5%A4%B4">鱼头</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E6%9C%89%E6%83%85%E4%BA%BA">有情人</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="昨夜西风"><a class="header-anchor" href="#昨夜西风">#</a> 昨夜西风</h1>
<h2 id="上"><a class="header-anchor" href="#上">#</a> 上</h2>
<h3 id="【一·司法天神】"><a class="header-anchor" href="#【一·司法天神】">#</a> 【一·司法天神】</h3>
<p>司法天神埋首案牍已有些时日，本道天宪既出诸事便可落定，奈何在其位谋其政他仍是日日连轴转，刻下觉着喉头胸腔似有风过好些肉痒，他耐不住咳了几声。</p>
<p>“兄长且歇片刻，待用了药再瞧罢”华山圣母手持托盘亭亭立在案旁温声道。</p>
<p>神官见了摆手言道“不妨事，待我将手上这点西海章子看完，海属的事儿便算了了。”</p>
</div> <a href="/pages/b54dfb/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box iconfont icon-zhiding"><div class="title-wrapper"><h2><a href="/pages/74fa18/">
            我执
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">蓬蓬裙</span> <span title="创建时间" class="iconfont icon-riqi">2019-04-27</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E8%93%AC%E8%93%AC%E8%A3%99">蓬蓬裙</a><a href="/categories/?category=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a><a href="/tags/?tag=%E7%A7%8B%E5%90%8D%E5%B1%B1">秋名山</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="我执"><a class="header-anchor" href="#我执">#</a> 我执</h1>
<h2 id="_1"><a class="header-anchor" href="#_1">#</a> 1</h2>
<p>司法天神，他从一个卑鄙无耻、罔顾亲情的小人峰回路转到今日劳苦功高受众仙家连连称赞爱戴的仁德显圣，其间使了多少手段，恐怕只有他自己知道。</p>
<p>说是为天下众生，其实不过幌子，有时候入戏太深，连自己都快分不清到底是是为了私情还是公义，直到那天又在瑶池遇见她。</p>
</div> <a href="/pages/74fa18/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/04735b/">
            生日
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-24</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>这是一个难得风和日丽又风平浪静的夏日，咕哒子轻松完成了当天的日常训练，哼着小曲儿回寝室的路上，在转角处瞥见一条映在日光下闪闪发光的绯色的尾巴，刚想上去打招呼，却听到了男性声音——<br>
“你怎么又来了？”</p>
</div> <a href="/pages/04735b/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/ace278/">
            朝中措
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">十年一觉</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-22</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E5%8D%81%E5%B9%B4%E4%B8%80%E8%A7%89">十年一觉</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>灌口的夏季相当闷热，日头已西落许久，地面仍在蒸腾出白昼未散的余热，夏蝉高踞树顶，鸣声振动林樾，连哮天犬都耐不住暑热侵袭，化作原型，盘在水边微凉的石砖地上，吐出一条鲜红的舌头哧哧喘气。</p>
</div> <a href="/pages/ace278/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/03f450/">
            生诞🥚快乐！
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-21</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%AD%95%E5%A4%AB">孕夫</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>算是<RouterLink to="/pages/f1c681/">珠联璧合</RouterLink>的后续（之一）<br>
特别鸣谢<a href="/categories/?category=%E6%99%A8%E6%99%A8">晨老师</a> 、<a href="/categories/?category=%E5%BD%B1%E7%82%8E">炎老师</a>！老刘台词由炎老师供梗晨老师供稿，二作的位置您们坐好咯~~</p>
<hr>
<p>对杨戬来说这本该是一个普普通通的生辰，非百非千的，妹子一家来吃顿饭，亲戚朋友送点小礼物，便就算过了。只除了他才吃了人家满月酒没几天现如今已经会跑会跳的小小狐狸抱着自己毛绒绒的大尾巴甜甜地笑着祝福“生日快乐”时称呼的“舅公”让他低落一秒，以及便宜妹夫非要侃侃而谈“这孩子生下来的时候，虽是个人胎，但请二哥以天眼看了，是一只紫毛的小狐狸，香芋似的，再则各取她爹娘名讳之中的一个字，便唤做香芋了”让不明真相的人听了会怀疑天眼的真实用途和他的文采风流，别的都很普通，或者说本来都很好的。</p>
</div> <a href="/pages/03f450/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/69fb5d/">
            神父魅魔pa
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">影炎</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-18</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E5%BD%B1%E7%82%8E">影炎</a><a href="/categories/?category=%E7%94%BB">画</a><a href="/categories/?category=%E8%BF%9E%E8%BD%BD%E4%B8%AD">连载中</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%94%BB">画</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%96">人外</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a><a href="/tags/?tag=paro">paro</a><a href="/tags/?tag=AU">AU</a><a href="/tags/?tag=%E8%A5%BF%E5%B9%BB">西幻</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>半夜看了个电影《夜行者》带宗教向的解读然后又唠嗑的时候笑说：老见人说寸贪图美貌，又说女人不配有欲大逆不道，龙性〇 balabala</p>
<p>于是脑内当即闪过个念头：？这不整点神父魅魔pa血亏啊💪</p>
<p>天主教神父不能结婚，天规也不许结婚……还都要清规禁欲怎么能这么合适hhhhhhhhhh<br>
——————————————————————<br>
我真好喜欢拿黑梗拧烂梗hhhhhhhh<br>
舔手和纹我画好爽，全是xp</p>
<p>——另：谢谢十老师的饭（嗝）</p>
</div> <a href="/pages/69fb5d/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/e5428d/">
            Healing
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">十年一觉</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-15</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E5%8D%81%E5%B9%B4%E4%B8%80%E8%A7%89">十年一觉</a><a href="/categories/?category=%E8%BF%9E%E8%BD%BD%E4%B8%AD">连载中</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E8%BF%9E%E8%BD%BD%E4%B8%AD">连载中</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%96">人外</a><a href="/tags/?tag=paro">paro</a><a href="/tags/?tag=AU">AU</a><a href="/tags/?tag=%E8%A5%BF%E5%B9%BB">西幻</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>在圣城艾德里安，一年四季都是晴天。</p>
</div> <a href="/pages/e5428d/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/f1c681/">
            珠联璧合
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2022-07-06</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E4%BA%BA%E5%A4%96">人外</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a><a href="/tags/?tag=%E4%BA%A7%E5%8D%B5">产卵</a><a href="/tags/?tag=%E9%80%8F%E8%A7%86">透视</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>杨戬拿法力冰镇着满满一盘切好的西瓜端进卧室，刚刚还说自己累了的人这下子利索地在床上撑起上半身，眼睛亮亮地望着他——手里的水果。真君大人在紧紧的催促声中一步步踱到床边，盘子递出去又收回来，眉头拧得像个川字，还是担心道：“吃这么冰的，不要紧么？”</p>
</div> <a href="/pages/f1c681/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/4c5571/">
            失身
