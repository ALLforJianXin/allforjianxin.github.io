            昨夜西风
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">鱼头</span> <span title="创建时间" class="iconfont icon-riqi">2019-05-26</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E9%B1%BC%E5%A4%B4">鱼头</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E6%9C%89%E6%83%85%E4%BA%BA">有情人</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="昨夜西风"><a class="header-anchor" href="#昨夜西风">#</a> 昨夜西风</h1>
<h2 id="上"><a class="header-anchor" href="#上">#</a> 上</h2>
<h3 id="【一·司法天神】"><a class="header-anchor" href="#【一·司法天神】">#</a> 【一·司法天神】</h3>
<p>司法天神埋首案牍已有些时日，本道天宪既出诸事便可落定，奈何在其位谋其政他仍是日日连轴转，刻下觉着喉头胸腔似有风过好些肉痒，他耐不住咳了几声。</p>
<p>“兄长且歇片刻，待用了药再瞧罢”华山圣母手持托盘亭亭立在案旁温声道。</p>
<p>神官见了摆手言道“不妨事，待我将手上这点西海章子看完，海属的事儿便算了了。”</p>
</div> <a href="/pages/b54dfb/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box iconfont icon-zhiding"><div class="title-wrapper"><h2><a href="/pages/74fa18/">
            我执
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">蓬蓬裙</span> <span title="创建时间" class="iconfont icon-riqi">2019-04-27</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E8%93%AC%E8%93%AC%E8%A3%99">蓬蓬裙</a><a href="/categories/?category=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E5%B7%B2%E5%AE%8C%E7%BB%93">已完结</a><a href="/tags/?tag=%E7%A7%8B%E5%90%8D%E5%B1%B1">秋名山</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><h1 id="我执"><a class="header-anchor" href="#我执">#</a> 我执</h1>
<h2 id="_1"><a class="header-anchor" href="#_1">#</a> 1</h2>
<p>司法天神，他从一个卑鄙无耻、罔顾亲情的小人峰回路转到今日劳苦功高受众仙家连连称赞爱戴的仁德显圣，其间使了多少手段，恐怕只有他自己知道。</p>
<p>说是为天下众生，其实不过幌子，有时候入戏太深，连自己都快分不清到底是是为了私情还是公义，直到那天又在瑶池遇见她。</p>

            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">晨晨</span> <span title="创建时间" class="iconfont icon-riqi">2025-06-13</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=%E6%99%A8%E6%99%A8">晨晨</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>如果当年相爱后因为怕天庭迁怒龙族没有成亲的if线。<br>
完了怎么那么清纯大二我对不起你的邪魅狂拽QAQ</p>

</div> <a href="/pages/4144d0/" class="readmore iconfont icon-jiantou-you">阅读全文</a></div></div><div class="post card-box"><div class="title-wrapper"><h2><a href="/pages/d8b76f/">
            春风得意马蹄疾
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">Cho</span> <span title="创建时间" class="iconfont icon-riqi">2025-05-10</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=Cho">Cho</a><a href="/categories/?category=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E3%80%8A%E6%88%91%E9%97%BB%E3%80%8B">《我闻》</a><a href="/tags/?tag=%E5%BE%97%E5%AF%B8%E8%BF%9B%E5%B0%BA">得寸进尺</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>走出真君神殿被霞光一照晃了眼，龙女略停了停脚步。杨戬走到比她前半个身位的地方也停了下来，回头来看她，见她抬了手还眯了眼，不禁莞尔：“是有阵子没出门了。”寸心没好气地白了他一眼，他却更得意了，伸出手来要她挎上。寸心鼓鼓嘴又暗暗跺脚，但还是乖乖贴了过去，只是挽住他之前先在他腰上软肉上拧一把，贴上去后又笑眯眯道：“二爷很久没锻炼了，可不能荒废哦。”</p>

            【联文】【十二】遇龙
            <!----></a></h2> <div class="article-info"><span title="作者" class="iconfont icon-touxiang">sytsxxn</span> <span title="创建时间" class="iconfont icon-riqi">2025-02-09</span> <span title="分类" class="iconfont icon-wenjian"><a href="/categories/?category=sytsxxn">sytsxxn</a><a href="/categories/?category=%E5%9B%9B%E5%AD%A3%E8%BD%AE%E8%BD%AC%20%E7%A6%8F%E4%B9%90%E5%B8%B8%E5%AE%89">四季轮转 福乐常安</a><a href="/categories/?category=%E7%9F%AD%E7%AF%87">短篇</a></span> <span title="标签" class="iconfont icon-biaoqian tags"><a href="/tags/?tag=%E5%9B%9B%E5%AD%A3%E8%BD%AE%E8%BD%AC%20%E7%A6%8F%E4%B9%90%E5%B8%B8%E5%AE%89">四季轮转 福乐常安</a><a href="/tags/?tag=%E7%9F%AD%E7%AF%87">短篇</a></span></div></div> <div class="excerpt-wrapper"><div class="excerpt"><p>正月十二，寒风依旧刺骨，但二郎神庙内却是另一番热闹景象。红烛高燃，香火缭绕，供桌上摆满了各色贡品，酒水牲畜，香烛果宝应有尽有。百姓们挤满了大殿，脸上洋溢着新年的喜悦，纷纷在神明面前跪下，虔诚地许下心愿。</p>
