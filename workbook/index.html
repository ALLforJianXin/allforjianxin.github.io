│   ├── 短篇
│   ├── 已完结
│   └── 连载中
├── 画
├── 视频
└── 考据
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br></div></div><h3 id="_2-文件命名"><a href="#_2-文件命名" class="header-anchor">#</a> 2. 文件命名</h3> <p>为方便文章排序和目录生成，特约定文章命名方式形如<code>2021111300.文章模板.md</code>，以<code>.</code>分割为三段：</p> <ul><li>第一段：十位数字为<strong>年月日</strong>八位+一天内多篇文章的话两位数字做个排序。编辑们在本地编辑时可以后两位都用00（或者用小时数），提交上来更新前会由技术部门再次确认调整。</li> <li>第二段建议取文章标题。</li> <li>第三段为文件类型，固定为<code>md</code>。</li></ul> <h3 id="_3-文章主体"><a href="#_3-文章主体" class="header-anchor">#</a> 3. 文章主体</h3> <p>本站由<code>VuePress</code>驱动，文章为使用<code>markdown</code>语法编辑的<code>.md</code>文件，每篇文件由开头的<strong>front matter</strong>和之后的<strong>正文</strong>部分组成，正文还可以标记开头一部分为<strong>摘要</strong>。</p> <h4 id="_3-1-front-matter"><a href="#_3-1-front-matter" class="header-anchor">#</a> 3.1 front matter</h4> <p><code>.md</code>文件开头两行<code>---</code>之间为<strong>front matter</strong>内容，用于标记文章的一些基础信息，常用字段如下：</p> <div class="language-md line-numbers-mode"><pre class="language-md"><code><span class="token front-matter-block"><span class="token punctuation">---</span>
<span class="token front-matter yaml language-yaml">title: 文章标题 #文章标题，是各处目录显示所用的标题
date: 2021-11-13 00:00:00 #文章发表时间，建议以（各种平台上）第一次发表时间为准来填写
author: Author #作者昵称
categories: 
  - Author #分类标签第一个重复作者昵称，建议与撰稿人页面所用昵称保持一致，方便索引
  - 短篇/已完结/连载中/画/视频/考据 #第二个建议在左侧内容里选一个，方便站点导航栏索引
  - 其他分类 #还可以添加任何其他作者希望添加的分类
tags: 
  - 短篇/已完结/连载中/画/视频/考据 #第一个tag建议在左侧内容里选一个
  - 清水/有情人/得寸进尺/虎啸龙吟 #选一个
  - 其他tag #还可以添加任何其他作者希望添加的分类</span>
<span class="token punctuation">---</span></span>
